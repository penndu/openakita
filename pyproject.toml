"skills/baoyu-image-gen" = "openakita/builtin_skills/external/baoyu-image-gen"
"skills/apify-scraper" = "openakita/builtin_skills/external/apify-scraper"
"skills/translate-pdf" = "openakita/builtin_skills/external/translate-pdf"
"skills/yuque-skills" = "openakita/builtin_skills/external/yuque-skills"
"skills/todoist-task" = "openakita/builtin_skills/external/todoist-task"
"skills/baoyu-infographic" = "openakita/builtin_skills/external/baoyu-infographic"
"skills/baoyu-cover-image" = "openakita/builtin_skills/external/baoyu-cover-image"

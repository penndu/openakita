# Identity templates: shipped as bundled examples so the setup wizard can
# seed the user-customizable identity/*.md files on first install. The
# wizard's `_resolve_identity_template` looks up these paths under the
# installed `openakita` package directory when no repo checkout is on the
# Python path (i.e. for `pip install openakita` users). Without this
# block, wheel-installed users would fall through to the prompt builder's
# 5-line `_STATIC_FALLBACKS["identity_core"]` template instead of the
# full SOUL.md / AGENT.md / persona library shipped with the project.
#
# User-customizable runtime state (SOUL.md, AGENT.md, USER.md, MEMORY.md,
# identity/runtime/**, identity/personas/user_custom.md) is intentionally
# NOT packaged: those files are gitignored and live in the user's project
# directory; the wizard copies these *.example/*.template files there on
# first run.
"identity/SOUL.md.example" = "openakita/identity/SOUL.md.example"
"identity/AGENT.md.example" = "openakita/identity/AGENT.md.example"
"identity/USER.md.example" = "openakita/identity/USER.md.example"
"identity/MEMORY.md.example" = "openakita/identity/MEMORY.md.example"
"identity/POLICIES.yaml" = "openakita/identity/POLICIES.yaml"
"identity/CREDITS.md" = "openakita/identity/CREDITS.md"
"identity/SYSTEM_TASKS.yaml.template" = "openakita/identity/SYSTEM_TASKS.yaml.template"
"identity/personas/boyfriend.md" = "openakita/identity/personas/boyfriend.md"
"identity/personas/business.md" = "openakita/identity/personas/business.md"
"identity/personas/butler.md" = "openakita/identity/personas/butler.md"
"identity/personas/default.md" = "openakita/identity/personas/default.md"
"identity/personas/family.md" = "openakita/identity/personas/family.md"
"identity/personas/girlfriend.md" = "openakita/identity/personas/girlfriend.md"
"identity/personas/jarvis.md" = "openakita/identity/personas/jarvis.md"
"identity/personas/tech_expert.md" = "openakita/identity/personas/tech_expert.md"
"identity/personas/user_custom.md.example" = "openakita/identity/personas/user_custom.md.example"
"identity/prompts/policies.md" = "openakita/identity/prompts/policies.md"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "C4", "SIM"]
ignore = [
    "E501",   # line length handled by formatter; keep ignored
    "E402",   # module-level import not at top (circular-import avoidance, conditional init)
    "B005",   # strip with multi-char strings (intentional character set removal)
    "B008",   # function call in default argument (standard FastAPI File/Depends pattern)
    "B027",   # empty method without abstract decorator (optional-override stubs)
    "B904",   # require `raise ... from err` inside except (too noisy for now)
    "N806",   # non-lowercase variable in function (constants in functions, third-party patterns)
    "N814",   # CamelCase imported as constant (local alias pattern like `IntentType as _IT`)
    "N818",   # exception name should end with Error (renaming would break existing API)
    "SIM102", # collapsible-if (style-only)
    "SIM103", # needless-bool (style-only)
    "SIM105", # prefer contextlib.suppress (style-only)
    "SIM116", # dict-lookup instead of if-chain (less readable in some contexts)
]

[tool.ruff.lint.per-file-ignores]
"src/openakita/integrations/**" = ["F401", "F821", "SIM117", "E722", "UP035"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
strict = false
disallow_untyped_defs = false
disallow_incomplete_defs = false
check_untyped_defs = false
disallow_any_generics = false
warn_return_any = false
warn_unused_ignores = true
no_implicit_optional = true
ignore_errors = true
disable_error_code = [
    "attr-defined",
    "call-arg",
    "no-any-return",
    "union-attr",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
# Skip perf tests by default; CI calls them explicitly with ``-m perf``
# or ``-m "perf or not perf"``. See tests/perf/test_policy_v2_perf.py
# (C22 P3-3) for rationale.
addopts = "--ignore=tests/legacy/test_refactoring.py --ignore=tests/test_refactoring.py -m 'not perf'"
markers = [
    "perf: SLO / performance baseline tests; deselected by default. Run with `pytest -m perf` or override via `--override-ini=addopts=`.",
    "integration: tests that require external services or local system dependencies",
]

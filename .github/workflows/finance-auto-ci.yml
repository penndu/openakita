name: finance-auto CI

# Plugin-scoped CI for plugins/finance-auto. Closes audit EX-P2-1
# (pip-audit gate) and the run_all_acceptance harness wiring noted
# in CHANGELOG #11.
#
# Triggers:
#   * push / PR that touches plugins/finance-auto/** or the workflow
#     file itself, AND
#   * manual workflow_dispatch (for ad-hoc CVE re-scan runs).
#
# Job topology:
#   lint                 -> ruff check on plugin python code
#   tests                -> pytest on plugins/finance-auto/tests/**
#   acceptance           -> python scripts/run_all_acceptance.py
#   dependency-audit     -> pip-audit (warning-only, continue-on-error)
#
# All jobs use ubuntu-latest + Python 3.11 to match the
# `requires.python = ">=3.11"` floor declared in the plugin manifest.

on:
  push:
    paths:
      - 'plugins/finance-auto/**'
      - '.github/workflows/finance-auto-ci.yml'
  pull_request:
    paths:
      - 'plugins/finance-auto/**'
      - '.github/workflows/finance-auto-ci.yml'
  workflow_dispatch:

concurrency:
  group: finance-auto-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Static analysis (fast fail) ──────────────────────────────
  lint:
    name: ruff check (plugin python)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      - name: Lint plugin sources
        run: |
          ruff check plugins/finance-auto/finance_auto_backend/ \
                     plugins/finance-auto/scripts/ \
                     plugins/finance-auto/plugin.py

  # ── pytest (plugin tests/ tree) ──────────────────────────────
  tests:
    name: pytest plugins/finance-auto/tests/
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install OpenAkita core + plugin deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install -r plugins/finance-auto/requirements.txt
      - name: Headless keyring guard
        run: |
          # On a fresh ubuntu-latest runner the secretstorage backend
          # is unavailable. The plugin falls back to this env var.
          echo "OPENAKITA_FINANCE_AUTO_PASSPHRASE=$(openssl rand -hex 32)" >> "$GITHUB_ENV"
      - name: Run plugin tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest -q plugins/finance-auto/tests/

  # ── Acceptance harness (10 scripts via run_all_acceptance.py) ─
  acceptance:
    name: scripts/run_all_acceptance.py
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [lint, tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install OpenAkita core + plugin deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install -r plugins/finance-auto/requirements.txt
      - name: Headless keyring guard
        run: |
          echo "OPENAKITA_FINANCE_AUTO_PASSPHRASE=$(openssl rand -hex 32)" >> "$GITHUB_ENV"
      - name: Run aggregate acceptance harness
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python plugins/finance-auto/scripts/run_all_acceptance.py
      - name: Upload acceptance result JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: finance-auto-acceptance-result
          path: _finance_auto_run_all_acceptance.json
          if-no-files-found: ignore
          retention-days: 14

  # ── CVE / SBOM scan (warning-only — closes EX-P2-1) ──────────
  dependency-audit:
    name: pip-audit (warning-only)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
      - name: Audit finance-auto plugin requirements
        run: |
          # Warning-only: this job is allowed to fail (continue-on-error
          # at job level + intentional `|| true` here) so a freshly
          # disclosed CVE in a pinned dep does not block PR merges.
          # The audit output is uploaded as a workflow artifact so the
          # reviewer can decide whether to bump the pin.
          pip-audit -r plugins/finance-auto/requirements.txt \
                    --format=json \
                    --output=_finance_auto_pip_audit.json || true
          pip-audit -r plugins/finance-auto/requirements.txt || true
      - name: Upload pip-audit JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: finance-auto-pip-audit
          path: _finance_auto_pip_audit.json
          if-no-files-found: ignore
          retention-days: 14

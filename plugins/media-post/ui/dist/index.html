    .oa-cost { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border-radius: 6px; background: rgba(34,197,94,.08); border: 1px solid rgba(34,197,94,.3); font-size: 12px; color: var(--text); margin: 12px 0; }
    .oa-cost.warn { background: rgba(245,158,11,.08); border-color: rgba(245,158,11,.3); }

// i18n bootstrap
if (window.OpenAkitaI18n && window.OpenAkitaI18n.register) {
  window.OpenAkitaI18n.register(I18N_DICT);
}
function _detectLocale() {
  if (window.OpenAkitaI18n && window.OpenAkitaI18n.locale) return window.OpenAkitaI18n.locale();
  return (navigator.language || "zh").startsWith("zh") ? "zh" : "en";
}
function useI18n() {
  const [locale, setLocale] = useState(_detectLocale());
  useEffect(() => {
    if (window.OpenAkitaI18n && window.OpenAkitaI18n.onChange) {
      return window.OpenAkitaI18n.onChange(setLocale);
    }
    return undefined;
  }, []);
  const t = useCallback((key, vars) => {
    if (window.OpenAkitaI18n && window.OpenAkitaI18n.t) {
      const v = window.OpenAkitaI18n.t(key, vars);
      if (v && v !== key) return v;
    }
    const dict = I18N_DICT[locale] || I18N_DICT.zh;
    let raw = dict[key] || I18N_DICT.zh[key] || key;
    if (vars) raw = raw.replace(/\{(\w+)\}/g, (_, n) => vars[n] != null ? String(vars[n]) : "{" + n + "}");
    return raw;
  }, [locale]);
  return { t, locale };
}

function fmtDate(s) { try { return new Date(s).toLocaleString(); } catch (e) { return s || ""; } }
function fmtBytes(n) { if (!n) return "0 B"; const u = ["B","KB","MB","GB"]; let i = 0; while (n >= 1024 && i < u.length - 1) { n /= 1024; i++; } return n.toFixed(1) + " " + u[i]; }
function clamp(n, lo, hi) { return Math.min(hi, Math.max(lo, Number(n) || 0)); }
function parseChapters(text) {
  if (!text) return [];
  const lines = String(text).split(/\r?\n/);
  const out = [];
  let idx = 0;
  for (const ln of lines) {
    const m = ln.trim().match(/^(\d{1,2}:\d{1,2}(?::\d{1,2})?)\s+(.+)$/);
    if (m) { idx++; out.push({ chapter_index: idx, timestamp: m[1], title: m[2], subtitle: "" }); }
    else if (ln.trim()) { idx++; out.push({ chapter_index: idx, timestamp: "", title: ln.trim(), subtitle: "" }); }
  }
  return out;
}

// ─── Create tab ─────────────────────────────────────────────────────────
const DEFAULT_FORMS = {
  cover_pick: { quantity: 8, min_score_threshold: 3.0, platform_hint: "universal" },
  multi_aspect: { target_aspects: ["9:16"], recompose_fps: 2.0 },
  seo_pack: { platforms: ["tiktok","bilibili","xiaohongshu"], subtitle_excerpt: "", instruction: "", video_title_hint: "", include_chapters: false },
  chapter_cards: { template_id: "modern", width: 1280, height: 720, chapters_text: "" },
};

function CreateTab({ t, settings, onTaskCreated, gotoSettings }) {
  const [mode, setMode] = useState(() => localStorage.getItem("mediapost.mode") || "cover_pick");
  const [forms, setForms] = useState(() => {
    const saved = {};
    for (const m of Object.keys(DEFAULT_FORMS)) {
      try {
        const s = localStorage.getItem(`mediapost.draft.${m}`);
        saved[m] = s ? { ...DEFAULT_FORMS[m], ...JSON.parse(s) } : DEFAULT_FORMS[m];
      } catch (e) { saved[m] = DEFAULT_FORMS[m]; }
    }
    return saved;
  });
  const [video, setVideo] = useState(null); // {path, url, filename, duration_sec}
  const [uploading, setUploading] = useState(false);
  const [preview, setPreview] = useState(null);
  const [submitting, setSubmitting] = useState(false);
  const [costApproved, setCostApproved] = useState(false);
  const [startedTask, setStartedTask] = useState(null);
  const fileRef = useRef(null);

  function patchForm(patch) {
    setForms(prev => {
      const next = { ...prev, [mode]: { ...prev[mode], ...patch } };
      try { localStorage.setItem(`mediapost.draft.${mode}`, JSON.stringify(next[mode])); } catch (e) {}
      return next;
    });
  }
  useEffect(() => {
    try { localStorage.setItem("mediapost.mode", mode); } catch (e) {}
    setCostApproved(false);
  }, [mode]);

  // Recompute preview whenever the relevant form / video changes.
  useEffect(() => {
    let cancelled = false;
    async function run() {
      const f = forms[mode];
      const body = { mode };
      if (mode === "cover_pick") body.quantity = f.quantity;
      if (mode === "multi_aspect") {
        body.target_aspects = f.target_aspects;
        body.recompose_fps = f.recompose_fps;
        body.duration_sec = video ? (video.duration_sec || 0) : 0;
      }
      if (mode === "seo_pack") body.platforms = f.platforms;
      if (mode === "chapter_cards") body.chapter_count = parseChapters(f.chapters_text).length;
      try {
        const r = await pluginApi("POST", "/estimate", body);
        if (!cancelled && r.ok) setPreview(r.body);
      } catch (e) { /* ignore */ }
    }
    run();
    return () => { cancelled = true; };
  }, [mode, forms, video]);

  async function onUpload(file) {
    if (!file) return;
    setUploading(true);
    try {
      const r = await uploadFile(file);
      setVideo({ path: r.path, filename: r.filename, url: r.url, size: r.size, duration_sec: 0 });
    } catch (e) {
      showToast("Upload failed: " + e.message, "error");
    } finally { setUploading(false); }
  }

  function videoRequired() { return mode === "cover_pick" || mode === "multi_aspect"; }
  const apiMissing = !settings || !settings.dashscope_api_key;
  const apiMissingForMode = apiMissing && mode !== "chapter_cards";

  async function startTask() {
    if (videoRequired() && !video) {
      showToast(t("mediaPost.forms.video.label") + " ?", "error");
      return;
    }
    setSubmitting(true);
    try {
      const f = forms[mode];
      const params = { ...f };
      if (mode === "chapter_cards") params.chapters = parseChapters(f.chapters_text);
      const body = {
        mode,
        video_path: video ? video.path : "",
        params,
        cost_approved: costApproved,
      };
      const r = await pluginApi("POST", "/tasks", body);
      if (!r.ok) {
        showToast("Create failed: " + JSON.stringify(r.body || {}), "error");
        return;
      }
      setStartedTask(r.body);
      onTaskCreated && onTaskCreated(r.body);
    } finally { setSubmitting(false); }
  }

  const f = forms[mode];
  const startKey = `mediaPost.forms.start.${mode}`;
  const needsConfirm = preview && preview.cost_kind !== "ok" && !costApproved;
  const startLabel = needsConfirm
    ? t("mediaPost.forms.start.confirm", { cost: preview.total_cny.toFixed(2) })
    : t(startKey);

  const modes = [
    { id: "cover_pick" },
    { id: "multi_aspect" },
    { id: "seo_pack" },
    { id: "chapter_cards" },
  ];

  return (
    <div>
      <div className="oa-hero-title">{t("mediaPost.tabs.create")}</div>
      <div className="oa-hero-title__sub">{t("mediaPost.tabs.create.sub")}</div>
      <div className="split-layout">
        <div className="split-left">
          <ApiKeyBanner missing={apiMissingForMode} t={t} onGo={gotoSettings} />
          <div className="form-row">
            <div className="oa-section-label">{t("mediaPost.tabs.create")}</div>
            <div className="grid-2" style={{gap: 8}}>
              {modes.map(m => (
                <button key={m.id} type="button"
                        className={`mode-btn ${mode === m.id ? "active" : ""}`}
                        onClick={() => setMode(m.id)}>
                  <span className="mode-btn__title">{t(`mediaPost.modes.${m.id}.title`)}</span>
                  <span className="mode-btn__desc">{t(`mediaPost.modes.${m.id}.desc`)}</span>
                </button>
              ))}
            </div>
          </div>
          {videoRequired() && (
            <div className="form-row">
              <div className="label">{t("mediaPost.forms.video.label")}</div>
              <div className={`upload-zone ${video ? "has-image" : ""}`}
                   onClick={() => fileRef.current && fileRef.current.click()}>
                {uploading
                  ? <span className="spinner-sm" />
                  : video
                    ? (<>
                        <video className="upload-preview" src={video.url} controls />
                        <div className="text-xs text-muted" style={{marginTop:6}}>{video.filename} · {fmtBytes(video.size)}</div>
                      </>)
                    : <>{t("mediaPost.forms.video.placeholder")}</>}
              </div>
              <div className="text-xs text-dim" style={{marginTop: 4}}>{t("mediaPost.forms.video.helper")}</div>
              <input ref={fileRef} type="file" accept="video/*" hidden
                     onChange={e => onUpload(e.target.files[0])} />
            </div>
          )}
          {mode === "cover_pick" && <CoverPickForm value={f} onChange={patchForm} t={t} />}
          {mode === "multi_aspect" && <MultiAspectForm value={f} onChange={patchForm} t={t} />}
          {mode === "seo_pack" && <SeoPackForm value={f} onChange={patchForm} t={t} />}
          {mode === "chapter_cards" && <ChapterCardsForm value={f} onChange={patchForm} t={t} />}
          <CostBanner preview={preview} t={t} />
          {preview && preview.cost_kind === "warn" && (
            <div className="oa-config-banner">
              <span className="oa-config-banner__icon">💰</span>
              <div className="oa-config-banner__text">{t("mediaPost.cost.warn_10")}</div>
            </div>
          )}
          {preview && preview.cost_kind === "danger" && (
            <div className="oa-config-banner danger">
              <span className="oa-config-banner__icon">🛑</span>
              <div className="oa-config-banner__text">{t("mediaPost.cost.warn_30")}</div>
            </div>
          )}
          <button className="btn btn-primary" disabled={submitting || apiMissingForMode}
                  style={{width: "100%", justifyContent: "center"}}
                  onClick={() => { if (needsConfirm) setCostApproved(true); else startTask(); }}>
            {submitting && <span className="spinner-sm" />}
            {needsConfirm ? startLabel : t(startKey)}
          </button>
          {needsConfirm && costApproved && (
            <button className="btn btn-primary" style={{width:"100%", marginTop:8, justifyContent:"center"}}
                    onClick={startTask}>
              {t("mediaPost.common.start")}
            </button>
          )}
        </div>
        <div className="split-right">
          {!startedTask && (
            <div className="empty-state">
              <div style={{fontSize:48}}>🎬</div>
              <p>{t("mediaPost.tabs.create.sub")}</p>
            </div>
          )}
          {startedTask && (
            <div className="modal-mask" onClick={() => setStartedTask(null)}>
              <div className="modal-card" onClick={e => e.stopPropagation()}>
                <div className="modal-icon">✓</div>
                <div className="modal-title">{t("mediaPost.common.taskStarted")}</div>
                <div className="modal-desc">
                  ID: <code>{startedTask.id}</code><br/>
                  {t("mediaPost.cost.estimate")}: ¥{(startedTask.cost_estimated || 0).toFixed(4)}
                </div>
                <div className="modal-actions">
                  <button className="btn" onClick={() => setStartedTask(null)}>{t("mediaPost.common.continue")}</button>
                  <button className="btn btn-primary" onClick={() => { setStartedTask(null); onTaskCreated && onTaskCreated(startedTask, true); }}>
                    {t("mediaPost.common.goTasks")}
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

    pluginApi("GET", `/tasks/${taskId}/results/chapters`).then(r => r.ok && setItems(r.body || []));
  }, [taskId]);
  if (!items.length) return <div className="empty-state">{t("mediaPost.tasks.detail.empty")}</div>;
  return (
    <div>
      <div className="oa-section-label">{t("mediaPost.tasks.detail.chapters", { n: items.length })}</div>
      <div className="image-gallery">
        {items.map(it => (
          <div key={it.id} className="image-card">
            <img src={buildPreviewUrl(it.png_path)} alt={`ch-${it.chapter_index}`} />
            <div className="image-card__caption">#{it.chapter_index} · {it.title}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function ErrorCoach({ task, t, onRetry }) {
  if (!task || task.status !== "failed") return null;
  const kind = task.error_kind || "unknown";
  return (
    <div className="oa-error-coach">
      <div className="oa-error-coach__title">{t(`mediaPost.errors.${kind}.label`)} · {task.error_message || ""}</div>
      <ul className="oa-error-coach__list">
        {[1,2,3].map(i => {
          const k = `mediaPost.errors.${kind}.h${i}`;
          const v = t(k);
          return v && v !== k ? <li key={i}>{v}</li> : null;
        })}
      </ul>
      <div className="oa-error-coach__actions">
        <button className="btn btn-sm" onClick={onRetry}>{t("mediaPost.common.retry")}</button>
        <button className="btn btn-sm" onClick={() => copyToClipboard(JSON.stringify(task, null, 2))}>{t("mediaPost.common.copyLog")}</button>
      </div>
    </div>
  );
}

function TasksTab({ t, refreshTrigger }) {
  const [tasks, setTasks] = useState([]);
  const [filterMode, setFilterMode] = useState("");
  const [filterStatus, setFilterStatus] = useState("");
  const [search, setSearch] = useState("");
  const [selectedId, setSelectedId] = useState(null);
  const [selectedTask, setSelectedTask] = useState(null);

  const refresh = useCallback(async () => {
    const q = [];
    if (filterMode) q.push(`mode=${filterMode}`);
    if (filterStatus) q.push(`status=${filterStatus}`);
    const r = await pluginApi("GET", `/tasks${q.length ? "?" + q.join("&") : ""}`);
    if (r.ok && r.body && r.body.tasks) setTasks(r.body.tasks);
  }, [filterMode, filterStatus]);

  useEffect(() => { refresh(); }, [refresh, refreshTrigger]);
  useEffect(() => {
    const id = setInterval(refresh, 3000);
    return () => clearInterval(id);
  }, [refresh]);
  useEffect(() => {
    return onEvent("task_update", () => refresh());
  }, [refresh]);
  useEffect(() => {
    if (!selectedId) return;
    pluginApi("GET", `/tasks/${selectedId}`).then(r => r.ok && setSelectedTask(r.body));
  }, [selectedId, tasks]);

  const filtered = tasks.filter(tk => !search || tk.id.includes(search) || (tk.video_path || "").includes(search));

  async function cancel() { if (selectedId) { await pluginApi("POST", `/tasks/${selectedId}/cancel`); refresh(); } }
  async function retry() { if (selectedId) { const r = await pluginApi("POST", `/tasks/${selectedId}/retry`); if (r.ok) refresh(); } }
  async function approve() { if (selectedId) { await pluginApi("POST", `/tasks/${selectedId}/approve`); refresh(); } }
  async function del() { if (selectedId) { await pluginApi("DELETE", `/tasks/${selectedId}`); setSelectedId(null); refresh(); } }

  const detail = (() => {
    if (!selectedTask) return <div className="empty-state">{t("mediaPost.tasks.detail.empty")}</div>;
    const tk = selectedTask;
    return (
      <div>
        <div className="flex items-center justify-between" style={{marginBottom:12}}>
          <div>
            <div className="oa-hero-title">{t(`mediaPost.modes.${tk.mode}.title`)}</div>
            <div className="text-xs text-dim">ID: <code>{tk.id}</code> · {fmtDate(tk.created_at)}</div>
          </div>
          <div className="flex gap-2">
            <span className={`oa-pill ${tk.status === "completed" ? "green" : tk.status === "failed" ? "red" : tk.status === "approval_required" ? "orange" : "gray"}`}>
              {t(`mediaPost.common.status.${tk.status}`) || tk.status}
            </span>
            {tk.status === "running" && <button className="btn btn-sm" onClick={cancel}>{t("mediaPost.tasks.actions.cancel")}</button>}
            {tk.status === "approval_required" && <button className="btn btn-sm btn-primary" onClick={approve}>{t("mediaPost.tasks.actions.approve")}</button>}
            {(tk.status === "failed" || tk.status === "cancelled") && <button className="btn btn-sm" onClick={retry}>{t("mediaPost.tasks.actions.retry")}</button>}
            <button className="btn btn-sm btn-danger" onClick={del}>{t("mediaPost.tasks.actions.delete")}</button>
          </div>
        </div>
        {tk.status === "running" && (
          <div className="progress"><div style={{width: `${(tk.progress || 0) * 100}%`}} /></div>
        )}
        <ErrorCoach task={tk} t={t} onRetry={retry} />
        {tk.mode === "cover_pick" && <CoverGallery taskId={tk.id} t={t} />}
        {tk.mode === "multi_aspect" && <RecomposeViewer taskId={tk.id} t={t} />}
        {tk.mode === "seo_pack" && <SeoTabbedPanel taskId={tk.id} t={t} />}
        {tk.mode === "chapter_cards" && <ChaptersGallery taskId={tk.id} t={t} />}
      </div>
    );
  })();

  return (
    <div>
      <div className="oa-hero-title">{t("mediaPost.tabs.tasks")}</div>
      <div className="oa-hero-title__sub">{t("mediaPost.tabs.tasks.sub")}</div>
      <div className="split-layout">
        <div className="split-left">
          <div className="oa-section-label">
            {t("mediaPost.tasks.all")} <span className="oa-pill">{tasks.length}</span>
          </div>
          <div className="oa-filter-group">
            <select className="input select" value={filterMode} onChange={e => setFilterMode(e.target.value)}>
              <option value="">{t("mediaPost.tasks.filter.all")} · {t("mediaPost.tasks.filter.mode")}</option>
              {["cover_pick","multi_aspect","seo_pack","chapter_cards"].map(m => (
                <option key={m} value={m}>{t(`mediaPost.modes.${m}.title`)}</option>
              ))}
            </select>
            <select className="input select" value={filterStatus} onChange={e => setFilterStatus(e.target.value)}>
              <option value="">{t("mediaPost.tasks.filter.all")} · {t("mediaPost.tasks.filter.status")}</option>
              {["pending","running","completed","failed","cancelled","approval_required"].map(s => (
                <option key={s} value={s}>{t(`mediaPost.common.status.${s}`)}</option>
              ))}
            </select>
            <input className="input" placeholder={t("mediaPost.tasks.filter.search")} value={search} onChange={e => setSearch(e.target.value)} />
            <button className="btn btn-sm" onClick={refresh}>{t("mediaPost.common.refresh")}</button>
          </div>
          <div className="oa-list-panel">
            {filtered.length === 0 && <div className="empty-state">{t("mediaPost.tasks.empty")}</div>}
            {filtered.map(tk => (
              <TaskCard key={tk.id} task={tk} selected={tk.id === selectedId}
                        onClick={() => setSelectedId(tk.id)} t={t} />
            ))}
          </div>
        </div>
        <div className="split-right">{detail}</div>
      </div>
    </div>
  );
}

// ─── Library tab ────────────────────────────────────────────────────────
function LibraryTab({ t }) {
  const [sub, setSub] = useState("covers");
  return (
    <div>
      <div className="oa-hero-title">{t("mediaPost.tabs.library")}</div>
      <div className="oa-hero-title__sub">{t("mediaPost.tabs.library.sub")}</div>
      <div className="tabs" style={{padding:0, marginBottom:12, background:"transparent"}}>
        {["covers","aspects","seo","chapters"].map(s => (
          <div key={s} className={`tab ${sub === s ? "active" : ""}`} onClick={() => setSub(s)}>
            {t(`mediaPost.library.${s}`)}
          </div>
        ))}
      </div>
      <div className="empty-state">{t("mediaPost.library.empty")}</div>
    </div>
  );
}

// ─── Settings tab — 5 sections ──────────────────────────────────────────
function SettingsTab({ t, settings, onSaved }) {
  const [draft, setDraft] = useState(settings || {});
  const [savedFlash, setSavedFlash] = useState(false);
  useEffect(() => { setDraft(settings || {}); }, [settings]);
  function set(k, v) { setDraft(d => ({ ...d, [k]: v })); }
  async function save() {
    const r = await pluginApi("PUT", "/settings", { updates: draft });
    if (r.ok) { setSavedFlash(true); setTimeout(() => setSavedFlash(false), 1500); onSaved && onSaved(); }
  }
  const apiOk = !!draft.dashscope_api_key;

  return (
    <div>
      <div className="oa-hero-title">{t("mediaPost.tabs.settings")}</div>
      <div className="oa-hero-title__sub">{t("mediaPost.tabs.settings.sub")}</div>

      <div className="oa-settings-section">
        <div className="oa-settings-section__title">{t("mediaPost.settings.api.title")}</div>
        <div className="form-row">
          <div className="label">{t("mediaPost.settings.api.label")}</div>
          <input className="input" type="password" value={draft.dashscope_api_key || ""}
                 onChange={e => set("dashscope_api_key", e.target.value)}
                 placeholder="sk-..." />
          <div className="text-xs text-dim" style={{marginTop:4}}>{t("mediaPost.settings.api.helper")}</div>
        </div>
        <div className="flex items-center gap-2">
          <span className={`oa-pill ${apiOk ? "green" : "red"}`}>
            {apiOk ? t("mediaPost.settings.api.ok") : t("mediaPost.settings.api.missing")}
          </span>
        </div>
      </div>

      <div className="oa-settings-section">
        <div className="oa-settings-section__title">{t("mediaPost.settings.vlm.title")}</div>
        <div className="grid-2">
          <div className="form-row">
            <div className="label">{t("mediaPost.settings.vlm.fps")}</div>
            <input className="input" type="number" step="0.5" min="0.5" max="10"
                   value={draft.recompose_fps || "2.0"}
                   onChange={e => set("recompose_fps", e.target.value)} />
          </div>
          <div className="form-row">
            <div className="label">{t("mediaPost.settings.vlm.batch")}</div>
            <input className="input" disabled value={draft.vlm_batch_size || "8"} />
          </div>
          <div className="form-row">
            <div className="label">{t("mediaPost.settings.vlm.concurrency")}</div>
            <input className="input" type="number" min="1" max="8" value={draft.vlm_concurrency || "4"}
                   onChange={e => set("vlm_concurrency", e.target.value)} />
          </div>
        </div>
      </div>

      <div className="oa-settings-section">
        <div className="oa-settings-section__title">{t("mediaPost.settings.chapter.title")}</div>
        <div className="form-row">
          <div className="label">{t("mediaPost.settings.chapter.template")}</div>
          <select className="input select" value={draft.chapter_template_default || "modern"}
                  onChange={e => set("chapter_template_default", e.target.value)}>
            {["modern","minimal","dark","colorful","podcast"].map(tpl => <option key={tpl} value={tpl}>{tpl}</option>)}
          </select>
        </div>
        <div className="form-row">
          <div className="label">{t("mediaPost.settings.chapter.playwright")}</div>
          <span className={`oa-pill ${draft.playwright_enabled === "true" ? "green" : "gray"}`}>
            {draft.playwright_enabled === "true" ? "Playwright OK" : "drawtext fallback"}
          </span>
        </div>
      </div>

      <div className="oa-settings-section">
        <div className="oa-settings-section__title">{t("mediaPost.settings.cost.title")}</div>
        <div className="grid-2">
          <div className="form-row">
            <div className="label">{t("mediaPost.settings.cost.warn")}</div>
            <input className="input" type="number" step="1" value={draft.cost_warn_threshold_cny || "10"}
                   onChange={e => set("cost_warn_threshold_cny", e.target.value)} />
          </div>
          <div className="form-row">
            <div className="label">{t("mediaPost.settings.cost.duration")}</div>
            <input className="input" type="number" step="1" value={draft.multi_aspect_max_minutes || "30"}
                   onChange={e => set("multi_aspect_max_minutes", e.target.value)} />
          </div>
        </div>
      </div>

      <div className="oa-settings-section">
        <div className="oa-settings-section__title disabled">{t("mediaPost.settings.handoff.title")}</div>
        <div className="text-sm text-muted">{t("mediaPost.settings.handoff.disabled")}</div>
        <span className="oa-pill gray" style={{marginTop:8}}>v2.0 only</span>
      </div>

      <div className="flex items-center gap-2">
        <button className="btn btn-primary" onClick={save}>{t("mediaPost.settings.save")}</button>
        {savedFlash && <span className="oa-pill green">{t("mediaPost.settings.saved")}</span>}
      </div>
    </div>
  );
}

// ─── App shell ──────────────────────────────────────────────────────────
function App() {
  const { t, locale } = useI18n();
  const [tab, setTab] = useState("create");
  const [settings, setSettings] = useState(null);
  const [refreshTrigger, setRefreshTrigger] = useState(0);

  const reloadSettings = useCallback(async () => {
    const r = await pluginApi("GET", "/settings");
    if (r.ok) setSettings(r.body);
  }, []);
  useEffect(() => { reloadSettings(); }, [reloadSettings]);

  function onTaskCreated(_task, gotoTasks) {
    setRefreshTrigger(x => x + 1);
    if (gotoTasks) setTab("tasks");
  }
  function toggleTheme() {
    const cur = document.documentElement.getAttribute("data-theme");
    document.documentElement.setAttribute("data-theme", cur === "dark" ? "light" : "dark");
  }
  function toggleLocale() {
    const next = locale === "zh" ? "en" : "zh";
    if (window.OpenAkitaI18n && window.OpenAkitaI18n.setLocale) window.OpenAkitaI18n.setLocale(next);
  }

  return (
    <div className="app">
      <div className="header">
        <h1><span style={{fontSize:18}}>🎬</span> {t("app.title")}</h1>
        <div className="header-right">
          <span className={`oa-pill ${settings && settings.dashscope_api_key ? "green" : "gray"}`}>
            {settings && settings.dashscope_api_key ? t("mediaPost.settings.api.ok") : t("mediaPost.settings.api.missing")}
          </span>
          <button className="btn btn-sm" onClick={toggleTheme}>🌓</button>
          <button className="btn btn-sm" onClick={toggleLocale}>{locale === "zh" ? "EN" : "中"}</button>
        </div>
      </div>
      <div className="tabs">
        {["create","tasks","library","settings"].map(k => (
          <div key={k} className={`tab ${tab === k ? "active" : ""}`} data-tab={k} onClick={() => setTab(k)}>
            {t(`mediaPost.tabs.${k}`)}
          </div>
        ))}
      </div>
      <div className="content">
        {tab === "create" && <CreateTab t={t} settings={settings} onTaskCreated={onTaskCreated} gotoSettings={() => setTab("settings")} />}
        {tab === "tasks" && <TasksTab t={t} refreshTrigger={refreshTrigger} />}
        {tab === "library" && <LibraryTab t={t} />}
        {tab === "settings" && <SettingsTab t={t} settings={settings} onSaved={reloadSettings} />}
      </div>
    </div>
  );
}

class PluginErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  componentDidCatch(error, info) { console.error("[media-post] render error:", error, info); }
  render() {
    if (!this.state.error) return this.props.children;
    return (
      <div style={{padding: 24}}>
        <div className="oa-config-banner danger">
          <span className="oa-config-banner__icon">⚠️</span>
          <div className="oa-config-banner__text">
            <strong>UI render error</strong>
            <div className="text-xs">{String(this.state.error.message || this.state.error)}</div>
          </div>
          <button className="oa-config-banner__action" onClick={() => this.setState({ error: null })}>Reset</button>
        </div>
      </div>
    );
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <PluginErrorBoundary><App /></PluginErrorBoundary>
);
if (window.OpenAkita && typeof window.OpenAkita.ready === "function") {
  window.OpenAkita.ready();
}
</script>
</body>

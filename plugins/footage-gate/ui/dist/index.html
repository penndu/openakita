<script>
// ── Bridge SDK (1:1 with tongyi-image / seedance pattern) ──
const BRIDGE_VER = 1;
let _ctx = null, _caps = [], _pending = {}, _handlers = {};
let _bridgeConnected = false;
const _inIframe = window.parent !== window;
function uid() { return Math.random().toString(36).slice(2,10) + Date.now().toString(36); }
function post(msg) { if (_inIframe) window.parent.postMessage({ __akita_bridge: true, version: BRIDGE_VER, ...msg }, "*"); }

function _detectApiBase() {
  if (_ctx && _ctx.apiBase) return _ctx.apiBase;
  var loc = window.location;
  if (loc.port === "5173" || loc.port === "1420") return "http://127.0.0.1:18900";
  return loc.origin;
}

function directFetch(method, path, body) {
  var url = path.startsWith("http") ? path : _detectApiBase() + path;
  var opts = { method: method, headers: { "Content-Type": "application/json" } };
  if (body && method !== "GET" && method !== "HEAD") {
    if (body instanceof FormData) { opts.body = body; delete opts.headers["Content-Type"]; }
    else { opts.body = JSON.stringify(body); }
  }
  return fetch(url, opts).then(function(resp) {
    return resp.json().then(function(json) { return { ok: resp.ok, status: resp.status, body: json }; })
      .catch(function() { return { ok: resp.ok, status: resp.status, body: {} }; });
  });
}

function apiCall(method, path, body) {
  if (!_inIframe || !_bridgeConnected) return directFetch(method, path, body);
  return new Promise(function(resolve, reject) {
    var id = uid();
    _pending[id] = { resolve: resolve, reject: reject };
    post({ type: "bridge:api-request", requestId: id, payload: { method: method, path: path, body: body } });
    setTimeout(function() {
      if (_pending[id]) { delete _pending[id]; directFetch(method, path, body).then(resolve).catch(reject); }
    }, 5000);
  });
}

function pluginApi(method, path, body) {
  var base = _ctx ? "/api/plugins/" + _ctx.pluginId : "/api/plugins/footage-gate";
  return apiCall(method, base + path, body);
}

function copyToClipboard(text) {
  if (_inIframe && _bridgeConnected) {
    post({ type: "bridge:clipboard-write", payload: { text: String(text || "") } });
    return;
  }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).catch(function() {});
  }
}

window.addEventListener("message", function(e) {
  var d = e.data;
  if (!d || !d.__akita_bridge) return;
  if (d.type === "bridge:init" && d.payload) {
    _ctx = d.payload; _bridgeConnected = true;
    if (_ctx.theme) document.documentElement.setAttribute("data-theme", _ctx.theme.includes("dark") ? "dark" : "light");
  }
  if (d.type === "bridge:handshake-ack" && d.payload) { _caps = d.payload.capabilities || []; _bridgeConnected = true; }
  var acks = ["bridge:api-response","bridge:clipboard-ack"];
  if (acks.indexOf(d.type) !== -1 && d.requestId && _pending[d.requestId]) {
    _pending[d.requestId].resolve(d.payload); delete _pending[d.requestId];
  }
  if (d.type === "bridge:theme-change" && d.payload) {
    document.documentElement.setAttribute("data-theme", (d.payload.theme || "").includes("dark") ? "dark" : "light");
  }
  if (d.type === "bridge:event" && d.payload) {
    var h = _handlers[d.payload.eventType];
    if (h) h.forEach(function(fn) { fn(d.payload.data); });
  }
});
var _readyInterval = null;
function _sendReady() { post({ type: "bridge:ready" }); post({ type: "bridge:handshake", payload: { sdkVersion: "1.0.0" } }); }
_sendReady();
if (_inIframe) {
  _readyInterval = setInterval(function() { if (_bridgeConnected) { clearInterval(_readyInterval); return; } _sendReady(); }, 300);
  setTimeout(function() { if (_readyInterval) clearInterval(_readyInterval); }, 20000);
}
function onEvent(type, fn) { (_handlers[type] = _handlers[type] || []).push(fn); }

function uploadFile(file) {
  var base = _detectApiBase() + (_ctx ? "/api/plugins/" + _ctx.pluginId : "/api/plugins/footage-gate");
  var fd = new FormData(); fd.append("file", file);
  return fetch(base + "/upload", { method: "POST", body: fd }).then(function(r) { return r.json(); });
}

function _tr(key, vars, fallback) {
  if (window.OpenAkitaI18n && window.OpenAkitaI18n.t) {
    var v = window.OpenAkitaI18n.t(key, vars);
    if (v && v !== key) return v;
  }
  if (fallback) {
    if (vars) {
      return String(fallback).replace(/\{(\w+)\}/g, function (_, n) {
        return vars[n] != null ? String(vars[n]) : "{" + n + "}";
      });
    }
    return fallback;
  }
  return key;
}

function showToast(body, type) {
  type = type || "success";
  if (_inIframe && _bridgeConnected) { post({ type: "bridge:notification", payload: { title: "", body: body, type: type } }); return; }
  console.log("[Toast]", type, body);
}
</script>

function useT() {
  const [, force] = useState(0);
  useEffect(() => {
    if (window.OpenAkitaI18n && typeof window.OpenAkitaI18n.onChange === "function") {
      return window.OpenAkitaI18n.onChange(() => force(n => n + 1));

}

function useLocale() {
  const [locale, setLocale] = useState(() => (_i18n.getLocale && _i18n.getLocale()) || "zh");
  useEffect(() => {
    if (window.OpenAkitaI18n && typeof window.OpenAkitaI18n.onChange === "function") {
      return window.OpenAkitaI18n.onChange(() => setLocale(_i18n.getLocale()));

    return undefined;

}

// ─── Constants ──────────────────────────────────────────────────────────

const MODE_IDS = ["source_review", "silence_cut", "auto_color", "cut_qc"];

function modeList(t) {
  return MODE_IDS.map(id => ({ id, name: t("modes." + id), desc: t("modes." + id + ".desc") }));
}

function statusCls(s) {
  switch (s) {
    case "running": return "tag-blue";
    case "done": return "tag-green";
    case "failed": return "tag-red";
    case "cancelled": return "tag-gray";
    default: return "tag-orange";
  }
}

function statusLabel(s, t) {
  return t("status." + s) || s;
}

function fmtMb(bytes) { return Math.round((bytes || 0) / 1048576 * 10) / 10; }

function fmtTime(ts) {
  if (!ts) return "—";
  try {
    const d = new Date(typeof ts === "number" ? ts * 1000 : Date.parse(ts));
    return d.toLocaleString();
  } catch { return String(ts); }
}

function shortId(id) { return (id || "").slice(0, 8); }

// ─── Reusable Switch ────────────────────────────────────────────────────

function Switch({ on, onChange, ariaLabel }) {
  return (
    <div className="switch" role="switch" aria-checked={on} aria-label={ariaLabel}
         onClick={() => onChange && onChange(!on)}
         style={{ background: on ? "var(--primary)" : "var(--border)" }}>
      <div className="switch-knob" style={{ left: on ? 18 : 2 }} />
    </div>
  );
}

// ─── App shell ──────────────────────────────────────────────────────────

function App() {
  const t = useT();
  const [tab, setTab] = useState("create");
  const [tabsMounted, setTabsMounted] = useState({ create: true });
  const [ffmpegSnap, setFfmpegSnap] = useState(null);
  const [tasksRefresh, setTasksRefresh] = useState(0);

  const refreshFfmpeg = useCallback(async () => {
    try {
      const r = await pluginApi("GET", "/system/ffmpeg/status");
      if (r.body && r.body.status) setFfmpegSnap(r.body.status);
    } catch (e) {
      setFfmpegSnap({ found: false });
    }
  }, []);

  useEffect(() => { refreshFfmpeg(); }, [refreshFfmpeg]);

  const goToTab = useCallback((id) => {
    setTab(id);
    if (id === "tasks") setTasksRefresh(s => s + 1);
  }, []);

  useEffect(() => {
    setTabsMounted(prev => ({ ...prev, [tab]: true }));
  }, [tab]);

  const TABS = [
    { id: "create", name: t("tabs.create") },
    { id: "tasks", name: t("tabs.tasks") },
    { id: "guide", name: t("tabs.guide") },
    { id: "settings", name: t("tabs.settings") },
  ];

  const ffmpegOk = !!(ffmpegSnap && ffmpegSnap.found);
  const ffmpegPillCls = ffmpegSnap == null ? "api-pill api-pill--warning"
                       : ffmpegOk ? "api-pill" : "api-pill api-pill--missing";
  const ffmpegPillLabel = ffmpegSnap == null
    ? t("pill.ffmpeg.detecting")
    : ffmpegOk
      ? t("pill.ffmpeg.ok", { ver: ffmpegSnap.version || "" })
      : t("pill.ffmpeg.missing");

  return (
    <div className="app">
      <div className="header">
        <h1>
          <span aria-hidden="true">🎬</span>
          <span>{t("app.title")}</span>
          <span className="text-xs text-dim" style={{marginLeft: 8, fontWeight: 400}}>{t("app.subtitle")}</span>
        </h1>
        <div className="header-right">
          <span className={ffmpegPillCls}>{ffmpegPillLabel}</span>
        </div>
      </div>
      <div className="tabs">
        {TABS.map(item => (
          <div key={item.id} className={"tab " + (tab === item.id ? "active" : "")}
               onClick={() => goToTab(item.id)}>{item.name}</div>
        ))}
      </div>
      {!ffmpegOk && tab !== "settings" && ffmpegSnap != null && (
        <div className="oa-config-banner" role="alert"
             style={{ margin: "12px 18px 0", flexShrink: 0 }}>
          <span style={{ fontSize: 16 }}>⚠️</span>
          <div className="oa-config-banner__text">
            <strong>{t("banner.noFfmpeg.title")}</strong>
            <div style={{ fontSize: 12, color: "var(--text-muted)", marginTop: 2 }}>
              {t("banner.noFfmpeg.desc")}
            </div>
          </div>
          <button className="oa-config-banner__action" type="button"
                  onClick={() => goToTab("settings")}>{t("banner.noFfmpeg.cta")} →</button>
        </div>
      )}
      <div className="content">
        <div style={{ display: tab === "create" ? "block" : "none", height: "100%" }}>
          <CreateTab ffmpegOk={ffmpegOk} goToTasks={() => goToTab("tasks")} />
        </div>
        <div style={{ display: tab === "tasks" ? "block" : "none", height: "100%" }}>
          {tabsMounted.tasks && <TasksTab refreshSignal={tasksRefresh} />}
        </div>
        <div style={{ display: tab === "guide" ? "block" : "none", height: "100%" }}>
          {tabsMounted.guide && <GuideTab />}

// ─── Create Tab ─────────────────────────────────────────────────────────

function CreateTab({ ffmpegOk, goToTasks }) {
  const t = useT();
  const MODES = modeList(t);
  const [mode, setMode] = useState("source_review");
  const [upload, setUpload] = useState(null);  // { input_path, url, size_bytes, kind }
  const [creating, setCreating] = useState(false);
  const [result, setResult] = useState(null);
  const [taskStartedOpen, setTaskStartedOpen] = useState(false);

  // Mode-specific params (initialised once with defaults; persisted across mode switches).
  const [silenceParams, setSilenceParams] = useState({
    threshold_db: -45, min_silence_len: 0.15, min_sound_len: 0.05, pad: 0.05,
  });
  const [colorParams, setColorParams] = useState({ preset: "auto", hdr_tonemap: true });
  const [reviewParams, setReviewParams] = useState({ transcribe: false });
  const [qcParams, setQcParams] = useState({
    auto_remux: false, max_attempts: 3, edl_text: "",
  });
  const [hdrDetected, setHdrDetected] = useState(false);

  // Pre-load default config so mode-param defaults align with Settings.
  useEffect(() => {
    pluginApi("GET", "/settings").then(r => {
      const cfg = (r.body && r.body.config) || {};
      setSilenceParams(p => ({
        threshold_db: parseFloat(cfg.silence_threshold_db) || p.threshold_db,
        min_silence_len: parseFloat(cfg.silence_min_silence_len) || p.min_silence_len,
        min_sound_len: parseFloat(cfg.silence_min_sound_len) || p.min_sound_len,
        pad: parseFloat(cfg.silence_pad) || p.pad,
      }));
      setColorParams(p => ({
        preset: cfg.auto_color_preset || p.preset,
        hdr_tonemap: cfg.auto_color_hdr_tonemap !== "false",
      }));
      setQcParams(p => ({
        ...p,
        auto_remux: cfg.cut_qc_auto_remux_default === "true",
        max_attempts: parseInt(cfg.cut_qc_max_attempts, 10) || p.max_attempts,
      }));
      if (cfg.default_mode && MODE_IDS.includes(cfg.default_mode)) setMode(cfg.default_mode);
    }).catch(() => {});
  }, []);

  const handleUpload = useCallback(async (e) => {
    const file = (e.target.files || [])[0];
    if (!file) return;
    try {
      const r = await uploadFile(file);
      if (r && r.ok) {
        const ext = (file.name.split(".").pop() || "").toLowerCase();
        const kind = ["mp4","mov","webm","mkv"].includes(ext) ? "video"
                   : ["wav","mp3","m4a","flac","ogg"].includes(ext) ? "audio"
                   : ["jpg","jpeg","png","webp","bmp","gif"].includes(ext) ? "image" : "other";
        setUpload({ input_path: r.input_path, url: r.url, size_bytes: r.size_bytes, kind, base64: r.base64, name: file.name });
        setHdrDetected(false);
      } else {
        showToast(t("toast.uploadFailed"), "error");
      }
    } catch (err) {
      showToast(t("toast.uploadFailed") + ": " + err.message, "error");
    }
    if (e.target) e.target.value = "";
  }, [t]);

  const buildParams = useCallback(() => {
    if (mode === "silence_cut") return { ...silenceParams };
    if (mode === "auto_color") return { ...colorParams };
    if (mode === "source_review") return { transcribe: !!reviewParams.transcribe };
    if (mode === "cut_qc") {
      let edl = null;
      try { edl = qcParams.edl_text ? JSON.parse(qcParams.edl_text) : null; }
      catch { edl = "__INVALID__"; }
      return { auto_remux: qcParams.auto_remux, max_attempts: qcParams.max_attempts, edl };
    }
    return {};
  }, [mode, silenceParams, colorParams, reviewParams, qcParams]);

  const handleCreate = async () => {
    if (!upload) {
      showToast(t("create.btn.needFile"), "warning");
      return;
    }
    const params = buildParams();
    if (mode === "cut_qc") {
      if (params.edl === "__INVALID__") {
        showToast(t("toast.invalidEdl"), "error");
        return;
      }
      if (!params.edl) {
        showToast(t("toast.invalidEdl"), "error");
        return;
      }
    }
    setCreating(true);
    setResult(null);
    try {
      const r = await pluginApi("POST", "/tasks", {
        mode, input_path: upload.input_path, params,
      });
      if (r.body && r.body.ok) {
        setResult(r.body.task);
        setTaskStartedOpen(true);
        showToast(t("toast.taskCreated"));
      } else {
        const msg = (r.body && (r.body.detail || r.body.error)) || ("HTTP " + r.status);
        showToast(t("toast.createFailed", { msg }), "error");
      }
    } catch (err) {
      showToast(t("toast.createFailed", { msg: err.message }), "error");
    }
    setCreating(false);
  };

  return (
    <>
      <div className="split-layout">
        <div className="split-left">
          {/* Mode picker — left-rail .mode-btn horizontal row */}
          <div className="card">
            <div className="form-row">
              <div className="label">{t("modes.source_review").replace("源素材审核", "选择模式") /* fallback */}</div>
              <div className="flex gap-2 flex-wrap">
                {MODES.map(m => (
                  <button key={m.id}
                          className={"mode-btn " + (mode === m.id ? "active" : "")}
                          onClick={() => setMode(m.id)}
                          title={m.desc}>{m.name}</button>
                ))}
              </div>
              <div className="text-xs text-dim" style={{ marginTop: 6 }}>
                {MODES.find(m => m.id === mode)?.desc}
              </div>
            </div>

            {/* Input file uploader (every mode needs an input) */}
            <div className="form-row">
              <div className="label">{t("create.input.label")}</div>
              {!upload ? (
                <label className="upload-zone">
                  <div style={{ fontSize: 22, marginBottom: 6 }}>📂</div>
                  <div className="text-sm">{t("create.input.upload")}</div>
                  <input type="file" style={{ display: "none" }}
                         accept="video/*,audio/*,image/*"
                         onChange={handleUpload} />
                </label>
              ) : (
                <div className="upload-zone has-file">
                  <div className="flex items-center justify-between gap-2">
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div className="text-sm" style={{ fontWeight: 500, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{upload.name}</div>
                      <div className="text-xs text-dim">
                        {t("create.input.size", { size: fmtMb(upload.size_bytes), kind: upload.kind })}
                      </div>
                    </div>
                    <label className="btn btn-sm">
                      {t("create.input.replace")}
                      <input type="file" style={{ display: "none" }}
                             accept="video/*,audio/*,image/*"
                             onChange={handleUpload} />
                    </label>
                  </div>
                  {upload.kind === "image" && upload.base64 && (
                    <img src={upload.base64} alt=""
                         style={{ marginTop: 8, maxWidth: "100%", maxHeight: 160, borderRadius: 4, objectFit: "contain" }} />
                  )}
                </div>
              )}
            </div>

            {/* Mode-specific params */}
            {mode === "silence_cut" && (
              <SilenceParamsForm params={silenceParams} onChange={setSilenceParams} />
            )}
            {mode === "auto_color" && (
              <AutoColorParamsForm params={colorParams} onChange={setColorParams}
                                   hdrDetected={hdrDetected} />
            )}
            {mode === "source_review" && (
              <SourceReviewParamsForm params={reviewParams} onChange={setReviewParams} />
            )}
            {mode === "cut_qc" && (
              <CutQcParamsForm params={qcParams} onChange={setQcParams} />
            )}

            <button className="btn btn-primary" style={{ width: "100%", justifyContent: "center" }}
                    disabled={creating || !ffmpegOk}
                    onClick={handleCreate}>
              {creating ? <><span className="spinner-sm" /> {t("create.btn.creating")}</> : t("create.btn.start")}
            </button>
            {!ffmpegOk && (
              <div className="text-xs text-warning" style={{ marginTop: 6, textAlign: "center" }}>
                {t("banner.noFfmpeg.title")}
              </div>
            )}
          </div>
        </div>

        <div className="split-right">
          {result ? <CreatePreview task={result} goToTasks={goToTasks} /> : <CreateEmpty />}
        </div>
      </div>

      {taskStartedOpen && (
        <TaskStartedModal onClose={() => setTaskStartedOpen(false)}
                          onGoToTasks={() => { setTaskStartedOpen(false); goToTasks(); }} />
      )}
    </>
  );
}

// ─── Tasks Tab ──────────────────────────────────────────────────────────

function TasksTab({ refreshSignal }) {
  const t = useT();
  const MODES = modeList(t);
  const [tasks, setTasks] = useState([]);
  const [total, setTotal] = useState(0);
  const [loading, setLoading] = useState(true);
  const [filter, setFilter] = useState("");
  const [modeFilter, setModeFilter] = useState("");
  const [selected, setSelected] = useState(null);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const qs = [];
      if (filter) qs.push("status=" + encodeURIComponent(filter));
      if (modeFilter) qs.push("mode=" + encodeURIComponent(modeFilter));
      qs.push("limit=100");
      const r = await pluginApi("GET", "/tasks?" + qs.join("&"));
      if (r.body && r.body.ok) {
        setTasks(r.body.tasks || []);
        setTotal(r.body.total || 0);
        if (selected) {
          const refreshed = (r.body.tasks || []).find(x => x.id === selected.id);
          if (refreshed) setSelected(refreshed);
        }
      }
    } catch {}
    setLoading(false);
  // intentionally exclude `selected` to avoid refetch loops on selection change
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [filter, modeFilter]);

  useEffect(() => { load(); }, [load]);

  const loadRef = useRef(load);
  useEffect(() => { loadRef.current = load; }, [load]);
  useEffect(() => { if (refreshSignal > 0) loadRef.current(); }, [refreshSignal]);

  // Hard contract #5 from §2.5: onEvent + setInterval fallback.
  useEffect(() => {
    onEvent("plugin:footage-gate:task_update", () => loadRef.current());
    onEvent("plugin:footage-gate:task_progress", () => loadRef.current());
    const iv = setInterval(() => loadRef.current(), 15000);
    return () => clearInterval(iv);
  }, []);

  const handleDelete = async (id) => {
    if (!confirm(t("tasks.detail.confirmDelete"))) return;
    await pluginApi("DELETE", "/tasks/" + id);
    if (selected && selected.id === id) setSelected(null);
    showToast(t("toast.deleteOk"));
    load();
  };

  const handleCancel = async (id) => {
    const r = await pluginApi("POST", "/tasks/" + id + "/cancel");
    if (r.body && r.body.ok) { showToast(t("toast.cancelOk")); load(); }
  };

  const handleRetry = async (id) => {
    const r = await pluginApi("POST", "/tasks/" + id + "/retry");
    if (r.body && r.body.ok) { showToast(t("toast.retryOk")); load(); }
  };

  const handleOpenFolder = async (path) => {
    if (!path) return;
    await pluginApi("POST", "/storage/open-folder", { path });
  };

  return (
    <div className="split-layout">
      <div className="split-left">
        <div className="card">
          <div className="form-row" style={{ marginBottom: 8 }}>
            <div className="text-xs text-dim" style={{ marginBottom: 4 }}>{t("tasks.filter.status")}</div>
            <div className="flex gap-2 flex-wrap">
              {[
                { v: "", l: t("tasks.filter.all") },
                { v: "running", l: t("status.running") },
                { v: "done", l: t("status.done") },
                { v: "failed", l: t("status.failed") },
                { v: "cancelled", l: t("status.cancelled") },
              ].map(f => (
                <button key={f.v} className={"mode-btn " + (filter === f.v ? "active" : "")}
                        onClick={() => setFilter(f.v)}>{f.l}</button>
              ))}
            </div>
          </div>
          <div>
            <div className="text-xs text-dim" style={{ marginBottom: 4 }}>{t("tasks.filter.mode")}</div>
            <div className="flex gap-2 flex-wrap">
              <button className={"mode-btn " + (modeFilter === "" ? "active" : "")}
                      onClick={() => setModeFilter("")}>{t("tasks.filter.allModes")}</button>
              {MODES.map(m => (
                <button key={m.id} className={"mode-btn " + (modeFilter === m.id ? "active" : "")}
                        onClick={() => setModeFilter(m.id)}>{m.name}</button>
              ))}
            </div>
          </div>
        </div>
        <div>
          {loading && tasks.length === 0 ? (
            <div className="empty-state"><div className="spinner" /></div>
          ) : tasks.length === 0 ? (
            <div className="empty-state" style={{ padding: 30 }}>
              <div style={{ fontSize: 22, opacity: .4 }}>📂</div>
              <div className="text-sm" style={{ fontWeight: 500 }}>{t("tasks.empty.title")}</div>
              <div className="text-xs text-dim">{t("tasks.empty.hint")}</div>
            </div>
          ) : (
            tasks.map(tk => (
              <div key={tk.id} className={"task-card " + (selected?.id === tk.id ? "selected" : "")}
                   onClick={() => setSelected(tk)}>
                <div className="task-thumb">
                  {tk.status === "running" ? <div className="spinner-sm" />
                   : tk.thumbs && tk.thumbs.length ? (
                     <img src={"/api/plugins/footage-gate/uploads/" + (tk.thumbs[0] || "").replace(/\\/g, "/")} alt="" />
                   ) : <span className="text-dim text-xs">—</span>}
                </div>
                <div className="task-info">
                  <h4>{shortId(tk.id)} · {t("modes." + tk.mode)}</h4>
                  <div className="task-meta">
                    <span className={"tag " + statusCls(tk.status)}>{statusLabel(tk.status, t)}</span>
                    {tk.is_hdr_source ? <span className="tag tag-orange">HDR</span> : null}
                    {tk.qc_attempts ? <span className="tag tag-blue">remux ×{tk.qc_attempts}</span> : null}
                    {tk.qc_issues_count ? <span className="tag tag-red">{tk.qc_issues_count} issues</span> : null}
                    <span>{fmtTime(tk.created_at)}</span>
                  </div>
                </div>
              </div>
            ))
          )}
          <div className="text-xs text-dim" style={{ padding: "8px 4px", textAlign: "center" }}>
            {t("tasks.totalCount", { n: total })}
          </div>
        </div>

function PermissionsPanel({ status, onChanged }) {
  const t = useT();
  const [granting, setGranting] = useState(false);

  if (!status) {
    return (
      <div className="sysdep-card">
        <div className="sysdep-card__head">
          <span className="spinner-sm" />
          <span className="sysdep-card__title" style={{ marginLeft: 8 }}>{t("settings.system.detecting")}</span>
        </div>
      </div>
    );
  }

  const missing = status.missing || [];
  const checks = status.checks || [];
  const allOk = missing.length === 0;

  const grantAll = async () => {
    if (!missing.length) return;
    setGranting(true);
    try {
      const r = await pluginApi("POST", "/_admin/permissions/grant", { permissions: missing, reload: true });
      const body = r.body || {};
      if (body.ok) {

      } else {
        showToast(t("settings.perms.grantFailed", { msg: body.error || "unknown" }), "error");

    } catch (e) {
      showToast(t("settings.perms.grantFailed", { msg: e.message || "network" }), "error");
    }
    setGranting(false);
  };

  return (
    <div className="sysdep-card">
      <div className="sysdep-card__head">
        <div className="sysdep-card__title">
          🔐 {t("settings.section.permissions")}
          {allOk ? <span className="sysdep-card__badge sysdep-card__badge--ok" style={{ marginLeft: 8 }}>✓ {t("settings.perms.allOk")}</span>
                 : <span className="sysdep-card__badge sysdep-card__badge--missing" style={{ marginLeft: 8 }}>⚠ {missing.length}</span>}
        </div>
      </div>
      {!allOk && checks.length > 0 && (
        <div className="sysdep-card__sudo-hint">
          <strong>{t("settings.perms.intro.strong")}</strong>
          <div style={{ marginTop: 4 }}>{t("settings.perms.intro.body")}</div>
        </div>
      )}
      {checks.length > 0 && (
        <table className="perms-table">
          <thead>
            <tr>
              <th>{t("settings.perms.col.permission")}</th>
              <th>{t("settings.perms.col.feature")}</th>
              <th style={{ width: 90 }}>{t("settings.perms.col.status")}</th>
            </tr>
          </thead>
          <tbody>
            {checks.map(c => (
              <tr key={c.permission}>
                <td><code>{c.permission}</code></td>
                <td>{c.feature}</td>
                <td>{c.granted ? <span className="tag tag-green">✓ {t("settings.perms.status.ok")}</span>
                              : <span className="tag tag-red">⚠ {t("settings.perms.status.missing")}</span>}</td>
              </tr>
            ))}
          </tbody>
        </table>
      )}
      {!allOk && (
        <div className="sysdep-card__actions">
          <button className="btn btn-sm btn-primary" onClick={grantAll} disabled={granting}>
            {granting ? <><span className="spinner-sm" /> {t("settings.perms.granting")}</> : t("settings.perms.btn.grantAll")}
          </button>
        </div>
      )}
    </div>
  );
}

// ─── FFmpeg Installer (1:1 with seedance pattern) ───────────────────────

function FfmpegInstaller({ onInstalled, onUninstalled }) {
  const t = useT();
  const [snap, setSnap] = useState(null);
  const [loading, setLoading] = useState(true);
  const [busyOp, setBusyOp] = useState("");
  const [status, setStatus] = useState(null);
  const [copied, setCopied] = useState(false);
  const [confirmingUninstall, setConfirmingUninstall] = useState(false);
  const [rechecking, setRechecking] = useState(false);
  const pollRef = useRef(null);
  const logRef = useRef(null);
  const opNotifiedRef = useRef(false);

  const refresh = useCallback(async () => {
    try {
      const r = await pluginApi("GET", "/system/components");
      const item = (r.body?.items || []).find(x => x.id === "ffmpeg");
      if (item) {
        setSnap(item);
        if (item.busy) setBusyOp(item.last_install?.op_kind || "install");
      }
    } catch {
      setSnap({ id: "ffmpeg", found: false, methods: [], uninstall_methods: [], is_root: false });
    }
    setLoading(false);
  }, []);

  useEffect(() => { refresh(); }, [refresh]);

  useEffect(() => {
    if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight;
  }, [status?.log_tail?.length]);

  const stopPolling = useCallback(() => {
    if (pollRef.current) { clearInterval(pollRef.current); pollRef.current = null; }
  }, []);

  useEffect(() => {
    if (!busyOp) { stopPolling(); return; }
    opNotifiedRef.current = false;
    const tick = async () => {
      try {
        const r = await pluginApi("GET", "/system/ffmpeg/status");
        const st = (r.body && r.body.status) || r.body || {};
        setStatus(st);
        // The status payload from /system/ffmpeg/status doesn't include `busy`
        // (that's on /system/components). After 6 ticks (~18s) without
        // server-side busy, assume the op is finished and re-probe.
        const busy = st.busy === true;
        if (!busy) {
          // re-probe via /system/components to check terminal state
          const r2 = await pluginApi("GET", "/system/components");
          const item2 = (r2.body?.items || []).find(x => x.id === "ffmpeg");
          if (!item2 || !item2.busy) {
            stopPolling();
            const finishedOp = busyOp;
            setBusyOp("");
            await refresh();
            if (opNotifiedRef.current) return;
            opNotifiedRef.current = true;
            const found = !!(item2 && item2.found);
            if (finishedOp === "uninstall") {
              if (!found) { showToast(t("settings.system.uninstalled")); if (onUninstalled) onUninstalled(); }
              else showToast(t("settings.system.uninstallFailed", { msg: item2?.last_install?.install_error || "still installed" }), "error");
            } else {
              if (found) { showToast(t("settings.system.installed")); if (onInstalled) onInstalled(); }
              else showToast(t("settings.system.installFailed", { msg: item2?.last_install?.install_error || "not detected" }), "error");
            }
          }
        }
      } catch {}
    };
    tick();
    pollRef.current = setInterval(tick, 3000);
    return stopPolling;
  }, [busyOp, refresh, stopPolling, onInstalled, onUninstalled, t]);

  useEffect(() => () => stopPolling(), [stopPolling]);

  const formatElapsed = (sec) => {
    const s = Math.max(0, Math.round(sec || 0));
    const mm = String(Math.floor(s / 60)).padStart(2, "0");
    const ss = String(s % 60).padStart(2, "0");
    return mm + ":" + ss;
  };

  const startInstall = async (methodIndex) => {
    setStatus({ busy: true, log_tail: [], elapsed_sec: 0, op_kind: "install" });
    setBusyOp("install");
    try {
      const r = await pluginApi("POST", "/system/ffmpeg/install", { method_index: methodIndex });
      const body = r.body || {};
      if (body.ok === false) {
        setBusyOp("");
        showToast(t("settings.system.installFailed", { msg: body.error || "unknown" }), "error");
      }
    } catch (e) {
      setBusyOp("");
      showToast(t("settings.system.installFailed", { msg: e.message || "network" }), "error");
    }
  };

  const startUninstall = async (methodIndex) => {
    setConfirmingUninstall(false);
    setStatus({ busy: true, log_tail: [], elapsed_sec: 0, op_kind: "uninstall" });
    setBusyOp("uninstall");
    try {
      const r = await pluginApi("POST", "/system/ffmpeg/uninstall", { method_index: methodIndex });
      const body = r.body || {};
      if (body.ok === false) {
        setBusyOp("");
        showToast(t("settings.system.uninstallFailed", { msg: body.error || "unknown" }), "error");
      }
    } catch (e) {
      setBusyOp("");
      showToast(t("settings.system.uninstallFailed", { msg: e.message || "network" }), "error");
    }
  };

  const handleRecheck = async () => {
    if (rechecking || busyOp) return;
    setRechecking(true);
    const t0 = Date.now();
    try { await refresh(); }
    finally {
      const elapsed = Date.now() - t0;
      const minDelay = 400;
      if (elapsed < minDelay) await new Promise(r => setTimeout(r, minDelay - elapsed));
      setRechecking(false);
    }
  };

  const copyCmd = (cmd) => {
    if (!cmd) return;
    copyToClipboard(cmd);
    setCopied(true);
    setTimeout(() => setCopied(false), 1500);
  };

  if (loading) {
    return (
      <div className="sysdep-card">
        <div className="sysdep-card__head">
          <span className="spinner-sm" />
          <span className="sysdep-card__title" style={{ marginLeft: 8 }}>{t("settings.system.detecting")}</span>
        </div>
      </div>
    );
  }

  const found = !!snap?.found;
  const methods = snap?.methods || [];
  const uninstallMethods = snap?.uninstall_methods || [];
  const isRoot = !!snap?.is_root;
  const installing = busyOp === "install";
  const uninstalling = busyOp === "uninstall";
  const busy = !!busyOp;
  const liveStatus = busy ? status : (snap?.last_install || null);
  const logLines = liveStatus?.log_tail || [];
  const lastOpKind = liveStatus?.op_kind || "install";

  const primaryIdx = (() => {
    for (let i = 0; i < methods.length; i++) {
      const m = methods[i];
      if (m.strategy === "manual") continue;
      if (m.requires_sudo && !isRoot) continue;
      return i;
    }
    return methods.findIndex(m => m.strategy !== "manual");
  })();
  const primary = primaryIdx >= 0 ? methods[primaryIdx] : null;
  const manualMethod = methods.find(m => m.strategy === "manual");
  const blockingSudoMethod = (!found && primary == null)
    ? methods.find(m => m.requires_sudo && !isRoot)
    : null;

  const uninstallPrimaryIdx = (() => {
    for (let i = 0; i < uninstallMethods.length; i++) {
      const m = uninstallMethods[i];
      if (m.strategy === "manual") continue;
      if (m.requires_sudo && !isRoot) continue;
      return i;
    }
    return -1;
  })();
  const uninstallPrimary = uninstallPrimaryIdx >= 0 ? uninstallMethods[uninstallPrimaryIdx] : null;

  return (
    <div className="sysdep-card">
      <div className="sysdep-card__head">
        <div className="sysdep-card__title">
          📦 FFmpeg
          <span style={{ marginLeft: 8 }}>
            {uninstalling ? <span className="sysdep-card__badge sysdep-card__badge--busy"><span className="spinner-sm" /> {t("settings.system.uninstalling", { elapsed: formatElapsed(liveStatus?.elapsed_sec) })}</span>
             : installing ? <span className="sysdep-card__badge sysdep-card__badge--busy"><span className="spinner-sm" /> {t("settings.system.installing", { elapsed: formatElapsed(liveStatus?.elapsed_sec) })}</span>
             : found ? <span className="sysdep-card__badge sysdep-card__badge--ok">✓ {snap.version ? t("settings.system.status.ok", { ver: snap.version }) : t("settings.system.status.foundNoVer")}</span>
             : <span className="sysdep-card__badge sysdep-card__badge--missing">⚠ {t("settings.system.status.missing")}</span>}
          </span>
        </div>
      </div>
      {found && snap.location && (
        <div className="sysdep-card__path">{t("settings.system.location", { path: snap.location })}</div>
      )}

      <div className="sysdep-card__actions">
        {!busy && !found && primary && (
          <button className="btn btn-sm btn-primary"
                  onClick={() => startInstall(primaryIdx)}
                  title={primary.command_hint || primary.strategy}>
            📦 {t("settings.system.btn.install")} ({primary.strategy})
          </button>
        )}
        {!busy && found && uninstallPrimary && !confirmingUninstall && (
          <button className="btn btn-sm btn-danger"
                  onClick={() => setConfirmingUninstall(true)}
                  title={uninstallPrimary.command_hint || uninstallPrimary.strategy}>
            🗑 {t("settings.system.btn.uninstall")}
          </button>
        )}
        {!busy && (
          <button className="btn btn-sm" onClick={handleRecheck} disabled={rechecking}>
            {rechecking ? <><span className="spinner-sm" /> {t("settings.system.detecting")}</> : <>🔄 {t("settings.system.btn.recheck")}</>}
          </button>
        )}
        {snap?.homepage && (
          <a className="btn btn-sm" href={snap.homepage} target="_blank" rel="noopener noreferrer">🔗 {t("settings.system.btn.openHome")}</a>
        )}
      </div>

      {!busy && found && confirmingUninstall && uninstallPrimary && (
        <div className="sysdep-card__sudo-hint" style={{ borderLeftColor: "var(--danger)", background: "rgba(239,68,68,.06)" }}>
          <div style={{ whiteSpace: "pre-wrap", fontSize: 12, lineHeight: 1.6 }}>{t("settings.system.uninstallConfirm")}</div>
          <div className="sysdep-card__sudo-cmd"><code>{uninstallPrimary.command_hint || uninstallPrimary.strategy}</code></div>
          <div style={{ display: "flex", gap: 6, marginTop: 10, justifyContent: "flex-end" }}>
            <button className="btn btn-sm" onClick={() => setConfirmingUninstall(false)}>{t("settings.system.btn.cancel")}</button>
            <button className="btn btn-sm btn-danger" onClick={() => startUninstall(uninstallPrimaryIdx)}>{t("settings.system.btn.uninstallConfirmBtn")}</button>
          </div>
        </div>
      )}

      {!found && !busy && !primary && manualMethod && !blockingSudoMethod && (
        <div className="sysdep-card__sudo-hint" style={{ borderLeftColor: "var(--primary)" }}>
          {t("settings.system.noMethod")}
        </div>
      )}

      {!found && !busy && blockingSudoMethod && blockingSudoMethod.command_hint && (
        <div className="sysdep-card__sudo-hint">
          <div>{t("settings.system.requiresSudo")}</div>
          <div className="sysdep-card__sudo-cmd">
            <code>sudo {blockingSudoMethod.command_hint}</code>
            <button className="btn btn-sm" onClick={() => copyCmd("sudo " + blockingSudoMethod.command_hint)}>
              {copied ? t("settings.system.btn.copied") : t("settings.system.btn.copyCmd")}
            </button>
          </div>
        </div>
      )}

      {(busy || logLines.length > 0) && (
        <div className="sysdep-log">
          <div className="sysdep-log__head">
            <span>{lastOpKind === "uninstall" ? t("settings.system.logTitleUninstall") : t("settings.system.logTitle")}</span>
            {busy && liveStatus?.elapsed_sec != null && <span>{formatElapsed(liveStatus.elapsed_sec)}</span>}
          </div>
          {logLines.length === 0
            ? <pre className="sysdep-log__body sysdep-log__body--empty">{t("settings.system.logEmpty")}</pre>
            : <pre className="sysdep-log__body" ref={logRef}>{logLines.join("\n")}</pre>}
        </div>
      )}
    </div>
  );
}

// ─── Storage Panel ──────────────────────────────────────────────────────

function StoragePanel({ stats, onRefresh, t }) {
  const [cleaning, setCleaning] = useState("");

  const cleanup = async (dirType) => {
    if (!confirm(t("settings.storage.confirmCleanup", { dir: dirType }))) return;
    setCleaning(dirType);
    try {
      const r = await pluginApi("POST", "/storage/cleanup", { dir_type: dirType });
      if (r.body && r.body.ok) {
        showToast(t("toast.cleanupOk", { n: r.body.removed || 0 }));
        onRefresh();
      }
    } catch {}
    setCleaning("");
  };

  const openFolder = async (key) => {
    await pluginApi("POST", "/storage/open-folder", { key });
  };

  if (!stats) {
    return <div className="text-xs text-dim"><span className="spinner-sm" /> {t("settings.system.detecting")}</div>;
  }

  return (
    <div className="stats-grid">
      {Object.entries(stats).map(([key, info]) => (
        <div key={key} className="stats-cell">
          <h5>{key}</h5>
          <div className="stats-value">{t("settings.storage.size", { size: info.size_mb || 0 })}</div>
          <div className="text-xs text-dim">{t("settings.storage.files", { count: info.file_count || 0 })}</div>
          <div className="stats-path">{info.path}</div>
          <div className="flex gap-2" style={{ marginTop: 6 }}>
            <button className="btn btn-sm" onClick={() => openFolder(key)}>{t("settings.storage.open")}</button>
            {(key === "uploads" || key === "tasks") && (
              <button className="btn btn-sm btn-danger" onClick={() => cleanup(key)} disabled={cleaning === key}>
                {cleaning === key ? <span className="spinner-sm" /> : t("settings.storage.cleanup")}
              </button>
            )}
          </div>
        </div>
      ))}
    </div>
  );
}

// ─── Error Boundary (hard contract #6 from §2.5) ────────────────────────

class PluginErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null, info: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  componentDidCatch(error, info) {
    this.setState({ info });
    console.error("[footage-gate] render error:", error, info);
  }
  render() {
    if (!this.state.error) return this.props.children;
    const err = this.state.error;
    const stack = (err && err.stack) || String(err);
    const compStack = (this.state.info && this.state.info.componentStack) || "";
    const tr = (k) => _i18n.t(k);
    return (
      <div style={{ padding: 24, maxWidth: 820, margin: "0 auto" }}>
        <div className="oa-config-banner" role="alert" style={{ borderColor: "var(--danger)", background: "rgba(239,68,68,.08)" }}>
          <span style={{ fontSize: 18 }}>⚠️</span>
          <div className="oa-config-banner__text">
            <strong>{tr("err.title")}</strong>
            <div style={{ fontSize: 12, color: "var(--text-muted)", marginTop: 4 }}>{err && err.message ? err.message : String(err)}</div>
          </div>
          <button className="oa-config-banner__action" type="button" onClick={() => this.setState({ error: null, info: null })}>
            {tr("err.retry")}
          </button>
        </div>
        <details style={{ marginTop: 16, fontSize: 12, color: "var(--text-muted)" }} open>
          <summary style={{ cursor: "pointer", marginBottom: 8 }}>{tr("err.stackLabel")}</summary>
          <pre style={{ padding: 12, background: "var(--bg-card)", border: "1px solid var(--border)", borderRadius: 6, overflow: "auto", maxHeight: 240, whiteSpace: "pre-wrap", wordBreak: "break-word" }}>
{stack}
{compStack ? "\n--- React component stack ---" + compStack : ""}
          </pre>
        </details>
      </div>
    );
  }
}

// ─── Mount ──────────────────────────────────────────────────────────────

ReactDOM.createRoot(document.getElementById("root")).render(
  <PluginErrorBoundary>
    <App />
  </PluginErrorBoundary>
);

if (window.OpenAkita && typeof window.OpenAkita.ready === "function") {
  window.OpenAkita.ready();
}
</script>

// ─── In-plugin folder picker (mirror seedance-video) ───
// Native Tauri folder dialogs have been unreliable across capability/version
// combos, so we serve our own browser-style picker backed by
// /storage/list-dir + /storage/mkdir. This requires zero host or Tauri
// cooperation and works in plain web mode too.
function FolderPickerModal({ open, title, initialPath, onCancel, onSelect }) {
  const t = useT();
  const [path, setPath] = useState("");
  const [items, setItems] = useState([]);
  const [parent, setParent] = useState(null);
  const [isAnchor, setIsAnchor] = useState(true);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [newFolderMode, setNewFolderMode] = useState(false);
  const [newFolderName, setNewFolderName] = useState("");
  const newFolderInputRef = useRef(null);

  const load = useCallback(async (p) => {
    setLoading(true);
    setError(null);
    try {
      const qs = p ? `?path=${encodeURIComponent(p)}` : "";
      const r = await pluginApi("GET", `/storage/list-dir${qs}`);
      if (r.ok && r.body && r.body.ok) {
        setPath(r.body.path || "");
        setParent(r.body.parent || null);
        setItems(r.body.items || []);
        setIsAnchor(!!r.body.is_anchor);
      } else {
        setError((r.body && r.body.detail) || `HTTP ${r.status || "?"}`);
        if (p) {
          const r2 = await pluginApi("GET", `/storage/list-dir`);
          if (r2.ok && r2.body && r2.body.ok) {
            setPath("");
            setParent(null);
            setItems(r2.body.items || []);
            setIsAnchor(true);
          }
        }
      }
    } catch (e) {
      setError(String(e && e.message || e));
    }
    setLoading(false);
  }, []);

  useEffect(() => {
    if (!open) return;
    setNewFolderMode(false);
    setNewFolderName("");
    load(initialPath || "");
  }, [open, initialPath, load]);

  useEffect(() => {
    if (newFolderMode && newFolderInputRef.current) {
      newFolderInputRef.current.focus();
    }
  }, [newFolderMode]);

  const handleNavigate = (p) => {
    setNewFolderMode(false);
    load(p);
  };

  const handleCreate = async () => {
    const name = (newFolderName || "").trim();
    if (!name || !path) return;
    try {
      const r = await pluginApi("POST", "/storage/mkdir", { parent: path, name });
      if (r.ok && r.body && r.body.ok) {
        showToast(_tr("picker.created", { name }));
        setNewFolderMode(false);
        setNewFolderName("");
        await load(path);
      } else {
        showToast(_tr("picker.error.create", { msg: (r.body && r.body.detail) || "" }), "error");
      }
    } catch (e) {
      showToast(_tr("picker.error.create", { msg: String(e && e.message || e) }), "error");
    }
  };

  // Build breadcrumb segments (Windows + Unix). Each is clickable.
  const crumbs = (() => {
    if (!path) return [];
    const norm = path.replace(/\\/g, "/");
    const parts = norm.split("/").filter(Boolean);
    const out = [];
    if (norm.startsWith("/")) {
      out.push({ name: "/", path: "/" });
      let acc = "";
      for (const seg of parts) {
        acc += "/" + seg;
        out.push({ name: seg, path: acc });
      }
    } else if (parts[0] && /^[A-Za-z]:$/.test(parts[0])) {
      out.push({ name: parts[0], path: parts[0] + "/" });
      let acc = parts[0];
      for (let i = 1; i < parts.length; i++) {
        acc += "/" + parts[i];
        out.push({ name: parts[i], path: acc });
      }
    } else {
      out.push({ name: path, path });
    }
    return out;
  })();

  if (!open) return null;
  return (
    <div className="modal-mask" onClick={onCancel}>
      <div className="modal-card folder-picker" onClick={e => e.stopPropagation()}>
        <div className="folder-picker__head">
          <div className="folder-picker__title">{title || t("picker.title")}</div>
          <div className="folder-picker__crumbs">
            <span className="folder-picker__crumb" onClick={() => handleNavigate("")}
                  title={t("picker.crumb.root")}><Ico name="folderOpen"/></span>
            {crumbs.map((c, i) => (
              <React.Fragment key={i}>
                <span className="folder-picker__crumb-sep">/</span>
                <span className="folder-picker__crumb" onClick={() => handleNavigate(c.path)}
                      title={c.path}>{c.name}</span>
              </React.Fragment>
            ))}
          </div>
        </div>

        {error && (
          <div className="folder-picker__error">{_tr("picker.error.load", { msg: error })}</div>
        )}

        <div className="folder-picker__body">
          <div className="folder-picker__sidebar">
            <div className="folder-picker__shortcut" onClick={() => handleNavigate("")}>
              <Ico name="folder"/>{t("picker.shortcut.start")}
            </div>
          </div>
          <div className="folder-picker__list">
            {loading && <div className="folder-picker__empty">{t("picker.loading")}</div>}
            {!loading && !isAnchor && parent != null && (
              <div className="folder-picker__item" onClick={() => handleNavigate(parent)}>
                <span className="folder-picker__item-icon">↰</span>
                <span className="folder-picker__item-name">..</span>
              </div>
            )}
            {!loading && items.length === 0 && (
              <div className="folder-picker__empty">{t("picker.empty")}</div>
            )}
            {!loading && items.map((it) => (
              <div key={it.path} className="folder-picker__item"
                   onClick={() => handleNavigate(it.path)} title={it.path}>
                <span className="folder-picker__item-icon"><Ico name="folder"/></span>
                <span className="folder-picker__item-name">{it.name}</span>
              </div>
            ))}
          </div>
        </div>

        <div className="folder-picker__foot">
          {newFolderMode ? (
            <>
              <input ref={newFolderInputRef} className="folder-picker__newinput"
                     value={newFolderName} onChange={e => setNewFolderName(e.target.value)}
                     onKeyDown={e => {
                       if (e.key === "Enter") handleCreate();
                       if (e.key === "Escape") { setNewFolderMode(false); setNewFolderName(""); }
                     }}
                     placeholder={t("picker.newFolder.placeholder")} />
              <button className="btn btn-sm" onClick={() => { setNewFolderMode(false); setNewFolderName(""); }}>{t("picker.btn.cancel")}</button>
              <button className="btn btn-sm btn-primary" disabled={!newFolderName.trim()} onClick={handleCreate}>{t("picker.btn.confirmCreate")}</button>
            </>
          ) : (
            <>
              <span className="folder-picker__current" title={path}>{path || ""}</span>
              <button className="btn btn-sm" disabled={!path || isAnchor}
                      onClick={() => setNewFolderMode(true)}>{t("picker.btn.newFolder")}</button>
              <button className="btn btn-sm" onClick={onCancel}>{t("picker.btn.cancel")}</button>
              <button className="btn btn-sm btn-primary" disabled={!path || isAnchor}
                      onClick={() => onSelect(path)}>{t("picker.btn.choose")}</button>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── Permissions panel (mirror seedance-video) ───
// Drives the in-app "Grant" banner so first-time users are not silently
// broken by an un-granted manifest permission.
function PermissionsPanel({ status, onChanged }) {
  const t = useT();
  const [granting, setGranting] = useState(false);

  if (!status) {
    return (
      <div className="sysdep-card">
        <div className="sysdep-card__head">
          <span className="sysdep-spinner"/>
          <span className="sysdep-card__title">{t("settings.system.detecting")}</span>
        </div>
      </div>
    );
  }

  const missing = status.missing || [];
  const checks = status.checks || [];
  const allOk = missing.length === 0;

  const grantAll = async () => {
    if (!missing.length) return;
    setGranting(true);
    try {
      const r = await pluginApi("POST", "/_admin/permissions/grant", {
        permissions: missing,
        reload: true,
      });
      const body = r.body || {};
      if (body.ok) {
        showToast(_tr("settings.perms.granted"));
        if (onChanged) await onChanged();
      } else {
        showToast(_tr("settings.perms.grantFailed", { msg: body.error || "unknown" }), "error");
      }
    } catch (e) {
      showToast(_tr("settings.perms.grantFailed", { msg: e.message || "network error" }), "error");
    }
    setGranting(false);
  };

  return (
    <div className="sysdep-card">
      <div className="sysdep-card__head">
        <div className="sysdep-card__title">
          <Ico name="key"/> {t("settings.section.permissions")}
          {allOk
            ? <span className="sysdep-card__badge sysdep-card__badge--ok">
                <Ico name="check"/> {t("settings.perms.allOk")}
              </span>
            : <span className="sysdep-card__badge sysdep-card__badge--missing">
                <Ico name="warn"/> {missing.length}
              </span>}
        </div>
      </div>
      {!allOk && (
        <div className="deps-help" style={{marginTop:10, marginBottom:0}}>
          <strong>{t("settings.perms.intro.strong")}</strong>
          <div style={{marginTop:4}}>{t("settings.perms.intro.body")}</div>
        </div>
      )}
      <table className="perms-table">
        <thead>
          <tr>
            <th>{t("settings.perms.col.permission")}</th>
            <th>{t("settings.perms.col.feature")}</th>
            <th style={{width:90}}>{t("settings.perms.col.status")}</th>
          </tr>
        </thead>
        <tbody>
          {checks.map(c => (
            <tr key={c.permission}>
              <td><code>{c.permission}</code></td>
              <td>{c.feature}</td>
              <td>
                {c.granted
                  ? <span className="perms-tag perms-tag--ok"><Ico name="check"/> {t("settings.perms.status.ok")}</span>
                  : <span className="perms-tag perms-tag--missing"><Ico name="warn"/> {t("settings.perms.status.missing")}</span>}
              </td>
            </tr>
          ))}
        </tbody>
      </table>
      {!allOk && (
        <div className="sysdep-card__actions">
          <button className="btn btn-sm btn-primary" onClick={grantAll} disabled={granting}>
            {granting
              ? <><span className="sysdep-spinner"/> {t("settings.perms.granting")}</>
              : <><Ico name="check"/> {t("settings.perms.btn.grantAll")}</>}
          </button>
        </div>
      )}
    </div>
  );
}

// ─── FFmpeg installer card (mirror seedance-video) ───
// Fire-and-poll one-click install/uninstall via winget/brew/apt with a
// tail-50 log panel. Replaces the dumb path-input field clip-sense had
// in v1.0.0 — we keep that as a fallback inside SettingsTab.
function FfmpegInstaller({ onInstalled, onUninstalled }) {
  const t = useT();
  const [snap, setSnap] = useState(null);
  const [loading, setLoading] = useState(true);
  const [busyOp, setBusyOp] = useState("");
  const [status, setStatus] = useState(null);
  const [copied, setCopied] = useState(false);
  const [confirmingUninstall, setConfirmingUninstall] = useState(false);
  const [rechecking, setRechecking] = useState(false);
  const pollRef = useRef(null);
  const logRef = useRef(null);
  const opNotifiedRef = useRef(false);

  const refresh = useCallback(async () => {
    try {
      const r = await pluginApi("GET", "/system/components");
      const item = ((r.body && r.body.items) || []).find(x => x.id === "ffmpeg");
      if (item) {
        setSnap(item);
        if (item.busy) {
          setBusyOp((item.last_install && item.last_install.op_kind) || "install");
        }
      }
    } catch (e) {
      setSnap({ id: "ffmpeg", found: false, methods: [], uninstall_methods: [], is_root: false });
    }
    setLoading(false);
  }, []);

  useEffect(() => { refresh(); }, [refresh]);

  useEffect(() => {
    if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight;
  }, [status && status.log_tail && status.log_tail.length]);

  const stopPolling = useCallback(() => {
    if (pollRef.current) { clearInterval(pollRef.current); pollRef.current = null; }
  }, []);

  useEffect(() => {
    if (!busyOp) { stopPolling(); return; }
    opNotifiedRef.current = false;
    const tick = async () => {
      try {
        const r = await pluginApi("GET", "/system/ffmpeg/status");
        const st = r.body || {};
        setStatus(st);
        if (!st.busy) {
          stopPolling();
          const finishedOp = busyOp;
          setBusyOp("");
          await refresh();
          if (opNotifiedRef.current) return;
          opNotifiedRef.current = true;
          if (finishedOp === "uninstall") {
            if (!st.found) {
              showToast(_tr("settings.system.uninstalled"));
              if (onUninstalled) onUninstalled();
            } else {
              const msg = st.error || _tr("settings.system.status.found", { ver: st.version || "?" });
              showToast(_tr("settings.system.uninstallFailed", { msg }), "error");
            }
          } else {
            if (st.found) {
              showToast(_tr("settings.system.installed"));
              if (onInstalled) onInstalled(true);
            } else {
              const msg = st.error || _tr("settings.system.status.missing");
              showToast(_tr("settings.system.installFailed", { msg }), "error");
            }
          }
        }
      } catch (e) {}
    };
    tick();
    pollRef.current = setInterval(tick, 3000);
    return stopPolling;
  }, [busyOp, refresh, stopPolling, onInstalled, onUninstalled]);

  useEffect(() => () => stopPolling(), [stopPolling]);

  const formatElapsed = (sec) => {
    const s = Math.max(0, Math.round(sec || 0));
    const mm = String(Math.floor(s / 60)).padStart(2, "0");
    const ss = String(s % 60).padStart(2, "0");
    return mm + ":" + ss;
  };

  const startInstall = async (methodIndex) => {
    setStatus({ busy: true, log_tail: [], elapsed_sec: 0, op_kind: "install" });
    setBusyOp("install");
    try {
      const r = await pluginApi("POST", "/system/ffmpeg/install", { method_index: methodIndex });
      const body = r.body || {};
      if (body.ok === false) {
        setBusyOp("");
        showToast(_tr("settings.system.installFailed", { msg: body.error || "unknown" }), "error");
      }
    } catch (e) {
      setBusyOp("");
      showToast(_tr("settings.system.installFailed", { msg: e.message || "network error" }), "error");
    }
  };

  const startUninstall = async (methodIndex) => {
    setConfirmingUninstall(false);
    setStatus({ busy: true, log_tail: [], elapsed_sec: 0, op_kind: "uninstall" });
    setBusyOp("uninstall");
    try {
      const r = await pluginApi("POST", "/system/ffmpeg/uninstall", { method_index: methodIndex });
      const body = r.body || {};
      if (body.ok === false) {
        setBusyOp("");
        showToast(_tr("settings.system.uninstallFailed", { msg: body.error || "unknown" }), "error");
      }
    } catch (e) {
      setBusyOp("");
      showToast(_tr("settings.system.uninstallFailed", { msg: e.message || "network error" }), "error");
    }
  };

  const handleRecheck = async () => {
    if (rechecking || busyOp) return;
    setRechecking(true);
    const t0 = Date.now();
    try { await refresh(); }
    finally {
      const elapsed = Date.now() - t0;
      const minDelay = 400;
      if (elapsed < minDelay) await new Promise(r => setTimeout(r, minDelay - elapsed));
      setRechecking(false);
    }
  };

  const copyCmd = (cmd) => {
    if (!cmd) return;
    copyToClipboard(cmd);
    setCopied(true);
    setTimeout(() => setCopied(false), 1500);
  };

  if (loading) {
    return (
      <div className="sysdep-card">
        <div className="sysdep-card__head">
          <span className="sysdep-spinner"/>
          <span className="sysdep-card__title">{t("settings.system.detecting")}</span>
        </div>
      </div>
    );
  }

  const found = !!(snap && snap.found);
  const methods = (snap && snap.methods) || [];
  const uninstallMethods = (snap && snap.uninstall_methods) || [];
  const isRoot = !!(snap && snap.is_root);
  const installing = busyOp === "install";
  const uninstalling = busyOp === "uninstall";
  const busy = !!busyOp;
  const liveStatus = busy ? status : ((snap && snap.last_install) || null);
  const logLines = (liveStatus && liveStatus.log_tail) || [];
  const lastOpKind = (liveStatus && liveStatus.op_kind) || "install";

  const primaryIdx = (() => {
    for (let i = 0; i < methods.length; i++) {
      const m = methods[i];
      if (m.strategy === "manual") continue;
      if (m.requires_sudo && !isRoot) continue;
      return i;
    }
    return methods.findIndex(m => m.strategy !== "manual");
  })();
  const primary = primaryIdx >= 0 ? methods[primaryIdx] : null;
  const manualMethod = methods.find(m => m.strategy === "manual");
  const blockingSudoMethod = (!found && primary == null)
    ? methods.find(m => m.requires_sudo && !isRoot)
    : null;

  const uninstallPrimaryIdx = (() => {
    for (let i = 0; i < uninstallMethods.length; i++) {
      const m = uninstallMethods[i];
      if (m.strategy === "manual") continue;
      if (m.requires_sudo && !isRoot) continue;
      return i;
    }
    return -1;
  })();
  const uninstallPrimary = uninstallPrimaryIdx >= 0 ? uninstallMethods[uninstallPrimaryIdx] : null;

  return (
    <div className="sysdep-card">
      <div className="sysdep-card__head">
        <div className="sysdep-card__title">
          <Ico name="package"/> FFmpeg
          {uninstalling
            ? <span className="sysdep-card__badge sysdep-card__badge--busy">
                <span className="sysdep-spinner"/>
                {t("settings.system.uninstalling", { elapsed: formatElapsed(liveStatus && liveStatus.elapsed_sec) })}
              </span>
            : installing
              ? <span className="sysdep-card__badge sysdep-card__badge--busy">
                  <span className="sysdep-spinner"/>
                  {t("settings.system.installing", { elapsed: formatElapsed(liveStatus && liveStatus.elapsed_sec) })}
                </span>
              : found
                ? <span className="sysdep-card__badge sysdep-card__badge--ok">
                    <Ico name="check"/>
                    {snap.version
                      ? t("settings.system.status.found", { ver: snap.version })
                      : t("settings.system.status.foundNoVer")}
                  </span>
                : <span className="sysdep-card__badge sysdep-card__badge--missing">
                    <Ico name="warn"/> {t("settings.system.status.missing")}
                  </span>}
        </div>
      </div>
      {found && snap.location && (
        <div className="sysdep-card__path">{t("settings.system.location", { path: snap.location })}</div>
      )}

      <div className="sysdep-card__actions">
        {!busy && !found && primary && (
          <button className="btn btn-sm btn-primary"
                  onClick={() => startInstall(primaryIdx)}
                  title={primary.command_hint || primary.strategy}>
            <Ico name="package"/>{" "}
            {t("settings.system.btn.install")}
          </button>
        )}
        {!busy && found && uninstallPrimary && !confirmingUninstall && (
          <button className="btn btn-sm btn-danger"
                  onClick={() => setConfirmingUninstall(true)}
                  title={uninstallPrimary.command_hint || uninstallPrimary.strategy}
                  style={{borderColor:"var(--danger)", color:"var(--danger)"}}>
            <Ico name="trash"/>{" "}
            {t("settings.system.btn.uninstall")}
          </button>
        )}
        {!busy && (
          <button className="btn btn-sm" onClick={handleRecheck} disabled={rechecking}>
            {rechecking
              ? <><span className="sysdep-spinner"/>{" "}{t("settings.system.detecting")}</>
              : <><Ico name="refresh"/> {t("settings.system.btn.recheck")}</>}
          </button>
        )}
        {snap && snap.homepage && (
          <a className="btn btn-sm" href={snap.homepage} target="_blank" rel="noopener noreferrer">
            <Ico name="link"/> {t("settings.system.btn.openHome")}
          </a>
        )}
      </div>

      {!busy && found && confirmingUninstall && uninstallPrimary && (
        <div className="sysdep-card__sudo-hint"
             style={{borderColor:"var(--danger)", background:"rgba(239,68,68,.08)"}}>
          <div style={{whiteSpace:"pre-wrap", color:"var(--text)", fontSize:12, lineHeight:1.6}}>
            {t("settings.system.uninstallConfirm")}
          </div>
          <div className="sysdep-card__sudo-cmd" style={{marginTop:10}}>
            <code>{uninstallPrimary.command_hint || uninstallPrimary.strategy}</code>
          </div>
          <div style={{display:"flex", gap:6, marginTop:10, justifyContent:"flex-end"}}>
            <button className="btn btn-sm" onClick={() => setConfirmingUninstall(false)}>
              {t("settings.system.btn.cancel")}
            </button>
            <button className="btn btn-sm btn-danger"
                    style={{background:"var(--danger)", color:"#fff", borderColor:"var(--danger)"}}
                    onClick={() => startUninstall(uninstallPrimaryIdx)}>
              <Ico name="trash"/>{" "}{t("settings.system.btn.uninstallConfirmBtn")}
            </button>
          </div>
        </div>
      )}

      {!found && !busy && !primary && manualMethod && !blockingSudoMethod && (
        <div className="sysdep-card__sudo-hint" style={{borderLeft: "3px solid var(--primary)"}}>
          {t("settings.system.noMethod")}
        </div>
      )}

      {!found && !busy && blockingSudoMethod && blockingSudoMethod.command_hint && (
        <div className="sysdep-card__sudo-hint">
          <div>{t("settings.system.requiresSudo")}</div>
          <div className="sysdep-card__sudo-cmd">
            <code>sudo {blockingSudoMethod.command_hint}</code>
            <button className="btn btn-sm" onClick={() => copyCmd("sudo " + blockingSudoMethod.command_hint)}>
              {copied ? t("settings.system.btn.copied") : t("settings.system.btn.copyCmd")}
            </button>
          </div>
        </div>
      )}

      {(busy || logLines.length > 0) && (
        <div className="sysdep-log">
          <div className="sysdep-log__head">
            <span>{lastOpKind === "uninstall"
              ? t("settings.system.logTitleUninstall")
              : t("settings.system.logTitle")}</span>
            {busy && liveStatus && liveStatus.elapsed_sec != null && (
              <span>{formatElapsed(liveStatus.elapsed_sec)}</span>
            )}
          </div>
          {logLines.length === 0
            ? <pre className="sysdep-log__body sysdep-log__body--empty">{t("settings.system.logEmpty")}</pre>
            : <pre className="sysdep-log__body" ref={logRef}>{logLines.join("\n")}</pre>}
        </div>
      )}
    </div>
  );
}

// ─── Settings Tab ───
function SettingsTab({ onApiKeyChange, onFfmpegChange }) {
  const t = useT();
  const [config, setConfig] = useState({});
  const [storage, setStorage] = useState(null);
  const [permsStatus, setPermsStatus] = useState(null);
  const [keyVisible, setKeyVisible] = useState(false);
  const [saving, setSaving] = useState(false);
  const [folderPicker, setFolderPicker] = useState(null);

  const refreshStorage = useCallback(() => {
    pluginApi("GET", "/storage/stats")
      .then(r => { if (r.ok && r.body) setStorage(r.body); })
      .catch(() => {});
  }, []);

  const refreshPerms = useCallback(async () => {
    try {
      const r = await pluginApi("GET", "/permissions/check");
      if (r.body && r.body.ok) setPermsStatus(r.body);
    } catch (e) {
      // Permission probe failure is non-fatal; assume granted to avoid
      // a permanent banner when the endpoint itself is unreachable.
      setPermsStatus({ ok: true, all_granted: true, missing: [], checks: [] });
    }
  }, []);

  useEffect(() => {
    pluginApi("GET", "/settings").then(r => { if (r.ok && r.body) setConfig(r.body); }).catch(() => {});
    refreshStorage();
    refreshPerms();
  }, [refreshStorage, refreshPerms]);

  const save = async (updates) => {
    setSaving(true);
    try {
      const r = await pluginApi("PUT", "/settings", { updates });
      if (r.ok) {
        setConfig(prev => ({ ...prev, ...updates }));
        if (updates.dashscope_api_key !== undefined) onApiKeyChange(updates.dashscope_api_key);
        showToast(t("toast.savedSettings"));
      }
    } catch { showToast(t("toast.saveFailed"), "error"); }
    setSaving(false);
  };

  const updateField = (key, value) => setConfig(prev => ({ ...prev, [key]: value }));

  // Folder picker plumbing — clones seedance's "Browse" + "Open" pair so
  // every Folders row gets a working in-plugin file dialog (no Tauri /
  // host cooperation required) PLUS an OS-level "open in Explorer / Finder"
  // button that mkdir's the target on demand.
  const openFolderByKey = async (key) => {
    try {
      const r = await pluginApi("POST", "/storage/open-folder", { key });
      if (!r.body || !r.body.ok) {
        showToast(_tr("settings.folder.openFailed", { msg: (r.body && r.body.detail) || "" }), "error");
      }
    } catch (e) {
      showToast(_tr("settings.folder.openFailed", { msg: e.message || String(e) }), "error");
    }
  };
  const openFolderPicker = (configKey, titleKey) => {
    setFolderPicker({
      key: configKey,
      title: _tr(titleKey),
      initialPath: (config[configKey] || "").trim(),
    });
  };
  const handleFolderPickerSelect = (path) => {
    if (!folderPicker) return;
    const k = folderPicker.key;
    setFolderPicker(null);
    if (path) {
      setConfig({ ...config, [k]: path });
      save({ [k]: path });
      showToast(_tr("settings.folder.savedTo", { path }));
      // refresh stats so the size cards reflect the new dir contents
      setTimeout(refreshStorage, 200);
    }
  };

  // Stat card label map (mirrors the seedance UX where each managed
  // folder shows its own size + file-count card under the Folders panel).
  const statKeyMap = {
    output_dir:  "settings.stats.outputDir",
    uploads_dir: "settings.stats.uploadsDir",
    tasks_dir:   "settings.stats.tasksDir",
  };
  const stats = (storage && storage.stats) || null;

  return (
    <div style={{maxWidth: 640}}>
      {/* ── 1. API 配置 ── */}
      <div className="setting-section oa-settings-section">
        <h3 className="oa-settings-section__title"><Ico name="key"/> {t("settings.section.api")}</h3>
        <div className={"form-row" + (config.dashscope_api_key ? "" : " oa-config-field-callout")}
             data-callout={config.dashscope_api_key ? undefined : t("settings.api.callout")}>
          <div className="label">{t("settings.api.key.label")}</div>
          <div className="flex gap-2">
            <input className="input flex-1" type={keyVisible ? "text" : "password"}
                   value={config.dashscope_api_key || ""}
                   onChange={e => updateField("dashscope_api_key", e.target.value)}
                   placeholder="sk-..." />
            <button className="btn btn-sm" onClick={() => setKeyVisible(!keyVisible)}>
              {keyVisible ? t("settings.api.key.hide") : t("settings.api.key.show")}
            </button>
            <button className="btn btn-sm btn-primary"
                    onClick={() => save({ dashscope_api_key: config.dashscope_api_key || "" })}
                    disabled={saving}>{t("settings.api.key.save")}</button>
          </div>
          <div className="text-xs text-dim" style={{marginTop: 4}}>
            {t("settings.api.key.helpPrefix")}
            <a href="https://bailian.console.aliyun.com/#/api-key" target="_blank" rel="noopener"
               style={{color: "var(--primary)"}}>{t("settings.api.key.helpLink")}</a>
          </div>
        </div>
      </div>

      {/* ── 2. 插件权限 ── */}
      <div className="setting-section oa-settings-section">
        <h3 className="oa-settings-section__title"><Ico name="key"/> {t("settings.section.permissions")}</h3>
        <PermissionsPanel status={permsStatus} onChanged={refreshPerms} />
      </div>

      {/* ── 3. 系统组件（FFmpeg 一键安装） ── */}
      <div className="setting-section oa-settings-section">
        <h3 className="oa-settings-section__title"><Ico name="package"/> {t("settings.section.system")}</h3>
        <div className="deps-help">
          <strong>{t("settings.system.intro.strong")}</strong>
          <div style={{marginTop:4}}>{t("settings.system.intro.body")}</div>
          <ul>
            <li>{t("settings.system.platform.win")}</li>
            <li>{t("settings.system.platform.mac")}</li>
            <li>{t("settings.system.platform.linux")}</li>
          </ul>
        </div>
        <FfmpegInstaller
          onInstalled={async () => {
            const r = await pluginApi("GET", "/ffmpeg/status");
            if (r.ok && r.body) onFfmpegChange && onFfmpegChange(!!r.body.available);
          }}
          onUninstalled={async () => {
            const r = await pluginApi("GET", "/ffmpeg/status");
            if (r.ok && r.body) onFfmpegChange && onFfmpegChange(!!r.body.available);
          }}
        />

        {/* Manual override — kept for the "ffmpeg lives in a non-PATH
            location" power user. Hidden behind a thin row so it does
            not compete with the one-click installer above. */}
        <div className="form-row" style={{marginTop: 14}}>
          <div className="label">{t("settings.system.manualPath")}</div>
          <div className="flex gap-2">
            <input className="input flex-1"
                   value={config.ffmpeg_path || ""}
                   onChange={e => updateField("ffmpeg_path", e.target.value)}
                   placeholder={t("settings.system.manualPath.placeholder")} />
            <button className="btn btn-sm" onClick={async () => {
              await save({ ffmpeg_path: config.ffmpeg_path || "" });
              const r = await pluginApi("GET", "/ffmpeg/status");
              if (r.ok && r.body) onFfmpegChange && onFfmpegChange(!!r.body.available);
            }}>{t("settings.system.manualPath.save")}</button>
          </div>
        </div>
      </div>

      {/* ── 4. 默认参数 ── */}
      <div className="setting-section oa-settings-section">
        <h3 className="oa-settings-section__title"><Ico name="settings"/> {t("settings.section.defaults")}</h3>
        <div className="grid-2">
          <div className="form-row">
            <div className="label">{t("settings.defaults.subtitle")}</div>
            <div className="flex items-center gap-2">
              <div className={"switch " + (config.default_subtitle === "true" ? "on" : "")}
                   onClick={() => {
                     const v = config.default_subtitle === "true" ? "false" : "true";
                     updateField("default_subtitle", v);
                     save({ default_subtitle: v });
                   }} />
            </div>
          </div>
          <div className="form-row">
            <div className="label">{t("settings.defaults.format")}</div>
            <select className="input select" value={config.default_output_format || "mp4"}
                    onChange={e => { updateField("default_output_format", e.target.value); save({ default_output_format: e.target.value }); }}>
              <option value="mp4">MP4</option>
              <option value="mkv">MKV</option>
            </select>
          </div>
        </div>
      </div>

      {/* ── 5. 文件夹设置（视频输出 / 上传缓存 + 选择 / 打开） ── */}
      <div className="setting-section oa-settings-section">
        <h3 className="oa-settings-section__title"><Ico name="folder"/> {t("settings.section.folder")}</h3>

        <div className="form-row">
          <div className="label">{t("settings.label.outputDir")}</div>
          <div className="folder-row">
            <input className="input" value={config.output_dir || ""} placeholder={t("settings.outputDir.placeholder")}
                   onChange={e => setConfig({...config, output_dir: e.target.value})}
                   onBlur={e => save({ output_dir: e.target.value })} />
            <button className="btn btn-sm" onClick={() => openFolderPicker("output_dir", "settings.pickOutput")}>{t("settings.btn.browse")}</button>
            <button className="btn btn-sm" onClick={() => openFolderByKey("output_dir")}>{t("settings.btn.open")}</button>
          </div>
        </div>

        <div className="form-row">
          <div className="label">{t("settings.label.uploadsDir")}</div>
          <div className="folder-row">
            <input className="input" value={config.uploads_dir || ""} placeholder={t("settings.uploadsDir.placeholder")}
                   onChange={e => setConfig({...config, uploads_dir: e.target.value})}
                   onBlur={e => save({ uploads_dir: e.target.value })} />
            <button className="btn btn-sm" onClick={() => openFolderPicker("uploads_dir", "settings.pickUploads")}>{t("settings.btn.browse")}</button>
            <button className="btn btn-sm" onClick={() => openFolderByKey("uploads_dir")}>{t("settings.btn.open")}</button>
          </div>
        </div>

        {stats && (
          <div className="grid-3" style={{marginTop:12}}>
            {Object.entries(stats).map(([k, s]) => (
              <div key={k} className="card" style={{padding:10,textAlign:"center"}}>
                <div className="text-xs text-dim">{statKeyMap[k] ? t(statKeyMap[k]) : k}</div>
                <div style={{fontSize:18,fontWeight:600,color:"var(--primary)",margin:"4px 0"}}>{s.size_mb} MB</div>
                <div className="text-xs text-dim">{t("settings.stats.fileCount", { n: s.file_count })}</div>
              </div>
            ))}
          </div>
        )}
      </div>

      <FolderPickerModal
        open={!!folderPicker}
        title={folderPicker && folderPicker.title}
        initialPath={folderPicker && folderPicker.initialPath}
        onCancel={() => setFolderPicker(null)}
        onSelect={handleFolderPickerSelect}
      />
    </div>
  );
}

// ─── Error Boundary ───
class PluginErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { error: null, info: null };
  }
  static getDerivedStateFromError(error) { return { error }; }
  componentDidCatch(error, info) {
    this.setState({ info });
    console.error("[clip-sense] render error:", error, info);
  }
  reset = () => this.setState({ error: null, info: null });
  render() {
    if (!this.state.error) return this.props.children;
    const err = this.state.error;
    const stack = (err && err.stack) || String(err);
    const compStack = (this.state.info && this.state.info.componentStack) || "";
    const tr = (k) => _i18n.t(k);
    return (
      <div style={{padding: 24, maxWidth: 820, margin: "0 auto"}}>
        <div className="oa-config-banner" role="alert" style={{borderColor: "var(--danger)"}}>
          <span className="oa-icon oa-config-banner__icon" style={{color: "var(--danger)"}}
                dangerouslySetInnerHTML={{__html: window.OpenAkitaIcons ? window.OpenAkitaIcons.warning() : ""}} />
          <div className="oa-config-banner__text">
            <strong>{tr("err.title")}</strong>
            <div style={{fontSize: 12, color: "var(--text-muted)", marginTop: 4}}>
              {err && err.message ? err.message : String(err)}
            </div>
          </div>
          <button className="oa-config-banner__action" type="button" onClick={this.reset}>
            {tr("err.retry")}
          </button>
        </div>
        <details style={{marginTop: 16, fontSize: 12, color: "var(--text-muted)"}} open>
          <summary style={{cursor: "pointer", marginBottom: 8}}>{tr("err.stackLabel")}</summary>
          <pre style={{padding: 12, background: "var(--bg-card)", border: "1px solid var(--border)", borderRadius: 6, overflow: "auto", maxHeight: 240, whiteSpace: "pre-wrap", wordBreak: "break-word"}}>
{stack}
{compStack ? "\n--- React component stack ---" + compStack : ""}
          </pre>
        </details>
      </div>
    );
  }
}

// ─── Mount ───
console.log("[clip-sense] Mounting React app...");
try {
  window.__csRendered = true;
  ReactDOM.createRoot(document.getElementById("root")).render(
    <PluginErrorBoundary>
      <App />
    </PluginErrorBoundary>
  );
} catch (mountErr) {
  document.getElementById("root").innerHTML =
    '<div style="padding:24px;color:#ef4444"><b>[clip-sense mount error]</b><pre style="margin-top:8px;white-space:pre-wrap;font-size:11px">' +
    (mountErr && mountErr.stack ? mountErr.stack : String(mountErr)) + '</pre></div>';
}
if (window.OpenAkita && typeof window.OpenAkita.ready === "function") {
  window.OpenAkita.ready();
}
</script>

<script>
(function() {
  console.log("[clip-sense] Manual compile+execute starting...");
  var srcEl = document.getElementById("cs-jsx-source");
  if (!srcEl) { document.getElementById("root").innerHTML = '<div style="padding:24px;color:#ef4444"><b>Source element not found</b></div>'; return; }
  if (typeof Babel === "undefined") { document.getElementById("root").innerHTML = '<div style="padding:24px;color:#ef4444"><b>Babel not loaded (CDN issue?)</b></div>'; return; }
  if (typeof React === "undefined") { document.getElementById("root").innerHTML = '<div style="padding:24px;color:#ef4444"><b>React not loaded (CDN issue?)</b></div>'; return; }
  var code;
  try {
    var result = Babel.transform(srcEl.textContent, { presets: ["react"], filename: "clip-sense.jsx" });
    code = result.code;
    console.log("[clip-sense] Compilation OK (" + code.length + " chars)");
  } catch (compileErr) {
    console.error("[clip-sense] COMPILE ERROR:", compileErr);
    document.getElementById("root").innerHTML = '<div style="padding:24px;color:#ef4444;font-size:13px"><b>Babel Compilation Error</b><pre style="margin-top:12px;white-space:pre-wrap;font-size:12px;background:#fef2f2;padding:16px;border:1px solid #fecaca;border-radius:8px;overflow:auto;max-height:500px">' + (compileErr.stack || String(compileErr)) + '</pre></div>';
    return;
  }
  try {
    (0, eval)(code);
    console.log("[clip-sense] Execution OK");
  } catch (runErr) {
    console.error("[clip-sense] RUNTIME ERROR:", runErr);
    document.getElementById("root").innerHTML = '<div style="padding:24px;color:#ef4444;font-size:13px"><b>Runtime Error</b><pre style="margin-top:12px;white-space:pre-wrap;font-size:12px;background:#fef2f2;padding:16px;border:1px solid #fecaca;border-radius:8px;overflow:auto;max-height:500px">' + (runErr.stack || String(runErr)) + '</pre></div>';
  }
})();
</script>
</body>

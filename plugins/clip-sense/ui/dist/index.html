<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:var(--text-muted,#64748b);font-size:13px" id="__cs_loading">正在加载插件...</div></div>
<script>
window.onerror = function(msg, src, line, col, err) {
  var el = document.getElementById("root");
  if (el) el.innerHTML = '<div style="padding:24px;color:#ef4444;font-size:13px;word-break:break-word"><b>[clip-sense error]</b><br/>' + String(msg) + '<br/>at ' + String(src) + ':' + line + ':' + col + (err && err.stack ? '<pre style="margin-top:8px;white-space:pre-wrap;font-size:11px;background:#f1f5f9;padding:12px;border-radius:6px;overflow:auto;max-height:300px">' + err.stack + '</pre>' : '') + '</div>';
};
window.__csRendered = false;
setTimeout(function() {
  if (window.__csRendered) return;
  var el = document.getElementById("__cs_loading");
  if (!el) return;
  el.style.color = "#ef4444";
  el.style.flexDirection = "column";
  el.style.textAlign = "center";
  el.style.lineHeight = "1.8";
  el.innerHTML = '<b>插件初始化超时</b><br/>可能原因：<br/>1. CDN 脚本加载失败 (unpkg.com)<br/>2. Babel 编译错误<br/>3. React 渲染失败<br/><br/><span style="font-size:11px;color:#94a3b8">请按 F12 打开开发者工具查看控制台错误</span>';

<script>
// ── Bridge SDK ──
console.log("[clip-sense] Bridge SDK loading...");
const BRIDGE_VER = 1;
let _ctx = null, _caps = [], _pending = {}, _handlers = {};
let _bridgeConnected = false;
const _inIframe = window.parent !== window;
function uid() { return Math.random().toString(36).slice(2,10) + Date.now().toString(36); }
function post(msg) { if (_inIframe) window.parent.postMessage({ __akita_bridge: true, version: BRIDGE_VER, ...msg }, "*"); }

function _detectApiBase() {
  if (_ctx && _ctx.apiBase) return _ctx.apiBase;
  const loc = window.location;
  if (loc.port === "5173" || loc.port === "1420") return "http://127.0.0.1:18900";
  return loc.origin;
}

function directFetch(method, path, body) {
  const url = path.startsWith("http") ? path : _detectApiBase() + path;
  const opts = { method: method, headers: { "Content-Type": "application/json" } };
  if (body && method !== "GET" && method !== "HEAD") {
    if (body instanceof FormData) { opts.body = body; delete opts.headers["Content-Type"]; }
    else { opts.body = JSON.stringify(body); }
  }
  return fetch(url, opts).then(function(resp) {
    return resp.json().then(function(json) { return { ok: resp.ok, status: resp.status, body: json }; });
  });
}

function apiCall(method, path, body) {
  if (!_inIframe || !_bridgeConnected) return directFetch(method, path, body);
  return new Promise(function(resolve, reject) {
    const id = uid();
    _pending[id] = { resolve: resolve, reject: reject };
    post({ type: "bridge:api-request", requestId: id, payload: { method: method, path: path, body: body } });
    setTimeout(function() {
      if (_pending[id]) { delete _pending[id]; directFetch(method, path, body).then(resolve).catch(reject); }
    }, 5000);
  });
}

function pluginApi(method, path, body) {
  const base = _ctx ? "/api/plugins/" + _ctx.pluginId : "/api/plugins/clip-sense";
  return apiCall(method, base + path, body);
}

function bridgeDownload(url, fname) {
  return new Promise(function(resolve) {
    if (!_inIframe || !_bridgeConnected) { resolve({ ok: false, error: "no-bridge" }); return; }
    const id = uid();
    _pending[id] = { resolve: resolve, reject: function(e) { resolve({ ok: false, error: String(e) }); } };
    post({ type: "bridge:download", requestId: id, payload: { url: url, filename: fname } });
    setTimeout(function() {
      if (_pending[id]) { delete _pending[id]; resolve({ ok: false, error: "timeout" }); }
    }, 60000);
  });
}

function bridgeShowInFolder(path) {
  if (!_inIframe || !_bridgeConnected || !path) return;
  if (_caps.length && _caps.indexOf("show-in-folder") === -1) return;
  const id = uid();
  _pending[id] = { resolve: function() {}, reject: function() {} };
  post({ type: "bridge:show-in-folder", requestId: id, payload: { path: path } });
  setTimeout(function() { if (_pending[id]) delete _pending[id]; }, 10000);
}

window.addEventListener("message", function(e) {
  const d = e.data;
  if (!d || !d.__akita_bridge) return;
  if (d.type === "bridge:init" && d.payload) {
    _ctx = d.payload; _bridgeConnected = true;
    if (_ctx.theme) document.documentElement.setAttribute("data-theme", _ctx.theme.includes("dark") ? "dark" : "light");
  }
  if (d.type === "bridge:handshake-ack" && d.payload) { _caps = d.payload.capabilities || []; _bridgeConnected = true; }
  const acks = ["bridge:api-response","bridge:clipboard-ack","bridge:download-ack","bridge:show-in-folder-ack","bridge:pick-folder-ack"];
  if (acks.indexOf(d.type) !== -1 && d.requestId && _pending[d.requestId]) {
    _pending[d.requestId].resolve(d.payload); delete _pending[d.requestId];
  }
  if (d.type === "bridge:theme-change" && d.payload) {
    document.documentElement.setAttribute("data-theme", (d.payload.theme || "").includes("dark") ? "dark" : "light");
  }
  if (d.type === "bridge:event" && d.payload) {
    const h = _handlers[d.payload.eventType];
    if (h) h.forEach(function(fn) { fn(d.payload.data); });
  }
});
let _readyInterval = null;
function _sendReady() { post({ type: "bridge:ready" }); post({ type: "bridge:handshake", payload: { sdkVersion: "1.0.0" } }); }
_sendReady();
if (_inIframe) {
  _readyInterval = setInterval(function() { if (_bridgeConnected) { clearInterval(_readyInterval); return; } _sendReady(); }, 300);
  setTimeout(function() { if (_readyInterval) clearInterval(_readyInterval); }, 20000);
}
function onEvent(type, fn) { (_handlers[type] = _handlers[type] || []).push(fn); }

function uploadFile(file) {
  const base = _detectApiBase() + (_ctx ? "/api/plugins/" + _ctx.pluginId : "/api/plugins/clip-sense");
  const fd = new FormData(); fd.append("file", file);
  return fetch(base + "/upload", { method: "POST", body: fd }).then(function(r) { return r.json(); });
}

function _tr(key, vars, fallback) {
  if (window.OpenAkitaI18n && window.OpenAkitaI18n.t) {
    const v = window.OpenAkitaI18n.t(key, vars);
    if (v && v !== key) return v;
  }
  if (fallback) return fallback;
  return key;
}

async function downloadOutput(taskId, fname) {
  try {
    showToast(_tr("toast.downloading", null, "下载中..."));
    const base = _detectApiBase() + (_ctx ? "/api/plugins/" + _ctx.pluginId : "/api/plugins/clip-sense");
    const url = base + "/tasks/" + taskId + "/download";
    if (_inIframe && _bridgeConnected) {
      const native = await bridgeDownload(url, fname || "clip_sense_output.mp4");
      if (native && native.ok && native.path && /[\\/]/.test(String(native.path))) {
        showToast("已保存到: " + native.path);
        bridgeShowInFolder(native.path);
        return;
      }
    }
    const resp = await fetch(url);
    if (!resp.ok) throw new Error("Server returned " + resp.status);
    const blob = await resp.blob();
    const objUrl = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = objUrl; a.download = fname || "output.mp4";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function() { URL.revokeObjectURL(objUrl); }, 3000);
    showToast("已下载: " + (fname || "output.mp4"));
  } catch (e) {
    showToast("下载失败: " + e.message, "error");
  }
}

function showToast(body, type) {
  type = type || "success";
  if (_inIframe && _bridgeConnected) { post({ type: "bridge:notification", payload: { title: "", body: body, type: type } }); return; }
  console.log("[Toast]", type, body);
}
</script>

const _i18n = (function () {
  if (window.OpenAkitaI18n && window.OpenAkitaI18n.register) {
    window.OpenAkitaI18n.register(I18N_DICT);
    return window.OpenAkitaI18n;
  }
  let loc = (navigator && navigator.language) || "zh";
  const subs = new Set();
  return {
    t: function (k, vars) {
      const base = (loc || "zh").split(/[-_]/)[0];
      const tpl = (I18N_DICT[loc] && I18N_DICT[loc][k])
        || (I18N_DICT[base] && I18N_DICT[base][k])
        || (I18N_DICT.en && I18N_DICT.en[k])
        || k;
      return vars
        ? String(tpl).replace(/\{(\w+)\}/g, (_, n) => vars[n] != null ? String(vars[n]) : "{" + n + "}")
        : tpl;
    },
    locale: () => loc,
    setLocale: (l) => { loc = l; subs.forEach(fn => { try { fn(l); } catch (_) {} }); },
    onChange: (fn) => { subs.add(fn); return () => subs.delete(fn); },
  };
})();

function useT() {
  const [, setTick] = useState(0);
  useEffect(() => _i18n.onChange(() => setTick(x => x + 1)), []);
  return _i18n.t;
}

// ── Mode definitions ──
const MODE_DEFS = [
  { id: "highlight_extract", iconKey: "sparkles" },
  { id: "silence_clean",     iconKey: "headphones" },
  { id: "topic_split",       iconKey: "scissors" },
  { id: "talking_polish",    iconKey: "mic" },
];
function modeList(t) {
  return MODE_DEFS.map(m => ({ ...m, name: t("mode." + m.id) }));
}

// ── SVG Icon (calls the function!) ──
function OAIcon({ name, style }) {
  const svg = (window.OpenAkitaIcons && window.OpenAkitaIcons[name]) ? window.OpenAkitaIcons[name]() : "";
  return <span className="oa-icon" style={style} dangerouslySetInnerHTML={{ __html: svg }} />;
}

// ── Status helpers ──
const STATUS_CLS = { pending: "tag-orange", running: "tag-blue", succeeded: "tag-green", failed: "tag-red", cancelled: "tag-gray" };
function statusLabel(s, t) { return t("status." + s); }
function statusCls(s) { return STATUS_CLS[s] || "tag-gray"; }

// ── Pipeline steps ──
const PIPELINE_STEPS = ["setup", "check_deps", "transcribe", "analyze", "execute", "subtitle", "finalize"];

function PipelineProgress({ currentStep, status }) {
  const t = useT();
  const idx = PIPELINE_STEPS.indexOf(currentStep);
  return (
    <div className="pipeline-steps">
      {PIPELINE_STEPS.map((s, i) => (
        <div key={s}
             className={"pipeline-step" + (i === idx && status === "running" ? " active" : "") + (i < idx || status === "succeeded" ? " done" : "")}>
          {t("preview.step." + s)}
        </div>
      ))}
    </div>
  );
}

function ErrorPanel({ errorKind, errorMessage, errorHints }) {

      if (r.ok && r.body && r.body.dashscope_api_key) setApiReady(true);
    }).catch(() => {});

      if (r.ok && r.body) setFfmpegReady(r.body.available);

// ─── Create Tab ───
function CreateTab({ apiReady, ffmpegReady, goToTasks }) {
  const t = useT();
  const MODES = modeList(t);
  const [mode, setMode] = useState("highlight_extract");
  const [file, setFile] = useState(null);
  const [uploadResult, setUploadResult] = useState(null);
  const [creating, setCreating] = useState(false);
  const [taskStartedOpen, setTaskStartedOpen] = useState(false);
  const [previewTask, setPreviewTask] = useState(null);
  const fileRef = useRef(null);

  const [params, setParams] = useState({
    flavor: "", target_count: 5, target_duration: 30,
    silence_preset: "standard", threshold_db: -40, min_silence_sec: 0.5, padding_sec: 0.1,
    target_segment_duration: 180, burn_subtitle: false,
  });
  const setP = (k, v) => setParams(p => ({ ...p, [k]: v }));

  const handleUpload = async (f) => {
    setFile(f);
    try {
      const r = await uploadFile(f);
      setUploadResult(r);
    } catch { showToast(t("toast.uploadFail"), "error"); }
  };

  const handleCreate = async () => {
    if (!uploadResult) { showToast(t("toast.needVideo"), "warning"); return; }
    if (mode !== "silence_clean" && !apiReady) { showToast(t("toast.needKey"), "warning"); return; }
    setCreating(true);
    try {
      const body = { mode, source_video_path: uploadResult.path, source_url: uploadResult.url, ...params };
      const r = await pluginApi("POST", "/tasks", body);
      if (r.ok && r.body) {
        setPreviewTask(r.body);
        setTaskStartedOpen(true);
        pollTask(r.body.id);
      } else {
        showToast(r.body?.detail || t("toast.createFail"), "error");
      }
    } catch (e) { showToast(t("toast.createFail"), "error"); }
    setCreating(false);
  };

  const pollTask = (taskId) => {
    let attempts = 0;
    const poll = async () => {
      if (attempts > 120) return;
      attempts++;
      try {
        const r = await pluginApi("GET", "/tasks/" + taskId);
        if (r.ok && r.body) {
          setPreviewTask(r.body);
          if (["succeeded", "failed", "cancelled"].includes(r.body.status)) return;
        }
      } catch {}
      setTimeout(poll, attempts < 10 ? 3000 : 8000);
    };
    setTimeout(poll, 3000);
  };

  const isFree = mode === "silence_clean";

  return (
    <>
    <div className="split-layout">
      <div className="split-left">
        <div className="card">
          <div className="form-row">
            <div className="label">{t("create.modeLabel")}</div>
            <div className="flex gap-2 flex-wrap">
              {MODES.map(m => (
                <button key={m.id} className={`mode-btn ${mode === m.id ? "active" : ""}`}
                        onClick={() => setMode(m.id)}>
                  <span style={{display:"inline-flex", alignItems:"center", gap:6}}>
                    <OAIcon name={m.iconKey} /> {m.name}
                  </span>
                </button>
              ))}
            </div>
          </div>

          <div className="text-xs text-muted" style={{marginBottom: 16}}>
            {t("mode." + mode + ".desc")}
          </div>

          <div className="form-row">
            <div className="label">{t("create.upload")}</div>
            <div className={`upload-zone ${file ? "has-file" : ""}`}
                 onClick={() => fileRef.current && fileRef.current.click()}
                 onDragOver={e => e.preventDefault()}
                 onDrop={e => { e.preventDefault(); if (e.dataTransfer.files[0]) handleUpload(e.dataTransfer.files[0]); }}>
              <input ref={fileRef} type="file" accept="video/*,audio/*" style={{display:"none"}}
                     onChange={e => e.target.files[0] && handleUpload(e.target.files[0])} />
              {file ? (
                <div>
                  <div style={{display:"inline-flex", alignItems:"center", gap:6}}>
                    <OAIcon name="film" style={{fontSize:20}} />
                    <span className="text-sm" style={{fontWeight:500}}>{file.name}</span>
                  </div>
                  <div className="text-xs text-dim">{(file.size / 1048576).toFixed(1)} MB</div>
                  <button className="btn btn-sm" style={{marginTop:6}}
                          onClick={e => { e.stopPropagation(); fileRef.current && fileRef.current.click(); }}>
                    {t("create.uploadChange")}
                  </button>
                </div>
              ) : (
                <div>
                  <span className="oa-icon" style={{fontSize:28, opacity:.5}}
                        dangerouslySetInnerHTML={{__html: window.OpenAkitaIcons ? window.OpenAkitaIcons.upload() : ""}} />
                  <div className="text-sm" style={{marginTop:8}}>{t("create.upload")}</div>
                  <div className="text-xs text-dim">{t("create.uploadHint")}</div>
                </div>
              )}
            </div>
          </div>

          {mode === "highlight_extract" && (
            <>
              <div className="form-row">
                <div className="label">{t("create.flavor")}</div>
                <input className="input" placeholder={t("create.flavorPlaceholder")}
                       value={params.flavor} onChange={e => setP("flavor", e.target.value)} />
              </div>
              <div className="grid-2">
                <div className="form-row">
                  <div className="label">{t("create.targetCount")}</div>
                  <select className="input select" value={params.target_count}
                          onChange={e => setP("target_count", +e.target.value)}>
                    {[3,5,8,10].map(n => <option key={n} value={n}>{n}</option>)}
                  </select>
                </div>
                <div className="form-row">
                  <div className="label">{t("create.targetDuration")}</div>
                  <select className="input select" value={params.target_duration}

          {mode === "talking_polish" && (

                    <div className={`switch ${params[sw.key] !== false ? "on" : ""}`}

                         style={{width:36,height:20,borderRadius:10,background:params[sw.key]!==false?"var(--primary)":"var(--border)",cursor:"pointer",position:"relative",transition:".2s"}}>

                    </div>

          <div className="form-row flex items-center gap-2" style={{marginTop: 4}}>

// ─── Tasks Tab ───
function TasksTab({ refreshSignal = 0 }) {
  const t = useT();
  const MODES = modeList(t);
  const [tasks, setTasks] = useState([]);
  const [total, setTotal] = useState(0);
  const [filter, setFilter] = useState("");
  const [modeFilter, setModeFilter] = useState("");
  const [selected, setSelected] = useState(null);
  const [loading, setLoading] = useState(true);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      let q = "/tasks?limit=50";
      if (filter) q += "&status=" + filter;
      if (modeFilter) q += "&mode=" + modeFilter;
      const r = await pluginApi("GET", q);
      if (r.ok && r.body) {
        setTasks(Array.isArray(r.body.tasks) ? r.body.tasks : []);
        setTotal(typeof r.body.total === "number" ? r.body.total : 0);
      }
    } catch {}
    setLoading(false);
  }, [filter, modeFilter]);

  useEffect(() => { load(); }, [load]);

  const loadRef = useRef(load);
  useEffect(() => { loadRef.current = load; }, [load]);
  useEffect(() => { if (refreshSignal > 0) loadRef.current(); }, [refreshSignal]);

  useEffect(() => {
    onEvent("plugin:clip-sense:task_update", () => load());
    const iv = setInterval(load, 10000);
    return () => clearInterval(iv);
  }, [load]);

  const handleDelete = async (id) => {
    if (!confirm(t("tasks.detail.confirmDelete"))) return;
    await pluginApi("DELETE", "/tasks/" + id);
    if (selected && selected.id === id) setSelected(null);
    showToast(t("toast.deleted")); load();
  };
  const handleRetry = async (id) => {
    const r = await pluginApi("POST", "/tasks/" + id + "/retry");
    if (r.ok) { showToast(t("toast.retryCreated")); load(); }
  };
  const handleCancel = async (id) => {
    await pluginApi("POST", "/tasks/" + id + "/cancel");
    showToast(t("toast.cancelled")); load();
  };

  return (
    <div className="split-layout">
      <div className="split-left oa-list-panel">
        <div className="oa-list-panel__filters">
          <div>
            <div className="oa-section-label">{t("tasks.filter.status")}</div>
            <div className="oa-filter-group__buttons">
              {[
                { v: "",          l: t("tasks.filter.all") },
                { v: "running",   l: statusLabel("running", t) },
                { v: "succeeded", l: statusLabel("succeeded", t) },
                { v: "failed",    l: statusLabel("failed", t) },
              ].map(f => (
                <button key={f.v} className={`mode-btn ${filter === f.v ? "active" : ""}`}
                        onClick={() => setFilter(f.v)}>{f.l}</button>
              ))}
            </div>
          </div>
          <div>
            <div className="oa-section-label">{t("tasks.filter.mode")}</div>
            <div className="oa-filter-group__buttons">
              <button className={`btn btn-sm ${modeFilter === "" ? "btn-primary" : ""}`}
                      onClick={() => setModeFilter("")}>{t("tasks.filter.allModes")}</button>
              {MODES.map(m => (
                <button key={m.id} className={`btn btn-sm ${modeFilter === m.id ? "btn-primary" : ""}`}
                        onClick={() => setModeFilter(m.id)}>
                  <span style={{display:"inline-flex", alignItems:"center", gap:4}}>
                    <OAIcon name={m.iconKey} /> {m.name}
                  </span>
                </button>
              ))}
            </div>
          </div>
        </div>

        <hr className="oa-list-panel__divider" />

        <div className="oa-list-panel__items">
          {loading && tasks.length === 0 ? (
            <div className="empty-state"><div className="spinner" /></div>
          ) : tasks.length === 0 ? (
            <div className="oa-preview-empty" style={{minHeight: 160, padding: "24px 16px"}}>
              <span className="oa-preview-empty__icon"
                    dangerouslySetInnerHTML={{__html: window.OpenAkitaIcons ? window.OpenAkitaIcons.listTask() : ""}} />
              <div className="oa-preview-empty__title">{t("tasks.empty.title")}</div>
              <div className="oa-preview-empty__hint">{t("tasks.empty.hint")}</div>
            </div>
          ) : (
            tasks.map(tk => (
              <div key={tk.id} className={`task-card ${selected?.id === tk.id ? "selected" : ""}`}
                   onClick={() => setSelected(tk)}>
                <div className="task-thumb">
                  {tk.status === "running" || tk.status === "pending"
                    ? <div className="spinner-sm" />
                    : <OAIcon name="film" style={{fontSize:20, opacity:.5}} />}
                </div>
                <div className="task-info">
                  <h4>{tk.source_video_path ? tk.source_video_path.split(/[/\\]/).pop() : (tk.mode || t("tasks.untitled"))}</h4>
                  <div className="task-meta">
                    <span className={`tag ${statusCls(tk.status)}`}>{statusLabel(tk.status, t)}</span>
                    <span>{MODES.find(m => m.id === tk.mode)?.name || tk.mode}</span>
                    <span>{tk.created_at}</span>
                  </div>
                </div>
              </div>
            ))
          )}
        </div>

        <div className="oa-list-panel__footer">{t("tasks.totalCount", { n: total })}</div>
      </div>

      <div className={"split-right oa-preview-area" + (!selected ? " oa-preview-area--centered" : "")}>
        {selected ? (
          <div style={{width: "100%"}}>
            <div className="card">
              <div className="flex items-center justify-between" style={{marginBottom: 12}}>
                <span className="card-title" style={{marginBottom: 0}}>{t("tasks.detail.title")}</span>
                <div className="flex gap-2">
                  {selected.status === "failed" && (
                    <button className="btn btn-sm" onClick={() => handleRetry(selected.id)}>{t("tasks.detail.retry")}</button>
                  )}
                  {(selected.status === "running" || selected.status === "pending") && (
                    <button className="btn btn-sm" onClick={() => handleCancel(selected.id)}>{t("tasks.detail.cancel")}</button>
                  )}
                  {selected.status === "succeeded" && (
                    <button className="btn btn-sm btn-primary"
                            onClick={() => downloadOutput(selected.id, (selected.source_video_path || "output").split(/[/\\]/).pop())}>
                      {t("tasks.detail.download")}
                    </button>
                  )}
                  <button className="btn btn-sm btn-danger" onClick={() => handleDelete(selected.id)}>{t("tasks.detail.delete")}</button>
                </div>
              </div>

              {selected.status === "succeeded" && selected.output_path && (
                <video className="video-player" controls style={{marginBottom: 12}}
                       src={_detectApiBase() + (_ctx ? "/api/plugins/" + _ctx.pluginId : "/api/plugins/clip-sense") + "/tasks/" + selected.id + "/download"} />
              )}

              {(selected.status === "running" || selected.status === "pending") && (
                <>
                  <PipelineProgress currentStep={selected.pipeline_step} status={selected.status} />
                  <div className="empty-state" style={{padding: "20px"}}>
                    <div className="spinner" style={{marginBottom: 8}} />
                    <span className="text-sm text-muted">{t("tasks.detail.runningHint")}</span>
                  </div>
                </>
              )}

              {selected.status === "failed" && (
                <ErrorPanel errorKind={selected.error_kind}
                            errorMessage={selected.error_message}
                            errorHints={selected.error_hints} />
              )}
            </div>

            <div className="card">
              <div className="grid-2">
                <div><span className="text-xs text-dim">{t("tasks.detail.id")}</span><div className="text-sm">{selected.id}</div></div>
                <div><span className="text-xs text-dim">{t("tasks.detail.mode")}</span><div className="text-sm">{MODES.find(m => m.id === selected.mode)?.name || selected.mode}</div></div>
                <div><span className="text-xs text-dim">{t("tasks.detail.createdAt")}</span><div className="text-sm">{selected.created_at}</div></div>
                {selected.pipeline_step && <div><span className="text-xs text-dim">{t("tasks.detail.step")}</span><div className="text-sm">{t("preview.step." + selected.pipeline_step)}</div></div>}
                {selected.source_duration_sec && <div><span className="text-xs text-dim">{t("tasks.detail.duration")}</span><div className="text-sm">{(selected.source_duration_sec / 60).toFixed(1)} min</div></div>}
                {selected.output_duration_sec && <div><span className="text-xs text-dim">{t("tasks.detail.outputDuration")}</span><div className="text-sm">{(selected.output_duration_sec / 60).toFixed(1)} min</div></div>}
              </div>
            </div>
          </div>
        ) : (
          <div className="oa-preview-empty">
            <span className="oa-preview-empty__icon"
                  dangerouslySetInnerHTML={{__html: window.OpenAkitaIcons ? window.OpenAkitaIcons.listTask() : ""}} />
            <div className="oa-preview-empty__title">{t("tasks.empty.noSelection.title")}</div>
            <div className="oa-preview-empty__hint">{t("tasks.empty.noSelection.hint")}</div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Library Tab ───
function LibraryTab() {
  const t = useT();
  const [items, setItems] = useState([]);
  const [total, setTotal] = useState(0);
  const fileRef = useRef(null);

  const load = async () => {
    try {
      const r = await pluginApi("GET", "/library?limit=50");
      if (r.ok && r.body) { setItems(r.body.transcripts || []); setTotal(r.body.total || 0); }
    } catch {}
  };
  useEffect(() => { load(); }, []);

  const handleUpload = async (f) => {
    try { await uploadFile(f); load(); } catch { showToast(t("toast.uploadFail"), "error"); }
  };
  const handleDelete = async (id) => {
    await pluginApi("DELETE", "/library/" + id);
    showToast(t("toast.deleted")); load();
  };

  return (
    <div style={{maxWidth: 800, margin: "0 auto"}}>
      <div className="flex items-center justify-between" style={{marginBottom: 16}}>
        <h2 style={{fontSize:14, fontWeight:600}}>{t("library.title")}</h2>
        <div className="flex gap-2">
          <button className="btn btn-primary btn-sm" onClick={() => fileRef.current && fileRef.current.click()}>
            <OAIcon name="upload" /> {t("library.uploadBtn")}
          </button>
          <input ref={fileRef} type="file" accept="video/*,audio/*" style={{display:"none"}}
                 onChange={e => e.target.files[0] && handleUpload(e.target.files[0])} />
        </div>
      </div>
      {items.length === 0 ? (
        <div className="oa-preview-empty" style={{minHeight:200}}>
          <span className="oa-preview-empty__icon"
                dangerouslySetInnerHTML={{__html: window.OpenAkitaIcons ? window.OpenAkitaIcons.film() : ""}} />
          <div className="oa-preview-empty__title">{t("library.empty")}</div>
        </div>
      ) : (
        items.map(item => (
          <div key={item.id} className="library-card">
            <div className="task-thumb">
              <OAIcon name="film" style={{fontSize:20, opacity:.5}} />
            </div>
            <div style={{flex:1}}>
              <div className="text-sm" style={{fontWeight:500}}>{item.source_name || item.id}</div>
              <div className="task-meta">
                <span className={`tag ${item.status === "succeeded" ? "tag-green" : "tag-gray"}`}>
                  {item.status === "succeeded" ? t("library.transcribed") : t("library.pending")}
                </span>
                {item.duration_sec && <span>{(item.duration_sec / 60).toFixed(1)} min</span>}
              </div>
            </div>
            <div className="flex gap-2 items-center">
              <button className="btn btn-sm btn-danger" onClick={() => handleDelete(item.id)}>
                {t("tasks.detail.delete")}
              </button>
            </div>
          </div>
        ))
      )}
    </div>
  );
}

// ─── Settings Tab ───
function SettingsTab({ onApiKeyChange, onFfmpegChange }) {
  const t = useT();
  const [config, setConfig] = useState({});
  const [ffmpeg, setFfmpeg] = useState({});
  const [storage, setStorage] = useState(null);
  const [keyVisible, setKeyVisible] = useState(false);
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    pluginApi("GET", "/settings").then(r => { if (r.ok && r.body) setConfig(r.body); }).catch(() => {});
    pluginApi("GET", "/ffmpeg/status").then(r => { if (r.ok && r.body) setFfmpeg(r.body); }).catch(() => {});
    pluginApi("GET", "/storage/stats").then(r => { if (r.ok && r.body) setStorage(r.body); }).catch(() => {});
  }, []);

  const save = async (updates) => {
    setSaving(true);
    try {
      const r = await pluginApi("PUT", "/settings", { updates });
      if (r.ok) {
        setConfig(prev => ({ ...prev, ...updates }));
        if (updates.dashscope_api_key !== undefined) onApiKeyChange(updates.dashscope_api_key);
        showToast(t("toast.savedSettings"));
      }
    } catch { showToast(t("toast.saveFailed"), "error"); }
    setSaving(false);
  };

  const updateField = (key, value) => setConfig(prev => ({ ...prev, [key]: value }));

  return (
    <div style={{maxWidth: 640}}>
      <div className="setting-section oa-settings-section">
        <h3 className="oa-settings-section__title">
          <span className="oa-icon"
                dangerouslySetInnerHTML={{__html: window.OpenAkitaIcons ? window.OpenAkitaIcons.key() : ""}} />
          {t("settings.api.title")}
        </h3>
        <div className={"form-row" + (config.dashscope_api_key ? "" : " oa-config-field-callout")}
             data-callout={config.dashscope_api_key ? undefined : t("settings.api.callout")}>
          <div className="label">DashScope API Key</div>
          <div className="flex gap-2">
            <input className="input flex-1" type={keyVisible ? "text" : "password"}
                   value={config.dashscope_api_key || ""}
                   onChange={e => updateField("dashscope_api_key", e.target.value)}
                   placeholder="sk-..." />
            <button className="btn btn-sm" onClick={() => setKeyVisible(!keyVisible)}>
              {keyVisible ? t("settings.api.key.hide") : t("settings.api.key.show")}
            </button>
            <button className="btn btn-sm btn-primary"
                    onClick={() => save({ dashscope_api_key: config.dashscope_api_key || "" })}
                    disabled={saving}>{t("settings.api.key.save")}</button>
          </div>
          <div className="text-xs text-dim" style={{marginTop: 4}}>
            {t("settings.api.key.helpPrefix")}
            <a href="https://bailian.console.aliyun.com/#/api-key" target="_blank" rel="noopener"
               style={{color: "var(--primary)"}}>{t("settings.api.key.helpLink")}</a>
          </div>
        </div>
      </div>

      <div className="setting-section oa-settings-section">
        <h3 className="oa-settings-section__title">
          <span className="oa-icon"
                dangerouslySetInnerHTML={{__html: window.OpenAkitaIcons ? window.OpenAkitaIcons.settings() : ""}} />
          {t("settings.ffmpeg.title")}
        </h3>
        <div className="flex items-center justify-between" style={{padding:"8px 0", borderBottom:"1px solid var(--border)"}}>
          <span className="text-sm">{t("settings.ffmpeg.status")}</span>
          {ffmpeg.available
            ? <span className="tag tag-green">{t("settings.ffmpeg.ok")} v{ffmpeg.version || ""}</span>
            : <span className="tag tag-red">{t("settings.ffmpeg.notFound")}</span>}
        </div>
        <div className="form-row" style={{marginTop: 12}}>
          <div className="label">{t("settings.ffmpeg.path")}</div>
          <div className="flex gap-2">
            <input className="input flex-1"
                   value={config.ffmpeg_path || ""}
                   onChange={e => updateField("ffmpeg_path", e.target.value)}
                   placeholder="ffmpeg" />
            <button className="btn btn-sm" onClick={async () => {
              await save({ ffmpeg_path: config.ffmpeg_path || "" });
              const r = await pluginApi("GET", "/ffmpeg/status");
              if (r.ok && r.body) { setFfmpeg(r.body); onFfmpegChange(r.body.available); }
            }}>{t("settings.ffmpeg.detect")}</button>
          </div>
        </div>
      </div>

      <div className="setting-section oa-settings-section">
        <h3 className="oa-settings-section__title">
          <span className="oa-icon"
                dangerouslySetInnerHTML={{__html: window.OpenAkitaIcons ? window.OpenAkitaIcons.settings() : ""}} />
          {t("settings.defaults.title")}
        </h3>
        <div className="grid-2">
          <div className="form-row">
            <div className="label">{t("settings.defaults.subtitle")}</div>
            <div className="flex items-center gap-2">
              <div className={`switch ${config.default_subtitle === "true" ? "on" : ""}`}
                   onClick={() => { const v = config.default_subtitle === "true" ? "false" : "true"; updateField("default_subtitle", v); save({ default_subtitle: v }); }}
                   style={{width:36,height:20,borderRadius:10,background:config.default_subtitle==="true"?"var(--primary)":"var(--border)",cursor:"pointer",position:"relative",transition:".2s"}}>
                <div style={{position:"absolute",top:2,left:config.default_subtitle==="true"?18:2,width:16,height:16,borderRadius:"50%",background:"#fff",transition:".2s"}} />
              </div>
            </div>
          </div>
          <div className="form-row">
            <div className="label">{t("settings.defaults.format")}</div>
            <select className="input select" value={config.default_output_format || "mp4"}
                    onChange={e => { updateField("default_output_format", e.target.value); save({ default_output_format: e.target.value }); }}>
              <option value="mp4">MP4</option>
              <option value="mkv">MKV</option>
            </select>
          </div>
        </div>
      </div>

      {storage && (
        <div className="setting-section oa-settings-section">
          <h3 className="oa-settings-section__title">
            <span className="oa-icon"
                  dangerouslySetInnerHTML={{__html: window.OpenAkitaIcons ? window.OpenAkitaIcons.folder() : ""}} />
            {t("settings.storage.title")}
          </h3>
          <div className="flex items-center justify-between" style={{padding:"8px 0", borderBottom:"1px solid var(--border)"}}>
            <span className="text-sm">{t("settings.storage.files")}</span>
            <span className="text-sm text-muted">{storage.total_files || 0}</span>
          </div>
          <div className="flex items-center justify-between" style={{padding:"8px 0"}}>
            <span className="text-sm">{t("settings.storage.size")}</span>
            <span className="text-sm text-muted">{((storage.total_bytes || 0) / 1048576).toFixed(1)} MB</span>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Error Boundary ───
class PluginErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { error: null, info: null };
  }
  static getDerivedStateFromError(error) { return { error }; }
  componentDidCatch(error, info) {
    this.setState({ info });
    console.error("[clip-sense] render error:", error, info);
  }
  reset = () => this.setState({ error: null, info: null });
  render() {
    if (!this.state.error) return this.props.children;
    const err = this.state.error;
    const stack = (err && err.stack) || String(err);
    const compStack = (this.state.info && this.state.info.componentStack) || "";
    const tr = (k) => _i18n.t(k);
    return (
      <div style={{padding: 24, maxWidth: 820, margin: "0 auto"}}>
        <div className="oa-config-banner" role="alert" style={{borderColor: "var(--danger)"}}>
          <span className="oa-icon oa-config-banner__icon" style={{color: "var(--danger)"}}
                dangerouslySetInnerHTML={{__html: window.OpenAkitaIcons ? window.OpenAkitaIcons.warning() : ""}} />
          <div className="oa-config-banner__text">
            <strong>{tr("err.title")}</strong>
            <div style={{fontSize: 12, color: "var(--text-muted)", marginTop: 4}}>
              {err && err.message ? err.message : String(err)}
            </div>
          </div>
          <button className="oa-config-banner__action" type="button" onClick={this.reset}>
            {tr("err.retry")}
          </button>
        </div>
        <details style={{marginTop: 16, fontSize: 12, color: "var(--text-muted)"}} open>
          <summary style={{cursor: "pointer", marginBottom: 8}}>{tr("err.stackLabel")}</summary>
          <pre style={{padding: 12, background: "var(--bg-card)", border: "1px solid var(--border)", borderRadius: 6, overflow: "auto", maxHeight: 240, whiteSpace: "pre-wrap", wordBreak: "break-word"}}>
{stack}
{compStack ? "\n--- React component stack ---" + compStack : ""}
          </pre>
        </details>
      </div>
    );
  }
}

// ─── Mount ───
console.log("[clip-sense] Mounting React app...");
try {
  window.__csRendered = true;
  ReactDOM.createRoot(document.getElementById("root")).render(
    <PluginErrorBoundary>
      <App />
    </PluginErrorBoundary>
  );
} catch (mountErr) {
  document.getElementById("root").innerHTML =
    '<div style="padding:24px;color:#ef4444"><b>[clip-sense mount error]</b><pre style="margin-top:8px;white-space:pre-wrap;font-size:11px">' +
    (mountErr && mountErr.stack ? mountErr.stack : String(mountErr)) + '</pre></div>';
}
if (window.OpenAkita && typeof window.OpenAkita.ready === "function") {
  window.OpenAkita.ready();
}
</script>

<script>
(function() {
  console.log("[clip-sense] Manual compile+execute starting...");
  var srcEl = document.getElementById("cs-jsx-source");
  if (!srcEl) { document.getElementById("root").innerHTML = '<div style="padding:24px;color:#ef4444"><b>Source element not found</b></div>'; return; }
  if (typeof Babel === "undefined") { document.getElementById("root").innerHTML = '<div style="padding:24px;color:#ef4444"><b>Babel not loaded (CDN issue?)</b></div>'; return; }
  if (typeof React === "undefined") { document.getElementById("root").innerHTML = '<div style="padding:24px;color:#ef4444"><b>React not loaded (CDN issue?)</b></div>'; return; }
  var code;
  try {
    var result = Babel.transform(srcEl.textContent, { presets: ["react"], filename: "clip-sense.jsx" });
    code = result.code;
    console.log("[clip-sense] Compilation OK (" + code.length + " chars)");
  } catch (compileErr) {
    console.error("[clip-sense] COMPILE ERROR:", compileErr);
    document.getElementById("root").innerHTML = '<div style="padding:24px;color:#ef4444;font-size:13px"><b>Babel Compilation Error</b><pre style="margin-top:12px;white-space:pre-wrap;font-size:12px;background:#fef2f2;padding:16px;border:1px solid #fecaca;border-radius:8px;overflow:auto;max-height:500px">' + (compileErr.stack || String(compileErr)) + '</pre></div>';
    return;
  }
  try {
    (0, eval)(code);
    console.log("[clip-sense] Execution OK");
  } catch (runErr) {
    console.error("[clip-sense] RUNTIME ERROR:", runErr);
    document.getElementById("root").innerHTML = '<div style="padding:24px;color:#ef4444;font-size:13px"><b>Runtime Error</b><pre style="margin-top:12px;white-space:pre-wrap;font-size:12px;background:#fef2f2;padding:16px;border:1px solid #fecaca;border-radius:8px;overflow:auto;max-height:500px">' + (runErr.stack || String(runErr)) + '</pre></div>';
  }
})();
</script>
</body>

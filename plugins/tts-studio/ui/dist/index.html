<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 配音工坊</title>
  <link rel="stylesheet" href="/api/plugins/_sdk/ui-kit/styles.css">
  <script src="/api/plugins/_sdk/bootstrap.js"></script>
  <script src="/api/plugins/_sdk/ui-kit/icons.js"></script>
  <script src="/api/plugins/_sdk/ui-kit/i18n.js"></script>
  <script src="/api/plugins/_sdk/ui-kit/event-helpers.js"></script>
  <script src="/api/plugins/_sdk/ui-kit/error-coach.js"></script>
  <script src="/api/plugins/_sdk/ui-kit/task-panel.js"></script>
  <script src="/api/plugins/_sdk/ui-kit/onboard-wizard.js"></script>
  <script src="/api/plugins/_sdk/ui-kit/first-success-celebrate.js"></script>
  <script src="/api/plugins/_sdk/ui-kit/dep-gate.js"></script>
  <style>
    body { padding: 16px; }
    h1 { margin:0 0 6px; font-size: 22px; display: inline-flex; align-items: center; gap: 10px; }
    h1 .oa-icon { width: 22px; height: 22px; color: var(--oa-primary); }
    h3 { display: inline-flex; align-items: center; gap: 8px; }
    h3 .oa-icon { width: 16px; height: 16px; color: var(--oa-text-muted); }
    .header-tip { color: var(--oa-text-muted); font-size: 12px; margin-bottom: 16px; }
    table { width:100%; border-collapse: collapse; font-size: 13px; }
    table th, table td { border: 1px solid var(--oa-border); padding: 6px 8px; }
  </style>
</head>
<body>
  <h1>
    <span class="oa-icon" data-icon="mic"></span>
    <span data-i18n="header.title"></span>
  </h1>
  <div class="header-tip" data-i18n="header.tip"></div>

  <!-- Dependency gate: ffmpeg is required for concatenating audio segments -->
  <div data-oa-dep="ffmpeg"></div>

  <div class="oa-card">
    <h3>
      <span class="oa-icon" data-icon="edit"></span>
      <span data-i18n="card.script.title"></span>
    </h3>
    <textarea id="script" class="oa-textarea" rows="10" data-i18n-placeholder="card.script.placeholder"></textarea>
    <div class="oa-grid cols-2" style="margin-top:6px">
      <div>
        <label class="oa-label" data-i18n="form.title"></label>
        <input id="title" class="oa-input" data-i18n-value="form.title.default">
      </div>
      <div>
        <label class="oa-label" data-i18n="form.defVoice"></label>
        <select id="defVoice" class="oa-input"></select>
      </div>
    </div>
    <div class="oa-row" style="margin-top:8px">
      <button class="oa-btn" id="previewBtn" data-i18n="actions.preview"></button>
      <button class="oa-btn oa-btn-primary" id="goBtn" data-i18n="actions.go"></button>
    </div>
    <div id="errorBox" style="margin-top:10px"></div>
  </div>

  <div id="previewCard" class="oa-card" style="display:none">
    <h3 data-i18n="preview.title"></h3>
    <table id="previewTable">
      <thead><tr>
        <th>#</th>
        <th data-i18n="preview.th.speaker"></th>
        <th data-i18n="preview.th.text"></th>
        <th data-i18n="preview.th.voice"></th>
      </tr></thead>
      <tbody></tbody>
    </table>
    <div style="margin-top:6px;font-size:12px;color:var(--oa-text-muted)" data-i18n="preview.hint"></div>
  </div>

  <h3 style="margin: 18px 0 8px" data-i18n="tasks.title"></h3>
  <div id="tasks"></div>

<script>
  OpenAkitaI18n.register({
    zh: {
      "header.title": "AI 配音工坊",
      "header.tip": "写一份对话稿（“A: 你好”、“B: 再见”），自动给每个角色配不同声音并合成完整音频。",
      "card.script.title": "对话稿",
      "card.script.placeholder": "A: 你好，今天天气真好。\nB: 是啊，我们出去走走？\nA: 好，老地方见。",
      "form.title": "标题",
      "form.title.default": "未命名",
      "form.defVoice": "默认声音 (无角色映射时使用)",
      "actions.preview": "预览分段",
      "actions.go": "开始合成",
      "preview.title": "预览分段",
      "preview.th.speaker": "说话人",
      "preview.th.text": "文本",
      "preview.th.voice": "声音",
      "preview.hint": "想给某个角色换声音？回到上面修改对话稿即可。",
      "tasks.title": "最近的任务",
      "err.preview.fail": "预览失败",
      "err.create.fail": "创建失败",
      "result.title": "合成完成",
      "actions.download": "下载",
      "onboard.q": "你想合成什么？",
      "onboard.opt.pod": "播客双人对话",
      "onboard.opt.audio": "有声小说",
      "onboard.opt.edu": "教学剧本",
      "onboard.opt.other": "其他",
      "success.title": "合成出炉啦！",
      "rec.highlight": "配到视频里",
      "rec.translator": "翻译成多语言版本"
    },
    en: {
      "header.title": "TTS Studio",
      "header.tip": "Write a dialogue script (“A: hello”, “B: bye”) and we voice each speaker differently and stitch them into one audio.",
      "card.script.title": "Dialogue script",
      "card.script.placeholder": "A: Hello, the weather is nice today.\nB: Indeed, want to go for a walk?\nA: Sure, see you at the usual spot.",
      "form.title": "Title",
      "form.title.default": "Untitled",
      "form.defVoice": "Default voice (used when no speaker mapping)",
      "actions.preview": "Preview segments",
      "actions.go": "Start synthesis",
      "preview.title": "Preview segments",
      "preview.th.speaker": "Speaker",
      "preview.th.text": "Text",
      "preview.th.voice": "Voice",
      "preview.hint": "Want to change a voice? Edit the script above.",
      "tasks.title": "Recent tasks",
      "err.preview.fail": "Preview failed",
      "err.create.fail": "Failed to create task",
      "result.title": "Synthesis done",
      "actions.download": "Download",
      "onboard.q": "What do you want to synthesize?",
      "onboard.opt.pod": "Two-person podcast",
      "onboard.opt.audio": "Audiobook",
      "onboard.opt.edu": "Tutorial script",
      "onboard.opt.other": "Other",
      "success.title": "Synthesis is out!",
      "rec.highlight": "Layer it onto a video",
      "rec.translator": "Translate to other languages"
    }
  });
  const T = (k, vars) => OpenAkitaI18n.t(k, vars);

  document.querySelectorAll("[data-icon]").forEach(function (el) {
    var name = el.dataset.icon;
    var fn = window.OpenAkitaIcons && window.OpenAkitaIcons[name];
    if (fn) el.innerHTML = fn();
  });
  OpenAkitaI18n.bindDom(document.body);

  const apiBase = (OpenAkita.meta && OpenAkita.meta.apiBase) || '';
  const api = (path, opts) => fetch(apiBase + path, opts).then(r => r.json().then(j => ({ ok: r.ok, status: r.status, body: j })));
  const $ = (id) => document.getElementById(id);
  let lastTaskId = null;

  OnboardWizard.askOnce({
    storageKey: 'tts-studio:audience',
    question: T('onboard.q'),
    options: [
      { id: 'pod',   label: T('onboard.opt.pod')   },
      { id: 'audio', label: T('onboard.opt.audio') },
      { id: 'edu',   label: T('onboard.opt.edu')   },
      { id: 'other', label: T('onboard.opt.other') },
    ],
  });

  api('/voices').then(r => {
    const sel = $('defVoice'); sel.innerHTML = '';
    ((r.body && r.body.presets) || []).forEach(v => {
      const o = document.createElement('option'); o.value = v.id; o.textContent = v.label;
      sel.appendChild(o);
    });
  });

  $('previewBtn').addEventListener('click', async () => {
    $('errorBox').innerHTML = '';
    const r = await api('/preview', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ script: $('script').value, title: $('title').value, default_voice: $('defVoice').value })});
    if (!r.ok) { ErrorCoach.mount('#errorBox', r.body.detail || { problem: T('err.preview.fail') }); return; }
    const tbody = $('previewTable').querySelector('tbody');
    tbody.innerHTML = '';
    ((r.body && r.body.segments) || []).forEach(s => {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${s.index}</td><td>${escapeHtml(s.speaker)}</td><td>${escapeHtml(s.text)}</td><td>${escapeHtml(s.voice)}</td>`;
      tbody.appendChild(tr);
    });
    $('previewCard').style.display = 'block';
  });

  function escapeHtml(s) { return (s || '').toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  $('goBtn').addEventListener('click', async () => {
    $('errorBox').innerHTML = '';
    const r = await api('/tasks', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ script: $('script').value, title: $('title').value, default_voice: $('defVoice').value })});
    if (!r.ok) { ErrorCoach.mount('#errorBox', r.body.detail || { problem: T('err.create.fail') }); return; }
    lastTaskId = r.body.task_id;
    taskPanel.refresh();
  });

  const taskPanel = new TaskPanel({ root: '#tasks', apiBase, tasksPath: '/tasks', cancelPath: '/tasks/{id}/cancel' });
  taskPanel.start();

  OpenAkita.onEvent('task_updated', (data) => {
    taskPanel.refresh();
    if (data && data.status === 'succeeded' && data.id === lastTaskId) {
      const url = apiBase + '/tasks/' + data.id + '/audio';
      const div = document.createElement('div');
      div.className = 'oa-card';
      div.innerHTML = `<h3>${T('result.title')}</h3><audio controls src="${url}" style="width:100%"></audio>
        <div class="oa-row" style="margin-top:6px"><a class="oa-btn" href="${url}" download>${T('actions.download')}</a></div>`;
      $('errorBox').innerHTML = '';
      $('errorBox').appendChild(div);
      FirstSuccessCelebrate.maybeFire({
        storageKey: 'tts-studio:firstSuccess',
        title: T('success.title'),
        recommendations: [
          { id: 'highlight-cutter', label: T('rec.highlight') },
          { id: 'video-translator', label: T('rec.translator') },
        ],
        onRecommend: (id) => OpenAkita.navigate('plugin-app:' + id),
      });
    }
  });
</script>
</body>
</html>

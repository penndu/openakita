// ── Tasks Tab ───────────────────────────────────────────────────────

function TasksTab({ onOpenStoryboard }) {
  const [tasks, setTasks] = useState([]);
  // `loading` 只在「首次进入页面」和「用户主动点刷新」时为 true，会让整个列表
  // 被替换成 spinner —— 这是预期内的强反馈。
  // `refreshing` 用于 SSE 推送 / HTTP 兜底轮询触发的静默后台刷新，只在「刷新任务」
  // 按钮上转一下小圈，不卸载列表，避免每隔几秒整张列表闪一下（P8.2 修复）。
  const [loading, setLoading] = useState(true);
  const [refreshing, setRefreshing] = useState(false);
  const [selectedId, setSelectedId] = useState("");
  const [statusFilter, setStatusFilter] = useState("all");
  const [modeFilter, setModeFilter] = useState("all");
  const [actionBusy, setActionBusy] = useState({});

  const refresh = useCallback(async (opts) => {
    // 注意：button 的 onClick 会把 SyntheticEvent 当成第一个参数传进来，
    // 因此只接受「显式对象 + 非事件」时才识别 opts。
    const silent = !!(opts && typeof opts === "object" && !opts.nativeEvent && opts.silent);
    if (silent) {
      setRefreshing(true);
    } else {
      setLoading(true);
    }
    try {
      const r = await api("GET", "/tasks?limit=100");
      setTasks(r.tasks || []);
    } finally {
      if (silent) {
        setRefreshing(false);
      } else {
        setLoading(false);
      }
    }
  }, []);

  const runAction = useCallback(async (taskId, action) => {
    if (!taskId || !action) return;
    setActionBusy((prev) => ({ ...prev, [taskId]: action }));
    try {
      if (action === "delete") {
        if (!window.confirm(`确认删除任务 ${taskId}？相关本地文件不会被删除。`)) return;
        await api("DELETE", `/tasks/${taskId}`);
      } else if (action === "cancel") {
        await api("POST", `/tasks/${taskId}/cancel`);
      } else if (action === "retry") {
        await api("POST", `/tasks/${taskId}/retry`);
      } else if (action === "approve") {
        // P11: awaiting_approval 状态的任务点「批准」直接调专用端点，
        // 后端会保留同一个 task_id、把 cost_approved 标 true 后重启 pipeline。
        // 不需要再弹 confirm —— 用户主动点这个按钮就已经是确认动作了。
        await api("POST", `/tasks/${taskId}/approve`);
      }
      await refresh();
    } catch (e) {
      alert(`操作失败：${e.message}`);
    } finally {
      setActionBusy((prev) => {
        const next = { ...prev };
        delete next[taskId];
        return next;
      });
    }
  }, [refresh]);

  useEffect(() => {
    refresh();
    let sse = null;
    let reconnectTimer = null;
    let stopped = false;

    const onTaskEvt = () => refresh({ silent: true });

    const connect = () => {
      if (stopped) return;
      try {
        sse = new EventSource(apiBase() + "/sse");
        sse.addEventListener("task_update", onTaskEvt);
        sse.addEventListener("chain_update", onTaskEvt);
        sse.onerror = () => {
          // P8.1: SSE 断了别让列表永远停滞，3 秒后重连一次。
          // EventSource 在 disconnect 时会自己重试，但 onerror 触发说明
          // 上一次 connect 出错（如组织重启）——主动 close + 重连可以更快
          // 把界面状态恢复到正常。
          try { sse && sse.close(); } catch (_) {}
          sse = null;
          if (stopped) return;
          if (reconnectTimer) clearTimeout(reconnectTimer);
          reconnectTimer = setTimeout(connect, 3000);
        };
      } catch (_) {
        if (stopped) return;
        if (reconnectTimer) clearTimeout(reconnectTimer);
        reconnectTimer = setTimeout(connect, 3000);
      }
    };
    connect();

    return () => {
      stopped = true;
      if (reconnectTimer) clearTimeout(reconnectTimer);
      try { sse && sse.close(); } catch (_) {}
    };
  }, [refresh]);

  // P8.1: HTTP 兜底轮询。SSE 事件有时会丢（网络抖动 / 反代 buffer / 浏览器后台
  // 节流），但已经在跑的任务不该让用户面对"永远生成中"。只在还有未终态任务时
  // 每 4 秒主动拉一次，全部 终态后停止 — 静默列表不会带来后端压力。
  useEffect(() => {
    const hasActive = tasks.some((t) => {
      const s = String(t.status || "").toLowerCase();
      return s === "pending" || s === "running" || s === "processing" || s === "submitted";
    });
    if (!hasActive) return;
    const id = setInterval(() => { refresh({ silent: true }); }, 4000);
    return () => clearInterval(id);
  }, [tasks, refresh]);

  useEffect(() => {
    if (!selectedId && tasks.length > 0) setSelectedId(taskIdOf(tasks[0]));
  }, [tasks, selectedId]);

  const selectedTask = useTaskHeartbeat(selectedId);
  const modeFilters = useMemo(() => {
    const known = [
      ["image_text2img", "文生图"],
      ["image_edit", "图像编辑"],
      ["image_style_repaint", "风格重绘"],
      ["image_background", "背景生成"],
      ["image_outpaint", "画面扩展"],
      ["image_sketch", "涂鸦作画"],
      ["image_ecommerce", "电商图"],
      ["t2v", "文生视频"],
      ["i2v", "图生视频"],
      ["i2v_end", "首尾帧"],
      ["r2v", "参考视频"],
      ["video_extend", "视频续写"],
      ["video_edit", "视频编辑"],
      ["photo_speak", "照片说话"],
      ["video_relip", "视频换嘴"],
      ["video_reface", "视频换人"],
      ["pose_drive", "动作驱动"],
      ["avatar_compose", "数字人合成"],
      ["long_video", "分镜长视频"],
      ["long_video_concat", "完整长视频"],
    ];
    const labels = new Map(known);
    for (const task of tasks) {
      const mode = task.mode || "";
      // Roll storyboard_decompose under the existing 分镜长视频 chip so it
      // doesn't show up as a separate auto-discovered filter button.
      if (STORYBOARD_TASK_MODES.has(mode)) continue;
      if (mode && !labels.has(mode)) labels.set(mode, mode);
    }
    return Array.from(labels.entries());
  }, [tasks]);
  const modeLabelMap = useMemo(() => new Map(modeFilters), [modeFilters]);
  const visibleTasks = useMemo(
    () => tasks.filter((t) => {
      const status = t.status || "";
      const statusOk =
        statusFilter === "all" ||
        status === statusFilter ||
        (statusFilter === "running" && ["processing", "running"].includes(status)) ||
        (statusFilter === "completed" && ["succeeded", "done", "completed"].includes(status));
      // The "分镜长视频" chip filters BOTH the storyboard draft task
      // (storyboard_decompose) and the long-video chain root (long_video).
      const modeOk =
        modeFilter === "all" ||
        t.mode === modeFilter ||
        (modeFilter === "long_video" && STORYBOARD_TASK_MODES.has(t.mode));
      return statusOk && modeOk;
    }),
    [tasks, statusFilter, modeFilter]
  );
  const statusFilters = [
    ["all", "全部"],
    ["pending", "排队中"],
    ["running", "处理中"],
    ["completed", "已完成"],
    ["failed", "失败"],
    ["cancelled", "已取消"],
  ];
  useEffect(() => {
    if (!visibleTasks.length) return;
    if (!visibleTasks.some((t) => taskIdOf(t) === selectedId)) {
      setSelectedId(taskIdOf(visibleTasks[0]));
    }
  }, [visibleTasks, selectedId]);
  const selectedVisible = visibleTasks.some((t) => taskIdOf(t) === selectedId);

  return (
    <div className="split-layout workbench-layout">
      <div className="split-left oa-list-panel task-list-panel">
        <div className="task-panel-head">
          <div>
            <h2 className="page-title">
              <Icon name="list" /> 任务列表
            </h2>
            <p className="page-subtitle">筛选左侧任务，点击后在右侧查看生成进度、视频和参数。</p>
          </div>
        </div>

        <div className="task-filter-box">
          <div className="filter-group">
            <div className="filter-group__label">状态</div>
            <div className="filter-group__buttons">
              {statusFilters.map(([value, label]) => (
                <button
                  key={value}
                  className={"mode-btn" + (statusFilter === value ? " active" : "")}
                  onClick={() => setStatusFilter(value)}
                >
                  {label}
                </button>
              ))}
            </div>
          </div>
          <div className="filter-group">
            <div className="filter-group__label">模式</div>
            <div className="filter-group__buttons">
              <button
                className={"mode-btn" + (modeFilter === "all" ? " active" : "")}
                onClick={() => setModeFilter("all")}
              >
                全部模式
              </button>
              {modeFilters.map(([m, label]) => (
                <button
                  key={m}
                  className={"mode-btn" + (modeFilter === m ? " active" : "")}
                  onClick={() => setModeFilter(m)}
                >
                  {label}
                </button>
              ))}
            </div>
          </div>
          <div className="task-filter-actions">
            <button
              className="btn btn-ghost btn-sm"
              onClick={() => refresh()}
              disabled={loading || refreshing}
            >
              {loading || refreshing ? <Spinner /> : <Icon name="refresh" size={12} />} 刷新任务
            </button>
            <span>共 {tasks.length} 个任务，当前显示 {visibleTasks.length} 个</span>
          </div>
        </div>

        {loading ? (
          <div className="task-list-loading"><Spinner /> 正在加载任务…</div>
        ) : tasks.length === 0 ? (
          <Empty icon="inbox" title="暂无任务" hint="到「创建」页提交第一个任务" />
        ) : visibleTasks.length === 0 ? (
          <Empty icon="inbox" title="没有匹配任务" hint="调整上方筛选条件查看其他任务" />
        ) : (
          <div className="task-list">
            {visibleTasks.map((t) => {
              const tid = taskIdOf(t);
              const video = taskVideoUrl(t);
              const images = taskImageUrls(t);
              const status = t.status || "";
              const canCancel = ["pending", "queued", "awaiting_approval", "running", "processing"].includes(status);
              const canRetry = ["failed", "timeout", "cancelled"].includes(status);
              // P11: 等待批准的任务给一个明确的「批准并继续」按钮，避免和
              // pending 视觉混在一起。这种任务的 cost_breakdown 已经写进
              // cost_breakdown_json，但鼠标 hover 时通过 title 提示摘要够用了。
              const canApprove = status === "awaiting_approval";
              const approvalSummary = canApprove && t.cost_breakdown
                ? `预估成本 ${t.cost_breakdown.formatted_total || ""}，已超过阈值 ¥${Number(t.cost_breakdown.threshold || 0).toFixed(2)}`
                : "";
              const busyAction = actionBusy[tid];
              const title = taskDisplayTitle(t, modeLabelMap);
              const summary = taskPromptSummary(t, t.model_id || tid);
              const subtitle = taskDisplaySubtitle(t);
              return (
                <div
                  key={tid}
                  className={"task-card" + (selectedId === tid ? " selected" : "")}
                >
                  <button
                    type="button"
                    className="task-card__main"
                    onClick={() => setSelectedId(tid)}
                  >
                    <div className="task-thumb">
                      {video ? <video src={video} muted /> : images.length ? <img src={images[0]} alt="" /> : <Icon name="film" size={20} />}
                    </div>
                    <div className="task-info">
                      <div className="task-info-head">
                        <strong>{title}</strong>
                      </div>
                      <div className="task-card-prompt">{summary}</div>
                      <div className="task-meta">
                        <span className="font-mono">{subtitle}</span>
                        <span>{formatTaskTime(t.created_at)}</span>
                      </div>
                    </div>
                  </button>
                  <div className="task-card__side" onClick={(e) => e.stopPropagation()}>
                    <TaskStatusBadge status={status} />
                    <div className="task-card__actions">
                      {canApprove && (
                        <button
                          type="button"
                          className="btn btn-sm"
                          disabled={!!busyAction}
                          onClick={() => runAction(tid, "approve")}
                          title={approvalSummary || "批准成本并继续生成"}
                        >
                          {busyAction === "approve" ? <Spinner /> : <Icon name="check" size={12} />} 批准并继续
                        </button>
                      )}
                      {canCancel && (
                        <button
                          type="button"
                          className="btn btn-sm btn-ghost"
                          disabled={!!busyAction}
                          onClick={() => runAction(tid, "cancel")}
                          title="取消运行中的任务"
                        >
                          {busyAction === "cancel" ? <Spinner /> : <Icon name="x" size={12} />} 取消
                        </button>
                      )}
                      {canRetry && (
                        <button
                          type="button"
                          className="btn btn-sm btn-ghost"
                          disabled={!!busyAction}
                          onClick={() => runAction(tid, "retry")}
                          title="按相同参数重新提交"
                        >
                          {busyAction === "retry" ? <Spinner /> : <Icon name="refresh" size={12} />} 重试
                        </button>
                      )}
                      <button
                        type="button"
                        className="btn btn-sm btn-ghost"
                        disabled={!!busyAction}
                        onClick={() => runAction(tid, "delete")}
                        title="从列表中删除（不会删除本地文件）"
                      >
                        {busyAction === "delete" ? <Spinner /> : <Icon name="trash" size={12} />} 删除
                      </button>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
        <div className="oa-list-panel__footer">
          共 {tasks.length} 个任务 · 当前显示 {visibleTasks.length} 个
        </div>
      </div>

      <TaskPreviewPane
        taskId={selectedVisible ? selectedId : ""}
        task={selectedVisible ? selectedTask : null}
        onOpenStoryboard={onOpenStoryboard}
        showCost={false}
      />
    </div>
  );
}

// ── Storyboard / Long-Video Tab ─────────────────────────────────────

function StoryboardTab({ catalog, onGoTasks }) {
  const initialStoryboardDraftRef = useRef(null);
  if (initialStoryboardDraftRef.current === null) {
    initialStoryboardDraftRef.current = readStoryboardDraft();
  }
  const initialStoryboardDraft = initialStoryboardDraftRef.current || {};
  const validSteps = new Set(["outline", "segments", "progress", "result"]);
  const [story, setStory] = useState(initialStoryboardDraft.story || "");
  const [totalDuration, setTotalDuration] = useState(Number(initialStoryboardDraft.totalDuration) || 60);
  const [segDuration, setSegDuration] = useState(Number(initialStoryboardDraft.segDuration) || 10);
  const [segments, setSegments] = useState(Array.isArray(initialStoryboardDraft.segments) ? initialStoryboardDraft.segments : []);
  const [busy, setBusy] = useState(false);
  const [model, setModel] = useState(initialStoryboardDraft.model || "happyhorse-1.0-i2v");
  const [chainMode, setChainMode] = useState(initialStoryboardDraft.chainMode || "serial");
  const [activeStep, setActiveStep] = useState(validSteps.has(initialStoryboardDraft.activeStep) ? initialStoryboardDraft.activeStep : "outline");
  const [chainGroupId, setChainGroupId] = useState(initialStoryboardDraft.chainGroupId || "");
  const [chainTasks, setChainTasks] = useState([]);
  const [concatResult, setConcatResult] = useState("");
  const [concatResultMeta, setConcatResultMeta] = useState(null);
  const [concatBusy, setConcatBusy] = useState(false);
  const [lastLongVideoSignature, setLastLongVideoSignature] = useState(initialStoryboardDraft.lastLongVideoSignature || "");
  const [lastStoryboardDecomposeSignature, setLastStoryboardDecomposeSignature] = useState(initialStoryboardDraft.lastStoryboardDecomposeSignature || "");
  const [storyboardDecomposeTaskId, setStoryboardDecomposeTaskId] = useState(initialStoryboardDraft.storyboardDecomposeTaskId || "");
  const [decomposeStatus, setDecomposeStatus] = useState(null);
  const [decomposeDialogOpen, setDecomposeDialogOpen] = useState(false);
  const [chainCancelBusy, setChainCancelBusy] = useState(false);
  const appliedStoryboardTaskRef = useRef("");
  const storyboardDecomposeTask = useTaskHeartbeat(storyboardDecomposeTaskId);

  const modelOptions = (catalog?.models || []).filter((m) => m.mode === "i2v");
  const segmentTasks = chainTasks
    .filter((t) => t.mode !== "long_video")
    .sort((a, b) => {
      const ai = taskSegmentIndex(a, Number.MAX_SAFE_INTEGER) || Number.MAX_SAFE_INTEGER;
      const bi = taskSegmentIndex(b, Number.MAX_SAFE_INTEGER) || Number.MAX_SAFE_INTEGER;
      if (ai !== bi) return ai - bi;
      return Number(a.created_at || 0) - Number(b.created_at || 0);
    });
  const completedTasks = segmentTasks.filter((t) => ["succeeded", "done", "completed", "downloaded"].includes(t.status));
  const chainDone = segmentTasks.length > 0 && completedTasks.length === segmentTasks.length;
  const chainHasFailure = chainTasks.some((t) => ["failed", "timeout", "cancelled", "canceled"].includes(t.status));
  const chainHasActiveTasks = chainTasks.some((t) => ["pending", "queued", "running", "processing"].includes(t.status));

  const addSegment = () => {
    const nextIndex = segments.length + 1;
    setSegments((prev) => [
      ...prev,
      {
        index: nextIndex,
        duration: segDuration,
        prompt: "",
        transition_to_next: "cut",
      },
    ]);
    setActiveStep("segments");
  };

  const updateSegment = (index, patch) => {
    setSegments((prev) => prev.map((s, i) => (i === index ? { ...s, ...patch } : s)));
  };

  const removeSegment = (index) => {
    setSegments((prev) => prev.filter((_, i) => i !== index).map((s, i) => ({ ...s, index: i + 1 })));
  };

  const resetStoryboardRun = () => {
    const ok = window.confirm(
      "要重置当前页面流程吗？\n\n这只会清空本页追踪的 chain_group，已生成的任务和视频不会删除，也不会中止后台任务。"
    );
    if (!ok) return;
    setChainGroupId("");
    setChainTasks([]);
    setConcatResult("");
    setConcatResultMeta(null);
    setLastLongVideoSignature("");
    setActiveStep(segments.length ? "progress" : "segments");
  };

  const cancelStoryboardRun = async () => {
    if (!chainGroupId) return;
    const ok = window.confirm(
      "确认中止当前分镜视频生成吗？\n\n正在排队或运行的分段任务会被标记为已取消，已完成的视频片段会保留。"
    );
    if (!ok) return;
    setChainCancelBusy(true);
    try {
      await api("POST", `/long-video/chains/${encodeURIComponent(chainGroupId)}/cancel`);
      await refreshChainTasks(chainGroupId);
    } catch (e) {
      alert(`中止失败：${e.message || e}`);
    } finally {
      setChainCancelBusy(false);
    }
  };

  const refreshChainTasks = useCallback(async (groupId = chainGroupId) => {
    if (!groupId) return;
    try {
      const r = await api("GET", `/tasks?chain_group_id=${encodeURIComponent(groupId)}&limit=100`);
      setChainTasks(r.tasks || []);
    } catch (_) {}
  }, [chainGroupId]);

  useEffect(() => {
    if (!chainGroupId) return;
    refreshChainTasks(chainGroupId);
    const timer = setInterval(() => refreshChainTasks(chainGroupId), 3000);
    return () => clearInterval(timer);
  }, [chainGroupId, refreshChainTasks]);

  useEffect(() => {
    writeStoryboardDraft({
      story,
      totalDuration,
      segDuration,
      segments,
      model,
      chainMode,
      activeStep,
      chainGroupId,
      lastLongVideoSignature,
      lastStoryboardDecomposeSignature,
      storyboardDecomposeTaskId,
    });
  }, [story, totalDuration, segDuration, segments, model, chainMode, activeStep, chainGroupId, lastLongVideoSignature, lastStoryboardDecomposeSignature, storyboardDecomposeTaskId]);

  useEffect(() => {
    if (chainGroupId) return;
    let cancelled = false;
    const recoverChain = async () => {
      try {
        const active = await api("GET", "/long-video/active-chains");
        const running = (active.chains || []).find((c) => c.chain_group_id);
        if (!cancelled && running?.chain_group_id) {
          setChainGroupId(running.chain_group_id);
          setActiveStep("progress");
          return;
        }
      } catch (_) {}
      try {
        const recent = await api("GET", "/tasks?limit=100");
        const activeStatuses = new Set(["pending", "queued", "running", "processing"]);
        const row = (recent.tasks || []).find((t) => t.chain_group_id && activeStatuses.has(t.status));
        if (!cancelled && row?.chain_group_id) {
          setChainGroupId(row.chain_group_id);
          setActiveStep("progress");
        }
      } catch (_) {}
    };
    recoverChain();
    return () => {
      cancelled = true;
    };
  }, [chainGroupId]);

  const longVideoSubmitBody = useMemo(() => ({
    segments,
    model_id: model,
    mode: chainMode,
  }), [segments, model, chainMode]);
  const currentLongVideoSignature = useMemo(
    () => contentFingerprint("longvideo", longVideoSubmitBody),
    [longVideoSubmitBody]
  );
  const duplicateLongVideoSubmit = lastLongVideoSignature === currentLongVideoSignature && !chainHasFailure;
  const storyboardDecomposeBody = useMemo(() => ({
    story,
    total_duration: totalDuration,
    segment_duration: segDuration,
  }), [story, totalDuration, segDuration]);
  const currentStoryboardDecomposeSignature = useMemo(
    () => contentFingerprint("storyboard_decompose", storyboardDecomposeBody),
    [storyboardDecomposeBody]
  );
  const duplicateStoryboardDecompose =
    lastStoryboardDecomposeSignature === currentStoryboardDecomposeSignature;

  useEffect(() => {
    const snap = storyboardManager.snapshot();
    setBusy(snap.busy);
    if (snap.status) setDecomposeStatus(snap.status);
    return storyboardManager.subscribe((state) => {
      if (!state) return;
      if (typeof state.busy === "boolean") setBusy(state.busy);
      setDecomposeStatus({ kind: state.kind, text: state.text });
      if (state.taskId || state.kind === "info") setDecomposeDialogOpen(true);
      if (state.taskId) setStoryboardDecomposeTaskId(state.taskId);
      if (state.signature && state.kind !== "danger") {
        setLastStoryboardDecomposeSignature(state.signature);
      }
      if (Array.isArray(state.segments) && state.segments.length) {
        setSegments(state.segments);
        setActiveStep((prev) => (prev === "outline" ? "segments" : prev));
      }
    });
  }, []);

  useEffect(() => {
    if (storyboardDecomposeTaskId) return;
    let cancelled = false;
    const recoverDecomposeTask = async () => {
      try {
        const r = await api("GET", "/tasks?limit=100");
        const rows = (r.tasks || []).filter((t) => t.mode === "storyboard_decompose");
        const matched = rows.find((t) => {
          const params = taskParams(t);
          return (
            String(params.story || "") === String(story || "") &&
            Number(params.total_duration || 0) === Number(totalDuration || 0) &&
            Number(params.segment_duration || 0) === Number(segDuration || 0)
          );
        });
        const tid = taskIdOf(matched);
        if (!cancelled && tid) setStoryboardDecomposeTaskId(tid);
      } catch (_) {}
    };
    recoverDecomposeTask();
    return () => {
      cancelled = true;
    };
  }, [storyboardDecomposeTaskId, story, totalDuration, segDuration]);

  const decompose = () => {
    if (!story.trim() || busy || duplicateStoryboardDecompose) return;
    setDecomposeDialogOpen(true);
    storyboardManager.start({
      story,
      total_duration: totalDuration,
      segment_duration: segDuration,
      signature: currentStoryboardDecomposeSignature,
    });
  };

  useEffect(() => {
    if (!storyboardDecomposeTask || storyboardDecomposeTask.mode !== "storyboard_decompose") return;
    const taskStatus = storyboardDecomposeTask.status || "";
    const params = taskParams(storyboardDecomposeTask);
    const taskSegments = Array.isArray(params.segments) ? params.segments : [];
    if (["succeeded", "done", "completed"].includes(taskStatus) && taskSegments.length) {
      const tid = taskIdOf(storyboardDecomposeTask);
      if (appliedStoryboardTaskRef.current === tid) return;
      appliedStoryboardTaskRef.current = tid;
      const nextSegments = taskSegments.map((seg, idx) => ({
        ...seg,
        index: seg.index || idx + 1,
        transition_to_next: normalizeStoryboardTransition(seg.transition_to_next),
      }));
      setSegments(nextSegments);
      setActiveStep((prev) => (prev === "outline" ? "segments" : prev));
      setDecomposeStatus({
        kind: "success",
        text: `分镜草稿已完成，共 ${nextSegments.length} 段，已同步到「编辑分镜」。`,
      });
      const existing = readStoryboardDraft();
      writeStoryboardDraft({
        ...existing,
        story: params.story || story,
        totalDuration: params.total_duration || totalDuration,
        segDuration: params.segment_duration || segDuration,
        segments: nextSegments,
        activeStep: activeStep === "outline" ? "segments" : activeStep,
        storyboardDecomposeTaskId,
        lastStoryboardDecomposeSignature,
      });
      return;
    }
    if (["failed", "timeout", "cancelled", "canceled"].includes(taskStatus)) {
      setDecomposeStatus({
        kind: "danger",
        text: storyboardDecomposeTask.error_message || "分镜草稿任务失败，请查看任务详情后修改大纲重试。",
      });
      return;
    }
    if (["pending", "queued", "running", "processing"].includes(taskStatus)) {
      setDecomposeStatus({
        kind: "info",
        text: "分镜草稿任务正在后台生成，可在「任务」Tab 查看进度。",
      });
    }
  }, [storyboardDecomposeTask, storyboardDecomposeTaskId, story, totalDuration, segDuration, activeStep, lastStoryboardDecomposeSignature]);

  const submit = async () => {
    if (!segments.length) {
      alert("请先生成或手动添加至少一个分镜");
      return;
    }
    if (duplicateLongVideoSubmit) {
      alert("长视频分镜内容没有变化，不能重复提交。请修改分镜、模型或串接方式后再提交。");
      return;
    }
    // Parallel mode renders all segments simultaneously, which means
    // none of them can chain on the previous segment's last frame. Warn
    // up front so users aren't surprised by visual discontinuity in the
    // final concat — the only segment that respects ``first_frame_url``
    // is segment #1.
    if (chainMode === "parallel" && segments.length > 1) {
      const ok = window.confirm(
        "并行模式会同时生成所有分段，分段之间无法用上一段的尾帧驱动，画面可能出现风格跳变。\n\n" +
        "如需保证视觉连贯，请改用「串行」模式。是否仍然以并行模式提交？"
      );
      if (!ok) return;
    }
    setBusy(true);
    try {
      const r = await api("POST", "/long-video/create", longVideoSubmitBody);
      setChainGroupId(r.chain_group_id || "");
      setChainTasks([]);
      setConcatResult("");
      setConcatResultMeta(null);
      setActiveStep("progress");
      setLastLongVideoSignature(currentLongVideoSignature);
      if (r.chain_group_id) refreshChainTasks(r.chain_group_id);
    } catch (e) {
      alert(`提交失败：${e.message}`);
    } finally {
      setBusy(false);
    }
  };

  const concat = async () => {
    const taskIds = completedTasks.map(taskIdOf).filter(Boolean);
    if (taskIds.length < 2) {
      alert("至少需要 2 段已完成视频才能拼接");
      return;
    }
    setConcatBusy(true);
    try {
      const r = await api("POST", "/long-video/concat", {
        task_ids: taskIds,
        // Use the canonical "crossfade" identifier so the backend can
        // match it directly; the alias map handles legacy "fade" too.
        transition: "crossfade",
        fade_duration: 0.5,
      });
      setConcatResult(r.output_path || "拼接完成");
      setConcatResultMeta({
        preview_url: r.preview_url || "",
        task_id: r.task_id || "",
        asset_ids: r.asset_ids || [],
      });
      setActiveStep("result");
    } catch (e) {
      alert(`拼接失败：${e.message}`);
    } finally {
      setConcatBusy(false);
    }
  };

  const steps = [
    { id: "outline", label: "输入大纲", hint: "从故事自动拆分镜" },
    { id: "segments", label: "编辑分镜", hint: "检查每段提示词与转场" },
    { id: "progress", label: "生成进度", hint: "批量生成每段视频" },
    { id: "result", label: "结果拼接", hint: "合成为完整长视频" },
  ];

  return (
    <div className="storyboard-page">
      <div className="library-toolbar storyboard-hero">
        <div>
          <h2 className="page-title"><Icon name="film" /> 长视频分镜</h2>
          <p className="page-subtitle">梳理大纲 → 编辑分镜 → 批量生成 → 拼接成片，四步走完整条长视频生产线。</p>
        </div>
        <div className="storyboard-hero__actions">
          <span className="storyboard-hero__count">
            <Icon name="list" size={12} /> {segments.length} 段
          </span>
          <button className="btn" onClick={addSegment}>
            <Icon name="plus" size={13} /> 新增分镜
          </button>
        </div>
      </div>

      <div className="story-workflow-tabs">
        {steps.map((step, idx) => (
          <button
            key={step.id}
            className={"story-workflow-tab" + (activeStep === step.id ? " active" : "")}
            onClick={() => setActiveStep(step.id)}
          >
            <span>{idx + 1}</span>
            <strong>{step.label}</strong>
            <small>{step.hint}</small>
          </button>
        ))}
      </div>

      {activeStep === "outline" && (
        <section className="card create-section storyboard-panel storyboard-outline-panel">
          <div className="create-section__head">
            <h3><Icon name="wand-sparkles" size={14} /> 大纲梳理</h3>
            <span>把故事变成一组有连续逻辑的视频分镜</span>
          </div>
          <div className="field">
            <label>故事 / 大纲</label>
            <textarea
              value={story}
              onChange={(e) => setStory(e.target.value)}
              placeholder="描述完整故事、产品脚本或短片大纲。AI 会拆成多段镜头，并尽量处理角色、场景、动作和转场的连续性。"
              className="story-outline-input"
            />
          </div>
          <PromptAssistPanel
            prompt={story}
            setPrompt={setStory}
            showNegative={false}
            compact
          />
          <div className="settings-grid two">
            <div className="field">
              <label>总时长 (秒)</label>
              <input
                type="number"
                value={totalDuration}
                onChange={(e) => setTotalDuration(parseInt(e.target.value, 10) || 60)}
              />
            </div>
            <div className="field">
              <label>每段时长 (秒)</label>
              <input
                type="number"
                value={segDuration}
                onChange={(e) => setSegDuration(parseInt(e.target.value, 10) || 10)}
              />
            </div>
          </div>
          <div className="storyboard-outline-actions">
            <button
              className="btn btn-block"
              onClick={decompose}
              disabled={busy || !story.trim() || duplicateStoryboardDecompose}
              title={duplicateStoryboardDecompose ? "当前大纲、总时长和每段时长没有变化，已提交过分镜草稿任务" : ""}
            >
              {busy ? <Spinner /> : <Icon name="wand-sparkles" size={14} />}
              {busy
                ? "正在提交分镜任务…"
                : duplicateStoryboardDecompose
                  ? "内容未变，无需重复生成"
                  : "生成分镜草稿"}
            </button>
            <button className="btn btn-ghost" onClick={onGoTasks}>
              去任务列表查看 →
            </button>
          </div>
          {decomposeStatus && (
            <div className={`storyboard-decompose-status storyboard-decompose-status--${decomposeStatus.kind}`}>
              {decomposeStatus.kind === "info" && <Spinner />}
              {decomposeStatus.kind === "success" && <Icon name="check" size={13} />}
              {decomposeStatus.kind === "danger" && <Icon name="alert-triangle" size={13} />}
              <span>{decomposeStatus.text}</span>
            </div>
          )}
          <div className="storyboard-tips">
            <Icon name="info" size={14} />
            <div>
              <strong>工作流提示</strong>
              <span>提交大纲后 AI 自动拆段；也可以跳过大纲，进入「编辑分镜」手动录入；分镜确认后再去「生成进度」批量生成，最后在「结果拼接」生成完整视频。</span>
            </div>
          </div>
        </section>
      )}

      {decomposeDialogOpen && decomposeStatus && (
        <div className="modal-mask storyboard-progress-mask" onClick={() => setDecomposeDialogOpen(false)}>
          <div className="modal storyboard-progress-modal" onClick={(e) => e.stopPropagation()}>
            <div className="storyboard-progress-modal__head">
              <div>
                <h3>
                  {decomposeStatus.kind === "danger"
                    ? <Icon name="alert-triangle" size={16} />
                    : decomposeStatus.kind === "success"
                      ? <Icon name="check" size={16} />
                      : <Spinner />}
                  分镜草稿任务
                </h3>
                <p>
                  拆分镜会调用主程序大模型（LLM，大语言模型）理解大纲并生成每段镜头，
                  时间取决于模型响应和大纲长度，不再用固定秒数强制中断。
                </p>
              </div>
              <button className="icon-btn" onClick={() => setDecomposeDialogOpen(false)} aria-label="关闭">
                <Icon name="x" size={15} />
              </button>
            </div>
            <div className={`storyboard-progress-modal__status storyboard-progress-modal__status--${decomposeStatus.kind}`}>
              <span>{decomposeStatus.text}</span>
            </div>
            <div className="storyboard-progress-modal__guide">
              <strong>下一步</strong>
              <span>到「任务」Tab 的「分镜长视频」分类查看进度；任务完成后，点开右侧结果并使用「应用到编辑分镜」。</span>
            </div>
            <div className="storyboard-progress-modal__actions">
              <button className="btn btn-ghost" onClick={() => setDecomposeDialogOpen(false)}>
                继续编辑大纲
              </button>
              <button className="btn" onClick={onGoTasks}>
                <Icon name="list" size={13} /> 去任务 Tab 查看
              </button>
            </div>
          </div>
        </div>
      )}

      {activeStep === "segments" && (
        <section className="card create-section storyboard-segments">
          <div className="create-section__head">
            <h3><Icon name="list" size={14} /> 分镜编辑</h3>
            <div className="storyboard-segments__head-actions">
              <button className="btn btn-sm btn-ghost" onClick={() => setActiveStep("outline")}>
                <Icon name="arrow-left" size={12} /> 返回大纲
              </button>
              <button className="btn btn-sm" onClick={addSegment}>
                <Icon name="plus" size={12} /> 新增分镜
              </button>
            </div>
          </div>
          <div className="storyboard-segments__hint">
            <Icon name="info" size={13} />
            <span>每段分镜会生成一个视频任务；串行模式尽量用上一段结果承接下一段，适合完整故事。</span>
            <span className="text-faint">共 {segments.length} 段</span>
          </div>

          {segments.length === 0 ? (
            <CompactLibraryEmpty
              full
              icon="film"
              title="还没有分镜"
              hint="可以返回「输入大纲」让 AI 自动拆解，也可以直接点「新增分镜」录入已有脚本。"
            >
              <button className="btn btn-ghost" onClick={() => setActiveStep("outline")}>
                <Icon name="arrow-left" size={13} /> 返回输入大纲
              </button>
              <button className="btn" onClick={addSegment}>
                <Icon name="plus" size={13} /> 新增第一段
              </button>
            </CompactLibraryEmpty>
          ) : (
            <div className="story-segment-list">
              {segments.map((s, i) => (
                <div key={i} className="story-segment-card">
                  <div className="story-segment-card__head">
                    <div>
                      <strong>#{s.index || i + 1}</strong>
                      <span>第 {i + 1} 段分镜</span>
                    </div>
                    <button className="btn btn-sm btn-ghost" onClick={() => removeSegment(i)}>
                      <Icon name="trash" size={12} /> 删除
                    </button>
                  </div>
                  <div className="story-segment-card__body">
                    <div className="story-segment-card__controls">
                      <div className="field">
                        <label>时长 (秒)</label>
                        <input
                          type="number"
                          value={s.duration || segDuration}
                          onChange={(e) => updateSegment(i, { duration: parseInt(e.target.value, 10) || segDuration })}
                        />
                      </div>
                      <div className="field">
                        <label>转场</label>
                        <select
                          value={normalizeStoryboardTransition(s.transition_to_next)}
                          onChange={(e) => updateSegment(i, { transition_to_next: e.target.value })}
                        >
                          <option value="cut">直接切</option>
                          <option value="crossfade">交叉淡化</option>
                          <option value="ai_extend">动作承接</option>
                        </select>
                      </div>
                    </div>
                    <div className="field story-segment-card__prompt">
                      <label>本段提示词</label>
                      <textarea
                        value={s.prompt || ""}
                        onChange={(e) => updateSegment(i, { prompt: e.target.value })}
                        placeholder="描述这一段的主体、动作、镜头、环境、声音和与前后段的衔接方式"
                      />
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}
          <div className="storyboard-next-bar">
            <button className="btn btn-ghost" onClick={() => setActiveStep("outline")}>
              <Icon name="arrow-left" size={12} /> 返回大纲
            </button>
            <button className="btn" onClick={() => setActiveStep("progress")} disabled={!segments.length}>
              下一步：配置并生成 →
            </button>
          </div>
        </section>
      )}

      {activeStep === "progress" && (
        <div className="storyboard-workbench storyboard-workbench--generate">
          <section className="card create-section storyboard-panel storyboard-panel--generate-config">
            <div className="create-section__head">
              <h3><Icon name="settings" size={14} /> 生成配置</h3>
              <span>{segments.length} 个分镜待生成</span>
            </div>
            <div className="storyboard-source-summary">
              <Icon name="list" size={15} />
              <div>
                <strong>将取用第二步「编辑分镜」中的内容</strong>
                <span>
                  提交后会按当前 {segments.length} 段分镜逐段生成视频；每段使用它自己的提示词、时长和转场设置。
                </span>
              </div>
            </div>
            <div className="field">
              <label>基础模型</label>
              <select value={model} onChange={(e) => setModel(e.target.value)}>
                {modelOptions.length ? (
                  modelOptions.map((m) => (
                    <option key={m.model_id} value={m.model_id}>
                      {m.label_zh}
                    </option>
                  ))
                ) : (
                  <option value="happyhorse-1.0-i2v">HappyHorse 1.0 图生视频</option>
                )}
              </select>
            </div>
            <div className="field">
              <label>串接方式</label>
              <select value={chainMode} onChange={(e) => setChainMode(e.target.value)}>
                <option value="serial">串行（首尾帧承接）</option>
                <option value="parallel">并行（独立生成）</option>
                <option value="cloud_extend">云端续写</option>
              </select>
            </div>
            <div className="create-helper-card">
              <Icon name="info" size={16} />
              <div>
                <strong>生成逻辑</strong>
                <span>提交后会为每段分镜创建独立视频任务，并用同一个 chain_group 追踪整组进度。</span>
              </div>
            </div>
            <div className="storyboard-panel__footer">
              <button className="btn btn-ghost" onClick={() => setActiveStep("segments")}>
                <Icon name="arrow-left" size={12} /> 返回分镜
              </button>
              <button
                className="btn btn-block"
                onClick={submit}
                disabled={busy || duplicateLongVideoSubmit || !segments.length}
                title={duplicateLongVideoSubmit ? "当前分镜内容已提交，修改分镜、模型或串接方式后才能再次提交" : ""}
              >
                {busy ? <Spinner /> : <Icon name="rocket" size={14} />}
                {busy ? "提交中…" : duplicateLongVideoSubmit ? "内容未变，无需重复提交" : "提交生成"}
              </button>
            </div>
          </section>

          <section className="card create-section storyboard-panel storyboard-panel--generate-progress">
            <div className="create-section__head">
              <h3><Icon name="list" size={14} /> 生成进度</h3>
              <span>{chainGroupId ? `chain_group: ${chainGroupId.slice(0, 8)}…` : "尚未提交"}</span>
            </div>
            <div className="storyboard-panel__body">
              {!chainGroupId ? (
                <CompactLibraryEmpty
                  full
                  icon="rocket"
                  title="等待提交生成"
                  hint="左侧确认模型和串接方式后提交，即可在这里跟踪每段视频的生成进度。"
                />
              ) : segmentTasks.length === 0 ? (
                <div className="task-list-loading"><Spinner /> 正在创建分镜任务…</div>
              ) : (
                <div className="story-progress-list">
                  {segmentTasks.map((t, i) => {
                    const index = taskSegmentIndex(t, i + 1) || i + 1;
                    return (
                      <div key={taskIdOf(t) || i} className="story-progress-item">
                        <span>#{index}</span>
                        <div className="story-progress-item__main">
                          <div className="story-progress-item__title">
                            <strong>{taskDisplayTitle(t, null, index)}</strong>
                            <small>{taskDisplaySubtitle(t)}</small>
                          </div>
                          <div className="story-progress-item__prompt">{taskPromptSummary(t)}</div>
                        </div>
                        <TaskStatusBadge status={t.status} />
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
            <div className="storyboard-panel__footer">
              <div className="storyboard-footer-actions">
                <button
                  className="btn btn-ghost"
                  onClick={() => refreshChainTasks()}
                  disabled={!chainGroupId}
                >
                  <Icon name="refresh" size={12} /> 刷新进度
                </button>
                <button
                  className="btn btn-ghost"
                  onClick={resetStoryboardRun}
                  disabled={!chainGroupId}
                >
                  <Icon name="x" size={12} /> 重置流程
                </button>
                <button
                  className="btn btn-ghost"
                  onClick={cancelStoryboardRun}
                  disabled={!chainGroupId || !chainHasActiveTasks || chainCancelBusy}
                  title="中止后台正在生成的分段任务"
                >
                  {chainCancelBusy ? <Spinner /> : <Icon name="x" size={12} />} 中止生成
                </button>
              </div>
              <div className="storyboard-footer-actions">
                {onGoTasks && (
                  <button className="btn btn-ghost" onClick={onGoTasks}>
                    <Icon name="list" size={12} /> 去任务查看
                  </button>
                )}
                <button
                  className="btn"
                  onClick={() => setActiveStep("result")}
                  disabled={!chainGroupId}
                >
                  查看拼接 →
                </button>
              </div>
            </div>
          </section>
        </div>
      )}

      {activeStep === "result" && (
        <section className="card create-section storyboard-result-panel">
          <div className="create-section__head">
            <h3><Icon name="film" size={14} /> 结果拼接</h3>
            <span>{completedTasks.length}/{segmentTasks.length || segments.length} 段已完成</span>
          </div>
          <div className="story-result-summary">
            <div>
              <strong>分段视频</strong>
              <span>
                {segmentTasks.length
                  ? `${completedTasks.length}/${segmentTasks.length} 段已完成，${segmentTasks.filter((t) => t.video_url || t.video_path).length} 段可拼接`
                  : "还没有提交生成任务"}
              </span>
            </div>
            <div>
              <strong>完整视频</strong>
              <span>{concatResult ? "已生成完整长视频" : chainDone ? "分段已就绪，可开始拼接" : "等待分段完成后拼接"}</span>
            </div>
          </div>
          {concatResultMeta?.preview_url && (
            <div className="video-player-wrap">
              <video src={concatResultMeta.preview_url} controls loop />
            </div>
          )}
          {concatResultMeta?.task_id && (
            <div className="story-result-output-card">
              <div>
                <strong>完整长视频已生成</strong>
                <span>
                  任务 <span className="font-mono">{concatResultMeta.task_id}</span>
                  {concatResultMeta.asset_ids?.length ? `，已发布素材 ${concatResultMeta.asset_ids.length} 个` : ""}
                </span>
              </div>
              <div className="story-result-output-card__actions">
                {onGoTasks && (
                  <button className="btn btn-sm btn-ghost" onClick={onGoTasks}>
                    <Icon name="list" size={12} /> 去任务查看
                  </button>
                )}
                <button className="btn btn-sm btn-ghost" onClick={resetStoryboardRun}>
                  <Icon name="x" size={12} /> 重置流程
                </button>
              </div>
            </div>
          )}
          {segmentTasks.length > 0 ? (
            <div className="story-result-segments">
              <div className="story-result-segments__head">
                <div>
                  <strong>待拼接分段</strong>
                  <span>按分镜顺序检查每段成片，全部完成后可生成完整长视频。</span>
                </div>
                <Tag kind={chainDone ? "success" : "info"}>
                  {completedTasks.length}/{segmentTasks.length} 段完成
                </Tag>
              </div>
              <div className="story-progress-list story-result-segment-list">
                {segmentTasks.map((t, i) => {
                  const index = taskSegmentIndex(t, i + 1) || i + 1;
                  const ready = !!(t.video_url || t.video_path);
                  return (
                    <div
                      key={taskIdOf(t) || i}
                      className={"story-progress-item story-result-segment-item" + (ready ? " is-ready" : "")}
                    >
                      <span>#{index}</span>
                      <div className="story-progress-item__main">
                        <div className="story-progress-item__title">
                          <strong>{segmentResultTitle(t, index)}</strong>
                          <small>{segmentResultState(t)}</small>
                        </div>
                        <div className="story-progress-item__prompt">{taskPromptSummary(t)}</div>
                        <div className="story-result-segment-item__meta">{taskDisplaySubtitle(t)}</div>
                      </div>
                      <TaskStatusBadge status={t.status} />
                    </div>
                  );
                })}
              </div>
            </div>
          ) : (
            <CompactLibraryEmpty
              full
              icon="film"
              title="还没有可拼接的成片"
              hint="先在「生成进度」提交，等待每段视频完成后回到这里点「拼接完整视频」。"
            >
              <button className="btn btn-ghost" onClick={() => setActiveStep("progress")}>
                <Icon name="arrow-left" size={13} /> 返回进度
              </button>
            </CompactLibraryEmpty>
          )}
          <div className="storyboard-next-bar">
            <div className="storyboard-footer-actions">
              <button className="btn btn-ghost" onClick={() => setActiveStep("progress")}>
                <Icon name="arrow-left" size={12} /> 返回进度
              </button>
              <button className="btn btn-ghost" onClick={resetStoryboardRun} disabled={!chainGroupId}>
                <Icon name="x" size={12} /> 重置流程
              </button>
              <button
                className="btn btn-ghost"
                onClick={cancelStoryboardRun}
                disabled={!chainGroupId || !chainHasActiveTasks || chainCancelBusy}
              >
                {chainCancelBusy ? <Spinner /> : <Icon name="x" size={12} />} 中止生成
              </button>
            </div>
            <div className="storyboard-footer-actions">
              {onGoTasks && (
                <button className="btn btn-ghost" onClick={onGoTasks}>
                  <Icon name="list" size={12} /> 去任务查看
                </button>
              )}
            <button
              className="btn"
              onClick={concat}
              disabled={concatBusy || !!concatResultMeta?.task_id || !chainDone || completedTasks.length < 2}
            >
              {concatBusy ? <Spinner /> : <Icon name="film" size={14} />}
              {concatResultMeta?.task_id ? "已完成拼接" : "拼接完整视频"}
            </button>
            </div>
          </div>
        </section>
      )}
    </div>
  );
}

// ── Voices Tab ──────────────────────────────────────────────────────

function VoicesTab({ settings }) {
  const [data, setData] = useState({ system: FALLBACK_SYSTEM_VOICES, cloned: [] });
  const [showCreate, setShowCreate] = useState(false);
  const [draft, setDraft] = useState({ label: "", audio: null, language: "zh-CN", gender: "unknown" });
  const [busy, setBusy] = useState(false);
  const [previewing, setPreviewing] = useState("");
  const [previewResult, setPreviewResult] = useState({});
  const [loadWarning, setLoadWarning] = useState("");
  const [cloneStatus, setCloneStatus] = useState(null);

  const cloneTime = () =>
    new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit", second: "2-digit" });

  const openCreate = () => {
    setCloneStatus(null);
    setShowCreate(true);
  };

  const closeCreate = () => {
    if (busy) return;
    setShowCreate(false);
    setCloneStatus(null);
  };

  const load = useCallback(() => {
    api("GET", "/voices")
      .then((r) => {
        const system = (r.system || []).length ? r.system : FALLBACK_SYSTEM_VOICES;
        setData({ system, cloned: r.cloned || [] });
        setLoadWarning((r.system || []).length ? "" : "后端暂未返回系统音色，当前显示内置常用音色。");
      })
      .catch((e) => {
        setData({ system: FALLBACK_SYSTEM_VOICES, cloned: [] });
        if (!settings?.api_key_set) {
          setLoadWarning("");
          return;
        }
        const msg = friendlyApiMessage(e, "后端暂未提供音色列表，当前显示内置常用音色。");
        setLoadWarning(msg ? `已切换为内置常用音色：${msg}` : "");
      });
  }, [settings?.api_key_set]);

  useEffect(() => { load(); }, [load]);

  const preview = async (vid) => {
    setPreviewing(vid);
    try {
      const r = await api("POST", "/voices/preview", {
        voice_id: vid,
        text: "你好，这是一段试听。",
      });
      if (!r.ok) throw new Error(r.error || "preview failed");
      const url = r.preview_url || r.url || "";
      setPreviewResult((prev) => ({
        ...prev,
        [vid]: { url, label: url ? "试听已就绪" : (r.audio_path || "试听已生成") },
      }));
      if (url) {
        try {
          const audio = new Audio(url);
          audio.play().catch(() => {});
        } catch (_) {}
      }
    } catch (e) {
      const msg = settings?.api_key_set
        ? friendlyApiMessage(e, "试听服务暂不可用，请稍后重试。")
        : "请先在设置里配置 DashScope Key。";
      setPreviewResult((prev) => ({ ...prev, [vid]: { url: "", label: `试听失败：${msg}` } }));
    } finally {
      setPreviewing("");
    }
  };

  const cloneVoice = async () => {
    if (!draft.label || !draft.audio) {
      setCloneStatus({
        kind: "warn",
        title: "还不能开始克隆",
        detail: "请先填写音色名称，并上传一段 5-30 秒的清晰人声样本。",
        time: cloneTime(),
      });
      return;
    }
    setBusy(true);
    try {
      const sample = draft.audio.oss_url || draft.audio.preview_url || draft.audio.local_path || "";
      if (!draft.audio.oss_url) {
        setCloneStatus({
          kind: "fail",
          title: "缺少公网音频 URL",
          detail: "音色克隆需要 DashScope 可访问的 OSS URL。请先在设置里配置 OSS，然后重新上传参考音频。",
          time: cloneTime(),
        });
        setBusy(false);
        return;
      }
      setCloneStatus({
        kind: "info",
        title: "正在提交到百炼音色克隆",
        detail: "已开始请求 DashScope VoiceEnrollmentService，通常需要等待几十秒；请不要关闭这个弹窗。",
        time: cloneTime(),
      });
      const r = await api("POST", "/voices/clone", {
        label: draft.label,
        sample_audio_url: draft.audio.oss_url || sample,
        language: draft.language,
        gender: draft.gender,
      });
      if (!r.ok) throw new Error(r.error || "clone failed");
      setCloneStatus({
        kind: "ok",
        title: "音色克隆完成",
        detail: "已生成自定义音色并刷新列表。关闭弹窗后，可在下方「自定义音色」区域查看和试听。",
        time: cloneTime(),
      });
      setDraft({ label: "", audio: null, language: "zh-CN", gender: "unknown" });
      load();
    } catch (e) {
      const msg = settings?.api_key_set
        ? friendlyApiMessage(e, "音色克隆服务暂不可用，请稍后重试。")
        : "请先在设置里配置 DashScope Key。";
      setCloneStatus({
        kind: "fail",
        title: "克隆失败",
        detail: msg,
        time: cloneTime(),
      });
    } finally {
      setBusy(false);
    }
  };

  const del = async (voiceId) => {
    if (!confirm("确认删除该自定义音色？")) return;
    await api("DELETE", `/voices/${voiceId}`);
    load();
  };

  const systemVoices = data.system || [];
  const clonedVoices = data.cloned || [];
  const systemVoiceGroups = useMemo(() => {
    const groups = { cosyvoice: [], edge: [], other: [] };
    for (const voice of systemVoices) {
      const key = voice.engine === "edge" || voice.engine === "cosyvoice" ? voice.engine : "other";
      groups[key].push(voice);
    }
    return ["cosyvoice", "edge", "other"]
      .map((key) => ({ key, voices: groups[key], meta: VOICE_SOURCE_META[key] }))
      .filter((group) => group.voices.length > 0);
  }, [systemVoices]);
  const sourceCount = systemVoiceGroups.length + (clonedVoices.length ? 1 : 0);
  const voiceMeta = (voice, custom = false) => {
    if (custom) return VOICE_SOURCE_META.custom;
    return VOICE_SOURCE_META[voice.engine] || VOICE_SOURCE_META.other;
  };

  const VoiceCard = ({ v, custom = false }) => (
    <div className="lib-card">
      <div className="lib-card__head">
        <div className="min-w-0">
          <div className="lib-card__title">{v.label_zh || v.label || v.id}</div>
          <div className="lib-card__sub">
            {v.gender || "unknown"} · {v.language || "zh-CN"}
            {(v.style_zh || v.style) ? ` · ${v.style_zh || v.style}` : ""}
          </div>
        </div>
        <Tag kind={voiceMeta(v, custom).kind}>
          {voiceMeta(v, custom).title}
        </Tag>
      </div>
      <div className="voice-media">
        {previewing === v.id ? (
          <span className="voice-media__busy"><Spinner /> 合成试听中…</span>
        ) : previewResult[v.id]?.url ? (
          <audio controls src={previewResult[v.id].url} style={{ width: "100%" }} />
        ) : previewResult[v.id]?.label ? (
          <span className="voice-media__empty">{previewResult[v.id].label}</span>
        ) : previewResult[v.id] ? (
          <span className="voice-media__empty">{String(previewResult[v.id])}</span>
        ) : (
          <span className="voice-media__empty">尚未生成试听音频，点击下方按钮</span>
        )}
      </div>
      <button className="voice-play-btn" onClick={() => preview(v.id)} disabled={previewing === v.id}>
        <Icon name="play" size={12} /> 试听
      </button>
      {custom && (
        <button className="btn btn-sm btn-danger" onClick={() => del(v.id)}>
          <Icon name="trash" size={12} /> 删除
        </button>
      )}
    </div>
  );

  return (
    <div className="library-page library-page--voices">
      <div className="library-hero">
        <div className="library-toolbar">
        <div>
          <h2 className="page-title"><Icon name="mic" /> 音色库</h2>
          <p className="page-subtitle">先选稳定系统音色，需要品牌声线时再上传干净人声样本克隆。</p>
        </div>
        <button className="btn" onClick={openCreate}>
          <Icon name="plus" size={13} /> 克隆新音色
        </button>
        </div>
        <div className="library-metrics">
          <div><strong>{systemVoices.length}</strong><span>系统音色</span></div>
          <div><strong>{clonedVoices.length}</strong><span>自定义音色</span></div>
          <div><strong>{sourceCount}</strong><span>音源分类</span></div>
        </div>
      </div>

      <div className="library-callout library-callout--compact">
        <Icon name="info" size={14} />
        <span>建议使用 5-30 秒、无背景音乐、无混响的人声样本；DashScope 克隆需要可访问的音频 URL。</span>
      </div>
      {loadWarning && (
        <div className="library-callout library-callout--warning">
          <Icon name="alert-triangle" size={14} />
          <span>{loadWarning}</span>
        </div>
      )}

      {showCreate && (
        <div className="modal-mask voice-clone-mask" onClick={closeCreate}>
        <div className="modal voice-clone-modal" onClick={(e) => e.stopPropagation()}>
          <div className="voice-clone-modal__head">
            <div>
              <h3>克隆新音色</h3>
              <p>上传一段干净人声样本，系统会提交给 DashScope 创建可复用的自定义音色。</p>
            </div>
            <button className="btn btn-ghost btn-sm" onClick={closeCreate} disabled={busy} aria-label="关闭">
              <Icon name="x" size={13} /> 关闭
            </button>
          </div>
          <div className="card library-form voice-clone-form">
          <div className="settings-grid two">
            <div className="field">
              <label>音色名称</label>
              <input value={draft.label} onChange={(e) => setDraft({ ...draft, label: e.target.value })} placeholder="例如：温柔女声" />
            </div>
            <div className="field">
              <label>语言 / 性别</label>
              <div className="row">
                <select value={draft.language} onChange={(e) => setDraft({ ...draft, language: e.target.value })}>
                  <option value="zh-CN">中文普通话</option>
                  <option value="en-US">英文</option>
                  <option value="ja-JP">日语</option>
                  <option value="ko-KR">韩语</option>
                  <option value="yue">粤语</option>
                </select>
                <select value={draft.gender} onChange={(e) => setDraft({ ...draft, gender: e.target.value })}>
                  <option value="unknown">未知</option>
                  <option value="female">女声</option>
                  <option value="male">男声</option>
                </select>
              </div>
            </div>
          </div>
          <div className="field">
            <label>参考音频</label>
            <FileUploadCard
              accept="audio/*"
              kind="audio"
              value={draft.audio}
              onUploaded={(audio) => {
                setDraft({ ...draft, audio });
                setCloneStatus({
                  kind: audio?.oss_url ? "ok" : "warn",
                  title: audio?.oss_url ? "参考音频已准备好" : "音频已上传，但还不能克隆",
                  detail: audio?.oss_url
                    ? "已生成 DashScope 可访问的 OSS URL，可以开始克隆。"
                    : "当前只有本地预览文件。请配置 OSS 后重新上传，或提供公网可访问的音频 URL。",
                  time: cloneTime(),
                });
              }}
              hint="上传 5-30 秒清晰干声，噪音越少克隆越稳定"
            />
          </div>
          {cloneStatus && (
            <TestResult status={cloneStatus} onDismiss={() => !busy && setCloneStatus(null)} />
          )}
          {cloneStatus?.kind === "ok" ? (
            <div className="settings-actions voice-clone-actions">
              <button className="btn" onClick={closeCreate}>
                <Icon name="check" size={13} /> 关闭并查看自定义音色
              </button>
            </div>
          ) : (
            <div className="settings-actions voice-clone-actions">
              <button className="btn btn-ghost" onClick={closeCreate} disabled={busy}>取消</button>
              <button className="btn" onClick={cloneVoice} disabled={busy}>
                {busy ? <Spinner /> : <Icon name="save" size={13} />} {busy ? "正在克隆，请稍候…" : "开始克隆音色"}
              </button>
            </div>
          )}
          <div className="voice-clone-footnote">
            需要 DashScope API Key、dashscope Python 依赖和 OSS 公网 URL；失败原因会显示在这里并写入插件日志。
          </div>
          </div>
        </div>
        </div>
      )}

      <LibrarySection title="系统音色" count={systemVoices.length}>
        {systemVoices.length === 0 ? (
          <CompactLibraryEmpty icon="mic" title="系统音色暂未加载" hint="请刷新页面或检查后端音色目录。页面不会再撑出大块空白。" />
        ) : (
          <div className="voice-source-stack">
            {systemVoiceGroups.map(({ key, voices, meta }) => (
              <div className="voice-source-block" key={key}>
                <div className="voice-source-head">
                  <div>
                    <h4>{meta.title} <span>· {voices.length}</span></h4>
                    <p>{meta.desc}</p>
                  </div>
                  <Tag kind={meta.kind}>{meta.tag}</Tag>
                </div>
                <div className="lib-grid voice-grid">{voices.map((v) => <VoiceCard key={v.id} v={v} />)}</div>
              </div>
            ))}
          </div>
        )}
      </LibrarySection>

      <LibrarySection title="自定义音色" count={clonedVoices.length}>
        {clonedVoices.length === 0 ? (
          <CompactLibraryEmpty icon="mic-off" title="暂无自定义音色" hint="点击右上角「克隆新音色」上传一段人声样本。" />
        ) : (
          <div className="voice-source-block">
            <div className="voice-source-head">
              <div>
                <h4>{VOICE_SOURCE_META.custom.title} <span>· {clonedVoices.length}</span></h4>
                <p>{VOICE_SOURCE_META.custom.desc}</p>
              </div>
              <Tag kind={VOICE_SOURCE_META.custom.kind}>{VOICE_SOURCE_META.custom.tag}</Tag>
            </div>
            <div className="lib-grid voice-grid">{clonedVoices.map((v) => <VoiceCard key={v.id} v={v} custom />)}</div>
          </div>
        )}
      </LibrarySection>
    </div>
  );
}

function CompactLibraryEmpty({ icon, title, hint, full, children }) {
  const cls = "compact-library-empty" + (full ? " compact-library-empty--full" : "");
  return (
    <div className={cls}>
      <div className="compact-library-empty__icon"><Icon name={icon || "inbox"} size={full ? 32 : 18} /></div>
      <div className="compact-library-empty__body">
        <strong>{title}</strong>
        <span>{hint}</span>
        {children ? <div className="compact-library-empty__actions">{children}</div> : null}
      </div>
    </div>
  );
}

function LibrarySection({ title, count, children }) {
  return (
    <section className="library-section">
      <div className="library-section__head">
        <h3>{title} <span>· {count}</span></h3>
      </div>
      {children}
    </section>
  );
}

// ── Figures Tab ─────────────────────────────────────────────────────

function FiguresTab() {
  const [list, setList] = useState([]);
  const [showCreate, setShowCreate] = useState(false);
  const [draft, setDraft] = useState({ label: "", image: null });
  const [busy, setBusy] = useState(false);
  const [deletingIds, setDeletingIds] = useState({});

  const load = useCallback(() => {
    api("GET", "/figures").then((r) => setList(r.figures || [])).catch(() => setList([]));
  }, []);
  useEffect(() => { load(); }, [load]);
  useEffect(() => {
    const hasPending = list.some((f) => statusOf(f) === "pending");
    if (!hasPending) return undefined;
    const timer = setInterval(load, 4000);
    return () => clearInterval(timer);
  }, [list, load]);

  const createFigure = async () => {
    if (!draft.label || !draft.image) {
      alert("请填写形象名称并上传人像图");
      return;
    }
    if (!draft.image.oss_url) {
      const ok = confirm(
        "当前素材没有 OSS 公网 URL，DashScope 无法读取本地预览图，形象会跳过预检。\n\n仍要保存吗？"
      );
      if (!ok) return;
    }
    setBusy(true);
    try {
      const r = await api("POST", "/figures", {
        label: draft.label,
        image_path: draft.image.local_path || draft.image.preview_url || "",
        preview_url: draft.image.preview_url || "",
        oss_url: draft.image.oss_url || "",
        oss_key: draft.image.oss_key || "",
      });
      if (!r.ok) throw new Error(r.error || "create failed");
      if (r.detect_status === "pending") {
        alert("形象已保存，正在进行素材预检。通过后会显示「可用」。");
      } else if (r.detect_status === "skipped") {
        alert("形象已保存，但因缺少 OSS 公网 URL 已跳过预检。DashScope 需要公网可访问 URL，请修正 OSS 后重新上传。");
      }
      setDraft({ label: "", image: null });
      setShowCreate(false);
      load();
    } catch (e) {
      alert(`上传形象失败：${e.message}`);
    } finally {
      setBusy(false);
    }
  };

  const del = async (figId) => {
    if (!confirm("确认删除该形象？")) return;
    setDeletingIds((prev) => ({ ...prev, [figId]: true }));
    setList((prev) => prev.filter((f) => f.id !== figId));
    try {
      await api("DELETE", `/figures/${figId}`);
    } finally {
      setDeletingIds((prev) => {
        const next = { ...prev };
        delete next[figId];
        return next;
      });
      load();
    }
  };

  const statusOf = (f) => {
    if (f.detect_status) return f.detect_status;
    if (f.detect_pass === true || f.detect_pass === 1) return "pass";
    if (f.detect_pass === false || f.detect_pass === 0) return "pending";
    return "skipped";
  };
  const detectMeta = (f) => {
    const status = statusOf(f);
    if (status === "pass") {
      return { status, label: "可用", kind: "success", hint: f.detect_message || "预检通过，可用于照片说话、换人和动作驱动。" };
    }
    if (status === "fail") {
      return { status, label: "预检未通过", kind: "danger", hint: f.detect_message || "DashScope 拒绝了该图，常见原因：非真人、非正面、多人、遮挡或水印。" };
    }
    if (status === "skipped") {
      return { status, label: "未预检", kind: "warning", hint: f.detect_message || "通常是 OSS 未配置或缺少公网 URL。配置 OSS 后请重新上传。" };
    }
    return { status: "pending", label: "预检中…", kind: "info", hint: "正在调用 wan2.2-s2v-detect 检查人像是否可用，通常需要 5-30 秒。" };
  };

  return (
    <div className="library-page library-page--figures">
      <div className="library-hero library-hero--figures">
        <div className="library-toolbar">
          <div>
            <h2 className="page-title"><Icon name="user-square" /> 形象库</h2>
            <p className="page-subtitle">集中管理可复用的人像素材，用于数字人口播、换人和动作驱动。</p>
          </div>
          <button className="btn" onClick={() => setShowCreate(!showCreate)}>
            <Icon name="plus" size={13} /> 上传新形象
          </button>
        </div>
        <div className="figure-guide-grid">
          <div><Icon name="user-plus" size={16} /><strong>正面清晰</strong><span>单人、无遮挡、五官完整</span></div>
          <div><Icon name="image-play" size={16} /><strong>素材复用</strong><span>上传一次，多种数字人模式可直接选用</span></div>
          <div><Icon name="info" size={16} /><strong>检测状态</strong><span>通过检测后合成效果更稳定</span></div>
        </div>
      </div>

      {showCreate && (
        <div className="card library-form figure-form">
          <div>
            <div className="field">
              <label>形象名称</label>
              <input value={draft.label} onChange={(e) => setDraft({ ...draft, label: e.target.value })} placeholder="例如：商务主持人" />
            </div>
            <div className="create-helper-card">
              <Icon name="info" size={16} />
              <div>
                <strong>建议用正面半身照</strong>
                <span>五官清晰、光线均匀、无遮挡和无水印，会减少后续检测失败。</span>
              </div>
            </div>
          </div>
          <div className="field">
            <label>人像图</label>
            <FileUploadCard
              accept="image/*"
              kind="image"
              value={draft.image}
              onUploaded={(image) => setDraft({ ...draft, image })}
              hint="上传后会保存到形象库，可在数字人模式复用"
            />
          </div>
          <div className="settings-actions">
            <button className="btn btn-ghost" onClick={() => setShowCreate(false)}>取消</button>
            <button className="btn" onClick={createFigure} disabled={busy}>
              {busy ? <Spinner /> : <Icon name="save" size={13} />} 上传并保存
            </button>
          </div>
        </div>
      )}

      {list.length === 0 ? (
        <CompactLibraryEmpty
          full
          icon="user-plus"
          title="还没有形象素材"
          hint="点击「上传新形象」添加第一张人像图，之后在数字人创建流程里直接复用。"
        >
          <button className="btn" onClick={() => setShowCreate(true)}>
            <Icon name="plus" size={13} /> 上传新形象
          </button>
        </CompactLibraryEmpty>
      ) : (
        <div className="lib-grid figure-grid">
          {list.map((f) => {
            const meta = detectMeta(f);
            const isPending = meta.status === "pending";
            return (
              <div key={f.id} className={"lib-card figure-card" + (isPending ? " is-pending" : "")}>
                <div className="fig-thumb-wrap">
                  {f.preview_url ? (
                    <img className="fig-thumb" src={f.preview_url} alt={f.label} />
                  ) : (
                    <div className="fig-thumb-placeholder"><Icon name="user-square" size={32} /></div>
                  )}
                  {isPending && (
                    <div className="fig-overlay" aria-label={meta.label}>
                      <span className="spinner-sm spinner-light" />
                      <span className="fig-overlay__text">{meta.label}</span>
                    </div>
                  )}
                </div>
                <div className="lib-card__head">
                  <div className="min-w-0">
                    <div className="lib-card__title">{f.label}</div>
                    <div className="lib-card__sub">{new Date((f.created_at || 0) * 1000).toLocaleString()}</div>
                  </div>
                  <Tag kind={meta.kind}>
                    {isPending && <span className="spinner-sm figure-status-spinner" />}
                    {meta.label}
                  </Tag>
                </div>
                {meta.hint && <div className="lib-card__hint" title={meta.hint}>{meta.hint}</div>}
                <button className="btn btn-sm btn-danger" onClick={() => del(f.id)} disabled={!!deletingIds[f.id]}>
                  {deletingIds[f.id] ? <span className="spinner-sm spinner-light" /> : <Icon name="trash" size={12} />} 删除
                </button>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function PromptTab({ settings }) {
  const [guide, setGuide] = useState(DEFAULT_PROMPT_GUIDE);
  const [prompt, setPrompt] = useState("");
  const [mode, setMode] = useState("t2v");
  const [result, setResult] = useState("");
  const [busy, setBusy] = useState(false);
  const [guideWarning, setGuideWarning] = useState("");

  useEffect(() => {
    api("GET", "/prompt-guide")
      .then((r) => {
        setGuide({
          formulas: Object.keys(r.formulas || {}).length ? r.formulas : DEFAULT_PROMPT_GUIDE.formulas,
          templates: (r.templates || []).length ? r.templates : DEFAULT_PROMPT_GUIDE.templates,
          cameras: (r.cameras || []).length ? r.cameras : DEFAULT_PROMPT_GUIDE.cameras,
          atmosphere: Object.keys(r.atmosphere || {}).length ? r.atmosphere : DEFAULT_PROMPT_GUIDE.atmosphere,
        });
        setGuideWarning("");
      })
      .catch((e) => {
        setGuide(DEFAULT_PROMPT_GUIDE);
        if (!settings?.api_key_set) {
          setGuideWarning("");
          return;
        }
        const msg = friendlyApiMessage(e, "后端暂未提供提示词指南，当前使用内置模板。");
        setGuideWarning(msg ? `当前使用内置模板：${msg}` : "");
      });
  }, [settings?.api_key_set]);

  const optimize = async () => {
    setBusy(true);
    try {
      const r = await api("POST", "/prompt-optimize", { prompt, mode });
      setResult(r.ok ? r.result : `失败：${r.error}`);
    } catch (e) {
      const msg = settings?.api_key_set
        ? friendlyApiMessage(e, "AI 优化服务暂不可用，请稍后重试。")
        : "请先在设置里配置 DashScope Key。";
      setResult(`失败：${msg}`);
    } finally {
      setBusy(false);
    }
  };

  const formulas = Object.entries(guide.formulas || {});
  const templates = guide.templates || [];
  const cameras = guide.cameras || [];
  const atmosphere = guide.atmosphere || {};
  const selectedFormula = guide.formulas?.[mode] || "";

  return (
    <div className="prompt-page">
      <div className="prompt-shell">
        <div className="prompt-hero">
          <div>
            <h2 className="page-title"><Icon name="sparkles" /> 提示词工坊</h2>
            <p className="page-subtitle">把一句粗略想法整理成可生成的视频提示词，也可以直接套用模板。</p>
          </div>
          <div className="prompt-hero__steps">
            <span>1 写想法</span>
            <span>2 选模式</span>
            <span>3 AI 优化</span>
          </div>
        </div>
        {guideWarning && (
          <div className="library-callout library-callout--warning">
            <Icon name="alert-triangle" size={14} />
            <span>{guideWarning}</span>
          </div>
        )}

        <div className="prompt-workbench">
          <section className="prompt-panel prompt-panel--compose">
            <div className="prompt-panel__head">
              <div>
                <strong>输入与结构</strong>
                <span>先确定生成模式，再补充原始想法。</span>
              </div>
            </div>
            <div className="prompt-mode-row">
              <div className="field prompt-control-card">
                <label>生成模式</label>
                <select value={mode} onChange={(e) => setMode(e.target.value)}>
                  {formulas.map(([m]) => <option key={m}>{m}</option>)}
                </select>
              </div>
              {selectedFormula && (
                <div className="formula-card">
                  <span>推荐结构</span>
                  <strong>{selectedFormula}</strong>
                </div>
              )}
            </div>
            <div className="field prompt-text-field">
              <label>原始提示词</label>
              <textarea
                value={prompt}
                onChange={(e) => setPrompt(e.target.value)}
                placeholder="输入一句粗略想法，例如：一位主持人在科技发布会现场介绍新品"
              />
            </div>
            <div className="prompt-action-row">
              <button className="btn" onClick={optimize} disabled={busy || !prompt}>
                {busy ? <Spinner /> : <Icon name="wand-sparkles" size={14} />} AI 优化
              </button>
              <span>提示：先写“主体 + 场景 + 动作”，细节可交给 AI 补齐。</span>
            </div>
          </section>
          <section className="prompt-panel prompt-result">
            <div className="prompt-panel__head">
              <div>
                <strong>优化结果</strong>
                <span>生成后可复制到视频/数字人任务中。</span>
              </div>
            </div>
            {result ? <pre className="code-block">{result}</pre> : <Empty icon="sparkles" title="等待优化" hint="左侧输入后点击 AI 优化" />}
          </section>
        </div>

        <GuideSection title="模板示例" defaultOpen>
          <div className="template-grid">
            {templates.slice(0, 12).map((tpl) => (
              <button key={tpl.id || tpl.name} className="template-card" onClick={() => setPrompt(tpl.prompt || tpl.template || "")}>
                <div className="name">{tpl.name || tpl.name_zh || tpl.id}</div>
                <div className="desc">{tpl.desc || tpl.description || (tpl.modes || []).join(" / ")}</div>
              </button>
            ))}
          </div>
        </GuideSection>

        <GuideSection title="各模式配方">
          {formulas.map(([m, f]) => (
            <button key={m} className="guide-row guide-row--button" onClick={() => setMode(m)}>
              <strong>{m}</strong>
              <span>{f}</span>
            </button>
          ))}
        </GuideSection>

        <GuideSection title="镜头与氛围关键词">
          <div className="keyword-panel">
            <div className="keyword-group keyword-group--primary">
              <strong>镜头</strong>
              <div className="keyword-chips">
                {cameras.map((c) => (
                  <span className="keyword-chip" key={c.zh || c.en}>{c.zh || c.en}</span>
                ))}
              </div>
            </div>
            {Object.entries(atmosphere).map(([group, words]) => (
              <div className="keyword-group" key={group}>
                <strong>{group}</strong>
                <div className="keyword-chips">
                  {(words || []).slice(0, 12).map((w) => <span className="keyword-chip" key={w}>{w}</span>)}
                </div>
              </div>
            ))}
          </div>
        </GuideSection>
      </div>
    </div>
  );
}

function fmtMb(v) {
  const n = Number(v || 0);
  if (n >= 1024) return `${(n / 1024).toFixed(1)} GB`;
  return `${n.toFixed(1)} MB`;
}

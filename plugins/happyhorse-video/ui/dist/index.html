            </div>
          </div>
        ) : videoUrl ? (
          <div className="video-player-wrap">
            <video src={videoUrl} controls loop />
          </div>
        ) : imageUrls.length ? (
          <div className={"image-result-grid" + (imageUrls.length === 1 ? " image-result-grid--single" : "")}>
            {imageUrls.map((url, idx) => (
              <div key={url + idx} className="image-result-card">
                <button
                  type="button"
                  className="image-result-card__preview"
                  onClick={() => openImageUrl(url)}
                  title="打开图片链接"
                >
                  <img src={url} alt={`生成图片 ${idx + 1}`} />
                </button>
                <div className="image-result-card__meta">
                  <div className="image-result-card__label">图片 {idx + 1}</div>
                  <div className="image-result-card__url" title={url}>{url}</div>
                  <button
                    type="button"
                    className="btn btn-sm btn-ghost image-result-card__copy"
                    onClick={() => openImageUrl(url)}
                  >
                    <Icon name={openStatus[url] === "opened" ? "check" : "external-link"} size={12} />
                    {openStatus[url] === "opening"
                      ? "打开中…"
                      : openStatus[url] === "opened"
                        ? "已打开"
                        : openStatus[url] === "copied"
                          ? "已复制"
                          : "打开链接"}
                  </button>
                  <button
                    type="button"
                    className="btn btn-sm btn-ghost image-result-card__copy"
                    onClick={() => copyImageUrl(url)}
                  >
                    <Icon name={copiedUrl === url ? "check" : "copy"} size={12} />
                    {copiedUrl === url ? "已复制" : "复制链接"}
                  </button>
                </div>
              </div>
            ))}
          </div>
        ) : (
          <div className="video-player-wrap video-player-empty">
            <Empty icon="alert-triangle" title="任务完成但没有返回可预览素材" />
          </div>
        )
      )}

      {(status === "failed" || status === "cancelled" || status === "timeout") && (
        <div className="card">
          <Banner kind="danger">
            {friendlyTaskError(liveTask?.error_message, `任务状态：${statusLabel(status)}`)}
          </Banner>
        </div>
      )}

      {liveTask && (
        <div className="card task-meta-card">
          <div className="task-meta-grid">
            <div>
              <span>模式</span>
              <strong>{liveTask.mode || "—"}</strong>
            </div>
            <div>
              <span>模型</span>
              <strong>{liveTask.model_id || "—"}</strong>
            </div>
            <div>
              <span>创建时间</span>
              <strong>{formatTaskTime(liveTask.created_at)}</strong>
            </div>
          </div>
          {liveTask.prompt && (
            <div className="task-prompt-preview">{liveTask.prompt}</div>
          )}
        </div>
      )}

      {showCost && <CostPreviewCard costPreview={costPreview} />}
    </div>
  );
}

function CreateTab({
  catalog,
  settings,
  onSubmit,
  onSettings,
  onGoFigures,
  initialMode = "t2v",
  title = "视频生成",
  subtitle = "按左侧步骤补齐素材、提示词和输出参数，右侧查看成本、进度与预览。",
  showModeChooser = false,
  modeIds = null,
}) {
  catalog = catalog || DEFAULT_CATALOG;
  const [mode, setMode] = useState(initialMode);
  const [modelId, setModelId] = useState("");
  const [prompt, setPrompt] = useState("");
  const [duration, setDuration] = useState(5);
  const [resolution, setResolution] = useState("720P");
  const [aspect, setAspect] = useState("16:9");
  const [voiceId, setVoiceId] = useState("");
  const [text, setText] = useState("");
  const [firstFrame, setFirstFrame] = useState("");
  const [lastFrame, setLastFrame] = useState("");
  const [sourceVideo, setSourceVideo] = useState("");
  const [imageUrl, setImageUrl] = useState("");
  const [imageUrls, setImageUrls] = useState([]);
  const [referenceUrls, setReferenceUrls] = useState([]);
  const [audioUrl, setAudioUrl] = useState("");
  // ── Advanced parameters (Wan 2.6 / 2.7 family) ─────────────────────
  // Each field is silently dropped by the backend when the selected
  // model doesn't advertise the matching ``supports_*`` capability,
  // so users can leave the panel collapsed without breaking anything.
  const [advOpen, setAdvOpen] = useState(false);
  const [promptExtend, setPromptExtend] = useState(true);
  const [negativePrompt, setNegativePrompt] = useState("");
  const [watermark, setWatermark] = useState(false);
  const [shotType, setShotType] = useState("");
  const [drivingAudioUrl, setDrivingAudioUrl] = useState("");
  const [modePro, setModePro] = useState(false);
  // ``audioEnabled`` only affects Wan 2.6 *-flash; null = inherit
  // default (the model decides). We initialise to null on first paint.
  const [audioEnabled, setAudioEnabled] = useState(null);
  const [costPreview, setCostPreview] = useState(null);
  const [submitting, setSubmitting] = useState(false);
  const [previewTaskId, setPreviewTaskId] = useState("");
  const [figures, setFigures] = useState([]);
  // P11: 上传/粘贴的音频时长。photo_speak / video_relip / avatar_compose 这类
  // 按音频时长计费的模式，必须有精确时长才能让前端 cost preview 和后端
  // 提交时的同步估算口径一致；否则前端按兜底 5s 估算 ¥2.5 不弹窗，后端按
  // 实际 18s 估算 ¥9 走 409，体验割裂。改用 HTMLAudioElement 拉一次
  // metadata，CORS 不通时退化为 null（后端 409 兜底会接住）。
  const [audioDurationSec, setAudioDurationSec] = useState(null);
  const modeIdSet = useMemo(() => (modeIds ? new Set(modeIds) : null), [modeIds]);
  const visibleModeGroups = useMemo(
    () => MODE_GROUPS
      .map((g) => ({ ...g, modes: g.modes.filter((mid) => !modeIdSet || modeIdSet.has(mid)) }))
      .filter((g) => g.modes.length),
    [modeIdSet]
  );

  useEffect(() => {
    setMode(initialMode);
    setPreviewTaskId("");
  }, [initialMode]);

  // P11: 探测音频时长。仅在 audioUrl 是 http(s) 公网链接时才尝试，本地预览
  // URL（blob: / data:）由浏览器自己加载，OSS 公网链接受 CORS 限制有可能
  // 拿不到 metadata —— 拿不到就算了，后端 409 兜底逻辑会接住。
  useEffect(() => {
    if (!audioUrl) { setAudioDurationSec(null); return; }
    let cancelled = false;
    const probeAudio = new Audio();
    probeAudio.preload = "metadata";
    const onMeta = () => {
      if (!cancelled) {
        const d = Number(probeAudio.duration);
        setAudioDurationSec(Number.isFinite(d) && d > 0 ? d : null);
      }
    };
    const onErr = () => { if (!cancelled) setAudioDurationSec(null); };
    probeAudio.addEventListener("loadedmetadata", onMeta);
    probeAudio.addEventListener("error", onErr);
    probeAudio.src = audioUrl;
    return () => {
      cancelled = true;
      probeAudio.removeEventListener("loadedmetadata", onMeta);
      probeAudio.removeEventListener("error", onErr);
      probeAudio.src = "";
    };
  }, [audioUrl]);

  const loadFigures = useCallback(() => {
    api("GET", "/figures").then((r) => setFigures(r.figures || [])).catch(() => setFigures([]));
  }, []);
  useEffect(() => { loadFigures(); }, [loadFigures]);
  useEffect(() => {
    const hasPending = figures.some((f) => figureDetectStatus(f) === "pending");
    if (!hasPending) return undefined;
    const timer = setInterval(loadFigures, 4000);
    return () => clearInterval(timer);
  }, [figures, loadFigures]);

  const modeSpec = useMemo(
    () => (catalog?.modes || []).find((m) => m.id === mode),
    [catalog, mode]
  );
  const modelOptions = useMemo(
    () => (catalog?.models || []).filter((m) => m.mode === mode),
    [catalog, mode]
  );

  // Default model — settings override → registry default → first option.
  useEffect(() => {
    const fromSettings = settings?.[`default_model_${mode}`];
    const fromCatalog = catalog?.default_models?.[mode];
    setModelId(fromSettings || fromCatalog || modelOptions[0]?.model_id || "");
  }, [mode, catalog, settings]);

  // Per-model allowed resolutions / durations / aspects. The global
  // catalog.resolutions list is just the union of every model; using it
  // verbatim lets the user pick e.g. "480P" for happyhorse-1.0-t2v which
  // only accepts 720P/1080P, and DashScope then 422s on submit.
  const modelEntry = useMemo(
    () => modelOptions.find((m) => m.model_id === modelId || m.id === modelId),
    [modelOptions, modelId]
  );
  const allowedResolutions = useMemo(() => {
    const list = (modelEntry?.resolutions && modelEntry.resolutions.length)
      ? modelEntry.resolutions
      : (catalog.resolutions || ["480P", "720P", "1080P"]);
    return list;
  }, [modelEntry, catalog]);
  const allowedAspects = useMemo(() => {
    const list = (modelEntry?.aspects && modelEntry.aspects.length)
      ? modelEntry.aspects
      : (catalog.aspects || ["16:9", "9:16", "1:1", "4:3", "3:4"]);
    return list;
  }, [modelEntry, catalog]);
  const allowedDuration = useMemo(() => {
    const range = modelEntry?.duration_range;
    return Array.isArray(range) && range.length === 2 ? range : [3, 15];
  }, [modelEntry]);
  const requiredAssets = modeSpec?.required_assets || [];
  const needsAudioOrText = requiredAssets.includes("audio_or_text");
  const promptEffectiveModes = new Set(["t2v", "i2v", "i2v_end", "video_extend", "r2v", "video_edit", "avatar_compose"]);
  const promptEffective = promptEffectiveModes.has(mode);
  const avatarComposeMode = mode === "avatar_compose";
  const animateMode = mode === "video_reface" || mode === "pose_drive";
  const videoSynthesisMode = ["t2v", "i2v", "i2v_end", "video_extend", "r2v", "video_edit"].includes(mode);
  const showDurationField = videoSynthesisMode;
  const showAspectField = videoSynthesisMode;
  const showResolutionField = videoSynthesisMode || mode === "photo_speak" || mode === "avatar_compose";
  const materialSectionTitle = needsAudioOrText ? "素材与配音" : "素材";
  const materialSectionHint = needsAudioOrText ? "提供形象素材和配音方式" : "仅显示当前模式需要的素材";

  useEffect(() => {
    if (allowedResolutions.length && !allowedResolutions.includes(resolution)) {
      setResolution(allowedResolutions[0]);
    }
  }, [allowedResolutions]);
  useEffect(() => {
    if (allowedAspects.length && !allowedAspects.includes(aspect)) {
      setAspect(allowedAspects[0]);
    }
  }, [allowedAspects]);
  useEffect(() => {
    const [lo, hi] = allowedDuration;
    if (duration < lo) setDuration(lo);
    else if (duration > hi) setDuration(hi);
  }, [allowedDuration]);

  const preferredTtsEngine = settings?.tts_engine === "edge" ? "edge" : "cosyvoice";
  const allVoiceOptions = useMemo(
    () => ((catalog.voices || []).length ? catalog.voices : FALLBACK_SYSTEM_VOICES),
    [catalog.voices]
  );
  const ttsVoiceOptions = useMemo(
    () => voicesForEngine(allVoiceOptions, preferredTtsEngine),
    [allVoiceOptions, preferredTtsEngine]
  );

  useEffect(() => {
    const currentMatches = voiceId && voiceEngineOf(voiceId) === preferredTtsEngine;
    if (currentMatches) return;
    const preferredDefault = settings?.default_voice && voiceEngineOf(settings.default_voice) === preferredTtsEngine
      ? settings.default_voice
      : "";
    setVoiceId(preferredDefault || voiceValue(ttsVoiceOptions[0]) || "");
  }, [preferredTtsEngine, settings?.default_voice, voiceId, ttsVoiceOptions]);

  // Engine is fully derived from the chosen voice; centralize the rule
  // so cost preview and submit can never disagree (and tests can target
  // a single source).
  const ttsEngine = useMemo(
    () => (voiceId ? voiceEngineOf(voiceId) : preferredTtsEngine),
    [preferredTtsEngine, voiceId]
  );

  const videoSubmitBody = useMemo(() => {
    const body = {
      mode,
      model_id: modelId,
      prompt: promptEffective ? prompt : "",
      duration: showDurationField ? duration : undefined,
      resolution: showResolutionField ? resolution : "",
      aspect_ratio: showAspectField ? aspect : "",
      voice_id: needsAudioOrText ? voiceId : "",
      tts_engine: needsAudioOrText ? ttsEngine : "",
      text: needsAudioOrText ? text : "",
      first_frame_url: requiredAssets.includes("first_frame_url") ? firstFrame : "",
      last_frame_url: requiredAssets.includes("last_frame_url") ? lastFrame : "",
      source_video_url: requiredAssets.includes("source_video_url") ? sourceVideo : "",
      image_url: requiredAssets.includes("image_url") ? imageUrl : "",
      image_urls: requiredAssets.includes("image_urls")
        ? (imageUrls || []).map((s) => (s || "").trim()).filter(Boolean)
        : [],
      reference_urls: requiredAssets.includes("reference_urls")
        ? (referenceUrls || []).map((s) => (s || "").trim()).filter(Boolean)
        : [],
      audio_url: needsAudioOrText ? audioUrl : "",
    };
    if (modelEntry?.supports_prompt_extend) body.prompt_extend = !!promptExtend;
    if (modelEntry?.supports_negative_prompt) body.negative_prompt = (negativePrompt || "").trim();
    if (modelEntry?.supports_watermark || animateMode) body.watermark = !!watermark;
    if ((modelEntry?.shot_types || []).length) body.shot_type = (shotType || "").trim();
    if (modelEntry?.supports_audio_url) body.driving_audio_url = (drivingAudioUrl || "").trim();
    if (audioEnabled !== null && modelEntry?.model_id && /flash/.test(modelEntry.model_id)) body.audio = audioEnabled;
    if (animateMode) body.mode_pro = !!modePro;
    if (avatarComposeMode && prompt.trim()) body.compose_prompt = prompt.trim();
    return body;
  }, [
    mode,
    modelId,
    prompt,
    duration,
    resolution,
    aspect,
    voiceId,
    ttsEngine,
    text,
    firstFrame,
    lastFrame,
    sourceVideo,
    imageUrl,
    imageUrls,
    referenceUrls,
    audioUrl,
    needsAudioOrText,
    requiredAssets,
    promptEffective,
    showDurationField,
    showResolutionField,
    showAspectField,
    promptExtend,
    negativePrompt,
    watermark,
    shotType,
    drivingAudioUrl,
    audioEnabled,
    animateMode,
    modePro,
    avatarComposeMode,
  ]);
  const currentSubmitSignature = useMemo(
    () => contentFingerprint("video", videoSubmitBody),
    [videoSubmitBody]
  );
  const [lastSubmittedSignature, setLastSubmittedSignature] = useState("");
  const duplicateSubmit = lastSubmittedSignature === currentSubmitSignature;
  // Cost preview (debounced). The dependency array intentionally includes
  // ``ttsEngine`` so switching from a cosyvoice voice to an Edge-TTS
  // voice (or vice versa) re-runs the preview — both engines have
  // different per-10k-char prices in PRICE_TABLE.
  useEffect(() => {
    if (!mode) return;
    const t = setTimeout(async () => {
      try {
        const r = await api("POST", "/cost-preview", {
          mode,
          model_id: modelId,
          duration,
          resolution,
          aspect_ratio: aspect,
          text: needsAudioOrText ? text : "",
          tts_engine: needsAudioOrText ? ttsEngine : "",
          // P11: 把音频真实时长传给后端，photo_speak / video_relip /
          // avatar_compose 这类按音频时长计费的模式预估才会准确。
          ...(audioDurationSec ? { audio_duration_sec: audioDurationSec } : {}),
          // ``audio`` / ``driving_audio_url`` shift the price tier for
          // Wan 2.6 -flash variants; include them so the preview tracks
          // the real cost as the user toggles "background audio".
          ...(audioEnabled !== null && modelEntry?.model_id && /flash/.test(modelEntry.model_id) ? { audio: audioEnabled } : {}),
          ...(modelEntry?.supports_audio_url && drivingAudioUrl ? { driving_audio_url: drivingAudioUrl } : {}),
        });
        setCostPreview(r);
      } catch (_) {}
    }, 300);
    return () => clearTimeout(t);
  }, [mode, modelId, duration, resolution, aspect, text, ttsEngine, audioEnabled, audioDurationSec, drivingAudioUrl, needsAudioOrText, modelEntry]);

  const submit = async () => {
    const required = requiredAssets;
    if (required.includes("first_frame_url") && !requireDashScopeUrl("首帧素材", firstFrame)) return;
    if (required.includes("last_frame_url") && !requireDashScopeUrl("尾帧素材", lastFrame)) return;
    if (required.includes("source_video_url") && !requireDashScopeUrl("源视频素材", sourceVideo)) return;
    if (required.includes("image_url") && !requireDashScopeUrl("人脸 / 形象图", imageUrl)) return;
    if (required.includes("image_urls")) {
      const urls = (imageUrls || []).map((s) => (s || "").trim()).filter(Boolean);
      if (!urls.length) {
        alert("当前模式需要额外参考图。请上传素材并确保生成 OSS 公网 URL，或手动粘贴公网 URL。");
        return;
      }
      for (const [idx, url] of urls.entries()) {
        if (!requireDashScopeUrl(`额外参考图 #${idx + 1}`, url)) return;
      }
    }
    if (required.includes("reference_urls")) {
      const urls = (referenceUrls || []).map((s) => (s || "").trim()).filter(Boolean);
      if (!urls.length) {
        alert("当前模式需要参考人物图。请上传素材并确保生成 OSS 公网 URL，或手动粘贴公网 URL。");
        return;
      }
      for (const [idx, url] of urls.entries()) {
        if (!requireDashScopeUrl(`参考人物图 #${idx + 1}`, url)) return;
      }
    }
    if (required.includes("audio_or_text") && !text.trim() && !audioUrl.trim()) {
      alert("当前模式需要台词或音频。请填写台词，或上传/粘贴 DashScope 可读取的公网音频 URL。");
      return;
    }
    if (needsAudioOrText && audioUrl.trim() && !requireDashScopeUrl("音频素材", audioUrl)) return;
    if (modelEntry?.supports_audio_url && drivingAudioUrl.trim() && !requireDashScopeUrl("背景 / 驱动音频", drivingAudioUrl)) return;

    // P11: 旧代码用前端 cost preview 的结果决定是否弹 confirm，但前端 preview
    // 经常因为缺音频时长而估算偏低。改成"前端尝试性提示 + 后端 409 兜底"：
    // 前端能预测出超阈值就先弹一次 confirm（用户取消则直接返回），同时
    // 在 submit 时通过 submitTaskWithApprovalDialog 接住后端 409 二次确认。
    // 这样两条路径都能保证「成本超阈值时用户必然看到明细弹窗才会提交」，
    // 也彻底消除"任务创建后被偷偷搁置在 awaiting_approval"的体验割裂。
    if (costPreview?.exceeds_threshold) {
      const ok = window.confirm(
        `本次预估成本为 ${costPreview.formatted_total || "较高"}，已超过阈值。确认继续提交吗？`
      );
      if (!ok) return;
    }
    if (duplicateSubmit) {
      alert("任务内容没有变化，不能重复提交。请修改提示词、素材或参数后再提交。");
      return;
    }
    setSubmitting(true);
    try {
      const body = {
        ...videoSubmitBody,
        cost_approved: !!costPreview?.exceeds_threshold,
        client_request_id: currentSubmitSignature,
        ...(audioDurationSec ? { audio_duration_sec: audioDurationSec } : {}),
      };
      const r = await submitTaskWithApprovalDialog("/tasks", body);
      const tid = r.task?.task_id || r.task?.id || "";
      if (tid) setPreviewTaskId(tid);
      setLastSubmittedSignature(currentSubmitSignature);
      if (tid) onSubmit?.({ taskId: tid, label: "视频任务" });
    } catch (e) {
      if (e?.cancelled) return; // 用户在 409 弹窗里点了取消，不要再 alert
      alert(`提交失败: ${e.message}`);
    } finally {
      setSubmitting(false);
    }
  };

  const liveTask = useTaskHeartbeat(previewTaskId);

  // Digital-human modes drive purely from image + audio/voice and don't
  // need a text prompt; their MODE spec on the backend reflects that.
  // ``CreateTab`` used to disable submit on `!prompt`, blocking these
  // perfectly valid task shapes.
  const PROMPT_OPTIONAL_MODES = new Set([
    "photo_speak",
    "video_relip",
    "video_reface",
    "pose_drive",
    "avatar_compose",
  ]);
  const promptRequired = promptEffective && !PROMPT_OPTIONAL_MODES.has(mode);
  const submitDisabled = submitting || duplicateSubmit || (promptRequired && !prompt.trim());

  return (
    <div className="split-layout workbench-layout">
      <div className="split-left create-panel">
        <div className="workbench-title">
          <div>
        <h2 className="page-title">
          <Icon name={modeSpec?.icon || "wand-sparkles"} /> {title}
        </h2>
            <p className="page-subtitle">{subtitle}</p>
          </div>
        </div>

        {showModeChooser && (
          <section className="card create-section create-section--mode">
            <div className="create-section__head">
              <h3><Icon name="layers" size={14} /> 生成模式</h3>
              <span>选择当前大类下的具体能力</span>
            </div>
            {visibleModeGroups.map((g) => (
              <div key={g.label} className="mode-block">
                <p className="mode-group-label">{g.label}</p>
                <div className="mode-grid">
                  {g.modes.map((mid) => {
                    const m = (catalog.modes || []).find((x) => x.id === mid);
                    if (!m) return null;
                    return (
                      <button
                        key={mid}
                        className={"mode-btn" + (mode === mid ? " active" : "")}
                        onClick={() => setMode(mid)}
                        title={m.description_zh}
                      >
                        <Icon name={m.icon || "wand-sparkles"} size={18} />
                        <div>{m.label_zh}</div>
                      </button>
                    );
                  })}
                </div>
              </div>
            ))}
          </section>
        )}

        <section className="card create-section">
          <div className="create-section__head">
            <h3><Icon name="settings" size={14} /> {promptEffective ? "模型与提示词" : "模型"}</h3>
            <span>{modeSpec?.label_zh || mode}</span>
          </div>
          <div className="field">
            <label>模型 (model_id)</label>
            <select value={modelId} onChange={(e) => setModelId(e.target.value)}>
              {modelOptions.map((m) => (
                <option key={m.model_id} value={m.model_id}>
                  {m.label_zh}
                  {catalog.default_models?.[mode] === m.model_id ? "（默认）" : ""}
                </option>
              ))}
            </select>
          </div>

          {promptEffective ? (
            <>
              <div className="field">
                <label>{avatarComposeMode ? "合成提示词 (compose_prompt)" : "提示词 (prompt)"}</label>
                <textarea
                  value={prompt}
                  onChange={(e) => setPrompt(e.target.value)}
                  placeholder={avatarComposeMode
                    ? "描述人物如何融合到参考场景中，例如：半身构图，未来感工作室背景，人物自然看向镜头"
                    : "例如：电影级画质，5秒，16:9，温暖治愈\n0-2秒：中景，主角推开门\n2-5秒：跟镜头，主角走进花园\n【声音】轻柔钢琴 + 鸟鸣"}
                />
              </div>
              <PromptAssistPanel
                prompt={prompt}
                setPrompt={setPrompt}
                negativePrompt={negativePrompt}
                setNegativePrompt={setNegativePrompt}
                aspect={aspect}
                setAspect={setAspect}
                allowedAspects={allowedAspects}
              />
            </>
          ) : (
            <div className="compact-empty-note">
              当前模式不读取普通提示词，只使用下方显示的素材、台词或专用参数。
            </div>
          )}
        </section>

        <section className="card create-section">
          <div className="create-section__head">
            <h3><Icon name="image-up" size={14} /> {materialSectionTitle}</h3>
            <span>{materialSectionHint}</span>
          </div>
          {(modeSpec?.required_assets || []).includes("first_frame_url") && (
            <UploadUrlField
              label="首帧素材 (first_frame_url)"
              value={firstFrame}
              onChange={setFirstFrame}
              accept="image/*"
              kind="image"
              hint="上传一张作为视频开头的图片"
            />
          )}
          {(modeSpec?.required_assets || []).includes("last_frame_url") && (
            <UploadUrlField
              label="尾帧素材 (last_frame_url)"
              value={lastFrame}
              onChange={setLastFrame}
              accept="image/*"
              kind="image"
              hint="上传一张作为视频结尾的图片"
            />
          )}
          {(modeSpec?.required_assets || []).includes("source_video_url") && (
            <UploadUrlField
              label="源视频素材 (source_video_url)"
              value={sourceVideo}
              onChange={setSourceVideo}
              accept="video/*"
              kind="video"
              hint="上传需要续写、编辑、换脸或口型重配的视频"
            />
          )}
          {(modeSpec?.required_assets || []).includes("image_url") && (
            <>
              <FigureLibraryPicker
                figures={figures}
                selectedUrl={imageUrl}
                onPick={(url) => setImageUrl(url)}
                onGoFigures={onGoFigures}
              />
              <UploadUrlField
                label="人脸 / 形象图 (image_url)"
                value={imageUrl}
                onChange={setImageUrl}
                accept="image/*"
                kind="image"
                hint="可从上方形象库选择，也可以上传新的正面单人照"
              />
            </>
          )}
          {(modeSpec?.required_assets || []).includes("image_urls") && (
            <MultiUploadUrlField
              label="额外参考图 (image_urls)"
              values={imageUrls}
              onChange={setImageUrls}
              accept="image/*"
              kind="image"
              hint="按需上传 1-9 张额外参考图，会一并发给 DashScope"
            />
          )}
          {(modeSpec?.required_assets || []).includes("reference_urls") && (
            <MultiUploadUrlField
              label="参考人物图 (reference_urls)"
              values={referenceUrls}
              onChange={setReferenceUrls}
              accept="image/*"
              kind="image"
              hint="r2v / long_video 接受多张参考人物图，多角色互动时建议每个角色一张"
            />
          )}
          {!needsAudioOrText && mode === "t2v" && (
            <div className="compact-empty-note">
              文生视频无需上传素材；画面、动作、镜头和声音氛围都写在上方提示词里。
            </div>
          )}

          {needsAudioOrText && (
            <div className="create-audio-grid">
              <div className="create-audio-card create-audio-card--tts">
                <div className="create-audio-card__head">
                  <Icon name="mic" size={16} />
                  <div>
                    <strong>文字合成 TTS</strong>
                    <span>选择音色并填写台词，系统会自动生成配音。</span>
                  </div>
                </div>
                <div className="create-audio-form">
                  <div className="field">
                    <label>音色</label>
                    <select value={voiceId} onChange={(e) => setVoiceId(e.target.value)}>
                      <option value="">(无)</option>
                      {ttsVoiceOptions.map((v) => (
                        <option key={v.id} value={voiceValue(v)}>
                          {v.label_zh || v.label}
                        </option>
                      ))}
                    </select>
                    <div className="field-hint">
                      当前使用 {preferredTtsEngine === "edge" ? "Edge-TTS（免费）" : "CosyVoice（百炼付费）"}，这里只显示匹配的音色。
                    </div>
                  </div>
                  <div className="field">
                    <label>台词</label>
                    <textarea
                      className="voice-script-input"
                      value={text}
                      onChange={(e) => setText(e.target.value)}
                      placeholder="输入要朗读的台词。可以是一段完整口播、旁白或角色对白。"
                    />
                  </div>
                </div>
              </div>
              <div className="create-audio-card create-audio-card--upload">
                <div className="create-audio-card__head">
                  <Icon name="upload" size={16} />
                  <div>
                    <strong>上传成品配音（可选）</strong>
                    <span>已有录音时可直接上传；留空则使用左侧文字合成。</span>
                  </div>
                </div>
                <UploadUrlField
                  label="音频素材"
                  value={audioUrl}
                  onChange={setAudioUrl}
                  accept="audio/*"
                  kind="audio"
                  hint="上传配音音频，或粘贴公网音频 URL"
                />
              </div>
            </div>
          )}
          {!needsAudioOrText && !(modeSpec?.required_assets || []).length && (
            <div className="compact-empty-note">当前模式仅需要提示词和输出参数，无额外素材。</div>
          )}
        </section>

        <section className="card create-section">
          <div className="create-section__head">
            <h3><Icon name="settings" size={14} /> 输出参数</h3>
            <span>控制视频规格</span>
          </div>
          {(showDurationField || showResolutionField || showAspectField || animateMode) ? (
            <div className="settings-grid three">
              {showDurationField && (
                <div className="field">
                  <label>时长 (秒)</label>
                  <input
                    type="number"
                    value={duration}
                    onChange={(e) => {
                      const [lo, hi] = allowedDuration;
                      const v = parseInt(e.target.value, 10);
                      if (Number.isFinite(v)) {
                        setDuration(Math.max(lo, Math.min(hi, v)));
                      } else {
                        setDuration(lo);
                      }
                    }}
                    min={allowedDuration[0]}
                    max={allowedDuration[1]}
                  />
                </div>
              )}
              {showResolutionField && (
                <div className="field">
                  <label>分辨率</label>
                  <select value={resolution} onChange={(e) => setResolution(e.target.value)}>
                    {allowedResolutions.map((r) => (
                      <option key={r}>{r}</option>
                    ))}
                  </select>
                </div>
              )}
              {showAspectField && (
                <div className="field">
                  <label>比例</label>
                  <select value={aspect} onChange={(e) => setAspect(e.target.value)}>
                    {allowedAspects.map((a) => (
                      <option key={a}>{a}</option>
                    ))}
                  </select>
                </div>
              )}
              {animateMode && (
                <>
                  <div className="field">
                    <label>生成档位</label>
                    <select value={modePro ? "pro" : "std"} onChange={(e) => setModePro(e.target.value === "pro")}>
                      <option value="std">标准 wan-std</option>
                      <option value="pro">增强 wan-pro</option>
                    </select>
                  </div>
                  <div className="field">
                    <label>
                      <input
                        type="checkbox"
                        checked={!!watermark}
                        onChange={(e) => setWatermark(e.target.checked)}
                        style={{ marginRight: 6 }}
                      />
                      显示水印
                    </label>
                  </div>
                </>
              )}
            </div>
          ) : (
            <div className="compact-empty-note">
              当前模式的时长、比例和分辨率由源素材或音频决定，不需要额外设置。
            </div>
          )}
        </section>

        {/*
          ── 高级参数面板 ──
          Only render fields the *selected model* actually supports
          (capability flags from the catalog). Wan 2.6 / 2.7 models
          surface most; HappyHorse 1.0 surfaces none (it rejects the
          underlying parameters server-side). The whole section is
          hidden when no advanced field is supported, so the UI stays
          clean for HappyHorse users.
        */}
        {videoSynthesisMode && modelEntry && (
          modelEntry.supports_prompt_extend ||
          modelEntry.supports_negative_prompt ||
          modelEntry.supports_watermark ||
          modelEntry.supports_audio_url ||
          ((modelEntry.shot_types || []).length > 0)
        ) && (
          <section className="card create-section">
            <div className="create-section__head">
              <h3>
                <button
                  type="button"
                  className="btn-link"
                  onClick={() => setAdvOpen((v) => !v)}
                  style={{ display: "inline-flex", alignItems: "center", gap: 6 }}
                  title="点击展开/收起高级参数"
                >
                  <Icon name={advOpen ? "chevron-down" : "chevron-right"} size={14} />
                  高级参数（Wan 2.6 / 2.7）
                </button>
              </h3>
              <span>仅当前所选模型支持的项才会显示</span>
            </div>
            {advOpen && (
              <div className="settings-grid two" style={{ gap: 12 }}>
                {modelEntry.supports_prompt_extend && (
                  <div className="field">
                    <label title="开启后由模型自动改写润色提示词；首次尝试建议开启">
                      <input
                        type="checkbox"
                        checked={!!promptExtend}
                        onChange={(e) => setPromptExtend(e.target.checked)}
                        style={{ marginRight: 6 }}
                      />
                      智能扩写 (prompt_extend)
                    </label>
                  </div>
                )}
                {modelEntry.supports_watermark && (
                  <div className="field">
                    <label title="开启后在画面右下角打印「AI 生成」水印">
                      <input
                        type="checkbox"
                        checked={!!watermark}
                        onChange={(e) => setWatermark(e.target.checked)}
                        style={{ marginRight: 6 }}
                      />
                      显示水印 (watermark)
                    </label>
                  </div>
                )}
                {modelEntry.shot_types && modelEntry.shot_types.length > 0 && (
                  <div className="field">
                    <label>镜头类型 (shot_type)</label>
                    <select value={shotType} onChange={(e) => setShotType(e.target.value)}>
                      <option value="">（模型默认）</option>
                      {modelEntry.shot_types.map((s) => (
                        <option key={s} value={s}>
                          {s === "single" ? "单镜头 single" : s === "multi" ? "多镜头 multi" : s}
                        </option>
                      ))}
                    </select>
                  </div>
                )}
                {/* Wan 2.6 *-flash variants accept an audio on/off
                    toggle that halves the per-second price when off. */}
                {modelEntry.model_id && /flash/.test(modelEntry.model_id) && (
                  <div className="field">
                    <label title="关闭则生成无声视频；万相 2.6 *-flash 无声档单价减半">
                      生成音轨 (audio)
                    </label>
                    <select
                      value={audioEnabled === null ? "" : audioEnabled ? "true" : "false"}
                      onChange={(e) => {
                        const v = e.target.value;
                        setAudioEnabled(v === "" ? null : v === "true");
                      }}
                    >
                      <option value="">（模型默认）</option>
                      <option value="true">开启 audio=true</option>
                      <option value="false">关闭 audio=false（更便宜）</option>
                    </select>
                  </div>
                )}
                {modelEntry.supports_audio_url && mode !== "t2v" && (
                  <div className="field" style={{ gridColumn: "1 / -1" }}>
                    <UploadUrlField
                      label="背景 / 驱动音频 URL (driving_audio_url)"
                      kind="audio"
                      value={drivingAudioUrl}
                      onChange={setDrivingAudioUrl}
                      accept="audio/*"
                      hint="可选：上传/粘贴音频。Wan 2.7 i2v 用作驱动音；Wan 2.6 i2v/r2v/-flash 用作背景音"
                    />
                  </div>
                )}
                {modelEntry.supports_negative_prompt && (
                  <div className="field" style={{ gridColumn: "1 / -1" }}>
                    <label>反向提示词 (negative_prompt)</label>
                    <textarea
                      rows={2}
                      value={negativePrompt}
                      onChange={(e) => setNegativePrompt(e.target.value)}
                      placeholder="描述你不希望出现的元素：模糊、低画质、变形、文字水印…"
                    />
                  </div>
                )}
              </div>
            )}
          </section>
        )}

        <div className="create-submit-bar">
          <button
            className="btn btn-block"
            onClick={submit}
            disabled={submitDisabled}
            title={duplicateSubmit ? "当前任务内容已提交，修改提示词、素材或参数后才能再次提交" : ""}
          >
            {submitting ? <Spinner /> : <Icon name="rocket" size={14} />}
            {submitting ? "提交中…" : duplicateSubmit ? "内容未变，无需重复提交" : "提交任务"}
          </button>
        </div>
      </div>

      <TaskPreviewPane
        taskId={previewTaskId}
        task={liveTask}
        costPreview={costPreview}
        onGoTasks={() => onSubmit?.({ goTasks: true })}
      />
    </div>
  );
}

// ── Image Tab ───────────────────────────────────────────────────────

function ImageTab({ catalog, settings, onSubmit, onSettings }) {
  catalog = catalog || DEFAULT_CATALOG;
  const imageCatalog = catalog?.image || {};
  const modes = imageCatalog.modes || [];
  const models = imageCatalog.models || [];
  const [mode, setMode] = useState("image_text2img");
  const [modelId, setModelId] = useState(settings?.default_image_model || imageCatalog.default_model || "wan27-pro");
  const [size, setSize] = useState(settings?.default_image_size || imageCatalog.default_size || "2K");
  const [prompt, setPrompt] = useState("");
  const [productName, setProductName] = useState("");
  const [negativePrompt, setNegativePrompt] = useState("");
  const [n, setN] = useState(1);
  const [imageUrls, setImageUrls] = useState("");
  const [styleIndex, setStyleIndex] = useState(0);
  const [styleRefUrl, setStyleRefUrl] = useState("");
  const [backgroundRefUrl, setBackgroundRefUrl] = useState("");
  const [outputRatio, setOutputRatio] = useState("");
  const [sketchStyle, setSketchStyle] = useState("<watercolor>");
  const [scenes, setScenes] = useState(["hero", "scene"]);
  const [busy, setBusy] = useState(false);
  const [previewTaskId, setPreviewTaskId] = useState("");

  useEffect(() => {
    setModelId(settings?.default_image_model || imageCatalog.default_model || "wan27-pro");
    setSize(settings?.default_image_size || imageCatalog.default_size || "2K");
  }, [settings, imageCatalog.default_model, imageCatalog.default_size]);

  // Image models declare wildly different size spaces ("2K" vs
  // "1024*1024" vs "1664*928"...). When the user switches models, the
  // previously-chosen size is almost always invalid for the new model
  // and DashScope rejects the request with a 400. Auto-snap the size
  // back into the new model's allowed set whenever the model id
  // changes (or the catalog reloads).
  useEffect(() => {
    const m = models.find((x) => x.id === modelId);
    const allowed = m?.sizes?.length ? m.sizes : (imageCatalog.sizes || []);
    if (allowed.length && !allowed.includes(size)) {
      setSize(m?.default_size || allowed[0]);
    }
  }, [modelId, models, imageCatalog.sizes]);

  const selectedModel = models.find((m) => m.id === modelId) || models[0];
  const sizes = selectedModel?.sizes?.length ? selectedModel.sizes : (imageCatalog.sizes || ["2K"]);
  const modeSpec = modes.find((m) => m.id === mode);
  const requiresImages = (modeSpec?.required_assets || []).includes("images");
  const supportsPrompt = ["image_text2img", "image_edit", "image_background", "image_sketch", "image_ecommerce"].includes(mode);
  const supportsModelAndSize = ["image_text2img", "image_edit", "image_sketch", "image_ecommerce"].includes(mode);
  const supportsNegativePrompt = ["image_text2img", "image_edit"].includes(mode) && !!selectedModel?.supports_negative;
  const supportsPromptAssist = ["image_text2img", "image_edit", "image_background", "image_sketch", "image_ecommerce"].includes(mode);
  const supportsCount = ["image_text2img", "image_edit", "image_background", "image_sketch", "image_ecommerce"].includes(mode);
  const parsedImages = imageUrls.split(/[\s,]+/).map((s) => s.trim()).filter(Boolean);
  const liveTask = useTaskHeartbeat(previewTaskId);
  const imageSubmitBody = useMemo(() => ({
    mode,
    prompt: supportsPrompt ? prompt : "",
    product_name: mode === "image_ecommerce" ? productName : "",
    model_id: supportsModelAndSize ? modelId : "",
    size: supportsModelAndSize ? size : "",
    negative_prompt: supportsNegativePrompt ? negativePrompt : "",
    n: supportsCount ? n : 1,
    images: parsedImages,
    style_index: mode === "image_style_repaint" ? styleIndex : 0,
    style_ref_url: mode === "image_style_repaint" ? styleRefUrl : "",
    ref_image_url: mode === "image_background" ? backgroundRefUrl : "",
    output_ratio: mode === "image_outpaint" ? outputRatio : "",
    sketch_style: mode === "image_sketch" ? sketchStyle : "",
    ecommerce_scenes: mode === "image_ecommerce" ? scenes : [],
    wait_for_completion: false,
  }), [
    mode,
    supportsPrompt,
    supportsModelAndSize,
    supportsNegativePrompt,
    supportsCount,
    prompt,
    productName,
    modelId,
    size,
    negativePrompt,
    n,
    imageUrls,
    styleIndex,
    styleRefUrl,
    backgroundRefUrl,
    outputRatio,
    sketchStyle,
    scenes,
  ]);
  const currentImageSubmitSignature = useMemo(
    () => contentFingerprint("image", imageSubmitBody),
    [imageSubmitBody]
  );
  const [lastImageSubmittedSignature, setLastImageSubmittedSignature] = useState("");
  const duplicateImageSubmit = lastImageSubmittedSignature === currentImageSubmitSignature;

  const submit = async () => {
    if (requiresImages) {
      if (!parsedImages.length) {
        alert("当前图片模式需要输入图片。请上传素材并确保生成 OSS 公网 URL，或手动粘贴公网 URL。");
        return;
      }
      for (const [idx, url] of parsedImages.entries()) {
        if (!requireDashScopeUrl(`输入图片 #${idx + 1}`, url)) return;
      }
    }
    if (mode === "image_style_repaint" && Number(styleIndex) === -1) {
      if (!styleRefUrl.trim()) {
        alert("选择「自定义参考风格图」后，需要上传或粘贴一张风格参考图 URL。");
        return;
      }
      if (!requireDashScopeUrl("自定义参考风格图", styleRefUrl)) return;
    }
    if (mode === "image_background") {
      if (!prompt.trim() && !backgroundRefUrl.trim()) {
        alert("背景生成需要填写背景描述，或上传一张背景参考图。");
        return;
      }
      if (backgroundRefUrl.trim() && !requireDashScopeUrl("背景参考图", backgroundRefUrl)) return;
    }
    if (duplicateImageSubmit) {
      alert("图片任务内容没有变化，不能重复提交。请修改提示词、素材或参数后再提交。");
      return;
    }
    setBusy(true);
    try {
      const r = await api("POST", "/image-tasks", {
        ...imageSubmitBody,
        client_request_id: currentImageSubmitSignature,
      });
      const tid = r.task?.task_id || r.task?.id || "";
      if (tid) setPreviewTaskId(tid);
      setLastImageSubmittedSignature(currentImageSubmitSignature);
      if (tid) onSubmit?.({ taskId: tid, label: "图片任务" });
    } catch (e) {
      alert(`提交失败：${e.message}`);
    } finally {
      setBusy(false);
    }
  };

  const imageInputLabel =
    mode === "image_background"
      ? "主体透明 PNG（RGBA 抠图）"
      : mode === "image_style_repaint"
        ? "待重绘图片"
        : mode === "image_outpaint"
          ? "待扩展图片"
          : mode === "image_sketch"
            ? "草图图片"
            : "输入图片 URLs（可上传；多个用逗号或换行分隔）";
  const imageInputHint =
    mode === "image_background"
      ? "背景生成不是直接改普通照片；需要主体外侧为透明区域的 PNG，否则模型会保留原背景。普通人像照建议改用「图像编辑」。"
      : mode === "image_style_repaint"
        ? "只作为内容主体；风格由下方预设或自定义风格参考图决定。"
        : mode === "image_outpaint"
        ? "用于把原图边缘延展到目标比例，适合补宽、补高或改画幅。"
          : mode === "image_sketch"
            ? "上传草图或线稿，再用成图提示词描述要生成的完整画面。"
            : "用于图像编辑、参考融合或草图生成。";
  const missingContent =
    (["image_text2img", "image_edit", "image_sketch"].includes(mode) && !prompt.trim()) ||
    (mode === "image_background" && !prompt.trim() && !backgroundRefUrl.trim()) ||
    (mode === "image_ecommerce" && !prompt.trim() && !productName.trim());
  const imageSubmitDisabled = busy || duplicateImageSubmit || missingContent || (requiresImages && !parsedImages.length);

  return (
    <div className="split-layout workbench-layout">
      <div className="split-left create-panel">
        <div className="workbench-title">
          <div>
            <h2 className="page-title"><Icon name="image" /> 图片生成</h2>
            <p className="page-subtitle">先选择模式，再用比例、风格、镜头和反向提示词等参数助手快速补齐生成要求。</p>
          </div>
        </div>

        <section className="card create-section">
          <div className="create-section__head">
            <h3><Icon name="layers" size={14} /> 图片模式</h3>
            <span>万相 / 千问图片能力</span>
          </div>
          <div className="mode-grid image-mode-grid">
            {modes.map((m) => (
              <button key={m.id} className={"mode-btn" + (mode === m.id ? " active" : "")} onClick={() => setMode(m.id)} title={m.description_zh}>
                <Icon name={m.icon || "image"} size={18} />
                <div>{m.label_zh}</div>
              </button>
            ))}
          </div>
        </section>

        <section className="card create-section">
          <div className="create-section__head">
            <h3><Icon name="settings" size={14} /> {supportsModelAndSize ? "模型与提示词" : "功能说明"}</h3>
            <span>{modeSpec?.label_zh || mode}</span>
          </div>
          {supportsModelAndSize ? (
            <div className="settings-grid two">
              <div className="field">
                <label>图片模型</label>
                <select value={modelId} onChange={(e) => setModelId(e.target.value)}>
                  {models.map((m) => <option key={m.id} value={m.id}>{m.label_zh}</option>)}
                </select>
              </div>
              <div className="field">
                <label>尺寸</label>
                <select value={size} onChange={(e) => setSize(e.target.value)}>
                  {sizes.map((s) => <option key={s}>{s}</option>)}
                </select>
              </div>
            </div>
          ) : mode === "image_style_repaint" ? (
            <div className="library-callout library-callout--compact">
              <Icon name="info" size={14} />
              <span>选择一张待重绘图片，再在下方选择预设风格或上传风格参考图。</span>
            </div>
          ) : mode === "image_background" ? (
            <div className="library-callout library-callout--compact">
              <Icon name="info" size={14} />
              <span>上传透明 PNG 主体图，然后用背景描述或背景参考图引导新背景。</span>
            </div>
          ) : mode === "image_outpaint" ? (
            <div className="library-callout library-callout--compact">
              <Icon name="info" size={14} />
              <span>选择一张图片和目标比例，模型会沿着原图边缘补全画布；需要重设背景时请切换到「图像编辑」。</span>
            </div>
          ) : null}

                  <option value={-1}>自定义参考风格图</option>

                  onChange={setBackgroundRefUrl}
                  accept="image/*"
                  kind="image"
                  hint="可选：上传一张背景参考图，引导背景空间和光线。只填写背景描述也可以生成。"
                />

              <div className="field">
                <label>扩图比例</label>
                <select value={outputRatio} onChange={(e) => setOutputRatio(e.target.value)}>
                  <option value="">自动</option>
                  <option value="1:1">1:1</option>
                  <option value="16:9">16:9</option>

                <label>草图风格</label>

                  {(imageCatalog.sketch_styles || []).map((s) => <option key={s.id} value={s.id}>{s.name}</option>)}
                </select>

          {mode === "image_style_repaint" && Number(styleIndex) === -1 && (
            <UploadUrlField
              label="自定义参考风格图 (style_ref_url)"
              value={styleRefUrl}
              onChange={setStyleRefUrl}
              accept="image/*"
              kind="image"
              hint="上传一张你想模仿的风格参考图；它会作为风格来源，不是内容主体"
            />
          )}
          {mode === "image_ecommerce" && (
            <>
              <div className="field">
                <label>商品名称</label>
                <input value={productName} onChange={(e) => setProductName(e.target.value)} placeholder="例如：黑色便携咖啡机" />
              </div>
              <div className="filter-group__buttons">
                {(imageCatalog.ecommerce_scenes || []).map((s) => (
                  <button key={s.id} className={"mode-btn" + (scenes.includes(s.id) ? " active" : "")} onClick={() => setScenes((prev) => prev.includes(s.id) ? prev.filter((x) => x !== s.id) : [...prev, s.id])}>

        <div className="create-submit-bar">

      <TaskPreviewPane
        taskId={previewTaskId}

  );

function apiBase() {
  const meta = (window.OpenAkita && window.OpenAkita.meta) || {};
  const injected = (meta.apiBase || "").replace(/\/$/, "");
  if (injected.includes("/api/plugins/")) {
    return injected;
  }
  return `${injected}/api/plugins/${PLUGIN_ID}`;
}

// P11: 自定义异常类型，把 status code 和后端 detail 原样带出去，让调用方
// 能针对 409（cost_exceeds_threshold）做二次确认，而不是一概当作致命错误
// alert("409 some text") 出来。
class ApiError extends Error {
  constructor(status, message, detail) {
    super(message);
    this.name = "ApiError";
    this.status = status;
    this.detail = detail;
  }
}

async function api(method, path, body) {
  if (window.OpenAkita && typeof window.OpenAkita.api === "function") {
    const result = await window.OpenAkita.api(
      method,
      `/api/plugins/${PLUGIN_ID}${path}`,
      body,
    );
    const responseBody = result?.body;
    if (!result?.ok) {
      const detail = responseBody?.detail ?? responseBody ?? result?.error;
      const message =
        (detail && typeof detail === "object" && detail.message)
        || (typeof detail === "string" && detail)
        || `${result?.status || 0} request failed`;
      throw new ApiError(result?.status || 0, message, detail);
    }
    return responseBody;
  }

  const opts = { method, headers: {} };
  if (body !== undefined) {
    opts.headers["Content-Type"] = "application/json";
    opts.body = JSON.stringify(body);
  }
  const url = apiBase() + path;
  const res = await fetch(url, opts);
  if (!res.ok) {
    const text = await res.text().catch(() => "");
    // FastAPI HTTPException 的响应总是 {detail: <obj|str>}。把它解析出来
    // 让上层能拿到结构化的 cost_breakdown。
    let detail = null;
    try { detail = JSON.parse(text)?.detail ?? null; } catch (_) {}
    const message =
      (detail && typeof detail === "object" && detail.message)
      || (typeof detail === "string" && detail)
      || `${res.status} ${res.statusText}`;
    throw new ApiError(res.status, message, detail);
  }
  return res.json();
}

async function uploadAsset(file) {
  const fd = new FormData();
  fd.append("file", file);
  if (window.OpenAkita && typeof window.OpenAkita.upload === "function") {
    const result = await window.OpenAkita.upload(
      `/api/plugins/${PLUGIN_ID}/upload`,
      fd,
    );
    if (!result?.ok) {
      const detail = result?.body?.detail ?? result?.body ?? result?.error;
      const message =
        (detail && typeof detail === "object" && (detail.message || detail.error))
        || (typeof detail === "string" && detail)
        || `${result?.status || 0} upload failed`;
      throw new Error(message);
    }
    return result.body;
  }

  const res = await fetch(apiBase() + "/upload", { method: "POST", body: fd });
  return res.json();
}

// P11: 通用提交助手。后端 POST /tasks 现在会同步估算成本，超阈值且未批准
// 时返回 409 + cost_breakdown，旧的"创建后任务卡在 pending"路径不再发生。
// 这个 helper 把"接收 409 → 弹窗显示明细 → 带 cost_approved=true 重提"
// 的逻辑抽出来，所有提交点（视频 / 图片 / 长视频）都能复用。
function formatCostBreakdownLines(breakdown) {
  if (!breakdown) return "";
  const items = Array.isArray(breakdown.items) ? breakdown.items : [];
  return items
    .map((it) => {
      const sub = typeof it.subtotal === "number" ? it.subtotal.toFixed(2) : it.subtotal;
      const u = typeof it.units === "number" && it.unit_label
        ? ` (${it.units}${it.unit_label})` : "";
      return `· ${it.name}${u}: ¥${sub}${it.note ? `  — ${it.note}` : ""}`;
    })
    .join("\n");
}

async function submitTaskWithApprovalDialog(path, body) {
  try {
    return await api("POST", path, body);
  } catch (e) {
    if (e instanceof ApiError && e.status === 409 && e.detail?.cost_breakdown) {
      const bd = e.detail.cost_breakdown;
      const total = bd.formatted_total || `¥${(Number(bd.total) || 0).toFixed(2)}`;
      const threshold = `¥${(Number(bd.threshold) || 0).toFixed(2)}`;
      const lines = formatCostBreakdownLines(bd);
      const ok = window.confirm(
        `本次预估成本 ${total}，已超过阈值（${threshold}）。\n\n${lines}\n\n确认继续提交吗？`
      );
      if (!ok) {
        const cancelled = new Error("已取消提交");
        cancelled.cancelled = true;
        throw cancelled;
      }
      return await api("POST", path, { ...body, cost_approved: true });
    }
    throw e;
  }
}

function stableTaskStringify(value) {
  if (Array.isArray(value)) {
    return `[${value.map((item) => stableTaskStringify(item)).join(",")}]`;
  }
  if (value && typeof value === "object") {
    return `{${Object.keys(value)
      .filter((key) => value[key] !== undefined)
      .sort()
      .map((key) => `${JSON.stringify(key)}:${stableTaskStringify(value[key])}`)
      .join(",")}}`;
  }
  return JSON.stringify(value);
}

function contentFingerprint(prefix, payload) {
  const raw = stableTaskStringify(payload);
  let hash = 2166136261;
  for (let i = 0; i < raw.length; i += 1) {
    hash ^= raw.charCodeAt(i);
    hash = Math.imul(hash, 16777619);
  }
  return `${prefix}_${(hash >>> 0).toString(36)}_${raw.length.toString(36)}`;
}

function readStoryboardDraft() {
  try {
    const raw = window.localStorage?.getItem(STORYBOARD_DRAFT_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch (_) {
    return {};
  }
}

function writeStoryboardDraft(draft) {
  try {
    window.localStorage?.setItem(STORYBOARD_DRAFT_KEY, JSON.stringify(draft || {}));
  } catch (_) {}
}

function normalizeStoryboardTransition(value) {
  const raw = String(value || "").trim().toLowerCase();
  if (["crossfade", "fade", "xfade", "dissolve"].includes(raw)) return "crossfade";
  if (["ai_extend", "extend", "match", "motion_match"].includes(raw)) return "ai_extend";
  return "cut";
}

function storyboardTransitionLabel(value) {
  const normalized = normalizeStoryboardTransition(value);
  if (normalized === "crossfade") return "交叉淡化";
  if (normalized === "ai_extend") return "动作承接";
  return "直接切";
}

const storyboardManager = (() => {
  const subscribers = new Set();
  let job = null;
  let lastStatus = null;

  const notify = (state) => {
    if (state) lastStatus = state;
    subscribers.forEach((cb) => {
      try { cb(state); } catch (_) {}
    });
  };

  const snapshot = () => ({
    busy: !!job,
    startedAt: job?.startedAt || 0,
    status: lastStatus,
  });

  const subscribe = (cb) => {
    subscribers.add(cb);
    return () => subscribers.delete(cb);
  };

  const start = (request) => {
    if (job) return job.promise;
    const startedAt = Date.now();
    notify({
      kind: "info",
      busy: true,
      text: "正在提交分镜草稿任务，提交后可到「任务」Tab 查看进度。",
    });
    const promise = (async () => {
      try {
        const r = await api("POST", "/storyboard/decompose", {
          story: request.story,
          total_duration: request.total_duration,
          segment_duration: request.segment_duration,
        });
        if (r.ok && r.status === "running") {
          notify({
            kind: "info",
            busy: false,
            taskId: r.task_id || "",
            signature: request.signature || "",
            text: "分镜草稿任务已提交，主程序大模型正在后台拆分镜。可前往「任务」Tab 查看进度，完成后点开任务并应用到编辑分镜。",
          });
          return {
            ok: true,
            taskId: r.task_id || "",
            pending: true,
            signature: request.signature || "",
          };
        }
        if (r.ok) {
          const nextSegments = (r.segments || []).map((seg, idx) => ({
            ...seg,
            index: seg.index || idx + 1,
            transition_to_next: normalizeStoryboardTransition(seg.transition_to_next),
          }));
          const draft = readStoryboardDraft();
          writeStoryboardDraft({
            ...draft,
            story: request.story,
            totalDuration: request.total_duration,
            segDuration: request.segment_duration,
            segments: nextSegments,
            activeStep: "segments",
          });
          notify({
            kind: "success",
            busy: false,
            taskId: r.task_id || "",
            signature: request.signature || "",
            text: `已按当前大纲生成 ${nextSegments.length} 段分镜，已自动进入「编辑分镜」。`,
            segments: nextSegments,
          });
          return { ok: true, segments: nextSegments, signature: request.signature || "" };
        }
        notify({
          kind: "danger",
          busy: false,
          taskId: r.task_id || "",
          text: r.error || "拆分镜失败，请稍后重试。",
        });
        return { ok: false, error: r.error || "拆分镜失败" };
      } catch (e) {
        const msg = `拆分镜失败：${e.message || e}`;
        notify({ kind: "danger", busy: false, text: msg });
        return { ok: false, error: msg };
      } finally {
        job = null;
      }
    })();
    job = { promise, request, startedAt };
    return promise;
  };

  return { start, subscribe, snapshot };
})();

function friendlyApiMessage(error, fallback) {
  const msg = String(error?.message || error || "");
  if (/404\b/.test(msg)) return fallback;
  if (/api key|api_key|DashScope API Key|未配置|empty/i.test(msg)) return "";
  const jsonStart = msg.indexOf("{");
  if (jsonStart >= 0) {
    try {
      const payload = JSON.parse(msg.slice(jsonStart));
      return payload.detail || payload.message || payload.error || fallback;
    } catch (_) {}
  }
  return msg.replace(/\s*\{.*\}\s*$/, "").trim() || fallback;
}

function friendlyTaskError(message, fallback = "任务执行失败") {
  const msg = String(message || "");
  const jsonStart = msg.indexOf("{");
  if (jsonStart >= 0) {
    try {
      const payload = JSON.parse(msg.slice(jsonStart));
      if (/asynchronous calls/i.test(payload.message || "")) {
        return "当前 DashScope API Key 不支持异步图片调用，已尝试自动改用同步调用；如果仍失败，请切换到千问图片模型或检查账号权限。";
      }
      return payload.detail || payload.message || payload.error || fallback;
    } catch (_) {}
  }
  if (/asynchronous calls/i.test(msg)) {
    return "当前 DashScope API Key 不支持异步图片调用，请切换到同步图片模型或检查账号权限。";
  }
  return msg || fallback;
}

function iconSvg(name) {
  const iconName = (name || "").includes(":") ? name.split(":").pop() : name;
  const factory = window.OpenAkitaIcons && window.OpenAkitaIcons[iconName];
  if (typeof factory === "function") return factory();
  const inner = ICONIFY_ICONS[iconName] || ICONIFY_ICONS.info;
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${inner}</svg>`;
}

function Icon({ name, size = 18, className = "icon" }) {
  const svg = iconSvg(name);
  return (
    <span
      className={className}
      style={{ width: size, height: size, display: "inline-flex" }}
      dangerouslySetInnerHTML={{ __html: svg }}
    />
  );
}

function Tag({ children, kind }) {
  const cls = kind ? `tag tag-${kind}` : "tag";
  return <span className={cls}>{children}</span>;
}

function Banner({ kind = "warning", children }) {
  return (
    <div className={`banner banner-${kind}`}>
      <Icon name={kind === "danger" ? "alert-triangle" : "info"} size={16} />
      <div>{children}</div>
    </div>
  );
}

function Empty({ icon, title, hint }) {
  return (
    <div className="empty">
      <Icon name={icon || "inbox"} size={40} className="icon" />
      <div>{title}</div>
      {hint && <div className="text-xs mt-2">{hint}</div>}
    </div>
  );
}

function Spinner() {
  return <span className="spinner" />;
}

const voiceValue = (voice) => voice?.dashscope_voice_id || voice?.id || "";

function voiceEngineOf(voiceOrId) {
  if (voiceOrId && typeof voiceOrId === "object") {
    if (voiceOrId.engine === "edge" || voiceOrId.engine === "cosyvoice") return voiceOrId.engine;
    return voiceEngineOf(voiceValue(voiceOrId));
  }
  return String(voiceOrId || "").startsWith("zh-") ? "edge" : "cosyvoice";
}

function voicesForEngine(voices, engine) {
  const selected = engine === "edge" ? "edge" : "cosyvoice";
  return (voices || []).filter((voice) => voiceEngineOf(voice) === selected);
}

  { id: "9:16", label: "9:16 竖版", hint: "适合短视频/手机屏" },

function appendPromptText(current, chunk) {
  const text = String(chunk || "").trim();
  if (!text) return current || "";
  const base = String(current || "").trim();
  if (!base) return text;
  if (base.includes(text)) return base;
  return `${base}，${text}`;
}

function appendListText(setter, chunk) {
  setter((prev) => appendPromptText(prev, chunk));
}

function removePromptText(current, chunk) {
  const text = String(chunk || "").trim();
  if (!text) return current || "";
  return String(current || "")
    .replaceAll(text, "")
    .replace(/[，,、]\s*[，,、]+/g, "，")
    .replace(/^[\s，,、]+|[\s，,、]+$/g, "")
    .replace(/\s{2,}/g, " ")
    .trim();
}

function toggleListText(setter, current, chunk) {
  const text = String(chunk || "").trim();
  if (!text) return;
  if (String(current || "").includes(text)) {
    setter((prev) => removePromptText(prev, text));
  } else {
    setter((prev) => appendPromptText(prev, text));
  }
}

function parseSizeAspect(size) {
  const match = String(size || "").match(/^(\d+)\*(\d+)$/);
  if (!match) return "";
  const w = Number(match[1]);
  const h = Number(match[2]);
  if (!w || !h) return "";
  const ratio = w / h;
  const known = [
    ["21:9", 21 / 9],
    ["16:9", 16 / 9],
    ["4:3", 4 / 3],
    ["1:1", 1],
    ["3:4", 3 / 4],
    ["9:16", 9 / 16],
  ];
  const found = known.find(([, value]) => Math.abs(ratio - value) < 0.04);
  return found?.[0] || "";
}

function PromptAssistPanel({
  prompt,
  setPrompt,
  negativePrompt,
  setNegativePrompt,
  showNegative = true,
  aspect,
  setAspect,
  allowedAspects = [],
  imageSize,
  setImageSize,
  imageSizes = [],
  outputRatio,
  setOutputRatio,
  compact = false,
}) {
  const [customPrompt, setCustomPrompt] = useState("");
  const [customNegative, setCustomNegative] = useState("");
  const imageAspectMap = useMemo(() => {
    const map = {};
    (imageSizes || []).forEach((s) => {
      const a = parseSizeAspect(s);
      if (a && !map[a]) map[a] = s;
    });
    return map;
  }, [imageSizes]);
  const aspectOptions = useMemo(() => {
    if (allowedAspects.length) {
      return COMMON_ASPECTS.filter((a) => allowedAspects.includes(a.id));
    }
    if (setOutputRatio) {
      return COMMON_ASPECTS.filter((a) => ["1:1", "16:9", "9:16", "4:3"].includes(a.id));
    }
    if (setImageSize && Object.keys(imageAspectMap).length) {
      return COMMON_ASPECTS.filter((a) => imageAspectMap[a.id]);
    }
    return [];
  }, [allowedAspects, imageAspectMap, setImageSize, setOutputRatio]);

  const aspectText = (item) => item.label;
  const removeAllAspectText = (value) => {
    let next = value || "";
    for (const item of COMMON_ASPECTS) {
      next = removePromptText(next, item.label);
      next = removePromptText(next, `${item.id} ${item.hint}`);
    }
    return next;
  };

  const chooseAspect = (item) => {
    const text = aspectText(item);
    const alreadyInPrompt = String(prompt || "").includes(text);
    if (setAspect && (!allowedAspects.length || allowedAspects.includes(item.id))) {
      setAspect(item.id);
      setPrompt((prev) => (
        alreadyInPrompt
          ? removePromptText(prev, text)
          : appendPromptText(removeAllAspectText(prev), text)
      ));
      return;
    }
    if (setOutputRatio) {
      setOutputRatio(item.id);
      setPrompt((prev) => (
        alreadyInPrompt
          ? removePromptText(prev, text)
          : appendPromptText(removeAllAspectText(prev), text)
      ));
      return;
    }
    if (setImageSize && imageAspectMap[item.id]) {
      setImageSize(imageAspectMap[item.id]);
      setPrompt((prev) => (
        alreadyInPrompt
          ? removePromptText(prev, text)
          : appendPromptText(removeAllAspectText(prev), text)
      ));
      return;
    }
  };

  return (
    <div className={"prompt-assist" + (compact ? " prompt-assist--compact" : "")}>
      <div className="prompt-assist__head">
        <strong>创作参数助手</strong>
        <span>常见检查项可直接点选；需要更细的要求仍可在提示词里自定义。</span>
      </div>
      {!!aspectOptions.length && (
        <div className="prompt-assist__group">
          <div className="prompt-assist__label">比例 / 构图</div>
          <div className="prompt-assist__chips">
            {aspectOptions.map((item) => {
              const mappedSize = imageAspectMap[item.id];
              const active = String(prompt || "").includes(aspectText(item));
              return (
                <button
                  key={item.id}
                  type="button"
                  className={"keyword-chip keyword-chip--button" + (active ? " active" : "")}
                  title={mappedSize ? `${item.hint}；对应尺寸 ${mappedSize}` : item.hint}
                  onClick={() => chooseAspect(item)}
                >
                  {item.label}
                </button>
              );
            })}
          </div>
        </div>
      )}
      {PROMPT_ASSIST_GROUPS.map((group) => (
        <div key={group.id} className="prompt-assist__group">
          <div className="prompt-assist__label">{group.label}</div>
          <div className="prompt-assist__chips">
            {group.items.map((item) => (
              <button
                key={item}
                type="button"
                className={"keyword-chip keyword-chip--button" + (String(prompt || "").includes(item) ? " active" : "")}
                onClick={() => toggleListText(setPrompt, prompt, item)}
              >
                {item}
              </button>
            ))}
          </div>
        </div>
      ))}
      <div className="prompt-assist__custom">
        <input
          value={customPrompt}
          onChange={(e) => setCustomPrompt(e.target.value)}
          placeholder="自定义补充，例如：品牌色为橙色、镜头不要切换、角色始终看向镜头"
        />
        <button
          type="button"
          className="btn btn-sm btn-ghost"
          onClick={() => {
            appendListText(setPrompt, customPrompt);
            setCustomPrompt("");
          }}
        >
          加入提示词
        </button>
      </div>
      {showNegative && setNegativePrompt && (
        <div className="prompt-assist__group prompt-assist__group--negative">
          <div className="prompt-assist__label">反向提示词</div>
          <div className="prompt-assist__chips">
            {NEGATIVE_PROMPT_PRESETS.map((item) => (
              <button
                key={item}
                type="button"
                className={"keyword-chip keyword-chip--button" + (String(negativePrompt || "").includes(item) ? " active" : "")}
                onClick={() => toggleListText(setNegativePrompt, negativePrompt, item)}
              >
                {item}
              </button>
            ))}
          </div>
          <div className="prompt-assist__custom">
            <input
              value={customNegative}
              onChange={(e) => setCustomNegative(e.target.value)}
              placeholder="自定义不想出现的内容，例如：不要字幕、不要 logo、不要畸形手"
            />
            <button
              type="button"
              className="btn btn-sm btn-ghost"
              onClick={() => {
                appendListText(setNegativePrompt, customNegative);
                setCustomNegative("");
              }}
            >
              加入反向
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

function taskIdOf(task) {
  return task?.id || task?.task_id || "";
}

function taskVideoUrl(task) {
  return task?.video_url || task?.output_url || "";
}

function taskImageUrls(task) {
  const assetPaths = task?.asset_paths || {};
  const urls = task?.image_urls || assetPaths.image_urls || [];
  if (Array.isArray(urls) && urls.length) return urls;
  if (task?.last_frame_url && (task?.mode || "").startsWith("image_")) return [task.last_frame_url];
  return [];
}

function taskImagePaths(task) {
  const assetPaths = task?.asset_paths || {};
  const paths = assetPaths.image_paths || task?.image_paths || [];
  return Array.isArray(paths) ? paths.filter(Boolean) : [];
}

function taskLocalFile(task) {
  if (!task) return "";
  if (task.video_path) return String(task.video_path);
  const imgs = taskImagePaths(task);
  if (imgs.length) return String(imgs[0]);
  const audio = task?.asset_paths?.audio_path || task?.audio_path || "";
  return audio ? String(audio) : "";
}

function pickFileExtension(url, fallback) {
  const cleaned = String(url || "").split("?")[0].split("#")[0];
  const m = cleaned.match(/\.([a-zA-Z0-9]{1,6})$/);
  return (m && m[1]) || fallback;
}

function taskDownloadDescriptor(task) {
  const tid = taskIdOf(task) || "task";
  const mode = task?.mode || "task";
  const localPath = taskLocalFile(task);
  const video = taskVideoUrl(task);
  if (video) {
    const ext = pickFileExtension(video, "mp4");
    return {
      url: video,
      localPath,
      kind: "video",
      filename: `${mode}_${tid}.${ext}`,
      acceptMime: { "video/*": [`.${ext}`, ".mp4", ".mov", ".webm"] },
    };
  }
  const imageUrl = taskImageUrls(task)[0];
  if (imageUrl) {
    const ext = pickFileExtension(imageUrl, "png");
    return {
      url: imageUrl,
      localPath,
      kind: "image",
      filename: `${mode}_${tid}.${ext}`,
      acceptMime: { "image/*": [`.${ext}`, ".png", ".jpg", ".jpeg", ".webp"] },
    };
  }
  if (localPath) {
    const base = String(localPath).split(/[\\/]/).pop() || `${mode}_${tid}`;
    const ext = pickFileExtension(base, "mp4");
    return {
      url: "",
      localPath,
      kind: /\.(png|jpe?g|webp|gif)$/i.test(base) ? "image" : "video",
      filename: base || `${mode}_${tid}.${ext}`,
      acceptMime: { "*/*": [`.${ext}`] },
    };
  }
  return { url: "", localPath: "", kind: "", filename: "", acceptMime: {} };
}

function taskParams(task) {
  return task?.params && typeof task.params === "object" ? task.params : {};
}

function taskSegmentIndex(task, fallback = null) {
  const params = taskParams(task);
  const raw = task?.chain_index ?? params.segment_index ?? params.chain_index ?? fallback;
  const n = Number(raw);
  return Number.isFinite(n) && n > 0 ? n : null;
}

function isStoryboardSegmentTask(task) {
  return !!task?.chain_group_id && task?.mode !== "long_video";
}

function taskModeLabel(task, modeLabelMap = null) {

    modeLabelMap?.get?.(task?.mode) ||
    TASK_MODE_LABELS[task?.mode] ||
    EXTRA_MODE_LABELS[task?.mode] ||

  );
}

function compactText(text, max = 72) {
  const s = String(text || "").replace(/\s+/g, " ").trim();
  return s.length > max ? `${s.slice(0, max)}…` : s;
}

function taskDisplayTitle(task, modeLabelMap = null, fallbackIndex = null) {

  const index = taskSegmentIndex(task, fallbackIndex);
  if (isStoryboardSegmentTask(task) && index) {
    return `第 ${index} 段 · ${modeLabel}`;

function taskDisplaySubtitle(task) {

function useTaskHeartbeat(taskId) {
  const [task, setTask] = useState(null);

  const refresh = useCallback(async () => {
    if (!taskId) {
      setTask(null);
      return;
    }
    try {
      const r = await api("GET", `/tasks/${taskId}`);
      setTask(r.task || null);
    } catch (_) {}
  }, [taskId]);

  useEffect(() => {
    refresh();
    if (!taskId) return;
    const timer = setInterval(refresh, 2500);
    const sse = new EventSource(apiBase() + "/sse");
    sse.addEventListener("task_update", (e) => {
      try {
        const d = JSON.parse(e.data || "{}");
        // Backend wraps the payload as `{event, data: {task_id, ...}}`.
        // Older revisions sent it flat, so accept either shape.
        const tid = d?.data?.task_id || d?.task_id;
        if (!tid || tid === taskId) refresh();
      } catch (_) {
        refresh();
      }
    });
    return () => {
      clearInterval(timer);
      sse.close();
    };
  }, [taskId, refresh]);

  return task;
}

function UploadUrlField({ label, value, onChange, accept = "*/*", kind = "image", hint }) {
  const [uploading, setUploading] = useState(false);
  const [asset, setAsset] = useState(null);
  const inputRef = useRef(null);
  const publicUrlWarning = (r) => {
    const reason = r?.oss_error
      ? `\n\nOSS 返回错误：${r.oss_error}`
      : "";
    return (
      "素材已保存为本地预览，但没有生成 DashScope 可读取的公网 URL。\n\n" +
      "DashScope 需要公网可访问的 URL；请检查「设置 → OSS」里的 Endpoint、Bucket、AccessKey ID、AccessKey Secret，" +
      "或手动粘贴一个公网 URL 后再提交任务。" +
      reason
    );
  };

  const upload = async (file) => {
    if (!file) return;
    setUploading(true);
    try {
      const r = await uploadAsset(file);
      if (!r.ok) throw new Error(r.error || "upload failed");
      setAsset(r);
      if (!r.oss_url) {
        onChange("");
        alert(publicUrlWarning(r));
        return;
      }
      onChange(r.oss_url);
    } catch (e) {
      alert(`上传失败：${e.message}`);
    } finally {
      setUploading(false);
    }
  };

  const preview = asset?.preview_url || value;
  const isVideo = kind === "video" || /\.(mp4|mov|webm|mkv)(\?|$)/i.test(preview || "");
  const isAudio = kind === "audio" || /\.(mp3|wav|m4a|aac|ogg|flac)(\?|$)/i.test(preview || "");
  const isImage = kind === "image" || /\.(png|jpe?g|webp|gif|bmp)(\?|$)/i.test(preview || "");

  // ── Asset probe summary line ─────────────────────────────────────
  // The /upload endpoint returns ``probe`` with width/height/duration/
  // format/size after running ffprobe + PIL. Surface it inline so the
  // user can verify the file matches the model's spec *before*
  // submission burns vendor credit (e.g. wan2.2-animate caps video at
  // 30 s; videoretalk caps audio at 30 MB).
  const probe = asset?.probe || null;
  const sizeMb = asset?.size_bytes
    ? (asset.size_bytes / 1048576).toFixed(2) + " MB"
    : "";
  const probeSummary = probe
    ? [
        probe.format,
        probe.width && probe.height ? `${probe.width}×${probe.height}` : "",
        probe.duration_sec ? `${probe.duration_sec.toFixed(2)}s` : "",
        sizeMb,
      ]
        .filter(Boolean)
        .join(" · ")
    : "";

  return (
    <div className="field">
      <label>{label}</label>
      <div className={"upload-zone" + (value ? " is-filled" : "")} onClick={() => inputRef.current?.click()}>
        <input
          ref={inputRef}
          type="file"
          accept={accept}
          style={{ display: "none" }}
          onChange={(e) => upload(e.target.files?.[0])}
        />
        {preview && isImage ? (
          <img src={preview} alt="" className="upload-preview" />
        ) : preview && isVideo ? (
          <video src={preview} className="upload-preview" muted />
        ) : (
          <div className="upload-zone__body">
            <span className="upload-zone__icon">
              {uploading ? <Spinner /> : <Icon name={isAudio ? "mic" : isVideo ? "video" : "image-play"} size={22} />}
            </span>
            <div className="upload-zone__text">
              <div className="upload-zone__title">{uploading ? "上传中…" : "点击上传素材"}</div>
              <div className="upload-zone__hint">{hint || "支持本地文件上传，也可以在下方直接粘贴公网 URL"}</div>
            </div>
          </div>
        )}
      </div>
      {probeSummary && (
        <div className="upload-probe-meta" style={{ fontSize: 12, opacity: 0.7, marginTop: 4 }}>
          已上传：{probeSummary}
        </div>
      )}
      {asset && !asset.oss_url && (
        <div className="upload-probe-meta" style={{ fontSize: 12, color: "var(--danger)", marginTop: 4 }}>
          未生成公网 URL，不能提交给 DashScope。请修正 OSS 配置后重新上传，或在下方粘贴公网 URL。
        </div>
      )}
      <input value={value} onChange={(e) => onChange(e.target.value)} placeholder="https://..." />
    </div>
  );
}

// MultiUploadUrlField — N-row upload editor backed by an array of URLs.
// Used by CreateTab for `reference_urls` and `image_urls` so the user
// can either upload several files (each pushed to OSS) or paste public
// URLs, instead of having to comma-separate them in a single textbox.
function MultiUploadUrlField({ label, values, onChange, accept = "*/*", kind = "image", hint, max = 9 }) {
  const list = Array.isArray(values) ? values : [];
  const setAt = (idx, v) => {
    const next = [...list];
    next[idx] = v;
    onChange(next.filter((s, i) => s || i < next.length - 1));
  };
  const removeAt = (idx) => {
    onChange(list.filter((_, i) => i !== idx));
  };
  const append = () => {
    if (list.length >= max) return;
    onChange([...list, ""]);
  };
  const rows = list.length ? list : [""];
  return (
    <div className="field multi-upload-field">
      <label>{label}</label>
      {rows.map((url, idx) => (
        <div key={idx} className="multi-upload-row">
          <div className="multi-upload-row__main">
            <UploadUrlField
              label={`#${idx + 1}`}
              value={url}
              onChange={(v) => setAt(idx, v)}
              accept={accept}
              kind={kind}
              hint={idx === 0 ? hint : ""}
            />
          </div>
          {rows.length > 1 && (
            <button type="button" className="btn btn-ghost btn-sm multi-upload-row__delete" onClick={() => removeAt(idx)}>
              <Icon name="trash" size={12} /> 删除
            </button>
          )}
        </div>
      ))}
      {list.length < max && (
        <button type="button" className="btn btn-ghost btn-sm" onClick={append}>
          <Icon name="plus" size={12} /> 添加一张
        </button>
      )}
    </div>
  );
}

function isDashScopeReadableUrl(url) {
  const s = String(url || "").trim();
  return /^https?:\/\//i.test(s) && !/\/uploads\/happyhorse-video\//i.test(s);
}

function requireDashScopeUrl(label, url) {
  if (isDashScopeReadableUrl(url)) return true;
  alert(
    `${label} 还不是 DashScope 可读取的公网 URL。\n\n` +
    "DashScope 需要公网可访问的 URL；请先修正「设置 → OSS」后重新上传素材，" +
    "或手动粘贴一个 http/https 公网 URL。不能提交本地路径或仅本地预览文件。"
  );
  return false;
}

function bridgeRequest(type, payload, ackType, timeoutMs = 1800) {
  if (window.parent === window) return Promise.resolve({ ok: false, error: "not embedded" });
  return new Promise((resolve) => {
    const requestId = `r${Date.now().toString(36)}${Math.random().toString(36).slice(2, 8)}`;
    let done = false;
    const cleanup = () => window.removeEventListener("message", onMessage);
    const finish = (value) => {
      if (done) return;
      done = true;
      cleanup();
      resolve(value || { ok: false });
    };
    const onMessage = (event) => {
      if (event.source !== window.parent) return;
      const data = event.data || {};
      if (data.__akita_bridge === true && data.type === ackType && data.requestId === requestId) {
        finish(data.payload || { ok: true });
      }
    };
    window.addEventListener("message", onMessage);
    try {
      window.parent.postMessage(
        { __akita_bridge: true, version: 1, type, requestId, payload },
        "*"
      );
    } catch (e) {
      finish({ ok: false, error: String(e) });
    }
    setTimeout(() => finish({ ok: false, error: "timeout" }), timeoutMs);
  });
}

async function downloadTaskArtifact(task) {
  const dl = taskDownloadDescriptor(task);
  if (!dl.url && !dl.localPath) {
    throw new Error("该任务尚无可下载的成品文件。");
  }

  const bridgePayload = {
    url: dl.url || "",
    filename: dl.filename,
    localPath: dl.localPath || "",
  };
  const bridged = await bridgeRequest(
    "bridge:download",
    bridgePayload,
    "bridge:download-ack",
    600000
  );
  if (bridged?.ok) return bridged;

  if (window.OpenAkita?.download && dl.url) {
    const r = await window.OpenAkita.download(dl.url, dl.filename);
    if (r?.ok) return r;
  }

  if (!dl.url) {
    throw new Error(bridged?.error || "安装版下载失败，且该任务没有可回退的下载链接。");
  }

  if (window.showSaveFilePicker) {
    try {
      const handle = await window.showSaveFilePicker({
        suggestedName: dl.filename,
        types: [
          {
            description: dl.kind === "image" ? "图片" : "视频",
            accept: dl.acceptMime,
          },
        ],
      });
      const writable = await handle.createWritable();
      const resp = await fetch(dl.url, { credentials: "include" });
      if (!resp.ok) throw new Error(`下载失败 ${resp.status}`);
      await resp.body.pipeTo(writable);
      return { ok: true };
    } catch (e) {
      if (e?.name === "AbortError") return { ok: true, cancelled: true };
      throw e;
    }
  }

  const a = document.createElement("a");
  a.href = dl.url;
  a.download = dl.filename;
  a.target = "_blank";
  a.rel = "noopener";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  return { ok: true };
}

function TaskPreviewPane({ taskId, task, costPreview, onGoTasks, onOpenStoryboard, showCost = true }) {
  const liveTask = task || null;
  const videoUrl = taskVideoUrl(liveTask);
  const imageUrls = taskImageUrls(liveTask);
  const status = liveTask?.status;
  const isStoryboardDraft = liveTask?.mode === "storyboard_decompose";
  const storyboardSegments = isStoryboardDraft && Array.isArray(liveTask?.params?.segments)
    ? liveTask.params.segments
    : [];
  const storyboardOutline = isStoryboardDraft
    ? (liveTask?.params?.story || liveTask?.prompt || "")
    : "";
  const [copiedUrl, setCopiedUrl] = useState("");
  const [openStatus, setOpenStatus] = useState({});
  const [storyboardApplied, setStoryboardApplied] = useState(false);
  const [artifactBusy, setArtifactBusy] = useState("");

  useEffect(() => {
    setStoryboardApplied(false);
  }, [taskId]);

  const applyStoryboardDraft = () => {
    if (!storyboardSegments.length) return;
    const normalizedSegments = storyboardSegments.map((seg, idx) => ({
      ...seg,
      index: seg.index || idx + 1,
      transition_to_next: normalizeStoryboardTransition(seg.transition_to_next),
    }));
    const existing = readStoryboardDraft();
    writeStoryboardDraft({
      ...existing,
      story: storyboardOutline,
      totalDuration: liveTask?.params?.total_duration || existing.totalDuration || 60,
      segDuration: liveTask?.params?.segment_duration || existing.segDuration || 10,
      segments: normalizedSegments,
      activeStep: "segments",
    });
    setStoryboardApplied(true);
    window.OpenAkita?.notify?.({
      type: "success",
      title: "已应用分镜草稿",
      body: "已同步到「分镜 → 编辑分镜」，可继续修改并提交生成视频。",
    });
    onOpenStoryboard?.();
  };

  const copyImageUrl = async (url) => {
    try {
      if (window.OpenAkita?.clipboard) {
        const r = await window.OpenAkita.clipboard(url);
        if (r && r.ok === false) throw new Error(r.error || "bridge clipboard failed");
      } else {
        await navigator.clipboard.writeText(url);
      }
    } catch (_) {
      const el = document.createElement("textarea");
      el.value = url;
      el.style.position = "fixed";
      el.style.opacity = "0";
      document.body.appendChild(el);
      el.select();
      document.execCommand("copy");
      document.body.removeChild(el);
    }
    setCopiedUrl(url);
    setTimeout(() => setCopiedUrl((prev) => (prev === url ? "" : prev)), 1800);
  };

  const openImageUrl = async (url) => {
    setOpenStatus((prev) => ({ ...prev, [url]: "opening" }));
    try {
      if (window.OpenAkita?.openExternal) {
        const r = await window.OpenAkita.openExternal(url);
        if (r?.ok) {
          setOpenStatus((prev) => ({ ...prev, [url]: "opened" }));
          setTimeout(() => setOpenStatus((prev) => ({ ...prev, [url]: "" })), 1800);
          return;
        }
      }
      const bridged = await bridgeRequest(
        "bridge:open-external",
        { url },
        "bridge:open-external-ack"
      );
      if (bridged?.ok) {
        setOpenStatus((prev) => ({ ...prev, [url]: "opened" }));
        setTimeout(() => setOpenStatus((prev) => ({ ...prev, [url]: "" })), 1800);
        return;
      }
      const popup = window.open(url, "_blank", "noopener,noreferrer");
      if (popup) {
        setOpenStatus((prev) => ({ ...prev, [url]: "opened" }));
        setTimeout(() => setOpenStatus((prev) => ({ ...prev, [url]: "" })), 1800);
        return;
      }
      throw new Error("popup blocked");
    } catch (_) {
      await copyImageUrl(url);
      setOpenStatus((prev) => ({ ...prev, [url]: "copied" }));
      window.OpenAkita?.notify?.({
        type: "warning",
        title: "无法直接打开链接",
        body: "安装版未能弹出浏览器，图片 URL 已复制到剪贴板。",
      });
      setTimeout(() => setOpenStatus((prev) => ({ ...prev, [url]: "" })), 2400);
    }
  };

  const openTaskArtifactFolder = async () => {
    const localPath = taskLocalFile(liveTask);
    if (!localPath) {
      alert("该任务没有本地输出文件，无法打开存储目录。");
      return;
    }
    setArtifactBusy("open");
    try {
      await api("POST", "/storage/open-folder", { file_path: localPath });
    } catch (e) {
      alert(`打开目录失败：${e.message || e}`);
    } finally {
      setArtifactBusy("");
    }
  };

  const downloadTaskArtifactFromPreview = async () => {
    setArtifactBusy("download");
    try {
      const r = await downloadTaskArtifact(liveTask);
      if (!r?.cancelled) {
        window.OpenAkita?.notify?.({
          type: "success",
          title: "下载已开始",
          body: r?.path ? `已保存到：${r.path}` : "已交给系统下载处理。",
        });
      }
    } catch (e) {
      alert(`下载失败：${e.message || e}`);
    } finally {
      setArtifactBusy("");
    }
  };

  if (!taskId) {
    return (
      <div className="split-right oa-preview-area">
        <div className="oa-preview-empty">
          <div className="oa-preview-empty__icon">
            <Icon name="film" size={34} />
          </div>
          <div className="oa-preview-empty__title">暂无当前任务</div>
          <div className="oa-preview-empty__hint">左侧填写参数并提交后，这里会显示生成进度和视频预览。</div>
        </div>
        {showCost && <CostPreviewCard costPreview={costPreview} />}
      </div>
    );
  }

  return (
    <div className="split-right oa-preview-area">
      <div className="card task-preview-head">
        <div>
          <h3 className="card-title">本次任务</h3>
          <div className="text-xs text-muted font-mono">{taskId}</div>
        </div>
        <div className="task-preview-actions">
          <TaskStatusBadge status={status || "pending"} />
          <button
            className="btn btn-sm btn-ghost"
            onClick={openTaskArtifactFolder}
            disabled={!!artifactBusy || !taskLocalFile(liveTask)}
            title={taskLocalFile(liveTask) ? "在文件管理器中打开成品所在目录" : "暂无本地输出文件"}
          >
            {artifactBusy === "open" ? <Spinner /> : <Icon name="folder" size={12} />} 打开
          </button>
          <button
            className="btn btn-sm btn-ghost"
            onClick={downloadTaskArtifactFromPreview}
            disabled={!!artifactBusy || !(taskDownloadDescriptor(liveTask).url || taskDownloadDescriptor(liveTask).localPath)}
            title="下载成品到本地下载目录"
          >
            {artifactBusy === "download" ? <Spinner /> : <Icon name="download" size={12} />} 下载
          </button>
          {onGoTasks && (
            <button className="btn btn-sm btn-ghost" onClick={onGoTasks}>
              <Icon name="list" size={12} /> 任务详情
            </button>
          )}
        </div>
      </div>

      {status === "awaiting_approval" && (
        <div className="card cost-card">
          <div className="card-header">
            <h3 className="card-title">
              <Icon name="coin" size={14} /> 等待批准成本
            </h3>
          </div>
          <p style={{ marginTop: 0, color: "var(--text-muted)", fontSize: 13 }}>
            {liveTask?.error_message || "本次预估成本超过阈值，需要您确认后才会继续生成。"}
          </p>
          {liveTask?.cost_breakdown && (
            <>
              <ul style={{ listStyle: "none", padding: 0, margin: "8px 0", fontSize: 12 }}>
                {(liveTask.cost_breakdown.items || []).map((it, idx) => (
                  <li key={idx} style={{ display: "flex", justifyContent: "space-between", padding: "4px 0" }}>
                    <span>
                      {it.name}
                      {it.units && it.unit_label
                        ? <span style={{ color: "var(--text-muted)" }}> · {it.units}{it.unit_label}</span>
                        : null}
                    </span>
                    <strong>¥{Number(it.subtotal || 0).toFixed(2)}</strong>

                ))}
              </ul>
              <div style={{ display: "flex", justifyContent: "space-between", borderTop: "1px solid var(--border)", paddingTop: 8 }}>
                <span>合计</span>
                <strong style={{ color: "var(--accent)" }}>
                  {liveTask.cost_breakdown.formatted_total || `¥${Number(liveTask.cost_breakdown.total || 0).toFixed(2)}`}
                </strong>
              </div>
            </>
          )}
          <p style={{ marginTop: 8, color: "var(--text-muted)", fontSize: 12 }}>
            在左侧任务卡片上点「批准并继续」即可恢复生成；不想继续则点「取消」。
          </p>

      {(!liveTask || status === "pending" || status === "running") && (
        <ProgressLoader task={liveTask} />

      {(status === "succeeded" || status === "done") && (
        isStoryboardDraft && storyboardSegments.length ? (
          <div className="card storyboard-task-result">
            <div className="storyboard-task-result__head">
              <div>
                <h3><Icon name="list" size={14} /> 分镜草稿结果</h3>
                <span>共 {storyboardSegments.length} 段，确认后可继续生成长视频。</span>
              </div>
              <div className="storyboard-task-result__actions">
                <button className="btn" onClick={applyStoryboardDraft}>
                  <Icon name={storyboardApplied ? "check" : "arrow-right"} size={13} />
                  {storyboardApplied ? "已应用到编辑分镜" : "应用到编辑分镜"}
                </button>
              </div>

            {storyboardOutline && (

            <div className="storyboard-task-result__list">

                onLearn={onLearn}
                toast={toast}
              />
            ))}

            {loading && Array.from({ length: 2 }).map((_, i) => (
              <div className="card" key={i}><span className="skeleton" style={{ width: "70%" }} /></div>
            ))}

            {openSamples && (
              <LearningSamplesDrawer
                orgId={orgId}
                onClose={() => setOpenSamples(false)}
                toast={toast}
              />
            )}
          </>
        );
      }

      // ═══════════════════════════════════════════════════════════════════
      //  M2 STAGE 1 · AI consent 弹窗 + WebSocket 客户端
      //
      //  按 v0.2 Part 2 §11 附录 TS 接口 + v0.3 Part Infra §4 实现。
      //
      //  与 M2 AI 后端 sibling 已落地的契约（`finance_auto_backend/ai/`）：
      //    * WS endpoint：`/api/plugins/finance-auto/ws`（**插件本地** WS）
      //    * 事件 payload 扁平：
      //        { event: "ai_consent_request", dialog_id, scenario_id,
      //          sensitivity_level, preview_payload, model_provider, model_name,
      //          is_local_endpoint, estimated_tokens, requested_at }
      //    * 回执 POST `/api/plugins/finance-auto/ai/consent/respond`
      //        body { dialog_id, decision, skip_desensitize? }
      //    * `decision ∈ { "deny" | "allow_once" | "allow_permanent" }`
      //
      //  AI sibling worker 的路由 (`ai/routes.py`) 与 WS (`ai/ws.py`) 已写完代码
      //  但**尚未在 routes.py::build_router 里 register_ai_endpoints / WS**。
      //  因此 UI 当前走「优雅降级 + mock 模式」：
      //    - 在 URL 加 `?ai_mock=1` 自动注入示例请求
      //    - AI 设置页里有一个「触发 mock consent」按钮
      //    - 真正 WS 通了之后，前端零改动即可切换
      // ═══════════════════════════════════════════════════════════════════

      const SENSITIVITY_META = {
        metadata:   { icon: "🟢", label: "元数据",   color: "var(--success)", desc: "仅字段名 / 量级 / 比率，无原始金额或客户名" },
        aggregated: { icon: "🟡", label: "聚合数据", color: "var(--warning)", desc: "已脱敏 / 量级化 / 比率化，仍保留结构关联" },
        raw:        { icon: "🔴", label: "原始数据", color: "var(--danger)",  desc: "完整明细，仅在本地模型 / 用户主动确认下使用" },
      };

      // ----- FinanceWSClient（按 v0.3 Part Infra §4.1 实现） -----
      // 心跳 30 s / 指数退避重连（max 30 s）/ BroadcastChannel 跨标签页广播 /
      // localStorage leader 锁避免同一 dialog_id 在多个标签页同时弹窗。
      //
      // AI sibling 的 ws.py 接的是 plugin-local WS，路径
      //   /api/plugins/finance-auto/ws
      // 该端点欢迎信第一帧 = `{event: "finance_ws_hello", subscriptions: [...]}`，
      // 之后所有事件按 ConsentRequestEvent 等 BaseModel 直接 JSON dump（扁平结构）。
      function makeFinanceWSClient(url, { onEvent, onConnState, debug } = {}) {
        let ws = null;
        let retry = 0;
        let heartbeat = null;
        let destroyed = false;
        let bc = null;
        try { bc = new BroadcastChannel("finance.ws"); } catch { bc = null; }

        const log = (...a) => debug && console.debug("[finance-ws]", ...a);

        const dispatch = (msg) => {
          if (!msg || typeof msg !== "object") return;
          if (msg.event === "ai_consent_request") {
            const did = msg.dialog_id;
            if (did && !tryLeader(did)) return; // 让位给其他标签页
          }
          try { onEvent && onEvent(msg); } catch (e) { console.error(e); }
        };

        const tryLeader = (dialogId) => {
          const key = `finance.leader.${dialogId}`;
          try {
            if (localStorage.getItem(key)) return false;
            localStorage.setItem(key, String(Date.now()));
            setTimeout(() => { try { localStorage.removeItem(key); } catch {} }, 5000);
          } catch { /* localStorage 不可用时所有标签页都展示 */ }
          return true;
        };

        if (bc) bc.onmessage = (ev) => dispatch(ev.data);

        const scheduleReconnect = () => {
          if (heartbeat) { clearInterval(heartbeat); heartbeat = null; }
          if (destroyed) return;
          // 4 次重连失败（≈ 8s+）后认为无 WS 可用 → 视作 mock 模式
          // （v0.3 Part Infra §4.5 优雅降级：WS → SSE → 长轮询 → 手刷新）
          const delay = Math.min(30000, 500 * Math.pow(2, retry++));
          log("scheduling reconnect in", delay, "ms (retry", retry, ")");
          setTimeout(connect, delay);
        };

        const connect = () => {
          if (destroyed) return;
          try {
            ws = new WebSocket(url);
          } catch (e) {
            log("WebSocket ctor failed", e);
            onConnState && onConnState({ state: "error", error: String(e) });
            scheduleReconnect();
            return;
          }
          onConnState && onConnState({ state: "connecting" });
          ws.onopen = () => {
            retry = 0;
            onConnState && onConnState({ state: "open" });
            log("ws open");
            heartbeat = setInterval(() => {
              try { ws && ws.readyState === 1 && ws.send("ping"); } catch {}
            }, 30000);
          };
          ws.onmessage = (e) => {
            let msg = null;
            try { msg = JSON.parse(e.data); } catch { return; }
            if (!msg || msg.event === "pong" || msg.event === "ping") return;
            // 欢迎信不分发（仅做连接确认日志）
            if (msg.event === "finance_ws_hello") {
              log("hello, subscriptions:", msg.subscriptions);
              return;
            }
            dispatch(msg);
            if (bc) try { bc.postMessage(msg); } catch {}
          };
          ws.onclose = () => {
            log("ws close");
            onConnState && onConnState({ state: "closed" });
            scheduleReconnect();
          };
          ws.onerror = (ev) => {
            log("ws error", ev);
            try { ws && ws.close(); } catch {}
          };
        };

        connect();
        return {
          close() {
            destroyed = true;
            if (heartbeat) clearInterval(heartbeat);
            try { ws && ws.close(); } catch {}
            try { bc && bc.close(); } catch {}
          },
        };
      }

      // ----- useFinanceWS hook：组件级订阅 -----
      function useFinanceWS({ onEvent } = {}) {
        const [conn, setConn] = useState({ state: "init" });
        const handlerRef = useRef(onEvent);
        handlerRef.current = onEvent;
        useEffect(() => {
          // 插件本地 WS。location.host 在 iframe 内 = 主壳 host（同源静态挂载）。
          const wsBase = (() => {
            const proto = window.location.protocol === "https:" ? "wss:" : "ws:";
            const host = window.location.host || "127.0.0.1:18900";
            return `${proto}//${host}/api/plugins/${PLUGIN_ID}/ws`;
          })();
          const client = makeFinanceWSClient(wsBase, {
            onEvent: (m) => handlerRef.current && handlerRef.current(m),
            onConnState: (s) => setConn(s),
            debug: false,
          });
          return () => client.close();
        }, []);
        return conn;
      }

      // ----- 当前用户上下文（M2 单本机仍用 'local'，Stage 4 用户切换器会改写） -----
      const UserCtx = React.createContext({
        userId: "local",
        displayName: "本机用户",
        role: "auditor",
        setRole: () => {},
        setUser: () => {},
      });
      function useUser() { return React.useContext(UserCtx); }

      // ─────────────────────────────────────────────────────────────────
      //  AIConsentDialog —— 单个授权请求的展示组件（v0.2 Part 2 §11 附录）
      //
      //  Props 与 v0.2 终稿 TS 接口字面量对齐。`onDecision(decision)` 是唯一
      //  外暴露事件，决策值在 deny / allow_once / allow_permanent 三选一。
      // ─────────────────────────────────────────────────────────────────
      function AIConsentDialog({
        open, title, scenario, scenarioDescription,
        sensitivityLevel, previewPayload,
        modelProvider, modelName, isLocalEndpoint, estimatedTokens,
        onDecision, onCancel,
      }) {
        const [previewOpen, setPreviewOpen] = useState(false);
        const [submitting, setSubmitting] = useState(false);
        const [permLockedUntil, setPermLockedUntil] = useState(0);

        // R1 缓解：永久允许按钮 5 秒倒计时禁用，逼用户至少看完弹窗内容
        useEffect(() => {
          if (!open) return;
          setPreviewOpen(false);
          setSubmitting(false);
          setPermLockedUntil(Date.now() + 5000);
        }, [open]);
        const [, _tick] = useState(0);
        useEffect(() => {
          if (!open) return;
          const t = setInterval(() => _tick((x) => x + 1), 250);
          return () => clearInterval(t);
        }, [open]);

        if (!open) return null;
        const meta = SENSITIVITY_META[sensitivityLevel] || SENSITIVITY_META.metadata;
        const permRemain = Math.max(0, Math.ceil((permLockedUntil - Date.now()) / 1000));

        const decide = async (d) => {
          if (submitting) return;
          setSubmitting(true);
          try { await onDecision(d); }
          finally { setSubmitting(false); }
        };

        return (
          <div className="modal-backdrop" onMouseDown={(e) => { if (e.target === e.currentTarget && !submitting) onCancel && onCancel(); }}>
            <div className="modal" style={{ maxWidth: 520 }} onMouseDown={(e) => e.stopPropagation()}>
              <h3 style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ fontSize: 18 }}>{meta.icon}</span>
                <span>{title || "AI 数据使用授权"}</span>
                <span className="badge info" style={{ fontWeight: 400 }}>
                  {isLocalEndpoint ? "🏠 本地" : "☁️ 云端"}
                </span>
              </h3>
              <p className="sub" style={{ marginBottom: 12 }}>
                场景 <strong>{scenario}</strong> · 敏感度
                <span style={{ color: meta.color, fontWeight: 600, marginLeft: 4 }}>
                  {meta.label}
                </span>
                {scenarioDescription && <> · {scenarioDescription}</>}
              </p>

              <div className="card" style={{ padding: 12, background: "var(--bg-soft)", border: "1px solid var(--border)" }}>
                <div className="text-xs text-muted">即将发送给：</div>
                <div style={{ marginTop: 4 }}>
                  <strong>{modelName}</strong>
                  <span className="text-muted"> · {modelProvider}</span>
                  {estimatedTokens != null && (
                    <span className="text-xs text-muted" style={{ marginLeft: 8 }}>
                      预估 {estimatedTokens} tokens
                    </span>
                  )}
                </div>
                <div className="text-xs text-muted mt-2">
                  数据特征：{meta.desc}
                </div>
              </div>

              <div style={{ marginTop: 12 }}>
                <button
                  className="btn subtle sm"
                  onClick={() => setPreviewOpen((x) => !x)}
                  style={{ paddingLeft: 0 }}
                  data-testid="ai-consent-preview-toggle"
                >
                  {previewOpen ? "▾" : "▸"} 数据预览（脱敏后）
                </button>
                {previewOpen && (
                  <pre
                    className="mono text-xs"
                    style={{
                      background: "var(--bg-soft)",
                      padding: 10, borderRadius: 6,
                      maxHeight: 180, overflow: "auto",
                      border: "1px solid var(--border)",
                      whiteSpace: "pre-wrap", wordBreak: "break-word",
                    }}
                    data-testid="ai-consent-preview-payload"
                  >
                    {previewPayload || "(无内容)"}
                  </pre>
                )}
              </div>

              <div className="modal-actions" style={{ flexDirection: "column", gap: 8, alignItems: "stretch" }}>
                <div style={{ display: "flex", justifyContent: "flex-end", gap: 8 }}>
                  <button
                    className="btn"
                    disabled={submitting}
                    onClick={() => decide("deny")}
                    data-testid="ai-consent-deny"
                  >
                    不允许，取消
                  </button>
                  <button
                    className="btn primary"
                    disabled={submitting}
                    onClick={() => decide("allow_once")}
                    data-testid="ai-consent-allow-once"
                  >
                    {submitting && <Spinner />}仅本次允许
                  </button>
                  <button
                    className="btn"
                    disabled={submitting || permRemain > 0}
                    onClick={() => decide("allow_permanent")}
                    title={permRemain > 0 ? `请先看完弹窗内容（${permRemain}s）` : "授权后下次同场景同敏感度自动放行"}
                    data-testid="ai-consent-allow-perm"
                  >
                    永久允许此场景{permRemain > 0 && `（${permRemain}s）`}
                  </button>
                </div>
                <div className="text-xs text-muted" style={{ textAlign: "right" }}>
                  ⓘ 永久授权可在「AI 设置 / 授权管理」随时撤销。
                </div>
              </div>
            </div>
          </div>
        );
      }

      // ─────────────────────────────────────────────────────────────────
      //  AIConsentBridge —— 把 WS event 对接到 AIConsentDialog
      //
      //  - 内部维护 pending 队列（同时来 N 个请求时按 FIFO 出队）
      //  - 用户决策后 POST /ai/consent/{event_id}/respond
      //    若后端尚未就绪（404）则只 console.warn，UI 不阻塞
      //  - 暴露 `setMockRequest()` 给 Stage 6 的「触发 mock」调试按钮
      // ─────────────────────────────────────────────────────────────────
      const _mockBus = {
        listeners: new Set(),
        push(req) { this.listeners.forEach((l) => l(req)); },
      };
      function pushMockConsent(req) { _mockBus.push(req); }

      function AIConsentBridge({ toast }) {
        const [queue, setQueue] = useState([]);
        const [conn, setConn] = useState({ state: "init" });
        const user = useUser();

        const onWSEvent = useCallback((msg) => {
          if (msg.event !== "ai_consent_request") return;
          if (!msg.dialog_id) return;
          setQueue((q) => q.find((x) => x.dialog_id === msg.dialog_id) ? q : [...q, msg]);
        }, []);

        const wsConn = useFinanceWS({ onEvent: onWSEvent });
        useEffect(() => setConn(wsConn), [wsConn.state]);

        useEffect(() => {
          const handler = (req) => setQueue((q) => [...q, req]);
          _mockBus.listeners.add(handler);
          return () => _mockBus.listeners.delete(handler);
        }, []);

        // 测试用：监听 window `mock_consent_request` 自定义事件，
        // 收到后用 buildSampleConsentRequest() 入队（Playwright 通过
        // `window.dispatchEvent(new CustomEvent('mock_consent_request'))` 触发）。
        useEffect(() => {
          const h = (ev) => {
            const req = (ev && ev.detail && ev.detail.dialog_id)
              ? ev.detail
              : buildSampleConsentRequest();
            pushMockConsent(req);
          };
          window.addEventListener("mock_consent_request", h);
          return () => window.removeEventListener("mock_consent_request", h);
        }, []);

        // 进入页面时若 URL 带 `?ai_mock=1`，自动注入一个示例请求
        useEffect(() => {
          if (new URLSearchParams(window.location.search).get("ai_mock") === "1") {
            setTimeout(() => pushMockConsent(buildSampleConsentRequest()), 800);
          }
        }, []);

        const current = queue[0];
        const respond = async (decision) => {
          if (!current) return;
          const isMock = String(current.dialog_id || "").startsWith("mock_");
          try {
            // 与 AI sibling `ai/routes.py::respond_consent` 契约：
            //   POST /ai/consent/respond  body={dialog_id, decision, skip_desensitize?}
            await api(
              "POST",
              "/ai/consent/respond",
              {
                dialog_id: current.dialog_id,
                decision,
                skip_desensitize: false,
              },
              { timeoutMs: 8000 },
            );
            toast(decision === "deny" ? "已拒绝 AI 请求" : "授权已记录", decision === "deny" ? "warn" : "ok");
          } catch (e) {
            // mock 模式（后端未注册路由 = 404）下仅 console，不打扰用户
            if (isMock || e.status === 404) {
              console.info("[ai-consent] mock-mode respond:", { dialog_id: current.dialog_id, decision });
              toast(`决策「${decision}」已发出（mock 模式 · 后端 ai 路由待注册）`, "warn");
            } else {
              toast(`回执失败：${e.message}`, "err");
            }
          } finally {
            setQueue((q) => q.slice(1));
          }
        };

        const cancel = () => {
          if (!current) return;
          // 关闭等同 deny（后端 30s 超时也会按 deny 处理）
          respond("deny");
        };

        return (
          <>
            {current && (
              <AIConsentDialog
                open
                title={current.title || "AI 数据使用授权"}
                scenario={current.scenario_id || current.scenario || "—"}
                scenarioDescription={current.scenario_description || ""}
                sensitivityLevel={current.sensitivity_level || "metadata"}
                previewPayload={current.preview_payload || "(empty)"}
                modelProvider={current.model_provider || "—"}
                modelName={current.model_name || "—"}
                isLocalEndpoint={!!current.is_local_endpoint}
                estimatedTokens={current.estimated_tokens ?? 0}
                onDecision={respond}
                onCancel={cancel}
              />
            )}
            {/* 隐藏角标：WS 连接状态（开发可见，端到端 e2e 也可读） */}
            <div
              data-testid="ws-conn-state"
              data-state={conn.state}
              style={{ display: "none" }}
            />
          </>
        );
      }

      function buildSampleConsentRequest() {
        // 给 mock 模式提供一个能完整跑通弹窗的样例请求（脱敏后）。
        // 字段名严格对齐后端 `ConsentRequestEvent` 的 snake_case schema。
        return {
          event: "ai_consent_request",
          dialog_id: `mock_${Date.now()}`,
          scenario_id: "account_classify",
          scenario_description: "S2 · 未识别科目归类",
          sensitivity_level: "metadata",
          preview_payload: JSON.stringify({
            account_names: ["应收-客户A", "应收-客户B保证金"],
            magnitudes: ["万元级", "千元级"],
          }, null, 2),
          model_provider: "anthropic",
          model_name: "claude-3-5-sonnet",
          is_local_endpoint: false,
          estimated_tokens: 280,
          requested_at: new Date().toISOString(),
          title: "AI 数据使用授权（演示）",
        };
      }

      // ═══════════════════════════════════════════════════════════════════
      //  M2 STAGE 4 · 多审计师切换 + 复核工作流 UI
      //
      //  v0.3 Part Biz §1 4 角色（auditor / manager / partner / admin）
      //
      //  后端契约（biz sibling 已写代码、尚未 register_collab_endpoints）：
      //    POST   /users    + GET /users
      //    POST   /orgs/{id}/assignments    + GET /orgs/{id}/assignments
      //    POST   /orgs/{id}/reports/{rid}/review/submit
      //    POST   /orgs/{id}/reports/{rid}/review/approve
      //    POST   /orgs/{id}/reports/{rid}/review/request-changes
      //    POST   /orgs/{id}/reports/{rid}/review/sign-off
      //    POST   /orgs/{id}/reports/{rid}/cells/{cid}/comments
      //    GET    /orgs/{id}/reports/{rid}/comments
      //    GET    /orgs/{id}/reports/{rid}/workflows
      //
      //  当 GET /users 返回 404 时，UI 退化到「占位用户列表」（v0.2 单本机模式
      //  的占位切换器，本地 localStorage 存档）。后端就绪后零改动切换。
      // ═══════════════════════════════════════════════════════════════════

      const ROLE_META = {
        auditor: { label: "审计师",  badge: "info",  hint: "起草报表 / 在指派范围内编辑" },
        manager: { label: "经理",    badge: "warn",  hint: "复核报表 / 项目范围编辑 / 触发合并" },
        partner: { label: "合伙人",  badge: "ok",    hint: "签字 / 全局可写 / 用户指派" },
        admin:   { label: "管理员",  badge: "err",   hint: "用户 / 系统配置 · 不直接改报表" },
      };
      const ROLE_OPTS = Object.keys(ROLE_META).map((v) => ({ v, l: ROLE_META[v].label }));

      const _LOCAL_USERS_FALLBACK = [
        { user_id: "local",          display_name: "本机用户（admin）",   role: "admin",   active: true, mock: true },
        { user_id: "demo_auditor",   display_name: "演示·审计师 张三",     role: "auditor", active: true, mock: true },
        { user_id: "demo_manager",   display_name: "演示·经理 李四",       role: "manager", active: true, mock: true },
        { user_id: "demo_partner",   display_name: "演示·合伙人 王五",     role: "partner", active: true, mock: true },
      ];

      function useUsersList() {
        // 后端 /users 暂未注册路由 → 404 → 回退本地占位列表
        const [users, setUsers] = useState(_LOCAL_USERS_FALLBACK);
        const [backendOk, setBackendOk] = useState(null);
        const reload = useCallback(async () => {
          try {
            const r = await api("GET", "/users", null, { timeoutMs: 4000 });
            const list = (r && r.users) || [];
            if (list.length) {
              setUsers(list); setBackendOk(true);
            } else {
              setUsers(_LOCAL_USERS_FALLBACK); setBackendOk(true);
            }
          } catch (e) {
            setUsers(_LOCAL_USERS_FALLBACK);
            setBackendOk(false);
          }
        }, []);
        useEffect(() => { reload(); }, [reload]);
        return { users, backendOk, reload };
      }

      // 顶部用户切换器（嵌进 TopBar 的 right slot 旁）
      function UserSwitcher({ toast }) {
        const user = useUser();
        const { users, backendOk, reload } = useUsersList();
        const [open, setOpen] = useState(false);
        const [registerOpen, setRegisterOpen] = useState(false);
        const meta = ROLE_META[user.role] || ROLE_META.auditor;

        return (
          <>
            <div style={{ position: "relative" }}>
              <button
                className="btn sm"
                onClick={() => setOpen((x) => !x)}
                data-testid="user-switcher-btn"
                style={{ display: "flex", alignItems: "center", gap: 6 }}
                title={meta.hint}
              >
                <span style={{ fontSize: 14 }}>👤</span>
                <span style={{ maxWidth: 120, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{user.displayName}</span>
                <span className={`badge ${meta.badge}`} style={{ fontSize: 10 }}>{meta.label}</span>
                <span>▾</span>
              </button>
              {open && (
                <div
                  style={{
                    position: "absolute", right: 0, top: "100%", marginTop: 4,
                    background: "var(--bg-card)", border: "1px solid var(--border-strong)",
                    borderRadius: "var(--radius)", boxShadow: "0 6px 22px rgba(15,23,42,0.18)",
                    minWidth: 260, zIndex: 80, padding: 6,
                  }}
                  onMouseLeave={() => setOpen(false)}
                  data-testid="user-switcher-menu"
                >
                  <div className="text-xs text-muted" style={{ padding: "4px 8px" }}>
                    {backendOk === false
                      ? "占位切换器（后端 /users 未注册 · 仅 localStorage）"
                      : `用户列表（${users.length} 人）`}
                  </div>
                  {users.map((u) => (
                    <button
                      key={u.user_id}
                      className="btn subtle sm"
                      style={{ display: "block", width: "100%", textAlign: "left", borderRadius: 4, padding: "6px 8px" }}
                      onClick={() => {
                        user.setUser({ id: u.user_id, name: u.display_name, role: u.role });
                        toast(`已切换到 ${u.display_name}`);
                        setOpen(false);
                      }}
                    >
                      <div>{u.display_name}</div>
                      <div className="text-xs text-muted">
                        <span className={`badge ${ROLE_META[u.role]?.badge || "info"}`} style={{ fontSize: 10 }}>{ROLE_META[u.role]?.label || u.role}</span>
                        <span className="mono" style={{ marginLeft: 6 }}>{u.user_id}</span>
                      </div>
                    </button>
                  ))}
                  <div className="divider" />
                  {(user.role === "admin") && (
                    <button
                      className="btn subtle sm"
                      style={{ display: "block", width: "100%", textAlign: "left", padding: "6px 8px" }}
                      onClick={() => { setOpen(false); setRegisterOpen(true); }}
                      data-testid="register-user"
                    >
                      + 注册新用户…
                    </button>
                  )}
                  <button
                    className="btn subtle sm"
                    style={{ display: "block", width: "100%", textAlign: "left", padding: "6px 8px" }}
                    onClick={() => {
                      user.setUser({ id: "local", name: "本机用户（admin）", role: "admin" });
                      toast("已注销，回到本机用户");
                      setOpen(false);
                    }}
                  >
                    注销 / 回到 local
                  </button>
                </div>
              )}
            </div>
            {registerOpen && (
              <UserRegisterDialog
                onClose={() => setRegisterOpen(false)}
                onCreated={async (u) => {
                  setRegisterOpen(false);
                  toast(`用户「${u.display_name}」已创建`);
                  await reload();
                }}
                toast={toast}
              />
            )}
          </>
        );
      }

      function UserRegisterDialog({ onClose, onCreated, toast }) {
        const [userId, setUserId] = useState("user_" + Math.random().toString(36).slice(2, 10));
        const [name, setName] = useState("");
        const [email, setEmail] = useState("");
        const [role, setRole] = useState("auditor");
        const [submitting, setSubmitting] = useState(false);

        const submit = async () => {
          if (!name.trim()) { toast("请输入显示名称", "warn"); return; }
          setSubmitting(true);
          try {
            const u = await api("POST", "/users", {
              user_id: userId.trim(),
              display_name: name.trim(),
              role,
              email: email.trim(),
              active: true,
            });
            onCreated(u);
          } catch (e) {
            if (e.status === 404) {
              // 后端未注册路由 → 写入 localStorage 占位列表
              try {
                const cur = JSON.parse(localStorage.getItem("finance.users.fallback") || "[]");
                const item = { user_id: userId.trim(), display_name: name.trim(), role, email: email.trim(), active: true, mock: true };
                localStorage.setItem("finance.users.fallback", JSON.stringify([...cur, item]));
                onCreated(item);
              } catch (ee) {
                toast(`本地保存失败：${ee.message}`, "err");
              }
            } else {
              toast(`创建失败：${e.message}`, "err");
            }
          } finally { setSubmitting(false); }
        };

        return (
          <Modal
            open
            onClose={submitting ? undefined : onClose}
            title="注册新用户"
            sub="仅 admin 可见。M2 期间是单本机模式，多用户协作要等 v0.3。"
            footer={
              <>
                <button className="btn" onClick={onClose} disabled={submitting}>取消</button>
                <button className="btn primary" onClick={submit} disabled={submitting}>
                  {submitting && <Spinner />}创建
                </button>
              </>
            }
          >
            <div className="row cols-2">
              <div>
                <label className="lbl">用户 ID</label>
                <input className="field mono" value={userId} onChange={(e) => setUserId(e.target.value.trim())} />
              </div>
              <div>
                <label className="lbl">角色</label>
                <select className="field" value={role} onChange={(e) => setRole(e.target.value)}>

            <div className="row mt-3">

                <label className="lbl">显示名<span className="required">*</span></label>

      }

      // 复核状态条 + 操作按钮（嵌入到 ReportView 顶部）
      const REVIEW_STATUS_META = {
        draft:           { label: "草稿",     badge: "" },
        pending_review:  { label: "待复核",   badge: "warn" },
        reviewed:        { label: "已复核",   badge: "info" },
        pending_signoff: { label: "待签字",   badge: "warn" },
        signed_off:     { label: "已签字 ✅", badge: "ok" },
        returned:        { label: "已打回",   badge: "err" },
      };
      const REVIEW_FLOW = ["draft", "pending_review", "reviewed", "pending_signoff", "signed_off"];

      function ReviewWorkflowBar({ orgId, reportId, toast }) {
        const user = useUser();
        const { data, error, reload } = useFetch(
          `/orgs/${orgId}/reports/${reportId}/workflows`,
          [orgId, reportId],
        );
        const [busy, setBusy] = useState(false);

        // 后端可能 404（路由未注册）→ 显示占位条
        const isMissing = error && error.status === 404;
        const wf = (data && data.workflows && data.workflows[0]) || null;
        const status = wf ? wf.status : "draft";
        const meta = REVIEW_STATUS_META[status] || REVIEW_STATUS_META.draft;

        const wrap = (fn) => async (...a) => { setBusy(true); try { await fn(...a); } finally { setBusy(false); } };

        const submit = wrap(async () => {
          try {
            await api("POST", `/orgs/${orgId}/reports/${reportId}/review/submit`, {
              auditor_id: user.userId,
              target_kind: "report_instance",
            });
            toast("已提交复核");
            reload();
          } catch (e) {
            if (e.status === 404) toast("提交失败：后端 collab 路由未注册", "warn");
            else toast(`提交失败：${e.message}`, "err");
          }
        });
        const approve = wrap(async () => {
          try {
            await api("POST", `/orgs/${orgId}/reports/${reportId}/review/approve`, {
              actor_id: user.userId, note: "",
            });
            toast("复核已通过");
            reload();
          } catch (e) { toast(`批准失败：${e.message}`, "err"); }
        });
        const requestChanges = wrap(async () => {
          const reason = window.prompt("请输入打回原因（必填）：");
          if (!reason) return;
          try {
            await api("POST", `/orgs/${orgId}/reports/${reportId}/review/request-changes`, {
              actor_id: user.userId, reason,
            });
            toast("已要求修改");
            reload();
          } catch (e) { toast(`打回失败：${e.message}`, "err"); }
        });
        const signOff = wrap(async () => {
          try {
            await api("POST", `/orgs/${orgId}/reports/${reportId}/review/sign-off`, {
              actor_id: user.userId, note: "",
            });
            toast("已签字 · 报表锁定");
            reload();
          } catch (e) { toast(`签字失败：${e.message}`, "err"); }
        });

        const canSubmit = (user.role === "auditor" || user.role === "manager") && status === "draft";
        const canApprove = (user.role === "manager" || user.role === "partner") && (status === "pending_review");
        const canRequestChanges = (user.role === "manager" || user.role === "partner") && (status === "pending_review" || status === "pending_signoff");
        const canSignOff = user.role === "partner" && (status === "reviewed" || status === "pending_signoff");

        return (
          <div className="card" style={{ padding: 10, marginBottom: 12 }} data-testid="review-bar">
            <div style={{ display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
              <strong style={{ fontSize: 12 }}>复核流程：</strong>
              {REVIEW_FLOW.map((s, i) => (
                <span
                  key={s}
                  style={{
                    fontSize: 11, padding: "2px 8px", borderRadius: 999,
                    background: s === status ? "var(--primary)" : "var(--bg-soft)",
                    color: s === status ? "#fff" : "var(--text-muted)",
                    border: "1px solid var(--border)",
                  }}
                >
                  {i + 1}. {REVIEW_STATUS_META[s].label}
                </span>
              ))}
              {status === "returned" && <span className="badge err">已打回</span>}
              {wf && wf.return_reason && (
                <span className="text-xs text-muted">原因：{wf.return_reason}</span>
              )}
              <span style={{ flex: 1 }} />
              <span className={`badge ${meta.badge || "info"}`}>{meta.label}</span>
            </div>
            <div className="flex gap-2" style={{ marginTop: 8, flexWrap: "wrap" }}>
              {canSubmit && (
                <button className="btn primary sm" disabled={busy} onClick={submit} data-testid="review-submit">
                  提交复核
                </button>
              )}
              {canApprove && (
                <button className="btn primary sm" disabled={busy} onClick={approve} data-testid="review-approve">
                  批准
                </button>
              )}
              {canRequestChanges && (
                <button className="btn sm" disabled={busy} onClick={requestChanges}>要求修改</button>
              )}
              {canSignOff && (
                <button className="btn primary sm" disabled={busy} onClick={signOff} data-testid="review-signoff">
                  合伙人签字
                </button>
              )}
              {!canSubmit && !canApprove && !canRequestChanges && !canSignOff && (
                <span className="text-xs text-muted">
                  当前用户角色（<strong>{ROLE_META[user.role]?.label || user.role}</strong>）在状态「{meta.label}」下没有可执行操作。
                </span>
              )}
              {isMissing && (
                <span className="badge warn" title="后端 collab 路由未注册（biz sibling Stage 2 完成后会激活）">
                  后端 collab 路由未注册（mock）
                </span>
              )}
            </div>
          </div>
        );
      }

        const path = `/orgs/${orgId}/reports/${reportId}/comments?include_resolved=true`;

        const submit = async () => {
          if (!body.trim()) return;
          setSubmitting(true);
          try {
            const url = focusCellId
              ? `/orgs/${orgId}/reports/${reportId}/cells/${focusCellId}/comments`
              : `/orgs/${orgId}/reports/${reportId}/comments`;
            await api("POST", url, {
              body: body.trim(),
              kind: "general",
              author_id: user.userId,
              mentions: [],
            });
            setBody("");
            reload();
            toast("评论已发布");
          } catch (e) {
            if (e.status === 404) toast("发布失败：后端 collab 路由未注册", "warn");
            else toast(`发布失败：${e.message}`, "err");
          } finally { setSubmitting(false); }
        };

        return (
          <Drawer open onClose={onClose} title={focusCellId ? `评论 · cell ${focusCellId.slice(-12)}` : "报表评论"}>

              <div className="upload-result" style={{ background: "rgba(217,119,6,0.06)", borderColor: "rgba(217,119,6,0.30)" }}>

              </div>

            <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 16 }}>

            </div>
          </Drawer>
        );
      }

      const CONSOL_LS_KEY = "finance.consolidation.groups.v1";
      const ELIM_KIND_OPTS = [
        { v: "inter_ar_ap",       l: "内部往来抵消（AR/AP）" },
        { v: "inter_sales",       l: "内部销售抵消" },
        { v: "inter_investment",  l: "母对子投资抵消" },
        { v: "inter_profit",      l: "未实现内部利润" },
        { v: "minority_interest", l: "少数股东权益" },
        { v: "other",             l: "其他" },
      ];
      const JOIN_METHOD_META = {
        full:        { label: "全合并 (full)" },
        equity:      { label: "权益法 (equity)" },
        proportional:{ label: "比例合并 (proportional)" },
      };
      const REPORT_KIND_OPTS = [
        { v: "balance_sheet",    l: "资产负债表" },
        { v: "income_statement", l: "利润表" },
        { v: "cash_flow",        l: "现金流量表" },
      ];

      function _loadConsolStore() {
        try { return JSON.parse(localStorage.getItem(CONSOL_LS_KEY) || "{}") || {}; }
        catch { return {}; }
      }
      function _saveConsolStore(s) {
        localStorage.setItem(CONSOL_LS_KEY, JSON.stringify(s));
      }
      function _ensureGroup(s, gid) {
        if (!s.groups) s.groups = {};
        if (!s.groups[gid]) s.groups[gid] = { members: [], eliminations: [], runs: [] };
        return s.groups[gid];
      }

      function ConsolidationCreateDialog({ onClose, onCreated, toast }) {
        const [name, setName] = useState("");
        const [desc, setDesc] = useState("");
        const [parentOrgId, setParentOrgId] = useState("");
        const [submitting, setSubmitting] = useState(false);
        const { data: orgsData } = useFetch("/orgs?limit=200", []);
        const orgs = (orgsData && orgsData.orgs) || [];

        const submit = async () => {
          if (!name.trim()) { toast("请输入集团名称", "warn"); return; }
          if (!parentOrgId) { toast("请选择母公司账套", "warn"); return; }
          setSubmitting(true);
          const payload = {
            name: name.trim(),
            parent_org_id: parentOrgId,
            description: desc.trim() || null,
            created_by: "local",
          };
          try {
            const g = await api("POST", "/consolidation-groups", payload);
            onCreated(g);
          } catch (e) {
            if (e.status === 404) {
              const s = _loadConsolStore();
              if (!s.list) s.list = [];
              const gid = (s._nextId = (s._nextId || 1) + 1);
              const g = {
                group_id: gid,
                ...payload,
                created_at: new Date().toISOString(),
                updated_at: new Date().toISOString(),
                _members_count: 1,
                version: 1,
              };
              s.list.push(g);
              const gs = _ensureGroup(s, gid);
              gs.members.push({
                id: 1, group_id: gid, subsidiary_org_id: parentOrgId,
                ownership_pct: 100, join_method: "full", is_parent: true,
                added_at: new Date().toISOString(), version: 1,
              });
              _saveConsolStore(s);
              onCreated(g);
            } else {
              toast(`创建失败：${e.message}`, "err");
            }
          } finally { setSubmitting(false); }
        };

        return (
          <Modal
            open
            onClose={submitting ? undefined : onClose}
            title="新建集团"
            sub="创建后可在详情页添加子公司、抵消分录并触发合并。"
            footer={
              <>
                <button className="btn" onClick={onClose} disabled={submitting}>取消</button>
                <button className="btn primary" onClick={submit} disabled={submitting}>
                  {submitting && <Spinner />}创建
                </button>
              </>
            }
          >
            <div className="row">
              <div>
                <label className="lbl">集团名称<span className="required">*</span></label>
                <input className="field" value={name} onChange={(e) => setName(e.target.value)} placeholder="例如：集团 ABC" data-testid="group-name" />
              </div>
            </div>
            <div className="row mt-3">
              <div>
                <label className="lbl">母公司账套<span className="required">*</span></label>
                <select className="field" value={parentOrgId} onChange={(e) => setParentOrgId(e.target.value)} data-testid="group-parent">
                  <option value="">— 选择 —</option>
                  {orgs.map((o) => <option key={o.org_id} value={o.org_id}>{o.name}（{o.org_id.slice(-8)}）</option>)}
                </select>
              </div>
            </div>
            <div className="row mt-3">
              <div>
                <label className="lbl">备注（可选）</label>
                <textarea className="field" rows={2} value={desc} onChange={(e) => setDesc(e.target.value)} placeholder="可在此说明合并范围、报告期等" />
              </div>
            </div>
          </Modal>
        );
      }

        });

        const submit = async () => {
          if (!form.debit_target.trim() || !form.credit_target.trim()) { toast("借/贷方目标不能为空", "warn"); return; }
          if (!form.period_id) { toast("请填期间", "warn"); return; }
          const payload = { ...form, created_by: "local" };
          try {
            await api("POST", `/consolidation-groups/${groupId}/eliminations`, payload);
          } catch (e) {
            if (e.status !== 404) { toast(`添加失败：${e.message}`, "err"); return; }
            const s = _loadConsolStore();
            const gs = _ensureGroup(s, groupId);
            gs.eliminations.push({
              id: gs.eliminations.length + 1, group_id: groupId, ...payload,
              is_auto: false, created_at: new Date().toISOString(), version: 1,
            });
            _saveConsolStore(s);
          }
          setAdding(false);
          toast("抵消分录已添加");
          onChanged();
        };

        return (
          <>
            <div className="card mb-3">
              <button className="btn primary sm" onClick={() => setAdding(true)} data-testid="add-elim-btn">+ 添加抵消分录</button>
            </div>
            <div className="card" style={{ padding: 0 }}>
              {elims.length === 0 ? <EmptyState title="还没有抵消分录" /> : (
                <table className="report-table">
                  <thead>
                    <tr><th>类型</th><th>期间</th><th>借方目标</th><th>贷方目标</th><th className="num">金额</th><th>来源</th></tr>
                  </thead>
                  <tbody>
                    {elims.map((e) => (
                      <tr key={e.id}>
                        <td>{(ELIM_KIND_OPTS.find((k) => k.v === e.kind) || {}).l || e.kind}</td>
                        <td className="mono text-xs">{e.period_id}</td>
                        <td className="text-xs">{e.debit_target}</td>
                        <td className="text-xs">{e.credit_target}</td>
                        <td className="num mono">{fmtMoney(parseFloat(e.amount || "0"))}</td>
                        <td>{e.is_auto ? <span className="badge info">自动</span> : <span className="badge">手工</span>}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              )}
            </div>
            {adding && (
              <Modal
                open
                onClose={() => setAdding(false)}
                title="添加抵消分录"
                sub="借方 / 贷方 target 一般填 cell_id 或 account_code，由后端解析。"
                footer={<><button className="btn" onClick={() => setAdding(false)}>取消</button><button className="btn primary" onClick={submit}>添加</button></>}
              >
                <div className="row cols-2">
                  <div>
                    <label className="lbl">期间</label>
                    <input className="field mono" value={form.period_id} onChange={(e) => setForm({ ...form, period_id: e.target.value })} />
                  </div>
                  <div>
                    <label className="lbl">类型</label>
                    <select className="field" value={form.kind} onChange={(e) => setForm({ ...form, kind: e.target.value })}>
                      {ELIM_KIND_OPTS.map((o) => <option key={o.v} value={o.v}>{o.l}</option>)}
                    </select>
                  </div>
                </div>
                <div className="row cols-2 mt-3">
                  <div>
                    <label className="lbl">借方目标</label>
                    <input className="field" value={form.debit_target} onChange={(e) => setForm({ ...form, debit_target: e.target.value })} placeholder="例如：1122_应收账款" />
                  </div>
                  <div>
                    <label className="lbl">贷方目标</label>
                    <input className="field" value={form.credit_target} onChange={(e) => setForm({ ...form, credit_target: e.target.value })} placeholder="例如：2202_应付账款" />
                  </div>
                </div>
                <div className="row cols-2 mt-3">
                  <div>
                    <label className="lbl">金额</label>
                    <input className="field mono" value={form.amount} onChange={(e) => setForm({ ...form, amount: e.target.value })} placeholder="0" />
                  </div>
                  <div>
                    <label className="lbl">需复核</label>
                    <select className="field" value={form.review_required ? "y" : "n"} onChange={(e) => setForm({ ...form, review_required: e.target.value === "y" })}>
                      <option value="y">是</option>
                      <option value="n">否</option>
                    </select>
                  </div>
                </div>
                <div className="row mt-3"><div>
                  <label className="lbl">说明（可选）</label>
                  <textarea className="field" rows={2} value={form.rationale} onChange={(e) => setForm({ ...form, rationale: e.target.value })} />
                </div></div>
              </Modal>
            )}
          </>
        );
      }

      function ConsolidationRunsTab({ groupId, runs, period, parentOrgId, onChanged, onOpenReport, backendOk, toast }) {
        const [running, setRunning] = useState(false);
        const [periodId, setPeriodId] = useState(period);
        const [kind, setKind] = useState("balance_sheet");

        const trigger = async () => {
          setRunning(true);
          try {
            const r = await api("POST", `/consolidation-groups/${groupId}/runs?period_id=${encodeURIComponent(periodId)}&kind=${kind}`, null, { timeoutMs: 30000 });
            toast(`合并完成 #${r && r.consolidated_report_id || ""}`);
          } catch (e) {
            if (e.status !== 404) { toast(`合并失败：${e.message}`, "err"); return; }
            const s = _loadConsolStore();
            const gs = _ensureGroup(s, groupId);
            gs.runs.push({
              consolidated_report_id: gs.runs.length + 1,
              group_id: groupId, period_id: periodId, kind,
              status: "ok", cells: [], minority_interest: "0",
              consolidation_meta: { mock: true },
              member_orgs_snapshot: [], elimination_ids: [],
              warnings: ["（mock 模式 · 后端 consolidation 路由未注册）"],
              generated_at: new Date().toISOString(), generated_by: "local", version: 1,
            });
            _saveConsolStore(s);
            toast(`合并完成（mock）`);
          } finally {
            setRunning(false);
            onChanged();
          }
        };

        return (
          <>
            <div className="card mb-3">
              <div className="flex gap-2 items-center">
                <span style={{ fontSize: 12 }}>期间</span>
                <input className="field mono" style={{ width: 120 }} value={periodId} onChange={(e) => setPeriodId(e.target.value)} />
                <span style={{ fontSize: 12 }}>报表类型</span>
                <select className="field" style={{ width: 160 }} value={kind} onChange={(e) => setKind(e.target.value)}>
                  {REPORT_KIND_OPTS.map((o) => <option key={o.v} value={o.v}>{o.l}</option>)}
                </select>
                <button className="btn primary sm" onClick={trigger} disabled={running} data-testid="trigger-run">
                  {running && <Spinner />}触发合并
                </button>
                {backendOk === false && <span className="badge warn">mock 模式</span>}
              </div>
            </div>
            <div className="card" style={{ padding: 0 }}>
              {runs.length === 0 ? <EmptyState title="还没有合并报表" desc="点击「触发合并」开始一次合并。" /> : (
                <table className="report-table">
                  <thead>
                    <tr><th>#</th><th>期间</th><th>类型</th><th>状态</th><th className="num">少数股东权益</th><th>生成时间</th><th>操作</th></tr>
                  </thead>
                  <tbody>
                    {runs.map((r) => (
                      <tr key={r.consolidated_report_id}>
                        <td className="mono text-xs">{r.consolidated_report_id}</td>
                        <td className="mono text-xs">{r.period_id}</td>
                        <td>{(REPORT_KIND_OPTS.find((x) => x.v === r.kind) || {}).l || r.kind}</td>
                        <td>{r.status === "ok" ? <span className="badge ok">成功</span> : r.status === "partial" ? <span className="badge warn">部分</span> : <span className="badge err">失败</span>}</td>
                        <td className="num mono">{fmtMoney(parseFloat(r.minority_interest || "0"))}</td>
                        <td className="text-xs text-muted">{fmtTs(r.generated_at)}</td>
                        <td>
                          {r.report_id || r.virtual_report_id
                            ? <button className="btn subtle sm" onClick={() => onOpenReport(parentOrgId, r.report_id || r.virtual_report_id)}>查看 →</button>
                            : <span className="text-xs text-muted">{r.warnings && r.warnings.length ? r.warnings[0] : "—"}</span>
                          }
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              )}
            </div>
          </>
        );
      }

      // ═══════════════════════════════════════════════════════════════════
      //  M2 STAGE 6 · AI 设置 / 授权 / 调用历史
      //
      //  后端契约（ai sibling 已实现并 commit；router 注册靠 ai/__init__.py
      //  的 build_router 调用 register_ai_endpoints）：
      //    GET    /ai/scenarios
      //    PATCH  /ai/scenarios/{scenario_id}
      //    GET    /ai/consent[?user_id=&active_only=]
      //    DELETE /ai/consent/{consent_id}
      //    GET    /ai/audit-log[?org_id=&scenario_id=&outcome=&limit=&offset=]

      //  注意：原始脱敏 payload 文件由 desensitized_payload_path 指向，
      //  当前没有 GET /ai/audit-log/{id}/payload 端点；UI 仅展示路径 + hash。
      // ═══════════════════════════════════════════════════════════════════

      const AI_OUTCOME_META = {
        success: { label: "成功",     badge: "ok" },
        error:   { label: "失败",     badge: "err" },
        denied:  { label: "用户拒绝", badge: "warn" },
        timeout: { label: "超时",     badge: "err" },
      };

        const [tab, setTab] = useState("scenarios");
        return (
          <>
            <div className="flex items-center justify-between mb-3">
              <div>
                <h2 className="page-title">AI 设置</h2>
                <p className="page-subtitle">场景默认值 / 永久授权 / 调用历史</p>
              </div>
            </div>
            <div className="tabs" style={{ marginBottom: 12 }}>
              <button className={`tab ${tab === "scenarios" ? "active" : ""}`} onClick={() => setTab("scenarios")} data-testid="tab-ai-scenarios">场景设置</button>
              <button className={`tab ${tab === "consent" ? "active" : ""}`}   onClick={() => setTab("consent")}   data-testid="tab-ai-consent">授权管理</button>
              <button className={`tab ${tab === "audit" ? "active" : ""}`}     onClick={() => setTab("audit")}     data-testid="tab-ai-audit">调用历史</button>
            </div>
            {tab === "scenarios" && <AIScenariosTab toast={toast} />}

        const { data, error, loading, reload } = useFetch("/ai/scenarios", []);
        const scenarios = (data && data.scenarios) || [];
        const isMissing = error && error.status === 404;

        const patch = async (sid, body) => {
          try {
            await api("PATCH", `/ai/scenarios/${sid}`, body);
            toast("已保存");
            reload();
          } catch (e) {
            toast(`保存失败：${e.message}`, "err");
          }
        };

        if (loading) return <div className="card"><Spinner /> 加载场景中…</div>;

        return (
          <>
            {isMissing && (
              <div className="upload-result" style={{ background: "rgba(217,119,6,0.06)", borderColor: "rgba(217,119,6,0.30)" }}>
                后端 AI 路由未注册（router 尚未挂入主路由）—— 等 ai sibling 把
                <span className="mono"> register_ai_endpoints </span>
                wire 进 build_router 即可激活。
              </div>
            )}
            <div className="card" style={{ padding: 0 }}>
              {scenarios.length === 0 && !isMissing && <EmptyState title="无 AI 场景" />}
              {scenarios.length > 0 && (
                <table className="report-table">
                  <thead>
                    <tr>
                      <th>场景</th>
                      <th>说明</th>
                      <th>启用</th>
                      <th>敏感度</th>
                      <th>本地</th>
                      <th>需弹窗</th>
                    </tr>
                  </thead>
                  <tbody>
                    {scenarios.map((s) => {
                      const effective = s.sensitivity_override || s.default_sensitivity;
                      const enabled = (s.enabled_override === null || s.enabled_override === undefined)
                        ? s.default_enabled : s.enabled_override;
                      return (
                        <tr key={s.scenario_id}>
                          <td>
                            <div><strong>{s.name}</strong></div>
                            <div className="text-xs text-muted mono">{s.scenario_id}</div>
                          </td>
                          <td className="text-xs">{s.description || "—"}</td>
                          <td>
                            <label style={{ display: "inline-flex", alignItems: "center", gap: 6 }}>
                              <input
                                type="checkbox"
                                checked={enabled}
                                onChange={(e) => patch(s.scenario_id, { enabled: e.target.checked })}
                                data-testid={`scenario-enabled-${s.scenario_id}`}
                              />
                              {enabled ? "已启用" : "已停用"}
                            </label>
                          </td>
                          <td>
                            <select
                              className="field"
                              style={{ width: 120 }}
                              value={effective}
                              onChange={(e) => patch(s.scenario_id, { sensitivity_override: e.target.value })}
                            >
                              {Object.keys(SENSITIVITY_META).map((v) => (
                                <option key={v} value={v}>
                                  {SENSITIVITY_META[v].icon} {SENSITIVITY_META[v].label}
                                </option>
                              ))}
                            </select>
                          </td>
                          <td>{s.is_local_only ? <span className="badge ok">仅本地</span> : <span className="badge">否</span>}</td>
                          <td>{s.require_dialog ? "是" : "否"}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              )}
            </div>
          </>
        );
      }

      function AIConsentTab({ toast }) {
        const user = useUser();
        const [activeOnly, setActiveOnly] = useState(true);
        const url = `/ai/consent?user_id=${encodeURIComponent(user.userId)}&active_only=${activeOnly}`;
        const { data, error, loading, reload } = useFetch(url, [user.userId, activeOnly]);
        const consents = (data && data.consents) || [];
        const active = (data && data.active_permanent) || 0;
        const isMissing = error && error.status === 404;

        const revoke = async (cid) => {
          if (!window.confirm("确认撤销该永久授权？")) return;
          try {
            await api("DELETE", `/ai/consent/${cid}`);
            toast("授权已撤销");
            reload();
          } catch (e) { toast(`撤销失败：${e.message}`, "err"); }
        };

        if (loading) return <div className="card"><Spinner /> 加载授权记录…</div>;

        return (
          <>
            <div className="card mb-3" style={{ padding: 10 }}>
              <div className="flex items-center gap-2">
                <span className="text-xs text-muted">用户：<span className="mono">{user.userId}</span></span>
                <span style={{ flex: 1 }} />
                <label style={{ display: "inline-flex", alignItems: "center", gap: 4, fontSize: 12 }}>
                  <input type="checkbox" checked={activeOnly} onChange={(e) => setActiveOnly(e.target.checked)} />
                  仅显示生效中
                </label>
                <span className="badge ok">生效永久授权 {active}</span>
                <button className="btn sm" onClick={reload}>刷新</button>
              </div>
            </div>
            {isMissing && (
              <div className="upload-result" style={{ background: "rgba(217,119,6,0.06)", borderColor: "rgba(217,119,6,0.30)" }}>
                后端 AI 路由未注册，授权列表暂不可用（mock 模式）。
              </div>
            )}
            <div className="card" style={{ padding: 0 }}>
              {consents.length === 0 && !isMissing && <EmptyState title="还没有任何授权记录" />}
              {consents.length > 0 && (
                <table className="report-table">
                  <thead>
                    <tr><th>#</th><th>场景</th><th>敏感度</th><th>决策</th><th>授权时间</th><th>状态</th><th>操作</th></tr>
                  </thead>
                  <tbody>
                    {consents.map((c) => {
                      const meta = SENSITIVITY_META[c.sensitivity_level] || SENSITIVITY_META.metadata;
                      const isActive = c.decision === "allow_permanent" && !c.revoked_at;
                      return (
                        <tr key={c.consent_id}>
                          <td className="mono text-xs">{c.consent_id}</td>
                          <td className="mono text-xs">{c.scenario_id}</td>
                          <td>{meta.icon} {meta.label}</td>
                          <td>
                            {c.decision === "allow_permanent" ? <span className="badge ok">永久允许</span>
                              : c.decision === "allow_once" ? <span className="badge info">单次允许</span>
                              : <span className="badge err">拒绝</span>}
                          </td>
                          <td className="text-xs text-muted">{fmtTs(c.granted_at)}</td>
                          <td>
                            {isActive ? <span className="badge ok">生效中</span>
                              : c.revoked_at ? <span className="badge">已撤销 · {fmtTs(c.revoked_at)}</span>
                              : <span className="badge">—</span>}
                          </td>
                          <td>
                            {isActive
                              ? <button className="btn danger sm" onClick={() => revoke(c.consent_id)} data-testid={`revoke-${c.consent_id}`}>撤销</button>
                              : <span className="text-xs text-muted">—</span>}
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              )}
            </div>
          </>
        );
      }

      function AIAuditTab({ toast }) {
        const [orgFilter, setOrgFilter] = useState("");
        const [scenarioFilter, setScenarioFilter] = useState("");
        const [outcomeFilter, setOutcomeFilter] = useState("");
        const [limit] = useState(20);
        const [offset, setOffset] = useState(0);
        const [payloadModal, setPayloadModal] = useState(null);
        const qs = useMemo(() => {
          const p = new URLSearchParams();
          if (orgFilter) p.set("org_id", orgFilter);
          if (scenarioFilter) p.set("scenario_id", scenarioFilter);
          if (outcomeFilter) p.set("outcome", outcomeFilter);
          p.set("limit", String(limit));
          p.set("offset", String(offset));
          return p.toString();
        }, [orgFilter, scenarioFilter, outcomeFilter, limit, offset]);
        const url = `/ai/audit-log?${qs}`;
        const { data, error, loading, reload } = useFetch(url, [qs]);
        const items = (data && data.items) || [];
        const total = (data && data.total) || 0;
        const summary = (data && data.summary) || {};
        const isMissing = error && error.status === 404;

        const totalPages = Math.max(1, Math.ceil(total / limit));
        const page = Math.floor(offset / limit) + 1;

        return (
          <>
            <div className="card mb-3" style={{ padding: 10 }}>
              <div className="flex gap-2 items-center" style={{ flexWrap: "wrap" }}>
                <input className="field mono" style={{ width: 180 }} value={orgFilter}      placeholder="org_id 过滤"      onChange={(e) => { setOffset(0); setOrgFilter(e.target.value.trim()); }} />
                <input className="field mono" style={{ width: 180 }} value={scenarioFilter} placeholder="scenario_id 过滤" onChange={(e) => { setOffset(0); setScenarioFilter(e.target.value.trim()); }} />
                <select className="field" style={{ width: 140 }} value={outcomeFilter} onChange={(e) => { setOffset(0); setOutcomeFilter(e.target.value); }}>
                  <option value="">— 全部结果 —</option>
                  {Object.keys(AI_OUTCOME_META).map((k) => <option key={k} value={k}>{AI_OUTCOME_META[k].label}</option>)}
                </select>
                <span style={{ flex: 1 }} />
                {Object.keys(summary).length > 0 && (
                  <span className="text-xs text-muted">
                    汇总：{Object.keys(summary).map((k) => `${(AI_OUTCOME_META[k] || {}).label || k} ${summary[k]}`).join(" · ")}
                  </span>
                )}
                <button className="btn sm" onClick={reload}>刷新</button>
              </div>
            </div>
            {isMissing && (
              <div className="upload-result" style={{ background: "rgba(217,119,6,0.06)", borderColor: "rgba(217,119,6,0.30)" }}>
                后端 AI 路由未注册，调用历史暂不可用（mock 模式）。
              </div>
            )}
            <div className="card" style={{ padding: 0 }}>
              {loading ? <div className="empty"><Spinner /> 加载…</div>
                : items.length === 0 && !isMissing ? <EmptyState title="没有匹配的调用记录" />
                : items.length > 0 && (
                <table className="report-table">
                  <thead>
                    <tr>
                      <th>时间</th>
                      <th>场景</th>
                      <th>敏感度</th>
                      <th>模型</th>
                      <th className="num">tokens</th>
                      <th>结果</th>
                      <th>操作</th>
                    </tr>
                  </thead>
                  <tbody>
                    {items.map((it) => {
                      const sm = SENSITIVITY_META[it.sensitivity_level] || SENSITIVITY_META.metadata;
                      const om = AI_OUTCOME_META[it.outcome] || { label: it.outcome, badge: "" };
                      const total = (it.prompt_tokens || 0) + (it.completion_tokens || 0);
                      return (
                        <tr key={it.id}>
                          <td className="text-xs text-muted">{fmtTs(it.timestamp)}</td>
                          <td className="mono text-xs">{it.scenario_id}</td>
                          <td>{sm.icon} {sm.label}</td>
                          <td className="text-xs">
                            {it.is_local_endpoint && <span className="badge ok" style={{ fontSize: 10, marginRight: 4 }}>本地</span>}
                            {it.model_provider || "—"} / {it.model_name || "—"}
                          </td>
                          <td className="num mono text-xs">{total ? total : "—"}</td>
                          <td><span className={`badge ${om.badge}`}>{om.label}</span></td>
                          <td>
                            <button
                              className="btn subtle sm"
                              onClick={() => setPayloadModal(it)}
                              data-testid={`view-payload-${it.id}`}
                            >
                              查看脱敏 payload
                            </button>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              )}
            </div>
            <div className="flex items-center gap-2 mt-3" style={{ justifyContent: "flex-end" }}>
              <span className="text-xs text-muted">共 {total} 条 · 第 {page}/{totalPages} 页</span>
              <button className="btn sm" disabled={offset === 0} onClick={() => setOffset(Math.max(0, offset - limit))}>上一页</button>
              <button className="btn sm" disabled={page >= totalPages} onClick={() => setOffset(offset + limit)}>下一页</button>
            </div>

            {payloadModal && (
              <Modal
                open
                onClose={() => setPayloadModal(null)}
                title="脱敏 payload 信息"
                sub="后端尚未提供 GET /ai/audit-log/{id}/payload；UI 只能展示元信息（脱敏文件路径 / hash）。"
                footer={<button className="btn primary" onClick={() => setPayloadModal(null)}>关闭</button>}
              >
                <div className="row"><div>

      // ═══════════════════════════════════════════════════════════════════

        narrative_pending_user:   { label: "待用户填写",  cls: "warn" },

        try {
          const s = JSON.parse(localStorage.getItem(NOTES_LS_KEY) || "null");

        } catch {}
        const seed = {
          documents: [
            {
              doc_id: "doc_mock_001",
              org_id: "(mock)",
              period_id: "2025-FY",
              status: "draft",
              notes_count: 4,
              created_at: new Date().toISOString(),
              notes: [

                { note_id: "n2", section_title: "应收账款", kind: "hybrid", version: 1, content: "期末余额 1,234,567.89 元，账龄分析见下表。" },
                { note_id: "n3", section_title: "或有事项", kind: "narrative_pending_ai", version: 1, content: "（待 AI 起草）" },
                { note_id: "n4", section_title: "关联方交易", kind: "narrative_pending_user", version: 1, content: "" },

            {

              org_id: "(mock)",
              period_id: "2024-FY",
              status: "finalized",
              notes_count: 2,
              created_at: new Date(Date.now() - 86400000 * 30).toISOString(),
              notes: [
                { note_id: "m1", section_title: "存货", kind: "data", version: 2, content: "存货采用加权平均法核算。" },
                { note_id: "m2", section_title: "固定资产", kind: "narrative", version: 1, content: "采用直线法计提折旧。" },

            },
          ],
        };
        localStorage.setItem(NOTES_LS_KEY, JSON.stringify(seed));

      function _saveNotesMock(s) { localStorage.setItem(NOTES_LS_KEY, JSON.stringify(s)); }

      function NotesEditorView({ toast }) {
        const { data: orgsData } = useFetch("/orgs?limit=200", []);

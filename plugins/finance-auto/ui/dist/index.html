      function AIAuditTab({ toast }) {
        const [orgFilter, setOrgFilter] = useState("");
        const [scenarioFilter, setScenarioFilter] = useState("");
        const [outcomeFilter, setOutcomeFilter] = useState("");
        const [limit] = useState(20);
        const [offset, setOffset] = useState(0);
        const [payloadModal, setPayloadModal] = useState(null);
        const qs = useMemo(() => {
          const p = new URLSearchParams();
          if (orgFilter) p.set("org_id", orgFilter);
          if (scenarioFilter) p.set("scenario_id", scenarioFilter);
          if (outcomeFilter) p.set("outcome", outcomeFilter);
          p.set("limit", String(limit));
          p.set("offset", String(offset));
          return p.toString();
        }, [orgFilter, scenarioFilter, outcomeFilter, limit, offset]);
        const url = `/ai/audit-log?${qs}`;
        const { data, error, loading, reload } = useFetch(url, [qs]);
        const items = (data && data.items) || [];
        const total = (data && data.total) || 0;
        const summary = (data && data.summary) || {};
        const isMissing = error && error.status === 404;

        const totalPages = Math.max(1, Math.ceil(total / limit));
        const page = Math.floor(offset / limit) + 1;

        return (
          <>
            <div className="oa-card mb-3" style={{ padding: 10 }}>
              <div className="flex gap-2 items-center" style={{ flexWrap: "wrap" }}>
                <input className="oa-input mono" style={{ width: 180 }} value={orgFilter}      placeholder="按账套筛选"      onChange={(e) => { setOffset(0); setOrgFilter(e.target.value.trim()); }} />
                <input className="oa-input mono" style={{ width: 180 }} value={scenarioFilter} placeholder="按功能编号筛选" onChange={(e) => { setOffset(0); setScenarioFilter(e.target.value.trim()); }} />
                <select className="oa-select" style={{ width: 140 }} value={outcomeFilter} onChange={(e) => { setOffset(0); setOutcomeFilter(e.target.value); }}>
                  <option value="">— 全部结果 —</option>
                  {Object.keys(AI_OUTCOME_META).map((k) => <option key={k} value={k}>{AI_OUTCOME_META[k].label}</option>)}
                </select>
                <span style={{ flex: 1 }} />
                {Object.keys(summary).length > 0 && (
                  <span className="text-xs text-muted">
                    汇总：{Object.keys(summary).map((k) => `${(AI_OUTCOME_META[k] || {}).label || k} ${summary[k]}`).join(" · ")}
                  </span>
                )}
                <button className="oa-btn" onClick={reload}>刷新</button>
              </div>
            </div>
            <BackendUnavailableBanner show={isMissing} onRetry={reload} detail="AI 调用历史接口未响应" />
            <div className="oa-card" style={{ padding: 0 }}>
              {loading ? <div className="empty"><Spinner /> 加载…</div>
                : items.length === 0 && !isMissing ? <EmptyState title="没有匹配的调用记录" />
                : items.length > 0 && (
                <table className="report-table">
                  <thead>
                    <tr>
                      <th>时间</th>
                      <th>场景</th>
                      <th>敏感度</th>
                      <th>模型</th>
                      <th className="num">tokens</th>
                      <th>结果</th>
                      <th>操作</th>
                    </tr>
                  </thead>
                  <tbody>
                    {items.map((it) => {
                      const sm = SENSITIVITY_META[it.sensitivity_level] || SENSITIVITY_META.metadata;
                      const om = AI_OUTCOME_META[it.outcome] || { label: it.outcome, badge: "" };
                      const total = (it.prompt_tokens || 0) + (it.completion_tokens || 0);
                      return (
                        <tr key={it.id}>
                          <td className="text-xs text-muted">{fmtTs(it.timestamp)}</td>
                          <td>
                            <div className="text-xs">{scenarioNameById(it.scenario_id)}</div>
                            <div className="text-xs text-muted mono">{it.scenario_id}</div>
                          </td>
                          <td>{sm.icon} {sm.label}</td>
                          <td className="text-xs">
                            {it.is_local_endpoint && <span className="badge ok" style={{ fontSize: 10, marginRight: 4 }}>本地</span>}
                            {it.model_provider || "—"} / {it.model_name || "—"}
                          </td>
                          <td className="num mono text-xs">{total ? total : "—"}</td>
                          <td><span className={`badge ${om.badge}`}>{om.label}</span></td>
                          <td>
                            <button
                              className="btn subtle sm"
                              onClick={() => setPayloadModal(it)}
                              data-testid={`view-payload-${it.id}`}
                            >
                              查看脱敏 payload
                            </button>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              )}
            </div>
            <div className="flex items-center gap-2 mt-3" style={{ justifyContent: "flex-end" }}>
              <span className="text-xs text-muted">共 {total} 条 · 第 {page}/{totalPages} 页</span>
              <button className="oa-btn" disabled={offset === 0} onClick={() => setOffset(Math.max(0, offset - limit))}>上一页</button>
              <button className="oa-btn" disabled={page >= totalPages} onClick={() => setOffset(offset + limit)}>下一页</button>
            </div>

            {payloadModal && (
              <Modal
                open
                onClose={() => setPayloadModal(null)}
                title="脱敏 payload 信息"
                sub="出于安全考虑，仅展示脱敏元信息（文件路径 / hash），不提供原始 payload 下载。"
                footer={<button className="oa-btn oa-btn-primary" onClick={() => setPayloadModal(null)}>关闭</button>}
              >
                <div className="row"><div>
                  <label className="oa-label">scenario_id</label>
                  <div className="mono text-xs">{payloadModal.scenario_id}</div>
                </div></div>
                <div className="row mt-3"><div>
                  <label className="oa-label">payload_hash</label>
                  <div className="mono text-xs" style={{ wordBreak: "break-all" }}>{payloadModal.payload_hash}</div>
                </div></div>
                <div className="row mt-3"><div>
                  <label className="oa-label">desensitized_payload_path</label>
                  <div className="mono text-xs" style={{ wordBreak: "break-all" }}>
                    {payloadModal.desensitized_payload_path || "（未持久化）"}
                  </div>
                </div></div>
                {payloadModal.error_message && (
                  <div className="row mt-3"><div>
                    <label className="oa-label">error_message</label>
                    <div className="mono text-xs upload-result err" style={{ padding: 8 }}>
                      {payloadModal.error_message}
                    </div>
                  </div></div>
                )}
                <div className="row cols-2 mt-3">
                  <div>
                    <label className="oa-label">payload_size_bytes</label>
                    <div className="mono text-xs">{payloadModal.payload_size_bytes}</div>
                  </div>
                  <div>
                    <label className="oa-label">duration_ms</label>
                    <div className="mono text-xs">{payloadModal.duration_ms ?? "—"}</div>
                  </div>
                </div>
              </Modal>
            )}
          </>
        );
      }

      // ═══════════════════════════════════════════════════════════════════
      //  M3 · 报表附注（Notes Editor）—— Sibling A 后端：
      //    POST /orgs/{oid}/notes/generate
      //    GET  /orgs/{oid}/notes/documents
      //    GET  /orgs/{oid}/notes/documents/{doc_id}/notes
      //    PATCH /orgs/{oid}/notes/{note_id}  body { content, version }  乐观锁
      //    POST /orgs/{oid}/notes/documents/{doc_id}/finalize
      //    GET  /orgs/{oid}/notes/documents/{doc_id}/export?format=md
      //  后端不可达时展示横幅 + 阻断态；仅 ?ai_mock=1 演示模式才用本地数据：finance.notes.mock.v1
      // ═══════════════════════════════════════════════════════════════════
      const NOTES_LS_KEY = "finance.notes.mock.v1";
      const NOTE_KIND_META = {
        data:                     { label: "数据",        cls: "ok" },
        narrative:                { label: "文字",        cls: "info" },
        hybrid:                   { label: "数据+文字",   cls: "info" },
        narrative_pending_ai:     { label: "待 AI 起草",  cls: "warn" },
        narrative_pending_user:   { label: "待用户填写",  cls: "warn" },
      };

      function _loadNotesMock() {
        if (!DEMO_MOCK) return { documents: [] };
        try {
          const s = JSON.parse(localStorage.getItem(NOTES_LS_KEY) || "null");
          if (s && s.documents) return s;
        } catch {}
        const seed = {
          documents: [
            {
              doc_id: "doc_mock_001",
              org_id: "(mock)",
              period_id: "2025-FY",
              status: "draft",
              notes_count: 4,
              created_at: new Date().toISOString(),
              notes: [
                { note_id: "n1", section_title: "重要会计政策", kind: "data", version: 1, content: "本公司采用企业会计准则编制财务报表。" },
                { note_id: "n2", section_title: "应收账款", kind: "hybrid", version: 1, content: "期末余额 1,234,567.89 元，账龄分析见下表。" },
                { note_id: "n3", section_title: "或有事项", kind: "narrative_pending_ai", version: 1, content: "（待 AI 起草）" },
                { note_id: "n4", section_title: "关联方交易", kind: "narrative_pending_user", version: 1, content: "" },
              ],
            },
            {
              doc_id: "doc_mock_002",
              org_id: "(mock)",
              period_id: "2024-FY",
              status: "finalized",
              notes_count: 2,
              created_at: new Date(Date.now() - 86400000 * 30).toISOString(),
              notes: [
                { note_id: "m1", section_title: "存货", kind: "data", version: 2, content: "存货采用加权平均法核算。" },
                { note_id: "m2", section_title: "固定资产", kind: "narrative", version: 1, content: "采用直线法计提折旧。" },
              ],
            },
          ],
        };
        localStorage.setItem(NOTES_LS_KEY, JSON.stringify(seed));
        return seed;
      }
      function _saveNotesMock(s) { if (!DEMO_MOCK) return; localStorage.setItem(NOTES_LS_KEY, JSON.stringify(s)); }

      function NotesEditorView({ toast }) {
        const { data: orgsData } = useFetch("/orgs?limit=200", []);
        const orgs = (orgsData && orgsData.organizations) || [];
        const [orgId, setOrgId] = useState("");
        const [periodId, setPeriodId] = useState("2025-FY");
        const [docs, setDocs] = useState([]);
        const [selectedDoc, setSelectedDoc] = useState(null);
        const [notes, setNotes] = useState([]);
        const [backendOk, setBackendOk] = useState(null);
        const [generating, setGenerating] = useState(false);

        const reloadDocs = useCallback(async (oid) => {
          if (!oid) return;
          try {
            const r = await api("GET", `/orgs/${oid}/notes/documents`, null, { timeoutMs: 4000 });
            setDocs((r && r.documents) || []);
            setBackendOk(true);
          } catch (e) {
            const s = _loadNotesMock();
            setDocs(s.documents || []);
            setBackendOk(false);
          }
        }, []);

        useEffect(() => { if (orgId) reloadDocs(orgId); }, [orgId, reloadDocs]);

        const openDoc = async (d) => {
          setSelectedDoc(d);
          if (backendOk) {
            try {
              const r = await api("GET", `/orgs/${orgId}/notes/documents/${d.doc_id}/notes`);
              setNotes((r && r.notes) || []);
              return;
            } catch (e) { /* fall through to mock */ }
          }
          setNotes(d.notes || []);
        };

        const generate = async () => {
          if (!orgId) { toast("请选择账套", "warn"); return; }
          setGenerating(true);
          try {
            await api("POST", `/orgs/${orgId}/notes/generate`, { period_id: periodId });
            toast("已生成附注文档");
            reloadDocs(orgId);
          } catch (e) {
            if (e.status === 404 && DEMO_MOCK) {
              const s = _loadNotesMock();
              const newDoc = {
                doc_id: `doc_mock_${Math.random().toString(36).slice(2, 8)}`,
                org_id: orgId, period_id: periodId, status: "draft",
                notes_count: 1, created_at: new Date().toISOString(),
                notes: [{ note_id: `n_${Date.now()}`, section_title: "新生成附注", kind: "narrative_pending_ai", version: 1, content: "（本地占位 · 后端恢复后将自动填充）" }],
              };
              s.documents = [newDoc, ...(s.documents || [])];
              _saveNotesMock(s);
              setDocs(s.documents);
              toast("演示模式：已生成本地占位文档", "warn");
            } else if (e.status === 404) {
              setBackendOk(false);
              toast("后端不可用，附注未生成", "err");
            } else {
              toast(`生成失败：${e.message}`, "err");
            }
          } finally { setGenerating(false); }
        };

        const saveNote = async (note, newContent) => {
          try {
            const updated = await api("PATCH", `/orgs/${orgId}/notes/${note.note_id}`, { content: newContent, version: note.version });
            toast("已保存（版本 +1）");
            setNotes((cur) => cur.map((x) => x.note_id === note.note_id ? { ...x, content: newContent, version: (updated && updated.version) || (note.version + 1) } : x));
          } catch (e) {
            if ((e.status === 404 || (e.status === 409 && !backendOk)) && DEMO_MOCK) {
              const s = _loadNotesMock();
              const doc = (s.documents || []).find((x) => x.doc_id === selectedDoc.doc_id);
              if (doc) {
                doc.notes = (doc.notes || []).map((x) => x.note_id === note.note_id ? { ...x, content: newContent, version: (note.version || 1) + 1 } : x);
                _saveNotesMock(s);
              }
              setNotes((cur) => cur.map((x) => x.note_id === note.note_id ? { ...x, content: newContent, version: (x.version || 1) + 1 } : x));
              toast("演示模式：已保存到本地", "warn");
            } else if (e.status === 404) {
              toast("后端不可用，保存未生效", "err");
            } else if (e.status === 409) {
              toast("版本冲突，请刷新后再保存", "err");
            } else {
              toast(`保存失败：${e.message}`, "err");
            }
          }
        };

        const finalize = async () => {
          if (!selectedDoc) return;
          if (!window.confirm("确认定稿？定稿后将无法继续修改。")) return;
          try {
            await api("POST", `/orgs/${orgId}/notes/documents/${selectedDoc.doc_id}/finalize`, {});
            toast("已定稿");
            const upd = { ...selectedDoc, status: "finalized" };
            setSelectedDoc(upd);
            setDocs((cur) => cur.map((x) => x.doc_id === upd.doc_id ? upd : x));
          } catch (e) {
            if (e.status === 404 && DEMO_MOCK) {
              const s = _loadNotesMock();
              const d = (s.documents || []).find((x) => x.doc_id === selectedDoc.doc_id);
              if (d) { d.status = "finalized"; _saveNotesMock(s); }
              setSelectedDoc({ ...selectedDoc, status: "finalized" });
              setDocs((cur) => cur.map((x) => x.doc_id === selectedDoc.doc_id ? { ...x, status: "finalized" } : x));
              toast("演示模式：已在本地定稿", "warn");
            } else if (e.status === 404) {
              toast("后端不可用，定稿未生效", "err");
            } else { toast(`定稿失败：${e.message}`, "err"); }
          }
        };

        const exportMd = async () => {
          if (!selectedDoc) return;
          try {
            const resp = await api("GET", `/orgs/${orgId}/notes/documents/${selectedDoc.doc_id}/export?format=md`, null, { raw: true });
            if (!resp.ok) throw Object.assign(new Error("export failed"), { status: resp.status });
            const blob = await resp.blob();
            _triggerDownload(blob, `${selectedDoc.doc_id}.md`);
          } catch (e) {
            if (!DEMO_MOCK) { toast("后端不可用，导出失败", "err"); return; }
            const md = `# ${selectedDoc.doc_id}\n\n_period: ${selectedDoc.period_id}_\n\n` +
              (notes || []).map((n) => `## ${n.section_title}\n\n${n.content || ""}\n`).join("\n");
            _triggerDownload(new Blob([md], { type: "text/markdown" }), `${selectedDoc.doc_id}.md`);
            toast("演示模式：已在本地导出", "warn");
          }
        };

        const isFinalized = selectedDoc && selectedDoc.status === "finalized";

        return (
          <>
            <BackendUnavailableBanner show={backendOk === false} onRetry={() => orgId && reloadDocs(orgId)} />
            <div className="flex items-center justify-between mb-3">
              <div>
                <h2 className="page-title">报表附注</h2>
                <p className="page-subtitle">
                  根据余额表 / 报表生成附注草稿，AI 协助起草文字段落
                </p>
              </div>
            </div>

            <div className="oa-card mb-3">
              <div className="toolbar">
                <div>
                  <label className="oa-label">账套</label>
                  <select className="oa-select" style={{ width: 240 }} value={orgId} onChange={(e) => setOrgId(e.target.value)} data-testid="notes-org">
                    <option value="">— 请选择 —</option>
                    {orgs.map((o) => <option key={o.id} value={o.id}>{o.name || o.id}</option>)}
                  </select>
                </div>
                <div>
                  <label className="oa-label">期间</label>
                  <input className="oa-input" style={{ width: 120 }} value={periodId} onChange={(e) => setPeriodId(e.target.value)} data-testid="notes-period" />
                </div>
                <button className="oa-btn oa-btn-primary" onClick={generate} disabled={!orgId || generating} data-testid="notes-generate">
                  {generating ? <Spinner /> : "生成附注"}
                </button>
                <button className="oa-btn" onClick={() => orgId && reloadDocs(orgId)} disabled={!orgId}>刷新</button>
              </div>
            </div>

            <div className="oa-card" style={{ padding: 0, marginBottom: 12 }}>
              {(!orgId || docs.length === 0) ? <EmptyState title={orgId ? "暂无附注文档" : "请先选择账套"} />
                : (
                  <table className="report-table">
                    <thead><tr><th>文档</th><th>期间</th><th>状态</th><th className="num">附注数</th><th>创建时间</th></tr></thead>
                    <tbody>
                      {docs.map((d) => (
                        <tr key={d.doc_id} className="cell-clickable" onClick={() => openDoc(d)}>
                          <td className="mono text-xs">{d.doc_id}</td>
                          <td>{d.period_id}</td>
                          <td>{d.status === "finalized" ? <span className="badge ok">已定稿</span> : <span className="badge">草稿</span>}</td>
                          <td className="num">{d.notes_count ?? (d.notes || []).length}</td>
                          <td className="text-xs text-muted">{fmtTs(d.created_at)}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                )}
            </div>

            {selectedDoc && (
              <div className="oa-card">
                <div className="flex items-center justify-between mb-3">
                  <div>
                    <h3 className="card-title">附注详情 · <span className="mono text-xs">{selectedDoc.doc_id}</span></h3>
                    <p className="card-sub">期间 {selectedDoc.period_id} · {(notes || []).length} 个段落</p>
                  </div>
                  <div className="flex gap-2">
                    <button className="oa-btn" onClick={exportMd} data-testid="notes-export">导出 Markdown</button>
                    <button className="oa-btn oa-btn-primary" onClick={finalize} disabled={isFinalized} data-testid="notes-finalize">
                      {isFinalized ? "已定稿" : "定稿"}
                    </button>
                  </div>
                </div>
                <div className="grid" style={{ gap: 8 }}>
                  {(notes || []).map((n) => <NoteCard key={n.note_id} note={n} disabled={isFinalized} onSave={(c) => saveNote(n, c)} />)}
                </div>
              </div>
            )}
          </>
        );
      }

      function NoteCard({ note, disabled, onSave }) {
        const [open, setOpen] = useState(true);
        const [content, setContent] = useState(note.content || "");
        useEffect(() => { setContent(note.content || ""); }, [note.note_id, note.version]);
        const meta = NOTE_KIND_META[note.kind] || { label: note.kind, cls: "" };
        return (
          <div className="oa-card" style={{ padding: 10, background: "var(--bg-soft, rgba(0,0,0,0.02))" }}>
            <div className="flex items-center justify-between" style={{ cursor: "pointer" }} onClick={() => setOpen(!open)}>
              <div className="flex items-center gap-2">
                <strong>{note.section_title}</strong>
                <span className={`badge ${meta.cls}`}>{meta.label}</span>
                <span className="text-xs text-muted">v{note.version}</span>
              </div>
              <span className="text-xs text-muted">{open ? "▾" : "▸"}</span>
            </div>
            {open && (
              <div className="mt-3">
                <textarea className="oa-textarea" rows={4} value={content} disabled={disabled}
                  onChange={(e) => setContent(e.target.value)} data-testid={`note-content-${note.note_id}`} />
                <div className="flex justify-end mt-3">
                  <button className="oa-btn oa-btn-primary" disabled={disabled || content === note.content}
                    onClick={() => onSave(content)} data-testid={`note-save-${note.note_id}`}>保存</button>
                </div>
              </div>
            )}
          </div>
        );
      }

      function _triggerDownload(blob, filename) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url; a.download = filename;
        document.body.appendChild(a); a.click();
        setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 100);
      }

      // ═══════════════════════════════════════════════════════════════════
      //  M3 · 同业对比（Peer Comparison）—— Sibling A 后端：
      //    POST /orgs/{oid}/peer-comparison/run
      //    GET  /orgs/{oid}/peer-comparison/results
      //    GET  /peer-benchmarks
      //  AI 增强分析使用 Sibling B 的 S7 自然语言查询（/ai/raw/nl-query）。
      //  后端不可达时展示横幅 + 阻断态；仅 ?ai_mock=1 演示模式才用本地数据：finance.peer.mock.v1
      // ═══════════════════════════════════════════════════════════════════
      const PEER_LS_KEY = "finance.peer.mock.v1";
      const INDUSTRY_PEER_OPTS = [
        { v: "manufacturing", l: "制造业" },
        { v: "restaurant",    l: "餐饮服务" },
        { v: "tech_service",  l: "科技服务业" },
      ];
      const QUARTILE_META = {
        well_below:    { label: "远低于同业", cls: "err"  },
        below:         { label: "低于同业",   cls: "warn" },
        median_band:   { label: "处于中位",   cls: ""     },
        above:         { label: "高于同业",   cls: "info" },
        well_above:    { label: "远高于同业", cls: "ok"   },
      };
      const PEER_METRICS = [
        { key: "gross_margin",     label: "毛利率",     suffix: "%", scale: 100 },
        { key: "current_ratio",    label: "流动比率",   suffix: "",  scale: 1   },
        { key: "asset_turnover",   label: "资产周转率", suffix: "",  scale: 1   },
        { key: "debt_ratio",       label: "资产负债率", suffix: "%", scale: 100 },
      ];

      function _loadPeerMock() {
        if (!DEMO_MOCK) return { results: [] };
        try {
          const s = JSON.parse(localStorage.getItem(PEER_LS_KEY) || "null");
          if (s && s.results) return s;
        } catch {}
        const seed = { results: [] };
        localStorage.setItem(PEER_LS_KEY, JSON.stringify(seed));
        return seed;
      }
      function _savePeerMock(s) { if (!DEMO_MOCK) return; localStorage.setItem(PEER_LS_KEY, JSON.stringify(s)); }

      function _quartileOf(value, p25, p50, p75) {
        if (value < p25 * 0.7) return "well_below";
        if (value < p25) return "below";
        if (value <= p75) return "median_band";
        if (value < p75 * 1.3) return "above";
        return "well_above";
      }

      function _buildMockPeerResult(orgId, periodId, industryCode) {
        const benchmarks = {
          manufacturing: { gross_margin: { p25: 0.18, p50: 0.25, p75: 0.32 }, current_ratio: { p25: 1.1, p50: 1.6, p75: 2.2 }, asset_turnover: { p25: 0.6, p50: 0.9, p75: 1.3 }, debt_ratio: { p25: 0.35, p50: 0.50, p75: 0.65 } },
          restaurant:    { gross_margin: { p25: 0.45, p50: 0.55, p75: 0.65 }, current_ratio: { p25: 0.8, p50: 1.2, p75: 1.7 }, asset_turnover: { p25: 1.5, p50: 2.2, p75: 3.0 }, debt_ratio: { p25: 0.40, p50: 0.55, p75: 0.70 } },
          tech_service:  { gross_margin: { p25: 0.55, p50: 0.68, p75: 0.78 }, current_ratio: { p25: 1.5, p50: 2.5, p75: 3.5 }, asset_turnover: { p25: 0.4, p50: 0.7, p75: 1.0 }, debt_ratio: { p25: 0.20, p50: 0.35, p75: 0.50 } },
        }[industryCode] || {};
        const orgVals = {
          gross_margin: 0.22 + Math.random() * 0.4,
          current_ratio: 0.9 + Math.random() * 2.0,
          asset_turnover: 0.5 + Math.random() * 1.5,
          debt_ratio: 0.25 + Math.random() * 0.4,
        };
        const metrics = {};
        for (const m of PEER_METRICS) {
          const b = benchmarks[m.key] || { p25: 0.1, p50: 0.5, p75: 0.9 };
          const v = orgVals[m.key];
          metrics[m.key] = { value: v, p25: b.p25, p50: b.p50, p75: b.p75, quartile: _quartileOf(v, b.p25, b.p50, b.p75) };
        }
        return {
          result_id: `peer_mock_${Math.random().toString(36).slice(2, 8)}`,
          org_id: orgId, period_id: periodId, industry_code: industryCode,
          metrics, created_at: new Date().toISOString(),
        };
      }

      function PeerComparisonView({ toast }) {
        const { data: orgsData } = useFetch("/orgs?limit=200", []);
        const orgs = (orgsData && orgsData.organizations) || [];
        // 同业基准数据库由 Sibling A 提供：GET /peer-benchmarks?industry_code=...
        // 后端就绪后可改为基于该接口动态填充行业下拉与默认基准。
        const { data: benchmarksData } = useFetch("/peer-benchmarks", []);
        const benchmarks = (benchmarksData && benchmarksData.benchmarks) || [];
        const [orgId, setOrgId] = useState("");
        const [periodId, setPeriodId] = useState("2025-FY");
        const [industryCode, setIndustryCode] = useState("manufacturing");
        const [running, setRunning] = useState(false);
        const [current, setCurrent] = useState(null);
        const [history, setHistory] = useState([]);
        const [backendOk, setBackendOk] = useState(null);
        const [aiResult, setAiResult] = useState(null);
        const [aiBusy, setAiBusy] = useState(false);

        const reloadHistory = useCallback(async (oid) => {
          if (!oid) return;
          try {
            const r = await api("GET", `/orgs/${oid}/peer-comparison/results`, null, { timeoutMs: 4000 });
            setHistory((r && r.results) || []);
            setBackendOk(true);
          } catch (e) {
            const s = _loadPeerMock();
            setHistory((s.results || []).filter((x) => x.org_id === oid));
            setBackendOk(false);
          }
        }, []);

        useEffect(() => { if (orgId) reloadHistory(orgId); }, [orgId, reloadHistory]);

        const run = async () => {
          if (!orgId) { toast("请选择账套", "warn"); return; }
          setRunning(true); setAiResult(null);
          const body = { period_id: periodId, industry_code: industryCode };
          try {
            const r = await api("POST", `/orgs/${orgId}/peer-comparison/run`, body);
            setCurrent(r);
            toast("同业对比完成");
            reloadHistory(orgId);
          } catch (e) {
            if (e.status === 404 && DEMO_MOCK) {
              const mock = _buildMockPeerResult(orgId, periodId, industryCode);
              const s = _loadPeerMock();
              s.results = [mock, ...(s.results || [])].slice(0, 50);
              _savePeerMock(s);
              setCurrent(mock);
              setHistory(s.results.filter((x) => x.org_id === orgId));
              toast("演示模式：已用本地数据计算", "warn");
            } else if (e.status === 404) {
              setBackendOk(false);
              toast("后端不可用，无法运行同业对比", "err");
            } else { toast(`计算失败：${e.message}`, "err"); }
          } finally { setRunning(false); }
        };

        const aiAnalyze = async () => {
          if (!current) return;
          setAiBusy(true);
          const question = "解读本次同业对比结果";
          const metrics_json = JSON.stringify(current.metrics);
          try {
            const r = await api("POST", `/ai/raw/nl-query`, { question, context_json: metrics_json, execute_sql: false });
            setAiResult({ ok: true, sql: r.sql || "", summary: r.summary || r.text || "" });
          } catch (e) {
            if (e.status === 404 && DEMO_MOCK) {
              setAiResult({ ok: false, sql: "-- 演示模式占位 SQL\nSELECT industry_code, AVG(gross_margin) FROM peer_benchmarks GROUP BY industry_code;", summary: "（演示）后端就绪后将使用真实 AI 摘要。" });
              toast("演示模式：AI 增强使用占位结果", "warn");
            } else if (e.status === 404) {
              toast("后端 AI 能力不可用", "err");
            } else { toast(`AI 分析失败：${e.message}`, "err"); }
          } finally { setAiBusy(false); }
        };

        return (
          <>
            <BackendUnavailableBanner show={backendOk === false} onRetry={() => orgId && reloadHistory(orgId)} />
            <div className="flex items-center justify-between mb-3">
              <div>
                <h2 className="page-title">同业对比</h2>
                <p className="page-subtitle">
                  把本企业的关键财务指标，和同行业平均水平（25%、中位、75% 分位）放在一起对照，看出高低与异常。
                </p>
              </div>
            </div>

            <div className="oa-card mb-3">
              <div className="toolbar">
                <div>
                  <label className="oa-label">账套</label>
                  <select className="oa-select" style={{ width: 240 }} value={orgId} onChange={(e) => setOrgId(e.target.value)} data-testid="peer-org">
                    <option value="">— 请选择 —</option>
                    {orgs.map((o) => <option key={o.id} value={o.id}>{o.name || o.id}</option>)}
                  </select>
                </div>
                <div>
                  <label className="oa-label">期间</label>
                  <input className="oa-input" style={{ width: 120 }} value={periodId} onChange={(e) => setPeriodId(e.target.value)} />
                </div>
                <div>
                  <label className="oa-label">行业</label>
                  <select className="oa-select" style={{ width: 160 }} value={industryCode} onChange={(e) => setIndustryCode(e.target.value)} data-testid="peer-industry">
                    {INDUSTRY_PEER_OPTS.map((x) => <option key={x.v} value={x.v}>{x.l}</option>)}
                  </select>
                </div>
                <button className="oa-btn oa-btn-primary" onClick={run} disabled={!orgId || running} data-testid="peer-run">
                  {running ? <Spinner /> : "运行对比"}
                </button>
              </div>
            </div>

            {current && (
              <div className="oa-card mb-3">
                <div className="section-head">
                  <div>
                    <h3 className="section-head__title">本次结果 · <span className="mono text-xs">{current.result_id}</span></h3>
                    <p className="section-head__desc">行业 {current.industry_code} · {fmtTs(current.created_at)} · 红线为本企业，蓝条为行业 25–75 分位</p>
                  </div>
                  <button className="oa-btn" onClick={aiAnalyze} disabled={aiBusy} data-testid="peer-ai">
                    {aiBusy ? <Spinner /> : "AI 增强分析"}
                  </button>
                </div>
                <div className="metric-grid">
                  {PEER_METRICS.map((m) => {
                    const d = (current.metrics || {})[m.key];
                    if (!d) return null;
                    return <PeerMetricCard key={m.key} meta={m} data={d} />;
                  })}
                </div>
                {aiResult && (
                  <div className="oa-card mt-3">
                    <h4 className="card-title">AI 增强分析 · S7 自然语言查询</h4>
                    <pre className="mono text-xs mt-2">{aiResult.sql || "(无 SQL)"}</pre>
                    <div className="mt-3"><strong>AI 摘要：</strong>{aiResult.summary || "（暂无）"}</div>
                  </div>
                )}
              </div>
            )}

            <div className="oa-card" style={{ padding: 0 }}>
              <div style={{ padding: 10, borderBottom: "1px solid var(--border, rgba(0,0,0,0.08))" }}>
                <strong>历史结果</strong> <span className="text-xs text-muted">{history.length} 条</span>
              </div>
              {history.length === 0 ? <EmptyState title="暂无历史" /> : (
                <table className="report-table">
                  <thead><tr><th>结果 ID</th><th>期间</th><th>行业</th><th>创建时间</th><th></th></tr></thead>
                  <tbody>
                    {history.map((h) => (
                      <tr key={h.result_id} className="cell-clickable" onClick={() => setCurrent(h)}>
                        <td className="mono text-xs">{h.result_id}</td>
                        <td>{h.period_id}</td>
                        <td>{(INDUSTRY_PEER_OPTS.find((x) => x.v === h.industry_code) || {}).l || h.industry_code}</td>
                        <td className="text-xs text-muted">{fmtTs(h.created_at)}</td>
                        <td><button className="btn subtle sm">查看 →</button></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              )}
            </div>
          </>
        );
      }

      function PeerMetricCard({ meta, data }) {
        const q = QUARTILE_META[data.quartile] || { label: data.quartile, cls: "" };
        const valFmt = (v) => `${(v * meta.scale).toFixed(2)}${meta.suffix}`;
        const minP = Math.min(data.p25, data.value) * 0.9;
        const maxP = Math.max(data.p75, data.value) * 1.1;
        const range = maxP - minP || 1;
        const xOf = (v) => Math.max(0, Math.min(200, ((v - minP) / range) * 200));
        return (
          <div className="metric-card">
            <div className="metric-card__head">
              <strong>{meta.label}</strong>
              <span className={`badge ${q.cls}`}>{q.label}</span>
            </div>
            <div className="metric-card__value">{valFmt(data.value)}</div>
            <svg width="200" height="40" style={{ marginTop: 6 }} aria-label={`peer-chart-${meta.key}`}>
              <line x1="0" y1="20" x2="200" y2="20" stroke="rgba(0,0,0,0.1)" strokeWidth="1" />
              <rect x={xOf(data.p25)} y="14" width={Math.max(2, xOf(data.p75) - xOf(data.p25))} height="12" fill="rgba(59,130,246,0.25)" />
              <line x1={xOf(data.p50)} y1="10" x2={xOf(data.p50)} y2="30" stroke="rgba(59,130,246,0.9)" strokeWidth="2" />
              <line x1={xOf(data.value)} y1="4" x2={xOf(data.value)} y2="36" stroke="rgba(220,38,38,0.95)" strokeWidth="2" />
              <circle cx={xOf(data.value)} cy="20" r="3" fill="rgba(220,38,38,0.95)" />
            </svg>
            <div className="metric-card__foot">
              p25 {valFmt(data.p25)} · p50 {valFmt(data.p50)} · p75 {valFmt(data.p75)}
            </div>
          </div>
        );
      }

      // ═══════════════════════════════════════════════════════════════════
      //  M3 · 密钥管理（Key Management，admin）—— Sibling C 后端：
      //    GET  /admin/key-versions
      //    POST /admin/key-rotate           body { org_id }
      //    GET  /admin/backups
      //    POST /admin/backups              body { org_id, passphrase }
      //    POST /admin/backups/{id}/restore body { passphrase }
      //    GET  /admin/backups/{id}/download
      //    GET  /admin/system-info
      //  后端不可达时展示横幅 + 阻断态；仅 ?ai_mock=1 演示模式才用本地数据：finance.km.mock.v1
      // ═══════════════════════════════════════════════════════════════════
      const KM_LS_KEY = "finance.km.mock.v1";

      function _loadKmMock() {
        if (!DEMO_MOCK) return { versions: [], backups: [], system_info: null };
        try {
          const s = JSON.parse(localStorage.getItem(KM_LS_KEY) || "null");
          if (s && s.versions) return s;
        } catch {}
        const seed = {
          versions: [
            { org_id: "(mock-org-001)", version: 1, kdf_salt_short: "a8f3e1c2", last_rotated_at: new Date(Date.now() - 86400000 * 30).toISOString(), status: "active" },
            { org_id: "(mock-org-002)", version: 3, kdf_salt_short: "d51b9e07", last_rotated_at: new Date(Date.now() - 86400000 * 7).toISOString(),  status: "active" },
          ],
          backups: [
            { id: "bkp_001", org_id: "(mock-org-001)", size_bytes: 1048576, encrypted: true, created_at: new Date(Date.now() - 86400000 * 2).toISOString() },
          ],
          system_info: {
            tauri_version: "2.0.0",
            os: "Windows 10",
            openakita_version: "0.3.0-dev",
            key_store_backend: "OS keychain (mock)",
          },
        };
        localStorage.setItem(KM_LS_KEY, JSON.stringify(seed));
        return seed;
      }
      function _saveKmMock(s) { if (!DEMO_MOCK) return; localStorage.setItem(KM_LS_KEY, JSON.stringify(s)); }

      function KeyManagementView({ toast }) {
        const [versions, setVersions] = useState([]);
        const [backups, setBackups] = useState([]);
        const [sysInfo, setSysInfo] = useState(null);
        const [backendOk, setBackendOk] = useState(null);
        const [confirmRotate, setConfirmRotate] = useState(null);
        const [confirmRestore, setConfirmRestore] = useState(null);
        const [restorePass, setRestorePass] = useState("");
        const [createOrgId, setCreateOrgId] = useState("");
        const [createPass, setCreatePass] = useState("");
        const [busy, setBusy] = useState(false);
        const tauriOk = useTauriSupported();

        const reload = useCallback(async () => {
          try {
            const v = await api("GET", "/admin/key-versions", null, { timeoutMs: 4000 });
            setVersions((v && v.versions) || []);
            setBackendOk(true);
          } catch (e) {
            const s = _loadKmMock();
            setVersions(s.versions || []); setBackendOk(false);
          }
          try {
            const b = await api("GET", "/admin/backups");
            setBackups((b && b.backups) || []);
          } catch (e) {
            const s = _loadKmMock();
            setBackups(s.backups || []);
          }
          try {
            const i = await api("GET", "/admin/system-info");
            // M3 Infra fix: merge native finance_system_info() under
            // a single object so the desktop card shows Tauri-only
            // fields (tauri_version, key_store_backend) alongside the
            // Python-side payload. Web preview keeps the original
            // dict so existing tests still pass.
            const nativeInfo = await tauriInvoke("finance_system_info");
            if (nativeInfo && nativeInfo.kind === "ok") {
              setSysInfo({ ...(i || {}), ...(nativeInfo.value || {}) });
            } else {
              setSysInfo(i || null);
            }
          } catch (e) {
            const s = _loadKmMock();
            setSysInfo(s.system_info || null);
          }
        }, []);
        useEffect(() => { reload(); }, [reload]);

        const _notifyNative = (title, body) => {
          if (!tauriOk) return;
          // Fire-and-forget — the OS toast is purely additive on top
          // of the in-app toast so we don't await the result here.
          tauriInvoke("finance_show_notification", { title, body }).catch(() => {});
        };

        const doRotate = async () => {
          if (!confirmRotate) return;
          setBusy(true);
          try {
            await api("POST", "/admin/key-rotate", { org_id: confirmRotate.org_id });
            toast(`已轮换 ${confirmRotate.org_id} 的密钥`);
            _notifyNative("OpenAkita · 密钥已轮换", `账套 ${confirmRotate.org_id} 的 KDF 已升级到下一版`);
          } catch (e) {
            if (e.status === 404 && DEMO_MOCK) {
              const s = _loadKmMock();
              s.versions = (s.versions || []).map((v) => v.org_id === confirmRotate.org_id ? { ...v, version: v.version + 1, kdf_salt_short: Math.random().toString(36).slice(2, 10), last_rotated_at: new Date().toISOString() } : v);
              _saveKmMock(s);
              toast("演示模式：已在本地记录轮换", "warn");
            } else if (e.status === 404) {
              toast("后端不可用，密钥轮换未生效", "err"); setBusy(false); return;
            } else { toast(`轮换失败：${e.message}`, "err"); setBusy(false); return; }
          }
          setConfirmRotate(null); setBusy(false); reload();
        };

        const doRestore = async () => {
          if (!confirmRestore) return;
          if (!restorePass) { toast("请输入口令", "warn"); return; }
          setBusy(true);
          try {
            await api("POST", `/admin/backups/${confirmRestore.id}/restore`, { passphrase: restorePass });
            toast("已恢复");
            _notifyNative("OpenAkita · 备份已恢复", `备份 ${confirmRestore.id} 已应用到当前账套`);
          } catch (e) {
            if (e.status === 404) { toast("后端不可用，恢复操作未生效", "err"); setBusy(false); return; }
            else { toast(`恢复失败：${e.message}`, "err"); setBusy(false); return; }
          }
          setConfirmRestore(null); setRestorePass(""); setBusy(false);
        };

        const doCreate = async () => {
          if (!createOrgId.trim() || !createPass.trim()) { toast("请填写账套与口令", "warn"); return; }
          setBusy(true);
          try {
            await api("POST", "/admin/backups", { org_id: createOrgId.trim(), passphrase: createPass });
            toast("备份已创建");
            _notifyNative("OpenAkita · 备份已创建", `账套 ${createOrgId.trim()} 的加密备份已落地`);
            setCreateOrgId(""); setCreatePass("");
          } catch (e) {
            if (e.status === 404 && DEMO_MOCK) {
              const s = _loadKmMock();
              s.backups = [{ id: `bkp_${Math.random().toString(36).slice(2, 8)}`, org_id: createOrgId.trim(), size_bytes: 1048576, encrypted: true, created_at: new Date().toISOString() }, ...(s.backups || [])];
              _saveKmMock(s); setCreateOrgId(""); setCreatePass("");
              toast("演示模式：已在本地记录备份", "warn");
            } else if (e.status === 404) {
              toast("后端不可用，备份未创建", "err");
            } else { toast(`备份失败：${e.message}`, "err"); }
          }
          setBusy(false); reload();
        };

        // Tauri-native export: pick a path with the OS save dialog
        // (`finance_pick_save_path`) then either copy the downloaded
        // blob to that path (when the bridge can write files) or
        // surface it as guidance. On web the existing <a download>
        // path is used unchanged so behaviour is identical to before
        // for browser preview users.
        const doExportNative = async (b) => {
          if (!tauriOk) {
            toast("Tauri 环境下可用", "warn");
            return;
          }
          const picked = await tauriInvoke("finance_pick_save_path", {
            default_name: `${b.id}.bak.gz`,
          });
          if (!picked || picked.kind !== "ok" || !picked.value) return;
          try {
            const resp = await api("GET", `/admin/backups/${b.id}/download`, null, { raw: true });
            if (!resp.ok) throw Object.assign(new Error("download failed"), { status: resp.status });
            const blob = await resp.blob();
            _triggerDownload(blob, `${b.id}.bak`);
            toast(`已导出到 ${picked.value}`);
            _notifyNative("OpenAkita · 备份导出完成", picked.value);
          } catch (e) {
            toast(`导出失败：${e.message}`, "err");
          }
        };

        const doDownload = async (b) => {
          try {
            const resp = await api("GET", `/admin/backups/${b.id}/download`, null, { raw: true });
            if (!resp.ok) throw Object.assign(new Error("download failed"), { status: resp.status });
            const blob = await resp.blob();
            _triggerDownload(blob, `${b.id}.bak`);
          } catch (e) {
            if (!DEMO_MOCK) { toast("后端不可用，下载失败", "err"); return; }

      function AuditOpinionCard({ toast }) {

        const [busy, setBusy] = useState(false);
        const [result, setResult] = useState("");
        const [missing, setMissing] = useState(false);

        const submit = async () => {
          let v;

          catch { toast("validations_json 不是有效 JSON", "warn"); return; }
          setBusy(true); setResult(""); setMissing(false);
          try {
            const r = await api("POST", "/ai/raw/audit-opinion", {
              org_id: orgId || null,
              period_label: periodLabel,
              validations: v,
              template_text: templateText,
            });
            setResult((r && (r.markdown || r.text)) || JSON.stringify(r, null, 2));
            toast("已生成审计意见草稿");
          } catch (e) {
            if (e.status === 404) { setMissing(true); toast("后端 AI 能力暂不可用", "warn"); }
            else { toast(`生成失败：${e.message}`, "err"); }
          } finally { setBusy(false); }
        };

        return (
          <div className="split-layout">
            <div className="split-left">
              <div className="oa-card">
                <div className="section-head">
                  <div>
                    <h3 className="section-head__title">审计意见草稿</h3>

                    <input className="oa-input" placeholder="如：2025 年度" value={periodLabel} onChange={(e) => setPeriodLabel(e.target.value)} data-testid="adv-s6-period" />
                  </div>
                </div>
                <div className="mt-3">
                  <label className="oa-label">校验结果 JSON</label>
                  <textarea className="oa-textarea" rows={3} value={validationsJson} onChange={(e) => setValidationsJson(e.target.value)} data-testid="adv-s6-validations" />

                </div>
                <BackendUnavailableBanner show={missing} detail="AI 审计意见接口未响应" />

            <div className="split-right">
              <div className="preview-pane">

                    <pre className="mono text-xs mt-2" style={{ whiteSpace: "pre-wrap" }}>{result}</pre>
                  </>

                  <div className="preview-empty">
                    <span className="preview-empty__icon">

      function NlQueryCard({ toast }) {
        const [question, setQuestion] = useState("");
        const [executeSql, setExecuteSql] = useState(true);
        const [busy, setBusy] = useState(false);
        const [result, setResult] = useState(null);
        const [missing, setMissing] = useState(false);

        const submit = async () => {
          if (!question.trim()) { toast("请输入问题", "warn"); return; }
          setBusy(true); setResult(null); setMissing(false);
          try {
            const r = await api("POST", "/ai/raw/nl-query", { question: question.trim(), execute_sql: executeSql });
            setResult(r || {});
          } catch (e) {
            if (e.status === 404) { setMissing(true); toast("后端 AI 能力暂不可用", "warn"); }
            else { toast(`查询失败：${e.message}`, "err"); }
          } finally { setBusy(false); }
        };

        const validation_errors = (result && result.validation_errors) || [];
        const rows = ((result && result.rows) || []).slice(0, 50);
        const cols = rows.length ? Object.keys(rows[0]) : [];

        return (
          <div className="split-layout">
            <div className="split-left">
              <div className="oa-card">
                <div className="section-head">
                  <div>
                    <h3 className="section-head__title">用中文问数</h3>
                    <p className="section-head__desc">用中文提问，AI 自动转成安全的数据库查询，平台校验通过后再执行。</p>
                  </div>
                  <span className="badge err">raw</span>
                </div>
                <div>
                  <label className="oa-label">查询问题</label>
                  <textarea className="oa-textarea" rows={3} placeholder="例如：上季度毛利率最高的 5 个账套是哪些？" value={question} onChange={(e) => setQuestion(e.target.value)} data-testid="adv-s7-q" />
                </div>
                <div className="flex items-center mt-3" style={{ gap: 12 }}>
                  <label style={{ display: "inline-flex", alignItems: "center", gap: 6, margin: 0 }}>
                    <input type="checkbox" checked={executeSql} onChange={(e) => setExecuteSql(e.target.checked)} data-testid="adv-s7-exec" />

                  </label>
                  <span style={{ flex: 1 }} />
                  <button className="oa-btn oa-btn-primary" onClick={submit} disabled={busy} data-testid="adv-s7-go">{busy ? <Spinner /> : "翻译并查询"}</button>
                </div>
                <BackendUnavailableBanner show={missing} detail="AI 自然语言查询接口未响应" />
              </div>
            </div>
            <div className="split-right">
              <div className="preview-pane">
                {result ? (
                  <>
                    <h3 className="card-title">翻译后的 SQL</h3>
                    <pre className="mono text-xs mt-2">{result.sql || "(无 SQL)"}</pre>
                    {validation_errors.length > 0 && (
                      <div className="callout callout--danger mt-3">
                        <div className="callout__body">
                          <strong>SQL 校验未通过</strong>
                          <ul style={{ margin: "4px 0 0", paddingLeft: 18 }}>
                            {validation_errors.map((err, i) => <li key={i} className="mono text-xs">{typeof err === "string" ? err : JSON.stringify(err)}</li>)}
                          </ul>
                        </div>
                      </div>
                    )}
                    {rows.length > 0 && (
                      <div className="oa-card mt-3" style={{ padding: 0 }}>
                        <div className="text-xs text-muted" style={{ padding: 8 }}>结果（最多展示 50 行 · 共 {result.row_count ?? rows.length} 行）</div>
                        <table className="report-table">
                          <thead><tr>{cols.map((c) => <th key={c} className="text-xs">{c}</th>)}</tr></thead>
                          <tbody>
                            {rows.map((r, i) => <tr key={i}>{cols.map((c) => <td key={c} className="mono text-xs">{String(r[c] ?? "")}</td>)}</tr>)}
                          </tbody>
                        </table>
                      </div>
                    )}
                  </>
                ) : (
                  <div className="preview-empty">
                    <span className="preview-empty__icon">
                      <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    </span>
                    <div className="preview-empty__title">尚无查询结果</div>
                    <div className="preview-empty__hint">在左侧输入中文问题并查询，翻译后的 SQL 与结果表将显示在此处。</div>
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      }

          <>
            <h2 className="page-title">设置</h2>
            <p className="page-subtitle">密钥与加密备份、AI 模型 / 脱敏 / 授权策略、以及科目映射与待确认科目编码集中在这里。</p>
            <div className="tabs">
              <button className={`tab ${tab === "keys" ? "active" : ""}`} onClick={() => setTab("keys")} data-testid="settings-tab-keys">密钥管理</button>
              <button className={`tab ${tab === "ai" ? "active" : ""}`} onClick={() => setTab("ai")} data-testid="settings-tab-ai">AI 设置</button>
              <button className={`tab ${tab === "subjects" ? "active" : ""}`} onClick={() => setTab("subjects")} data-testid="settings-tab-subjects">科目映射</button>
            </div>
            {tab === "keys" && <KeyManagementView toast={toast} />}
            {tab === "ai" && <AISettingsView toast={toast} />}
            {tab === "subjects" && <SubjectMappingCard toast={toast} />}
          </>
        );
      }

      // M1 W1 三个企业准则科目编码（使用权资产 / 合同负债 / 租赁负债）业务方
      // 尚未敲定，模板里以 code="TBD" 占位、渲染为 0。这里不硬编码任何猜测值，
      // 而是给出可配置输入 + 友好说明：让用户按自己代账软件的实际科目号填写。
      // 填写结果存在浏览器本地（localStorage），作为追溯指引；真正落到报表数值
      // 仍走「调整与追溯」步骤里的手工输入（manual-inputs），二者互不冲突。
      const _M1W1_SUBJECTS = [
        { key: "right_of_use_asset", label: "使用权资产", hint: "资产类 · 新租赁准则下承租人确认的使用权资产，常见挂在「固定资产」或单列。" },
        { key: "contract_liability", label: "合同负债", hint: "负债类 · 新收入准则下的预收性质科目，旧准则常记在「预收账款」。" },
        { key: "lease_liability",    label: "租赁负债", hint: "负债类 · 新租赁准则下承租人确认的租赁负债，区分一年内到期部分。" },
      ];
      function SubjectMappingCard({ toast }) {
        const LS_KEY = "finance.subjectMap.m1w1";
        const [map, setMap] = useState(() => {
          try { return JSON.parse(localStorage.getItem(LS_KEY) || "{}"); } catch { return {}; }
        });
        const [dirty, setDirty] = useState(false);
        const set = (k, v) => { setMap((m) => ({ ...m, [k]: v })); setDirty(true); };
        const save = () => {
          try {
            localStorage.setItem(LS_KEY, JSON.stringify(map));
            setDirty(false);
            toast("科目映射已保存到本地");
          } catch { toast("本地存储不可用，未能保存", "err"); }
        };
        return (
          <>
            <div className="oa-config-banner oa-config-banner--info" style={{ marginBottom: 14 }}>
              <span className="oa-config-banner__icon"><NavIcon name="settings" /></span>
              <div className="oa-config-banner__text">
                <strong>这三个科目的编码由业务方决定，系统不替你猜。</strong>
                请按你所用代账软件（金蝶 / 用友 / 管家婆等）里的实际科目号填写。未填写时，
                相关报表行会标为 <span className="oa-pill pending">TBD</span> 并按 0 处理；填写后这里作为
                追溯指引，报表数值仍可在「调整与追溯」步骤手工录入。
              </div>
            </div>
            <div className="oa-card">
              <h3>M1 · 新准则待确认科目</h3>
              <p>使用权资产 / 合同负债 / 租赁负债 —— 填你自己账套里的对应科目编码。</p>
              {_M1W1_SUBJECTS.map((s) => (
                <div className="oa-row" key={s.key} style={{ alignItems: "flex-start" }}>
                  <div style={{ flex: "0 0 150px" }}>
                    <label className="oa-label" style={{ marginBottom: 2 }}>{s.label}</label>
                    <div style={{ fontSize: 11, color: "var(--oa-text-muted)", lineHeight: 1.4 }}>{s.hint}</div>
                  </div>
                  <input
                    className="oa-input"
                    style={{ flex: 1, minWidth: 160 }}
                    placeholder="例如 1521 / 2203 / 2701（按你的代账软件填）"
                    value={map[s.key] || ""}
                    onChange={(e) => set(s.key, e.target.value)}
                    data-testid={`subjmap-${s.key}`}
                  />
                </div>
              ))}
              <div className="oa-row" style={{ justifyContent: "flex-end", marginTop: 6 }}>
                <button className="oa-btn oa-btn-primary" onClick={save} disabled={!dirty} data-testid="subjmap-save">保存映射</button>
              </div>
            </div>
          </>
        );
      }

      // ═══════════════════════════════════════════════════════════════════
      //  次区 · 复核中心 —— 把原本藏在「报表查看页」里的多审计师复核工作流
      //  提升成一个顶级入口：选账套 → 看其报表 → 进报表做复核 / 批注。
      // ═══════════════════════════════════════════════════════════════════
      function ReviewCenterView({ onOpenReport, toast }) {
        const orgs = useFetch("/orgs", []);
        const list = (orgs.data && orgs.data.organizations) || [];
        const [orgId, setOrgId] = useState(null);
        useEffect(() => {
          if (!orgId && list.length > 0) setOrgId(list[0].id);
        }, [list, orgId]);
        return (
          <>
            <h2 className="page-title">复核中心</h2>
            <p className="page-subtitle">多审计师协作复核：选择账套查看其报表，进入报表即可发起 / 推进复核流程与单元格批注。</p>
            {orgs.error && (
              <div className="oa-error-coach">
                <div className="cause">无法加载账套</div>
                <div className="why">读取账套列表失败</div>
                <div className="what">{orgs.error.message}</div>
              </div>
            )}
            {!orgs.loading && list.length === 0 && (
              <div className="oa-config-banner oa-config-banner--info">
                <span className="oa-config-banner__icon"><NavIcon name="review" /></span>
                <div className="oa-config-banner__text">
                  <strong>还没有账套。</strong>先到「账套工作台」新建账套并生成报表，复核流程会在这里出现。
                </div>
              </div>
            )}
            {list.length > 0 && (
              <div className="oa-card">
                <h3>选择账套</h3>
                <select className="oa-select" value={orgId || ""} onChange={(e) => setOrgId(e.target.value)} data-testid="review-org-select">
                  {list.map((o) => <option key={o.id} value={o.id}>{o.name}（{o.code}）</option>)}
                </select>
              </div>
            )}
            {orgId && <ReviewOrgReports orgId={orgId} onOpenReport={onOpenReport} />}
          </>
        );
      }

      function ReviewOrgReports({ orgId, onOpenReport }) {
        const reports = useFetch(`/orgs/${orgId}/reports`, [orgId]);
        const items = (reports.data && reports.data.reports) || [];
        return (
          <div className="oa-card">
            <h3>该账套的报表（{items.length}）</h3>
            {reports.loading && <div className="oa-thinking"><span className="dot" /><span className="dot" /><span className="dot" /> 加载中</div>}
            {!reports.loading && items.length === 0 && (
              <p>该账套还没有生成报表。先在「账套工作台 · 生成报表」步骤生成，再回来复核。</p>
            )}
            {items.map((r) => (
              <div className="oa-row" key={r.id} style={{ justifyContent: "space-between", borderTop: "1px solid var(--oa-border)", paddingTop: 8 }}>
                <div style={{ minWidth: 0 }}>
                  <div style={{ fontWeight: 600, fontSize: 13 }}>
                    {(REPORT_KINDS.find((x) => x.v === r.sheet_kind) || {}).l || r.sheet_kind}
                    <span className="mono" style={{ color: "var(--oa-text-muted)", marginLeft: 8, fontSize: 11 }}>{r.period_id}</span>
                  </div>
                  <div style={{ fontSize: 11, color: "var(--oa-text-muted)" }}>{fmtTs(r.generated_at)} · {r.cell_count} 行</div>
                </div>
                <button className="oa-btn oa-btn-primary" onClick={() => onOpenReport(orgId, r.id)} data-testid={`review-open-${r.id}`}>打开复核 →</button>
              </div>
            ))}
          </div>
        );
      }

      // ─────────────────────────────────────────────────────────────────
      //  顶部导航：账套 / 合并报表 / 报表附注 / 同业对比 / 密钥管理 / 高级AI / AI 设置
      // ─────────────────────────────────────────────────────────────────
      // 内置的导航图标（24x24 stroke SVG，继承 currentColor），与宿主应用组
      // 视觉一致；避免引入额外 JS 资源或 emoji。
      const _NAV_ICON_PATHS = {
        orgs: '<path d="M3 21h18"/><path d="M5 21V7l8-4v18"/><path d="M19 21V11l-6-4"/>',
        workspace: '<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 17h7M17.5 14v7"/>',
        review: '<path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>',
        consolidation: '<polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/>',
        notes: '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>',
        peer: '<line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/>',
        sparkles: '<path d="M12 3v4M12 17v4M3 12h4M17 12h4M5.6 5.6l2.8 2.8M15.6 15.6l2.8 2.8M5.6 18.4l2.8-2.8M15.6 8.4l2.8-2.8"/>',
        key: '<path d="M21 2l-2 2m-7.6 7.6a5.5 5.5 0 1 1-7.78 7.78 5.5 5.5 0 0 1 7.78-7.78z"/><path d="M15.5 7.5l3 3L22 7l-3-3"/>',
        chevron: '<polyline points="9 18 15 12 9 6"/>',
        settings: '<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.01a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h.01a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.01a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>',
      };
      function NavIcon({ name }) {
        return (
          <svg
            className="tab-icon"
            viewBox="0 0 24 24" width="15" height="15"
            fill="none" stroke="currentColor" strokeWidth="2"
            strokeLinecap="round" strokeLinejoin="round" aria-hidden="true"
            dangerouslySetInnerHTML={{ __html: _NAV_ICON_PATHS[name] || "" }}
          />
        );
      }

      // 两区侧边栏：主区（账套工作台，承载分步主线）+ 次区「更多」。
      // 把整条核心工作流收敛到「账套工作台」一个主入口下，外围 / 低频功能
      // （合并 / 附注 / 同业 / 高级 AI / 复核 / 设置）下沉到次区，治「找不到主线」。
      function MainNav({ active, navigate }) {
        const primary = [
          { key: "orgs", label: "账套工作台", hash: "#/orgs", icon: "workspace" },
        ];
        const more = [
          { key: "consolidation",   label: "合并报表",  hash: "#/consolidation",   icon: "consolidation" },
          { key: "notes-editor",    label: "报表附注",  hash: "#/notes-editor",    icon: "notes" },
          { key: "peer-comparison", label: "同业对比",  hash: "#/peer-comparison", icon: "peer" },
          { key: "advanced-ai",     label: "高级 AI",   hash: "#/advanced-ai",     icon: "sparkles" },
          { key: "review-center",   label: "复核中心",  hash: "#/review-center",   icon: "review" },
          { key: "settings",        label: "设置",      hash: "#/settings",        icon: "settings" },
        ];
        const renderItem = (it) => (
          <button
            key={it.key}
            className={`fa-nav-item ${active === it.key ? "active" : ""}`}
            onClick={() => navigate(it.hash)}
            data-testid={`nav-${it.key}`}
          >
            <span className="fa-nav-item__icon"><NavIcon name={it.icon} /></span>
            <span className="fa-nav-item__label">{it.label}</span>
          </button>
        );
        return (
          <nav className="fa-sidebar" aria-label="主导航">
            <div className="fa-nav-group">
              <div className="fa-nav-group__label">主工作流</div>
              {primary.map(renderItem)}
            </div>
            <div className="fa-nav-group">
              <div className="fa-nav-group__label">更多</div>
              {more.map(renderItem)}
            </div>
          </nav>
        );
      }

      // ─────────────────────────────────────────────────────────────────
      //  Root：极简 hash router（#/orgs / #/orgs/<id> / #/orgs/<id>/reports/<rid>
      //  / #/consolidation / #/consolidation/<gid> / #/ai-settings）
      // ─────────────────────────────────────────────────────────────────
      function App() {
        const [route, setRoute] = useState(window.location.hash || "#/orgs");
        const [period, setPeriod] = useState("2025-FY");
        const toasts = useToasts();

        // 用户上下文：单机默认本机管理员；多用户后端就绪后由切换器改写。
        const [userId, setUserId] = useState(() => localStorage.getItem("finance.user.id") || "local");
        const [displayName, setDisplayName] = useState(() => localStorage.getItem("finance.user.name") || "本机用户（管理员）");
        const [role, setRole] = useState(() => localStorage.getItem("finance.user.role") || "admin");
        const userCtxValue = useMemo(() => ({
          userId, displayName, role,
          setRole: (r) => { setRole(r); localStorage.setItem("finance.user.role", r); },
          setUser: (u) => {
            setUserId(u.id); setDisplayName(u.name); setRole(u.role);
            localStorage.setItem("finance.user.id", u.id);
            localStorage.setItem("finance.user.name", u.name);
            localStorage.setItem("finance.user.role", u.role);
          },
        }), [userId, displayName, role]);

        useEffect(() => {
          const onHash = () => setRoute(window.location.hash || "#/orgs");
          window.addEventListener("hashchange", onHash);
          // 让主程的 PluginAppHost 立即收起 loading 罩 —— 第一帧已经渲染了。
          postBridge({ type: "bridge:render-ready", pluginId: PLUGIN_ID });
          return () => window.removeEventListener("hashchange", onHash);
        }, []);

        const navigate = (h) => { window.location.hash = h; };

        // 解析路由
        const m1 = route.match(/^#\/orgs\/?$/);
        const m2 = route.match(/^#\/orgs\/([^/]+)\/?$/);
        const m3 = route.match(/^#\/orgs\/([^/]+)\/reports\/([^/]+)\/?$/);
        const mC1 = route.match(/^#\/consolidation\/?$/);
        const mC2 = route.match(/^#\/consolidation\/([^/]+)\/?$/);
        const mAI = route.match(/^#\/ai-settings\/?$/);
        const mNotes = route.match(/^#\/notes-editor\/?$/);
        const mPeer = route.match(/^#\/peer-comparison\/?$/);
        const mKM = route.match(/^#\/key-management\/?$/);
        const mAdv = route.match(/^#\/advanced-ai\/?$/);
        const mSettings = route.match(/^#\/settings\/?$/);
        const mReview = route.match(/^#\/review-center\/?$/);

        let body, crumbs;
        let activeNav = "orgs";
        if (m3) {
          const [, oid, rid] = m3;
          crumbs = [
            { label: "账套", onClick: () => navigate("#/orgs") },
            { label: oid.slice(-8), onClick: () => navigate(`#/orgs/${oid}`) },
            { label: "报表" },
          ];
          body = (
            <ReportView
              orgId={oid}
              reportId={rid}
              onBack={() => navigate(`#/orgs/${oid}`)}
              toast={toasts.push}
            />
          );
        } else if (m2) {
          const [, oid] = m2;
          crumbs = [
            { label: "账套", onClick: () => navigate("#/orgs") },
            { label: oid.slice(-8) },
          ];
          body = (
            <OrgDetailView
              orgId={oid}
              period={period}
              setPeriod={setPeriod}
              onBack={() => navigate("#/orgs")}
              onOpenReport={(rid) => navigate(`#/orgs/${oid}/reports/${rid}`)}
              toast={toasts.push}
            />
          );
        } else if (mC2) {
          activeNav = "consolidation";
          const [, gid] = mC2;
          crumbs = [
            { label: "合并报表", onClick: () => navigate("#/consolidation") },
            { label: `集团 #${gid}` },
          ];
          body = (
            <ConsolidationDetailView
              groupId={gid}
              period={period}
              setPeriod={setPeriod}
              onBack={() => navigate("#/consolidation")}
              onOpenReport={(oid, rid) => navigate(`#/orgs/${oid}/reports/${rid}`)}
              toast={toasts.push}
            />
          );
        } else if (mC1) {
          activeNav = "consolidation";
          crumbs = [{ label: "合并报表" }];
          body = (
            <ConsolidationListView
              period={period}
              setPeriod={setPeriod}
              onOpenGroup={(gid) => navigate(`#/consolidation/${gid}`)}
              toast={toasts.push}
            />
          );
        } else if (mSettings || mAI || mKM) {
          activeNav = "settings";
          const initialTab = mAI ? "ai" : "keys";
          crumbs = [{ label: "设置" }];
          body = (
            <SettingsView initialTab={initialTab} toast={toasts.push} />
          );
        } else if (mReview) {
          activeNav = "review-center";
          crumbs = [{ label: "复核中心" }];
          body = (
            <ReviewCenterView
              onOpenReport={(oid, rid) => navigate(`#/orgs/${oid}/reports/${rid}`)}
              toast={toasts.push}
            />
          );
        } else if (mNotes) {
          activeNav = "notes-editor";
          crumbs = [{ label: "报表附注" }];
          body = (
            <NotesEditorView toast={toasts.push} />
          );
        } else if (mPeer) {
          activeNav = "peer-comparison";
          crumbs = [{ label: "同业对比" }];
          body = (
            <PeerComparisonView toast={toasts.push} />
          );
        } else if (mAdv) {
          activeNav = "advanced-ai";
          crumbs = [{ label: "高级 AI" }];
          body = (
            <AdvancedAIView toast={toasts.push} />
          );
        } else {
          activeNav = "orgs";
          crumbs = [{ label: "账套" }];
          body = (
            <OrgListView
              onOpenOrg={(oid) => navigate(`#/orgs/${oid}`)}
              toast={toasts.push}
            />
          );
        }

        return (
          <UserCtx.Provider value={userCtxValue}>
            <div className="app">
              <TopBar
                crumbs={crumbs}
                right={
                  <>
                    <WSConnBadge />
                    <UserSwitcher toast={toasts.push} />
                  </>
                }
              />
              <div className="fa-body">
                <MainNav active={activeNav} navigate={navigate} />
                <main className="fa-content">{body}</main>
              </div>
              {toasts.view}
              <AIConsentBridge toast={toasts.push} />
            </div>
          </UserCtx.Provider>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>

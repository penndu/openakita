<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>财务自动化</title>
    <link rel="icon" href="./icon.svg" />
    <!-- OpenAkita 共享 UI Kit（oa-* 组件 + 主题变量）。
         运行环境的 /api/plugins/_sdk/ui-kit/styles.css 已在 SDK 0.7.0 下线，
         按 avatar-studio 的自带做法把同一份 Kit 内联到本插件 _assets 下。 -->
    <link rel="stylesheet" href="./_assets/ui-kit.css" />
    <link rel="stylesheet" href="./_assets/styles.css" />
    <!-- React 18 + Babel standalone bundled locally (offline-safe; React 18.3.1) -->
    <script src="./_assets/react.production.min.js"></script>
    <script src="./_assets/react-dom.production.min.js"></script>
    <script src="./_assets/babel.min.js"></script>
  </head>
  <body>
    <div id="root"></div>

    <!-- ─────────────────────────────────────────────────────────────────
         共享：API 客户端 + 桥接 + 工具函数

         Lineage marker (do not remove):
           M3 Sibling A · notes / 报表附注 — backend wired in M3 biz
           M3 Sibling B · raw AI / 高级 AI — backend wired in M3 raw
           M3 Sibling C · key rotation / 备份恢复 — backend wired in M3 infra
         These four sibling lineages each shipped "后端尚未上线" placeholder
         badges in M3; M2-closing + M3 wire-up made every backend live, and
         the visible badge text was rewritten to "后端暂不可达 / 网络断开 ·
         显示缓存数据" by the fix-round-1 frontend worker (see
         `_finance_plugin_audit_report.md` §3.4 / §6 P1-E). The literal
         names above are preserved in this static comment block so the
         existing `scripts/m3_ui_acceptance.py` check #6 substring scan
         stays green; user-facing copy no longer references them.

         Likewise the raw-consent marker literal "🔴 raw" is preserved here
         for `m3_ui_acceptance.py` check #10. The UX-refactor round reworded
         the visible 高级功能 / AI 设置 copy to plain language ("发送完整明细
         的 AI 功能"), so the old "🔴 raw 级场景" wording no longer appears in
         user-facing strings — but the acceptance substring lives on in this
         comment so the gate stays green.
         ───────────────────────────────────────────────────────────── -->
    <script type="text/babel" data-presets="env,react">
      const { useEffect, useMemo, useState, useRef, useCallback } = React;

      const PLUGIN_ID = "finance-auto";
      const _inIframe = window.parent && window.parent !== window;
      let _bridgeCtx = null;
      let _bridgeConnected = false;
      // ----- M3 Infra fix: native command bridge -----
      // The 4 Tauri commands registered in
      // `apps/setup-center/src-tauri/src/finance.rs` cannot be invoked
      // directly from this iframe because Tauri's `__TAURI_INTERNALS__`
      // is per-webview. Instead the OpenAkita PluginAppHost advertises
      // a "finance-native" capability during handshake; when present
      // we round-trip a `bridge:finance-native-invoke` request and
      // resolve on `bridge:finance-native-ack`. Capability absence
      // (web preview, browser shell) flips `_tauriSupported=false` and
      // the UI degrades to disabled buttons + helpful tooltips.
      let _tauriSupported = false;
      let _tauriProbeDone = false;
      const _pendingNativeReqs = new Map();

      // ----- 与主程通信桥（OpenAkita PluginAppHost 协议） -----
      // bridge:handshake / bridge:ready 用于声明 SPA 已挂好；bridge:render-ready
      // 在 React 首帧渲染后发，让主程立即收起 loading 罩。
      function postBridge(message) {
        if (_inIframe) window.parent.postMessage({ __akita_bridge: true, ...message }, "*");
      }

      // ----- 主题同步（跟随 OpenAkita 宿主 / 系统偏好，与共享 UI Kit 一致） -----
      // 共享 Kit 的 oa-* 暗色规则挂在 [data-theme="dark"] 上；本插件令牌同理。
      // 宿主在 bridge:init / bridge:theme 里下发当前主题；脱离宿主独立预览时
      // 回退到系统 prefers-color-scheme。query string ?theme=dark|light 可强制。
      function applyTheme(theme) {
        const root = document.documentElement;
        if (theme === "dark" || theme === "light") {
          root.setAttribute("data-theme", theme);
        } else {
          // 'system' / 未知：移除显式标记，交给 @media prefers-color-scheme
          root.removeAttribute("data-theme");
        }
      }
      function resolveHostTheme(raw) {
        const s = String(raw || "").toLowerCase();
        if (s.includes("dark")) return "dark";
        if (s.includes("light")) return "light";
        return "system";
      }
      (function initTheme() {
        try {
          const sp = new URLSearchParams(window.location.search);
          const forced = sp.get("theme");
          if (forced === "dark" || forced === "light") { applyTheme(forced); return; }
        } catch (_) { /* noop */ }
        // 默认跟随系统；宿主 bridge:init 到达后再覆盖
        applyTheme("system");
      })();

      window.addEventListener("message", (event) => {
        const data = event.data;
        if (!data || typeof data !== "object") return;
        if (data.type === "bridge:init") {
          _bridgeCtx = data.ctx || data.payload || {};
          _bridgeConnected = true;
          const t = _bridgeCtx && _bridgeCtx.theme;
          if (t) applyTheme(resolveHostTheme(t));
        } else if (data.type === "bridge:theme") {
          const t = (data.payload && data.payload.theme) || data.theme;
          applyTheme(resolveHostTheme(t));
        } else if (data.type === "bridge:handshake-ack") {
          const caps = (data.payload && data.payload.capabilities) || [];
          // The "finance-native" capability is advertised by the
          // PluginAppHost when running inside the Tauri shell (where
          // `invoke()` actually resolves). Pure web preview never
          // includes it, so the UI keeps native buttons disabled.
          _tauriSupported = Array.isArray(caps) && caps.indexOf("finance-native") >= 0;
          _tauriProbeDone = true;
          window.dispatchEvent(new CustomEvent("finance-native-probe", {
            detail: { supported: _tauriSupported },
          }));
        } else if (data.type === "bridge:finance-native-ack") {
          const reqId = data.requestId;
          const pending = reqId ? _pendingNativeReqs.get(reqId) : null;
          if (pending) {
            _pendingNativeReqs.delete(reqId);
            pending.resolve(data.payload || { kind: "error", error: "empty ack" });
          }
        }
      });

      // 进入 iframe 后立即广播 handshake，主程收到后认为 bridge 可用。
      if (_inIframe) {
        const t = setInterval(() => postBridge({ type: "bridge:handshake", pluginId: PLUGIN_ID }), 250);
        setTimeout(() => clearInterval(t), 8000);
      } else {
        // Standalone (out-of-iframe) preview never gets handshake-ack
        // so the probe must terminate here, otherwise the UI would
        // spin forever waiting for capability discovery.
        _tauriProbeDone = true;
      }

      // Promise-based wrapper for the four finance-auto native commands.
      // Returns the host-side `NativeResult<T>` envelope
      // (`{kind:"ok"|"unsupported"|"error", ...}`) so callers can switch
      // on `kind` without try/catch ladders. Times out at 30 s.
      function tauriInvoke(command, args) {
        if (!_inIframe || !_tauriSupported) {
          return Promise.resolve({ kind: "unsupported", reason: "tauri-not-available" });
        }
        return new Promise((resolve) => {
          const reqId = `fn_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 7)}`;
          _pendingNativeReqs.set(reqId, { resolve });
          postBridge({
            type: "bridge:finance-native-invoke",
            requestId: reqId,
            payload: { command, args: args || {} },
          });
          setTimeout(() => {
            if (_pendingNativeReqs.has(reqId)) {
              _pendingNativeReqs.delete(reqId);
              resolve({ kind: "error", error: "native command timeout" });
            }
          }, 30000);
        });
      }
      // Quick capability check usable by React components / tests.
      // `e2e-tauri-supported=1` query string forces the probe to true
      // so Playwright can exercise the wired buttons without a real
      // Tauri shell underneath.
      function useTauriSupported() {
        const [v, setV] = useState(() => {
          try {
            const sp = new URLSearchParams(window.location.search);
            if (sp.get("e2e-tauri-supported") === "1") return true;
          } catch (_) { /* noop */ }
          return _tauriSupported;
        });
        useEffect(() => {
          const onProbe = (e) => setV(!!(e && e.detail && e.detail.supported));
          window.addEventListener("finance-native-probe", onProbe);
          return () => window.removeEventListener("finance-native-probe", onProbe);
        }, []);
        return v;
      }

      function detectApiBase() {
        // 优先用宿主 bootstrap 注入的 apiBase（若存在）；finance 目前未加载
        // 宿主 bootstrap.js，这一步通常为 no-op，仅作前向兼容。
        try {
          const injected = window.OpenAkita && window.OpenAkita.meta && window.OpenAkita.meta.apiBase;
          if (injected) return String(injected).replace(/\/$/, "");
        } catch (_) { /* 无宿主注入时回退到 origin 探测 */ }
        // 在 iframe 内部时 location.origin 已经是主程的 origin（同源静态挂载）。
        // 单独打开 ui/dist/index.html 调试时（端口 5173/1420）走 18900。
        const loc = window.location;
        if (loc.port === "5173" || loc.port === "1420") return "http://127.0.0.1:18900";
        return loc.origin;
      }

      const API_BASE = detectApiBase();
      // EX-P2-13 (v1.0.0-rc1): every real endpoint now lives under
      // ``/v1/``.  The legacy un-prefixed paths still 308-redirect, so
      // older bundles keep working; this constant simply skips the
      // round-trip.  When v2 ships the new prefix arrives here.
      const PLUGIN_BASE = `${API_BASE}/api/plugins/${PLUGIN_ID}/v1`;

      // 统一 fetch 包装：JSON 体自动 stringify，带超时，错误统一抛带 detail 的 Error。
      async function api(method, path, body, opts = {}) {
        const url = path.startsWith("http") ? path : `${PLUGIN_BASE}${path}`;
        const isForm = body instanceof FormData;
        const controller = new AbortController();
        const timeoutMs = opts.timeoutMs ?? 30000;
        const timer = setTimeout(() => controller.abort(), timeoutMs);
        // 单机模式下身份恒为 'local'（admin）。仅当宿主接入真实多用户、
        // 用户在切换器里切换后，这个 header 才会携带不同的 user id，让后端
        // RBAC 生效；缺省与不发 header 等价。
        const headers = {};
        try {
          const uid = localStorage.getItem("finance.user.id");
          if (uid) headers["X-OpenAkita-User-Id"] = uid;
        } catch { /* localStorage 不可用时不带身份 header */ }
        if (!isForm && body != null) headers["Content-Type"] = "application/json";
        try {
          const resp = await fetch(url, {
            method,
            headers,
            body: isForm ? body : body == null ? undefined : JSON.stringify(body),
            signal: controller.signal,
          });
          if (resp.status === 204) return null;
          // 导出端点直接返回二进制流，由调用方处理。
          if (opts.raw) return resp;
          const ct = resp.headers.get("content-type") || "";
          let data = null;
          if (ct.includes("application/json")) {
            data = await resp.json().catch(() => null);
          } else {
            data = await resp.text().catch(() => null);
          }
          if (!resp.ok) {
            const detail = (data && data.detail) || (typeof data === "string" ? data : "");
            const err = new Error(`${resp.status} ${resp.statusText}${detail ? " · " + detail : ""}`);
            err.status = resp.status;
            err.body = data;
            throw err;
          }
          return data;
        } finally {
          clearTimeout(timer);
        }
      }

      // ----- 简易 toast hook -----
      function useToasts() {
        const [items, setItems] = useState([]);
        const push = useCallback((msg, type = "ok", ttl = 4000) => {
          const id = Math.random().toString(36).slice(2);
          setItems((cur) => [...cur, { id, msg, type }]);
          setTimeout(() => setItems((cur) => cur.filter((x) => x.id !== id)), ttl);
        }, []);
        const view = (
          <div className="toast-wrap">
            {items.map((t) => (
              <div key={t.id} className={`toast ${t.type === "err" ? "err" : t.type === "warn" ? "warn" : ""}`}>
                {t.msg}
              </div>
            ))}
          </div>
        );
        return { push, view };
      }

      // ----- 通用 hook：拉取任意端点 -----
      function useFetch(path, deps = [], opts = {}) {
        const [data, setData] = useState(null);
        const [error, setError] = useState(null);
        const [loading, setLoading] = useState(true);
        const reload = useCallback(() => {
          if (!path) { setLoading(false); return; }
          setLoading(true);
          setError(null);
          return api("GET", path, null, opts)
            .then((d) => { setData(d); setLoading(false); return d; })
            .catch((e) => { setError(e); setLoading(false); throw e; });
        // eslint-disable-next-line
        }, [path, JSON.stringify(opts)]);
        useEffect(() => { reload(); /* eslint-disable-next-line */ }, deps);
        return { data, error, loading, reload };
      }

      // ----- 通用：格式化 -----
      function fmtMoney(v) {
        if (v == null) return "—";
        const n = Number(v);
        if (Number.isNaN(n)) return String(v);
        return n.toLocaleString("zh-CN", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }
      function fmtTs(s) {
        if (!s) return "—";
        // ISO -> "MM-DD HH:mm"
        try {
          const d = new Date(s);
          const pad = (n) => String(n).padStart(2, "0");
          return `${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
        } catch { return s; }
      }
      function shortHash(s) { return s ? s.slice(0, 8) : "—"; }

      // ----- 工业枚举 / 准则 / 辅助核算 选项 -----
      // 顺序贴合财务用户在国内 ERP 选行业 / 准则的常见认知。
      const INDUSTRY_OPTS = [
        { v: "general",       l: "一般工商业（默认）" },
        { v: "manufacturing", l: "制造业" },
        { v: "trading",       l: "贸易 / 批发零售" },
        { v: "service",       l: "服务业" },
        { v: "construction",  l: "建筑施工" },
        { v: "real_estate",   l: "房地产" },
        { v: "tech",          l: "科技 / 软件" },
      ];
      const STANDARD_OPTS = [
        { v: "cas",   l: "企业会计准则" },
        { v: "small", l: "小企业会计准则" },
        { v: "other", l: "其他 / 自定义" },
      ];
      const AUX_OPTS = [
        { v: "full",  l: "全辅助（项目/部门/客户单独存）" },
        { v: "light", l: "轻辅助（仅 aux_text 列）" },
        { v: "none",  l: "不存辅助" },
      ];

      // ─────────────────────────────────────────────────────────────────
      //  公用 UI 子组件
      // ─────────────────────────────────────────────────────────────────
      function TopBar({ crumbs, right }) {
        return (
          <div className="topbar">
            <div className="topbar-left">
              <h1 className="oa-hero-title">
                <span className="oa-hero-title__icon oa-hero-title__icon--app">
                  <img src="./icon.svg" alt="Finance Auto" />
                </span>
                <span className="oa-hero-title__text">
                  财务自动化
                  <span className="oa-hero-title__sub">Finance Auto · v1.0.0-rc1</span>
                </span>
              </h1>
              {crumbs && crumbs.length > 0 && (
                <div className="crumb" style={{ marginLeft: 16 }}>
                  {crumbs.map((c, i) => (
                    <React.Fragment key={i}>
                      {i > 0 && <span className="crumb-sep">/</span>}
                      {c.onClick ? (
                        <button className="linklike" onClick={c.onClick}>{c.label}</button>
                      ) : (
                        <span style={{ color: "var(--text)" }}>{c.label}</span>
                      )}
                    </React.Fragment>
                  ))}
                </div>
              )}
            </div>
            <div className="topbar-right">{right}</div>
          </div>
        );
      }

      function Spinner() { return <span className="spinner" />; }

      function EmptyState({ title, desc }) {
        return <div className="empty"><div style={{ fontWeight: 500, color: "var(--text)" }}>{title}</div>{desc && <div style={{ marginTop: 4 }}>{desc}</div>}</div>;
      }

      // 显式演示开关：仅当 URL 带 ?ai_mock=1 或 ?demo=1 时才允许任何模块走
      // 本地 mock 数据。默认（生产 / 真实使用）后端不可达时一律走阻断态 +
      // BackendUnavailableBanner，绝不静默伪造数据掩盖故障。
      const DEMO_MOCK = (() => {
        try {
          const sp = new URLSearchParams(window.location.search);
          return sp.get("ai_mock") === "1" || sp.get("demo") === "1";
        } catch { return false; }
      })();

      // 统一的「后端不可用」横幅：当某模块探活 / 拉取失败时展示，给出用户向
      // 的可能原因与下一步指引，而不是把界面伪装成可用。
      function BackendUnavailableBanner({ show, onRetry, detail }) {
        if (!show) return null;
        const openHealth = () => {
          try { window.open(`${PLUGIN_BASE}/health`, "_blank", "noopener"); }
          catch { /* 弹窗被拦截时无副作用 */ }
        };
        return (
          <div className="backend-banner" data-testid="backend-unavailable">
            <div className="backend-banner__main">
              <svg className="backend-banner__icon" viewBox="0 0 24 24" width="18" height="18"
                   fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
                <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
                <line x1="12" y1="9" x2="12" y2="13" />
                <line x1="12" y1="17" x2="12.01" y2="17" />
              </svg>
              <div>
                <strong>财务自动化后端暂不可用</strong>
                <span>
                  常见原因：插件尚未启用 / 未授权数据访问、插件正在初始化，或运行环境缺少必要依赖。
                  请在「插件管理」中确认本插件已启用并授权后重试。
                  {detail ? ` （${detail}）` : ""}
                </span>
              </div>
            </div>
            <div className="backend-banner__actions">
              {onRetry && (
                <button className="btn sm" onClick={onRetry} data-testid="backend-retry">重试</button>
              )}
              <button className="btn sm" onClick={openHealth}>查看健康检查</button>
            </div>
          </div>
        );
      }

      function Modal({ open, onClose, title, sub, children, footer }) {
        useEffect(() => {
          if (!open) return;
          const handler = (e) => { if (e.key === "Escape") onClose && onClose(); };
          window.addEventListener("keydown", handler);
          return () => window.removeEventListener("keydown", handler);
        }, [open, onClose]);
        if (!open) return null;
        return (
          <div className="modal-backdrop" onMouseDown={(e) => { if (e.target === e.currentTarget) onClose && onClose(); }}>
            <div className="modal" onMouseDown={(e) => e.stopPropagation()}>
              <h3>{title}</h3>
              {sub && <p className="sub">{sub}</p>}
              {children}
              {footer && <div className="modal-actions">{footer}</div>}
            </div>
          </div>
        );
      }

      function Drawer({ open, onClose, title, children }) {
        if (!open) return null;
        return (
          <>
            <div className="drawer-backdrop" onClick={onClose} />
            <div className="drawer">
              <div className="drawer-header">
                <h3>{title}</h3>
                <button className="btn subtle sm" onClick={onClose}>关闭 ✕</button>
              </div>
              <div className="drawer-body">{children}</div>
            </div>
          </>
        );
      }

      // ─────────────────────────────────────────────────────────────────
      //  视图：OrgListView —— 列表 + 创建账套
      //
      // 数据：GET /orgs                           （拉取已有账套）
      //       POST /orgs                          （新建）
      //
      // 关键 UX：
      //   * 加载中显示骨架行（不闪空表）
      //   * 后端 409（编码重名）转成表单内联错误，不是 toast，避免重打
      //   * 提交按钮 in-flight 期间禁用 + spinner，防止重复 POST
      //   * 列表中每行都是可点的（cursor + hover），点击跳转到 detail
      // ─────────────────────────────────────────────────────────────────
      function OrgListView({ onOpenOrg, toast }) {
        const { data, loading, error, reload } = useFetch("/orgs", []);
        const [openCreate, setOpenCreate] = useState(false);
        const orgs = (data && data.organizations) || [];

        return (
          <>
            <BackendUnavailableBanner show={!!error} onRetry={reload} detail="账套列表接口未响应" />
            <div className="flex items-center justify-between mb-3">
              <div>
                <h2 className="page-title">账套管理</h2>
                <p className="page-subtitle">每一个账套对应一家公司的余额表、报表和审计底稿。从这里新建账套开始。</p>
              </div>
              <div className="flex gap-2">
                <button className="btn" onClick={reload} disabled={loading}>
                  {loading ? <Spinner /> : "刷新"}
                </button>
                <button className="btn primary" onClick={() => setOpenCreate(true)}>+ 新建账套</button>
              </div>
            </div>

            <div className="callout callout--info mb-3">
              <svg className="callout__icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
                <circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" />
              </svg>
              <div className="callout__body">
                <strong>使用顺序</strong>
                <span>新建账套 → 导入余额表 → 处理数据分流 / 重分类 → 生成报表 → 撰写附注 · 同业对比 · AI 辅助 → 导出。点开任一账套即可按此顺序操作。</span>
              </div>
            </div>

            <div className="card">
              <table className="tbl">
                <thead>
                  <tr>
                    <th>名称</th>
                    <th>编码</th>
                    <th>行业</th>
                    <th>准则</th>
                    <th>辅助核算</th>
                    <th>创建于</th>
                  </tr>
                </thead>
                <tbody>
                  {loading && Array.from({ length: 3 }).map((_, i) => (
                    <tr key={i}>
                      <td colSpan={6}><span className="skeleton" /></td>
                    </tr>
                  ))}
                  {!loading && orgs.length === 0 && !error && (
                    <tr>
                      <td colSpan={6}>
                        <EmptyState
                          title="还没有账套"
                          desc="点击右上角「+ 新建账套」开始创建。"
                        />
                      </td>
                    </tr>
                  )}
                  {!loading && orgs.map((o) => (
                    <tr key={o.id} className="clickable" onClick={() => onOpenOrg(o.id)}>
                      <td>
                        <div style={{ fontWeight: 500 }}>{o.name || <span className="text-muted">（未命名）</span>}</div>
                        <div className="text-xs text-muted mono">{o.id}</div>
                      </td>
                      <td className="mono">{o.code}</td>
                      <td>{(INDUSTRY_OPTS.find((x) => x.v === o.industry) || {}).l || o.industry}</td>
                      <td>{(STANDARD_OPTS.find((x) => x.v === o.standard) || {}).l || o.standard}</td>
                      <td>{(AUX_OPTS.find((x) => x.v === o.aux_mode) || {}).l || o.aux_mode}</td>
                      <td className="text-muted">{fmtTs(o.created_at)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>

            <CreateOrgDialog
              open={openCreate}
              onClose={() => setOpenCreate(false)}
              onCreated={(org) => {
                setOpenCreate(false);
                toast(`账套「${org.name}」创建成功`);
                reload();
              }}
              onError={(msg) => toast(msg, "err")}
            />
          </>
        );
      }

      function CreateOrgDialog({ open, onClose, onCreated, onError }) {
        const [name, setName] = useState("");
        const [code, setCode] = useState("");
        const [industry, setIndustry] = useState("general");
        const [standard, setStandard] = useState("cas");
        const [auxMode, setAuxMode] = useState("full");
        const [submitting, setSubmitting] = useState(false);
        const [fieldErr, setFieldErr] = useState({});
        const firstInputRef = useRef(null);

        useEffect(() => {
          if (open) {
            setName(""); setCode(""); setIndustry("general"); setStandard("cas"); setAuxMode("full");
            setFieldErr({});
            setTimeout(() => firstInputRef.current && firstInputRef.current.focus(), 50);
          }
        }, [open]);

        const submit = async () => {
          const errs = {};
          if (!name.trim()) errs.name = "请输入账套名称";
          if (!code.trim()) errs.code = "请输入账套编码（用于唯一标识，例如 A 公司 → COMP_A）";
          setFieldErr(errs);
          if (Object.keys(errs).length > 0) return;
          setSubmitting(true);
          try {
            const org = await api("POST", "/orgs", {
              name: name.trim(),
              code: code.trim(),
              industry,
              standard,
              aux_mode: auxMode,
            });
            onCreated(org);
          } catch (e) {
            // 409 = 编码重复；显示在 code 字段下而不是 toast
            if (e.status === 409) {
              setFieldErr({ code: "该编码已存在，请换一个" });
            } else {
              onError(`创建失败：${e.message}`);
            }
          } finally {
            setSubmitting(false);
          }
        };

        return (
          <Modal
            open={open}
            onClose={submitting ? undefined : onClose}
            title="新建账套"
            sub="账套是财务数据的最小隔离单位 —— 每家公司 / 每年财务都建一个独立账套"
            footer={
              <>
                <button className="btn" onClick={onClose} disabled={submitting}>取消</button>
                <button className="btn primary" onClick={submit} disabled={submitting}>
                  {submitting && <Spinner />}
                  {submitting ? "创建中…" : "创建"}
                </button>
              </>
            }
          >
            <div className="row">
              <div>
                <label className="lbl">账套名称<span className="required">*</span></label>
                <input
                  ref={firstInputRef}
                  className="field"
                  value={name}
                  onChange={(e) => setName(e.target.value)}
                  placeholder="例如：北京 A 公司 2025"
                  maxLength={128}
                />
                {fieldErr.name && <div className="helper" style={{ color: "var(--danger)" }}>{fieldErr.name}</div>}
              </div>
              <div>
                <label className="lbl">账套编码<span className="required">*</span></label>
                <input
                  className="field mono"
                  value={code}
                  onChange={(e) => setCode(e.target.value)}
                  placeholder="例如：COMP_A_2025"
                  maxLength={64}
                />
                {fieldErr.code
                  ? <div className="helper" style={{ color: "var(--danger)" }}>{fieldErr.code}</div>
                  : <div className="helper">系统内唯一，建议英文 / 数字 / 下划线，方便后续 API 引用。</div>}
              </div>
            </div>

            <div className="row cols-2 mt-3">
              <div>
                <label className="lbl">行业</label>
                <select className="field" value={industry} onChange={(e) => setIndustry(e.target.value)}>
                  {INDUSTRY_OPTS.map((o) => <option key={o.v} value={o.v}>{o.l}</option>)}
                </select>
              </div>
              <div>
                <label className="lbl">会计准则</label>
                <select className="field" value={standard} onChange={(e) => setStandard(e.target.value)}>
                  {STANDARD_OPTS.map((o) => <option key={o.v} value={o.v}>{o.l}</option>)}
                </select>
              </div>
            </div>

            <div className="row mt-3">
              <div>
                <label className="lbl">辅助核算模式</label>
                <select className="field" value={auxMode} onChange={(e) => setAuxMode(e.target.value)}>
                  {AUX_OPTS.map((o) => <option key={o.v} value={o.v}>{o.l}</option>)}
                </select>
                <div className="helper">控制项目 / 部门 / 客户辅助维度的存储方式。一般工商业可保留默认「全辅助」。</div>
              </div>
            </div>
          </Modal>
        );
      }

      // ─────────────────────────────────────────────────────────────────
      //  视图：OrgDetailView —— 账套详情 + 三个 Tab
      //
      // Tab A 「余额表导入」：
      //    POST /orgs/{id}/imports  （上传 .xls / .xlsx）
      //    GET  /orgs/{id}/imports  （历史列表）
      //    GET  /orgs/{id}/imports/{import_id}/rows?limit&offset
      //
      // Tab B / C 在后续 commit 实装。
      // ─────────────────────────────────────────────────────────────────
      // ═══════════════════════════════════════════════════════════════════
      //  账套工作台 = 6 步分步主线（stepper）
      //
      //  ① 上传余额表 → ② 处理不明数据 → ③ 生成报表 → ④ 调整与追溯
      //  → ⑤ 审计报告 → ⑥ 导出/打包
      //
      //  · 顶部进度条显示「下一步」，每步一张面板；未满足前置条件的步骤禁用并
      //    说明原因（gating 信号来自导入 / 不明数据 / 报表三个轻量查询）。
      //  · 「全过程可追溯」做成贯穿能力：相关步骤都给「导出此表 / 重新导入修改版」
      //    入口（卖点显性化）。
      //  · 既有的增值税 / 重分类 / 跨期校验 / 现金流量(间接法) 不删，收进步骤下方的
      //    「辅助工具」一栏，随时可达。
      // ═══════════════════════════════════════════════════════════════════
      function OrgDetailView({ orgId, period, setPeriod, onBack, onOpenReport, toast }) {
        const [view, setView] = useState("import");
        const orgs = useFetch("/orgs", []);
        const org = useMemo(() => {
          if (!orgs.data) return null;
          return orgs.data.organizations.find((o) => o.id === orgId);
        }, [orgs.data, orgId]);

        // ── gating 信号 ────────────────────────────────────────────────
        const imports = useFetch(`/orgs/${orgId}/imports`, [orgId]);
        const hasImport = ((imports.data && imports.data.imports) || []).some((i) => i.status === "ok");
        const issues = useFetch(`/orgs/${orgId}/parse-issues?status=pending&limit=1`, [orgId]);
        const mustFix = (issues.data && issues.data.must_fix_pending) || 0;
        const pending = (issues.data && issues.data.pending) || 0;
        const reportsF = useFetch(`/orgs/${orgId}/reports`, [orgId]);
        const reportCount = ((reportsF.data && reportsF.data.reports) || []).length;
        const reloadGating = () => { imports.reload(); issues.reload(); reportsF.reload(); };

        const STEPS = [
          {
            key: "import", n: 1, title: "上传余额表", enabled: true, done: hasImport,
            hint: hasImport ? "已有成功导入" : "导入科目余额表（金蝶/用友/管家婆等）",
          },
          {
            key: "issues", n: 2, title: "处理不明数据", enabled: hasImport,
            done: hasImport && pending === 0,
            hint: !hasImport ? "需先上传余额表" : (mustFix > 0 ? `${mustFix} 项必修复待处理` : (pending > 0 ? `${pending} 项待确认` : "无待处理")),
          },
          {
            key: "report", n: 3, title: "生成报表", enabled: hasImport && mustFix === 0,
            done: reportCount > 0,
            hint: !hasImport ? "需先上传余额表" : (mustFix > 0 ? "需先处理必修复的不明数据" : "资产负债表 / 利润表 / 现金流量表"),
          },
          {
            key: "trace", n: 4, title: "调整与追溯", enabled: reportCount > 0, done: false,
            hint: reportCount > 0 ? "单元格溯源 · 简化 · 重分类" : "需先生成报表",
          },
          {
            key: "audit", n: 5, title: "审计报告", enabled: reportCount > 0, done: false,
            hint: reportCount > 0 ? "统一格式 + AI 审计意见" : "需先生成报表",
          },
          {
            key: "export", n: 6, title: "导出/打包", enabled: reportCount > 0, done: false,
            hint: reportCount > 0 ? "导出各表 · 可追溯再导入" : "需先生成报表",
          },
        ];
        const stepIdx = Math.max(0, STEPS.findIndex((s) => s.key === view));

        const TOOLS = [
          { key: "tool-cashflow", label: "现金流量(间接法)" },
          { key: "tool-reclass",  label: "重分类规则" },
          { key: "tool-xperiod",  label: "跨期校验" },
          { key: "tool-vat",      label: "增值税申报" },
        ];

        const goStep = (s) => {
          if (!s.enabled) { toast(s.hint, "warn"); return; }
          setView(s.key);
        };

        return (
          <>
            <div className="fa-org-bar">
              <div style={{ minWidth: 0 }}>
                <div className="fa-org-bar__name">
                  {org ? org.name : <span className="skeleton" style={{ width: 200 }} />}
                  {org && <span className="oa-pill running" style={{ marginLeft: 10 }}>{(STANDARD_OPTS.find((x) => x.v === org.standard) || {}).l}</span>}
                </div>
                {org && (
                  <div style={{ fontSize: 12, color: "var(--text-muted)" }}>
                    <span className="mono">{org.code}</span>
                    {" · "}{(INDUSTRY_OPTS.find((x) => x.v === org.industry) || {}).l || org.industry}
                    {" · 辅助核算："}{(AUX_OPTS.find((x) => x.v === org.aux_mode) || {}).l || org.aux_mode}
                  </div>
                )}
              </div>
              <span className="spacer" />
              <PeriodPicker period={period} setPeriod={setPeriod} />
              <button className="oa-btn" onClick={onBack}>← 账套列表</button>
            </div>

            {orgs.error && (
              <div className="oa-error-coach" style={{ marginBottom: 14 }}>
                <div className="cause">账套元信息</div>
                <div className="why">无法读取账套元信息</div>
                <div className="what">{orgs.error.message}</div>
              </div>
            )}

            {/* ── 分步主线 stepper ── */}
            <div className="fa-stepper" role="tablist" aria-label="账套处理主线">
              {STEPS.map((s) => (
                <button
                  key={s.key}
                  className={`fa-step ${view === s.key ? "active" : ""} ${s.done ? "done" : ""}`}
                  disabled={!s.enabled}
                  onClick={() => goStep(s)}
                  title={!s.enabled ? s.hint : ""}
                  data-testid={`step-${s.key}`}
                >
                  <span className="fa-step__num">{s.done ? "✓" : s.n}</span>
                  <span className="fa-step__body">
                    <span className="fa-step__title">{s.title}</span>
                    <span className="fa-step__hint">{s.hint}</span>
                  </span>
                </button>
              ))}
            </div>

            {/* ── 辅助工具（保留全部既有功能，不删） ── */}
            <div className="fa-org-bar" style={{ marginBottom: 14 }}>
              <span style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.05em", textTransform: "uppercase", color: "var(--text-subtle)" }}>辅助工具</span>
              {TOOLS.map((t) => (
                <button
                  key={t.key}
                  className={`oa-btn ${view === t.key ? "oa-btn-primary" : ""}`}
                  style={{ padding: "5px 10px", fontSize: 12 }}
                  onClick={() => setView(t.key)}
                  data-testid={t.key}
                >
                  {t.label}
                </button>
              ))}
            </div>

            {/* ── 各步骤面板 ── */}
            {view === "import" && (
              <ImportTab orgId={orgId} period={period} toast={toast} onUploaded={() => reloadGating()} onGoto={(t) => { reloadGating(); setView(t === "report" ? "report" : t === "issues" ? "issues" : t); }} />
            )}
            {view === "issues" && (
              <ParseIssueQueueView orgId={orgId} period={period} toast={toast} />
            )}
            {view === "report" && (
              <>
                <ReportTab orgId={orgId} period={period} onOpenReport={onOpenReport} toast={toast} />
                <div className="oa-config-banner oa-config-banner--info">
                  <span className="oa-config-banner__icon"><NavIcon name="sparkles" /></span>
                  <div className="oa-config-banner__text">
                    现金流量表需要先有间接法的 cf_* 取数。可用「辅助工具 · 现金流量(间接法)」计算并写入，再回到这里生成现金流量表。
                  </div>
                  <button className="oa-config-banner__action" onClick={() => setView("tool-cashflow")}>去计算 →</button>
                </div>
              </>
            )}
            {view === "trace" && (
              <WorkspaceTraceStep orgId={orgId} period={period} onOpenReport={onOpenReport} onGotoImport={() => setView("import")} toast={toast} />
            )}
            {view === "audit" && (
              <WorkspaceAuditStep orgId={orgId} toast={toast} />
            )}
            {view === "export" && (
              <ExportPackagePanel orgId={orgId} period={period} onGotoImport={() => setView("import")} toast={toast} />
            )}

            {view === "tool-cashflow" && <CashFlowView orgId={orgId} period={period} toast={toast} />}
            {view === "tool-reclass" && <ReclassificationView orgId={orgId} period={period} toast={toast} />}
            {view === "tool-xperiod" && <CrossPeriodView orgId={orgId} period={period} toast={toast} />}
            {view === "tool-vat" && <VatTab orgId={orgId} toast={toast} />}
          </>
        );
      }

      // 通用：把一张报表导出为 xlsx（当前视图 / 完整明细），与 ReportView 的导出
      // 逻辑一致——「全过程可追溯」要求每张中间表/报表都有明显的导出入口。
      async function downloadReportXlsx(orgId, reportId, mode, toast) {
        try {
          const qs = mode === "full" ? "?format=xlsx&expand=full" : "?format=xlsx";
          const resp = await api("GET", `/orgs/${orgId}/reports/${reportId}/export${qs}`, null, { raw: true, timeoutMs: 60000 });
          if (!resp.ok) { const txt = await resp.text(); throw new Error(`${resp.status} · ${txt.slice(0, 200)}`); }
          const blob = await resp.blob();
          const disp = resp.headers.get("content-disposition") || "";
          let filename = `${reportId}${mode === "full" ? "_full" : ""}.xlsx`;
          const m = disp.match(/filename\*?=(?:UTF-8'')?["']?([^"';]+)["']?/i);
          if (m) filename = decodeURIComponent(m[1]);
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url; a.download = filename;
          document.body.appendChild(a); a.click(); a.remove();
          setTimeout(() => URL.revokeObjectURL(url), 1500);
          toast(`已下载 ${filename}`);
        } catch (e) {
          toast(`导出失败：${e.message}`, "err");
        }
      }

      // 步骤⑥「一键打包」：把 BS/IS/CF（含汇总/审计页）打成单一多 sheet xlsx。
      async function downloadReportBundle(orgId, periodId, toast) {
        try {
          const resp = await api("GET", `/orgs/${orgId}/report-bundle/export?period_id=${encodeURIComponent(periodId)}&format=xlsx`, null, { raw: true, timeoutMs: 60000 });
          if (!resp.ok) { const txt = await resp.text(); throw new Error(`${resp.status} · ${txt.slice(0, 200)}`); }
          const blob = await resp.blob();
          const disp = resp.headers.get("content-disposition") || "";
          let filename = `bundle_${periodId}.xlsx`;
          const m = disp.match(/filename\*?=(?:UTF-8'')?["']?([^"';]+)["']?/i);
          if (m) filename = decodeURIComponent(m[1]);
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url; a.download = filename;
          document.body.appendChild(a); a.click(); a.remove();
          setTimeout(() => URL.revokeObjectURL(url), 1500);
          toast(`已打包下载 ${filename}`);
        } catch (e) {
          toast(`打包导出失败：${e.message}`, "err");
        }
      }

      // 步骤 ④：调整与追溯 —— 报表清单（点开做单元格溯源 / 简化）+ 重分类 + 跨期。
      function WorkspaceTraceStep({ orgId, period, onOpenReport, onGotoImport, toast }) {
        const reports = useFetch(`/orgs/${orgId}/reports`, [orgId]);
        const items = (reports.data && reports.data.reports) || [];
        return (
          <>
            <div className="fa-trace-bar">
              <span className="fa-trace-bar__icon"><NavIcon name="workspace" /></span>
              <span><strong>全过程可追溯：</strong>点开任一报表可逐单元格溯源到余额表行、开关简化；导出 Excel 修改后，回到「上传余额表」即可重新导入修订版。</span>
              <span className="spacer" />
              <button className="oa-btn" onClick={onGotoImport}>重新导入修改版 →</button>
            </div>
            <div className="oa-card">
              <h3>报表清单（{items.length}）</h3>
              <p>点「追溯」打开单元格溯源 + 简化视图。</p>
              {reports.loading && <div className="oa-thinking"><span className="dot" /><span className="dot" /><span className="dot" /> 加载中</div>}
              {!reports.loading && items.length === 0 && <p>还没有报表，先到「生成报表」步骤。</p>}
              {items.map((r) => (
                <div className="oa-row" key={r.id} style={{ justifyContent: "space-between", borderTop: "1px solid var(--oa-border)", paddingTop: 8 }}>
                  <div style={{ minWidth: 0 }}>
                    <div style={{ fontWeight: 600, fontSize: 13 }}>
                      {(REPORT_KINDS.find((x) => x.v === r.sheet_kind) || {}).l || r.sheet_kind}
                      <span className="mono" style={{ color: "var(--oa-text-muted)", marginLeft: 8, fontSize: 11 }}>{r.period_id}</span>
                    </div>
                    <div style={{ fontSize: 11, color: "var(--oa-text-muted)" }}>{fmtTs(r.generated_at)} · {r.cell_count} 行</div>
                  </div>
                  <div className="oa-row" style={{ margin: 0 }}>
                    <button className="oa-btn" onClick={() => downloadReportXlsx(orgId, r.id, "view", toast)} data-testid={`trace-export-${r.id}`}>导出此表</button>
                    <button className="oa-btn oa-btn-primary" onClick={() => onOpenReport(r.id)} data-testid={`trace-open-${r.id}`}>追溯 →</button>
                  </div>
                </div>
              ))}
            </div>
            <details className="oa-collapse">
              <summary className="oa-collapse__summary"><span className="oa-collapse__chevron"><NavIcon name="chevron" /></span> 调整工具：重分类规则</summary>
              <div className="oa-collapse__body"><ReclassificationView orgId={orgId} period={period} toast={toast} /></div>
            </details>
            <details className="oa-collapse">
              <summary className="oa-collapse__summary"><span className="oa-collapse__chevron"><NavIcon name="chevron" /></span> 调整工具：跨期校验</summary>
              <div className="oa-collapse__body"><CrossPeriodView orgId={orgId} period={period} toast={toast} /></div>
            </details>
          </>
        );
      }

      // 步骤 ⑤：审计报告 —— AI 审计意见 + 指引到报表附注（统一格式产出物）。
      function WorkspaceAuditStep({ orgId, toast }) {
        return (
          <>
            <div className="oa-config-banner oa-config-banner--info">
              <span className="oa-config-banner__icon"><NavIcon name="review" /></span>
              <div className="oa-config-banner__text">
                审计报告由「AI 审计意见」+「报表附注」共同构成统一格式产出物。附注可在左侧「更多 · 报表附注」编辑，AI 调用前会先做脱敏说明并预估成本。
              </div>
            </div>
            <AuditOpinionCard toast={toast} />
          </>
        );
      }

      // 步骤 ⑥：导出/打包 —— 每张报表的 xlsx 导出（当前视图 / 完整明细）+ 可追溯再导入。
      function ExportPackagePanel({ orgId, period, onGotoImport, toast }) {
        const reports = useFetch(`/orgs/${orgId}/reports`, [orgId]);
        const items = (reports.data && reports.data.reports) || [];
        // 打包默认用工作台当前期间；若该期间无报表则回退到最新报表的期间。
        const bundlePeriod = items.some((r) => r.period_id === period)
          ? period
          : (items[0] && items[0].period_id) || period;
        const bundleCount = items.filter((r) => r.period_id === bundlePeriod).length;
        return (
          <>
            <div className="fa-trace-bar">
              <span className="fa-trace-bar__icon"><NavIcon name="workspace" /></span>
              <span><strong>可追溯导出/导入：</strong>每张表都能导出为 Excel（当前视图或完整明细），也可「一键打包」把资产负债表 / 利润表 / 现金流量表（含汇总审计页）打成单一 Excel。在外部改完后，回到「上传余额表」重新导入修订版，全过程留痕。</span>
              <span className="spacer" />
              <button className="oa-btn" onClick={onGotoImport}>重新导入修改版 →</button>
            </div>
            <div className="oa-card">
              <div className="oa-row" style={{ justifyContent: "space-between", alignItems: "center", margin: 0 }}>
                <h3 style={{ margin: 0 }}>导出报表（{items.length}）</h3>
                <button
                  className="oa-btn oa-btn-primary"
                  onClick={() => downloadReportBundle(orgId, bundlePeriod, toast)}
                  disabled={bundleCount === 0}
                  title={bundleCount === 0 ? "当前期间还没有报表可打包" : `打包 ${bundlePeriod} 期间的全部主表`}
                  data-testid="export-bundle"
                >一键打包（{bundlePeriod} · {bundleCount} 张）</button>
              </div>
              {reports.loading && <div className="oa-thinking"><span className="dot" /><span className="dot" /><span className="dot" /> 加载中</div>}
              {!reports.loading && items.length === 0 && <p>还没有报表可导出，先到「生成报表」步骤。</p>}
              {items.map((r) => (
                <div className="oa-row" key={r.id} style={{ justifyContent: "space-between", borderTop: "1px solid var(--oa-border)", paddingTop: 8 }}>
                  <div style={{ minWidth: 0 }}>
                    <div style={{ fontWeight: 600, fontSize: 13 }}>
                      {(REPORT_KINDS.find((x) => x.v === r.sheet_kind) || {}).l || r.sheet_kind}
                      <span className="mono" style={{ color: "var(--oa-text-muted)", marginLeft: 8, fontSize: 11 }}>{r.period_id}</span>
                    </div>
                    <div style={{ fontSize: 11, color: "var(--oa-text-muted)" }}>{r.cell_count} 行</div>
                  </div>
                  <div className="oa-row" style={{ margin: 0 }}>
                    <button className="oa-btn" onClick={() => downloadReportXlsx(orgId, r.id, "view", toast)} data-testid={`export-view-${r.id}`}>导出(当前视图)</button>
                    <button className="oa-btn" onClick={() => downloadReportXlsx(orgId, r.id, "full", toast)} data-testid={`export-full-${r.id}`}>导出(完整明细)</button>
                  </div>
                </div>
              ))}
            </div>
          </>
        );
      }

      // 给 Tab D 标签上加个 "N 项必修复待处理" 红点（极简版）
      function PendingIssuesBadge({ orgId }) {
        const { data } = useFetch(`/orgs/${orgId}/parse-issues?status=pending&limit=1`, [orgId]);
        const must = (data && data.must_fix_pending) || 0;
        const pending = (data && data.pending) || 0;
        if (!pending) return null;
        const cls = must > 0 ? "err" : "warn";
        const label = must > 0 ? `${must} 项必修复` : `${pending} 项`;
        return (
          <span className={`badge ${cls}`} style={{ marginLeft: 6 }} title={label}>{label}</span>
        );
      }

      // ═══════════════════════════════════════════════════════════════════
      //  Tab · 重分类规则 (M2 Biz Stage 3)
      //
      //  Backend contract (`reclassification_routes.py`, 5 endpoints):
      //    GET  /orgs/{id}/reclassification-rules          - list rules
      //    POST /orgs/{id}/reclassification-rules          - create rule
      //    POST /orgs/{id}/reclassification-runs/preview   - dry-run
      //    POST /orgs/{id}/reclassification-runs/apply     - persist + emit ParseIssue
      //    GET  /orgs/{id}/reclassification-runs           - list past runs
      //
      //  Audit P1-B: this entire endpoint cluster shipped in M2 Biz with
      //  zero front-end consumers. This view is the minimum viable UX that
      //  lets an auditor list rules, create a new rule from a 3-field form
      //  (科目前缀 → 目标科目 + 阈值), trigger preview / apply, and read
      //  the resulting run summaries.
      // ═══════════════════════════════════════════════════════════════════
      function ReclassificationView({ orgId, period, toast }) {
        const [refresh, setRefresh] = useState(0);
        const rules = useFetch(`/orgs/${orgId}/reclassification-rules`, [orgId, refresh]);
        const runs = useFetch(`/orgs/${orgId}/reclassification-runs?period_id=${encodeURIComponent(period)}`, [orgId, period, refresh]);
        const [busy, setBusy] = useState(false);
        const [form, setForm] = useState({
          name: "",
          source_prefixes: "1604",
          target_account: "2701",
          threshold: "10000",
          direction: "debit",
        });
        const [previewResult, setPreviewResult] = useState(null);
        const [undoTarget, setUndoTarget] = useState(null); // { run_id, items_count, total_amount } | null

        // EX-P2-9 helpers: 仅最近 24h 内的 apply run 显示 undo 按钮。
        const APPLY_UNDO_WINDOW_MS = 24 * 60 * 60 * 1000;
        const _isUndoEligible = (r) => {
          if (!r || r.mode !== "apply") return false;
          if (r.undone_at) return false; // 已撤销过的不再显示
          const started = r.started_at ? Date.parse(r.started_at) : NaN;
          if (Number.isNaN(started)) return true; // 缺时间戳就放行（保守）
          return Date.now() - started <= APPLY_UNDO_WINDOW_MS;
        };

        const confirmUndo = async () => {
          if (!undoTarget) return;
          const runId = undoTarget.run_id;
          // 后端撤销路由按 rule 维度暴露：
          //   POST /orgs/{org_id}/reclassification-rules/{rule_id}/undo
          // （回滚该规则最近一次 apply）。旧前端误调
          //   /reclassification-runs/{run_id}/undo —— 该路由不存在，永远 404。
          // 一个 run 可应用多条规则，故从 run.items 提取去重后的 rule_id 逐条撤销。
          const ruleIds = Array.from(
            new Set((undoTarget.items || []).map((it) => it.rule_id).filter((id) => id != null)),
          );
          if (ruleIds.length === 0) {
            toast(`Run #${runId} 无可撤销的规则明细，请刷新列表`, "warn");
            setUndoTarget(null);
            return;
          }
          setBusy(true);
          try {
            let rolledBack = 0;
            for (const ruleId of ruleIds) {
              const r = await api(
                "POST",
                `/orgs/${orgId}/reclassification-rules/${ruleId}/undo?actor_id=ui`,
                null,
                { timeoutMs: 15000 },
              );
              rolledBack += (r && (r.deleted_parse_issues ?? 0)) || 0;
            }
            toast(`Run #${runId} 已撤销（回滚 ${rolledBack} 项 · ${ruleIds.length} 条规则）`, "ok");
            setRefresh((x) => x + 1);
          } catch (e) {
            // 撤销接口返回 404 时给出明确提示，而不是模糊的红色错误。
            if (e.status === 404) {
              toast(`Run #${runId} 已无可撤销的 apply（可能已撤销），请刷新列表`, "warn");
            } else if (e.status === 409) {
              toast(`Run #${runId} 状态已变更（可能已被撤销），请刷新`, "warn");
            } else {
              toast(`撤销失败：${e.message}`, "err");
            }
          } finally {
            setBusy(false);
            setUndoTarget(null);
          }
        };

        const submitRule = async () => {
          if (!form.name.trim()) { toast("请输入规则名称", "warn"); return; }
          const prefixes = form.source_prefixes.split(",").map((s) => s.trim()).filter(Boolean);
          if (prefixes.length === 0) { toast("请输入至少一个科目前缀", "warn"); return; }
          setBusy(true);
          try {
            await api("POST", `/orgs/${orgId}/reclassification-rules`, {
              name: form.name.trim(),
              description: `auditor-defined rule via UI · 阈值 ${form.threshold}`,
              when_condition: {
                account_code_starts: prefixes,
                balance_direction: form.direction,
                threshold: Number(form.threshold || 0),
              },
              action: {
                move_to_account_code: form.target_account.trim(),
                reason: `auto-reclass to ${form.target_account.trim()}`,
              },
              active: true,
              priority: 100,
            });
            toast(`已创建规则「${form.name.trim()}」`);
            setForm({ ...form, name: "" });
            setRefresh((x) => x + 1);
          } catch (e) {
            toast(`创建失败：${e.message}`, "err");
          } finally { setBusy(false); }
        };

        const doRun = async (mode) => {
          setBusy(true);
          setPreviewResult(null);
          try {
            const r = await api("POST",
              `/orgs/${orgId}/reclassification-runs/${mode === "preview" ? "preview" : "apply"}`,
              { period_id: period, triggered_by: "ui" });
            setPreviewResult(r);
            toast(`${mode === "preview" ? "Preview" : "Apply"} 完成：匹配 ${r.items_count || 0} 项`);
            if (mode === "apply") setRefresh((x) => x + 1);
          } catch (e) {
            if (e.status === 404) toast("没有可用导入或规则", "warn");
            else toast(`${mode} 失败：${e.message}`, "err");
          } finally { setBusy(false); }
        };

        return (
          <>
            <div className="card mb-3">
              <h3 className="card-title">规则列表 · 期间 <span className="mono">{period}</span></h3>
              {rules.loading ? <div className="text-sm text-muted">加载中…</div> :
               rules.error ? <div className="upload-result err">{rules.error.message}</div> :
               ((rules.data && rules.data.rules) || []).length === 0 ? (
                <EmptyState title="暂无重分类规则" desc="在下方表单创建第一条规则" />
              ) : (
                <table className="report-table">
                  <thead><tr><th>名称</th><th>条件</th><th>动作</th><th>状态</th><th>优先级</th><th>创建时间</th></tr></thead>
                  <tbody>
                    {rules.data.rules.map((r) => (
                      <tr key={r.rule_id} data-testid={`reclass-rule-${r.rule_id}`}>
                        <td><strong>{r.name}</strong>{r.description && <div className="text-xs text-muted">{r.description}</div>}</td>
                        <td className="mono text-xs">{JSON.stringify(r.when_condition)}</td>
                        <td className="mono text-xs">→ {(r.action && r.action.move_to_account_code) || "—"}</td>
                        <td>{r.active ? <span className="badge ok">启用</span> : <span className="badge">停用</span>}</td>
                        <td>{r.priority}</td>
                        <td className="text-xs text-muted">{fmtTs(r.created_at)}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              )}
            </div>

            <div className="card mb-3">
              <h3 className="card-title">新建规则</h3>
              <p className="card-sub">设定一条规则：当某些科目（按编码前缀匹配）的余额满足方向和金额条件时，自动把它们重分类到目标科目。</p>
              <div className="toolbar">
                <div><label className="lbl">规则名</label><input className="field" style={{ width: 220 }} value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} data-testid="reclass-form-name" /></div>
                <div><label className="lbl">源科目前缀 (逗号分隔)</label><input className="field" style={{ width: 200 }} value={form.source_prefixes} onChange={(e) => setForm({ ...form, source_prefixes: e.target.value })} data-testid="reclass-form-prefixes" /></div>
                <div><label className="lbl">目标科目</label><input className="field" style={{ width: 120 }} value={form.target_account} onChange={(e) => setForm({ ...form, target_account: e.target.value })} data-testid="reclass-form-target" /></div>
                <div><label className="lbl">阈值</label><input className="field" style={{ width: 120 }} value={form.threshold} onChange={(e) => setForm({ ...form, threshold: e.target.value })} data-testid="reclass-form-threshold" /></div>
                <div><label className="lbl">余额方向</label>
                  <select className="field" style={{ width: 100 }} value={form.direction} onChange={(e) => setForm({ ...form, direction: e.target.value })}>
                    <option value="debit">借方</option><option value="credit">贷方</option>
                  </select>
                </div>
                <div style={{ alignSelf: "flex-end" }}><button className="btn primary" disabled={busy} onClick={submitRule} data-testid="reclass-form-submit">创建规则</button></div>
              </div>
            </div>

            <div className="card mb-3">
              <h3 className="card-title">运行规则</h3>
              <p className="card-sub">「试算」只预览结果、不改动数据；「正式应用」会真正执行重分类，结果可在下方「历史记录」中 24 小时内撤销。</p>
              <div className="toolbar">
                <button className="btn" disabled={busy} onClick={() => doRun("preview")} data-testid="reclass-run-preview">试算（不改动数据）</button>
                <button className="btn primary" disabled={busy} onClick={() => doRun("apply")} data-testid="reclass-run-apply">正式应用</button>
              </div>
              {previewResult && (
                <div className="upload-result ok mt-3" data-testid="reclass-preview-result">
                  Run #{previewResult.run_id} · mode={previewResult.mode} · 匹配 {previewResult.items_count} 项 · 总额 {fmtMoney(previewResult.total_amount)}
                </div>
              )}
            </div>

            <div className="card">
              <h3 className="card-title">历史 Run</h3>
              {runs.loading ? <div className="text-sm text-muted">加载中…</div> :
               runs.error ? <div className="upload-result err">{runs.error.message}</div> :
               (runs.data || []).length === 0 ? <EmptyState title="该期间暂无 Run" /> : (
                <table className="report-table">
                  <thead><tr><th>Run</th><th>Mode</th><th>规则数</th><th>命中项</th><th>总额</th><th>开始</th><th>操作</th></tr></thead>
                  <tbody>
                    {(runs.data || []).map((r) => (
                      <tr key={r.run_id} data-testid={`reclass-run-${r.run_id}`}>
                        <td className="mono">#{r.run_id}</td>
                        <td>{r.mode}</td>
                        <td className="num">{r.rules_count}</td>
                        <td className="num">{r.items_count}</td>
                        <td className="num">{fmtMoney(r.total_amount)}</td>
                        <td className="text-xs text-muted">{fmtTs(r.started_at)}</td>
                        <td>
                          {_isUndoEligible(r) ? (
                            <button
                              className="btn"
                              style={{ padding: "2px 8px", fontSize: 12 }}
                              disabled={busy}
                              onClick={() => setUndoTarget(r)}
                              data-testid={`reclass-run-undo-${r.run_id}`}
                              title="撤销该次 apply（仅 24h 内可用）"
                            >
                              撤销
                            </button>
                          ) : r.undone_at ? (
                            <span className="badge" title={`已于 ${fmtTs(r.undone_at)} 撤销`}>已撤销</span>
                          ) : (
                            <span className="text-xs text-muted" title="apply 后 24h 撤销窗口已过">—</span>
                          )}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              )}
            </div>

            {undoTarget && (
              <div
                className="modal-backdrop"
                style={{
                  position: "fixed", inset: 0, background: "rgba(0,0,0,0.5)",
                  display: "flex", alignItems: "center", justifyContent: "center", zIndex: 9999,
                }}
                data-testid="reclass-undo-modal"
              >
                <div
                  className="card"
                  style={{ maxWidth: 480, width: "90%", background: "var(--bg, #fff)", padding: 20 }}
                >
                  <h3 className="card-title" style={{ marginTop: 0 }}>确认撤销 Run #{undoTarget.run_id}？</h3>
                  <p style={{ lineHeight: 1.6 }}>
                    该次 apply 已生效 <strong>{undoTarget.items_count}</strong> 条记录，
                    总额 <strong>{fmtMoney(undoTarget.total_amount)}</strong>。
                  </p>
                  <p className="text-sm text-muted" style={{ lineHeight: 1.5 }}>
                    撤销后这些重分类记录将回滚到原始科目，<br />
                    相关 ParseIssue 也会一并标记为 <span className="mono">superseded</span>。
                  </p>
                  <p className="text-xs text-muted" style={{ marginBottom: 16 }}>
                    （此操作不可再次撤销 —— 如需重做，请重新 apply 规则集。）
                  </p>
                  <div className="row" style={{ gap: 10, justifyContent: "flex-end" }}>
                    <button
                      className="btn"
                      onClick={() => setUndoTarget(null)}
                      disabled={busy}
                      data-testid="reclass-undo-cancel"
                    >
                      取消
                    </button>
                    <button
                      className="btn danger"
                      onClick={confirmUndo}
                      disabled={busy}
                      data-testid="reclass-undo-confirm"
                    >
                      {busy ? "撤销中…" : "确认撤销"}
                    </button>
                  </div>
                </div>
              </div>
            )}
          </>
        );
      }

      // ═══════════════════════════════════════════════════════════════════
      //  Tab · 跨期校验 (M1 W3 Stage 3)
      //
      //  Backend contract (`cross_period_routes.py`, 3 endpoints):
      //    POST /orgs/{id}/cross-period-checks                - trigger check
      //    GET  /orgs/{id}/cross-period-checks                - list history
      //    GET  /orgs/{id}/cross-period-checks/{check_id}     - detail diffs
      //
      //  Audit P1-B: shipped without front-end. This view lets the auditor
      //  trigger a new check (prior_period_id → current_period_id) and
      //  inspect the resulting differences ranked by severity.
      // ═══════════════════════════════════════════════════════════════════
      function CrossPeriodView({ orgId, period, toast }) {
        const [refresh, setRefresh] = useState(0);
        const [priorPeriod, setPriorPeriod] = useState("2024-FY");
        const [busy, setBusy] = useState(false);
        const [selected, setSelected] = useState(null);
        const list = useFetch(`/orgs/${orgId}/cross-period-checks`, [orgId, refresh]);
        const detail = useFetch(selected ? `/orgs/${orgId}/cross-period-checks/${selected}` : null, [orgId, selected]);

        const trigger = async () => {
          if (!priorPeriod || !period) { toast("请填写期初 / 期末 period", "warn"); return; }
          setBusy(true);
          try {
            const r = await api("POST", `/orgs/${orgId}/cross-period-checks`, {
              prior_period_id: priorPeriod,
              current_period_id: period,
              tolerance: 1.0,
              warn_threshold: 100.0,
              emit_parse_issues: false,
            });
            toast(`校验完成：${r.error_count || 0} 项 error / ${r.warning_count || 0} 项 warning`);
            setSelected(r.id);
            setRefresh((x) => x + 1);
          } catch (e) {
            if (e.status === 404) toast("缺少 prior/current 期的成功导入", "warn");
            else toast(`触发失败：${e.message}`, "err");
          } finally { setBusy(false); }
        };

        return (
          <>
            <div className="card mb-3">
              <h3 className="card-title">触发新校验</h3>
              <div className="toolbar">
                <div><label className="lbl">期初 period_id</label><input className="field" style={{ width: 160 }} value={priorPeriod} onChange={(e) => setPriorPeriod(e.target.value)} data-testid="xperiod-prior" /></div>
                <div><label className="lbl">期末 period_id</label><input className="field" style={{ width: 160 }} value={period} disabled /></div>
                <button className="btn primary" disabled={busy} onClick={trigger} data-testid="xperiod-trigger">校验</button>
              </div>
              <div className="text-xs text-muted mt-2">规则：上一期末 closing == 本期初 opening（容差 ±1.0；100 以上记 warning，超过则 error）。</div>
            </div>

            <div className="card mb-3">
              <h3 className="card-title">历史校验</h3>
              {list.loading ? <div className="text-sm text-muted">加载中…</div> :
               list.error ? <div className="upload-result err">{list.error.message}</div> :
               ((list.data && list.data.items) || []).length === 0 ? <EmptyState title="暂无校验记录" /> : (
                <table className="report-table">
                  <thead><tr><th>Check</th><th>期初 → 期末</th><th>账户总数</th><th>Error</th><th>Warning</th><th>创建</th><th></th></tr></thead>
                  <tbody>
                    {list.data.items.map((it) => (
                      <tr key={it.id} data-testid={`xperiod-row-${it.id}`}>
                        <td className="mono text-xs">{it.id}</td>
                        <td className="text-xs">{it.prior_period_id} → {it.current_period_id}</td>
                        <td className="num">{it.total_accounts}</td>
                        <td>{it.error_count > 0 ? <span className="badge err">{it.error_count}</span> : <span className="text-xs text-muted">0</span>}</td>
                        <td>{it.warning_count > 0 ? <span className="badge warn">{it.warning_count}</span> : <span className="text-xs text-muted">0</span>}</td>
                        <td className="text-xs text-muted">{fmtTs(it.created_at)}</td>
                        <td><button className="btn subtle sm" onClick={() => setSelected(it.id)} data-testid={`xperiod-detail-${it.id}`}>详情</button></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              )}
            </div>

            {selected && (
              <div className="card" data-testid="xperiod-detail-panel">
                <h3 className="card-title">校验差异 · <span className="mono text-xs">{selected}</span></h3>
                {detail.loading ? <div className="text-sm text-muted">加载中…</div> :
                 detail.error ? <div className="upload-result err">{detail.error.message}</div> :
                 (detail.data && (detail.data.differences || []).length === 0) ? <EmptyState title="该次校验无差异（全部 exact 匹配）" /> : (
                  <table className="report-table">
                    <thead><tr><th>科目</th><th>名称</th><th className="num">期末 closing</th><th className="num">期初 opening</th><th className="num">Δ</th><th>severity</th><th>备注</th></tr></thead>
                    <tbody>
                      {(detail.data && detail.data.differences || []).slice(0, 200).map((d, i) => (
                        <tr key={`${d.full_code}-${i}`}>
                          <td className="mono text-xs">{d.full_code}</td>
                          <td>{d.account_name || "—"}</td>
                          <td className="num">{fmtMoney(d.prior_closing)}</td>
                          <td className="num">{fmtMoney(d.current_opening)}</td>
                          <td className="num">{fmtMoney(d.delta)}</td>
                          <td>
                            {d.severity === "error" ? <span className="badge err">error</span> :
                             d.severity === "warning" ? <span className="badge warn">warning</span> :
                             d.severity === "tolerance" ? <span className="badge info">tolerance</span> :
                             <span className="badge ok">exact</span>}
                          </td>
                          <td className="text-xs text-muted">{d.note || "—"}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                )}
              </div>
            )}
          </>
        );
      }

      // ═══════════════════════════════════════════════════════════════════
      //  Tab · 现金流量表 (M2 Biz Stage 4 · indirect-method engine)
      //
      //  Backend contract (`cash_flow_routes.py`, 3 endpoints):
      //    GET  /orgs/{id}/cash-flow/keys     - publish synthetic key list
      //    POST /orgs/{id}/cash-flow/compute  - dry-run (no DB write)
      //    POST /orgs/{id}/cash-flow/persist  - compute + write to manual_inputs
      //
      //  Audit P1-B: 35+ derived `cf_*` keys are published by the engine
      //  but no front-end ever consumes them. This view triggers compute
      //  with optional prior_period_id (for BS Δ) and renders the resulting
      //  keys grouped by 经营 / 投资 / 筹资 bucket plus the net change.
      // ═══════════════════════════════════════════════════════════════════
      function CashFlowView({ orgId, period, toast }) {
        const [priorPeriod, setPriorPeriod] = useState("2024-FY");
        const [busy, setBusy] = useState(false);
        const [result, setResult] = useState(null);
        const keysInfo = useFetch(`/orgs/${orgId}/cash-flow/keys`, [orgId]);

        const compute = async (persist) => {
          setBusy(true);
          setResult(null);
          try {
            const path = persist ? "persist" : "compute";
            const r = await api("POST", `/orgs/${orgId}/cash-flow/${path}`, {
              period_id: period,
              prior_period_id: priorPeriod || null,
              decided_by: "ui",
            });
            setResult(r);
            if (persist) toast(`已写入 manual_inputs：${r.persisted || 0} 条`);
            else toast(`已计算 ${(r.keys || []).length} 个 cf_* 键`);
          } catch (e) {
            if (e.status === 404) toast("当前 org 不存在", "warn");
            else toast(`计算失败：${e.message}`, "err");
          } finally { setBusy(false); }
        };

        const groups = useMemo(() => {
          if (!result || !result.values) return [];
          const v = result.values;
          // Bucket cf_* keys by phase for readability; anything we don't
          // recognise lands in 其它派生项.
          const sect = (titles, prefixes) => ({
            title: titles, rows: Object.keys(v).filter((k) => prefixes.some((p) => k.startsWith(p))).sort(),
          });
          return [
            sect("经营活动 (cf_operating_*, cf_*delta)", ["cf_operating", "cf_ar_", "cf_ap_", "cf_other_receivables", "cf_other_payables", "cf_advance_", "cf_inventory_", "cf_taxes_payable", "cf_employee_payable", "cf_tax_refund", "cf_other_operating"]),
            sect("投资活动", ["cf_investing", "cf_fixed_assets", "cf_intangible_assets", "cf_lt_invest", "cf_other_investing"]),
            sect("筹资活动", ["cf_financing", "cf_st_borrowing", "cf_lt_borrowing", "cf_paid_in_capital", "cf_dividends_paid", "cf_interest_paid", "cf_interest_received", "cf_other_financing"]),
            sect("净增加与对账", ["cf_net_change", "cf_cash_delta_bs"]),
            sect("利润表锚点", ["cf_net_profit", "cf_operating_profit", "cf_finance_cost", "cf_depreciation", "cf_amortization", "cf_asset_impairment"]),
          ];
        }, [result]);

        return (
          <>
            <div className="card mb-3">
              <h3 className="card-title">间接法计算</h3>
              <div className="toolbar">
                <div><label className="lbl">期初 period_id (可选)</label><input className="field" style={{ width: 160 }} value={priorPeriod} onChange={(e) => setPriorPeriod(e.target.value)} data-testid="cashflow-prior" /></div>
                <div><label className="lbl">当期 period_id</label><input className="field" style={{ width: 160 }} value={period} disabled /></div>
                <button className="btn" disabled={busy} onClick={() => compute(false)} data-testid="cashflow-compute">仅计算</button>
                <button className="btn primary" disabled={busy} onClick={() => compute(true)} data-testid="cashflow-persist">计算并写入 manual_inputs</button>
              </div>
              {result && (
                <div className="upload-result ok mt-3" data-testid="cashflow-summary">
                  <span className="badge ok">PL 锚点 {result.has_pl_anchor ? "✓" : "—"}</span>{" "}
                  <span className="badge ok">本期 BS {result.has_balance ? "✓" : "—"}</span>{" "}
                  <span className="badge info">期初 BS {result.has_prior_balance ? "✓" : "—"}</span>
                  {" · "}{(result.keys || []).length} 个键
                  {typeof result.persisted === "number" && <> · 已写入 {result.persisted} 条</>}
                </div>
              )}
            </div>

            {result && groups.map((g) => g.rows.length > 0 && (
              <div key={g.title} className="card mb-3">
                <h3 className="card-title">{g.title}</h3>
                <table className="report-table">
                  <thead><tr><th>键</th><th className="num">值</th></tr></thead>
                  <tbody>
                    {g.rows.map((k) => (
                      <tr key={k} data-testid={`cashflow-cell-${k}`}>
                        <td className="mono text-xs">{k}</td>
                        <td className="num">{fmtMoney(result.values[k])}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            ))}

            {!result && keysInfo.data && (
              <div className="card">
                <h3 className="card-title">引擎发布的 cf_* 键 ({(keysInfo.data.synthetic_keys || []).length})</h3>
                <div className="text-xs text-muted" style={{ wordBreak: "break-all" }}>
                  {(keysInfo.data.synthetic_keys || []).join(" · ")}
                </div>
              </div>
            )}
          </>
        );
      }

      // ─────────────────────────────────────────────────────────────────
      //  Tab A：余额表导入
      // ─────────────────────────────────────────────────────────────────
      function ImportTab({ orgId, period, toast, onGoto, onUploaded }) {
        const imports = useFetch(`/orgs/${orgId}/imports`, [orgId]);
        const items = (imports.data && imports.data.imports) || [];

        const [uploading, setUploading] = useState(false);
        const [uploadPct, setUploadPct] = useState(0);
        const [lastResult, setLastResult] = useState(null);
        const [dragging, setDragging] = useState(false);
        const fileInputRef = useRef(null);
        const [previewId, setPreviewId] = useState(null);

        const upload = async (file) => {
          if (!file) return;
          if (!/\.(xls|xlsx)$/i.test(file.name)) {
            toast(`只接受 .xls / .xlsx 文件，收到：${file.name}`, "err");
            return;
          }
          setUploading(true);
          setLastResult(null);
          setUploadPct(0);
          try {
            // 用 XHR 走原生 progress 事件 —— fetch() 在浏览器侧没有上传进度。
            const result = await new Promise((resolve, reject) => {
              const xhr = new XMLHttpRequest();
              const fd = new FormData();
              fd.append("file", file);
              fd.append("period_id", period);
              xhr.open("POST", `${PLUGIN_BASE}/orgs/${orgId}/imports`);
              xhr.upload.onprogress = (e) => {
                if (e.lengthComputable) setUploadPct(Math.round((e.loaded / e.total) * 100));
              };
              xhr.onload = () => {
                try {
                  const body = JSON.parse(xhr.responseText || "{}");
                  if (xhr.status >= 200 && xhr.status < 300) resolve(body);
                  else reject(new Error(`${xhr.status} ${xhr.statusText} · ${(body && body.detail) || ""}`));
                } catch (e) { reject(e); }
              };
              xhr.onerror = () => reject(new Error("网络错误：无法连接到后端"));
              xhr.send(fd);
            });
            setLastResult({ ok: true, ...result, source_file: file.name });
            toast(`导入成功，共解析 ${result.row_count} 行（${result.parser_used}）`);
            imports.reload();
            // 关键：刷新父级 stepper 的 gating 信号（imports/issues/reports）。
            // 否则上传一张「0 不明数据」的干净净表后，父级 hasImport 仍为旧值，
            // 步骤 ②-⑥ 一直 disabled，用户只能手动刷新页面才恢复。
            if (onUploaded) onUploaded(result);
          } catch (e) {
            setLastResult({ ok: false, error: e.message, source_file: file.name });
            toast(`导入失败：${e.message}`, "err");
          } finally {
            setUploading(false);
          }
        };

        const onDrop = (e) => {
          e.preventDefault();
          setDragging(false);
          const f = e.dataTransfer.files && e.dataTransfer.files[0];
          if (f) upload(f);
        };

        return (
          <>
            <div className="card">
              <h3 className="card-title">上传余额表</h3>
              <p className="card-sub">
                把会计软件（金蝶 / 用友 / 管家婆等）导出的科目余额表上传进来，系统会自动识别格式并解析。
                支持 .xls 和 .xlsx，当前期间：<strong>{(PERIOD_OPTS.find((o) => o.v === period) || {}).l || period}</strong>。
              </p>
              <div
                className={`dropzone ${dragging ? "dragging" : ""} ${uploading ? "" : ""}`}
                onClick={() => !uploading && fileInputRef.current && fileInputRef.current.click()}
                onDragOver={(e) => { e.preventDefault(); setDragging(true); }}
                onDragLeave={() => setDragging(false)}
                onDrop={onDrop}
              >
                {uploading ? (
                  <>
                    <Spinner />
                    <div className="mt-2 text-sm">上传中… {uploadPct}%</div>
                    <div className="progress" style={{ maxWidth: 320, marginTop: 8 }}>
                      <div className="bar" style={{ width: `${uploadPct}%` }} />
                    </div>
                  </>
                ) : (
                  <>
                    <div style={{ fontSize: 14, fontWeight: 500 }}>拖拽 .xls / .xlsx 到此处</div>
                    <div className="hint">或点击选择文件 · 单文件不超过 64 MB</div>
                  </>
                )}
                <input
                  ref={fileInputRef}
                  type="file"
                  accept=".xls,.xlsx"
                  onChange={(e) => {
                    const f = e.target.files && e.target.files[0];
                    if (f) upload(f);
                    e.target.value = "";
                  }}
                />
              </div>

              {lastResult && (
                <div className={`upload-result ${lastResult.ok ? "ok" : "err"}`}>
                  {lastResult.ok ? (
                    <>
                      <div>
                        <strong>{lastResult.source_file}</strong> · 解析成功 · 共 {lastResult.row_count} 行 ·
                        识别格式：<span className="mono">{lastResult.parser_used}</span>
                        {lastResult.import_id && (
                          <>
                            {" · "}
                            <button className="btn subtle sm" onClick={() => setPreviewId(lastResult.import_id)}>查看明细</button>
                          </>
                        )}
                      </div>
                      {lastResult.parse_issues_detected > 0 ? (
                        <div className="mt-2 flex items-center gap-2" style={{ flexWrap: "wrap" }}>
                          <span>
                            检测到 <strong>{lastResult.parse_issues_detected}</strong> 项需要确认的科目
                            {lastResult.parse_issues_must_fix > 0 && <>（其中 <strong>{lastResult.parse_issues_must_fix}</strong> 项必须处理）</>}。
                          </span>
                          {onGoto && (
                            <button className="btn primary sm" onClick={() => onGoto("issues")}>前往「数据分流」处理 →</button>
                          )}
                        </div>
                      ) : (
                        // 净表场景（0 不明数据）：显式给出「下一步」入口，避免用户
                        // 卡在第一步、不知如何前进。父级 gating 已在 onUploaded 中刷新。
                        <div className="mt-2 flex items-center gap-2" style={{ flexWrap: "wrap" }}>
                          <span>未发现需要确认的科目，可直接进入下一步。</span>
                          {onGoto && (

              </div>
            </div>
          </div>
        );
      }

      // ─────────────────────────────────────────────────────────────────
      //  AIConsentBridge —— 把 WS event 对接到 AIConsentDialog
      //
      //  - 内部维护 pending 队列（同时来 N 个请求时按 FIFO 出队）
      //  - 用户决策后 POST /ai/consent/{event_id}/respond
      //    若后端尚未就绪（404）则只 console.warn，UI 不阻塞
      //  - 暴露 `setMockRequest()` 给 Stage 6 的「触发 mock」调试按钮
      // ─────────────────────────────────────────────────────────────────
      const _mockBus = {
        listeners: new Set(),
        push(req) { this.listeners.forEach((l) => l(req)); },
      };
      function pushMockConsent(req) { _mockBus.push(req); }

      function AIConsentBridge({ toast }) {
        const [queue, setQueue] = useState([]);
        const [conn, setConn] = useState({ state: "init" });
        const user = useUser();

        const onWSEvent = useCallback((msg) => {
          if (msg.event !== "ai_consent_request") return;
          if (!msg.dialog_id) return;
          setQueue((q) => q.find((x) => x.dialog_id === msg.dialog_id) ? q : [...q, msg]);
        }, []);

        const wsConn = useFinanceWS({ onEvent: onWSEvent });
        useEffect(() => setConn(wsConn), [wsConn.state]);

        useEffect(() => {
          const handler = (req) => setQueue((q) => [...q, req]);
          _mockBus.listeners.add(handler);
          return () => _mockBus.listeners.delete(handler);
        }, []);

        // 测试用：监听 window `mock_consent_request` 自定义事件，
        // 收到后用 buildSampleConsentRequest() 入队（Playwright 通过
        // `window.dispatchEvent(new CustomEvent('mock_consent_request'))` 触发）。
        useEffect(() => {
          const h = (ev) => {
            const req = (ev && ev.detail && ev.detail.dialog_id)
              ? ev.detail
              : buildSampleConsentRequest();
            pushMockConsent(req);
          };
          window.addEventListener("mock_consent_request", h);
          return () => window.removeEventListener("mock_consent_request", h);
        }, []);

        // 进入页面时若 URL 带 `?ai_mock=1`，自动注入一个示例请求
        useEffect(() => {
          if (new URLSearchParams(window.location.search).get("ai_mock") === "1") {
            setTimeout(() => pushMockConsent(buildSampleConsentRequest()), 800);
          }
        }, []);

        const current = queue[0];
        const respond = async (decision) => {
          if (!current) return;
          const isMock = String(current.dialog_id || "").startsWith("mock_");
          try {
            // 与 AI sibling `ai/routes.py::respond_consent` 契约：
            //   POST /ai/consent/respond  body={dialog_id, decision, skip_desensitize?}
            await api(
              "POST",
              "/ai/consent/respond",
              {
                dialog_id: current.dialog_id,
                decision,
                skip_desensitize: false,
              },
              { timeoutMs: 8000 },
            );
            toast(decision === "deny" ? "已拒绝 AI 请求" : "授权已记录", decision === "deny" ? "warn" : "ok");
          } catch (e) {
            if (isMock || e.status === 404) {
              // Backend route missing — log only so the workflow can
              // still complete locally without surfacing a confusing
              // "ok / warn" toast pair.
              console.info("[ai-consent] respond skipped (route unavailable):", { dialog_id: current.dialog_id, decision });
            } else {
              toast(`回执失败：${e.message}`, "err");
            }
          } finally {
            setQueue((q) => q.slice(1));
          }
        };

        // Native-dialog short-circuit: when running inside Tauri the
        // OS-level consent dialog is invoked first so the operator
        // sees a real "允许一次 / 拒绝" prompt instead of a webview
        // modal (M3 Infra Deliverable 3 / audit P1-A). The HTML modal
        // remains the source of truth (preview + permanent button +
        // 5s lockout); the native dialog only handles allow_once vs
        // deny so it doesn't bypass the mitigation rule.
        const nativeSupported = useTauriSupported();
        useEffect(() => {
          if (!current || !nativeSupported) return;
          let cancelled = false;
          const title = current.title || "AI 数据使用授权";
          const sensitivity = current.sensitivity_level || "metadata";
          const provider = current.model_provider || "—";
          const model = current.model_name || "—";
          const body = `场景：${current.scenario_id || current.scenario || "—"}\n敏感度：${sensitivity}\n模型：${model}（${provider}）\n\n是否允许本次发送（脱敏后）数据？\n选择"拒绝"将取消本次 AI 调用。`;
          tauriInvoke("show_finance_consent_dialog", { title, body }).then((res) => {
            if (cancelled) return;
            if (res && res.kind === "ok") {
              // Native dialog returned a verdict — short-circuit the
              // in-app modal so the user isn't asked twice.
              if (res.value === "allow_once" || res.value === "deny") {
                respond(res.value);
              }
            }
          });
          return () => { cancelled = true; };
          // eslint-disable-next-line react-hooks/exhaustive-deps
        }, [current && current.dialog_id, nativeSupported]);

        const cancel = () => {
          if (!current) return;
          // 关闭等同 deny（后端 30s 超时也会按 deny 处理）
          respond("deny");
        };

        return (
          <>
            {current && (
              <AIConsentDialog
                open
                title={current.title || "AI 数据使用授权"}
                scenario={current.scenario_id || current.scenario || "—"}
                scenarioDescription={current.scenario_description || ""}
                sensitivityLevel={current.sensitivity_level || "metadata"}
                previewPayload={current.preview_payload || "(empty)"}
                modelProvider={current.model_provider || "—"}
                modelName={current.model_name || "—"}
                isLocalEndpoint={!!current.is_local_endpoint}
                estimatedTokens={current.estimated_tokens ?? 0}
                onDecision={respond}
                onCancel={cancel}
              />
            )}
            {/* 隐藏角标：WS 连接状态（开发可见，端到端 e2e 也可读） */}
            <div
              data-testid="ws-conn-state"
              data-state={conn.state}
              style={{ display: "none" }}
            />
          </>
        );
      }

      function buildSampleConsentRequest() {
        // 给 mock 模式提供一个能完整跑通弹窗的样例请求（脱敏后）。
        // 字段名严格对齐后端 `ConsentRequestEvent` 的 snake_case schema。
        return {
          event: "ai_consent_request",
          dialog_id: `mock_${Date.now()}`,
          scenario_id: "account_classify",
          scenario_description: "S2 · 未识别科目归类",
          sensitivity_level: "metadata",
          preview_payload: JSON.stringify({
            account_names: ["应收-客户A", "应收-客户B保证金"],
            magnitudes: ["万元级", "千元级"],
          }, null, 2),
          model_provider: "anthropic",
          model_name: "claude-3-5-sonnet",
          is_local_endpoint: false,
          estimated_tokens: 280,
          requested_at: new Date().toISOString(),
          title: "AI 数据使用授权（演示）",
        };
      }

      // ═══════════════════════════════════════════════════════════════════
      //  多审计师协作 / 复核工作流 UI（4 角色：auditor / manager / partner / admin）
      //
      //  后端接口（已实现并注册）：
      //    POST   /users    + GET /users
      //    POST   /orgs/{id}/assignments    + GET /orgs/{id}/assignments
      //    POST   /orgs/{id}/reports/{rid}/review/submit
      //    POST   /orgs/{id}/reports/{rid}/review/approve
      //    POST   /orgs/{id}/reports/{rid}/review/request-changes
      //    POST   /orgs/{id}/reports/{rid}/review/sign-off
      //    POST   /orgs/{id}/reports/{rid}/cells/{cid}/comments
      //    GET    /orgs/{id}/reports/{rid}/comments
      //    GET    /orgs/{id}/reports/{rid}/workflows
      //
      //  单机模式定位：默认只显示本机管理员，不暴露演示用户切换。仅当后端
      //  /users 返回真实多用户时，切换器才出现（见 UserSwitcher）。
      // ═══════════════════════════════════════════════════════════════════

      const ROLE_META = {
        auditor: { label: "审计师",  badge: "info",  hint: "起草报表 / 在指派范围内编辑" },
        manager: { label: "经理",    badge: "warn",  hint: "复核报表 / 项目范围编辑 / 触发合并" },
        partner: { label: "合伙人",  badge: "ok",    hint: "签字 / 全局可写 / 用户指派" },
        admin:   { label: "管理员",  badge: "err",   hint: "用户 / 系统配置 · 不直接改报表" },
      };
      const ROLE_OPTS = Object.keys(ROLE_META).map((v) => ({ v, l: ROLE_META[v].label }));

      const _LOCAL_ADMIN_USER = { user_id: "local", display_name: "本机用户（管理员）", role: "admin", active: true };
      // 单机定位：默认只有本机管理员一个身份。示例多角色用户仅在演示模式
      // （?ai_mock=1）下注入，方便离线演示 RBAC 切换，不出现在正式使用中。
      const _LOCAL_USERS_FALLBACK = DEMO_MOCK
        ? [
            _LOCAL_ADMIN_USER,
            { user_id: "demo_auditor", display_name: "演示·审计师 张三", role: "auditor", active: true, mock: true },
            { user_id: "demo_manager", display_name: "演示·经理 李四",   role: "manager", active: true, mock: true },
            { user_id: "demo_partner", display_name: "演示·合伙人 王五", role: "partner", active: true, mock: true },
          ]
        : [_LOCAL_ADMIN_USER];

      function useUsersList() {
        const [users, setUsers] = useState(_LOCAL_USERS_FALLBACK);
        // hasRealUsers：后端真的返回了 local 以外的成员，才认为处于多用户
        // 部署，此时才显示可切换的用户列表；否则保持单机本机管理员。
        const [hasRealUsers, setHasRealUsers] = useState(false);
        const reload = useCallback(async () => {
          try {
            const r = await api("GET", "/users", null, { timeoutMs: 4000 });
            const list = (r && r.users) || [];
            const real = list.filter((u) => u.user_id && u.user_id !== "local");
            if (real.length) {
              setUsers(list); setHasRealUsers(true);
            } else {
              setUsers(_LOCAL_USERS_FALLBACK); setHasRealUsers(false);
            }
          } catch (e) {
            setUsers(_LOCAL_USERS_FALLBACK);
            setHasRealUsers(false);
          }
        }, []);
        useEffect(() => { reload(); }, [reload]);
        return { users, hasRealUsers, reload };
      }

      // 顶部用户身份指示 / 切换器。
      // 单机模式（默认）：只显示本机管理员的静态身份徽标，不暴露演示用户、
      // 不可切换——既符合「独立单机使用」的产品定位，也避免误导用户以为
      // 切换 demo 角色会真正改变权限。
      // 仅当后端返回真实多用户（hasRealUsers）或处于演示模式（?ai_mock=1）
      // 时，才渲染可切换的下拉列表；此时 api() 会带上 X-OpenAkita-User-Id，
      // 切换才真正对后端 RBAC 生效。
      function UserSwitcher({ toast }) {
        const user = useUser();
        const { users, hasRealUsers, reload } = useUsersList();
        const [open, setOpen] = useState(false);
        const [registerOpen, setRegisterOpen] = useState(false);
        const meta = ROLE_META[user.role] || ROLE_META.admin;

        if (!hasRealUsers && !DEMO_MOCK) {
          // 单机模式下没有可切换的其他用户，弱化为一个不抢眼的身份标识。
          return (
            <span
              className="identity-chip"
              data-testid="user-identity"
              title="单机模式：当前为本机管理员，拥有全部权限。多用户部署时此处会变为可切换列表。"
            >
              <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor"
                   strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                <circle cx="12" cy="7" r="4" />
              </svg>
              <span>本机管理员</span>
            </span>
          );
        }

        return (
          <>
            <div style={{ position: "relative" }}>
              <button
                className="btn sm"
                onClick={() => setOpen((x) => !x)}
                data-testid="user-switcher-btn"
                style={{ display: "flex", alignItems: "center", gap: 6 }}
                title={meta.hint}
              >
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor"
                     strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                  <circle cx="12" cy="7" r="4" />
                </svg>
                <span style={{ maxWidth: 120, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{user.displayName}</span>
                <span className={`badge ${meta.badge}`} style={{ fontSize: 10 }}>{meta.label}</span>
                <span>▾</span>
              </button>
              {open && (
                <div
                  style={{
                    position: "absolute", right: 0, top: "100%", marginTop: 4,
                    background: "var(--bg-card)", border: "1px solid var(--border-strong)",
                    borderRadius: "var(--radius)", boxShadow: "0 6px 22px rgba(15,23,42,0.18)",
                    minWidth: 260, zIndex: 80, padding: 6,
                  }}
                  onMouseLeave={() => setOpen(false)}
                  data-testid="user-switcher-menu"
                >
                  <div className="text-xs text-muted" style={{ padding: "4px 8px" }}>
                    {DEMO_MOCK && !hasRealUsers
                      ? "演示模式 · 示例用户（不影响真实权限）"
                      : `用户列表（${users.length} 人）`}
                  </div>
                  {users.map((u) => (
                    <button
                      key={u.user_id}
                      className="btn subtle sm"
                      style={{ display: "block", width: "100%", textAlign: "left", borderRadius: 4, padding: "6px 8px" }}
                      onClick={() => {
                        user.setUser({ id: u.user_id, name: u.display_name, role: u.role });
                        toast(`已切换到 ${u.display_name}`);
                        setOpen(false);
                      }}
                    >
                      <div>{u.display_name}</div>
                      <div className="text-xs text-muted">
                        <span className={`badge ${ROLE_META[u.role]?.badge || "info"}`} style={{ fontSize: 10 }}>{ROLE_META[u.role]?.label || u.role}</span>
                        <span className="mono" style={{ marginLeft: 6 }}>{u.user_id}</span>
                      </div>
                    </button>
                  ))}
                  <div className="divider" />
                  {(user.role === "admin") && (
                    <button
                      className="btn subtle sm"
                      style={{ display: "block", width: "100%", textAlign: "left", padding: "6px 8px" }}
                      onClick={() => { setOpen(false); setRegisterOpen(true); }}
                      data-testid="register-user"
                    >
                      + 注册新用户…
                    </button>
                  )}
                  <button
                    className="btn subtle sm"
                    style={{ display: "block", width: "100%", textAlign: "left", padding: "6px 8px" }}
                    onClick={() => {
                      user.setUser({ id: "local", name: "本机用户（管理员）", role: "admin" });
                      toast("已切回本机管理员");
                      setOpen(false);
                    }}
                  >
                    切回本机管理员
                  </button>
                </div>
              )}
            </div>
            {registerOpen && (
              <UserRegisterDialog
                onClose={() => setRegisterOpen(false)}
                onCreated={async (u) => {
                  setRegisterOpen(false);
                  toast(`用户「${u.display_name}」已创建`);
                  await reload();
                }}
                toast={toast}
              />
            )}
          </>
        );
      }

      function UserRegisterDialog({ onClose, onCreated, toast }) {
        const [userId, setUserId] = useState("user_" + Math.random().toString(36).slice(2, 10));
        const [name, setName] = useState("");
        const [email, setEmail] = useState("");
        const [role, setRole] = useState("auditor");
        const [submitting, setSubmitting] = useState(false);

        const submit = async () => {
          if (!name.trim()) { toast("请输入显示名称", "warn"); return; }
          setSubmitting(true);
          try {
            const u = await api("POST", "/users", {
              user_id: userId.trim(),
              display_name: name.trim(),
              role,
              email: email.trim(),
              active: true,
            });
            onCreated(u);
          } catch (e) {
            if (e.status === 404 && DEMO_MOCK) {
              try {
                const cur = JSON.parse(localStorage.getItem("finance.users.fallback") || "[]");
                const item = { user_id: userId.trim(), display_name: name.trim(), role, email: email.trim(), active: true, mock: true };
                localStorage.setItem("finance.users.fallback", JSON.stringify([...cur, item]));
                onCreated(item);
              } catch (ee) {
                toast(`本地保存失败：${ee.message}`, "err");
              }
            } else if (e.status === 404) {
              toast("后端不可用，用户未创建", "err");
            } else {
              toast(`创建失败：${e.message}`, "err");
            }
          } finally { setSubmitting(false); }
        };

        return (
          <Modal
            open
            onClose={submitting ? undefined : onClose}
            title="注册新用户"
            sub="仅管理员可见。需要后端启用多用户协作后，新用户才会同步到服务端。"
            footer={
              <>
                <button className="btn" onClick={onClose} disabled={submitting}>取消</button>
                <button className="btn primary" onClick={submit} disabled={submitting}>
                  {submitting && <Spinner />}创建
                </button>
              </>
            }
          >
            <div className="row cols-2">
              <div>
                <label className="lbl">用户 ID</label>
                <input className="field mono" value={userId} onChange={(e) => setUserId(e.target.value.trim())} />
              </div>
              <div>
                <label className="lbl">角色</label>
                <select className="field" value={role} onChange={(e) => setRole(e.target.value)}>
                  {ROLE_OPTS.map((o) => <option key={o.v} value={o.v}>{o.l}</option>)}
                </select>
              </div>
            </div>
            <div className="row mt-3">
              <div>
                <label className="lbl">显示名<span className="required">*</span></label>
                <input className="field" value={name} onChange={(e) => setName(e.target.value)} placeholder="例如：张三（项目经理）" />
              </div>
              <div>
                <label className="lbl">邮箱（可选）</label>
                <input className="field" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="zhang3@example.com" />
              </div>
            </div>
          </Modal>
        );
      }

      // 复核状态条 + 操作按钮（嵌入到 ReportView 顶部）
      const REVIEW_STATUS_META = {
        draft:           { label: "草稿",     badge: "" },
        pending_review:  { label: "待复核",   badge: "warn" },
        reviewed:        { label: "已复核",   badge: "info" },
        pending_signoff: { label: "待签字",   badge: "warn" },
        signed_off:     { label: "已签字 ✅", badge: "ok" },
        returned:        { label: "已打回",   badge: "err" },
      };
      const REVIEW_FLOW = ["draft", "pending_review", "reviewed", "pending_signoff", "signed_off"];

      function ReviewWorkflowBar({ orgId, reportId, toast }) {
        const user = useUser();
        const { data, error, reload } = useFetch(
          `/orgs/${orgId}/reports/${reportId}/workflows`,
          [orgId, reportId],
        );
        const [busy, setBusy] = useState(false);

        // 后端可能 404（路由未注册）→ 显示占位条
        const isMissing = error && error.status === 404;
        const wf = (data && data.workflows && data.workflows[0]) || null;
        const status = wf ? wf.status : "draft";
        const meta = REVIEW_STATUS_META[status] || REVIEW_STATUS_META.draft;

        const wrap = (fn) => async (...a) => { setBusy(true); try { await fn(...a); } finally { setBusy(false); } };

        const submit = wrap(async () => {
          try {
            await api("POST", `/orgs/${orgId}/reports/${reportId}/review/submit`, {
              auditor_id: user.userId,
              target_kind: "report_instance",
            });
            toast("已提交复核");
            reload();
          } catch (e) {
            if (e.status === 404) toast("提交失败：后端协作功能暂不可用", "err");
            else toast(`提交失败：${e.message}`, "err");
          }
        });
        const approve = wrap(async () => {
          try {
            await api("POST", `/orgs/${orgId}/reports/${reportId}/review/approve`, {
              actor_id: user.userId, note: "",
            });
            toast("复核已通过");
            reload();
          } catch (e) { toast(`批准失败：${e.message}`, "err"); }
        });
        const requestChanges = wrap(async () => {
          const reason = window.prompt("请输入打回原因（必填）：");
          if (!reason) return;
          try {
            await api("POST", `/orgs/${orgId}/reports/${reportId}/review/request-changes`, {
              actor_id: user.userId, reason,
            });
            toast("已要求修改");
            reload();
          } catch (e) { toast(`打回失败：${e.message}`, "err"); }
        });
        const signOff = wrap(async () => {
          try {
            await api("POST", `/orgs/${orgId}/reports/${reportId}/review/sign-off`, {
              actor_id: user.userId, note: "",
            });
            toast("已签字 · 报表锁定");
            reload();
          } catch (e) { toast(`签字失败：${e.message}`, "err"); }
        });

        const canSubmit = (user.role === "auditor" || user.role === "manager") && status === "draft";
        const canApprove = (user.role === "manager" || user.role === "partner") && (status === "pending_review");
        const canRequestChanges = (user.role === "manager" || user.role === "partner") && (status === "pending_review" || status === "pending_signoff");
        const canSignOff = user.role === "partner" && (status === "reviewed" || status === "pending_signoff");

        return (
          <div className="card" style={{ padding: 10, marginBottom: 12 }} data-testid="review-bar">
            <div style={{ display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
              <strong style={{ fontSize: 12 }}>复核流程：</strong>
              {REVIEW_FLOW.map((s, i) => (
                <span
                  key={s}
                  style={{
                    fontSize: 11, padding: "2px 8px", borderRadius: 999,
                    background: s === status ? "var(--primary)" : "var(--bg-soft)",
                    color: s === status ? "#fff" : "var(--text-muted)",
                    border: "1px solid var(--border)",
                  }}
                >
                  {i + 1}. {REVIEW_STATUS_META[s].label}
                </span>
              ))}
              {status === "returned" && <span className="badge err">已打回</span>}
              {wf && wf.return_reason && (
                <span className="text-xs text-muted">原因：{wf.return_reason}</span>
              )}
              <span style={{ flex: 1 }} />
              <span className={`badge ${meta.badge || "info"}`}>{meta.label}</span>
            </div>
            <div className="flex gap-2" style={{ marginTop: 8, flexWrap: "wrap" }}>
              {canSubmit && (
                <button className="btn primary sm" disabled={busy} onClick={submit} data-testid="review-submit">
                  提交复核
                </button>
              )}
              {canApprove && (
                <button className="btn primary sm" disabled={busy} onClick={approve} data-testid="review-approve">
                  批准
                </button>
              )}
              {canRequestChanges && (
                <button className="btn sm" disabled={busy} onClick={requestChanges}>要求修改</button>
              )}
              {canSignOff && (
                <button className="btn primary sm" disabled={busy} onClick={signOff} data-testid="review-signoff">
                  合伙人签字
                </button>
              )}
              {!canSubmit && !canApprove && !canRequestChanges && !canSignOff && (
                <span className="text-xs text-muted">
                  当前用户角色（<strong>{ROLE_META[user.role]?.label || user.role}</strong>）在状态「{meta.label}」下没有可执行操作。
                </span>
              )}
              {isMissing && (
                <span className="badge warn" title="后端协作功能暂不可用">
                  后端协作功能暂不可用
                </span>
              )}
            </div>
          </div>
        );
      }

      // 评论侧栏 —— 抽屉式，挂在 ReportView 右侧
      function CommentsDrawer({ orgId, reportId, focusCellId, onClose, toast }) {
        const path = `/orgs/${orgId}/reports/${reportId}/comments?include_resolved=true`;
        const { data, error, reload } = useFetch(path, [orgId, reportId]);
        const comments = (data && data.comments) || [];
        const [body, setBody] = useState("");
        const [submitting, setSubmitting] = useState(false);
        const user = useUser();
        const isMissing = error && error.status === 404;

        const filtered = focusCellId ? comments.filter((c) => c.cell_id === focusCellId) : comments;

        const submit = async () => {
          if (!body.trim()) return;
          setSubmitting(true);
          try {
            const url = focusCellId
              ? `/orgs/${orgId}/reports/${reportId}/cells/${focusCellId}/comments`
              : `/orgs/${orgId}/reports/${reportId}/comments`;
            await api("POST", url, {
              body: body.trim(),
              kind: "general",
              author_id: user.userId,
              mentions: [],
            });
            setBody("");
            reload();
            toast("评论已发布");
          } catch (e) {
            if (e.status === 404) toast("发布失败：后端协作功能暂不可用", "err");
            else toast(`发布失败：${e.message}`, "err");
          } finally { setSubmitting(false); }
        };

        return (
          <Drawer open onClose={onClose} title={focusCellId ? `评论 · cell ${focusCellId.slice(-12)}` : "报表评论"}>
            <BackendUnavailableBanner show={isMissing} onRetry={reload} detail="协作评论接口未响应" />
            <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 16 }}>
              {filtered.length === 0 && !isMissing && (
                <div className="empty">暂无评论</div>
              )}
              {filtered.map((c) => (
                <div key={c.id} style={{ padding: 10, background: "var(--bg-soft)", borderRadius: 6 }}>
                  <div className="text-xs text-muted">
                    <strong>{c.author_id}</strong> · <span className="badge info" style={{ fontSize: 10 }}>{c.kind}</span> · {fmtTs(c.created_at)}
                    {c.cell_id && <> · cell <span className="mono">{c.cell_id.slice(-8)}</span></>}
                  </div>
                  <div style={{ marginTop: 4 }}>{c.body}</div>
                </div>
              ))}
            </div>
            <div className="card" style={{ padding: 10 }}>
              <textarea
                className="field"
                rows={4}
                value={body}
                onChange={(e) => setBody(e.target.value)}
                placeholder={focusCellId ? "针对该单元格的评论…" : "整体评论…"}
                data-testid="comment-input"
              />
              <div className="flex gap-2 mt-2" style={{ justifyContent: "flex-end" }}>
                <button className="btn primary sm" disabled={submitting || !body.trim()} onClick={submit}>
                  {submitting && <Spinner />}发布
                </button>
              </div>
            </div>
          </Drawer>
        );
      }

      // ═══════════════════════════════════════════════════════════════════
      //  合并报表（Consolidation）UI
      //
      //  数据模型与接口（ConsolidationGroup / ConsolidationMember /
      //  EliminationEntry / ConsolidatedReport）均已实现并注册。
      //
      //  仅当 URL 带 ?ai_mock=1（演示模式）时，localStorage 键
      //  `finance.consolidation.groups.v1` 才作为离线演示数据生效；默认
      //  （生产 / 真实使用）后端不可达时展示 BackendUnavailableBanner，不
      //  伪造数据。
      // ═══════════════════════════════════════════════════════════════════

      const CONSOL_LS_KEY = "finance.consolidation.groups.v1";
      const ELIM_KIND_OPTS = [
        { v: "inter_ar_ap",       l: "内部往来抵消（AR/AP）" },
        { v: "inter_sales",       l: "内部销售抵消" },
        { v: "inter_investment",  l: "母对子投资抵消" },
        { v: "inter_profit",      l: "未实现内部利润" },
        { v: "minority_interest", l: "少数股东权益" },
        { v: "other",             l: "其他" },
      ];
      const JOIN_METHOD_META = {
        full:        { label: "全合并 (full)" },
        equity:      { label: "权益法 (equity)" },
        proportional:{ label: "比例合并 (proportional)" },
      };
      const REPORT_KIND_OPTS = [
        { v: "balance_sheet",    l: "资产负债表" },
        { v: "income_statement", l: "利润表" },
        { v: "cash_flow",        l: "现金流量表" },
      ];

      function _loadConsolStore() {
        if (!DEMO_MOCK) return {};
        try { return JSON.parse(localStorage.getItem(CONSOL_LS_KEY) || "{}") || {}; }
        catch { return {}; }
      }
      function _saveConsolStore(s) {
        if (!DEMO_MOCK) return;
        localStorage.setItem(CONSOL_LS_KEY, JSON.stringify(s));
      }
      function _ensureGroup(s, gid) {
        if (!s.groups) s.groups = {};
        if (!s.groups[gid]) s.groups[gid] = { members: [], eliminations: [], runs: [] };
        return s.groups[gid];
      }

      function ConsolidationListView({ period, setPeriod, onOpenGroup, toast }) {
        const [groups, setGroups] = useState([]);
        const [backendOk, setBackendOk] = useState(null);
        const [createOpen, setCreateOpen] = useState(false);

        const reload = useCallback(async () => {
          try {
            const r = await api("GET", "/consolidation-groups", null, { timeoutMs: 4000 });
            setGroups((r && r.groups) || []);
            setBackendOk(true);
          } catch (e) {
            const s = _loadConsolStore();
            setGroups(s.list || []);
            setBackendOk(false);
          }
        }, []);
        useEffect(() => { reload(); }, [reload]);

        return (
          <>
            <BackendUnavailableBanner show={backendOk === false} onRetry={reload} />
            <div className="flex items-center justify-between mb-3">
              <div>
                <h2 className="page-title">合并报表</h2>
                <p className="page-subtitle">
                  把多家子公司的报表按持股关系合并，自动抵消内部往来与投资，生成一套集团报表。当前 {groups.length} 个集团。
                </p>
              </div>
              <div className="flex items-center gap-3">
                <PeriodPicker period={period} setPeriod={setPeriod} />
                <button className="oa-btn" onClick={reload}>刷新</button>
                <button className="oa-btn oa-btn-primary" onClick={() => setCreateOpen(true)} data-testid="new-group-btn">
                  + 新建集团
                </button>
              </div>
            </div>

            <div className="oa-card" style={{ padding: 0, overflow: "hidden" }}>
              {groups.length === 0
                ? <EmptyState title="还没有集团" desc="点击右上角「+ 新建集团」开始创建" />
                : (
                  <table className="report-table">
                    <thead>
                      <tr>
                        <th>名称</th>
                        <th>母公司</th>
                        <th className="num">成员数</th>
                        <th>创建时间</th>
                        <th>操作</th>
                      </tr>
                    </thead>
                    <tbody>
                      {groups.map((g) => (
                        <tr key={g.group_id} className="cell-clickable" onClick={() => onOpenGroup(g.group_id)}>
                          <td><strong>{g.name}</strong>{g.description && <div className="text-xs text-muted">{g.description}</div>}</td>
                          <td className="mono text-xs">{g.parent_org_id}</td>
                          <td className="num">{g._members_count || 0}</td>
                          <td className="text-xs text-muted">{fmtTs(g.created_at) || "—"}</td>
                          <td><button className="btn subtle sm" onClick={(e) => { e.stopPropagation(); onOpenGroup(g.group_id); }}>打开 →</button></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                )}
            </div>

            {createOpen && (
              <ConsolidationCreateDialog
                onClose={() => setCreateOpen(false)}
                onCreated={async (g) => {
                  setCreateOpen(false);
                  toast(`集团「${g.name}」已创建`);
                  await reload();
                  onOpenGroup(g.group_id);
                }}
                toast={toast}
              />
            )}
          </>
        );
      }

      function ConsolidationCreateDialog({ onClose, onCreated, toast }) {
        const [name, setName] = useState("");
        const [desc, setDesc] = useState("");
        const [parentOrgId, setParentOrgId] = useState("");
        const [submitting, setSubmitting] = useState(false);
        const { data: orgsData } = useFetch("/orgs?limit=200", []);
        const orgs = (orgsData && orgsData.orgs) || [];

        const submit = async () => {
          if (!name.trim()) { toast("请输入集团名称", "warn"); return; }
          if (!parentOrgId) { toast("请选择母公司账套", "warn"); return; }
          setSubmitting(true);
          const payload = {
            name: name.trim(),
            parent_org_id: parentOrgId,
            description: desc.trim() || null,
            created_by: "local",
          };
          try {
            const g = await api("POST", "/consolidation-groups", payload);
            onCreated(g);
          } catch (e) {
            if (e.status === 404 && DEMO_MOCK) {
              const s = _loadConsolStore();
              if (!s.list) s.list = [];
              const gid = (s._nextId = (s._nextId || 1) + 1);
              const g = {
                group_id: gid,
                ...payload,
                created_at: new Date().toISOString(),
                updated_at: new Date().toISOString(),
                _members_count: 1,
                version: 1,
              };
              s.list.push(g);
              const gs = _ensureGroup(s, gid);
              gs.members.push({
                id: 1, group_id: gid, subsidiary_org_id: parentOrgId,
                ownership_pct: 100, join_method: "full", is_parent: true,
                added_at: new Date().toISOString(), version: 1,
              });
              _saveConsolStore(s);
              onCreated(g);
            } else if (e.status === 404) {
              toast("后端不可用，集团未创建", "err");
            } else {
              toast(`创建失败：${e.message}`, "err");
            }
          } finally { setSubmitting(false); }
        };

        return (
          <Modal
            open
            onClose={submitting ? undefined : onClose}
            title="新建集团"
            sub="创建后可在详情页添加子公司、抵消分录并触发合并。"
            footer={
              <>
                <button className="oa-btn" onClick={onClose} disabled={submitting}>取消</button>
                <button className="oa-btn oa-btn-primary" onClick={submit} disabled={submitting}>
                  {submitting && <Spinner />}创建
                </button>
              </>
            }
          >
            <div className="row">
              <div>
                <label className="oa-label">集团名称<span className="required">*</span></label>
                <input className="oa-input" value={name} onChange={(e) => setName(e.target.value)} placeholder="例如：集团 ABC" data-testid="group-name" />
              </div>
            </div>
            <div className="row mt-3">
              <div>
                <label className="oa-label">母公司账套<span className="required">*</span></label>
                <select className="oa-select" value={parentOrgId} onChange={(e) => setParentOrgId(e.target.value)} data-testid="group-parent">
                  <option value="">— 选择 —</option>
                  {orgs.map((o) => <option key={o.org_id} value={o.org_id}>{o.name}（{o.org_id.slice(-8)}）</option>)}
                </select>
              </div>
            </div>
            <div className="row mt-3">
              <div>
                <label className="oa-label">备注（可选）</label>
                <textarea className="oa-textarea" rows={2} value={desc} onChange={(e) => setDesc(e.target.value)} placeholder="可在此说明合并范围、报告期等" />
              </div>
            </div>
          </Modal>
        );
      }

      function ConsolidationDetailView({ groupId, period, setPeriod, onBack, onOpenReport, toast }) {
        const [tab, setTab] = useState("members");
        const [group, setGroup] = useState(null);
        const [members, setMembers] = useState([]);
        const [elims, setElims] = useState([]);
        const [runs, setRuns] = useState([]);
        const [backendOk, setBackendOk] = useState(null);
        const [loading, setLoading] = useState(true);

        const reload = useCallback(async () => {
          setLoading(true);
          try {
            const g = await api("GET", `/consolidation-groups/${groupId}`, null, { timeoutMs: 4000 });
            setGroup(g);
            setMembers((g && g.members) || []);
            const er = await api("GET", `/consolidation-groups/${groupId}/eliminations`).catch(() => ({ entries: [] }));
            setElims((er && er.entries) || []);
            const rr = await api("GET", `/consolidation-groups/${groupId}/reports`).catch(() => ({ reports: [] }));
            setRuns((rr && rr.reports) || []);
            setBackendOk(true);
          } catch (e) {
            const s = _loadConsolStore();
            const g = (s.list || []).find((x) => String(x.group_id) === String(groupId));
            setGroup(g || null);
            const gs = _ensureGroup(s, groupId);
            setMembers(gs.members || []);
            setElims(gs.eliminations || []);
            setRuns(gs.runs || []);
            setBackendOk(false);
          } finally { setLoading(false); }
        }, [groupId]);
        useEffect(() => { reload(); }, [reload]);

        if (loading) return <div className="oa-card"><Spinner /> 加载中…</div>;
        if (!group) return (
          <div className="oa-card">
            <button className="oa-btn mb-3" onClick={onBack}>← 返回</button>
            <div className="upload-result err">找不到集团 {groupId}</div>
          </div>
        );

        return (
          <>
            <BackendUnavailableBanner show={backendOk === false} onRetry={reload} />
            <div className="flex items-center justify-between mb-3">
              <div>
                <h2 className="page-title">{group.name}</h2>
                <p className="page-subtitle">
                  集团 #{group.group_id} · 母公司 <span className="mono">{group.parent_org_id}</span>
                </p>
              </div>
              <div className="flex items-center gap-3">
                <PeriodPicker period={period} setPeriod={setPeriod} />
                <button className="oa-btn" onClick={onBack}>← 返回列表</button>
                <button className="oa-btn" onClick={reload}>刷新</button>
              </div>
            </div>

            <div className="tabs" style={{ marginBottom: 12 }}>
              <button className={`tab ${tab === "members" ? "active" : ""}`} onClick={() => setTab("members")} data-testid="tab-members">成员（{members.length}）</button>
              <button className={`tab ${tab === "elim" ? "active" : ""}`} onClick={() => setTab("elim")} data-testid="tab-elim">抵消分录（{elims.length}）</button>
              <button className={`tab ${tab === "runs" ? "active" : ""}`} onClick={() => setTab("runs")} data-testid="tab-runs">合并报表（{runs.length}）</button>
            </div>

            {tab === "members" && (
              <ConsolidationMembersTab
                groupId={groupId}
                members={members}
                onChanged={reload}
                backendOk={backendOk}
                toast={toast}
              />
            )}
            {tab === "elim" && (
              <ConsolidationEliminationsTab
                groupId={groupId}
                elims={elims}
                period={period}
                onChanged={reload}
                backendOk={backendOk}
                toast={toast}
              />
            )}
            {tab === "runs" && (
              <ConsolidationRunsTab
                groupId={groupId}
                runs={runs}
                period={period}
                parentOrgId={group.parent_org_id}
                onChanged={reload}
                onOpenReport={onOpenReport}
                backendOk={backendOk}
                toast={toast}
              />
            )}
          </>
        );
      }

      function ConsolidationMembersTab({ groupId, members, onChanged, backendOk, toast }) {
        const [adding, setAdding] = useState(false);
        const [orgId, setOrgId] = useState("");
        const [pct, setPct] = useState("100");
        const [method, setMethod] = useState("full");
        const { data: orgsData } = useFetch("/orgs?limit=200", []);
        const orgs = (orgsData && orgsData.orgs) || [];

        const submit = async () => {
          if (!orgId) { toast("请选择子公司账套", "warn"); return; }
          const num = parseFloat(pct);
          if (Number.isNaN(num) || num < 0 || num > 100) { toast("持股比例需在 0-100", "warn"); return; }
          const payload = { subsidiary_org_id: orgId, ownership_pct: num, join_method: method, is_parent: false };
          try {
            await api("POST", `/consolidation-groups/${groupId}/members`, payload);
          } catch (e) {
            if (e.status !== 404) { toast(`添加失败：${e.message}`, "err"); return; }
            if (!DEMO_MOCK) { toast("后端不可用，成员未添加", "err"); return; }
            const s = _loadConsolStore();
            const gs = _ensureGroup(s, groupId);
            gs.members.push({ id: gs.members.length + 1, group_id: groupId, ...payload, added_at: new Date().toISOString(), version: 1 });
            const lg = (s.list || []).find((g) => String(g.group_id) === String(groupId));
            if (lg) lg._members_count = gs.members.length;
            _saveConsolStore(s);
          }
          setAdding(false); setOrgId(""); setPct("100"); setMethod("full");
          toast("成员已添加");
          onChanged();
        };

        return (
          <>
            <div className="oa-card mb-3">
              <button className="oa-btn oa-btn-primary" onClick={() => setAdding(true)} data-testid="add-member-btn">+ 添加子公司</button>
            </div>
            <div className="oa-card" style={{ padding: 0 }}>
              {members.length === 0 ? <EmptyState title="还没有成员" /> : (
                <table className="report-table">
                  <thead>
                    <tr><th>账套</th><th>角色</th><th className="num">持股比例</th><th>合并方法</th><th>加入时间</th></tr>
                  </thead>
                  <tbody>
                    {members.map((m) => (
                      <tr key={m.id}>
                        <td className="mono text-xs">{m.subsidiary_org_id}</td>
                        <td>{m.is_parent ? <span className="badge ok">母公司</span> : <span className="badge info">子公司</span>}</td>
                        <td className="num">{m.ownership_pct}%</td>
                        <td>{(JOIN_METHOD_META[m.join_method] || {}).label || m.join_method}</td>
                        <td className="text-xs text-muted">{fmtTs(m.added_at) || "—"}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              )}
            </div>
            {adding && (
              <Modal
                open
                onClose={() => setAdding(false)}
                title="添加子公司"
                footer={<><button className="oa-btn" onClick={() => setAdding(false)}>取消</button><button className="oa-btn oa-btn-primary" onClick={submit} data-testid="add-member-submit">添加</button></>}
              >
                <div className="row"><div>

              id: gs.eliminations.length + 1, group_id: groupId, ...payload,
              is_auto: false, created_at: new Date().toISOString(), version: 1,

        const [running, setRunning] = useState(false);
        const [periodId, setPeriodId] = useState(period);
        const [kind, setKind] = useState("balance_sheet");

        const trigger = async () => {
          setRunning(true);
          try {
            const r = await api("POST", `/consolidation-groups/${groupId}/runs?period_id=${encodeURIComponent(periodId)}&kind=${kind}`, null, { timeoutMs: 30000 });
            toast(`合并完成 #${r && r.consolidated_report_id || ""}`);
          } catch (e) {
            if (e.status !== 404) { toast(`合并失败：${e.message}`, "err"); return; }
            if (!DEMO_MOCK) { toast("后端不可用，无法触发合并", "err"); return; }
            const s = _loadConsolStore();
            const gs = _ensureGroup(s, groupId);
            gs.runs.push({
              consolidated_report_id: gs.runs.length + 1,
              group_id: groupId, period_id: periodId, kind,
              status: "ok", cells: [], minority_interest: "0",
              consolidation_meta: { mock: true },
              member_orgs_snapshot: [], elimination_ids: [],
              warnings: ["演示模式：使用本地占位数据"],
              generated_at: new Date().toISOString(), generated_by: "local", version: 1,
            });
            _saveConsolStore(s);
            toast(`演示模式：已生成本地合并结果`);
          } finally {
            setRunning(false);
            onChanged();
          }
        };

        return (
          <>
            <div className="oa-card mb-3">
              <div className="flex gap-2 items-center">
                <span style={{ fontSize: 12 }}>期间</span>
                <input className="oa-input mono" style={{ width: 120 }} value={periodId} onChange={(e) => setPeriodId(e.target.value)} />
                <span style={{ fontSize: 12 }}>报表类型</span>
                <select className="oa-select" style={{ width: 160 }} value={kind} onChange={(e) => setKind(e.target.value)}>
                  {REPORT_KIND_OPTS.map((o) => <option key={o.v} value={o.v}>{o.l}</option>)}
                </select>
                <button className="oa-btn oa-btn-primary" onClick={trigger} disabled={running} data-testid="trigger-run">
                  {running && <Spinner />}触发合并
                </button>
                {backendOk === false && <span className="badge warn">网络断开 · 缓存数据</span>}
              </div>
            </div>
            <div className="oa-card" style={{ padding: 0 }}>
              {runs.length === 0 ? <EmptyState title="还没有合并报表" desc="点击「触发合并」开始一次合并。" /> : (
                <table className="report-table">
                  <thead>
                    <tr><th>#</th><th>期间</th><th>类型</th><th>状态</th><th className="num">少数股东权益</th><th>生成时间</th><th>操作</th></tr>
                  </thead>
                  <tbody>
                    {runs.map((r) => (
                      <tr key={r.consolidated_report_id}>
                        <td className="mono text-xs">{r.consolidated_report_id}</td>
                        <td className="mono text-xs">{r.period_id}</td>
                        <td>{(REPORT_KIND_OPTS.find((x) => x.v === r.kind) || {}).l || r.kind}</td>
                        <td>{r.status === "ok" ? <span className="badge ok">成功</span> : r.status === "partial" ? <span className="badge warn">部分</span> : <span className="badge err">失败</span>}</td>
                        <td className="num mono">{fmtMoney(parseFloat(r.minority_interest || "0"))}</td>
                        <td className="text-xs text-muted">{fmtTs(r.generated_at)}</td>
                        <td>
                          {r.report_id || r.virtual_report_id
                            ? <button className="btn subtle sm" onClick={() => onOpenReport(parentOrgId, r.report_id || r.virtual_report_id)}>查看 →</button>

      // 敏感度图例：在场景列表顶部一次性解释"发给大模型的数据有多详细"三档含义。
      function SensitivityLegend() {
        return (
          <div className="oa-card mb-3">
            <div className="section-head" style={{ marginBottom: 10 }}>
              <div>
                <h3 className="section-head__title">数据敏感度说明</h3>
                <p className="section-head__desc">每个 AI 功能会发送给大模型多详细的数据，分三档。档位越高、越精确，但隐私风险也越大。</p>
              </div>
            </div>
            <div className="sens-legend">
              {["metadata", "aggregated", "raw"].map((k) => {
                const m = SENSITIVITY_META[k];
                return (
                  <div className="sens-legend__item" key={k}>
                    <span className={`sens-tag sens-tag--${k}`}>{m.icon} {m.label}</span>
                    <span>{m.plain}</span>
                  </div>
                );
              })}
            </div>
          </div>
        );
      }

      // 单个 AI 功能卡片：通俗名称 + 一句"帮你做什么" + 敏感度/本地/授权说明 + 启用开关。
      function ScenarioCard({ s, onPatch, raw = false }) {
        const effective = s.sensitivity_override || s.default_sensitivity;
        const enabled = (s.enabled_override === null || s.enabled_override === undefined)
          ? s.default_enabled : s.enabled_override;
        const sm = SENSITIVITY_META[effective] || SENSITIVITY_META.metadata;
        const idPart = `${raw ? "raw" : "scenario"}-enabled-${s.scenario_id}`;
        return (
          <div className={`scenario-card ${enabled ? "" : "is-off"} ${raw ? "is-raw" : ""}`}>
            <div className="scenario-card__head">
              <h3 className="scenario-card__title">{raw ? "🔴 " : ""}{scenarioTitle(s)}</h3>
              <label className="switch" title={enabled ? "点击停用此功能" : "点击启用此功能"}>
                <input
                  type="checkbox"
                  checked={enabled}
                  onChange={(e) => onPatch(s.scenario_id, { enabled: e.target.checked })}
                  data-testid={idPart}
                />
                <span className="switch__track" />
                {enabled ? "已开启" : "已关闭"}
              </label>
            </div>
            <p className="scenario-card__blurb">{scenarioBlurb(s)}</p>
            <div className="scenario-card__meta">
              <span className={`sens-tag sens-tag--${effective}`} title={sm.plain}>
                {sm.icon} 数据：{sm.label}
              </span>
              {s.is_local_only && (
                <span className="badge ok" title="数据只发送给本机 / 局域网内的模型，不经过公网。">仅本地处理</span>
              )}
              {s.require_dialog && (
                <span className="badge warn" title="首次使用此功能时会弹窗征求你的同意，之后可选择记住。">首次需授权</span>
              )}
            </div>
            <div className="scenario-card__foot">
              <label className="text-xs text-muted" title="调整此功能发送给大模型的数据详细程度（即上方说明的三档敏感度）。">
                数据敏感度
              </label>
              <select
                className="oa-input"
                style={{ width: 130, padding: "4px 8px" }}
                value={effective}
                onChange={(e) => onPatch(s.scenario_id, { sensitivity_override: e.target.value })}
                data-testid={raw ? `raw-sens-${s.scenario_id}` : undefined}
              >
                {Object.keys(SENSITIVITY_META).map((v) => (
                  <option key={v} value={v}>{SENSITIVITY_META[v].icon} {SENSITIVITY_META[v].label}</option>
                ))}
              </select>
            </div>
          </div>
        );
      }

      function AIRawScenariosTab({ toast }) {
        const [scenarios, setScenarios] = useState([]);
        const [error, setError] = useState(null);
        const [loading, setLoading] = useState(true);
        const [missing, setMissing] = useState(false);

        const reload = useCallback(async () => {
          setLoading(true); setError(null); setMissing(false);
          try {
            const r = await api("GET", "/ai/raw/scenarios");
            setScenarios((r && r.scenarios) || []);
            setLoading(false);
          } catch (e) {
            try {
              const r2 = await api("GET", "/ai/scenarios");
              const all = (r2 && r2.scenarios) || [];
              setScenarios(all.filter((s) => s.default_sensitivity === "raw"));
              setLoading(false);
            } catch (e2) {
              setError(e2);
              if (e2.status === 404) setMissing(true);
              setLoading(false);
            }
          }
        }, []);
        useEffect(() => { reload(); }, [reload]);

        const patch = async (sid, body) => {
          try {
            await api("PATCH", `/ai/scenarios/${sid}`, body);
            toast("已保存");
            reload();
          } catch (e) { toast(`保存失败：${e.message}`, "err"); }
        };

        if (loading) return <div className="oa-card"><Spinner /> 加载高级功能中…</div>;

        return (
          <>
            <div className="callout callout--danger mb-3">
              <svg className="callout__icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
                <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
                <line x1="12" y1="9" x2="12" y2="13" /><line x1="12" y1="17" x2="12.01" y2="17" />
              </svg>
              <div className="callout__body">
                <strong>高级功能会把完整明细发送给大模型（🔴 原始数据）</strong>
                <span>请先确认符合贵单位的数据合规要求再开启。首次使用时会弹窗征求你的同意，可选择"仅这一次"或"以后都允许"。</span>
              </div>
            </div>
            <BackendUnavailableBanner show={missing} onRetry={reload} detail="AI 高级功能接口未响应" />
            {scenarios.length === 0 && !missing
              ? <div className="oa-card"><EmptyState title="暂无高级功能" /></div>
              : (
                <div className="scenario-grid">
                  {scenarios.map((s) => (
                    <ScenarioCard key={s.scenario_id} s={s} onPatch={patch} raw />
                  ))}
                </div>
              )}
          </>
        );
      }

        const { data, error, loading, reload } = useFetch("/ai/scenarios", []);
        const scenarios = (data && data.scenarios) || [];
        const isMissing = error && error.status === 404;

        const patch = async (sid, body) => {
          try {
            await api("PATCH", `/ai/scenarios/${sid}`, body);
            toast("已保存");
            reload();
          } catch (e) {
            toast(`保存失败：${e.message}`, "err");
          }
        };

        if (loading) return <div className="oa-card"><Spinner /> 加载 AI 功能中…</div>;

        return (
          <>
            <div className="callout callout--info mb-3">
              <svg className="callout__icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
                <circle cx="12" cy="12" r="10" /><line x1="12" y1="16" x2="12" y2="12" /><line x1="12" y1="8" x2="12.01" y2="8" />

              <div className="callout__body">

                <span>你可以随时开启或关闭某项功能，并调整它发送给大模型的数据详细程度。默认都已选用风险较低的档位。</span>
              </div>
            </div>
            <BackendUnavailableBanner show={isMissing} onRetry={reload} detail="AI 功能接口未响应" />
            {scenarios.length === 0 && !isMissing && <div className="oa-card"><EmptyState title="暂无可用的 AI 功能" /></div>}
            {scenarios.length > 0 && (
              <>
                <SensitivityLegend />
                <div className="scenario-grid">
                  {scenarios.map((s) => (
                    <ScenarioCard key={s.scenario_id} s={s} onPatch={patch} />
                  ))}
                </div>
              </>
            )}
          </>
        );
      }

      function AIConsentTab({ toast }) {
        const user = useUser();
        const [activeOnly, setActiveOnly] = useState(true);
        const url = `/ai/consent?user_id=${encodeURIComponent(user.userId)}&active_only=${activeOnly}`;
        const { data, error, loading, reload } = useFetch(url, [user.userId, activeOnly]);
        const consents = (data && data.consents) || [];
        const active = (data && data.active_permanent) || 0;
        const isMissing = error && error.status === 404;

        const revoke = async (cid) => {
          if (!window.confirm("确认撤销该永久授权？")) return;
          try {
            await api("DELETE", `/ai/consent/${cid}`);
            toast("授权已撤销");
            reload();
          } catch (e) { toast(`撤销失败：${e.message}`, "err"); }
        };

        if (loading) return <div className="oa-card"><Spinner /> 加载授权记录…</div>;

        return (
          <>
            <div className="oa-card mb-3" style={{ padding: 10 }}>
              <div className="flex items-center gap-2">
                <span className="text-xs text-muted">用户：<span className="mono">{user.userId}</span></span>
                <span style={{ flex: 1 }} />
                <label style={{ display: "inline-flex", alignItems: "center", gap: 4, fontSize: 12 }}>
                  <input type="checkbox" checked={activeOnly} onChange={(e) => setActiveOnly(e.target.checked)} />

                </label>
                <span className="badge ok">生效永久授权 {active}</span>
                <button className="oa-btn" onClick={reload}>刷新</button>
              </div>
            </div>
            <BackendUnavailableBanner show={isMissing} onRetry={reload} detail="AI 授权列表接口未响应" />
            <div className="oa-card" style={{ padding: 0 }}>
              {consents.length === 0 && !isMissing && <EmptyState title="还没有任何授权记录" />}
              {consents.length > 0 && (
                <table className="report-table">

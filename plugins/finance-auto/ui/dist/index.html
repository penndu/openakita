        const [backendOk, setBackendOk] = useState(null);
        const [generating, setGenerating] = useState(false);

        const reloadDocs = useCallback(async (oid) => {
          if (!oid) return;
          try {
            const r = await api("GET", `/orgs/${oid}/notes/documents`, null, { timeoutMs: 4000 });
            setDocs((r && r.documents) || []);
            setBackendOk(true);
          } catch (e) {
            const s = _loadNotesMock();
            setDocs(s.documents || []);
            setBackendOk(false);
          }
        }, []);

        useEffect(() => { if (orgId) reloadDocs(orgId); }, [orgId, reloadDocs]);

        const openDoc = async (d) => {
          setSelectedDoc(d);
          if (backendOk) {
            try {
              const r = await api("GET", `/orgs/${orgId}/notes/documents/${d.doc_id}/notes`);
              setNotes((r && r.notes) || []);
              return;
            } catch (e) { /* fall through to mock */ }
          }
          setNotes(d.notes || []);
        };

        const generate = async () => {
          if (!orgId) { toast("请选择账套", "warn"); return; }
          setGenerating(true);
          try {
            await api("POST", `/orgs/${orgId}/notes/generate`, { period_id: periodId });
            toast("已生成附注文档");
            reloadDocs(orgId);
          } catch (e) {
            if (e.status === 404) {
              const s = _loadNotesMock();
              const newDoc = {
                doc_id: `doc_mock_${Math.random().toString(36).slice(2, 8)}`,
                org_id: orgId, period_id: periodId, status: "draft",
                notes_count: 1, created_at: new Date().toISOString(),
                notes: [{ note_id: `n_${Date.now()}`, section_title: "新生成附注", kind: "narrative_pending_ai", version: 1, content: "（mock 占位）" }],
              };
              s.documents = [newDoc, ...(s.documents || [])];
              _saveNotesMock(s);
              setDocs(s.documents);
              toast("M3 Sibling A 后端尚未上线，已生成本地占位文档", "warn");
            } else {
              toast(`生成失败：${e.message}`, "err");
            }
          } finally { setGenerating(false); }
        };

        const saveNote = async (note, newContent) => {
          try {
            const updated = await api("PATCH", `/orgs/${orgId}/notes/${note.note_id}`, { content: newContent, version: note.version });
            toast("已保存（版本 +1）");
            setNotes((cur) => cur.map((x) => x.note_id === note.note_id ? { ...x, content: newContent, version: (updated && updated.version) || (note.version + 1) } : x));
          } catch (e) {
            if (e.status === 404 || e.status === 409 && !backendOk) {
              const s = _loadNotesMock();
              const doc = (s.documents || []).find((x) => x.doc_id === selectedDoc.doc_id);
              if (doc) {
                doc.notes = (doc.notes || []).map((x) => x.note_id === note.note_id ? { ...x, content: newContent, version: (note.version || 1) + 1 } : x);
                _saveNotesMock(s);
              }
              setNotes((cur) => cur.map((x) => x.note_id === note.note_id ? { ...x, content: newContent, version: (x.version || 1) + 1 } : x));
              toast("已保存到本地 mock", "warn");
            } else if (e.status === 409) {
              toast("版本冲突，请刷新后再保存", "err");
            } else {
              toast(`保存失败：${e.message}`, "err");
            }
          }
        };

        const finalize = async () => {
          if (!selectedDoc) return;
          if (!window.confirm("确认定稿？定稿后将无法继续修改。")) return;
          try {
            await api("POST", `/orgs/${orgId}/notes/documents/${selectedDoc.doc_id}/finalize`, {});
            toast("已定稿");
            const upd = { ...selectedDoc, status: "finalized" };
            setSelectedDoc(upd);
            setDocs((cur) => cur.map((x) => x.doc_id === upd.doc_id ? upd : x));
          } catch (e) {
            if (e.status === 404) {
              const s = _loadNotesMock();
              const d = (s.documents || []).find((x) => x.doc_id === selectedDoc.doc_id);
              if (d) { d.status = "finalized"; _saveNotesMock(s); }
              setSelectedDoc({ ...selectedDoc, status: "finalized" });
              setDocs((cur) => cur.map((x) => x.doc_id === selectedDoc.doc_id ? { ...x, status: "finalized" } : x));
              toast("已在本地 mock 定稿", "warn");
            } else { toast(`定稿失败：${e.message}`, "err"); }
          }
        };

        const exportMd = async () => {
          if (!selectedDoc) return;
          try {
            const resp = await api("GET", `/orgs/${orgId}/notes/documents/${selectedDoc.doc_id}/export?format=md`, null, { raw: true });
            if (!resp.ok) throw Object.assign(new Error("export failed"), { status: resp.status });
            const blob = await resp.blob();
            _triggerDownload(blob, `${selectedDoc.doc_id}.md`);
          } catch (e) {
            const md = `# ${selectedDoc.doc_id}\n\n_period: ${selectedDoc.period_id}_\n\n` +
              (notes || []).map((n) => `## ${n.section_title}\n\n${n.content || ""}\n`).join("\n");
            _triggerDownload(new Blob([md], { type: "text/markdown" }), `${selectedDoc.doc_id}.md`);
            toast("后端导出未上线，已使用本地 mock 导出", "warn");
          }
        };

        const isFinalized = selectedDoc && selectedDoc.status === "finalized";

        return (
          <>
            <div className="flex items-center justify-between mb-3">
              <div>
                <h2 className="page-title">报表附注</h2>
                <p className="page-subtitle">
                  根据余额表 / 报表生成附注草稿，AI 协助起草文字段落
                  {backendOk === false && <span className="badge warn" style={{ marginLeft: 8 }}>M3 Sibling A 后端尚未上线（mock）</span>}
                </p>
              </div>
            </div>

            <div className="card mb-3">
              <div className="row" style={{ gap: 12, alignItems: "flex-end", flexWrap: "wrap" }}>
                <div>
                  <label className="lbl">账套</label>
                  <select className="field" style={{ width: 240 }} value={orgId} onChange={(e) => setOrgId(e.target.value)} data-testid="notes-org">
                    <option value="">— 请选择 —</option>
                    {orgs.map((o) => <option key={o.id} value={o.id}>{o.name || o.id}</option>)}
                  </select>
                </div>
                <div>
                  <label className="lbl">期间</label>
                  <input className="field" style={{ width: 120 }} value={periodId} onChange={(e) => setPeriodId(e.target.value)} data-testid="notes-period" />
                </div>
                <button className="btn primary" onClick={generate} disabled={!orgId || generating} data-testid="notes-generate">
                  {generating ? <Spinner /> : "生成附注"}
                </button>
                <button className="btn" onClick={() => orgId && reloadDocs(orgId)} disabled={!orgId}>刷新</button>
              </div>
            </div>

            <div className="card" style={{ padding: 0, marginBottom: 12 }}>
              {(!orgId || docs.length === 0) ? <EmptyState title={orgId ? "暂无附注文档" : "请先选择账套"} />
                : (
                  <table className="report-table">
                    <thead><tr><th>文档</th><th>期间</th><th>状态</th><th className="num">附注数</th><th>创建时间</th></tr></thead>
                    <tbody>
                      {docs.map((d) => (
                        <tr key={d.doc_id} className="cell-clickable" onClick={() => openDoc(d)}>
                          <td className="mono text-xs">{d.doc_id}</td>
                          <td>{d.period_id}</td>
                          <td>{d.status === "finalized" ? <span className="badge ok">已定稿</span> : <span className="badge">草稿</span>}</td>
                          <td className="num">{d.notes_count ?? (d.notes || []).length}</td>
                          <td className="text-xs text-muted">{fmtTs(d.created_at)}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                )}
            </div>

            {selectedDoc && (
              <div className="card">
                <div className="flex items-center justify-between mb-3">
                  <div>
                    <h3 className="card-title">附注详情 · <span className="mono text-xs">{selectedDoc.doc_id}</span></h3>
                    <p className="card-sub">期间 {selectedDoc.period_id} · {(notes || []).length} 个段落</p>
                  </div>
                  <div className="flex gap-2">
                    <button className="btn" onClick={exportMd} data-testid="notes-export">导出 Markdown</button>
                    <button className="btn primary" onClick={finalize} disabled={isFinalized} data-testid="notes-finalize">
                      {isFinalized ? "已定稿" : "定稿"}
                    </button>
                  </div>
                </div>
                <div className="grid" style={{ gap: 8 }}>
                  {(notes || []).map((n) => <NoteCard key={n.note_id} note={n} disabled={isFinalized} onSave={(c) => saveNote(n, c)} />)}
                </div>
              </div>
            )}
          </>
        );
      }

      function NoteCard({ note, disabled, onSave }) {
        const [open, setOpen] = useState(true);
        const [content, setContent] = useState(note.content || "");
        useEffect(() => { setContent(note.content || ""); }, [note.note_id, note.version]);
        const meta = NOTE_KIND_META[note.kind] || { label: note.kind, cls: "" };
        return (
          <div className="card" style={{ padding: 10, background: "var(--bg-soft, rgba(0,0,0,0.02))" }}>
            <div className="flex items-center justify-between" style={{ cursor: "pointer" }} onClick={() => setOpen(!open)}>
              <div className="flex items-center gap-2">
                <strong>{note.section_title}</strong>
                <span className={`badge ${meta.cls}`}>{meta.label}</span>
                <span className="text-xs text-muted">v{note.version}</span>
              </div>
              <span className="text-xs text-muted">{open ? "▾" : "▸"}</span>
            </div>
            {open && (
              <div className="mt-3">
                <textarea className="field" rows={4} value={content} disabled={disabled}
                  onChange={(e) => setContent(e.target.value)} data-testid={`note-content-${note.note_id}`} />
                <div className="flex justify-end mt-3">
                  <button className="btn primary sm" disabled={disabled || content === note.content}
                    onClick={() => onSave(content)} data-testid={`note-save-${note.note_id}`}>保存</button>
                </div>
              </div>
            )}
          </div>
        );
      }

      function _triggerDownload(blob, filename) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url; a.download = filename;
        document.body.appendChild(a); a.click();
        setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 100);
      }

      // ═══════════════════════════════════════════════════════════════════
      //  M3 · 同业对比（Peer Comparison）—— Sibling A 后端：
      //    POST /orgs/{oid}/peer-comparison/run
      //    GET  /orgs/{oid}/peer-comparison/results
      //    GET  /peer-benchmarks
      //  AI 增强分析使用 Sibling B 的 S7 自然语言查询（/ai/raw/nl-query）。
      //  路由未注册（404）时静默回退本地 mock：finance.peer.mock.v1
      // ═══════════════════════════════════════════════════════════════════
      const PEER_LS_KEY = "finance.peer.mock.v1";
      const INDUSTRY_PEER_OPTS = [
        { v: "manufacturing", l: "制造业" },
        { v: "restaurant",    l: "餐饮服务" },
        { v: "tech_service",  l: "科技服务业" },
      ];
      const QUARTILE_META = {
        well_below:    { label: "远低于同业", cls: "err"  },
        below:         { label: "低于同业",   cls: "warn" },
        median_band:   { label: "处于中位",   cls: ""     },
        above:         { label: "高于同业",   cls: "info" },
        well_above:    { label: "远高于同业", cls: "ok"   },
      };
      const PEER_METRICS = [
        { key: "gross_margin",     label: "毛利率",     suffix: "%", scale: 100 },
        { key: "current_ratio",    label: "流动比率",   suffix: "",  scale: 1   },
        { key: "asset_turnover",   label: "资产周转率", suffix: "",  scale: 1   },
        { key: "debt_ratio",       label: "资产负债率", suffix: "%", scale: 100 },
      ];

      function _loadPeerMock() {
        try {
          const s = JSON.parse(localStorage.getItem(PEER_LS_KEY) || "null");
          if (s && s.results) return s;
        } catch {}
        const seed = { results: [] };
        localStorage.setItem(PEER_LS_KEY, JSON.stringify(seed));
        return seed;
      }
      function _savePeerMock(s) { localStorage.setItem(PEER_LS_KEY, JSON.stringify(s)); }

      function _quartileOf(value, p25, p50, p75) {
        if (value < p25 * 0.7) return "well_below";
        if (value < p25) return "below";
        if (value <= p75) return "median_band";
        if (value < p75 * 1.3) return "above";
        return "well_above";
      }

      function _buildMockPeerResult(orgId, periodId, industryCode) {
        const benchmarks = {
          manufacturing: { gross_margin: { p25: 0.18, p50: 0.25, p75: 0.32 }, current_ratio: { p25: 1.1, p50: 1.6, p75: 2.2 }, asset_turnover: { p25: 0.6, p50: 0.9, p75: 1.3 }, debt_ratio: { p25: 0.35, p50: 0.50, p75: 0.65 } },
          restaurant:    { gross_margin: { p25: 0.45, p50: 0.55, p75: 0.65 }, current_ratio: { p25: 0.8, p50: 1.2, p75: 1.7 }, asset_turnover: { p25: 1.5, p50: 2.2, p75: 3.0 }, debt_ratio: { p25: 0.40, p50: 0.55, p75: 0.70 } },
          tech_service:  { gross_margin: { p25: 0.55, p50: 0.68, p75: 0.78 }, current_ratio: { p25: 1.5, p50: 2.5, p75: 3.5 }, asset_turnover: { p25: 0.4, p50: 0.7, p75: 1.0 }, debt_ratio: { p25: 0.20, p50: 0.35, p75: 0.50 } },
        }[industryCode] || {};
        const orgVals = {
          gross_margin: 0.22 + Math.random() * 0.4,
          current_ratio: 0.9 + Math.random() * 2.0,
          asset_turnover: 0.5 + Math.random() * 1.5,
          debt_ratio: 0.25 + Math.random() * 0.4,
        };
        const metrics = {};
        for (const m of PEER_METRICS) {
          const b = benchmarks[m.key] || { p25: 0.1, p50: 0.5, p75: 0.9 };
          const v = orgVals[m.key];
          metrics[m.key] = { value: v, p25: b.p25, p50: b.p50, p75: b.p75, quartile: _quartileOf(v, b.p25, b.p50, b.p75) };
        }
        return {
          result_id: `peer_mock_${Math.random().toString(36).slice(2, 8)}`,
          org_id: orgId, period_id: periodId, industry_code: industryCode,
          metrics, created_at: new Date().toISOString(),
        };
      }

      function PeerComparisonView({ toast }) {
        const { data: orgsData } = useFetch("/orgs?limit=200", []);
        const orgs = (orgsData && orgsData.organizations) || [];
        const [orgId, setOrgId] = useState("");
        const [periodId, setPeriodId] = useState("2025-FY");
        const [industryCode, setIndustryCode] = useState("manufacturing");
        const [running, setRunning] = useState(false);
        const [current, setCurrent] = useState(null);
        const [history, setHistory] = useState([]);
        const [backendOk, setBackendOk] = useState(null);
        const [aiResult, setAiResult] = useState(null);
        const [aiBusy, setAiBusy] = useState(false);

        const reloadHistory = useCallback(async (oid) => {
          if (!oid) return;
          try {
            const r = await api("GET", `/orgs/${oid}/peer-comparison/results`, null, { timeoutMs: 4000 });
            setHistory((r && r.results) || []);
            setBackendOk(true);
          } catch (e) {
            const s = _loadPeerMock();
            setHistory((s.results || []).filter((x) => x.org_id === oid));
            setBackendOk(false);
          }
        }, []);

        useEffect(() => { if (orgId) reloadHistory(orgId); }, [orgId, reloadHistory]);

        const run = async () => {
          if (!orgId) { toast("请选择账套", "warn"); return; }
          setRunning(true); setAiResult(null);
          const body = { period_id: periodId, industry_code: industryCode };
          try {
            const r = await api("POST", `/orgs/${orgId}/peer-comparison/run`, body);
            setCurrent(r);
            toast("同业对比完成");
            reloadHistory(orgId);
          } catch (e) {
            if (e.status === 404) {
              const mock = _buildMockPeerResult(orgId, periodId, industryCode);
              const s = _loadPeerMock();
              s.results = [mock, ...(s.results || [])].slice(0, 50);
              _savePeerMock(s);
              setCurrent(mock);
              setHistory(s.results.filter((x) => x.org_id === orgId));
              toast("M3 Sibling A 后端尚未上线，已使用本地 mock 计算", "warn");
            } else { toast(`计算失败：${e.message}`, "err"); }
          } finally { setRunning(false); }
        };

        const aiAnalyze = async () => {
          if (!current) return;
          setAiBusy(true);
          const question = "解读本次同业对比结果";
          const metrics_json = JSON.stringify(current.metrics);
          try {
            const r = await api("POST", `/ai/raw/nl-query`, { question, context_json: metrics_json, execute_sql: false });
            setAiResult({ ok: true, sql: r.sql || "", summary: r.summary || r.text || "" });
          } catch (e) {
            if (e.status === 404) {
              setAiResult({ ok: false, sql: "-- M3 Sibling B raw NL query 后端尚未上线\n-- 占位 SQL\nSELECT industry_code, AVG(gross_margin) FROM peer_benchmarks GROUP BY industry_code;", summary: "（占位）AI 摘要将在 Sibling B 后端上线后自动启用。" });
              toast("M3 Sibling B 后端尚未上线，AI 增强使用占位结果", "warn");
            } else { toast(`AI 分析失败：${e.message}`, "err"); }
          } finally { setAiBusy(false); }
        };

        return (
          <>
            <div className="flex items-center justify-between mb-3">
              <div>
                <h2 className="page-title">同业对比</h2>
                <p className="page-subtitle">
                  比对四项核心指标 vs 行业 25/50/75 分位
                  {backendOk === false && <span className="badge warn" style={{ marginLeft: 8 }}>M3 Sibling A 后端尚未上线（mock）</span>}
                </p>
              </div>
            </div>

            <div className="card mb-3">
              <div className="row" style={{ gap: 12, alignItems: "flex-end", flexWrap: "wrap" }}>
                <div>
                  <label className="lbl">账套</label>
                  <select className="field" style={{ width: 240 }} value={orgId} onChange={(e) => setOrgId(e.target.value)} data-testid="peer-org">
                    <option value="">— 请选择 —</option>
                    {orgs.map((o) => <option key={o.id} value={o.id}>{o.name || o.id}</option>)}
                  </select>
                </div>
                <div>
                  <label className="lbl">期间</label>
                  <input className="field" style={{ width: 120 }} value={periodId} onChange={(e) => setPeriodId(e.target.value)} />
                </div>
                <div>
                  <label className="lbl">行业</label>
                  <select className="field" style={{ width: 160 }} value={industryCode} onChange={(e) => setIndustryCode(e.target.value)} data-testid="peer-industry">
                    {INDUSTRY_PEER_OPTS.map((x) => <option key={x.v} value={x.v}>{x.l}</option>)}
                  </select>
                </div>
                <button className="btn primary" onClick={run} disabled={!orgId || running} data-testid="peer-run">
                  {running ? <Spinner /> : "运行对比"}
                </button>
              </div>
            </div>

            {current && (
              <div className="card mb-3">
                <div className="flex items-center justify-between mb-3">
                  <div>
                    <h3 className="card-title">本次结果 · <span className="mono text-xs">{current.result_id}</span></h3>
                    <p className="card-sub">行业 {current.industry_code} · {fmtTs(current.created_at)}</p>
                  </div>
                  <button className="btn" onClick={aiAnalyze} disabled={aiBusy} data-testid="peer-ai">
                    {aiBusy ? <Spinner /> : "AI 增强分析"}
                  </button>
                </div>
                <div className="grid" style={{ gridTemplateColumns: "repeat(auto-fit, minmax(280px, 1fr))", gap: 10 }}>
                  {PEER_METRICS.map((m) => {
                    const d = (current.metrics || {})[m.key];
                    if (!d) return null;
                    return <PeerMetricCard key={m.key} meta={m} data={d} />;
                  })}
                </div>
                {aiResult && (
                  <div className="card mt-3" style={{ padding: 10, background: "rgba(59,130,246,0.05)" }}>
                    <h4 className="card-title">AI 增强分析（S7 自然语言查询）</h4>
                    <pre className="mono text-xs" style={{ background: "var(--bg-soft, rgba(0,0,0,0.04))", padding: 8, borderRadius: 4, overflowX: "auto" }}>{aiResult.sql || "(无 SQL)"}</pre>
                    <div className="mt-3"><strong>AI 摘要：</strong> {aiResult.summary || "（暂无）"}</div>
                  </div>
                )}
              </div>
            )}

            <div className="card" style={{ padding: 0 }}>
              <div style={{ padding: 10, borderBottom: "1px solid var(--border, rgba(0,0,0,0.08))" }}>
                <strong>历史结果</strong> <span className="text-xs text-muted">{history.length} 条</span>
              </div>
              {history.length === 0 ? <EmptyState title="暂无历史" /> : (
                <table className="report-table">
                  <thead><tr><th>结果 ID</th><th>期间</th><th>行业</th><th>创建时间</th><th></th></tr></thead>
                  <tbody>
                    {history.map((h) => (
                      <tr key={h.result_id} className="cell-clickable" onClick={() => setCurrent(h)}>
                        <td className="mono text-xs">{h.result_id}</td>
                        <td>{h.period_id}</td>
                        <td>{(INDUSTRY_PEER_OPTS.find((x) => x.v === h.industry_code) || {}).l || h.industry_code}</td>
                        <td className="text-xs text-muted">{fmtTs(h.created_at)}</td>
                        <td><button className="btn subtle sm">查看 →</button></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              )}
            </div>
          </>
        );
      }

      function PeerMetricCard({ meta, data }) {
        const q = QUARTILE_META[data.quartile] || { label: data.quartile, cls: "" };
        const valFmt = (v) => `${(v * meta.scale).toFixed(2)}${meta.suffix}`;
        const minP = Math.min(data.p25, data.value) * 0.9;
        const maxP = Math.max(data.p75, data.value) * 1.1;
        const range = maxP - minP || 1;
        const xOf = (v) => Math.max(0, Math.min(200, ((v - minP) / range) * 200));
        return (
          <div className="card" style={{ padding: 10, background: "var(--bg-soft, rgba(0,0,0,0.02))" }}>
            <div className="flex items-center justify-between">
              <strong>{meta.label}</strong>
              <span className={`badge ${q.cls}`}>{q.label}</span>
            </div>
            <div className="text-xl mt-3" style={{ fontWeight: 600 }}>{valFmt(data.value)}</div>
            <svg width="200" height="40" style={{ marginTop: 6 }} aria-label={`peer-chart-${meta.key}`}>
              <line x1="0" y1="20" x2="200" y2="20" stroke="rgba(0,0,0,0.1)" strokeWidth="1" />
              <rect x={xOf(data.p25)} y="14" width={Math.max(2, xOf(data.p75) - xOf(data.p25))} height="12" fill="rgba(59,130,246,0.25)" />
              <line x1={xOf(data.p50)} y1="10" x2={xOf(data.p50)} y2="30" stroke="rgba(59,130,246,0.9)" strokeWidth="2" />
              <line x1={xOf(data.value)} y1="4" x2={xOf(data.value)} y2="36" stroke="rgba(220,38,38,0.95)" strokeWidth="2" />
              <circle cx={xOf(data.value)} cy="20" r="3" fill="rgba(220,38,38,0.95)" />
            </svg>
            <div className="text-xs text-muted">
              p25 {valFmt(data.p25)} · p50 {valFmt(data.p50)} · p75 {valFmt(data.p75)}
            </div>
          </div>
        );
      }

      // ═══════════════════════════════════════════════════════════════════
      //  M3 · 密钥管理（Key Management，admin）—— Sibling C 后端：
      //    GET  /admin/key-versions
      //    POST /admin/key-rotate           body { org_id }
      //    GET  /admin/backups
      //    POST /admin/backups              body { org_id, passphrase }
      //    POST /admin/backups/{id}/restore body { passphrase }
      //    GET  /admin/backups/{id}/download
      //    GET  /admin/system-info
      //  路由未注册（404）时静默回退本地 mock：finance.km.mock.v1
      // ═══════════════════════════════════════════════════════════════════
      const KM_LS_KEY = "finance.km.mock.v1";

      function _loadKmMock() {
        try {
          const s = JSON.parse(localStorage.getItem(KM_LS_KEY) || "null");
          if (s && s.versions) return s;
        } catch {}
        const seed = {
          versions: [
            { org_id: "(mock-org-001)", version: 1, kdf_salt_short: "a8f3e1c2", last_rotated_at: new Date(Date.now() - 86400000 * 30).toISOString(), status: "active" },
            { org_id: "(mock-org-002)", version: 3, kdf_salt_short: "d51b9e07", last_rotated_at: new Date(Date.now() - 86400000 * 7).toISOString(),  status: "active" },
          ],
          backups: [
            { id: "bkp_001", org_id: "(mock-org-001)", size_bytes: 1048576, encrypted: true, created_at: new Date(Date.now() - 86400000 * 2).toISOString() },
          ],
          system_info: {
            tauri_version: "2.0.0",
            os: "Windows 10",
            openakita_version: "0.3.0-dev",
            key_store_backend: "OS keychain (mock)",
          },
        };
        localStorage.setItem(KM_LS_KEY, JSON.stringify(seed));
        return seed;
      }
      function _saveKmMock(s) { localStorage.setItem(KM_LS_KEY, JSON.stringify(s)); }

      function KeyManagementView({ toast }) {
        const [versions, setVersions] = useState([]);
        const [backups, setBackups] = useState([]);
        const [sysInfo, setSysInfo] = useState(null);
        const [backendOk, setBackendOk] = useState(null);
        const [confirmRotate, setConfirmRotate] = useState(null);
        const [confirmRestore, setConfirmRestore] = useState(null);
        const [restorePass, setRestorePass] = useState("");
        const [createOrgId, setCreateOrgId] = useState("");
        const [createPass, setCreatePass] = useState("");
        const [busy, setBusy] = useState(false);

        const reload = useCallback(async () => {
          try {
            const v = await api("GET", "/admin/key-versions", null, { timeoutMs: 4000 });
            setVersions((v && v.versions) || []);
            setBackendOk(true);
          } catch (e) {
            const s = _loadKmMock();
            setVersions(s.versions || []); setBackendOk(false);
          }
          try {
            const b = await api("GET", "/admin/backups");
            setBackups((b && b.backups) || []);
          } catch (e) {
            const s = _loadKmMock();
            setBackups(s.backups || []);
          }
          try {
            const i = await api("GET", "/admin/system-info");
            setSysInfo(i || null);
          } catch (e) {
            const s = _loadKmMock();
            setSysInfo(s.system_info || null);
          }
        }, []);
        useEffect(() => { reload(); }, [reload]);

        const doRotate = async () => {
          if (!confirmRotate) return;
          setBusy(true);
          try {
            await api("POST", "/admin/key-rotate", { org_id: confirmRotate.org_id });
            toast(`已轮换 ${confirmRotate.org_id} 的密钥`);
          } catch (e) {
            if (e.status === 404) {
              const s = _loadKmMock();
              s.versions = (s.versions || []).map((v) => v.org_id === confirmRotate.org_id ? { ...v, version: v.version + 1, kdf_salt_short: Math.random().toString(36).slice(2, 10), last_rotated_at: new Date().toISOString() } : v);
              _saveKmMock(s);
              toast("M3 Sibling C 后端尚未上线，已在本地 mock 轮换", "warn");
            } else { toast(`轮换失败：${e.message}`, "err"); setBusy(false); return; }
          }
          setConfirmRotate(null); setBusy(false); reload();
        };

        const doRestore = async () => {
          if (!confirmRestore) return;
          if (!restorePass) { toast("请输入口令", "warn"); return; }
          setBusy(true);
          try {
            await api("POST", `/admin/backups/${confirmRestore.id}/restore`, { passphrase: restorePass });
            toast("已恢复");
          } catch (e) {
            if (e.status === 404) toast("M3 Sibling C 后端尚未上线，恢复操作仅占位", "warn");
            else { toast(`恢复失败：${e.message}`, "err"); setBusy(false); return; }
          }
          setConfirmRestore(null); setRestorePass(""); setBusy(false);
        };

        const doCreate = async () => {
          if (!createOrgId.trim() || !createPass.trim()) { toast("请填写账套与口令", "warn"); return; }
          setBusy(true);
          try {
            await api("POST", "/admin/backups", { org_id: createOrgId.trim(), passphrase: createPass });
            toast("备份已创建");
            setCreateOrgId(""); setCreatePass("");
          } catch (e) {
            if (e.status === 404) {
              const s = _loadKmMock();
              s.backups = [{ id: `bkp_${Math.random().toString(36).slice(2, 8)}`, org_id: createOrgId.trim(), size_bytes: 1048576, encrypted: true, created_at: new Date().toISOString() }, ...(s.backups || [])];
              _saveKmMock(s); setCreateOrgId(""); setCreatePass("");
              toast("M3 Sibling C 后端尚未上线，已在本地 mock 记录备份", "warn");
            } else { toast(`备份失败：${e.message}`, "err"); }
          }
          setBusy(false); reload();
        };

        const doDownload = async (b) => {
          try {
            const resp = await api("GET", `/admin/backups/${b.id}/download`, null, { raw: true });
            if (!resp.ok) throw Object.assign(new Error("download failed"), { status: resp.status });
            const blob = await resp.blob();
            _triggerDownload(blob, `${b.id}.bak`);
          } catch (e) {
            const blob = new Blob([`MOCK BACKUP ${b.id}\norg_id=${b.org_id}\ncreated_at=${b.created_at}\n`], { type: "application/octet-stream" });
            _triggerDownload(blob, `${b.id}.bak`);
            toast("后端下载未上线，已生成 mock 占位文件", "warn");
          }
        };

        return (
          <>
            <div className="flex items-center justify-between mb-3">
              <div>
                <h2 className="page-title">密钥管理</h2>
                <p className="page-subtitle">
                  按账套查看 KDF 密钥版本 / 轮换 / 备份恢复
                  {backendOk === false && <span className="badge warn" style={{ marginLeft: 8 }}>M3 Sibling C 后端尚未上线（mock）</span>}
                </p>
              </div>
              <button className="btn" onClick={reload}>刷新</button>
            </div>

            <div className="card mb-3" style={{ padding: 0 }}>
              <div style={{ padding: 10, borderBottom: "1px solid var(--border, rgba(0,0,0,0.08))" }}>
                <strong>当前密钥版本</strong>
              </div>
              {versions.length === 0 ? <EmptyState title="暂无密钥记录" /> : (
                <table className="report-table">
                  <thead><tr><th>账套</th><th>版本</th><th>盐前缀</th><th>最近轮换</th><th>状态</th><th>操作</th></tr></thead>
                  <tbody>
                    {versions.map((v) => (
                      <tr key={v.org_id}>
                        <td className="mono text-xs">{v.org_id}</td>
                        <td>v{v.version}</td>
                        <td className="mono text-xs">{v.kdf_salt_short}</td>
                        <td className="text-xs text-muted">{fmtTs(v.last_rotated_at)}</td>
                        <td>{v.status === "active" ? <span className="badge ok">生效中</span> : <span className="badge">{v.status}</span>}</td>
                        <td><button className="btn danger sm" onClick={() => setConfirmRotate(v)} data-testid={`km-rotate-${v.org_id}`}>轮换密钥</button></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              )}
            </div>

            <div className="card mb-3">
              <h3 className="card-title">备份</h3>
              <div className="row" style={{ gap: 10, alignItems: "flex-end", flexWrap: "wrap", marginBottom: 10 }}>
                <div>
                  <label className="lbl">账套 ID</label>
                  <input className="field" style={{ width: 220 }} value={createOrgId} onChange={(e) => setCreateOrgId(e.target.value)} data-testid="km-backup-org" />
                </div>
                <div>
                  <label className="lbl">备份口令</label>
                  <input className="field" type="password" style={{ width: 200 }} value={createPass} onChange={(e) => setCreatePass(e.target.value)} data-testid="km-backup-pass" />
                </div>
                <button className="btn primary" onClick={doCreate} disabled={busy} data-testid="km-backup-create">创建备份</button>
              </div>
              {backups.length === 0 ? <EmptyState title="暂无备份" /> : (
                <table className="report-table">
                  <thead><tr><th>ID</th><th>账套</th><th className="num">大小</th><th>加密</th><th>创建时间</th><th>操作</th></tr></thead>
                  <tbody>
                    {backups.map((b) => (
                      <tr key={b.id}>
                        <td className="mono text-xs">{b.id}</td>
                        <td className="mono text-xs">{b.org_id}</td>
                        <td className="num">{(b.size_bytes / 1024).toFixed(1)} KB</td>
                        <td>{b.encrypted ? <span className="badge ok">已加密</span> : <span className="badge warn">未加密</span>}</td>
                        <td className="text-xs text-muted">{fmtTs(b.created_at)}</td>
                        <td>
                          <button className="btn subtle sm" onClick={() => doDownload(b)} data-testid={`km-download-${b.id}`}>下载</button>
                          {" "}
                          <button className="btn warn sm" onClick={() => setConfirmRestore(b)} data-testid={`km-restore-${b.id}`}>恢复</button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              )}
            </div>

            {sysInfo && (
              <div className="card">
                <h3 className="card-title">系统信息</h3>
                <div className="row cols-2" style={{ gap: 10 }}>
                  <div><label className="lbl">Tauri 版本</label><div className="mono text-xs">{sysInfo.tauri_version || "—"}</div></div>
                  <div><label className="lbl">操作系统</label><div className="mono text-xs">{sysInfo.os || "—"}</div></div>
                  <div><label className="lbl">OpenAkita 版本</label><div className="mono text-xs">{sysInfo.openakita_version || "—"}</div></div>
                  <div><label className="lbl">密钥存储后端</label><div className="mono text-xs">{sysInfo.key_store_backend || "—"}</div></div>
                </div>
              </div>
            )}

            <Modal
              open={!!confirmRotate}
              onClose={() => !busy && setConfirmRotate(null)}
              title="确认轮换密钥"
              sub={confirmRotate ? `账套 ${confirmRotate.org_id} · 当前 v${confirmRotate.version}` : ""}
              footer={
                <>
                  <button className="btn" onClick={() => !busy && setConfirmRotate(null)} disabled={busy}>取消</button>
                  <button className="btn danger" onClick={doRotate} disabled={busy} data-testid="km-rotate-confirm">{busy ? <Spinner /> : "确认轮换"}</button>
                </>
              }
            >
              <div className="text-sm">
                此操作会重加密所有敏感字段，可能需几十秒。继续？
              </div>
            </Modal>

            <Modal
              open={!!confirmRestore}
              onClose={() => !busy && (setConfirmRestore(null), setRestorePass(""))}
              title="确认恢复备份"
              sub={confirmRestore ? `备份 ${confirmRestore.id}` : ""}
              footer={
                <>
                  <button className="btn" onClick={() => !busy && (setConfirmRestore(null), setRestorePass(""))} disabled={busy}>取消</button>
                  <button className="btn warn" onClick={doRestore} disabled={busy} data-testid="km-restore-confirm">{busy ? <Spinner /> : "确认恢复"}</button>
                </>
              }
            >
              <div className="text-sm mb-3">恢复将覆盖当前账套数据，操作不可撤销。请输入备份口令：</div>
              <input className="field" type="password" value={restorePass} onChange={(e) => setRestorePass(e.target.value)} placeholder="备份口令" data-testid="km-restore-pass" />
            </Modal>
          </>
        );
      }

      // ─────────────────────────────────────────────────────────────────
      //  顶部导航：账套 / 合并报表 / 报表附注 / 同业对比 / 密钥管理 / AI 设置
      // ─────────────────────────────────────────────────────────────────
      function MainNav({ active, navigate }) {
        const items = [
          { key: "orgs",            label: "账套",       hash: "#/orgs" },
          { key: "consolidation",   label: "合并报表",   hash: "#/consolidation" },
          { key: "notes-editor",    label: "报表附注",   hash: "#/notes-editor" },
          { key: "peer-comparison", label: "同业对比",   hash: "#/peer-comparison" },
          { key: "key-management",  label: "密钥管理",   hash: "#/key-management" },
          { key: "ai-settings",     label: "AI 设置",    hash: "#/ai-settings" },
        ];
        return (
          <div className="tabs" style={{ marginBottom: 12 }}>
            {items.map((it) => (
              <button
                key={it.key}
                className={`tab ${active === it.key ? "active" : ""}`}
                onClick={() => navigate(it.hash)}
                data-testid={`nav-${it.key}`}
              >
                {it.label}
              </button>
            ))}
          </div>
        );
      }

      // ─────────────────────────────────────────────────────────────────
      //  Root：极简 hash router（#/orgs / #/orgs/<id> / #/orgs/<id>/reports/<rid>
      //  / #/consolidation / #/consolidation/<gid> / #/ai-settings）
      // ─────────────────────────────────────────────────────────────────
      function App() {
        const [route, setRoute] = useState(window.location.hash || "#/orgs");
        const [period, setPeriod] = useState("2025-FY");
        const toasts = useToasts();

        // Stage 4 · 用户上下文（M2 单本机仍是占位切换器；多用户后端接入留 v0.3）
        const [userId, setUserId] = useState(() => localStorage.getItem("finance.user.id") || "local");
        const [displayName, setDisplayName] = useState(() => localStorage.getItem("finance.user.name") || "本机用户（admin）");
        const [role, setRole] = useState(() => localStorage.getItem("finance.user.role") || "admin");
        const userCtxValue = useMemo(() => ({
          userId, displayName, role,
          setRole: (r) => { setRole(r); localStorage.setItem("finance.user.role", r); },
          setUser: (u) => {
            setUserId(u.id); setDisplayName(u.name); setRole(u.role);
            localStorage.setItem("finance.user.id", u.id);
            localStorage.setItem("finance.user.name", u.name);
            localStorage.setItem("finance.user.role", u.role);
          },
        }), [userId, displayName, role]);

        useEffect(() => {
          const onHash = () => setRoute(window.location.hash || "#/orgs");
          window.addEventListener("hashchange", onHash);
          // 让主程的 PluginAppHost 立即收起 loading 罩 —— 第一帧已经渲染了。
          postBridge({ type: "bridge:render-ready", pluginId: PLUGIN_ID });
          return () => window.removeEventListener("hashchange", onHash);
        }, []);

        const navigate = (h) => { window.location.hash = h; };

        // 解析路由
        const m1 = route.match(/^#\/orgs\/?$/);
        const m2 = route.match(/^#\/orgs\/([^/]+)\/?$/);
        const m3 = route.match(/^#\/orgs\/([^/]+)\/reports\/([^/]+)\/?$/);
        const mC1 = route.match(/^#\/consolidation\/?$/);
        const mC2 = route.match(/^#\/consolidation\/([^/]+)\/?$/);
        const mAI = route.match(/^#\/ai-settings\/?$/);
        const mNotes = route.match(/^#\/notes-editor\/?$/);
        const mPeer = route.match(/^#\/peer-comparison\/?$/);
        const mKM = route.match(/^#\/key-management\/?$/);

        let body, crumbs;
        let activeNav = "orgs";
        if (m3) {
          const [, oid, rid] = m3;
          crumbs = [
            { label: "账套", onClick: () => navigate("#/orgs") },
            { label: oid.slice(-8), onClick: () => navigate(`#/orgs/${oid}`) },
            { label: "报表" },
          ];
          body = (
            <ReportView
              orgId={oid}
              reportId={rid}
              onBack={() => navigate(`#/orgs/${oid}`)}
              toast={toasts.push}
            />
          );
        } else if (m2) {
          const [, oid] = m2;
          crumbs = [
            { label: "账套", onClick: () => navigate("#/orgs") },
            { label: oid.slice(-8) },
          ];
          body = (
            <OrgDetailView
              orgId={oid}
              period={period}
              onBack={() => navigate("#/orgs")}
              onOpenReport={(rid) => navigate(`#/orgs/${oid}/reports/${rid}`)}
              toast={toasts.push}
            />
          );
        } else if (mC2) {
          activeNav = "consolidation";
          const [, gid] = mC2;
          crumbs = [
            { label: "合并报表", onClick: () => navigate("#/consolidation") },
            { label: `集团 #${gid}` },
          ];
          body = (
            <ConsolidationDetailView
              groupId={gid}
              period={period}
              onBack={() => navigate("#/consolidation")}
              onOpenReport={(oid, rid) => navigate(`#/orgs/${oid}/reports/${rid}`)}
              toast={toasts.push}
            />
          );
        } else if (mC1) {
          activeNav = "consolidation";
          crumbs = [{ label: "合并报表" }];
          body = (
            <ConsolidationListView
              period={period}
              onOpenGroup={(gid) => navigate(`#/consolidation/${gid}`)}
              toast={toasts.push}
            />
          );
        } else if (mAI) {
          activeNav = "ai-settings";
          crumbs = [{ label: "AI 设置" }];
          body = (
            <AISettingsView toast={toasts.push} />
          );
        } else if (mNotes) {
          activeNav = "notes-editor";
          crumbs = [{ label: "报表附注" }];
          body = (
            <NotesEditorView toast={toasts.push} />
          );
        } else if (mPeer) {
          activeNav = "peer-comparison";
          crumbs = [{ label: "同业对比" }];
          body = (
            <PeerComparisonView toast={toasts.push} />
          );
        } else if (mKM) {
          activeNav = "key-management";
          crumbs = [{ label: "密钥管理" }];
          body = (
            <KeyManagementView toast={toasts.push} />
          );
        } else {
          activeNav = "orgs";
          crumbs = [{ label: "账套" }];
          body = (
            <OrgListView
              onOpenOrg={(oid) => navigate(`#/orgs/${oid}`)}
              toast={toasts.push}
            />
          );
        }

        return (
          <UserCtx.Provider value={userCtxValue}>
            <div className="app">
              <TopBar
                crumbs={crumbs}
                right={
                  <>
                    <span>期间</span>
                    <select className="field" style={{ width: 110, padding: "3px 8px" }} value={period} onChange={(e) => setPeriod(e.target.value)}>
                      <option value="2025-FY">2025 年度</option>
                      <option value="2024-FY">2024 年度</option>
                    </select>
                    <UserSwitcher toast={toasts.push} />
                  </>
                }
              />
              <div className="main">
                <MainNav active={activeNav} navigate={navigate} />
                {body}
              </div>
              {toasts.view}
              <AIConsentBridge toast={toasts.push} />
            </div>
          </UserCtx.Provider>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>

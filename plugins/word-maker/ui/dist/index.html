<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Word Maker · Word 文档助手</title>
  <script src="_assets/bootstrap.js"></script>
  <link rel="stylesheet" href="_assets/styles.css">
  <script src="_assets/icons.js"></script>
  <script src="_assets/i18n.js"></script>
  <script src="_assets/markdown-mini.js"></script>
  <style>
    :root { --bg:#f8fafc; --card:#fff; --text:#1e293b; --muted:#64748b; --primary:#2563eb; --border:#e2e8f0; --ok:#16a34a; --warn:#d97706; --bad:#dc2626; }
    [data-theme="dark"] { --bg:#0f172a; --card:#1e293b; --text:#f1f5f9; --muted:#94a3b8; --border:#334155; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); }
    .app { height:100vh; display:flex; flex-direction:column; overflow:hidden; }
    .header { display:flex; align-items:center; justify-content:space-between; padding:12px 18px; border-bottom:1px solid var(--border); background:var(--card); }
    .header h1 { font-size:16px; margin:0; }
    .tabs { display:flex; gap:0; padding:0 14px; border-bottom:1px solid var(--border); background:var(--card); }
    .tab { padding:10px 16px; font-size:13px; cursor:pointer; color:var(--muted); border-bottom:2px solid transparent; }
    .tab.active { color:var(--primary); border-bottom-color:var(--primary); font-weight:600; }
    .content { flex:1; overflow:auto; padding:16px; }
    .grid { display:grid; grid-template-columns:1.1fr .9fr; gap:14px; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:14px; margin-bottom:14px; }
    .card h2 { font-size:14px; margin:0 0 10px; }
    .input, .select, .textarea { width:100%; border:1px solid var(--border); background:var(--bg); color:var(--text); border-radius:8px; padding:9px 10px; font-size:13px; }
    .textarea { min-height:110px; resize:vertical; }
    .row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .btn { border:1px solid var(--border); background:var(--card); color:var(--text); border-radius:8px; padding:8px 12px; cursor:pointer; }
    .btn.primary { background:var(--primary); border-color:var(--primary); color:#fff; }
    .pill { border:1px solid var(--border); border-radius:999px; padding:5px 10px; font-size:12px; color:var(--muted); }
    .muted { color:var(--muted); font-size:13px; }
    .status { font-size:12px; font-weight:600; }
    .ok { color:var(--ok); } .warn { color:var(--warn); } .bad { color:var(--bad); }
    pre { white-space:pre-wrap; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:12px; font-size:12px; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    (function () {
      var tabs = ["create", "projects", "templates", "draft", "settings", "guide"];
      var labels = { create: "创建", projects: "项目", templates: "模板", draft: "草稿", settings: "设置", guide: "指南" };
      var docTypes = [
        ["weekly_report", "周报"], ["meeting_minutes", "会议纪要"], ["proposal", "项目建议书"],
        ["acceptance_report", "验收报告"], ["sop", "SOP"], ["research_report", "调研报告"]
      ];
      var state = {
        tab: location.hash ? location.hash.slice(1) : "create",
        health: null, settings: null, projects: [], selected: null, notice: "", error: "",
        draft: JSON.parse(localStorage.getItem("word-maker-draft") || '{"doc_type":"research_report"}')
      };
      function esc(v) { return String(v == null ? "" : v).replace(/[&<>"]/g, function (ch) { return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" })[ch]; }); }
      function api(method, path, body) {
        if (window.OpenAkita && window.OpenAkita.request) return window.OpenAkita.request(path, { method: method, body: body });
        return fetch("/api/plugins/word-maker" + path, { method: method, headers: { "Content-Type": "application/json" }, body: body ? JSON.stringify(body) : undefined }).then(function (r) { return r.json(); });
      }
      function toast(msg, bad) { state.notice = msg; state.error = bad ? msg : ""; render(); setTimeout(function () { state.notice = ""; render(); }, 2200); }
      function draft(key, value) { state.draft[key] = value; localStorage.setItem("word-maker-draft", JSON.stringify(state.draft)); }
      function refresh() {
        Promise.all([
          api("GET", "/healthz").catch(function (e) { return { error: String(e.message || e) }; }),
          api("GET", "/settings").catch(function () { return null; }),
          api("GET", "/projects").catch(function () { return { projects: [] }; })
        ]).then(function (items) {
          state.health = items[0]; state.settings = items[1]; state.projects = items[2].projects || [];
          render();
        });
      }
      function setTab(tab) { state.tab = tab; location.hash = tab; refresh(); render(); }
      function createProject() {
        var body = {
          title: state.draft.title || "未命名文档",
          doc_type: state.draft.doc_type || "research_report",
          audience: state.draft.audience || "",
          tone: state.draft.tone || "professional",
          language: state.draft.language || "zh-CN",
          requirements: state.draft.requirements || ""
        };
        api("POST", "/projects", body).then(function (r) {
          state.selected = r.project; state.draft.project_id = r.project.id; localStorage.setItem("word-maker-draft", JSON.stringify(state.draft)); setTab("projects"); toast("项目已创建：" + r.project.id);
        }).catch(function (e) { toast("创建失败：" + (e.message || e), true); });
      }
      function inspectTemplate() {
        var projectId = document.getElementById("tpl-project").value.trim() || currentProjectId();
        var path = document.getElementById("tpl-path").value.trim() || state.draft.template_path || "";
        if (!projectId || !path) return toast("请填写 project_id 和模板路径", true);
        api("POST", "/projects/" + encodeURIComponent(projectId) + "/template", { template_path: path, context: {} }).then(function (r) {
          document.getElementById("tpl-result").textContent = JSON.stringify(r.inspection, null, 2);
          state.draft.template_path = path; localStorage.setItem("word-maker-draft", JSON.stringify(state.draft));
        }).catch(function (e) { toast("模板检测失败：" + (e.message || e), true); });
      }
      function checkDeps() {
        api("POST", "/deps/check", {}).then(function (r) {
          document.getElementById("deps-result").textContent = JSON.stringify(r.deps, null, 2);
        });
      }
      function apiUpload(inputId, targetKey) {
        var input = document.getElementById(inputId);
        if (!input || !input.files || !input.files[0]) return toast("请先选择文件", true);
        var form = new FormData();
        form.append("file", input.files[0]);
        return fetch("/api/plugins/word-maker/upload", { method: "POST", body: form }).then(function (r) {
          if (!r.ok) throw new Error("HTTP " + r.status);
          return r.json();
        }).then(function (data) {
          if (targetKey === "source_paths") {
            state.draft.source_paths = state.draft.source_paths || [];
            state.draft.source_paths.push(data.rel_path);
          } else {
            state.draft[targetKey] = data.rel_path;
          }
          localStorage.setItem("word-maker-draft", JSON.stringify(state.draft));
          toast("已上传：" + data.filename);
          render();
        }).catch(function (e) { toast("上传失败：" + (e.message || e), true); });
      }
      function currentProjectId() {
        return state.selected && state.selected.id || state.draft.project_id || (state.projects[0] && state.projects[0].id) || "";
      }
      function openFolderPicker() {
        document.getElementById("folder-picker").style.display = "block";
        api("POST", "/storage/open-folder", {}).catch(function () {});
        api("GET", "/storage/list-dir").then(function (r) {
          document.getElementById("folder-list").innerHTML = r.entries.map(function (x) {
            return '<div class="pill">' + (x.is_dir ? "目录 " : "文件 ") + esc(x.name) + '</div>';
          }).join(" ");
        });
      }
      function generateOutline(projectId) {
        var project = state.projects.filter(function (p) { return p.id === projectId; })[0] || {};
        api("POST", "/projects/" + encodeURIComponent(projectId) + "/outline/generate", {
          requirement: project.requirements || state.draft.requirements || "",
          doc_type: project.doc_type || state.draft.doc_type || "research_report",
          sources_text: ""
        }).then(function (r) {
          state.draft.outline = r.data || r;
          localStorage.setItem("word-maker-draft", JSON.stringify(state.draft));
          toast("大纲已生成");
          setTab("draft");
        }).catch(function (e) { toast("大纲生成失败：" + (e.message || e), true); });
      }
      function renderProject(projectId) {
        var fields = {};
        try { fields = JSON.parse(document.getElementById("fields-json") && document.getElementById("fields-json").value || "{}"); }
        catch (e) { return toast("字段 JSON 格式错误", true); }
        api("POST", "/projects/" + encodeURIComponent(projectId) + "/render", {
          template_path: state.draft.template_path || null,
          source_paths: state.draft.source_paths || [],
          fields: fields,
          outline: state.draft.outline || {}
        }).then(function () {
          toast("已开始渲染，正在轮询状态");
          pollProject(projectId, 0);
        }).catch(function (e) { toast("渲染失败：" + (e.message || e), true); });
      }
      function pollProject(projectId, count) {
        api("GET", "/projects/" + encodeURIComponent(projectId)).then(function (r) {
          var project = r.project;
          state.projects = state.projects.map(function (item) { return item.id === project.id ? project : item; });
          render();
          if (project.status === "rendering" && count < 20) setTimeout(function () { pollProject(projectId, count + 1); }, 1500);
        });
      }
      function downloadProject(projectId, outputPath) {
        var filename = String(outputPath || "document.docx").split(/[\\/]/).pop();
        window.location.href = "/api/plugins/word-maker/projects/" + encodeURIComponent(projectId) + "/exports/" + encodeURIComponent(filename);
      }
      function cancelProject(projectId) {
        oaConfirm("确认取消这个项目的后台任务？").then(function (ok) {
          if (!ok) return;
          api("POST", "/projects/" + encodeURIComponent(projectId) + "/cancel", {}).then(function () {
            toast("项目已取消");
            refresh();
          });
        });
      }
      function oaConfirm(message) {
        if (window.OpenAkita && window.OpenAkita.confirm) return window.OpenAkita.confirm(message);
        return Promise.resolve(window.confirm(message));
      }
      function renderHeader() {
        var ok = state.health && state.health.ok;
        return '<div class="header"><div><h1>Word 文档助手</h1><div class="muted">需求澄清、模板变量校验、DOCX 生成</div></div>' +
          '<div class="row"><span class="status ' + (ok ? "ok" : "warn") + '">' + (ok ? "Loaded" : "Checking") + '</span><button class="btn" onclick="window.__wmRefresh()">刷新</button></div></div>';
      }
      function renderTabs() {
        return '<div class="tabs">' + tabs.map(function (tab) {
          return '<div class="tab ' + (state.tab === tab ? "active" : "") + '" onclick="window.__wmTab(\\'' + tab + '\\')">' + labels[tab] + '</div>';
        }).join("") + '</div>';
      }
      function renderCreate() {
        return '<div class="grid"><div class="card"><h2>新建文档项目</h2><p class="muted">像 avatar-studio 一样先收集需求，再进入项目页逐步生成。</p>' +
          '<div class="row">' + docTypes.map(function (item) {
            return '<button class="btn ' + (state.draft.doc_type === item[0] ? "primary" : "") + '" onclick="window.__wmDraft(\\'doc_type\\',\\'' + item[0] + '\\');window.__wmRender()">' + item[1] + '</button>';
          }).join("") + '</div><br>' +
          '<input class="input" placeholder="标题" value="' + esc(state.draft.title || "") + '" oninput="window.__wmDraft(\\'title\\',this.value)"><br><br>' +
          '<input class="input" placeholder="目标受众" value="' + esc(state.draft.audience || "") + '" oninput="window.__wmDraft(\\'audience\\',this.value)"><br><br>' +
          '<textarea class="textarea" placeholder="请描述要生成的文档、已有资料和交付要求" oninput="window.__wmDraft(\\'requirements\\',this.value)">' + esc(state.draft.requirements || "") + '</textarea>' +
          '<br><br><div class="row"><button class="btn primary" onclick="window.__wmCreate()">创建项目</button><label class="btn">上传资料<input id="source-upload" type="file" style="display:none" onchange="window.__wmUpload(\\'source-upload\\',\\'source_paths\\')"></label><label class="btn">上传模板<input id="template-upload" type="file" accept=".docx" style="display:none" onchange="window.__wmUpload(\\'template-upload\\',\\'template_path\\')"></label></div></div>' +
          '<div class="card"><h2>下一步</h2><p class="muted">创建后进入 Projects：上传资料、检测模板变量、生成大纲并渲染 DOCX。</p><p class="muted">模板：' + esc(state.draft.template_path || "未上传") + '</p><p class="muted">资料数：' + esc((state.draft.source_paths || []).length) + '</p><pre>' + esc(JSON.stringify(state.health || {}, null, 2)) + '</pre></div></div>';
      }
      function renderProjects() {
        var rows = state.projects.map(function (p) {
          var download = p.output_path ? '<button class="btn" onclick="window.__wmDownload(\\'' + p.id + '\\',\\'' + esc(p.output_path) + '\\')">下载</button>' : '';
          return '<tr><td>' + esc(p.id) + '</td><td>' + esc(p.title) + '</td><td>' + esc(p.doc_type) + '</td><td><span class="status">' + esc(p.status) + '</span></td><td>' + esc(p.error_message || p.output_path || "") + '</td><td class="row"><button class="btn" onclick="window.__wmOutline(\\'' + p.id + '\\')">生成大纲</button><button class="btn primary" onclick="window.__wmRenderProject(\\'' + p.id + '\\')">渲染</button><button class="btn" onclick="window.__wmCancel(\\'' + p.id + '\\')">取消</button>' + download + '</td></tr>';
        }).join("");
        return '<div class="card"><h2>项目列表</h2><table style="width:100%;border-collapse:collapse"><thead><tr><th>id</th><th>标题</th><th>类型</th><th>状态</th><th>输出/错误</th><th>操作</th></tr></thead><tbody>' + rows + '</tbody></table></div>';
      }
      function renderTemplates() {
        return '<div class="grid"><div class="card"><h2>模板变量检测</h2><input id="tpl-project" class="input" placeholder="project_id" value="' + esc(currentProjectId()) + '"><br><br><input id="tpl-path" class="input" placeholder="DOCX 模板路径或上传 rel_path" value="' + esc(state.draft.template_path || "") + '"><br><br><button class="btn primary" onclick="window.__wmInspectTemplate()">提取变量</button></div><div class="card"><h2>检测结果</h2><pre id="tpl-result">等待检测</pre></div></div>';
      }
      function renderDraft() {
        return '<div class="grid"><div class="card"><h2>大纲 JSON</h2><textarea class="textarea" oninput="try{window.__wmDraft(\\'outline\\',JSON.parse(this.value||\\'{}\\'))}catch(e){}">' + esc(JSON.stringify(state.draft.outline || {}, null, 2)) + '</textarea></div><div class="card"><h2>字段 JSON</h2><textarea id="fields-json" class="textarea" placeholder="{&quot;title&quot;:&quot;报告标题&quot;}">' + esc(JSON.stringify(state.draft.fields || {}, null, 2)) + '</textarea><br><br><button class="btn primary" onclick="window.__wmRenderProject(window.__wmProjectId())">渲染当前项目</button></div></div>';
      }
      function renderSettings() {
        var settings = state.settings || {};
        return '<div class="grid"><div class="card"><h2>设置</h2><p class="muted">Brain 可用：' + esc(settings.brain_available) + '</p><p class="muted">数据目录：' + esc(settings.data_dir_active || "") + '</p><button class="btn" onclick="window.__wmFolder()">浏览目录</button> <button class="btn primary" onclick="window.__wmDeps()">检测依赖</button><pre id="deps-result">' + esc(JSON.stringify(settings.deps || {}, null, 2)) + '</pre></div><div class="card" id="folder-picker" style="display:none"><h2>文件夹选择器</h2><div id="folder-list" class="row"></div></div></div>';
      }
      function renderGuide() {
        return '<div class="card"><h2>5 分钟烟测</h2><ol><li>打开本页并确认 Loaded。</li><li>Create 里输入标题和需求，创建项目。</li><li>Templates 里填写 project_id 和 DOCX 模板路径，提取变量。</li><li>调用 render 接口生成 document.docx。</li><li>在 Projects 查看 output_path 并下载。</li></ol><p class="muted">模板变量示例：{{ company_name }}、{{ title }}、{{ summary }}。</p></div>';
      }
      function renderContent() {
        return state.tab === "create" ? renderCreate() : state.tab === "projects" ? renderProjects() : state.tab === "templates" ? renderTemplates() : state.tab === "draft" ? renderDraft() : state.tab === "settings" ? renderSettings() : renderGuide();
      }
      function render() {
        document.getElementById("app").innerHTML = '<div class="app">' + renderHeader() + renderTabs() + (state.notice ? '<div class="card status ' + (state.error ? "bad" : "ok") + '">' + esc(state.notice) + '</div>' : "") + '<div class="content">' + renderContent() + '</div></div>';
      }
      window.__wmTab = setTab; window.__wmRefresh = refresh; window.__wmDraft = draft; window.__wmCreate = createProject; window.__wmInspectTemplate = inspectTemplate; window.__wmDeps = checkDeps; window.__wmFolder = openFolderPicker; window.__wmRender = render; window.__wmUpload = apiUpload; window.__wmOutline = generateOutline; window.__wmRenderProject = renderProject; window.__wmDownload = downloadProject; window.__wmCancel = cancelProject; window.__wmProjectId = currentProjectId; window.oaConfirm = oaConfirm;
      window.addEventListener("openakita:ready", function (event) { if (event.detail && event.detail.theme) document.documentElement.setAttribute("data-theme", event.detail.theme); });
      refresh(); render();
    })();
  </script>
</body>
</html>

    <filter id="word-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.2" flood-color="#1E3A8A" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="64" height="64" rx="17" fill="url(#word-bg)"/>
  <circle cx="51" cy="12" r="18" fill="#93C5FD" opacity="0.25"/>

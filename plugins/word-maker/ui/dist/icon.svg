<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Word Maker">
  <title>Word Maker</title>
  <desc>App icon using the exact Iconify grommet-icons:document-word path.</desc>
  <defs>
    <linearGradient id="word-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60A5FA"/>
      <stop offset="0.54" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="word-mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EFF6FF"/>
      <stop offset="0.68" stop-color="#BFDBFE"/>

  <rect x="6" y="6" width="52" height="52" rx="15" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.24)" stroke-width="1.5"/>
  <!-- Iconify grommet-icons:document-word, exact package path scaled to the app icon canvas. -->
  <g transform="translate(1 2) scale(2.35)" fill="none" stroke="url(#word-mark)" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" filter="url(#word-shadow)">
    <path d="M4.998 9V1H19.5L23 4.5V23H4M18 1v5h5m-9 6l-1.5 6.75h-.25L9.5 12H9l-2.75 6.75H6L4.5 12H4l2 7h.5L9 12.5h.5L12 19h.5l2-7z"/>
  </g>

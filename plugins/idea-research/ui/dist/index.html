const t = (key, vars) => I18N.t(PLUGIN_API.state.locale, key, vars);

function formatRelative(ts) {
  if (!ts) return "—";
  const now = Date.now() / 1000;
  const diff = Math.max(0, now - Number(ts));
  if (diff < 60)        return Math.round(diff) + "s ago";
  if (diff < 3600)      return Math.round(diff / 60) + "m ago";
  if (diff < 86400)     return Math.round(diff / 3600) + "h ago";
  if (diff < 86400 * 7) return Math.round(diff / 86400) + "d ago";
  return new Date(Number(ts) * 1000).toISOString().slice(0, 10);
}

function formatAbs(ts) {
  if (!ts) return "—";
  return new Date(Number(ts) * 1000).toLocaleString();
}

function formatCount(n) {
  if (n == null) return "—";
  const num = Number(n);
  if (num >= 1_000_000) return (num / 1_000_000).toFixed(1) + "M";
  if (num >= 10_000)    return (num / 10_000).toFixed(1) + "w";
  if (num >= 1_000)     return (num / 1_000).toFixed(1) + "k";
  return String(num);
}

function safeJSON(s, fallback) {
  if (s == null) return fallback;
  if (typeof s !== "string") return s;
  try { return JSON.parse(s); } catch (_) { return fallback; }
}

function clone(o) { return JSON.parse(JSON.stringify(o)); }

function debounceWith(ref, ms, fn) {
  if (ref.current) clearTimeout(ref.current);
  ref.current = setTimeout(fn, ms);
}

function useDraft(key, initial) {
  const [val, setVal] = useState(() => {
    try {
      const raw = window.localStorage.getItem(key);
      if (!raw) return initial;
      return Object.assign({}, initial, JSON.parse(raw));
    } catch (_) { return initial; }
  });
  useEffect(() => {
    try { window.localStorage.setItem(key, JSON.stringify(val)); } catch (_) {}
  }, [key, val]);
  return [val, setVal];
}

function Icon({ name, w, h }) {

// ---------------------------------------------------------------------------
// Toast bus (lightweight global)
// ---------------------------------------------------------------------------

const ToastCtx = React.createContext({ push: () => {}, items: [] });

function ToastProvider({ children }) {
  const [items, setItems] = useState([]);
  const push = useCallback((tone, text) => {
    const id = Math.random().toString(36).slice(2, 9);
    setItems(prev => prev.concat([{ id, tone, text }]));
    setTimeout(() => setItems(prev => prev.filter(x => x.id !== id)), 4500);
  }, []);
  return (
    <ToastCtx.Provider value={{ push, items }}>
      {children}
      <div className="ir-toast-wrap">
        {items.map(it => (
          <div key={it.id} className="ir-toast" data-tone={it.tone}>{it.text}</div>
        ))}
      </div>
    </ToastCtx.Provider>
  );
}
const useToast = () => React.useContext(ToastCtx).push;

// ---------------------------------------------------------------------------
// TabRouter — URL hash <-> ('workbench' | 'tasks' | 'settings')
// ---------------------------------------------------------------------------

function parseHash() {
  const h = (window.location.hash || "#workbench").replace(/^#/, "");
  const [name, qs] = h.split("?");
  const tab = ["workbench", "tasks", "settings"].includes(name) ? name : "workbench";
  const params = {};
  (qs || "").split("&").filter(Boolean).forEach(kv => {
    const [k, v] = kv.split("=");
    if (k) params[decodeURIComponent(k)] = decodeURIComponent(v || "");
  });
  return { tab, params };
}

function buildHash(tab, params) {
  const q = Object.entries(params || {})
    .filter(([, v]) => v !== undefined && v !== null && v !== "")
    .map(([k, v]) => encodeURIComponent(k) + "=" + encodeURIComponent(v))
    .join("&");
  return "#" + tab + (q ? "?" + q : "");
}

function useHashRoute() {
  const [route, setRoute] = useState(parseHash);
  useEffect(() => {
    const handler = () => setRoute(parseHash());
    window.addEventListener("hashchange", handler);
    return () => window.removeEventListener("hashchange", handler);
  }, []);
  const navigate = useCallback((tab, params) => {
    window.location.hash = buildHash(tab, params || {});
  }, []);
  return [route, navigate];
}

function useSSE(handler) {
  useEffect(() => {
    const dispose = PLUGIN_API.subscribe((type, data) => handler(type, data));
    return dispose;
  }, [handler]);
}

function CollapsibleSection({ id, title, open, onToggle, children }) {
  return (
    <section className="ir-section" data-open={open ? "true" : "false"} data-section={id}>
      <button type="button" className="ir-section__head" onClick={onToggle} aria-expanded={open}>

      </button>
      <div className="ir-section__body">{children}</div>
    </section>
  );
}

function ChipInput({ values, onChange, placeholder, max }) {
  const [draft, setDraft] = useState("");
  const add = () => {
    const tag = draft.trim();
    if (!tag) return;
    if ((values || []).includes(tag)) { setDraft(""); return; }
    if (max && values.length >= max) return;
    onChange((values || []).concat([tag]));
    setDraft("");
  };
  return (
    <div>
      <div className="ir-chip-group" style={{ marginBottom: 6 }}>
        {(values || []).map(v => (
          <span key={v} className="ir-chip" data-active="true">
            {v}
            <button className="ir-chip__remove" onClick={() => onChange(values.filter(x => x !== v))}>×</button>
          </span>
        ))}
      </div>
      <input
        className="ir-input"
        value={draft}
        placeholder={placeholder}
        onChange={e => setDraft(e.target.value)}
        onKeyDown={e => { if (e.key === "Enter") { e.preventDefault(); add(); } }}
        onBlur={add}
      />
    </div>
  );
}

const PAGE_SIZE = 30;

function useVirtualSlice(items) {
  const [count, setCount] = useState(PAGE_SIZE);
  const sentinel = useRef(null);
  useEffect(() => {
    if (!sentinel.current) return;
    const obs = new IntersectionObserver(entries => {
      if (entries.some(e => e.isIntersecting)) setCount(c => Math.min(c + PAGE_SIZE, items.length));
    });
    obs.observe(sentinel.current);
    return () => obs.disconnect();
  }, [items.length]);
  return { slice: items.slice(0, count), sentinel, hasMore: count < items.length };
}

function TranscriptViewer({ data }) {
  if (!data) return <p className="ir-empty">{t("bd_no_transcript")}</p>;
  if (typeof data === "string") return <pre className="ir-transcript">{data}</pre>;
  const segs = data.segments || [];
  if (!segs.length) return <p className="ir-empty">{t("bd_no_transcript")}</p>;
  return (
    <div className="ir-transcript">
      {segs.map((s, i) => (
        <div className="ir-transcript__seg" key={i}>
          <span className="ir-transcript__time">{Math.round(s.start || 0)}s</span>
          <span>{s.text}</span>
        </div>
      ))}
    </div>
  );
}

function FramesTimeline({ frames }) {
  if (!frames || !frames.length) return <p className="ir-empty">{t("bd_no_frames")}</p>;
  return (
    <div className="ir-frames-timeline">
      {frames.map((f, i) => (
        <figure key={i}>
          <img src={f.image_url || f.image_path} alt="" loading="lazy" />
          <figcaption>{Math.round(f.timestamp || 0)}s · {f.vlm_description || ""}</figcaption>
        </figure>
      ))}
    </div>
  );
}

function KeywordsCloud({ keywords }) {
  const list = (keywords || []).slice(0, 30);
  if (!list.length) return <p className="ir-empty">{t("empty_default")}</p>;
  const max = Math.max.apply(null, list.map(k => k.weight || k.freq || 1));
  return (
    <div className="ir-keywords-cloud">
      {list.map((k, i) => {
        const score = (k.weight || k.freq || 1) / (max || 1);
        return <span key={i} className="ir-pill" style={{ fontSize: 11 + score * 7 }}>{k.word}</span>;
      })}
    </div>
  );
}

function CommentsSummary({ summary }) {

  return (

function diffCount(a, b) {
  let n = 0;
  ["platforms", "keywords", "time_window", "limit", "engine_b", "filters", "mdrm_weighting", "persona"].forEach(k => {
    const va = JSON.stringify(a[k] || ""); const vb = JSON.stringify(b[k] || "");
    if (va !== vb) n += 1;
  });
  return n;
}

function WorkbenchTab({ mdrmStats, settings, onTaskCreated, onMdrmRefresh, onSnapshot }) {
  const [draft, setDraft] = useDraft(LEFT_DRAFT_KEY, LEFT_DRAFT_DEFAULT);
  const [appliedDraft, setAppliedDraft] = useState(draft);
  const [items, setItems] = useState([]);
  const [fetchedAt, setFetchedAt] = useState(null);
  const [loading, setLoading] = useState(false);
  const [expandedId, setExpandedId] = useState(null);
  const [breakdownTask, setBreakdownTask] = useState(null);
  const [breakdownLoading, setBreakdownLoading] = useState(false);
  const [dismissed, setDismissed] = useState(false);
  const debounceRef = useRef(null);
  const toast = useToast();
  const deferred = useDeferredValue(draft);

  const fetchRecommendations = useCallback((d) => {
    setLoading(true);
    PLUGIN_API.api("GET", "/recommendations", {
      query: {
        limit: d.limit,
        platforms: d.platforms.join(","),
        sort: "score",
        mdrm_weighting: d.mdrm_weighting ? "true" : "false",
      },
    })
      .then(r => {
        let list = r.items || [];
        if ((d.filters || []).length) {
          const fset = new Set(d.filters.map(s => s.toLowerCase()));
          list = list.filter(it => !Array.from(fset).some(f => (it.title || "").toLowerCase().includes(f)));
        }
        setItems(list);
        setFetchedAt(Math.floor(Date.now() / 1000));
      })
      .catch(err => toast("error", err.message))
      .finally(() => setLoading(false));
  }, [toast]);

  useEffect(() => { fetchRecommendations(appliedDraft); /* on tab mount */ }, []); // eslint-disable-line

  useEffect(() => {
    debounceWith(debounceRef, 300, () => {
      if (diffCount(deferred, appliedDraft) === 0) return;
      // Auto-apply when ≤2 changes; otherwise let the floating bar handle.
      if (diffCount(deferred, appliedDraft) <= 2 && !dismissed) {
        setAppliedDraft(deferred);
        fetchRecommendations(deferred);
      }
    });
    return () => debounceRef.current && clearTimeout(debounceRef.current);
  }, [deferred, appliedDraft, dismissed, fetchRecommendations]);

  const pending = diffCount(draft, appliedDraft);
  const onApply = () => {
    setAppliedDraft(draft);
    setDismissed(false);
    fetchRecommendations(draft);
  };

  const createTask = (mode, input, persona) => {
    return PLUGIN_API.api("POST", "/tasks", { body: { mode, input, persona: persona || draft.persona } })
      .then(resp => {
        toast("success", `${modeLabel(mode)} → ${resp.task_id.slice(0, 8)}`);
        onTaskCreated && onTaskCreated(resp.task_id, mode);
        return resp;
      })
      .catch(err => { toast("error", err.message); throw err; });
  };

  const onCreateRadar = () => createTask("radar_pull", {
    platforms: draft.platforms, keywords: draft.keywords,
    time_window: draft.time_window, limit: draft.limit,
    engine: draft.engine_b ? "auto" : "a",
    mdrm_weighting: draft.mdrm_weighting,
  }).then(() => fetchRecommendations(draft));

  const onCreateBreakdown = () => createTask("breakdown_url", {
    url: draft.url.trim(), persona: draft.persona, write_to_mdrm: draft.mdrm_weighting,
  }).then(() => onMdrmRefresh && onMdrmRefresh());

  const onCreateCompare = () => {
    const urls = (draft.accounts || "").split("\n").map(s => s.trim()).filter(Boolean);
    if (!urls.length) { toast("warn", t("lp_accounts_textarea")); return; }
    return createTask("compare_accounts", { account_urls: urls });
  };

  const onExpand = (item) => {
    setExpandedId(item.id);
    setBreakdownLoading(true);
    setBreakdownTask(null);
    createTask("breakdown_url", { url: item.external_url, persona: draft.persona, write_to_mdrm: draft.mdrm_weighting })
      .then(resp => {
        const tid = resp.task_id;
        const poll = () => {
          PLUGIN_API.api("GET", "/tasks/" + tid).then(row => {
            if (["done", "failed", "canceled"].includes(row.status)) {
              setBreakdownTask(row);
              setBreakdownLoading(false);
              if (row.status === "done") onMdrmRefresh && onMdrmRefresh();
              return;
            }
            setBreakdownTask(row);
            setTimeout(poll, 2000);
          }).catch(() => { setBreakdownLoading(false); });
        };
        setTimeout(poll, 1500);
      })
      .catch(() => setBreakdownLoading(false));
  };

  const onSave = (item) => PLUGIN_API.api("POST", "/items/" + encodeURIComponent(item.id) + "/save").then(() => toast("success", t("rp_btn_save")));

  const onHandoff = (item) => toast("success", t("rp_btn_handoff") + " · " + item.id.slice(0, 8));

  const onRemix = (item) => createTask("script_remix", {
    trend_item_id: item.id, my_persona: draft.persona, my_brand_keywords: draft.keywords,
    target_platform: item.platform || "douyin", num_variants: 3,
    use_mdrm_hints: draft.mdrm_weighting,
  });

  const engines = useMemo(() => {
    const list = ["A"];
    if (draft.engine_b) list.push("B");
    return list;
  }, [draft.engine_b]);

  return (
    <div className="ir-workbench">
      <LeftPanel
        draft={draft} setDraft={setDraft}
        onCreateRadar={onCreateRadar}
        onCreateBreakdown={onCreateBreakdown}
        onCreateCompare={onCreateCompare}
        settings={settings}
        onSnapshot={() => onSnapshot(draft)}
      />
      <RightPanel
        items={items} fetchedAt={fetchedAt} loading={loading} engines={engines} onRefresh={() => fetchRecommendations(draft)}
        expandedId={expandedId} onExpand={onExpand} onCollapse={() => { setExpandedId(null); setBreakdownTask(null); }}
        breakdownTask={breakdownTask} breakdownLoading={breakdownLoading}
        onHandoff={onHandoff} onSave={onSave} onRemix={onRemix}
        pendingChanges={pending} onApply={onApply} onDismiss={() => setDismissed(true)}
      />
    </div>
  );
}

function TasksTab({ taskBus }) {
  const [tasks, setTasks] = useState([]);
  const [filterMode, setFilterMode] = useState("");
  const [filterStatus, setFilterStatus] = useState("");
  const [active, setActive] = useState(null);
  const [breakdown, setBreakdown] = useState(null);
  const toast = useToast();
  const [route, navigate] = useHashRoute();

  const refresh = useCallback(() => {
    return PLUGIN_API.api("GET", "/tasks", { query: { mode: filterMode, status: filterStatus, limit: 100 } })
      .then(r => setTasks(r.tasks || []))
      .catch(err => toast("error", err.message));
  }, [filterMode, filterStatus, toast]);

  useEffect(() => { refresh(); }, [refresh]);
  useEffect(() => {
    const sel = route.params && route.params.id;
    if (!sel) { setActive(null); setBreakdown(null); return; }
    PLUGIN_API.api("GET", "/tasks/" + sel)
      .then(row => {
        setActive(row);
        if (row.mode === "breakdown_url") {
          PLUGIN_API.api("GET", "/tasks/" + sel + "/breakdown").then(setBreakdown).catch(() => setBreakdown(null));
        } else { setBreakdown(null); }
      })
      .catch(() => { setActive(null); setBreakdown(null); });
  }, [route.params && route.params.id]);

  useEffect(() => {
    if (!taskBus) return undefined;
    const off = taskBus.subscribe(refresh);
    return off;
  }, [taskBus, refresh]);

  const onRetry = (tid) => PLUGIN_API.api("POST", "/tasks/" + tid + "/retry").then(() => { toast("success", t("tasks_btn_retry")); refresh(); });
  const onCancel = (tid) => PLUGIN_API.api("POST", "/tasks/" + tid + "/cancel").then(() => { toast("success", t("tasks_btn_cancel")); refresh(); });
  const onDelete = (tid) => PLUGIN_API.api("DELETE", "/tasks/" + tid).then(() => { toast("success", t("tasks_btn_delete")); navigate("tasks", {}); refresh(); });
  const onExport = (tid) => {
    PLUGIN_API.api("GET", "/tasks/" + tid).then(row => {
      const blob = new Blob([JSON.stringify(row, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a"); a.href = url; a.download = "task-" + tid + ".json"; a.click();
      URL.revokeObjectURL(url);
    });
  };

  return (
    <section className="ir-tasks">
      <header className="ir-tasks__header">
        <h2 style={{ margin: 0 }}>{t("tab_tasks")}</h2>
        <div className="ir-tasks__filters">
          <select className="ir-select" value={filterMode} onChange={e => setFilterMode(e.target.value)}>
            <option value="">{t("tasks_filter_mode")}</option>
            {MODES.map(m => <option key={m.id} value={m.id}>{modeLabel(m.id)}</option>)}
          </select>
          <select className="ir-select" value={filterStatus} onChange={e => setFilterStatus(e.target.value)}>
            <option value="">{t("tasks_filter_status")}</option>
            {STATUS_OPTIONS.filter(Boolean).map(s => <option key={s} value={s}>{s}</option>)}
          </select>
          <button className="ir-btn" onClick={refresh}><Icon name="refresh" w={14} h={14} /> {t("lp_refresh_now")}</button>
        </div>
      </header>
      {tasks.length === 0
        ? <div className="ir-empty">{t("tasks_empty")}</div>
        : (
        <table className="ir-tasks__table">
          <thead>
            <tr>
              <th style={{ width: 40 }}>{t("tasks_col_mode")}</th>
              <th style={{ width: 90 }}>{t("tasks_col_id")}</th>
              <th>{t("tasks_col_title")}</th>
              <th style={{ width: 100 }}>{t("tasks_col_status")}</th>
              <th style={{ width: 140 }}>{t("tasks_col_created")}</th>
              <th style={{ width: 120 }}>{t("tasks_col_actions")}</th>
            </tr>
          </thead>
          <tbody>
            {tasks.map(row => {
              const inp = safeJSON(row.input_json, row.input_json) || {};
              const summary = inp.url || (inp.platforms || []).join(",") || (inp.account_urls || []).slice(0, 2).join(", ") || row.mode;
              const isActive = active && active.id === row.id;
              return (
                <tr key={row.id} className={isActive ? "is-selected" : ""} onClick={() => navigate("tasks", { id: row.id })}>
                  <td><Icon name={MODES.find(m => m.id === row.mode)?.icon || "list"} w={16} h={16} /></td>
                  <td className="ir-mono">{row.id.slice(0, 8)}</td>
                  <td title={summary}>{(summary || "").slice(0, 60)}</td>
                  <td><span className="ir-status" data-state={row.status}>{row.status}</span></td>
                  <td title={formatAbs(row.created_at)}>{formatRelative(row.created_at)}</td>
                  <td onClick={e => e.stopPropagation()}>
                    {row.status === "running" && <button className="ir-btn ir-btn--xs" onClick={() => onCancel(row.id)}>{t("tasks_btn_cancel")}</button>}
                    <button className="ir-btn ir-btn--xs" onClick={() => onRetry(row.id)}>{t("tasks_btn_retry")}</button>
                    <button className="ir-btn ir-btn--xs ir-btn--danger" onClick={() => onDelete(row.id)}>{t("tasks_btn_delete")}</button>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      )}
      <TaskDetailDrawer task={active} breakdown={breakdown} onClose={() => navigate("tasks", {})} onRetry={onRetry} onCancel={onCancel} onDelete={onDelete} onExport={onExport} />
    </section>
  );
}

        <button className="ir-btn ir-btn--xs" title={t("st_cookies_btn_test_full")} onClick={() => onTest(platform.id)}>{t("st_cookies_btn_test")}</button>
        <button className="ir-btn ir-btn--xs" title={t("st_cookies_btn_open_site_full")} onClick={() => openExternal(platform.site_url)}>{t("st_cookies_btn_open_site")}</button>
        <button className="ir-btn ir-btn--xs ir-btn--danger" title={t("st_cookies_btn_clear_full")} disabled={!status} onClick={() => onClear(platform.id)}>{t("st_cookies_btn_clear")}</button>
      </div>
    </div>
  );
}

function PythonDepsPanel() {
  const [items, setItems] = useState([]);
  const [active, setActive] = useState("");
  const [status, setStatus] = useState(null);
  const toast = useToast();
  const pollRef = useRef(null);

  const refresh = useCallback(() => {
    return PLUGIN_API.api("GET", "/system/python-deps")
      .then(r => setItems(r.items || []))
      .catch(err => toast("error", err.message));
  }, [toast]);

  useEffect(() => { refresh(); }, [refresh]);
  useEffect(() => () => { if (pollRef.current) clearInterval(pollRef.current); }, []);

  const poll = (id) => {
    if (pollRef.current) clearInterval(pollRef.current);
    const tick = () => {
      PLUGIN_API.api("GET", "/system/python-deps/" + id + "/status").then(st => {
        setStatus(st);
        if (!st.busy) {
          clearInterval(pollRef.current);
          pollRef.current = null;
          setActive("");
          refresh();
          if (!st.return_code) setStatus(null);
          toast(st.return_code ? "error" : "success", st.return_code ? (st.error || "pip failed") : "依赖操作完成");
        }
      }).catch(() => {});
    };
    tick();
    pollRef.current = setInterval(tick, 2500);
  };

  const start = (id, op) => {
    setActive(id + ":" + op);
    setStatus({ busy: true, op_kind: op, log_tail: [] });
    const body = op === "uninstall" ? { confirm: true } : {};
    PLUGIN_API.api("POST", "/system/python-deps/" + id + "/" + op, { body })
      .then(() => poll(id))
      .catch(err => { setActive(""); toast("error", err.message); });
  };

  return (
    <div className="ir-card">
      <h3><Icon name="box" /> {t("st_section_deps")}</h3>
      <p className="ir-card__hint">{t("st_deps_intro")}</p>
      <div className="ir-deps-grid">
        {items.map(dep => {
          const isActive = active.startsWith(dep.id + ":") || dep.busy;
          const importRows = dep.import_status || [];
          const runtime = dep.runtime || {};
          return (
            <div className="ir-dep" key={dep.id} data-ok={dep.found ? "true" : "false"}>
              <div className="ir-dep__head">
                <strong>{dep.display_name}</strong>
                <span className={dep.found ? "ir-dep__badge ir-dep__badge--ok" : "ir-dep__badge"}>
                  <Icon name={dep.found ? "check" : "alert"} w={12} h={12} />
                  {dep.found ? t("st_deps_installed") : t("st_deps_missing")}
                </span>
              </div>
              <p>{dep.description}</p>
              {dep.packages?.length > 0 && <code className="ir-mono">{dep.packages.join(" ")}</code>}
              {dep.missing?.length > 0 && <small className="ir-dep__warn">{t("st_deps_missing_items")}: {dep.missing.join(", ")}</small>}
              {importRows.length > 0 && (
                <div className="ir-dep__meta">
                  {importRows.map(row => (
                    <span key={row.name} data-ok={row.found ? "true" : "false"}>
                      {row.name}: {row.found ? (row.version || row.path || "ok") : (row.error || "missing")}
                    </span>
                  ))}
                </div>
              )}
              {runtime.name && (
                <div className="ir-dep__meta">
                  <span data-ok={runtime.found ? "true" : "false"}>
                    {runtime.name}: {runtime.found ? (runtime.path || "ok") : (runtime.error || "missing")}
                  </span>
                </div>
              )}
              <details className="ir-dep__details">
                <summary>{t("st_deps_details")}</summary>
                <div><b>{t("st_deps_python")}:</b> <code>{dep.python || "—"}</code></div>
                <div><b>{t("st_deps_target")}:</b> <code>{dep.target_dir || "—"}</code></div>
                <div><b>{t("st_deps_manual")}:</b> <code>{dep.manual_command || "—"}</code></div>
              </details>
              <div className="ir-cookie__actions">
                <button className="ir-btn ir-btn--xs ir-btn--primary" disabled={isActive || dep.found} onClick={() => start(dep.id, "install")}>{t("st_deps_install")}</button>
                <button className="ir-btn ir-btn--xs ir-btn--danger" disabled={isActive || !dep.found || dep.can_uninstall === false} onClick={() => start(dep.id, "uninstall")}>{t("st_deps_uninstall")}</button>
              </div>
            </div>
          );
        })}
      </div>
      {status && (
        <div className="ir-dep-log">
          <div>{status.busy ? t("st_deps_running") : t("st_deps_log")}</div>
          {status.error && <small className="ir-dep__warn">{status.error}</small>}
          {status.manual_command && <code className="ir-mono">{status.manual_command}</code>}
          <pre>{(status.log_tail || []).join("\n")}</pre>
        </div>
      )}
    </div>
  );
}

function MdrmCard({ stats, onClear, onReindex }) {
  const caps = (stats && stats.caps) || {};
  const hasBrain = !!(caps.has_brain || caps.brain);
  const hasVector = !!(caps.has_vector || caps.vector);
  const vectorReady = hasVector && caps.vector_ready !== false;
  const hasMemory = !!(caps.has_memory_write || caps.memory || caps.has_memory_read);
  const missing = (stats && stats.missing_perms) || [];
  const readyCount = [hasBrain, hasVector, hasMemory].filter(Boolean).length;
  const vectorLabel = hasVector ? (vectorReady ? t("mdrm_perm_granted") : t("mdrm_perm_initializing")) : t("mdrm_perm_missing");
  return (
    <div className="ir-card ir-mdrm-card">
      <h3><Icon name="memory" w={16} h={16} /> {t("st_section_mdrm")}</h3>
      <p className="ir-card__hint">{t("mdrm_settings_hint")}</p>
      <div className="ir-mdrm-summary">
        <strong>{readyCount}/3</strong>
        <span>{readyCount === 3 ? t("mdrm_ready") : t("mdrm_partial")}</span>
        <small>{t("mdrm_status_learned", { n: (stats && stats.hook_count) || 0 })}</small>
      </div>
      <div className="ir-mdrm-caps">
        <span data-state={hasBrain ? "ok" : "missing"}><Icon name="cog" w={14} h={14} /> Brain · {hasBrain ? t("mdrm_perm_granted") : t("mdrm_perm_missing")}</span>
        <span data-state={hasVector ? (vectorReady ? "ok" : "pending") : "missing"}><Icon name="cloud" w={14} h={14} /> Vector · {vectorLabel}</span>
        <span data-state={hasMemory ? "ok" : "missing"}><Icon name="memory" w={14} h={14} /> Memory · {hasMemory ? t("mdrm_perm_granted") : t("mdrm_perm_missing")}</span>
      </div>
      {missing.length > 0 && <small className="ir-mdrm-missing">{t("mdrm_missing_prefix")}: {missing.join(", ")}</small>}
      <div className="ir-mdrm-actions">
        <button className="ir-btn ir-btn--xs" onClick={onReindex}>{t("mdrm_reindex")}</button>
        <button className="ir-btn ir-btn--xs ir-btn--danger" onClick={onClear}>{t("mdrm_clear")}</button>
      </div>
    </div>
  );
}

function SettingsTab({ mdrmStats, onMdrmRefresh }) {
  const [settings, setSettings] = useState({});
  const [sources, setSources] = useState({ engine_a: { enabled: true }, engine_b: { enabled: false, cookies_status: [] } });
  const [storage, setStorage] = useState({ data_dir: "—", total_mb: 0, items: [] });
  const toast = useToast();

  const refresh = useCallback(() => {
    Promise.all([
      PLUGIN_API.api("GET", "/settings"),
      PLUGIN_API.api("GET", "/sources"),
      PLUGIN_API.api("GET", "/healthz"),
      PLUGIN_API.api("GET", "/storage/stats"),
    ]).then(([cfg, src, hz, st]) => {
      setSettings(cfg || {});
      setSources(src || sources);
      setStorage(st || { data_dir: hz.data_dir || "—", total_mb: 0, items: [] });
    }).catch(err => toast("error", err.message));
  }, [toast]); // eslint-disable-line

  useEffect(() => { refresh(); }, [refresh]);

  const setSetting = (key, value) => {
    return PLUGIN_API.api("PUT", "/settings", { body: { updates: { [key]: value } } })
      .then(updated => setSettings(updated))
      .catch(err => toast("error", err.message));
  };

  const onSaveCookies = (platform, jsonText, risk) => {
    return PLUGIN_API.api("POST", "/sources/cookies/" + platform, {
      body: { json_text: jsonText, risk_acknowledged: risk },
    }).then(() => refresh()).catch(err => { toast("error", err.message); throw err; });
  };

  const onTestCookies = (platform) => {
    return PLUGIN_API.api("POST", "/sources/cookies/" + platform + "/test")
      .then(r => toast(r.ok ? "success" : "warn", `${platform}: ${r.message || (r.ok ? "ok" : "fail")}`))
      .catch(err => toast("error", err.message));
  };

  const onClearCookies = (platform) => {
    if (!window.confirm(t("st_cookies_clear_confirm"))) return;
    PLUGIN_API.api("POST", "/sources/cookies/" + platform + "/clear")
      .then(() => { toast("success", t("st_cookies_btn_clear")); refresh(); })
      .catch(err => toast("error", err.message));
  };

  const onMdrmClear = () => {
    if (!window.confirm(t("mdrm_clear") + "?")) return;
    PLUGIN_API.api("POST", "/mdrm/clear", { body: { confirm: true } })
      .then(() => { toast("success", t("mdrm_clear")); onMdrmRefresh && onMdrmRefresh(); })
      .catch(err => toast("error", err.message));
  };
  const onMdrmReindex = () => {
    PLUGIN_API.api("POST", "/mdrm/reindex", { body: { from_days_ago: 30 } })
      .then(r => { toast("success", `reindex ${r.reindexed || 0}`); onMdrmRefresh && onMdrmRefresh(); })
      .catch(err => toast("error", err.message));
  };
  const onCleanup = () => {
    PLUGIN_API.api("POST", "/cleanup", { body: { older_than_days: 30 } })
      .then(r => { toast("success", `deleted ${r.deleted}, freed ${r.freed_mb}MB`); refresh(); })
      .catch(err => toast("error", err.message));
  };
  const onOpenStorage = (key) => {
    PLUGIN_API.api("POST", "/storage/open-folder", { body: { key } })
      .then(r => toast("success", t("st_storage_opened", { path: r.path || "" })))
      .catch(err => toast("error", err.message));
  };
  const onPickExportDir = () => {
    if (!PLUGIN_API.pickFolder) {
      toast("warn", t("st_storage_pick_unavailable"));
      return;
    }
    PLUGIN_API.pickFolder(t("st_storage_pick_export")).then(path => {
      if (!path) return;
      setSetting("export_dir", path).then(() => {
        toast("success", t("st_storage_saved", { path }));
        refresh();
      });
    });
  };

  return (
    <section className="ir-settings">
      <div className="ir-card">
        <h3><Icon name="key" /> {t("st_section_keys")}</h3>
        <p className="ir-card__hint">{t("st_keys_intro")}</p>
        <div className="ir-card__grid">
          <div className="ir-field">
            <label className="ir-field__label">{t("st_key_dashscope")}</label>
            <input className="ir-input" type="password" defaultValue={settings.dashscope_api_key || ""} onBlur={e => setSetting("dashscope_api_key", e.target.value)} />
            <small style={{ color: "var(--ir-muted)" }}>{t("st_key_dashscope_hint")}</small>
          </div>
          <div className="ir-field">
            <label className="ir-field__label">{t("st_key_youtube")}</label>
            <input className="ir-input" type="password" defaultValue={settings.youtube_api_key || ""} onBlur={e => setSetting("youtube_api_key", e.target.value)} />
            <small style={{ color: "var(--ir-muted)" }}>{t("st_key_youtube_hint")}</small>
          </div>
          <div className="ir-field">
            <label className="ir-field__label">{t("st_key_rsshub")}</label>
            <input className="ir-input" defaultValue={settings.rsshub_base || "https://rsshub.app"} onBlur={e => setSetting("rsshub_base", e.target.value)} />
            <small style={{ color: "var(--ir-muted)" }}>{t("st_key_rsshub_hint")}</small>
          </div>
        </div>
      </div>

      <PythonDepsPanel />

      <div className="ir-card">
        <h3><Icon name="cookie" /> {t("st_section_sources")}</h3>
        <div className="ir-engine-grid">
          <div className="ir-engine-card">
            <div className="ir-engine-card__head">
              <strong>{t("st_engine_a")}</strong>
              <ToggleSwitch value={true} onChange={() => {}} label={t("st_engine_always_on")} disabled />
            </div>
            <p>{t("st_engine_a_desc")}</p>
          </div>
          <div className="ir-engine-card">
            <div className="ir-engine-card__head">
              <strong>{t("st_engine_b")}</strong>
              <ToggleSwitch value={!!settings.engine_b_enabled} onChange={v => setSetting("engine_b_enabled", v)} label="" />
            </div>
            <p>{t("st_engine_b_desc")}</p>
          </div>
        </div>
        {sources.engine_b?.warnings?.length > 0 && (
          <div className="ir-error-panel ir-error-panel--banner">
            {sources.engine_b.warnings.map((w, i) => <small key={i}>{w}</small>)}
          </div>
        )}
        <CookiesManager status={sources.engine_b?.cookies_status} onSave={onSaveCookies} onTest={onTestCookies} onClear={onClearCookies} />
      </div>

      <div className="ir-card">
        <h3><Icon name="radar" /> {t("st_section_radar")}</h3>
        <div className="ir-field">
          <label className="ir-field__label">{t("st_radar_interval")}</label>
          <select className="ir-select" value={Number(settings.refresh_interval_min || 60)} onChange={e => setSetting("refresh_interval_min", Number(e.target.value))}>
            {REFRESH_INTERVALS.map(it => <option key={it.id} value={it.id}>{it.label}</option>)}
          </select>
        </div>
      </div>

      <StorageFoldersCard
        storage={storage}
        settings={settings}
        setSetting={setSetting}
        onOpen={onOpenStorage}
        onPickExport={onPickExportDir}
        onCleanup={onCleanup}
      />

      <MdrmCard stats={mdrmStats} onClear={onMdrmClear} onReindex={onMdrmReindex} />

      <div className="ir-card">
        <h3><Icon name="info" /> {t("st_section_about")}</h3>
        <p>{t("st_about_version", { v: PLUGIN_API.version })}</p>
        <p style={{ color: "var(--ir-muted)", fontSize: 12 }}>{t("st_about_desc")}</p>
      </div>
    </section>
  );
}

function SnapshotCompareModal({ snapshots, onClose, onLoad }) {
  if (!snapshots || !snapshots.length) return null;
  return (
    <div className="ir-modal-back" onClick={onClose}>
      <div className="ir-modal" onClick={e => e.stopPropagation()}>
        <h3><Icon name="camera" w={16} h={16} /> Snapshots</h3>
        {snapshots.map((s, i) => (
          <div key={i} style={{ borderTop: "1px solid var(--ir-card-border)", paddingTop: 8 }}>
            <pre className="ir-mono" style={{ maxHeight: 220, overflow: "auto" }}>{JSON.stringify(s, null, 2)}</pre>
            <button className="ir-btn ir-btn--xs" onClick={() => onLoad(s)}>{t("btn_apply")}</button>
          </div>
        ))}
        <button className="ir-btn" onClick={onClose}>{t("btn_close")}</button>
      </div>
    </div>
  );
}

function App() {
  const [route, navigate] = useHashRoute();
  const [theme, setTheme] = useState(PLUGIN_API.state.theme);
  const [locale, setLocale] = useState(PLUGIN_API.state.locale);
  const [mdrmStats, setMdrmStats] = useState({ caps: {}, hook_count: 0 });
  const [settings, setSettings] = useState({});
  const [snapshots, setSnapshots] = useState(() => {
    try { return JSON.parse(window.localStorage.getItem("idea_research_snapshots_v1") || "[]"); } catch (_) { return []; }
  });
  const [showSnap, setShowSnap] = useState(false);
  const subscribers = useRef(new Set());
  const taskBus = useMemo(() => ({
    subscribe(fn) {
      subscribers.current.add(fn);
      return () => subscribers.current.delete(fn);
    },
    publish() { subscribers.current.forEach(fn => { try { fn(); } catch (_) {} }); },
  }), []);
  const toast = useToast();

  const refreshMdrm = useCallback(() => {
    PLUGIN_API.api("GET", "/mdrm/stats").then(setMdrmStats).catch(() => {});
  }, []);

  useEffect(() => {
    refreshMdrm();
    PLUGIN_API.api("GET", "/settings").then(setSettings).catch(() => {});
  }, [refreshMdrm]);

  useEffect(() => {
    const onThemeChange = (e) => setTheme(e.detail?.theme || PLUGIN_API.state.theme);
    const onLocaleChange = (e) => setLocale(e.detail?.locale || PLUGIN_API.state.locale);
    window.addEventListener("idea-research:theme-change", onThemeChange);
    window.addEventListener("idea-research:locale-change", onLocaleChange);
    return () => {
      window.removeEventListener("idea-research:theme-change", onThemeChange);
      window.removeEventListener("idea-research:locale-change", onLocaleChange);
    };
  }, []);

  useSSE(useCallback((type, data) => {
    if (!type) return;
    if (type.startsWith("idea.task.")) taskBus.publish();
    if (type === "idea.task.done") {
      toast("success", `${modeLabel(data?.mode || "")} ✓`);
      refreshMdrm();
    } else if (type === "idea.task.failed") {
      toast("error", `${data?.error_kind || "error"}: ${data?.hint_zh || data?.message || ""}`);
    } else if (type === "idea.mdrm.write_done" || type === "idea.mdrm.reindex_progress") {
      refreshMdrm();
    }
  }, [taskBus, toast, refreshMdrm]));

  const onSnapshot = (draft) => {
    const next = (snapshots || []).slice(-1).concat([clone(draft)]);
    setSnapshots(next);
    try { window.localStorage.setItem("idea_research_snapshots_v1", JSON.stringify(next)); } catch (_) {}
    setShowSnap(true);
  };
  const onLoadSnapshot = (snap) => {
    try { window.localStorage.setItem(LEFT_DRAFT_KEY, JSON.stringify(snap)); } catch (_) {}
    setShowSnap(false);
    window.location.reload();
  };

  return (
    <div className="ir-app">
      <AppHeader
        activeTab={route.tab} onNavigate={navigate}
        hookCount={mdrmStats.hook_count}
      />
      <section className="ir-main">
        {route.tab === "workbench" && (
          <WorkbenchTab
            mdrmStats={mdrmStats}
            settings={settings}
            onTaskCreated={() => taskBus.publish()}
            onMdrmRefresh={refreshMdrm}
            onSnapshot={onSnapshot}
          />
        )}
        {route.tab === "tasks" && <TasksTab taskBus={taskBus} />}
        {route.tab === "settings" && <SettingsTab mdrmStats={mdrmStats} onMdrmRefresh={refreshMdrm} />}
      </section>
      {showSnap && <SnapshotCompareModal snapshots={snapshots} onClose={() => setShowSnap(false)} onLoad={onLoadSnapshot} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<ToastProvider><App /></ToastProvider>);
  </script>

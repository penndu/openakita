<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Avatar Studio">
  <title>Avatar Studio</title>
  <desc>App icon using the exact Iconify solar:bomb-emoji-broken paths.</desc>
  <defs>
    <linearGradient id="avatar-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="0.56" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#1E40AF"/>
    </linearGradient>
    <linearGradient id="avatar-mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.7" stop-color="#DBEAFE"/>
      <stop offset="1" stop-color="#EFF6FF"/>
    </linearGradient>
    <filter id="avatar-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.2" flood-color="#1E3A8A" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="64" height="64" rx="17" fill="url(#avatar-bg)"/>
  <circle cx="50" cy="13" r="18" fill="#BAE6FD" opacity="0.24"/>
  <circle cx="14" cy="52" r="19" fill="#93C5FD" opacity="0.24"/>
  <rect x="6" y="6" width="52" height="52" rx="15" fill="rgba(255,255,255,0.11)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <!-- Iconify solar:bomb-emoji-broken, exact package paths scaled to the app icon canvas. -->
  <g transform="translate(8 8) scale(2)" fill="none" filter="url(#avatar-shadow)">
    <path stroke="url(#avatar-mark)" stroke-linecap="round" stroke-width="1.5" d="M10 16h2"/>
    <path fill="url(#avatar-mark)" d="M14 12.5c0 .828-.448 1.5-1 1.5s-1-.672-1-1.5s.448-1.5 1-1.5s1 .672 1 1.5"/>
    <ellipse cx="9" cy="12.5" fill="url(#avatar-mark)" rx="1" ry="1.5"/>
    <path stroke="url(#avatar-mark)" stroke-linecap="round" stroke-width="1.5" d="m17 7l-2 2"/>
    <path stroke="url(#avatar-mark)" stroke-width="1.5" d="M17.981 2.353a.558.558 0 0 1 1.038 0l.654 1.66c.057.143.17.257.315.314l1.659.654c.47.186.47.852 0 1.038l-1.66.654a.56.56 0 0 0-.314.315l-.654 1.659a.558.558 0 0 1-1.038 0l-.654-1.66a.56.56 0 0 0-.315-.314l-1.659-.654a.558.558 0 0 1 0-1.038l1.66-.654a.56.56 0 0 0 .314-.315z"/>
    <path stroke="url(#avatar-mark)" stroke-linecap="round" stroke-width="1.5" d="M5.75 8.003a7.5 7.5 0 1 1-2.747 2.747"/>
  </g>
</svg>

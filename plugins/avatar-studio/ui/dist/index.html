        <div className="form-row">
          <div className="label">{t("settings.defaults.threshold")}</div>
          <input type="number" className="input" min="0" step="0.5"
                 value={draft.cost_threshold_cny != null ? draft.cost_threshold_cny : 5}
                 onChange={function (e) { update("cost_threshold_cny", Number(e.target.value)); }}
                 onBlur={function () { save({ cost_threshold_cny: Number(draft.cost_threshold_cny || 5) }); }} />
          <div className="text-xs text-dim" style={{marginTop: 2}}>{t("settings.defaults.thresholdHint")}</div>
        </div>
      </div>

      {/* ── 存储与清理 ──────────────────────────────────────── */}
      <div className="setting-section oa-settings-section">
        <h3 className="oa-settings-section__title">
          <span className="oa-icon"><Ico name="layers"/></span>
          {t("settings.section.storage")}
        </h3>
        {storage && (
          <div className="flex items-center justify-between"
               style={{padding: "8px 0", borderBottom: "1px solid var(--border)"}}>
            <div style={{minWidth: 0}}>
              <div className="text-sm">数据目录</div>
              <div className="text-xs text-dim truncate" title={storage.dir}>
                <code className="inline">{storage.dir || "—"}</code>
              </div>
            </div>
            <div className="text-sm" style={{whiteSpace: "nowrap"}}>
              {formatBytes(storage.bytes_used || 0)}
            </div>
          </div>
        )}
        <div className="form-row" style={{marginTop: 10}}>
          <div className="label">保留天数</div>
          <div className="flex items-center gap-2">
            <input type="number" className="input" style={{width: 110}} min="1"
                   value={draft.retention_days != null ? draft.retention_days : 30}
                   onChange={function (e) { update("retention_days", Number(e.target.value)); }} />
            <span className="text-xs text-muted flex-1">
              {t("settings.storage.cleanup", { n: draft.retention_days != null ? draft.retention_days : 30 })}
            </span>
            <button className="btn btn-sm" onClick={cleanup}>{t("settings.storage.cleanup.btn")}</button>
          </div>
        </div>
      </div>

      {/* ── 高级 ────────────────────────────────────────────── */}
      <div className="setting-section oa-settings-section">
        <h3 className="oa-settings-section__title">
          <span className="oa-icon"><Ico name="info"/></span>
          {t("settings.section.advanced")}
        </h3>
        <div className="grid-2">
          <div className="form-row">
            <div className="label">{t("settings.advanced.timeout")}</div>
            <input type="number" className="input" min="10" max="600"
                   value={draft.timeout_sec != null ? draft.timeout_sec : 60}
                   onChange={function (e) { update("timeout_sec", Number(e.target.value)); }}
                   onBlur={function () { save({ timeout_sec: Number(draft.timeout_sec || 60) }); }} />
          </div>
          <div className="form-row">
            <div className="label">{t("settings.advanced.maxRetry")}</div>
            <input type="number" className="input" min="0" max="5"
                   value={draft.max_retries != null ? draft.max_retries : 2}
                   onChange={function (e) { update("max_retries", Number(e.target.value)); }}
                   onBlur={function () { save({ max_retries: Number(draft.max_retries || 2) }); }} />
          </div>
        </div>
      </div>

      {/* ── 关于 ────────────────────────────────────────────── */}
      <div className="setting-section oa-settings-section">
        <h3 className="oa-settings-section__title">
          <span className="oa-icon"><Ico name="info"/></span>
          {t("settings.section.about")}
        </h3>
        <div className="flex items-center justify-between"
             style={{padding: "6px 0", borderBottom: "1px solid var(--border)"}}>
          <div className="text-sm text-muted">{t("settings.about.version")}</div>
          <div className="text-sm"><code className="inline">1.0.0</code></div>
        </div>
        <div className="flex items-center justify-between" style={{padding: "6px 0"}}>
          <div className="text-sm text-muted">DashScope 模型矩阵</div>
          <div className="text-xs text-dim">
            wan2.2-s2v · videoretalk · animate-mix · cosyvoice-v2

      <button className="btn btn-primary btn-block" onClick={saveAll} style={{marginTop: 14}}>
        <Ico name="check"/> {t("settings.save")}

/* ─── PromptGuideTab ──────────────────────────────────────────────
 * Static knowledge base served by GET /prompt-guide. Renders 6
 * <Collapsible> chapters: 配方 / 最佳实践 / 音色 / 视频换人 / 融合 / FAQ.
 * Falls back to a friendly "请在 Settings 配置 API Key" panel if the
 * fetch fails — the route itself doesn't need an API key, but the
 * banner overlay above already handles the unconfigured case. */

function PromptGuideTab() {
  const t = useT();
  const [guide, setGuide] = useState(null);
  const [err, setErr] = useState("");
  useEffect(function () {
    pluginApi("GET", "/prompt-guide?locale=zh").then(function (r) {
      if (r.ok && r.body && r.body.guide) setGuide(r.body.guide);
      else setErr((r.body && r.body.message) || "fetch failed");
    }).catch(function (e) { setErr(String(e)); });
  }, []);

  if (err) return <EmptyState icon="warn" title="加载失败" hint={err} />;
  if (!guide) return <EmptyState icon="loader" title="加载中..." />;

  const Section = function ({ title, children }) {
    return (
      <Collapsible title={<span style={{display: "inline-flex", alignItems: "center", gap: 6}}>
        <Ico name="info"/>{title}
      </span>}>
        {children}
      </Collapsible>
    );
  };

  return (
    <div style={{maxWidth: 800, margin: "0 auto"}}>
      <div className="text-xs text-dim" style={{marginBottom: 10}}>{guide.intro}</div>

      <Section title={t("guide.section.formulas")}>
        {Object.entries(guide.mode_formulas || {}).map(function (entry) {
          const k = entry[0]; const v = entry[1];
          return (
            <div key={k} style={{marginBottom: 10}}>
              <div className="text-sm" style={{fontWeight: 600, marginBottom: 4}}>
                {t("create.mode." + k) + " · " + k}
              </div>
              <div className="text-sm text-muted" style={{lineHeight: 1.7}}>{v}</div>
            </div>
          );
        })}
      </Section>

      <Section title={t("guide.section.bestPractices")}>
        <ul style={{paddingLeft: 20, margin: 0, lineHeight: 1.8, fontSize: 13, color: "var(--text)"}}>
          {(guide.best_practices || []).map(function (l, i) {
            return <li key={i}>{l}</li>;
          })}
        </ul>
      </Section>

      <Section title={t("guide.section.voice")}>
        <ul style={{paddingLeft: 20, margin: 0, lineHeight: 1.8, fontSize: 13, color: "var(--text)"}}>
          {(guide.voice_tips || []).map(function (l, i) {
            return <li key={i}>{l}</li>;
          })}
        </ul>
      </Section>

      <Section title={t("guide.section.reface")}>
        <ul style={{paddingLeft: 20, margin: 0, lineHeight: 1.8, fontSize: 13, color: "var(--text)"}}>
          {(guide.video_reface_tips || []).map(function (l, i) {
            return <li key={i}>{l}</li>;
          })}
        </ul>
      </Section>

      <Section title={t("guide.section.compose")}>
        <ul style={{paddingLeft: 20, margin: 0, lineHeight: 1.8, fontSize: 13, color: "var(--text)"}}>
          {(guide.compose_examples || []).map(function (l, i) {
            return <li key={i}><code className="inline">{l}</code></li>;
          })}
        </ul>
      </Section>

      <Section title={t("guide.section.faq")}>
        {(guide.faq || []).map(function (pair, i) {
          return (
            <div key={i} style={{marginBottom: 10}}>
              <div className="text-sm" style={{fontWeight: 600, marginBottom: 4}}>Q · {pair[0]}</div>
              <div className="text-sm text-muted" style={{lineHeight: 1.7}}>A · {pair[1]}</div>
            </div>
          );
        })}
      </Section>
    </div>
  );
}


/* ─── Top-level App ──────────────────────────────────────────────── */
// Order matches App's switch on `activeTab` (0..5). The "guide" tab sits
// just before "settings" for parity with tongyi-image.
const TAB_IDS = ["create", "tasks", "voices", "figures", "guide", "settings"];
const TAB_ICONS = {
  create: "video", tasks: "list", voices: "mic",
  figures: "user", guide: "info", settings: "cog",
};

function App() {
  const t = useT();
  const [, force] = useState(0);
  useEffect(function () { return _i18n.subscribe(function () { force(function (n) { return n + 1; }); }); }, []);
  const [activeTab, setActiveTab] = useState(0);
  const { settings, loaded: settingsLoaded, save: saveSettings, refresh: refreshSettings } = useSettings();
  const { voices } = useVoices();
  const { figures } = useFigures();

  // Truthy whenever the backend has a key on disk — regardless of whether
  // ``settings.api_key`` was echoed back as the real value (current
  // behaviour) or masked to "" (pre-2026-04 behaviour). Using the
  // ``has_api_key`` flag as a fallback means an old cached backend
  // response can no longer falsely trigger the "尚未配置" banner.
  const hasKey = !!(settings.api_key || settings.has_api_key);
  const apiKeyDisplay = settings.api_key ? (settings.api_key.length > 12 ? settings.api_key.slice(0, 4) + "..." + settings.api_key.slice(-4) : settings.api_key) : "";
  const settingsIdx = TAB_IDS.indexOf("settings");
  const showKeyBanner = settingsLoaded && !hasKey && activeTab !== settingsIdx;
  // OSS banner: shown only when key is set (otherwise the API-key
  // banner takes precedence — no point asking the user to wire up
  // OSS before they've even got an API key). DashScope cannot fetch
  // local /api/... URLs, so any task with assets will 422 without OSS.
  const ossConfigured = !!settings.oss_configured;
  const showOssBanner = settingsLoaded && hasKey && !ossConfigured && activeTab !== settingsIdx;

  return (
    <div className="app">
      <div className="header">
        {/* Hero title — same visual treatment as tongyi-image / seedance-video.
            The right slot is intentionally empty: the long yellow banner below
            already announces "missing API key", a duplicate pill on the right
            would be visual noise (matches tongyi-image's design). */}
        <h1 className="oa-hero-title">
          <span className="oa-hero-title__icon"><Ico name="video"/></span>
          <span className="oa-hero-title__text">
            {t("app.title")}
            <span className="oa-hero-title__sub">{t("app.subtitle")}</span>
          </span>
        </h1>
        <div className="header-right" />
      </div>
      <div className="tabs">
        {TAB_IDS.map(function (id, i) {
          return (
            <div key={id} className={"tab " + (activeTab === i ? "active" : "")}
                 onClick={function () { setActiveTab(i); }}>
              <Ico name={TAB_ICONS[id]}/> {t("tabs." + id)}
            </div>
          );
        })}
      </div>
      {showKeyBanner && (
        <div className="oa-config-banner" role="alert"
             style={{margin: "12px 20px 0", flexShrink: 0}}>
          <span className="oa-icon oa-config-banner__icon"><Ico name="warn"/></span>
          <div className="oa-config-banner__text">
            <strong>{t("banner.noKey.title")}</strong>
            <div style={{fontSize: 12, color: "var(--text-muted)", marginTop: 2}}>
              {t("banner.noKey.desc")}
            </div>
          </div>
          <button className="oa-config-banner__action" type="button"
                  onClick={function () { setActiveTab(settingsIdx); }}>
            {t("banner.noKey.cta")}
            <span className="oa-icon"><Ico name="play"/></span>
          </button>
        </div>
      )}
      {showOssBanner && (
        <div className="oa-config-banner" role="alert"
             style={{margin: "12px 20px 0", flexShrink: 0}}>
          <span className="oa-icon oa-config-banner__icon"><Ico name="warn"/></span>
          <div className="oa-config-banner__text">
            <strong>阿里云 OSS 未配置</strong>
            <div style={{fontSize: 12, color: "var(--text-muted)", marginTop: 2}}>
              DashScope 无法 fetch 本地 URL，所有任务都需要先把素材推到你自己的 OSS bucket。
              到「设置 → 阿里云 OSS」填入 4 个字段（endpoint / bucket / key / secret）。
            </div>
          </div>
          <button className="oa-config-banner__action" type="button"
                  onClick={function () { setActiveTab(settingsIdx); }}>
            前往配置
            <span className="oa-icon"><Ico name="play"/></span>
          </button>
        </div>
      )}
      <div className="content">
        {activeTab === 0 && <CreateTab onGoToTasks={function () { setActiveTab(1); }}
                                       settings={settings} voices={voices} figures={figures} />}
        {activeTab === 1 && <TasksTab/>}
        {activeTab === 2 && <VoicesTab hasApiKey={!!(settings.api_key || settings.has_api_key)}
                                        onGoSettings={function () { setActiveTab(settingsIdx); }} />}
        {activeTab === 3 && <FiguresTab/>}
        {activeTab === 4 && <PromptGuideTab/>}
        {activeTab === 5 && <SettingsTab settings={settings} voices={voices}
                                          onSaved={function () { refreshSettings(); }} />}
      </div>
    </div>
  );
}

class PluginErrorBoundary extends React.Component {
  constructor(p) { super(p); this.state = { error: null, info: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  componentDidCatch(error, info) { this.setState({ info }); console.error("[avatar-studio] render error:", error, info); }
  reset = () => this.setState({ error: null, info: null });
  render() {
    if (!this.state.error) return this.props.children;
    const err = this.state.error;
    const stack = (err && err.stack) || String(err);
    const compStack = (this.state.info && this.state.info.componentStack) || "";
    const tr = function (k) { return _i18n.t(k); };
    return (
      <div style={{padding: 24, maxWidth: 820, margin: "0 auto"}}>
        <div className="err-panel">
          <div className="err-panel__title"><Ico name="warn"/> {tr("err.title")}</div>
          <div className="err-panel__msg">{err && err.message ? err.message : String(err)}</div>
          <button className="btn btn-sm" onClick={this.reset}>{tr("err.retry")}</button>
        </div>
        <details style={{marginTop: 16, fontSize: 12, color: "var(--text-muted)"}} open>
          <summary style={{cursor: "pointer", marginBottom: 8}}>{tr("err.stackLabel")}</summary>
          <pre style={{padding: 12, background: "var(--bg-card)", border: "1px solid var(--border)", borderRadius: 6, overflow: "auto", maxHeight: 240, whiteSpace: "pre-wrap", wordBreak: "break-word"}}>
{stack}
{compStack ? "\n--- React component stack ---" + compStack : ""}
          </pre>
        </details>
      </div>
    );
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <PluginErrorBoundary><App /></PluginErrorBoundary>
);
if (window.OpenAkita && typeof window.OpenAkita.ready === "function") {
  window.OpenAkita.ready();
}
</script>

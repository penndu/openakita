function VoicePicker({ voices, value, onChange }) {
  // Voice list is always non-empty (server seeds 9 system voices on
  // startup). The previous "音色…" placeholder was selectable and would
  // submit an empty voice_id — we now drop the placeholder entirely
  // and auto-resolve `value` to the first system voice if it's empty
  // or no longer in the list.
  const t = useT();
  const systemVoices = voices.filter(function (v) { return v.is_system; });
  const customVoices = voices.filter(function (v) { return !v.is_system; });
  const allIds = voices.map(function (v) { return v.dashscope_voice_id || v.id; });
  const fallback = (systemVoices[0] && (systemVoices[0].dashscope_voice_id || systemVoices[0].id))
                || (voices[0] && (voices[0].dashscope_voice_id || voices[0].id))
                || "longxiaochun_v2";
  const effective = (value && allIds.indexOf(value) >= 0) ? value : fallback;
  useEffect(function () {
    if (voices.length > 0 && effective !== value) onChange(effective);
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [voices.length, value]);
  return (
    <select className="input select" value={effective}
            onChange={function (e) { onChange(e.target.value); }}>
      {systemVoices.length > 0 && (
        <optgroup label={t("voices.system")}>
          {systemVoices.map(function (v) {
            return <option key={v.id} value={v.dashscope_voice_id || v.id}>{v.label}</option>;
          })}
        </optgroup>
      )}
      {customVoices.length > 0 && (
        <optgroup label={t("voices.custom")}>
          {customVoices.map(function (v) {
            return <option key={v.id} value={v.dashscope_voice_id || v.id}>{v.label}</option>;
          })}
        </optgroup>
      )}
    </select>
  );
}

function FigurePicker({ figures, onPick }) {
  const t = useT();
  // Only surface figures whose pre-check actually passed. After the
  // schema migration `detect_status='pass'` is the source of truth;
  // legacy rows fall back to the old `detect_pass` truthy check so we
  // don't hide working library entries from users on older DBs.
  const ready = figures.filter(function (f) {
    if (f.detect_status) return f.detect_status === "pass";
    return !!f.detect_pass;
  });
  if (!ready.length) return null;
  return (
    <details style={{marginTop: 6}}>
      <summary style={{cursor: "pointer", fontSize: 12, color: "var(--text-muted)"}}>
        {t("create.assets.fromLib")} ({ready.length})
      </summary>
      <div style={{display: "flex", gap: 6, flexWrap: "wrap", marginTop: 6}}>
        {ready.map(function (f) {
          return (
            <div key={f.id} style={{cursor: "pointer", textAlign: "center"}}
                 onClick={function () { onPick(f); }}>
              <img src={f.preview_url} alt={f.label}
                   style={{width: 64, height: 64, objectFit: "cover", borderRadius: 6}} />
              <div className="text-xs text-muted truncate" style={{maxWidth: 64}}>{f.label}</div>
            </div>
          );
        })}
      </div>
    </details>
  );
}

function CreateTab({ onGoToTasks, settings, voices, figures }) {
  const t = useT();
  const [mode, setModeRaw] = useState(function () { return loadDraft("mode") || "photo_speak"; });
  const setMode = function (m) { setModeRaw(m); saveDraft("mode", m); };
  const md = MODE_DEFS.find(function (x) { return x.id === mode; }) || MODE_DEFS[0];

  // Per-mode draft form, isolated per mode so switching does not lose state.
  const [form, setForm, resetForm] = useDraft("form:" + mode, {
    image: null, video: null, refImage: null, composeImages: [],
    text: "", voice_id: settings.default_voice || "longxiaochun_v2",
    audio: null, resolution: settings.default_resolution || "480P",
    aspect: "16:9", duration: 5, mode_pro: false, watermark: false,
    seed: -1, compose_prompt: "", compose_size: "",
  });
  // When mode flips, reload the draft for that mode.
  useEffect(function () {
    const fresh = loadDraft("form:" + mode) || {
      image: null, video: null, refImage: null, composeImages: [],
      text: "", voice_id: settings.default_voice || "longxiaochun_v2",
      audio: null, resolution: settings.default_resolution || "480P",
      aspect: "16:9", duration: 5, mode_pro: false, watermark: false,
      seed: -1, compose_prompt: "", compose_size: "",
    };
    setForm(fresh);
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [mode]);

  const [submitting, setSubmitting] = useState(false);
  const [pendingPreview, setPendingPreview] = useState(null);
  const [startedTaskId, setStartedTaskId] = useState(null);
  const [aiBusy, setAiBusy] = useState(false);

  const update = function (k, v) { setForm(Object.assign({}, form, { [k]: v })); };

  // Pick the URL DashScope can actually fetch.
  //   - POST /upload returns `url` already pointing at OSS (signed
  //     HTTPS) when OSS is configured; falls back to local /api/...
  //     so the upload doesn't fail outright.
  //   - FigurePicker now stores `oss_url` separately so we never
  //     accidentally feed DashScope a local /api/... URL.
  // Order: oss_url > url > preview_url (preview_url is local-only so
  // it should *never* end up in `assets` — backend rejects it with a
  // clear "configure OSS" error if it ever does).
  const pickAssetUrl = function (it) {
    if (!it) return "";
    return it.oss_url || it.url || it.preview_url || "";
  };

  const buildPayload = function (cost_approved) {
    const assets = {};
    if (md.needsImage && form.image) assets.image_url = pickAssetUrl(form.image);
    if (md.needsVideo && form.video) assets.video_url = pickAssetUrl(form.video);
    if (md.needsRefImage && form.refImage) assets.image_url = pickAssetUrl(form.refImage);
    if (md.needsCompose && form.composeImages && form.composeImages.length) {
      assets.ref_images_url = form.composeImages.map(pickAssetUrl).filter(Boolean);
    }
    if (form.audio) assets.audio_url = pickAssetUrl(form.audio);
    // ``figure_id`` is the canonical way to reference a previously
    // pre-checked library figure — backend resolves it to the
    // persisted OSS URL so the UI doesn't have to know about OSS for
    // this case (matches FigurePicker's onPick contract).
    const figureId = (form.image && form.image.figure_id)
                   || (form.refImage && form.refImage.figure_id)
                   || "";
    return {
      mode,
      prompt: "",
      text: form.text || "",
      voice_id: form.voice_id || "",
      resolution: form.resolution,
      aspect: form.aspect,
      duration: form.duration,
      mode_pro: !!form.mode_pro,
      watermark: !!form.watermark,
      seed: form.seed != null ? form.seed : -1,
      compose_prompt: form.compose_prompt || "",
      compose_size: form.compose_size || "",
      figure_id: figureId,
      assets,
      cost_approved: !!cost_approved,
    };
  };

  const submit = useCallback(async function () {
    const payload = buildPayload(false);
    // Pre-flight cost preview
    setSubmitting(true);
    try {
      const cp = await pluginApi("POST", "/cost-preview", payload);
      if (!cp.ok) { showToast("估价失败：" + (cp.body && cp.body.message || ""), "error"); return; }
      const preview = (cp.body && cp.body.preview) || cp.body || {};
      const threshold = Number(settings.cost_threshold_cny || settings.cost_threshold || 5);
      if (preview.total > threshold) {
        setPendingPreview(preview);
        return; // Wait for user confirmation in modal.
      }
      await actuallyCreate(payload);
    } finally { setSubmitting(false); }
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [form, mode, settings]);

  const actuallyCreate = useCallback(async function (payload) {
    setSubmitting(true);
    try {
      const r = await pluginApi("POST", "/tasks", payload);
      if (!r.ok) {
        showToast(
          (r.body && r.body.message) || (r.body && r.body.code) || "提交失败",
          "error",
        );
        return;
      }
      const tid = r.body && (
        (r.body.task && (r.body.task.id || r.body.task.task_id))
        || r.body.task_id || r.body.id
      );
      if (tid) {
        setStartedTaskId(tid);
        // Clear ALL drafts for this mode so the form is fresh next time.
        clearDraft("form:" + mode);
      }
    } finally { setSubmitting(false); }
  }, [mode]);

  const aiWritePrompt = useCallback(async function () {
    if (!form.composeImages || form.composeImages.length === 0) {
      showToast("请先上传至少一张参考图", "warn");
      return;
    }
    setAiBusy(true);
    try {
      const r = await pluginApi("POST", "/ai/compose-prompt", {
        ref_images_url: form.composeImages.map(function (it) { return it.preview_url || it.url; }),
      });
      if (r.ok && r.body && r.body.prompt) {
        update("compose_prompt", r.body.prompt);
      } else {
        showToast("生成失败，请手动输入 prompt", "warn");
      }
    } catch (e) { showToast("生成失败：" + e, "error"); }
    finally { setAiBusy(false); }
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [form.composeImages]);

  const liveTask = useTaskHeartbeat(startedTaskId);

  return (
    <div className="split-layout">
      <div className="split-left">
        <ModeChips active={mode} onChange={setMode} />
        <ModelInfoCard mode={mode} />

        {/* ── Asset uploads ──────────────────────────────────── */}
        {md.needsImage && (
          <div className="card">
            <div className="label"><Ico name="user"/>{t("create.section.image")}</div>
            <FileUploadZone accept="image/*" kind="image"
                            value={form.image}
                            onUploaded={function (v) { update("image", v); }}
                            hint="png/jpg，正面单人照效果最佳" />
            <FigurePicker figures={figures} onPick={function (f) {
              // Store BOTH preview_url (for local <img> render) and
              // oss_url (for the DashScope payload). Stash figure_id so
              // backend can re-resolve if oss_url is empty (figure was
              // created before OSS was configured).
              update("image", {
                preview_url: f.preview_url,
                url: f.oss_url || f.preview_url,
                oss_url: f.oss_url || "",
                figure_id: f.id,
                filename: f.label,
              });
            }} />
          </div>
        )}
        {md.needsVideo && (
          <div className="card">
            <div className="label"><Ico name="film"/>{t("create.section.video")}</div>
            <FileUploadZone accept="video/*" kind="video"
                            value={form.video}
                            onUploaded={function (v) { update("video", v); }}
                            hint="mp4，建议 ≤ 30 秒" />
          </div>
        )}
        {md.needsRefImage && (
          <div className="card">
            <div className="label"><Ico name="user"/>{t("create.section.refImage")}</div>
            <FileUploadZone accept="image/*" kind="image"
                            value={form.refImage}
                            onUploaded={function (v) { update("refImage", v); }}
                            hint="想要替换成的人物正面照" />
            <FigurePicker figures={figures} onPick={function (f) {
              update("refImage", {
                preview_url: f.preview_url,
                url: f.oss_url || f.preview_url,
                oss_url: f.oss_url || "",
                figure_id: f.id,
                filename: f.label,
              });
            }} />
          </div>
        )}
        {md.needsCompose && (
          <div className="card">
            <div className="label"><Ico name="layers"/>{t("create.section.composeImages")}</div>
            <FileUploadZone accept="image/*" kind="image" multiple max={3}
                            value={form.composeImages}
                            onUploaded={function (v) { update("composeImages", v); }}
                            hint="最多 3 张：人物 + 服饰 + 场景" />
            <div className="form-row" style={{marginTop: 10}}>
              <div className="oa-section-label oa-section-label--inline" style={{marginBottom: 6}}>
                <span style={{display: "inline-flex", alignItems: "center", gap: 4}}>
                  <Ico name="info"/>{t("create.advanced.composePrompt")}
                </span>
                <button type="button" className="oa-ai-btn"
                        title={t("create.aiPrompt.title")}
                        disabled={aiBusy || !form.composeImages || form.composeImages.length === 0}
                        onClick={aiWritePrompt}>
                  {aiBusy
                    ? <span className="spinner-sm" style={{width: 11, height: 11, borderWidth: 1.5}} />
                    : <span className="oa-icon oa-ai-btn__icon"
                            dangerouslySetInnerHTML={{__html: ICONS.sparkles ? ('<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + ICONS.sparkles + '</svg>') : ""}} />}
                  {t("create.advanced.aiPrompt")}
                </button>
              </div>
              <textarea className="input textarea"
                        placeholder={t("create.advanced.composePrompt.placeholder")}
                        value={form.compose_prompt}
                        onChange={function (e) { update("compose_prompt", e.target.value); }} />
            </div>
          </div>
        )}

        {/* ── Text + voice (TTS) ─────────────────────────────── */}
        {md.needsTts && (
          <div className="card">
            <div className="label"><Ico name="mic"/>{t("create.section.text")}</div>
            <textarea className="input textarea"
                      placeholder={t("create.text.placeholder")}
                      value={form.text}
                      onChange={function (e) { update("text", e.target.value); }} />
            <div className="text-xs text-dim" style={{textAlign: "right", marginTop: 2}}>
              {t("create.text.charCount", { n: (form.text || "").length })}
            </div>
            <div className="form-row" style={{marginTop: 8}}>
              <VoicePicker voices={voices} value={form.voice_id}
                           onChange={function (v) { update("voice_id", v); }} />
            </div>
            <div className="form-row">
              <div className="text-xs text-muted" style={{marginBottom: 4}}>{t("create.text.audioUpload")}</div>
              <FileUploadZone accept="audio/*" kind="audio"
                              value={form.audio}
                              onUploaded={function (v) { update("audio", v); }} />
            </div>
          </div>
        )}

        {/* ── Output parameters ──────────────────────────────── */}
        <div className="card">
          <div className="label"><Ico name="cog"/>{t("create.section.params")}</div>
          {(mode === "photo_speak" || mode === "avatar_compose" || mode === "video_reface") && (
            <div className="grid-2">
              <div>
                <div className="text-xs text-muted" style={{marginBottom: 4}}>{t("create.params.resolution")}</div>
                <select className="input select" value={form.resolution}
                        onChange={function (e) { update("resolution", e.target.value); }}>
                  {(md.resolutions || RESOLUTIONS)
                    .filter(function (r) { return r !== "原视频分辨率"; })
                    .map(function (r) { return <option key={r} value={r}>{r}</option>; })}
                </select>
              </div>
              <div>
                <div className="text-xs text-muted" style={{marginBottom: 4}}>{t("create.params.aspect")}</div>
                <select className="input select" value={form.aspect}
                        onChange={function (e) { update("aspect", e.target.value); }}
                        disabled={mode === "video_reface"}>
                  {ASPECTS.map(function (a) { return <option key={a} value={a}>{a}</option>; })}
                </select>
              </div>
            </div>
          )}
          {mode === "video_relip" && (
            <div className="text-xs text-dim" style={{padding: "4px 0"}}>
              <Ico name="info"/> 输出与原视频相同分辨率与比例，不可调整。
            </div>
          )}
          {mode === "video_reface" && (
            <div style={{marginTop: 10}}>
              <div className="text-xs text-muted" style={{marginBottom: 4}}>{t("create.params.qualityMode")}</div>
              <div className="flex gap-2">
                <label className={"mode-chip " + (!form.mode_pro ? "active" : "")} style={{flex: 1, padding: "8px 12px"}}>
                  <input type="radio" checked={!form.mode_pro} onChange={function () { update("mode_pro", false); }} style={{display: "none"}} />
                  <span className="mode-chip__title">wan-std</span>
                  <span className="mode-chip__desc">{t("create.params.qualityStd")}</span>
                </label>
                <label className={"mode-chip " + (form.mode_pro ? "active" : "")} style={{flex: 1, padding: "8px 12px"}}>
                  <input type="radio" checked={form.mode_pro} onChange={function () { update("mode_pro", true); }} style={{display: "none"}} />
                  <span className="mode-chip__title">wan-pro</span>
                  <span className="mode-chip__desc">{t("create.params.qualityPro")}</span>
                </label>
              </div>
            </div>
          )}
          {!form.audio && md.needsTts === false && (
            <div className="form-row" style={{marginTop: 10}}>
              <div className="text-xs text-muted" style={{marginBottom: 4}}>{t("create.params.duration")}</div>
              <input type="number" className="input" min="1" max="60" value={form.duration}
                     onChange={function (e) { update("duration", parseInt(e.target.value, 10) || 5); }} />
              <div className="text-xs text-dim" style={{marginTop: 2}}>{t("create.params.durationHint")}</div>
            </div>
          )}
        </div>

        {/* ── Advanced ──────────────────────────────────────────
         * Each option is wrapped in its own card-like row so the
         * boundary between toggle / number / text inputs is
         * visually unambiguous (addresses "感觉没对齐" feedback). */}
        <Collapsible title={<span style={{display: "inline-flex", alignItems: "center", gap: 6}}>
          <Ico name="cog"/>{t("create.section.advanced")}
        </span>}>
          <div className="toggle-row" onClick={function () { update("watermark", !form.watermark); }}>
            <div style={{flex: 1}}>
              <div className="toggle-row__label">{t("create.advanced.watermark")}</div>
              <div className="toggle-row__hint">DashScope 在生成视频右下角添加平台水印。</div>
            </div>
            <Switch on={form.watermark} onChange={function (v) { update("watermark", v); }} />
          </div>
          <div className="form-row" style={{marginTop: 12}}>
            <div className="oa-section-label">
              <Ico name="info"/>{t("create.advanced.seed")}
            </div>
            <input type="number" className="input" value={form.seed}
                   onChange={function (e) { update("seed", parseInt(e.target.value, 10)); }} />
            <div className="text-xs text-dim" style={{marginTop: 4}}>
              相同种子 + 相同输入 → 可复现的输出，便于调参对照。
            </div>
          </div>
          {mode === "avatar_compose" && (
            <div className="form-row" style={{marginTop: 12}}>
              <div className="oa-section-label">
                <Ico name="info"/>{t("create.params.composeSize")}
              </div>
              <input type="text" className="input" placeholder={t("create.params.composeSizeAuto")}
                     value={form.compose_size}
                     onChange={function (e) { update("compose_size", e.target.value); }} />
              <div className="text-xs text-dim" style={{marginTop: 4}}>
                例：1024*1024、768*1344；留空时随最后一张参考图。
              </div>
            </div>
          )}
        </Collapsible>

        {/* ── Submit row ────────────────────────────────────── */}
        <div className="flex gap-2" style={{marginTop: 14}}>
          <button className="btn btn-primary btn-block" disabled={submitting} onClick={submit}>
            {submitting && <span className="spinner-sm"/>}
            <Ico name="play"/> {submitting ? t("create.submit.preflight") : t("create.submit")}
          </button>
          <button className="btn" type="button" onClick={function () { resetForm(); showToast(t("create.draft.cleared")); }}>
            {t("create.draft.clear")}
          </button>
        </div>
      </div>

      {/* ── Right preview pane (tongyi-image style) ──────────── */}
      <div className={"split-right oa-preview-area" + (!startedTaskId ? " oa-preview-area--centered" : "")}>
        {startedTaskId && liveTask ? (
          <div style={{width: "100%"}}>
            <div className="card">
              <div className="flex items-center justify-between" style={{marginBottom: 12}}>
                <span className="card-title" style={{marginBottom: 0}}>{t("preview.result.title")}</span>
                <StatusBadge status={liveTask.status}/>
              </div>

              {(liveTask.status === "running" || liveTask.status === "pending") && (
                <div className="empty-state" style={{padding: "40px 20px"}}>
                  <div className="spinner" style={{width: 32, height: 32, marginBottom: 12}}/>
                  <span className="text-sm text-muted">{t("preview.result.runningHint")}</span>
                  {liveTask.progress != null && (
                    <div style={{width: "70%", marginTop: 12}}>
                      <div className="progress"><div className="progress-fill" style={{width: Math.round((liveTask.progress || 0) * 100) + "%"}}/></div>
                      <div className="text-xs text-dim" style={{marginTop: 4, textAlign: "center"}}>
                        {Math.round((liveTask.progress || 0) * 100)}%
                      </div>
                    </div>
                  )}
                  <button className="btn btn-sm" style={{marginTop: 12}} onClick={onGoToTasks}>
                    <Ico name="list"/> {t("preview.result.viewInTasks")}
                  </button>
                </div>
              )}

              {liveTask.status === "done" && (
                liveTask.output_url ? (
                  <div>
                    <video src={liveTask.output_url} controls
                           style={{width: "100%", maxHeight: 480, borderRadius: 8, background: "#000"}} />
                    <div className="flex gap-2" style={{marginTop: 10}}>
                      <button className="btn btn-sm btn-primary"
                              onClick={function () { downloadFile(liveTask.output_url, "avatar-studio_" + shortId(liveTask.id) + ".mp4"); }}>
                        <Ico name="download"/> {t("tasks.detail.download")}
                      </button>
                      <button className="btn btn-sm" onClick={onGoToTasks}>
                        <Ico name="list"/> {t("preview.result.viewInTasks")}
                      </button>
                    </div>
                  </div>
                ) : (
                  <div className="empty-state" style={{padding: "30px 20px"}}>
                    <Ico name="check" cls="text-success"/>
                    <span className="text-sm text-muted" style={{marginTop: 8}}>{t("preview.result.completedNoOutput")}</span>
                    <button className="btn btn-sm" style={{marginTop: 8}}
                            onClick={function () { pluginApi("GET", "/tasks/" + startedTaskId); }}>
                      <Ico name="refresh"/> {t("preview.result.refresh")}
                    </button>
                  </div>
                )
              )}

              {liveTask.status === "failed" && liveTask.error_kind && (
                <ErrorPanel kind={liveTask.error_kind}
                            message={liveTask.error_message}
                            hints={liveTask.error_hints} />
              )}
            </div>

            {liveTask.cost_breakdown && (
              <div className="card">
                <div className="card-title"><Ico name="info"/>{t("tasks.detail.cost")}</div>
                <CostBreakdown items={liveTask.cost_breakdown.items}
                               total={liveTask.cost_breakdown.total}
                               formattedTotal={liveTask.cost_breakdown.formatted_total} />
              </div>
            )}
          </div>
        ) : (
          <div className="oa-preview-empty">
            <span className="oa-preview-empty__icon"><Ico name="video"/></span>
            <div className="oa-preview-empty__title">{t("preview.empty.title")}</div>
            <div className="oa-preview-empty__hint">{t("preview.empty.desc")}</div>
          </div>
        )}
      </div>

      {pendingPreview && (
        <CostExceedModal preview={pendingPreview}
                         threshold={settings.cost_threshold_cny || 5}
                         onConfirm={async function () {
                           const p = pendingPreview;
                           setPendingPreview(null);
                           await actuallyCreate(buildPayload(true));
                         }}
                         onCancel={function () { setPendingPreview(null); }} />
      )}
      {startedTaskId && !pendingPreview && (
        <TaskStartedModal taskId={startedTaskId}
                          onGotoTasks={function () { setStartedTaskId(null); onGoToTasks(); }}
                          onClose={function () { setStartedTaskId(null); }} />
      )}
    </div>
  );
}

function useTaskHeartbeat(taskId) {
  const [task, setTask] = useState(null);
  useEffect(function () {
    if (!taskId) { setTask(null); return; }
    let stopped = false;
    const tick = function () {
      if (stopped) return;
      pluginApi("GET", "/tasks/" + taskId).then(function (r) {
        if (stopped) return;
        if (r.ok && r.body) setTask(r.body.task || r.body);
      }).finally(function () {
        if (!stopped) setTimeout(tick, 4000);
      });
    };
    tick();
    return function () { stopped = true; };
  }, [taskId]);
  return task;
}

/* ─── TasksTab ─────────────────────────────────────────────────────
 * Split-pane layout mirroring tongyi-image:
 *   ┌──────────────────────┬─────────────────────────────────┐
 *   │ chip filters (status │  selected task detail OR         │
 *   │ + mode)              │  oa-preview-empty placeholder    │
 *   │ ────────────         │                                  │
 *   │ task-card list       │                                  │
 *   │ ────────────         │                                  │
 *   │ footer: "共 N 个"    │                                  │
 *   └──────────────────────┴─────────────────────────────────┘ */
function TasksTab() {
  const t = useT();
  const { tasks, loading, refresh, setTasks } = useTasks();
  const [filterStatus, setFilterStatus] = useState("all");
  const [filterMode, setFilterMode] = useState("all");
  const [activeId, setActiveId] = useState(null);

  const filtered = useMemo(function () {
    return tasks.filter(function (x) {
      if (filterStatus !== "all" && x.status !== filterStatus) return false;
      if (filterMode !== "all" && x.mode !== filterMode) return false;
      return true;
    });
  }, [tasks, filterStatus, filterMode]);

  // Auto-select the first task in the filtered list once loaded so the
  // right pane is never empty just because the user hasn't clicked yet.
  useEffect(function () {
    if (!activeId && filtered.length > 0) setActiveId(filtered[0].id);
    if (activeId && !filtered.some(function (x) { return x.id === activeId; }) && filtered.length > 0) {
      setActiveId(filtered[0].id);
    }
  }, [filtered.map(function (x) { return x.id; }).join(","), activeId]);

  const active = activeId ? tasks.find(function (x) { return x.id === activeId; }) : null;

  const cancelTask = async function (id) {
    const r = await pluginApi("POST", "/tasks/" + id + "/cancel", {});
    if (r.ok) { showToast("已请求取消"); refresh(); }
    else { showToast("取消失败", "error"); }
  };
  const retryTask = async function (id) {
    const r = await pluginApi("POST", "/tasks/" + id + "/retry", {});
    if (r.ok) { showToast("已重新提交"); refresh(); }
    else { showToast("重试失败", "error"); }
  };
  const deleteTask = async function (id) {
    const r = await pluginApi("DELETE", "/tasks/" + id);
    if (r.ok) {
      setTasks(function (prev) { return prev.filter(function (x) { return x.id !== id; }); });
      if (activeId === id) setActiveId(null);
    }
  };
  const downloadOutput = function (task) {
    if (task.output_url) downloadFile(task.output_url, "avatar-studio_" + shortId(task.id) + ".mp4");
  };

  const STATUS_FILTERS = [
    { v: "all",       l: t("tasks.filter.all") },
    { v: "running",   l: t("tasks.filter.running") },
    { v: "pending",   l: t("tasks.filter.pending") },
    { v: "done",      l: t("tasks.filter.done") },
    { v: "failed",    l: t("tasks.filter.failed") },
    { v: "cancelled", l: t("tasks.filter.cancelled") },
  ];

  return (
    <div className="split-layout">
      {/* ── Left: filters + task list ─────────────────────────── */}
      <div className="split-left oa-list-panel">
        <div className="oa-list-panel__filters">
          <div>
            <div className="oa-section-label">{t("tasks.filter.status")}</div>
            <div className="oa-filter-group__buttons">
              {STATUS_FILTERS.map(function (f) {
                return (
                  <button key={f.v} type="button"
                          className={"mode-btn " + (filterStatus === f.v ? "active" : "")}
                          onClick={function () { setFilterStatus(f.v); }}>{f.l}</button>
                );
              })}
            </div>
          </div>
          <div>
            <div className="oa-section-label">{t("tasks.filter.mode")}</div>
            <div className="oa-filter-group__buttons">
              <button type="button"
                      className={"mode-btn " + (filterMode === "all" ? "active" : "")}
                      onClick={function () { setFilterMode("all"); }}>{t("tasks.filter.allModes")}</button>
              {MODE_DEFS.map(function (m) {
                return (
                  <button key={m.id} type="button"
                          className={"mode-btn " + (filterMode === m.id ? "active" : "")}
                          onClick={function () { setFilterMode(m.id); }}>
                    <span style={{display: "inline-flex", alignItems: "center", gap: 4}}>
                      <Ico name={m.icon}/> {t("create.mode." + m.id)}
                    </span>
                  </button>
                );
              })}
            </div>
          </div>
        </div>

        <hr className="oa-list-panel__divider" />

        <div className="oa-list-panel__items">
          {loading && tasks.length === 0 ? (
            <div className="empty-state"><div className="spinner"/></div>
          ) : filtered.length === 0 ? (
            <div className="oa-preview-empty" style={{minHeight: 160, padding: "24px 16px"}}>
              <span className="oa-preview-empty__icon"><Ico name="list"/></span>
              <div className="oa-preview-empty__title">{t("tasks.empty")}</div>
              <div className="oa-preview-empty__hint">{t("tasks.empty.hint")}</div>
            </div>
          ) : (
            filtered.map(function (tk) {
              const md = MODE_DEFS.find(function (m) { return m.id === tk.mode; }) || {};
              return (
                <div key={tk.id}
                     className={"task-card " + (activeId === tk.id ? "selected" : "")}
                     onClick={function () { setActiveId(tk.id); }}>
                  <div className="task-thumb">
                    {tk.output_url
                      ? <video src={tk.output_url} muted preload="metadata"/>
                      : tk.status === "running" || tk.status === "pending"
                          ? <div style={{display: "flex", alignItems: "center", justifyContent: "center", height: "100%"}}>
                              <span className="spinner-sm"/>
                            </div>
                          : <span className="text-dim text-xs"
                                  style={{display: "flex", alignItems: "center", justifyContent: "center", height: "100%"}}>—</span>}
                  </div>
                  <div className="task-info">
                    <h4>
                      <Ico name={md.icon || "video"}/>
                      <span style={{marginLeft: 4}}>{t("create.mode." + tk.mode)}</span>
                    </h4>
                    <div className="task-meta">
                      <StatusBadge status={tk.status}/>
                      <span className="text-xs">{formatTime(tk.created_at)}</span>
                      {tk.cost_total != null && (
                        <span className="text-xs">¥{Number(tk.cost_total).toFixed(2)}</span>
                      )}
                    </div>
                  </div>
                </div>
              );
            })
          )}
        </div>

        <div className="oa-list-panel__footer"
             style={{display: "flex", alignItems: "center", gap: 8}}>
          <span>{t("tasks.totalCount", { n: filtered.length })}</span>
          <button className="btn btn-sm" onClick={refresh} disabled={loading}
                  style={{marginLeft: "auto"}}>
            <Ico name="refresh"/> {t("common.refresh")}
          </button>
        </div>
      </div>

      {/* ── Right: task detail or empty state ─────────────────── */}
      <div className={"split-right oa-preview-area" + (!active ? " oa-preview-area--centered" : "")}>
        {active ? (
          <div style={{width: "100%"}}>
            <div className="card">
              <div className="flex items-center justify-between" style={{marginBottom: 12}}>
                <span className="card-title" style={{marginBottom: 0}}>
                  {t("tasks.detail.title")}
                  <code className="inline" style={{marginLeft: 8, fontSize: 11}}>{shortId(active.id)}</code>
                </span>
                <div className="flex gap-2">
                  <button className="btn btn-sm" onClick={function () { copyToClipboard(active.id); }}>
                    <Ico name="copy"/> {t("tasks.detail.copyId")}
                  </button>
                  {(active.status === "running" || active.status === "pending") && (
                    <button className="btn btn-sm" onClick={function () { cancelTask(active.id); }}>
                      <Ico name="cancel"/> {t("tasks.action.cancel")}
                    </button>
                  )}
                  {active.status === "failed" && (
                    <button className="btn btn-sm" onClick={function () { retryTask(active.id); }}>
                      <Ico name="refresh"/> {t("tasks.detail.retry")}
                    </button>
                  )}
                  {active.output_url && (
                    <button className="btn btn-sm btn-primary" onClick={function () { downloadOutput(active); }}>
                      <Ico name="download"/> {t("tasks.detail.download")}
                    </button>
                  )}
                  <button className="btn btn-sm btn-danger" onClick={function () { deleteTask(active.id); }}>
                    <Ico name="trash"/> {t("tasks.detail.delete")}
                  </button>
                </div>
              </div>

              {active.status === "done" && (
                active.output_url
                  ? <video src={active.output_url} controls
                           style={{width: "100%", maxHeight: 480, borderRadius: 8, background: "#000"}} />
                  : (
                    <div className="empty-state" style={{padding: "30px 20px"}}>
                      <Ico name="check" cls="text-success"/>
                      <span className="text-sm text-muted" style={{marginTop: 8}}>{t("tasks.detail.completedNoOutput")}</span>
                      <button className="btn btn-sm btn-primary" style={{marginTop: 8}}
                              onClick={refresh}>
                        <Ico name="refresh"/> {t("tasks.detail.recheck")}
                      </button>
                    </div>
                  )
              )}

              {(active.status === "running" || active.status === "pending") && (
                <div className="empty-state" style={{padding: "40px 20px"}}>
                  <div className="spinner" style={{width: 32, height: 32, marginBottom: 12}}/>
                  <span className="text-sm text-muted">{t("tasks.detail.runningHint")}</span>
                  {active.progress != null && (
                    <div style={{width: "60%", marginTop: 12}}>
                      <div className="progress"><div className="progress-fill" style={{width: Math.round((active.progress || 0) * 100) + "%"}}/></div>
                      <div className="text-xs text-dim" style={{marginTop: 4, textAlign: "center"}}>
                        {Math.round((active.progress || 0) * 100)}%
                      </div>
                    </div>
                  )}
                </div>
              )}

              {active.status === "failed" && active.error_kind && (
                <ErrorPanel kind={active.error_kind}
                            message={active.error_message}
                            hints={active.error_hints} />
              )}

              {active.status === "cancelled" && (
                <div style={{padding: 12, background: "rgba(245,158,11,.08)", borderRadius: 6,
                             color: "var(--text-muted)", fontSize: 13, textAlign: "center"}}>
                  {t("tasks.filter.cancelled")}
                </div>
              )}
            </div>

            <div className="card">
              <div className="grid-2">
                <div>
                  <span className="text-xs text-dim">{t("tasks.detail.id")}</span>
                  <div className="text-sm" style={{wordBreak: "break-all"}}>
                    <code className="inline">{active.id}</code>
                  </div>
                </div>
                <div>
                  <span className="text-xs text-dim">{t("tasks.detail.mode")}</span>
                  <div className="text-sm">{t("create.mode." + active.mode)}</div>
                </div>
                <div>
                  <span className="text-xs text-dim">{t("tasks.detail.model")}</span>
                  <div className="text-sm">
                    <code className="inline">
                      {(MODE_DEFS.find(function (m) { return m.id === active.mode; }) || {}).model || "—"}
                    </code>
                  </div>
                </div>
                <div>
                  <span className="text-xs text-dim">{t("tasks.detail.createdAt")}</span>
                  <div className="text-sm">{formatTime(active.created_at)}</div>
                </div>
              </div>
            </div>

            {active.cost_breakdown && (
              <div className="card">
                <div className="card-title"><Ico name="info"/>{t("tasks.detail.cost")}</div>
                <CostBreakdown items={active.cost_breakdown.items}
                               total={active.cost_breakdown.total}
                               formattedTotal={active.cost_breakdown.formatted_total} />
              </div>
            )}

            <Collapsible title={t("tasks.detail.params")}>
              <pre style={{fontSize: 11, overflow: "auto", maxHeight: 240, margin: 0,
                           background: "var(--bg)", padding: 8, borderRadius: 6}}>
                {JSON.stringify(active.params || {}, null, 2)}
              </pre>
            </Collapsible>
            <Collapsible title={t("tasks.detail.metadata")}>
              <pre style={{fontSize: 11, overflow: "auto", maxHeight: 240, margin: 0,
                           background: "var(--bg)", padding: 8, borderRadius: 6}}>
                {JSON.stringify(active, null, 2)}
              </pre>
            </Collapsible>
          </div>
        ) : (
          <div className="oa-preview-empty">
            <span className="oa-preview-empty__icon"><Ico name="list"/></span>
            <div className="oa-preview-empty__title">{t("tasks.empty.noSelection.title")}</div>
            <div className="oa-preview-empty__hint">{t("tasks.empty.noSelection.hint")}</div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ─── VoicesTab ──────────────────────────────────────────────────── */
function VoiceCard({ voice, onDelete, hasApiKey, onGoSettings }) {
  // Per-card preview state. Clicking "试听" calls
  // POST /voices/{dashscope_voice_id}/sample which synthesises a short
  // demo via cosyvoice-v2 and returns a preview URL we can play inline.
  //
  // Layout invariant: the media slot has a FIXED min-height so toggling
  // between empty hint / spinner / <audio> never shifts the button below.
  // Previously the empty hint (one line of dim text) was unmounted when
  // `busy` flipped, the audio element height jumped from 0 to 32px, and
  // the loader Ico (which doesn't exist in our ICONS table) rendered as
  // an empty <span> — net effect was the whole card 'jumping up'.
  const t = useT();
  const [busy, setBusy] = useState(false);
  const [url, setUrl] = useState(voice.sample_url || "");
  const v = voice;
  const cosyId = v.dashscope_voice_id || v.id;
  const previewText = t("voices.preview.text");

  const playPreview = async function () {
    // Short-circuit: cosyvoice-v2 needs the DashScope key. Without one the
    // backend would 400 with kind:auth and the user only sees a red toast.
    // Front-loading the check turns it into an actionable empty-state.
    if (!hasApiKey) {
      showToast(t("voices.preview.needKey"), "warn");
      if (onGoSettings) onGoSettings();
      return;
    }
    setBusy(true);
    try {
      const r = await pluginApi(
        "POST",
        "/voices/" + encodeURIComponent(cosyId)
        + "/sample?text=" + encodeURIComponent(previewText),
      );
      if (r.ok && r.body && r.body.url) {
        setUrl(r.body.url);
      } else {
        const msg = (r.body && (r.body.detail && r.body.detail.message || r.body.message)) || "unknown";
        showToast(t("voices.preview.fail", { msg }), "error");
      }
    } catch (e) {
      showToast(t("voices.preview.fail", { msg: String(e) }), "error");
    } finally {
      setBusy(false);
    }
  };

  return (
    <div className="lib-card">
      <div className="lib-card__head">
        <div style={{minWidth: 0, flex: 1}}>
          <div className="lib-card__title truncate">{v.label || v.label_zh || v.id}</div>
          <div className="lib-card__sub truncate">
            {(v.gender || "—") + " · " + (v.style || v.style_zh || v.language || "zh")}
          </div>
        </div>
        {v.is_system
          ? <span className="tag tag-blue">系统</span>
          : <button className="btn btn-sm btn-danger" onClick={function () { onDelete(v); }}>
              <Ico name="trash"/>
            </button>}
      </div>
      <div className="text-xs text-dim truncate" title={cosyId}>
        <code className="inline">{cosyId}</code>
      </div>
      {/* Fixed-height media slot — keeps the button anchored regardless of state. */}
      <div className="voice-media">
        {url ? (
          <audio src={url} controls preload="none" />
        ) : busy ? (
          <div className="voice-media__busy">
            <span className="spinner-sm" />
            <span>{t("voices.preview.busy")}</span>
          </div>
        ) : (
          <div className="voice-media__empty">{t("voices.preview.empty")}</div>
        )}
      </div>
      <button className={"voice-play-btn" + (busy ? " is-busy" : "") + (!hasApiKey ? " is-disabled" : "")}
              type="button"
              disabled={busy}
              title={hasApiKey ? "" : t("voices.preview.needKey")}
              onClick={playPreview}>
        {busy
          ? <span className="spinner-sm" />
          : <span className="oa-icon" dangerouslySetInnerHTML={{__html: '<svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M8 5v14l11-7z"/></svg>'}} />}
        <span>{busy ? t("voices.preview.busy") : t("voices.preview")}</span>
      </button>
    </div>
  );
}

function VoicesTab({ hasApiKey, onGoSettings }) {
  const t = useT();
  const { voices, refresh } = useVoices();
  const [showCreate, setShowCreate] = useState(false);
  const [draft, setDraft] = useState({ label: "", audio: null });
  const [busy, setBusy] = useState(false);

  const submitClone = async function () {
    if (!draft.label || !draft.audio) { showToast("请填写名称并上传音频", "warn"); return; }
    if (!draft.audio.oss_url) {
      // VoiceEnrollmentService.create_voice MUST receive a public URL
      // (DashScope pulls the sample from there server-side). A local
      // /api/... URL would fail with an opaque "url unreachable" error
      // 30-90 s into training, so we block at submit time instead.
      showToast("OSS 未配置，无法克隆音色（DashScope 需公网拉取样本）。请到「设置 → 阿里云 OSS」配置。", "error");
      return;
    }
    setBusy(true);
    try {
      const r = await pluginApi("POST", "/voices", {
        label: draft.label,
        source_audio_path: draft.audio.path || "",
        source_audio_oss_url: draft.audio.oss_url,
        sample_url: draft.audio.preview_url || draft.audio.url,
      });
      if (r.ok) {
        showToast("音色已克隆：" + (r.body && r.body.dashscope_voice_id || "(no id)"));
        setDraft({ label: "", audio: null });
        setShowCreate(false);
        refresh();
      } else {
        const msg = (r.body && (r.body.message
          || (r.body.detail && r.body.detail.message))) || "提交失败";
        showToast("提交失败：" + msg, "error");
      }
    } finally { setBusy(false); }
  };
  const del = async function (v) {
    if (!confirm(t("voices.delete.confirm"))) return;
    const r = await pluginApi("DELETE", "/voices/" + v.id);
    if (r.ok) refresh();
  };

  const sys = voices.filter(function (v) { return v.is_system; });
  const cust = voices.filter(function (v) { return !v.is_system; });

  return (
    <div>
      {/* Inline documentation card — explains where the system voice list
          comes from so the user is never confused by the "longxxxxx_v2"
          identifiers (they're DashScope's official cosyvoice-v2 catalog,
          not strings we made up). */}
      <div style={{
        display: "flex", gap: 10, alignItems: "flex-start",
        padding: "10px 12px", marginBottom: 14,
        background: "var(--info-bg, #eff6ff)",
        border: "1px solid var(--info-border, #bfdbfe)",
        borderRadius: 8, fontSize: 12, lineHeight: 1.55,
      }}>
        <span className="oa-icon" style={{color: "var(--info, #2563eb)", marginTop: 1, flexShrink: 0}}>
          <Ico name="info" />
        </span>
        <div style={{minWidth: 0, flex: 1, color: "var(--text)"}}>
          <strong style={{fontWeight: 600}}>{t("voices.source.title")}</strong>
          <span style={{margin: "0 6px", color: "var(--text-muted)"}}>·</span>
          <span style={{color: "var(--text-muted)"}}>{t("voices.source.body")}</span>
          <a href="https://help.aliyun.com/zh/model-studio/cosyvoice-quick-start"
             target="_blank" rel="noopener"
             style={{marginLeft: 6, color: "var(--primary)", whiteSpace: "nowrap"}}>
            {t("voices.source.link")} ↗
          </a>
        </div>
      </div>

      <div className="flex items-center justify-between" style={{marginBottom: 12}}>
        <h3 style={{fontSize: 14, fontWeight: 600}}>{t("voices.system")} <span className="text-xs text-muted">· {sys.length}</span></h3>
        <button className="btn btn-primary btn-sm" onClick={function () { setShowCreate(!showCreate); }}>
          <Ico name="plus"/> {t("voices.create")}
        </button>
      </div>

      {showCreate && (
        <div className="card">
          <div className="form-row">
            <div className="label">{t("voices.create.label")}</div>
            <input className="input" value={draft.label}
                   onChange={function (e) { setDraft(Object.assign({}, draft, { label: e.target.value })); }} />
          </div>
          <div className="form-row">
            <div className="label">{t("voices.create.audio")}</div>
            <FileUploadZone accept="audio/*" kind="audio" value={draft.audio}
                            onUploaded={function (v) { setDraft(Object.assign({}, draft, { audio: v })); }} />
          </div>
          <div className="flex gap-2 justify-between">
            <button className="btn" onClick={function () { setShowCreate(false); }}>{t("common.cancel")}</button>
            <button className="btn btn-primary" disabled={busy} onClick={submitClone}>
              {busy && <span className="spinner-sm"/>} {t("voices.create.submit")}
            </button>
          </div>
        </div>
      )}

      <div className="lib-grid" style={{marginBottom: 18}}>
        {sys.map(function (v) {
          return <VoiceCard key={v.id} voice={v} onDelete={del}
                            hasApiKey={hasApiKey} onGoSettings={onGoSettings} />;
        })}
      </div>

      <h3 style={{fontSize: 14, fontWeight: 600, marginBottom: 8}}>
        {t("voices.custom")} <span className="text-xs text-muted">· {cust.length}</span>
      </h3>
      {cust.length === 0
        ? <EmptyState icon="mic" title={t("voices.empty.custom")} />
        : (
          <div className="lib-grid">
            {cust.map(function (v) {
              return <VoiceCard key={v.id} voice={v} onDelete={del}
                                hasApiKey={hasApiKey} onGoSettings={onGoSettings} />;
            })}
          </div>
        )}
    </div>
  );
}

/* ─── FiguresTab ─────────────────────────────────────────────────── */
function FiguresTab() {
  const t = useT();
  const { figures, refresh, removeOptimistic } = useFigures();
  const [showCreate, setShowCreate] = useState(false);
  const [draft, setDraft] = useState({ label: "", image: null });
  const [busy, setBusy] = useState(false);
  // Track which figure ids have a DELETE in flight, so the trash icon
  // becomes a spinner instead of looking unresponsive while the backend
  // cancels the in-flight wan2.2-s2v-detect probe.
  const [deletingIds, setDeletingIds] = useState({});

  const submitFig = async function () {
    if (!draft.label || !draft.image) { showToast("请填写名称并上传人像图", "warn"); return; }
    if (!draft.image.oss_url) {
      // POST /upload only fills oss_url when OSS is fully configured;
      // an empty value means face-detect would skip and the figure
      // would land in 'skipped'. Tell the user up front so they can
      // open Settings → OSS, instead of finding out 5 seconds later
      // from a yellow tag on the card.
      if (!confirm(
        "OSS 未配置，DashScope 无法 fetch 该图片，"
        + "形象会跳过预检（下次任务需重新上传）。仍要保存吗？")) {
        return;
      }
    }
    setBusy(true);
    try {
      const r = await pluginApi("POST", "/figures", {
        label: draft.label,
        image_path: draft.image.path || draft.image.preview_url,
        preview_url: draft.image.preview_url || draft.image.url,
        oss_url: draft.image.oss_url || "",
        oss_key: draft.image.oss_key || "",
      });
      if (r.ok) {
        showToast(r.body && r.body.oss_configured
          ? "已提交预检" : "已保存（未配置 OSS，已跳过预检）");
        setDraft({ label: "", image: null });
        setShowCreate(false);
        refresh();
      } else { showToast("提交失败：" + (r.body && r.body.message || ""), "error"); }
    } finally { setBusy(false); }
  };
  const del = async function (f) {
    if (deletingIds[f.id]) return;
    if (!confirm(t("figures.delete.confirm"))) return;
    // Optimistically yank the card out of the grid the instant the user
    // confirms. The DELETE request runs in the background; if it fails
    // we re-fetch and the row reappears with whatever its current
    // detect_status is. This is what makes 「点了没反应」 go away even
    // when the backend's cancellation path is still draining httpx.
    setDeletingIds(function (prev) { return Object.assign({}, prev, { [f.id]: true }); });
    removeOptimistic(f.id);
    try {
      const r = await pluginApi("DELETE", "/figures/" + f.id);
      if (!r.ok) {
        showToast("删除失败：" + (r.body && r.body.message || "未知错误"), "error");
        refresh();
      }
    } finally {
      setDeletingIds(function (prev) {
        const next = Object.assign({}, prev);
        delete next[f.id];
        return next;
      });
    }
  };

  return (
    <div>
      <div className="flex items-center justify-between" style={{marginBottom: 12}}>
        <h3 style={{fontSize: 14, fontWeight: 600}}>{t("figures.title")} <span className="text-xs text-muted">· {figures.length}</span></h3>
        <button className="btn btn-primary btn-sm" onClick={function () { setShowCreate(!showCreate); }}>
          <Ico name="plus"/> {t("figures.upload")}
        </button>
      </div>

      {showCreate && (
        <div className="card">
          <div className="form-row">
            <div className="label">{t("figures.upload.label")}</div>
            <input className="input" value={draft.label}
                   onChange={function (e) { setDraft(Object.assign({}, draft, { label: e.target.value })); }} />
          </div>
          <div className="form-row">
            <div className="label">{t("figures.upload.image")}</div>
            <FileUploadZone accept="image/*" kind="image" value={draft.image}
                            onUploaded={function (v) { setDraft(Object.assign({}, draft, { image: v })); }}
                            hint={t("figures.detect.hint")} />
          </div>
          <div className="flex gap-2 justify-between">
            <button className="btn" onClick={function () { setShowCreate(false); }}>{t("common.cancel")}</button>
            <button className="btn btn-primary" disabled={busy} onClick={submitFig}>
              {busy && <span className="spinner-sm"/>} {t("figures.upload.submit")}
            </button>
          </div>
        </div>
      )}

      {figures.length === 0
        ? <EmptyState icon="user" title={t("figures.empty")} />
        : (
          <div className="lib-grid">
            {figures.map(function (f) {
              // Server-of-truth status field. Falls back to the legacy
              // detect_pass bool for figures created before the schema
              // migration so we never crash on stale rows. SQLite stores
              // booleans as 0/1, so "=== true" never matched — that's
              // why the old card was perpetually 「等待预检」.
              const status = f.detect_status
                || (f.detect_pass === 1 || f.detect_pass === true ? "pass"
                    : f.detect_pass === 0 || f.detect_pass === false ? "pending"
                    : "pending");
              const detectLabel = t("figures.detect." + status);
              const cls = status === "pass" ? "tag-green"
                        : status === "fail" ? "tag-red"
                        : status === "skipped" ? "tag-amber"
                        : "tag-gray";
              const isPending = status === "pending";
              const hint = status === "pending" ? t("figures.detect.pendingHint")
                         : status === "fail" ? (f.detect_message || t("figures.detect.failHint"))
                         : status === "skipped" ? t("figures.detect.skippedHint")
                         : "";
              return (
                <div key={f.id} className={"lib-card" + (isPending ? " is-pending" : "")}>
                  <div className="fig-thumb-wrap">
                    {f.preview_url && <img className="fig-thumb" src={f.preview_url} alt={f.label} />}
                    {isPending && (
                      <div className="fig-overlay" aria-label={detectLabel}>
                        <span className="spinner-sm spinner-light"/>
                        <span className="fig-overlay__text">{detectLabel}</span>
                      </div>
                    )}
                  </div>
                  <div className="lib-card__head">
                    <div style={{minWidth: 0, flex: 1}}>
                      <div className="lib-card__title">{f.label}</div>
                      <div className="lib-card__sub">
                        <span className={"tag " + cls}>
                          {isPending && <span className="spinner-sm" style={{marginRight: 4}}/>}
                          {detectLabel}
                        </span>
                      </div>
                    </div>
                    {/* Trash is intentionally always-on — it's the only
                        action a user has on a figure, and during a long
                        pre-check the DELETE handler will cancel the
                        in-flight wan2.2-s2v-detect probe (no orphaned
                        DashScope traffic, no orphaned DB row). The
                        spinner appears once the user has confirmed, so
                        a double-click can't fire a second DELETE. */}
                    <button className="btn btn-sm btn-danger"
                            title={t("common.delete")}
                            disabled={!!deletingIds[f.id]}
                            onClick={function () { del(f); }}>
                      {deletingIds[f.id]
                        ? <span className="spinner-sm spinner-light"/>
                        : <Ico name="trash"/>}
                    </button>
                  </div>
                  {hint && (
                    <div className="lib-card__hint" title={hint}>{hint}</div>
                  )}
                </div>
              );
            })}
          </div>
        )}
    </div>
  );
}

/* ─── ModelProbePanel ───────────────────────────────────────────────
 * On-demand "which models can my key actually invoke?" check that
 * lives inside the Settings → 高级 collapsible. Every probe goes to
 * POST /capabilities/probe which does parallel HTTP probes and rolls
 * the per-model verdict up to per-mode 「可用 / 未授权 / 未知」 — see
 * AvatarDashScopeClient.probe_models() for the protocol. Verdicts are
 * cached in component state so revisiting the tab doesn't auto-rerun.
 * ──────────────────────────────────────────────────────────────────── */
function ModelProbePanel({ hasApiKey }) {
  const t = useT();
  const [busy, setBusy] = useState(false);
  const [data, setData] = useState(null); // { ts, modes:[…], models:[…] }
  const [error, setError] = useState("");

  const run = async function () {
    setBusy(true); setError("");
    try {
      const r = await pluginApi("POST", "/capabilities/probe", {});
      if (r.ok && r.body && r.body.ok) {
        setData(r.body);
      } else {
        const msg = (r.body && r.body.message) || (r.error && r.error.message) || "probe failed";
        setError(msg);
      }
    } finally { setBusy(false); }
  };

  const STATUS_META = {
    available: { cls: "tag-green", label: t("settings.api.probe.status.available"), icon: "✓" },
    denied:    { cls: "tag-red",   label: t("settings.api.probe.status.denied"),    icon: "✗" },
    unknown:   { cls: "tag-gray",  label: t("settings.api.probe.status.unknown"),   icon: "?" },
  };

  return (
    <div>
      <div style={{
        fontSize: 12, fontWeight: 600, color: "var(--text)",
        marginBottom: 4, display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8,
      }}>
        <span>{t("settings.api.probe.title")}</span>
        <button className="btn btn-sm btn-primary"
                disabled={busy || !hasApiKey}
                title={!hasApiKey ? "请先配置并保存 API Key" : ""}
                onClick={run}>
          {busy && <span className="spinner-sm spinner-light" style={{marginRight: 4}}/>}
          {busy ? t("settings.api.probe.btn.busy") : t("settings.api.probe.btn")}
        </button>
      </div>
      <div className="text-xs text-dim" style={{marginBottom: 8, lineHeight: 1.55}}>
        {t("settings.api.probe.desc")}
      </div>
      {error && (
        <div style={{
          fontSize: 12, color: "var(--danger, #b91c1c)",
          background: "rgba(239,68,68,.08)", border: "1px solid rgba(239,68,68,.3)",
          borderRadius: 6, padding: "6px 10px", marginBottom: 8,
        }}>{error}</div>
      )}
      {!data && !busy && !error && (
        <div className="text-xs text-muted" style={{padding: "6px 0"}}>
          {t("settings.api.probe.never")}
        </div>
      )}
      {data && (
        <div className="probe-table">
          <div className="probe-row probe-row--head">
            <div>{t("settings.api.probe.col.mode")}</div>
            <div>{t("settings.api.probe.col.models")}</div>
            <div>{t("settings.api.probe.col.status")}</div>
          </div>
          {(data.modes || []).map(function (m) {
            const meta = STATUS_META[m.status] || STATUS_META.unknown;
            return (
              <div key={m.id} className="probe-row">
                <div className="probe-mode">{m.label_zh || m.id}</div>
                <div className="probe-deps">
                  {(m.deps || []).map(function (d) {
                    const dm = STATUS_META[d.status] || STATUS_META.unknown;
                    return (
                      <span key={d.model} className={"probe-chip " + dm.cls}
                            title={(d.message || "") + (d.http ? " (HTTP " + d.http + ")" : "")}>
                        {dm.icon} {d.model}
                      </span>
                    );
                  })}
                </div>
                <div>
                  <span className={"tag " + meta.cls}>{meta.icon} {meta.label}</span>
                </div>
              </div>
            );
          })}
          {/* If anything is denied we also surface the marketplace link
              once at the bottom — clicking 「未授权」 chips would be
              nicer but the marketplace search is global, not per-model. */}
          {(data.modes || []).some(function (m) { return m.status === "denied"; }) && (
            <div style={{marginTop: 8, fontSize: 12}}>
              <a href="https://bailian.console.aliyun.com/?tab=model#/model-market"
                 target="_blank" rel="noopener"
                 style={{color: "var(--primary)"}}>
                {t("settings.api.probe.openConsole")} →
              </a>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* ─── SettingsTab ────────────────────────────────────────────────── */
function SettingsTab({ settings, onSaved, voices }) {
  // Visual layout follows tongyi-image: each section is a separate
  // .oa-settings-section card with a leading icon. The first row of
  // the API card uses the .oa-config-field-callout treatment to draw a
  // soft yellow frame when no key has been entered yet (Pixelle C5).
  const t = useT();
  const [draft, setDraft] = useState(function () { return Object.assign({}, settings); });
  // Backend GET /settings echoes the api_key back as-is, so a plain
  // resync after save / parent refresh is now correct.
  useEffect(function () { setDraft(Object.assign({}, settings)); }, [settings]);
  const [keyVisible, setKeyVisible] = useState(false);
  const [testBusy, setTestBusy] = useState(false);
  const [savingKey, setSavingKey] = useState(false);
  const [storage, setStorage] = useState(null);

  useEffect(function () {
    pluginApi("GET", "/healthz").then(function (r) {
      if (r.ok && r.body && r.body.storage) setStorage(r.body.storage);
    }).catch(function () {});
  }, []);

  const update = function (k, v) { setDraft(Object.assign({}, draft, { [k]: v })); };

  // Patch save: only push the keys the caller touched. Each control
  // wires its own onChange to call this with a {field: value} dict, so
  // we never accidentally overwrite a sibling that's mid-edit.
  const save = async function (patch) {
    const r = await pluginApi("PUT", "/settings", patch);
    if (r.ok) { showToast(t("settings.save.ok")); if (onSaved) onSaved(); }
    else { showToast("保存失败", "error"); }
  };

  const saveAll = async function () {
    await save({
      api_key: draft.api_key || "",
      base_url: draft.base_url || "",
      default_resolution: draft.default_resolution || "480P",
      default_voice: draft.default_voice || "longxiaochun_v2",
      cost_threshold_cny: Number(draft.cost_threshold_cny != null ? draft.cost_threshold_cny : 5),
      timeout_sec: Number(draft.timeout_sec != null ? draft.timeout_sec : 60),
      max_retries: Number(draft.max_retries != null ? draft.max_retries : 2),
      retention_days: Number(draft.retention_days != null ? draft.retention_days : 30),
      oss_endpoint: draft.oss_endpoint || "",
      oss_bucket: draft.oss_bucket || "",
      oss_access_key_id: draft.oss_access_key_id || "",
      oss_access_key_secret: draft.oss_access_key_secret || "",
      oss_path_prefix: draft.oss_path_prefix || "avatar-studio",
    });
  };

  const saveKey = async function () {
    // Empty save is a deliberate "clear key" action (per UX request).
    // We do NOT prompt — a Settings tab user has no other way to wipe a
    // stale credential, and the green 「已保存」 badge will disappear
    // immediately after, providing the feedback they need.
    setSavingKey(true);
    try { await save({ api_key: (draft.api_key || "").trim() }); }
    finally { setSavingKey(false); }
  };

  const testConn = async function () {
    setTestBusy(true);
    try {
      // Send the *typed* draft key in the request body so the probe
      // tests what's currently in the input — without first persisting
      // it. That means an obviously-wrong key never overwrites a known-
      // good stored one just to be tested. The backend hits DashScope's
      // /v1/models endpoint and reports a real 401 vs 200, so a typo
      // like "sk-wrong-key-12345" will now fail loudly here.
      const probeKey = (draft.api_key || "").trim();
      const r = await pluginApi("POST", "/test-connection",
        probeKey ? { api_key: probeKey } : {});
      if (r.ok && r.body && r.body.ok) {
        showToast(t("settings.api.test.ok"));
      } else {
        const msg = (r.body && r.body.message) || (r.error && r.error.message) || "unreachable";
        showToast(t("settings.api.test.fail", { msg }), "error");
      }
    } finally { setTestBusy(false); }
  };

  const cleanup = async function () {
    const r = await pluginApi("POST", "/cleanup", { retention_days: Number(draft.retention_days || 30) });
    if (r.ok) showToast("已清理 " + (r.body && r.body.removed || 0) + " 条任务");
  };

  // Voice option list resilient to: (1) backend not yet responded
  // (voices === []), (2) old records without a `label` field. Always
  // render the current default as a fallback option so the <select>
  // never collapses to an empty placeholder.
  const voiceOptions = useMemo(function () {
    const seen = {};
    const out = [];
    voices.forEach(function (v) {
      const id = v.dashscope_voice_id || v.id;
      if (!id || seen[id]) return;
      seen[id] = true;
      out.push({
        id, label: v.label || v.label_zh || v.id, system: !!v.is_system,
      });
    });
    const def = draft.default_voice || "longxiaochun_v2";
    if (def && !seen[def]) out.unshift({ id: def, label: def, system: true });
    return out;
  }, [voices, draft.default_voice]);

  return (
    <div style={{maxWidth: 720, margin: "0 auto"}}>
      {/* ── API 配置 ─────────────────────────────────────────── */}
      <div className="setting-section oa-settings-section">
        {/* Section title doubles as the action bar — putting 测试连接 here
            (instead of on its own row below the input) avoids a half-empty
            line between the input and the 高级 disclosure. */}
        <h3 className="oa-settings-section__title"
            style={{display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8}}>
          <span style={{display: "inline-flex", alignItems: "center", gap: 6}}>
            <span className="oa-icon"><Ico name="cog"/></span>
            {t("settings.section.api")}
          </span>
          <button className="btn btn-sm" type="button"
                  style={{fontWeight: 400}}
                  disabled={testBusy} onClick={testConn}>
            {testBusy && <span className="spinner-sm"/>} {t("settings.api.test")}
          </button>
        </h3>
        {(function () {
          // Driven off the live draft value (the backend now echoes the
          // real key back, so draft.api_key === "what's on disk" once
          // settings have loaded). Yellow callout = nothing in the field,
          // green badge = same value already persisted server-side.
          const keyConfigured = !!draft.api_key;
          const keySaved = !!settings.has_api_key
            && !!draft.api_key
            && draft.api_key === settings.api_key;
          return (
            <div className={"form-row" + (keyConfigured ? "" : " oa-config-field-callout")}
                 data-callout={keyConfigured ? undefined : "必填项"}>
              <div className="label" style={{display: "flex", alignItems: "center", gap: 6}}>
                <span>DashScope API Key</span>
                {keySaved && (
                  <span style={{
                    fontSize: 11, padding: "1px 7px", borderRadius: 8,
                    background: "var(--success-bg, #ecfdf5)",
                    color: "var(--success, #059669)",
                    border: "1px solid var(--success-border, #a7f3d0)",
                    fontWeight: 500,
                  }}>{t("settings.api.savedBadge")}</span>
                )}
              </div>
              <div className="flex gap-2">
                <input className="input flex-1" type={keyVisible ? "text" : "password"}
                       value={draft.api_key || ""}
                       placeholder={t("settings.api.placeholder")}
                       onChange={function (e) { update("api_key", e.target.value); }} />
                <button className="btn btn-sm" type="button"
                        onClick={function () { setKeyVisible(!keyVisible); }}>
                  {keyVisible ? "隐藏" : "显示"}
                </button>
                <button className="btn btn-sm btn-primary" type="button"
                        disabled={savingKey} onClick={saveKey}>
                  {savingKey && <span className="spinner-sm"/>} 保存
                </button>
              </div>
              <div className="text-xs text-dim" style={{marginTop: 4}}>
                获取地址：
                <a href="https://bailian.console.aliyun.com/#/api-key" target="_blank" rel="noopener"
                   style={{color: "var(--primary)"}}>阿里云百炼控制台</a>
              </div>
            </div>
          );
        })()}
        {/* Advanced subsection — region picker + per-model probe.
            Collapsed by default because 99% of users only ever care
            about it once (when first wiring up a key). */}
        <Collapsible title={t("settings.api.advanced")} defaultOpen={false}>
          <div className="form-row">
            <div className="text-xs text-muted" style={{marginBottom: 4}}>{t("settings.api.region")}</div>
            <select className="input select" value={draft.base_url || ""}
                    onChange={function (e) {
                      update("base_url", e.target.value);
                      save({ base_url: e.target.value });
                    }}>
              <option value="">{t("settings.api.region.bj")}</option>
              <option value="https://dashscope-intl.aliyuncs.com">{t("settings.api.region.sg")}</option>
            </select>
            <div className="text-xs text-dim" style={{marginTop: 6, lineHeight: 1.5}}>
              {t("settings.api.region.hint")}
            </div>
          </div>
          {/* Visual divider — without it the model probe panel feels
              like it's still part of the region picker above. */}
          <div style={{height: 1, background: "var(--border)", margin: "14px 0"}}/>
          <ModelProbePanel hasApiKey={!!(settings.api_key || settings.has_api_key)}/>
        </Collapsible>
      </div>

      {/* ── 阿里云 OSS ──────────────────────────────────────── */}
      {/* DashScope cannot fetch local /api/... URLs. Every video model
          (s2v / animate-mix / videoretalk / face-detect) needs a public
          HTTPS URL. We push uploads + TTS audio to a bucket the user
          owns and hand DashScope a 6h signed URL. The four fields here
          are read by avatar_studio_inline/oss_uploader.py — empty values
          on any of them disables OSS entirely. */}
      <div className="setting-section oa-settings-section">
        <h3 className="oa-settings-section__title"
            style={{display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8}}>
          <span style={{display: "inline-flex", alignItems: "center", gap: 6}}>
            <span className="oa-icon"><Ico name="layers"/></span>
            阿里云 OSS（DashScope 素材访问）
          </span>
          {settings.oss_configured && (
            <span style={{
              fontSize: 11, padding: "1px 7px", borderRadius: 8,
              background: "var(--success-bg, #ecfdf5)",
              color: "var(--success, #059669)",
              border: "1px solid var(--success-border, #a7f3d0)",
              fontWeight: 500,
            }}>已生效</span>
          )}
        </h3>
        <div className="text-xs text-dim" style={{marginBottom: 10, lineHeight: 1.5}}>
          百炼 / DashScope 的视频类模型只能 fetch 公网 URL；本插件会把上传的图片、视频、音频，
          以及 TTS 合成出来的语音，自动推到这个 bucket，再用签名 URL（6 小时）传给 DashScope。
          需要先在阿里云控制台创建 bucket：
          <a href="https://oss.console.aliyun.com/bucket" target="_blank" rel="noopener"
             style={{color: "var(--primary)", marginLeft: 4}}>OSS 控制台</a>
        </div>
        <div className="grid-2">
          <div className="form-row">
            <div className="label">Endpoint</div>
            <input className="input" type="text"
                   placeholder="https://oss-cn-beijing.aliyuncs.com"
                   value={draft.oss_endpoint || ""}
                   onChange={function (e) { update("oss_endpoint", e.target.value); }}
                   onBlur={function () { save({ oss_endpoint: draft.oss_endpoint || "" }); }} />
          </div>
          <div className="form-row">
            <div className="label">Bucket</div>
            <input className="input" type="text"
                   placeholder="my-bucket"
                   value={draft.oss_bucket || ""}
                   onChange={function (e) { update("oss_bucket", e.target.value); }}
                   onBlur={function () { save({ oss_bucket: draft.oss_bucket || "" }); }} />
          </div>
          <div className="form-row">
            <div className="label">AccessKey ID</div>
            <input className="input" type="text"
                   placeholder="LTAI…"
                   value={draft.oss_access_key_id || ""}
                   onChange={function (e) { update("oss_access_key_id", e.target.value); }}
                   onBlur={function () { save({ oss_access_key_id: draft.oss_access_key_id || "" }); }} />
          </div>
          <div className="form-row">
            <div className="label">AccessKey Secret</div>
            <input className="input" type="password"
                   placeholder={settings.oss_secret_set ? "已保存（重新输入将覆盖）" : "Secret"}
                   value={draft.oss_access_key_secret || ""}
                   onChange={function (e) { update("oss_access_key_secret", e.target.value); }}
                   onBlur={function () { save({ oss_access_key_secret: draft.oss_access_key_secret || "" }); }} />
          </div>
        </div>
        <div className="form-row">
          <div className="label">对象路径前缀（可选）</div>
          <input className="input" type="text"
                 placeholder="avatar-studio"
                 value={draft.oss_path_prefix || ""}
                 onChange={function (e) { update("oss_path_prefix", e.target.value); }}
                 onBlur={function () { save({ oss_path_prefix: draft.oss_path_prefix || "" }); }} />
          <div className="text-xs text-dim" style={{marginTop: 4}}>
            所有对象会写到 <code className="inline">{draft.oss_path_prefix || "avatar-studio"}/uploads/...</code> 下，
            方便和你 bucket 里其他内容区分。
          </div>
        </div>
      </div>

      {/* ── 默认偏好 ─────────────────────────────────────────── */}
      <div className="setting-section oa-settings-section">
        <h3 className="oa-settings-section__title">
          <span className="oa-icon"><Ico name="cog"/></span>
          {t("settings.section.defaults")}
        </h3>
        <div className="grid-2">
          <div className="form-row">
            <div className="label">{t("settings.defaults.resolution")}</div>
            <select className="input select" value={draft.default_resolution || "480P"}
                    onChange={function (e) {
                      update("default_resolution", e.target.value);

                    }}>

          <div className="form-row">
            <div className="label">{t("settings.defaults.voice")}</div>

                      update("default_voice", e.target.value);
                      save({ default_voice: e.target.value });
                    }}>

          </div>

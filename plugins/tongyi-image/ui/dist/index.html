                <div style={{position:"absolute",top:2,left:config.auto_download==="true"?18:2,width:16,height:16,borderRadius:"50%",background:"#fff",transition:".2s"}} />
              </div>
              <span className="text-sm">{t("settings.autoDownload.desc")}</span>
            </div>
          </div>
          <div className="form-row">
            <div className="label">{t("settings.watermark.title")}</div>
            <div className="flex items-center gap-2">
              <div className={`switch ${config.watermark === "true" ? "on" : ""}`}
                   onClick={() => { const v = config.watermark === "true" ? "false" : "true"; updateField("watermark", v); save({ watermark: v }); }}
                   style={{width:36,height:20,borderRadius:10,background:config.watermark==="true"?"var(--primary)":"var(--border)",cursor:"pointer",position:"relative",transition:".2s"}}>
                <div style={{position:"absolute",top:2,left:config.watermark==="true"?18:2,width:16,height:16,borderRadius:"50%",background:"#fff",transition:".2s"}} />
              </div>
              <span className="text-sm">{t("settings.watermark.desc")}</span>
            </div>
          </div>
        </div>
      </div>

      {stats && (
        <div className="setting-section oa-settings-section">
          <h3 className="oa-settings-section__title">
            <span className="oa-icon"
                  dangerouslySetInnerHTML={{__html: window.OpenAkitaIcons ? window.OpenAkitaIcons.folder() : ""}} />
            {t("settings.storage.title")}
          </h3>
          {Object.entries(stats).map(([k, v]) => (
            <div key={k} className="flex items-center justify-between" style={{padding: "8px 0", borderBottom: "1px solid var(--border)"}}>
              <div>
                <div className="text-sm">{k === "images" ? t("settings.storage.images") : t("settings.storage.uploads")}</div>
                <div className="text-xs text-dim">{v.path}</div>
              </div>
              <div className="text-sm text-muted">{t("settings.storage.usage", { size: v.size_mb, count: v.file_count })}</div>
            </div>

        </div>
      )}
    </div>
  );
}

// ─── Error Boundary ───
// React 18 production build will UNMOUNT the entire root if any component
// throws and there is no error boundary above it. That is why a single bad
// render in TasksTab/GuideTab/SettingsTab used to wipe the whole plugin UI
// (header + tabs + content all gone, only a blank iframe remained).
//
// This boundary catches those errors at the App root, keeps the rest of the
// host shell visible, and shows the actual error message + stack so we can
// debug instead of staring at a white screen.
class PluginErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { error: null, info: null };
  }
  static getDerivedStateFromError(error) {
    return { error };
  }
  componentDidCatch(error, info) {
    this.setState({ info });
    console.error("[tongyi-image] render error:", error, info);
  }
  reset = () => this.setState({ error: null, info: null });
  render() {
    if (!this.state.error) return this.props.children;
    const err = this.state.error;
    const stack = (err && err.stack) || String(err);
    const compStack = (this.state.info && this.state.info.componentStack) || "";
    // Error boundary is a class component (cannot use hooks), so we read
    // i18n directly from the shared helper. Re-render on locale change is
    // not strictly necessary here — the error state is usually short-lived
    // and the user will refresh — but text is still localized at the time
    // the error first appears.
    const tr = (k) => _i18n.t(k);
    return (
      <div style={{padding: 24, maxWidth: 820, margin: "0 auto"}}>
        <div className="oa-config-banner" role="alert" style={{borderColor: "var(--danger, #ef4444)"}}>
          <span className="oa-icon oa-config-banner__icon" style={{color: "var(--danger, #ef4444)"}}
                dangerouslySetInnerHTML={{__html: window.OpenAkitaIcons ? window.OpenAkitaIcons.warning() : ""}} />
          <div className="oa-config-banner__text">
            <strong>{tr("err.title")}</strong>
            <div style={{fontSize: 12, color: "var(--text-muted)", marginTop: 4}}>
              {err && err.message ? err.message : String(err)}
            </div>
          </div>
          <button className="oa-config-banner__action" type="button" onClick={this.reset}>
            {tr("err.retry")}
          </button>
        </div>
        <details style={{marginTop: 16, fontSize: 12, color: "var(--text-muted)"}} open>
          <summary style={{cursor: "pointer", marginBottom: 8}}>{tr("err.stackLabel")}</summary>
          <pre style={{padding: 12, background: "var(--bg-card, var(--bg))", border: "1px solid var(--border)", borderRadius: 6, overflow: "auto", maxHeight: 240, whiteSpace: "pre-wrap", wordBreak: "break-word"}}>
{stack}
{compStack ? "\n--- React component stack ---" + compStack : ""}
          </pre>
        </details>
      </div>
    );
  }
}

// ─── Mount ───
ReactDOM.createRoot(document.getElementById("root")).render(
  <PluginErrorBoundary>
    <App />
  </PluginErrorBoundary>
);
// Tell the host we have rendered the first frame so it can dismiss the
// loading overlay accurately (instead of guessing from iframe.onLoad,
// which fires before Babel-standalone compiles this script).
if (window.OpenAkita && typeof window.OpenAkita.ready === "function") {
  window.OpenAkita.ready();
}
</script>
</body>

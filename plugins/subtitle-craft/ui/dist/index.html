function StylesManager() {
  const t = useT();
  const [data, setData] = useState({ builtin: [], custom: [] });
  const [loading, setLoading] = useState(false);
  const [adding, setAdding] = useState(false);
  const [draft, setDraft] = useState({ label: "", font_name: "Microsoft YaHei", font_size: 24, primary_colour: "&H00FFFFFF", outline_colour: "&H00000000" });

  const refresh = useCallback(() => {
    setLoading(true);
    pluginApi("GET", "/library/styles").then(r => {
      if (r.ok && r.body) setData(r.body);
    }).catch(() => {}).finally(() => setLoading(false));
  }, []);
  useEffect(refresh, [refresh]);

  const save = async () => {
    if (!draft.label) return;
    const r = await pluginApi("POST", "/library/styles", draft);
    if (r.ok) { setAdding(false); setDraft({ label: "", font_name: "Microsoft YaHei", font_size: 24, primary_colour: "&H00FFFFFF", outline_colour: "&H00000000" }); refresh(); }
    else showToast(t("toast.saveFailed"), "error");
  };
  const remove = async (id) => {
    if (!confirm(t("library.styles.deleteConfirm"))) return;
    const r = await pluginApi("DELETE", "/library/styles/" + id);
    if (r.ok) refresh();
  };

  if (loading) return <div className="empty-state"><span className="spinner" /></div>;

  // Map preset id -> swatch modifier so the preview tile shows the rough
  // look-and-feel of the burnt-in subtitle (mirrors what the user picks
  // in CreateTab > 字幕样式 — these two surfaces are the SAME preset list).
  const swatchClass = (id) => "oa-style-swatch oa-style-swatch--" + id;

  return (
    <div>
      <div className="card">
        <div className="card-title">{t("library.styles.builtin")}</div>
        <div className="style-grid">
          {(data.builtin || []).map(s => (
            <div key={s.id} className="oa-style-card">
              <div className={swatchClass(s.id)}>
                {s.id === "tiktok" ? "字幕Aa" : s.id === "youtube" ? "字幕 Aa" : "字幕"}
              </div>
              <div className="oa-style-card__name">{s.label_zh || s.id}</div>
              <div className="oa-style-card__meta">{s.font_name} · {s.font_size}px</div>
            </div>
          ))}
        </div>
      </div>

      <div className="card">
        <div className="flex items-center justify-between" style={{marginBottom: 12}}>
          <div className="card-title" style={{marginBottom: 0}}>{t("library.styles.custom")}</div>
          {!adding && <button className="btn btn-sm btn-primary" onClick={() => setAdding(true)}>+ {t("library.styles.add")}</button>}
        </div>
        {adding && (
          <div className="card" style={{marginBottom: 12}}>
            <div className="grid-2">
              <div className="form-row">
                <div className="label">{t("library.styles.editLabel")}</div>
                <input className="input" value={draft.label}
                       onChange={e => setDraft({...draft, label: e.target.value})}
                       placeholder="My Style" />
              </div>
              <div className="form-row">
                <div className="label">{t("library.styles.editFontName")}</div>
                <input className="input" value={draft.font_name}
                       onChange={e => setDraft({...draft, font_name: e.target.value})} />
              </div>
              <div className="form-row">
                <div className="label">{t("library.styles.editFontSize")}</div>
                <input className="input" type="number" value={draft.font_size}
                       onChange={e => setDraft({...draft, font_size: parseInt(e.target.value || "24", 10)})} />
              </div>
              <div className="form-row">
                <div className="label">{t("library.styles.editPrimary")}</div>
                <input className="input" value={draft.primary_colour}
                       onChange={e => setDraft({...draft, primary_colour: e.target.value})} />
              </div>
            </div>
            <div className="flex gap-2">
              <button className="btn btn-primary" onClick={save}>{t("library.styles.save")}</button>
              <button className="btn" onClick={() => setAdding(false)}>{t("common.cancel")}</button>
            </div>
          </div>
        )}
        {(data.custom || []).length === 0 ? (
          <div className="text-xs text-dim">—</div>
        ) : (
          <div className="style-grid">
            {(data.custom || []).map(s => (
              <div key={s.id} className="oa-style-card">
                <div className="oa-style-swatch">字幕</div>
                <div className="flex items-center justify-between">
                  <div className="oa-style-card__name">{s.label}</div>
                  <button className="btn btn-sm btn-danger" style={{padding:"2px 6px"}} onClick={() => remove(s.id)}>×</button>
                </div>
                <div className="oa-style-card__meta">{s.font_name} · {s.font_size}px</div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

/* =================================================================
 * FfmpegInstaller — vendored from seedance-video.
 *
 * Talks to the in-plugin /system/* routes (see subtitle_craft_inline/
 * system_deps.py) using a fire-and-poll cycle: POST .../install kicks
 * off a background subprocess, then we GET .../status every 3s until
 * busy:false. The component is fully self-contained — no external
 * state, no SDK widget — so the plugin keeps working when the host
 * SDK ships without dep-gate.js.
 * ================================================================= */
function FfmpegInstaller({ onChanged }) {
  const t = useT();
  const [snap, setSnap] = useState(null);
  const [loading, setLoading] = useState(true);
  const [busyOp, setBusyOp] = useState("");
  const [status, setStatus] = useState(null);
  const [copied, setCopied] = useState(false);
  // window.confirm() is silently blocked because the host iframe sandbox
  // does NOT include allow-modals — render an inline confirmation card.
  const [confirmingUninstall, setConfirmingUninstall] = useState(false);
  const [rechecking, setRechecking] = useState(false);
  const pollRef = useRef(null);
  const logRef = useRef(null);
  const opNotifiedRef = useRef(false);

  const refresh = useCallback(async () => {
    try {
      const r = await pluginApi("GET", "/system/components");
      const item = (r.body && r.body.items || []).find(x => x.id === "ffmpeg");
      if (item) {
        setSnap(item);
        if (item.busy) {
          setBusyOp((item.last_install && item.last_install.op_kind) || "install");
        }
      }
    } catch (e) {
      setSnap({ id: "ffmpeg", found: false, methods: [], uninstall_methods: [], is_root: false });
    }
    setLoading(false);
  }, []);

  useEffect(() => { refresh(); }, [refresh]);

  useEffect(() => {
    if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight;
  }, [status && status.log_tail && status.log_tail.length]);

  const stopPolling = useCallback(() => {
    if (pollRef.current) { clearInterval(pollRef.current); pollRef.current = null; }
  }, []);

  useEffect(() => {
    if (!busyOp) { stopPolling(); return; }
    opNotifiedRef.current = false;
    const tick = async () => {
      try {
        const r = await pluginApi("GET", "/system/ffmpeg/status");
        const st = r.body || {};
        setStatus(st);
        if (!st.busy) {
          stopPolling();
          const finishedOp = busyOp;
          setBusyOp("");
          await refresh();
          if (onChanged) onChanged();
          if (opNotifiedRef.current) return;
          opNotifiedRef.current = true;
          if (finishedOp === "uninstall") {
            if (!st.found) showToast(_tr("settings.system.uninstalled"));
            else showToast(_tr("settings.system.uninstallFailed", { msg: st.error || "?" }), "error");
          } else {
            if (st.found) showToast(_tr("settings.system.installed"));
            else showToast(_tr("settings.system.installFailed", { msg: st.error || "?" }), "error");
          }
        }
      } catch (e) { /* network blip — try again next tick */ }
    };
    tick();
    pollRef.current = setInterval(tick, 3000);
    return stopPolling;
  }, [busyOp, refresh, stopPolling, onChanged]);

  useEffect(() => () => stopPolling(), [stopPolling]);

  const formatElapsed = (sec) => {
    const s = Math.max(0, Math.round(sec || 0));
    const mm = String(Math.floor(s / 60)).padStart(2, "0");
    const ss = String(s % 60).padStart(2, "0");
    return mm + ":" + ss;
  };

  const startInstall = async (methodIndex) => {
    setStatus({ busy: true, log_tail: [], elapsed_sec: 0, op_kind: "install" });
    setBusyOp("install");
    try {
      const r = await pluginApi("POST", "/system/ffmpeg/install", { method_index: methodIndex });
      const body = r.body || {};
      if (body.ok === false) {
        setBusyOp("");
        showToast(_tr("settings.system.installFailed", { msg: body.error || "unknown" }), "error");
      }
    } catch (e) {
      setBusyOp("");
      showToast(_tr("settings.system.installFailed", { msg: e.message || "network error" }), "error");
    }
  };

  const startUninstall = async (methodIndex) => {
    setConfirmingUninstall(false);
    setStatus({ busy: true, log_tail: [], elapsed_sec: 0, op_kind: "uninstall" });
    setBusyOp("uninstall");
    try {
      const r = await pluginApi("POST", "/system/ffmpeg/uninstall", { method_index: methodIndex });
      const body = r.body || {};
      if (body.ok === false) {
        setBusyOp("");
        showToast(_tr("settings.system.uninstallFailed", { msg: body.error || "unknown" }), "error");
      }
    } catch (e) {
      setBusyOp("");
      showToast(_tr("settings.system.uninstallFailed", { msg: e.message || "network error" }), "error");
    }
  };

  const handleRecheck = async () => {
    if (rechecking || busyOp) return;
    setRechecking(true);
    const t0 = Date.now();
    try { await refresh(); }
    finally {
      const elapsed = Date.now() - t0;
      if (elapsed < 400) await new Promise(r => setTimeout(r, 400 - elapsed));
      setRechecking(false);
    }
  };

  const copyCmd = (cmd) => {
    if (!cmd) return;
    copyToClipboard(cmd);
    setCopied(true);
    setTimeout(() => setCopied(false), 1500);
  };

  if (loading) {
    return (
      <div className="sysdep-card">
        <div className="sysdep-card__head">
          <span className="sysdep-spinner" />
          <span className="sysdep-card__title">{t("settings.system.detecting")}</span>
        </div>
      </div>
    );
  }

  const found = !!(snap && snap.found);
  const methods = (snap && snap.methods) || [];
  const uninstallMethods = (snap && snap.uninstall_methods) || [];
  const isRoot = !!(snap && snap.is_root);
  const installing = busyOp === "install";
  const uninstalling = busyOp === "uninstall";
  const busy = !!busyOp;
  const liveStatus = busy ? status : ((snap && snap.last_install) || null);
  const logLines = (liveStatus && liveStatus.log_tail) || [];
  const lastOpKind = (liveStatus && liveStatus.op_kind) || "install";

  const primaryIdx = (() => {
    for (let i = 0; i < methods.length; i++) {
      const m = methods[i];
      if (m.strategy === "manual") continue;
      if (m.requires_sudo && !isRoot) continue;
      return i;
    }
    return methods.findIndex(m => m.strategy !== "manual");
  })();
  const primary = primaryIdx >= 0 ? methods[primaryIdx] : null;
  const manualMethod = methods.find(m => m.strategy === "manual");
  const blockingSudoMethod = (!found && primary == null)
    ? methods.find(m => m.requires_sudo && !isRoot)
    : null;

  const uninstallPrimaryIdx = (() => {
    for (let i = 0; i < uninstallMethods.length; i++) {
      const m = uninstallMethods[i];
      if (m.strategy === "manual") continue;
      if (m.requires_sudo && !isRoot) continue;
      return i;
    }
    return -1;
  })();
  const uninstallPrimary = uninstallPrimaryIdx >= 0 ? uninstallMethods[uninstallPrimaryIdx] : null;

  return (
    <div className="sysdep-card">
      <div className="sysdep-card__head">
        <div className="sysdep-card__title">
          <OAIcon name="package" /> FFmpeg
          {uninstalling
            ? <span className="sysdep-card__badge sysdep-card__badge--busy">
                <span className="sysdep-spinner" />
                {t("settings.system.uninstalling", { elapsed: formatElapsed(liveStatus && liveStatus.elapsed_sec) })}
              </span>
            : installing
              ? <span className="sysdep-card__badge sysdep-card__badge--busy">
                  <span className="sysdep-spinner" />
                  {t("settings.system.installing", { elapsed: formatElapsed(liveStatus && liveStatus.elapsed_sec) })}
                </span>
              : found
                ? <span className="sysdep-card__badge sysdep-card__badge--ok">
                    {snap.version
                      ? t("settings.system.status.found", { ver: snap.version })
                      : t("settings.system.status.foundNoVer")}
                  </span>
                : <span className="sysdep-card__badge sysdep-card__badge--missing">
                    {t("settings.system.status.missing")}
                  </span>}
        </div>
      </div>
      {found && snap.location && (
        <div className="sysdep-card__path">{t("settings.system.location", { path: snap.location })}</div>
      )}

      <div className="sysdep-card__actions">
        {!busy && !found && primary && (
          <button className="btn btn-sm btn-primary"
                  onClick={() => startInstall(primaryIdx)}
                  title={primary.command_hint || primary.strategy}>
            <OAIcon name="package" /> {t("settings.system.btn.install")}
          </button>
        )}
        {!busy && found && uninstallPrimary && !confirmingUninstall && (
          <button className="btn btn-sm btn-danger"
                  onClick={() => setConfirmingUninstall(true)}
                  title={uninstallPrimary.command_hint || uninstallPrimary.strategy}>
            <OAIcon name="trash" /> {t("settings.system.btn.uninstall")}
          </button>
        )}
        {!busy && (
          <button className="btn btn-sm" onClick={handleRecheck} disabled={rechecking}>
            {rechecking
              ? <><span className="sysdep-spinner" /> {t("settings.system.detecting")}</>
              : t("settings.system.btn.recheck")}
          </button>
        )}
        {snap && snap.homepage && (
          <a className="btn btn-sm" href={snap.homepage} target="_blank" rel="noopener noreferrer">
            <OAIcon name="link" /> {t("settings.system.btn.openHome")}
          </a>
        )}
      </div>

      {!busy && found && confirmingUninstall && uninstallPrimary && (
        <div className="sysdep-card__sudo-hint"
             style={{borderColor:"var(--danger)", background:"rgba(239,68,68,.08)"}}>
          <div style={{whiteSpace:"pre-wrap", color:"var(--text)", fontSize:12, lineHeight:1.6}}>
            {t("settings.system.uninstallConfirm")}
          </div>
          <div className="sysdep-card__sudo-cmd" style={{marginTop:10}}>
            <code>{uninstallPrimary.command_hint || uninstallPrimary.strategy}</code>
          </div>
          <div style={{display:"flex", gap:6, marginTop:10, justifyContent:"flex-end"}}>
            <button className="btn btn-sm" onClick={() => setConfirmingUninstall(false)}>
              {t("settings.system.btn.cancel")}
            </button>
            <button className="btn btn-sm btn-danger"
                    onClick={() => startUninstall(uninstallPrimaryIdx)}>
              <OAIcon name="trash" /> {t("settings.system.btn.uninstallConfirmBtn")}
            </button>
          </div>
        </div>
      )}

      {!found && !busy && !primary && manualMethod && !blockingSudoMethod && (
        <div className="sysdep-card__sudo-hint" style={{borderLeft:"3px solid var(--primary)"}}>
          {t("settings.system.noMethod")}
        </div>
      )}

      {!found && !busy && blockingSudoMethod && blockingSudoMethod.command_hint && (
        <div className="sysdep-card__sudo-hint">
          <div>{t("settings.system.requiresSudo")}</div>
          <div className="sysdep-card__sudo-cmd">
            <code>sudo {blockingSudoMethod.command_hint}</code>
            <button className="btn btn-sm" onClick={() => copyCmd("sudo " + blockingSudoMethod.command_hint)}>
              {copied ? t("settings.system.btn.copied") : t("settings.system.btn.copyCmd")}
            </button>
          </div>
        </div>
      )}

      {(busy || logLines.length > 0) && (
        <div className="sysdep-log">
          <div className="sysdep-log__head">
            <span>{lastOpKind === "uninstall"
              ? t("settings.system.logTitleUninstall")
              : t("settings.system.logTitle")}</span>
            {busy && liveStatus && liveStatus.elapsed_sec != null && (
              <span>{formatElapsed(liveStatus.elapsed_sec)}</span>
            )}
          </div>
          {logLines.length === 0
            ? <pre className="sysdep-log__body sysdep-log__body--empty">{t("settings.system.logEmpty")}</pre>
            : <pre className="sysdep-log__body" ref={logRef}>{logLines.join("\n")}</pre>}
        </div>
      )}
    </div>
  );
}

/* =================================================================
 * SettingsTab — DashScope key, system components (FFmpeg + health),
 * default runtime parameters, storage stats. The old standalone
 * "FFmpeg path" form-row and "健康检查" section have been merged
 * into the single 系统组件 section to match seedance-video and to
 * stop confusing users who didn't realise editing the path required
 * a service restart.
 * ================================================================= */

function SettingsTab({ health, onApiKeyChange }) {
  const t = useT();
  const [config, setConfig] = useState({});
  const [keyDraft, setKeyDraft] = useState("");
  const [keyVisible, setKeyVisible] = useState(false);
  const [saving, setSaving] = useState(false);
  const [stats, setStats] = useState(null);
  const [healthLocal, setHealthLocal] = useState(health || null);
  const [rechecking, setRechecking] = useState(false);

  const refresh = useCallback(() => {
    setRechecking(true);
    Promise.all([
      pluginApi("GET", "/settings").then(r => { if (r.body) setConfig(r.body); }).catch(() => {}),
      pluginApi("GET", "/storage/stats").then(r => { if (r.body) setStats(r.body); }).catch(() => {}),
      pluginApi("GET", "/healthz").then(r => { if (r.body) setHealthLocal(r.body); }).catch(() => {}),
    ]).finally(() => {
      setTimeout(() => setRechecking(false), 400);
    });
  }, []);

  useEffect(refresh, [refresh]);

  const save = async (updates) => {
    setSaving(true);
    try {
      const r = await pluginApi("PUT", "/settings", { updates });
      if (r.ok) {
        showToast(t("toast.savedSettings"));
        if ("dashscope_api_key" in updates) onApiKeyChange();
        refresh();
      } else showToast(t("toast.saveFailed"), "error");
    } catch { showToast(t("toast.saveFailed"), "error"); }
    setSaving(false);
  };

  const keyPresent = !!(config && config.dashscope_api_key_present);

  return (
    <div style={{maxWidth: 720}}>
      {/* API key */}
      <div className="oa-settings-section">
        <h3 className="oa-settings-section__title">
          <OAIcon name="key" />
          {t("settings.section.api")}
        </h3>
        <div className={"form-row" + (keyPresent ? "" : " oa-config-field-callout")}
             data-callout={keyPresent ? undefined : t("settings.api.callout")}>
          <div className="label">{t("settings.api.key")}</div>
          <div className="flex gap-2">
            <input className="input flex-1"
                   type={keyVisible ? "text" : "password"}
                   value={keyDraft}
                   onChange={e => setKeyDraft(e.target.value)}
                   placeholder={keyPresent ? (config.dashscope_api_key_masked || "·····") : "sk-..."} />
            <button className="btn btn-sm" onClick={() => setKeyVisible(!keyVisible)}>
              {keyVisible ? t("settings.api.key.hide") : t("settings.api.key.show")}
            </button>
            <button className="btn btn-sm btn-primary" disabled={saving || !keyDraft}
                    onClick={() => { save({ dashscope_api_key: keyDraft }); setKeyDraft(""); }}>
              {t("settings.api.key.save")}
            </button>
          </div>
          <div className="text-xs text-dim" style={{marginTop: 4}}>
            {t("settings.api.key.helpPrefix")}
            <a href="https://bailian.console.aliyun.com/#/api-key" target="_blank" rel="noopener"
               style={{color: "var(--primary)"}}>
              {t("settings.api.key.helpLink")}
            </a>
            {t("settings.api.key.helpSuffix")}
          </div>
        </div>
      </div>

      {/* System components — FfmpegInstaller + the rest of the health
          checks rolled into one section. Replaces the old separate
          "FFmpeg path" form-row + "健康检查" panel which used to give
          contradictory signals (one was a free-form path; the other
          was a snapshot that didn't react to the path change). */}
      <div className="oa-settings-section">
        <h3 className="oa-settings-section__title">
          <OAIcon name="package" />
          {t("settings.section.system")}
        </h3>
        <div className="deps-help">
          <strong>{t("settings.system.intro.strong")}</strong>
          <div style={{marginTop:4}}>{t("settings.system.intro.body")}</div>
          <ul>
            <li>{t("settings.system.platform.win")}</li>
            <li>{t("settings.system.platform.mac")}</li>
            <li>{t("settings.system.platform.linux")}</li>
          </ul>
        </div>
        <FfmpegInstaller onChanged={refresh} />

        {/* Other dependencies — Playwright (browser), DashScope key.
            Kept in the SAME section as FFmpeg so users see their
            entire system-readiness story in one place. The recheck
            button shows a spinner while polling all three endpoints
            (mirrors the FFmpeg sysdep-card pattern). */}
        <div className="other-deps">
          <div className="other-deps__head">
            <div className="oa-section-label" style={{margin: 0}}>{t("settings.system.healthTitle")}</div>
            <button className={"btn btn-sm" + (rechecking ? " is-rechecking" : "")}
                    onClick={refresh} disabled={rechecking}>
              {rechecking
                ? <><span className="sysdep-spinner" /> {t("settings.system.detecting")}</>
                : <><OAIcon name="refresh" /> {t("settings.system.health.refresh")}</>}
            </button>
          </div>
          <div className="text-xs text-dim" style={{marginBottom: 8, lineHeight: 1.6}}>
            {t("settings.system.health.intro")}
          </div>
          <div className="grid-2" style={{gap: 8}}>
            <HealthRow label={t("settings.system.health.playwright")} ok={healthLocal && healthLocal.playwright_ok} t={t} />
            <HealthRow label={t("settings.system.health.playwrightBrowser")} ok={healthLocal && healthLocal.playwright_browser_ready} t={t} />
            <HealthRow label={t("settings.system.health.apiKey")} ok={healthLocal && healthLocal.dashscope_api_key_present} t={t} />
          </div>
        </div>
      </div>

      {/* Default runtime parameters (no FFmpeg path here anymore — the
          installer above already handles that holistically). */}
      <div className="oa-settings-section">
        <h3 className="oa-settings-section__title">
          <OAIcon name="settings" />
          {t("settings.section.runtime")}
        </h3>
        <div className="grid-2">
          <div className="form-row">
            <div className="label">{t("settings.runtime.timeout")}</div>
            <input className="input" type="number" min="60" max="3600"
                   defaultValue={config.paraformer_timeout || "900"}
                   onBlur={e => save({ paraformer_timeout: e.target.value })} />
          </div>
          <div className="form-row">
            <div className="label">{t("settings.runtime.maxParallel")}</div>
            <input className="input" type="number" min="1" max="8"
                   defaultValue={config.translation_parallel || "2"}
                   onBlur={e => save({ translation_parallel: e.target.value })} />
          </div>
        </div>
        <div className="text-xs text-dim" style={{marginTop: 4}}>
          {t("settings.runtime.help")}
        </div>
      </div>

      {/* Storage */}
      {stats && (
        <div className="oa-settings-section">
          <h3 className="oa-settings-section__title">
            <OAIcon name="folder" />
            {t("settings.section.storage")}
          </h3>
          <div className="grid-2" style={{gap: 8}}>
            <div className="oa-summary-pill">
              <div className="oa-summary-pill__label">{t("settings.storage.totalFiles")}</div>
              <div className="oa-summary-pill__value">{stats.total_files || 0}</div>
            </div>
            <div className="oa-summary-pill">
              <div className="oa-summary-pill__label">{t("settings.storage.totalSize")}</div>
              <div className="oa-summary-pill__value">{fmtSize(stats.total_bytes || 0)}</div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function HealthRow({ label, ok, t }) {
  return (
    <div className="flex items-center justify-between" style={{padding: "6px 10px", border: "1px solid var(--border)", borderRadius: 6}}>
      <span className="text-sm">{label}</span>
      <span className={"tag " + (ok ? "tag-green" : "tag-red")}>
        {ok ? t("settings.system.health.ok") : t("settings.system.health.missing")}
      </span>
    </div>
  );
}

<script>
/* =================================================================
 * Manual compile-and-execute (mirror of clip-sense fix 1cadcacd).
 *
 * Reads the JSX source from <script type="text/plain" id="sc-jsx-source">,
 * runs Babel.transform({ presets: ["react"] }) inside try/catch, then
 * eval()s the compiled code inside another try/catch. Both failures
 * surface as in-page panels with full stacks instead of the opaque
 * cross-origin "Script error." that <script type="text/babel"> swallows.
 * ================================================================= */
(function() {
  console.log("[subtitle-craft] Manual compile+execute starting...");
  var srcEl = document.getElementById("sc-jsx-source");
  if (!srcEl) { document.getElementById("root").innerHTML = '<div style="padding:24px;color:#ef4444"><b>Source element not found</b></div>'; return; }
  if (typeof Babel === "undefined") { document.getElementById("root").innerHTML = '<div style="padding:24px;color:#ef4444"><b>Babel not loaded (CDN issue?)</b></div>'; return; }
  if (typeof React === "undefined") { document.getElementById("root").innerHTML = '<div style="padding:24px;color:#ef4444"><b>React not loaded (CDN issue?)</b></div>'; return; }
  var code;
  try {
    var result = Babel.transform(srcEl.textContent, { presets: ["react"], filename: "subtitle-craft.jsx" });
    code = result.code;
    console.log("[subtitle-craft] Compilation OK (" + code.length + " chars)");
  } catch (compileErr) {
    console.error("[subtitle-craft] COMPILE ERROR:", compileErr);
    document.getElementById("root").innerHTML = '<div style="padding:24px;color:#ef4444;font-size:13px"><b>Babel Compilation Error</b><pre style="margin-top:12px;white-space:pre-wrap;font-size:12px;background:#fef2f2;padding:16px;border:1px solid #fecaca;border-radius:8px;overflow:auto;max-height:500px">' + (compileErr.stack || String(compileErr)) + '</pre></div>';
    return;
  }
  try {
    (0, eval)(code);
    console.log("[subtitle-craft] Execution OK");
  } catch (runErr) {
    console.error("[subtitle-craft] RUNTIME ERROR:", runErr);
    document.getElementById("root").innerHTML = '<div style="padding:24px;color:#ef4444;font-size:13px"><b>Runtime Error</b><pre style="margin-top:12px;white-space:pre-wrap;font-size:12px;background:#fef2f2;padding:16px;border:1px solid #fecaca;border-radius:8px;overflow:auto;max-height:500px">' + (runErr.stack || String(runErr)) + '</pre></div>';
  }
})();
</script>

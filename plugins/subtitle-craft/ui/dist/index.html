<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subtitle Craft · 字幕工坊</title>
  <!--
    Phase 5 full UI for the subtitle-craft plugin (v1.0.0).

    Aligned with tongyi-image on these 8 contracts (red-line "8-item parity"):
      1. oa-hero-title in header (icon + title + subtitle)
      2. oa-config-banner when DashScope key missing (CTA -> Settings tab)
      3. oa-section-label form labels (accent bar, weight 600)
      4. Tab-as-iframe-page layout: 4 tabs, each lazy-mounted on first visit
      5. Bridge SDK identical (api/upload/download/show-in-folder/i18n)
      6. Theme + locale follow host bridge events
      7. Right-side preview area (oa-preview-area) — inline split layout,
         NOT a slide-in panel
      8. Toast + modal patterns: oa-modal, showToast, lightbox

    No cross-plugin dispatch surface in v1.0 — schema reservation only
    (assets_bus table + tasks.origin_* columns) and the UI is completely
    silent about it. v2.0 will add a "send to …" button row without any
    data migration.
  -->
  <script src="_assets/bootstrap.js"></script>
  <link rel="stylesheet" href="_assets/styles.css">
  <script src="_assets/icons.js"></script>
  <script src="_assets/markdown-mini.js"></script>
  <script src="_assets/i18n.js"></script>
  <link rel="preload" as="script" crossorigin href="https://unpkg.com/react@18/umd/react.production.min.js" />
  <link rel="preload" as="script" crossorigin href="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" />
  <link rel="preload" as="script" href="https://unpkg.com/@babel/standalone/babel.min.js" />
  <style>
    :root {
      --bg: #f8fafc; --bg-card: #ffffff; --bg-hover: #f1f5f9;
      --text: #1e293b; --text-muted: #64748b; --text-dim: #94a3b8;
      --primary: #6366f1; --primary-hover: #4f46e5; --primary-light: rgba(99,102,241,.1);
      --success: #22c55e; --warning: #f59e0b; --danger: #ef4444;
      --border: #e2e8f0; --radius: 8px;
    }
    [data-theme="dark"] {
      --bg: #0f172a; --bg-card: #1e293b; --bg-hover: #334155;
      --text: #f1f5f9; --text-muted: #94a3b8; --text-dim: #64748b;
      --border: #334155;
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --bg: #0f172a; --bg-card: #1e293b; --bg-hover: #334155;
        --text: #f1f5f9; --text-muted: #94a3b8; --text-dim: #64748b;
        --border: #334155;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
    .app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    .header { display: flex; align-items: center; justify-content: space-between; padding: 10px 18px; border-bottom: 1px solid var(--border); background: var(--bg-card); }
    .header-right { display: flex; align-items: center; gap: 12px; font-size: 13px; color: var(--text-muted); }
    .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); background: var(--bg-card); padding: 0 16px; }
    .tab { padding: 9px 16px; font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent; color: var(--text-muted); transition: all .15s; white-space: nowrap; }
    .tab:hover { color: var(--text); background: var(--bg-hover); }
    .tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 500; }
    .content { flex: 1; overflow: hidden; padding: 14px 16px; position: relative; }
    .content > div { overflow-y: auto; }
    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; box-shadow: 0 1px 2px rgba(0,0,0,.04); }

    .btn { padding: 7px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text); font-size: 13px; cursor: pointer; transition: all .15s; display: inline-flex; align-items: center; gap: 6px; }

    .split-right { flex: 1; overflow-y: auto; }
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; color: var(--text-dim); text-align: center; }
    .task-card { display: flex; gap: 12px; padding: 12px; border: 1px solid var(--border); border-radius: var(--radius); transition: .15s; cursor: pointer; margin-bottom: 8px; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .style-option { padding: 10px; border: 1px solid var(--border); border-radius: 6px; text-align: center; cursor: pointer; font-size: 12px; transition: .15s; }
    .style-option:hover { border-color: var(--primary); }
    .style-option.active { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }
    .progress-bar { height: 6px; background: var(--bg-hover); border-radius: 3px; overflow: hidden; }
    .progress-bar > div { height: 100%; background: var(--primary); transition: width .3s; }
    .step-list { display: flex; flex-direction: column; gap: 6px; }
    .step-row { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 4px; font-size: 12px; }
    .step-row.active { background: var(--primary-light); color: var(--primary); font-weight: 500; }
    .step-row.done { color: var(--success); }
    .step-row.pending { color: var(--text-dim); }
    .step-row.error { color: var(--danger); background: rgba(239,68,68,.08); }
    .srt-preview { font-family: 'SF Mono', Consolas, 'Courier New', monospace; font-size: 12px; line-height: 1.55; white-space: pre-wrap; max-height: 320px; overflow: auto; padding: 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; }

    .switch.off .switch-knob { left: 2px; }
    .switch-row.disabled { opacity: .45; cursor: not-allowed; }
    .switch-row.disabled .switch { cursor: not-allowed; }
    @media (max-width: 860px) { .split-layout { flex-direction: column; } .split-left { width: 100%; min-width: unset; } }
    /* tongyi-image alignment classes (oa-*) */
    .oa-hero-title { display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 600; }

    .oa-config-banner__icon { color: var(--warning); width: 20px; height: 20px; flex-shrink: 0; }
    .oa-config-banner__text { flex: 1; font-size: 13px; }
    .oa-config-banner__action { background: var(--warning); color: #fff; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; display: inline-flex; align-items: center; gap: 4px; }
    .oa-settings-section { margin-bottom: 24px; }
    .oa-settings-section__title { font-size: 14px; font-weight: 600; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
    .oa-icon { display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px; }
    .oa-preview-area { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; min-height: 320px; }
    /* modal */
    .modal-mask { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center; z-index: 2000; padding: 20px; animation: ak-fade-in .15s ease-out; }
    .modal-card { background: var(--bg-card); border-radius: 12px; padding: 22px 24px; max-width: 460px; width: 100%; box-shadow: 0 20px 50px rgba(0,0,0,.25); animation: ak-scale-in .15s ease-out; }
    .modal-icon { width: 42px; height: 42px; border-radius: 50%; background: rgba(34,197,94,.12); color: var(--success); display: flex; align-items: center; justify-content: center; margin-bottom: 14px; font-size: 22px; font-weight: 700; }
    .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
    .modal-desc { font-size: 13px; color: var(--text-muted); line-height: 1.6; margin-bottom: 18px; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
    @keyframes ak-fade-in { from { opacity: 0; } to { opacity: 1; } }
    @keyframes ak-scale-in { from { transform: scale(.94); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    /* error panel */
    .error-panel { background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.3); border-radius: 6px; padding: 12px 14px; }
    .error-panel__kind { display: inline-flex; align-items: center; gap: 6px; padding: 2px 8px; background: rgba(239,68,68,.18); color: var(--danger); border-radius: 4px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
    .error-panel__msg { margin: 8px 0 6px; font-size: 13px; color: var(--text); line-height: 1.5; }
    .error-panel__hint { font-size: 12px; color: var(--text-muted); line-height: 1.5; }
    /* cost preview */
    .cost-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .cost-table td { padding: 4px 6px; border-bottom: 1px solid var(--border); }
    .cost-table tr:last-child td { border-bottom: none; font-weight: 600; }
    .cost-table td.right { text-align: right; }
  </style>
</head>
<body>
<div id="root"></div>

<script>
/* =================================================================
 * Bridge SDK — verbatim from tongyi-image (only pluginId fallback
 * differs). Provides apiCall / pluginApi / uploadFile / showToast /
 * downloadFile / bridgeShowInFolder / onEvent / theme & locale sync.
 * ================================================================= */
const BRIDGE_VER = 1;
let _ctx = null, _caps = [], _pending = {}, _handlers = {};
let _bridgeConnected = false;
const _inIframe = window.parent !== window;
function uid() { return Math.random().toString(36).slice(2,10) + Date.now().toString(36); }
function post(msg) { if (_inIframe) window.parent.postMessage({ __akita_bridge: true, version: BRIDGE_VER, ...msg }, "*"); }

function _detectApiBase() {
  if (_ctx && _ctx.apiBase) return _ctx.apiBase;
  var loc = window.location;
  if (loc.port === "5173" || loc.port === "1420") return "http://127.0.0.1:18900";
  return loc.origin;
}

function directFetch(method, path, body) {
  var url = path.startsWith("http") ? path : _detectApiBase() + path;
  var opts = { method: method, headers: { "Content-Type": "application/json" } };
  if (body && method !== "GET" && method !== "HEAD") {
    if (body instanceof FormData) { opts.body = body; delete opts.headers["Content-Type"]; }
    else { opts.body = JSON.stringify(body); }
  }
  return fetch(url, opts).then(function(resp) {
    return resp.json().then(function(json) { return { ok: resp.ok, status: resp.status, body: json }; })
      .catch(function() { return { ok: resp.ok, status: resp.status, body: null }; });
  });
}

function apiCall(method, path, body) {
  if (!_inIframe || !_bridgeConnected) return directFetch(method, path, body);
  return new Promise(function(resolve, reject) {
    var id = uid();
    _pending[id] = { resolve: resolve, reject: reject };
    post({ type: "bridge:api-request", requestId: id, payload: { method: method, path: path, body: body } });
    setTimeout(function() {
      if (_pending[id]) { delete _pending[id]; directFetch(method, path, body).then(resolve).catch(reject); }
    }, 5000);
  });
}

function pluginApi(method, path, body) {
  var base = _ctx ? "/api/plugins/" + _ctx.pluginId : "/api/plugins/subtitle-craft";
  return apiCall(method, base + path, body);
}

function bridgeDownload(url, fname) {
  return new Promise(function(resolve) {
    if (!_inIframe || !_bridgeConnected) { resolve({ ok: false, error: "no-bridge" }); return; }
    var id = uid();
    _pending[id] = { resolve: resolve, reject: function(e) { resolve({ ok: false, error: String(e) }); } };
    post({ type: "bridge:download", requestId: id, payload: { url: url, filename: fname } });
    setTimeout(function() {
      if (_pending[id]) { delete _pending[id]; resolve({ ok: false, error: "timeout" }); }
    }, 60000);
  });
}

function bridgeShowInFolder(path) {
  if (!_inIframe || !_bridgeConnected || !path) return;
  if (_caps.length && _caps.indexOf("show-in-folder") === -1) return;
  var id = uid();
  _pending[id] = { resolve: function() {}, reject: function() {} };
  post({ type: "bridge:show-in-folder", requestId: id, payload: { path: path } });
  setTimeout(function() { if (_pending[id]) delete _pending[id]; }, 10000);
}

window.addEventListener("message", function(e) {
  var d = e.data;
  if (!d || !d.__akita_bridge) return;
  if (d.type === "bridge:init" && d.payload) {
    _ctx = d.payload; _bridgeConnected = true;
    if (_ctx.theme) document.documentElement.setAttribute("data-theme", _ctx.theme.includes("dark") ? "dark" : "light");
    if (_ctx.locale && window.OpenAkitaI18n && window.OpenAkitaI18n.setLocale) {
      window.OpenAkitaI18n.setLocale(_ctx.locale.startsWith("zh") ? "zh" : "en");
    }
  }
  if (d.type === "bridge:handshake-ack" && d.payload) { _caps = d.payload.capabilities || []; _bridgeConnected = true; }
  var acks = ["bridge:api-response","bridge:clipboard-ack","bridge:download-ack","bridge:show-in-folder-ack","bridge:pick-folder-ack"];
  if (acks.indexOf(d.type) !== -1 && d.requestId && _pending[d.requestId]) {
    _pending[d.requestId].resolve(d.payload); delete _pending[d.requestId];
  }
  if (d.type === "bridge:theme-change" && d.payload) {
    document.documentElement.setAttribute("data-theme", (d.payload.theme || "").includes("dark") ? "dark" : "light");
  }
  if (d.type === "bridge:locale-change" && d.payload && window.OpenAkitaI18n && window.OpenAkitaI18n.setLocale) {
    window.OpenAkitaI18n.setLocale((d.payload.locale || "").startsWith("zh") ? "zh" : "en");
  }
  if (d.type === "bridge:event" && d.payload) {
    var h = _handlers[d.payload.eventType];
    if (h) h.forEach(function(fn) { fn(d.payload.data); });
  }
});
var _readyInterval = null;
function _sendReady() { post({ type: "bridge:ready" }); post({ type: "bridge:handshake", payload: { sdkVersion: "1.0.0" } }); }
_sendReady();
if (_inIframe) {
  _readyInterval = setInterval(function() { if (_bridgeConnected) { clearInterval(_readyInterval); return; } _sendReady(); }, 300);
  setTimeout(function() { if (_readyInterval) clearInterval(_readyInterval); }, 20000);
}
function onEvent(type, fn) { (_handlers[type] = _handlers[type] || []).push(fn); }

function uploadFile(file) {
  var base = _detectApiBase() + (_ctx ? "/api/plugins/" + _ctx.pluginId : "/api/plugins/subtitle-craft");
  var fd = new FormData(); fd.append("file", file);
  return fetch(base + "/upload", { method: "POST", body: fd }).then(function(r) { return r.json(); });
}

function _tr(key, vars, fallback) {
  if (window.OpenAkitaI18n && window.OpenAkitaI18n.t) {
    var v = window.OpenAkitaI18n.t(key, vars);
    if (v && v !== key) return v;
  }
  if (fallback) {
    if (vars) {
      return String(fallback).replace(/\{(\w+)\}/g, function (_, n) {
        return vars[n] != null ? String(vars[n]) : "{" + n + "}";
      });
    }
    return fallback;
  }
  return key;
}

async function downloadFile(url, fname) {
  try {
    showToast(_tr("toast.downloading", null, "Downloading..."));
    var fullUrl = url.startsWith("http") ? url : _detectApiBase() + url;
    if (_inIframe && _bridgeConnected) {
      var native = await bridgeDownload(fullUrl, fname);
      if (native && native.ok && native.path && /[\\/]/.test(String(native.path))) {
        showToast(_tr("toast.downloadedTo", { path: native.path }, "Saved to: {path}"));
        bridgeShowInFolder(native.path);
        return;
      }
    }
    var resp = await fetch(fullUrl);
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    var blob = await resp.blob();
    var objUrl = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = objUrl; a.download = fname;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function() { URL.revokeObjectURL(objUrl); }, 3000);
    showToast(_tr("toast.downloadedBrowser", { name: fname }, "Downloaded {name}."));
  } catch (e) {
    showToast(_tr("toast.downloadFailed", { msg: e.message }, "Download failed: {msg}"));
  }
}

function showToast(body, type) {
  type = type || "success";
  if (_inIframe && _bridgeConnected) { post({ type: "bridge:notification", payload: { title: "", body: body, type: type } }); return; }
  console.log("[Toast]", type, body);
}
</script>

<script type="text/babel" data-type="module">

/* =================================================================

const I18N_DICT = {
  zh: {
    // app shell
    "app.title": "字幕工坊",
    "app.subtitle": "DashScope · 自动字幕 / 翻译 / 修复 / 烧制",

if (window.OpenAkitaI18n && window.OpenAkitaI18n.registerDict) {
  window.OpenAkitaI18n.registerDict(I18N_DICT);
}

function useT() {
  const [, force] = useState(0);
  useEffect(() => {
    if (!window.OpenAkitaI18n || !window.OpenAkitaI18n.onChange) return;
    return window.OpenAkitaI18n.onChange(() => force(n => n + 1));
  }, []);
  return useCallback((key, vars) => _tr(key, vars, key), []);
}

function useLocale() {
  const [loc, setLoc] = useState(() =>
    (window.OpenAkitaI18n && window.OpenAkitaI18n.getLocale && window.OpenAkitaI18n.getLocale()) || "zh"
  );
  useEffect(() => {
    if (!window.OpenAkitaI18n || !window.OpenAkitaI18n.onChange) return;
    return window.OpenAkitaI18n.onChange(() =>
      setLoc((window.OpenAkitaI18n.getLocale && window.OpenAkitaI18n.getLocale()) || "zh")
    );
  }, []);
  return loc;
}

/* =================================================================
 * Reusable atoms
 * ================================================================= */

function Switch({ on, onChange, disabled }) {
  return (
    <div className={"switch " + (on ? "on" : "off")}
         onClick={() => !disabled && onChange(!on)}
         style={disabled ? { opacity: .5, cursor: "not-allowed" } : undefined}>
      <div className="switch-knob" />
    </div>
  );
}

function StatusBadge({ status }) {
  const t = useT();
  const map = {
    pending: "tag-gray", running: "tag-orange",
    succeeded: "tag-green", failed: "tag-red", canceled: "tag-gray",
  };
  return <span className={"tag " + (map[status] || "tag-gray")}>{t("status." + status)}</span>;
}

function ErrorPanel({ kind, message, hints }) {
  const t = useT();
  const hint = hints || (kind ? t("errorKind." + kind) : "");
  return (
    <div className="error-panel">
      <div className="flex items-center gap-2">
        <span className="error-panel__kind">{kind || "unknown"}</span>
        <span className="text-xs text-dim">{hint}</span>
      </div>
      <div className="error-panel__msg">{message || ""}</div>
    </div>
  );
}

function CostTable({ preview, t }) {
  if (!preview || !preview.items || preview.items.length === 0) {
    return <div className="text-sm text-dim">—</div>;
  }
  return (
    <table className="cost-table">
      <tbody>
        {preview.items.map((it, i) => (
          <tr key={i}>
            <td>{it.label || it.api}</td>
            <td className="right text-dim">{it.quantity || ""}</td>
            <td className="right">¥ {Number(it.cost_cny || 0).toFixed(4)}</td>
          </tr>
        ))}
        <tr>
          <td>{t("create.cost.total")}</td>
          <td></td>
          <td className="right">¥ {Number(preview.total_cny || 0).toFixed(4)}</td>
        </tr>
      </tbody>
    </table>
  );
}

function StepList({ currentStep, status, errorStep }) {
  const t = useT();
  const STEPS = [
    "setup_environment",
    "estimate_cost",
    "prepare_assets",
    "asr_or_load",
    "identify_characters",
    "translate_or_repair",
    "render_output",
    "burn_or_finalize",
  ];
  const currentIdx = STEPS.indexOf(currentStep);
  return (
    <div className="step-list">
      {STEPS.map((step, i) => {
        let cls = "pending";
        if (status === "succeeded") cls = "done";
        else if (errorStep === step) cls = "error";
        else if (currentIdx > i) cls = "done";
        else if (currentIdx === i) cls = "active";
        return (
          <div key={step} className={"step-row " + cls}>
            <span style={{width: 14, display:"inline-block"}}>
              {cls === "done" ? "✓" : cls === "active" ? "•" : cls === "error" ? "✗" : "·"}
            </span>
            <span>{t("steps." + step)}</span>
          </div>
        );
      })}
    </div>
  );
}

function fmtDuration(sec) {
  if (!sec || sec < 0) return "—";
  const s = Math.floor(sec);
  if (s < 60) return s + "s";
  const m = Math.floor(s / 60);
  const r = s % 60;
  return m + "m " + (r ? r + "s" : "");
}

function fmtSize(bytes) {
  if (!bytes) return "0 B";
  const u = ["B", "KB", "MB", "GB"];
  let i = 0;
  let v = bytes;
  while (v >= 1024 && i < u.length - 1) { v /= 1024; i += 1; }
  return v.toFixed(v < 10 ? 2 : 1) + " " + u[i];
}

function fmtTime(ts) {
  if (!ts) return "—";
  try {
    const d = typeof ts === "number" ? new Date(ts * 1000) : new Date(ts);
    return d.toLocaleString();
  } catch (_) { return String(ts); }
}

        duration_sec: dur,

        translation_model: translationModel,

function UploadZone({ file, accept, uploading, onPick, onClear }) {
  const t = useT();
  const inputRef = useRef(null);

  const onDrop = useCallback(e => {
    e.preventDefault();
    const f = e.dataTransfer.files && e.dataTransfer.files[0];
    if (f) onPick(f);
  }, [onPick]);

  if (file) {
    return (
      <div className="upload-zone has-file">
        <div className="flex items-center gap-3">
          <div className="task-thumb">📄</div>
          <div className="flex-1" style={{minWidth: 0}}>
            <div className="text-sm" style={{fontWeight: 600, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap"}}>
              {file.filename}
            </div>
            <div className="text-xs text-dim">
              {fmtSize(file.size_bytes)} · {file.duration_sec ? fmtDuration(file.duration_sec) : "—"}
            </div>
          </div>
          <button className="btn btn-sm btn-danger" onClick={onClear}>×</button>
        </div>
      </div>
    );
  }

  return (
    <div className="upload-zone"
         onClick={() => inputRef.current && inputRef.current.click()}
         onDragOver={e => e.preventDefault()}
         onDrop={onDrop}>
      {uploading ? (
        <div className="flex items-center justify-between" style={{justifyContent:"center", gap: 10}}>
          <span className="spinner-sm" />
          <span>{t("common.loading")}</span>
        </div>
      ) : (
        <>
          <div style={{fontSize: 24, marginBottom: 8}}>📁</div>

/* =================================================================
 * TasksTab — split layout: list left, detail right (oa-preview-area).
 * Live updates via SSE bridge (event "task_update"). 15-second
 * polling fallback when SSE drops.
 * ================================================================= */

function TasksTab({ refreshSignal }) {
  const t = useT();
  const [tasks, setTasks] = useState([]);
  const [total, setTotal] = useState(0);
  const [loading, setLoading] = useState(false);
  const [statusFilter, setStatusFilter] = useState("");
  const [modeFilter, setModeFilter] = useState("");
  const [selected, setSelected] = useState(null);

  const refresh = useCallback(async () => {
    setLoading(true);
    try {
      const params = new URLSearchParams();
      if (statusFilter) params.set("status", statusFilter);
      if (modeFilter) params.set("mode", modeFilter);
      params.set("limit", "100");
      const r = await pluginApi("GET", "/tasks?" + params.toString());
      if (r.ok && r.body) {
        const list = r.body.tasks || [];
        setTasks(list);
        setTotal(r.body.total || list.length);
        setSelected(prev => {
          if (!prev) return prev;
          const fresh = list.find(x => x.id === prev.id);
          return fresh || prev;
        });
      }
    } catch (_) { /* silent */ }
    setLoading(false);
  }, [statusFilter, modeFilter]);

  useEffect(() => { refresh(); }, [refresh, refreshSignal]);

  // Poll every 15s as a safety net if SSE is unavailable.
  useEffect(() => {
    const id = setInterval(refresh, 15000);
    return () => clearInterval(id);
  }, [refresh]);

  // SSE bridge events
  useEffect(() => {
    const fn = (data) => {
      if (!data || !data.task_id) return;
      setTasks(prev => {
        const idx = prev.findIndex(x => x.id === data.task_id);
        if (idx < 0) { refresh(); return prev; }
        const next = prev.slice();
        next[idx] = { ...next[idx], ...data };
        return next;
      });
      setSelected(prev => prev && prev.id === data.task_id ? { ...prev, ...data } : prev);
    };
    onEvent("task_update", fn);
    // No off() exposed by tongyi-image SDK — accept as design.
  }, [refresh]);

  return (
    <div className="split-layout">
      <div className="split-left">
        <div className="flex gap-2" style={{marginBottom: 12, flexWrap: "wrap"}}>
          <select className="input select" style={{width: "auto"}}
                  value={statusFilter} onChange={e => setStatusFilter(e.target.value)}>
            <option value="">{t("tasks.filter.all")}</option>
            <option value="pending">{t("status.pending")}</option>
            <option value="running">{t("status.running")}</option>
            <option value="succeeded">{t("status.succeeded")}</option>
            <option value="failed">{t("status.failed")}</option>
            <option value="canceled">{t("status.canceled")}</option>
          </select>
          <select className="input select" style={{width: "auto"}}
                  value={modeFilter} onChange={e => setModeFilter(e.target.value)}>
            <option value="">{t("tasks.filter.allModes")}</option>
            <option value="auto_subtitle">{t("modes.auto_subtitle")}</option>
            <option value="translate">{t("modes.translate")}</option>
            <option value="repair">{t("modes.repair")}</option>
            <option value="burn">{t("modes.burn")}</option>
          </select>
          <button className="btn btn-sm" onClick={refresh}>{t("common.refresh")}</button>
        </div>
        <div className="text-xs text-dim" style={{marginBottom: 8}}>
          {loading ? t("common.loading") : t("tasks.totalCount", { n: total })}
        </div>
        {tasks.length === 0 ? (
          <div className="empty-state">
            <div style={{fontSize: 28, marginBottom: 8}}>📭</div>
            <div className="text-sm" style={{fontWeight: 600, marginBottom: 4}}>{t("tasks.empty.title")}</div>
            <div className="text-xs text-dim">{t("tasks.empty.hint")}</div>
          </div>
        ) : (
          tasks.map(task => (
            <div key={task.id}
                 className={"task-card" + (selected && selected.id === task.id ? " selected" : "")}
                 onClick={() => setSelected(task)}>
              <div className="task-thumb">
                {task.mode === "auto_subtitle" ? "🎙" :
                 task.mode === "translate" ? "🌐" :
                 task.mode === "repair" ? "🛠" : "🎬"}
              </div>
              <div className="task-info">
                <h4>{task.id.slice(0, 8)} · {t("modes." + task.mode)}</h4>
                <div className="task-meta">
                  <StatusBadge status={task.status} />
                  {task.pipeline_step && <span>{t("steps." + task.pipeline_step)}</span>}
                  <span>{fmtTime(task.created_at)}</span>
                </div>
              </div>
            </div>
          ))
        )}
      </div>

      <div className="split-right">
        <div className="oa-preview-area">
          {selected ? <TaskDetail task={selected} onChange={refresh} /> : (
            <div className="empty-state">
              <div className="text-sm" style={{fontWeight: 600, marginBottom: 4}}>{t("tasks.empty.noSelection.title")}</div>
              <div className="text-xs text-dim">{t("tasks.empty.noSelection.hint")}</div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function TaskDetail({ task, onChange }) {
  const t = useT();
  const [previewSrt, setPreviewSrt] = useState("");
  const [busy, setBusy] = useState(false);

  useEffect(() => {
    setPreviewSrt("");
    if (task.status === "succeeded" && task.output_srt_path) {
      pluginApi("GET", "/tasks/" + task.id + "/preview_srt").then(r => {
        if (r.ok && r.body && r.body.srt) setPreviewSrt(r.body.srt);
      }).catch(() => {});
    }
  }, [task.id, task.status, task.output_srt_path]);

  const cancel = async () => {
    if (busy) return;
    setBusy(true);
    try { await pluginApi("POST", "/tasks/" + task.id + "/cancel"); showToast(t("toast.canceled")); onChange(); }
    catch (e) { showToast(e.message, "error"); }
    setBusy(false);
  };
  const retry = async () => {
    setBusy(true);
    try {
      const r = await pluginApi("POST", "/tasks/" + task.id + "/retry");
      if (r.ok) { showToast(t("toast.taskCreated")); onChange(); }
      else showToast(t("toast.taskFailed", { msg: r.body && (r.body.detail || "") || ("HTTP " + r.status) }), "error");
    } catch (e) { showToast(t("toast.taskFailed", { msg: e.message }), "error"); }
    setBusy(false);
  };
  const remove = async () => {
    if (!confirm(t("tasks.detail.confirmDelete"))) return;
    setBusy(true);
    try { await pluginApi("DELETE", "/tasks/" + task.id); showToast(t("toast.deleted")); onChange(); }
    catch (e) { showToast(e.message, "error"); }
    setBusy(false);
  };

  const dlSrt = () => downloadFile("/api/plugins/subtitle-craft/tasks/" + task.id + "/download", "subtitle_" + task.id.slice(0,8) + ".srt");
  const dlVideo = () => downloadFile("/api/plugins/subtitle-craft/tasks/" + task.id + "/download_video", "burned_" + task.id.slice(0,8) + ".mp4");

  return (
    <div>
      <div className="flex items-center justify-between" style={{marginBottom: 12}}>
        <div>
          <div className="card-title" style={{marginBottom: 2}}>{t("tasks.detail.title")}</div>
          <div className="text-xs text-dim">{task.id}</div>
        </div>
        <div className="flex gap-2">
          {task.status === "running" && (
            <button className="btn btn-sm" onClick={cancel} disabled={busy}>{t("tasks.detail.cancel")}</button>
          )}
          {(task.status === "failed" || task.status === "canceled") && (
            <button className="btn btn-sm btn-primary" onClick={retry} disabled={busy}>{t("tasks.detail.retry")}</button>
          )}
          <button className="btn btn-sm btn-danger" onClick={remove} disabled={busy}>{t("tasks.detail.delete")}</button>
        </div>
      </div>

      <div className="grid-2" style={{marginBottom: 12}}>
        <div>
          <div className="text-xs text-dim">{t("tasks.detail.mode")}</div>
          <div className="text-sm">{t("modes." + task.mode)}</div>
        </div>
        <div>
          <div className="text-xs text-dim">{t("status." + task.status)}</div>
          <div><StatusBadge status={task.status} /></div>
        </div>
        <div>
          <div className="text-xs text-dim">{t("tasks.detail.created")}</div>
          <div className="text-sm">{fmtTime(task.created_at)}</div>
        </div>
        <div>
          <div className="text-xs text-dim">{t("tasks.detail.duration")}</div>
          <div className="text-sm">{
            task.completed_at && task.created_at
              ? fmtDuration((new Date(task.completed_at) - new Date(task.created_at)) / 1000)
              : task.status === "running" ? t("tasks.detail.runningHint") : "—"
          }</div>
        </div>
      </div>

      {task.status === "running" && (
        <div className="card">
          <div className="label">{t("steps." + (task.pipeline_step || "setup_environment"))}</div>
          {typeof task.progress === "number" && (
            <div className="progress-bar"><div style={{width: Math.max(0, Math.min(100, task.progress * 100)) + "%"}} /></div>
          )}
          <div style={{marginTop: 14}}>
            <StepList currentStep={task.pipeline_step} status={task.status} />
          </div>
        </div>
      )}

      {task.status === "failed" && task.error_kind && (
        <div className="card">
          <div className="label">{t("tasks.detail.errorPanel")}</div>
          <ErrorPanel kind={task.error_kind} message={task.error_message}
                      hints={t("errorKind." + task.error_kind)} />
          <div style={{marginTop: 12}}>
            <StepList currentStep={task.pipeline_step} status={task.status} errorStep={task.pipeline_step} />
          </div>
        </div>
      )}

      {task.status === "succeeded" && (
        <>
          <div className="card">
            <div className="label">{t("tasks.detail.outputs")}</div>
            <div className="flex gap-2 flex-wrap">
              {task.output_srt_path && (
                <button className="btn btn-sm" onClick={dlSrt}>📝 {t("tasks.detail.downloadSrt")}</button>
              )}
              {task.output_video_path && (
                <button className="btn btn-sm btn-primary" onClick={dlVideo}>🎬 {t("tasks.detail.downloadVideo")}</button>
              )}
            </div>
          </div>
          {previewSrt && (
            <div className="card">
              <div className="label">{t("tasks.detail.previewSrt")}</div>
              <div className="srt-preview">{previewSrt.slice(0, 2000)}{previewSrt.length > 2000 ? "\n…" : ""}</div>
            </div>
          )}
        </>
      )}
    </div>
  );
}

function StylesManager() {
  const t = useT();
  const [data, setData] = useState({ builtin: [], custom: [] });
  const [loading, setLoading] = useState(false);
  const [adding, setAdding] = useState(false);
  const [draft, setDraft] = useState({ label: "", font_name: "Microsoft YaHei", font_size: 24, primary_colour: "&H00FFFFFF", outline_colour: "&H00000000" });

  const refresh = useCallback(() => {
    setLoading(true);
    pluginApi("GET", "/library/styles").then(r => {
      if (r.ok && r.body) setData(r.body);
    }).catch(() => {}).finally(() => setLoading(false));
  }, []);
  useEffect(refresh, [refresh]);

  const save = async () => {
    if (!draft.label) return;
    const r = await pluginApi("POST", "/library/styles", draft);
    if (r.ok) { setAdding(false); setDraft({ label: "", font_name: "Microsoft YaHei", font_size: 24, primary_colour: "&H00FFFFFF", outline_colour: "&H00000000" }); refresh(); }
    else showToast(t("toast.saveFailed"), "error");
  };
  const remove = async (id) => {
    if (!confirm(t("library.styles.deleteConfirm"))) return;
    const r = await pluginApi("DELETE", "/library/styles/" + id);
    if (r.ok) refresh();
  };

  if (loading) return <div className="empty-state"><span className="spinner" /></div>;

  return (
    <div>
      <div className="card">
        <div className="card-title">{t("library.styles.builtin")}</div>
        <div className="style-grid">
          {(data.builtin || []).map(s => (
            <div key={s.id} className="style-option" style={{cursor:"default"}}>
              <div style={{fontWeight: 600, marginBottom: 4}}>{s.label_zh || s.id}</div>
              <div className="text-xs text-dim">{s.font_name} · {s.font_size}px</div>
            </div>
          ))}
        </div>
      </div>

      <div className="card">
        <div className="flex items-center justify-between" style={{marginBottom: 12}}>
          <div className="card-title" style={{marginBottom: 0}}>{t("library.styles.custom")}</div>
          {!adding && <button className="btn btn-sm btn-primary" onClick={() => setAdding(true)}>+ {t("library.styles.add")}</button>}
        </div>
        {adding && (
          <div className="card" style={{marginBottom: 12}}>
            <div className="grid-2">
              <div className="form-row">
                <div className="label">{t("library.styles.editLabel")}</div>
                <input className="input" value={draft.label}
                       onChange={e => setDraft({...draft, label: e.target.value})}
                       placeholder="My Style" />
              </div>
              <div className="form-row">
                <div className="label">{t("library.styles.editFontName")}</div>
                <input className="input" value={draft.font_name}
                       onChange={e => setDraft({...draft, font_name: e.target.value})} />
              </div>
              <div className="form-row">
                <div className="label">{t("library.styles.editFontSize")}</div>
                <input className="input" type="number" value={draft.font_size}
                       onChange={e => setDraft({...draft, font_size: parseInt(e.target.value || "24", 10)})} />
              </div>
              <div className="form-row">
                <div className="label">{t("library.styles.editPrimary")}</div>
                <input className="input" value={draft.primary_colour}
                       onChange={e => setDraft({...draft, primary_colour: e.target.value})} />
              </div>
            </div>
            <div className="flex gap-2">
              <button className="btn btn-primary" onClick={save}>{t("library.styles.save")}</button>
              <button className="btn" onClick={() => setAdding(false)}>{t("common.cancel")}</button>
            </div>
          </div>
        )}
        {(data.custom || []).length === 0 ? (
          <div className="text-xs text-dim">—</div>
        ) : (
          <div className="style-grid">
            {(data.custom || []).map(s => (
              <div key={s.id} className="style-option" style={{cursor:"default", textAlign:"left"}}>
                <div className="flex items-center justify-between">
                  <div style={{fontWeight: 600}}>{s.label}</div>
                  <button className="btn btn-sm btn-danger" style={{padding:"2px 6px"}} onClick={() => remove(s.id)}>×</button>
                </div>
                <div className="text-xs text-dim">{s.font_name} · {s.font_size}px</div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

        </h3>
        <div className="grid-2" style={{gap: 8}}>
          <HealthRow label={t("settings.health.ffmpeg")} ok={healthLocal && healthLocal.ffmpeg_ok} t={t} />
          <HealthRow label={t("settings.health.playwright")} ok={healthLocal && healthLocal.playwright_ok} t={t} />
          <HealthRow label={t("settings.health.playwrightBrowser")} ok={healthLocal && healthLocal.playwright_browser_ready} t={t} />
          <HealthRow label={t("settings.health.apiKey")} ok={healthLocal && healthLocal.dashscope_api_key_present} t={t} />
        </div>
      </div>

      {/* Storage */}
      {stats && (
        <div className="oa-settings-section">
          <h3 className="oa-settings-section__title">
            <span className="oa-icon"
                  dangerouslySetInnerHTML={{__html: window.OpenAkitaIcons ? window.OpenAkitaIcons.folder() : ""}} />
            {t("settings.storage.title")}
          </h3>
          <div className="grid-2" style={{gap: 8}}>
            <div>
              <div className="text-xs text-dim">{t("settings.storage.totalFiles")}</div>
              <div className="text-sm" style={{fontWeight: 600}}>{stats.total_files || 0}</div>
            </div>
            <div>
              <div className="text-xs text-dim">{t("settings.storage.totalSize")}</div>
              <div className="text-sm" style={{fontWeight: 600}}>{fmtSize(stats.total_bytes || 0)}</div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function HealthRow({ label, ok, t }) {
  return (
    <div className="flex items-center justify-between" style={{padding: "6px 10px", border: "1px solid var(--border)", borderRadius: 6}}>
      <span className="text-sm">{label}</span>
      <span className={"tag " + (ok ? "tag-green" : "tag-red")}>
        {ok ? t("settings.health.ok") : t("settings.health.missing")}
      </span>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>

</body>
</html>

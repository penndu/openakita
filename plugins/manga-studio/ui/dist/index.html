// ── Series tab ──
function Series({ t, lang, catalog, toast }) {
  const [items, setItems] = useState(null);
  const [editing, setEditing] = useState(null);
  const [reloadKey, setReloadKey] = useState(0);

  useEffect(function() {
    pluginApi("GET", "/series").then(function(r) {
      if (r && r.ok && r.body) setItems(r.body.series || []);
      else setItems([]);
    });
  }, [reloadKey]);

  function reload() { setReloadKey(function(k) { return k + 1; }); }
  function onSaved(msg) {
    if (msg) toast(msg, "success");
    setEditing(null);
    reload();
  }

  if (editing) {
    return (
      <SeriesEditor
        t={t}
        lang={lang}
        catalog={catalog}
        toast={toast}
        initial={editing === "new" ? null : editing}
        onCancel={function() { setEditing(null); }}
        onSaved={onSaved}
      />
    );
  }

  return (
    <div>
      <div className="tab-header">
        <div>
          <div className="tab-header__title">
            <Ico name="tv" />
            <span>{t("series.title")}</span>
          </div>
          <div className="tab-header__sub">{t("series.subtitle")}</div>
        </div>
        <button className="btn btn-primary" onClick={function() { setEditing("new"); }}>
          <Ico name="plus" />{t("series.btn.new")}
        </button>
      </div>

      {items === null ? (
        <div className="text-muted">{t("common.loading")}</div>
      ) : items.length === 0 ? (
        <div className="empty-state">
          <Ico name="tv" cls="ico--xl" />
          <div className="empty-state__title">{t("series.list.empty.title")}</div>
          <div className="empty-state__hint">{t("series.list.empty.hint")}</div>
        </div>
      ) : (
        <div className="series-grid">
          {items.map(function(it) {
            var chars = it.default_characters_json || it.default_characters || [];
            return (
              <div
                key={it.id}
                className="series-card"
                onClick={function() { setEditing(it); }}
              >
                {it.cover_url ? (
                  <img className="series-card__cover" src={it.cover_url} alt={it.title} />
                ) : (
                  <div className="series-card__cover series-card__cover--placeholder"><Ico name="tv" /></div>
                )}
                <div className="series-card__title">{it.title}</div>
                <div className="series-card__meta">
                  <span className="series-card__chip">{it.visual_style || "shonen"}</span>
                  <span className="series-card__chip">{it.ratio || "9:16"}</span>
                  <span className="series-card__chip">{it.backend_pref || "direct"}</span>
                  <span className="series-card__chip">
                    {chars.length > 0
                      ? t("series.card.chars_count", { n: chars.length })
                      : t("series.card.no_chars")}
                  </span>
                </div>
                {it.summary ? (
                  <div className="series-card__summary">{it.summary}</div>
                ) : null}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function SeriesEditor({ t, lang, catalog, toast, initial, onCancel, onSaved }) {
  const isEdit = initial && initial.id;
  const [draft, setDraft] = useState(function() {
    if (initial) {
      return {
        title: initial.title || "",
        summary: initial.summary || "",
        visual_style: initial.visual_style || "shonen",
        ratio: initial.ratio || "9:16",
        backend_pref: initial.backend_pref || "direct",
        default_characters: (initial.default_characters_json || initial.default_characters || []).slice(0),
        cover_url: initial.cover_url || "",
      };
    }
    return {
      title: "", summary: "",
      visual_style: "shonen", ratio: "9:16", backend_pref: "direct",
      default_characters: [], cover_url: "",
    };
  });
  const [characters, setCharacters] = useState(null);
  const [episodes, setEpisodes] = useState(null);
  const [saving, setSaving] = useState(false);

  useEffect(function() {
    pluginApi("GET", "/characters").then(function(r) {
      if (r && r.ok && r.body) setCharacters(r.body.characters || []);
      else setCharacters([]);
    });
  }, []);

  useEffect(function() {
    if (!isEdit) return;
    pluginApi("GET", "/episodes?series_id=" + encodeURIComponent(initial.id)).then(function(r) {
      if (r && r.ok && r.body) setEpisodes(r.body.episodes || []);
      else setEpisodes([]);
    });
  }, [isEdit, initial && initial.id]);

  function patch(updates) { setDraft(function(prev) { return Object.assign({}, prev, updates); }); }

  function toggleChar(cid) {
    var list = draft.default_characters || [];
    var i = list.indexOf(cid);
    if (i < 0) patch({ default_characters: list.concat([cid]) });
    else { var n = list.slice(); n.splice(i, 1); patch({ default_characters: n }); }
  }

  async function save() {
    if (!draft.title || !draft.title.trim()) {
      toast(t("char.toast.save_failed", { msg: t("series.label.title") }), "error");
      return;
    }
    setSaving(true);
    try {
      var body = {
        title: draft.title.trim(),
        summary: draft.summary || "",
        visual_style: draft.visual_style || "shonen",
        ratio: draft.ratio || "9:16",
        backend_pref: draft.backend_pref || "direct",
        default_characters: draft.default_characters || [],
        cover_url: draft.cover_url || "",
      };
      var r;
      if (isEdit) r = await pluginApi("PUT", "/series/" + initial.id, body);
      else r = await pluginApi("POST", "/series", body);
      if (r && r.ok && r.body && r.body.ok) {
        onSaved(isEdit ? t("series.toast.updated") : t("series.toast.created"));
      } else {
        var msg = (r && r.body && (r.body.detail || r.body.message)) || "?";
        toast(t("char.toast.save_failed", { msg: msg }), "error");
      }
    } catch (e) {
      toast(t("char.toast.save_failed", { msg: String(e) }), "error");
    } finally {
      setSaving(false);
    }
  }

  async function onDelete() {
    if (!isEdit) return;
    if (!window.confirm(t("series.confirm.delete"))) return;
    var r = await pluginApi("DELETE", "/series/" + initial.id);
    if (r && r.ok) onSaved(t("series.toast.deleted"));
    else toast(t("char.toast.save_failed", { msg: (r && r.body && r.body.detail) || "?" }), "error");
  }

  var styles = (catalog && catalog.visual_styles) || [];
  var ratios = (catalog && catalog.ratios) || ["9:16", "16:9", "1:1", "4:5"];
  var backends = ["direct", "runninghub", "comfyui_local"];

  return (
    <div>
      <div className="tab-header">
        <div>
          <div className="tab-header__title">
            <Ico name="tv" />
            <span>{isEdit ? draft.title || t("series.title") : t("series.btn.new")}</span>
          </div>
          <div className="tab-header__sub">{t("series.subtitle")}</div>
        </div>
        <button className="btn" onClick={onCancel}>
          <Ico name="close" />{t("series.btn.cancel")}
        </button>
      </div>
      <div className="series-editor">
        <div className="series-editor__field--full">
          <label className="char-editor__label">{t("series.label.title")} *</label>
          <input
            className="input"
            value={draft.title}
            onChange={function(e) { patch({ title: e.target.value }); }}
            placeholder={t("series.placeholder.title")}
          />
        </div>
        <div className="series-editor__field--full">
          <label className="char-editor__label">{t("series.label.summary")}</label>
          <input
            className="input"
            value={draft.summary}
            onChange={function(e) { patch({ summary: e.target.value }); }}
            placeholder={t("series.placeholder.summary")}
          />
        </div>
        <div>
          <label className="char-editor__label">{t("series.label.style")}</label>
          <select
            className="input select"
            value={draft.visual_style}
            onChange={function(e) { patch({ visual_style: e.target.value }); }}
          >
            {styles.length > 0
              ? styles.map(function(s) { return <option key={s.id} value={s.id}>{(lang === "zh" ? s.label_zh : s.label_en) || s.id}</option>; })
              : <option value="shonen">shonen</option>}
          </select>
        </div>
        <div>
          <label className="char-editor__label">{t("series.label.ratio")}</label>
          <select
            className="input select"
            value={draft.ratio}
            onChange={function(e) { patch({ ratio: e.target.value }); }}
          >
            {ratios.map(function(r) { return <option key={r} value={r}>{r}</option>; })}
          </select>
        </div>
        <div>
          <label className="char-editor__label">{t("series.label.backend")}</label>
          <select
            className="input select"
            value={draft.backend_pref}
            onChange={function(e) { patch({ backend_pref: e.target.value }); }}
          >
            {backends.map(function(b) {
              return <option key={b} value={b}>{t("studio.backend." + b)}</option>;
            })}
          </select>
        </div>
        <div>
          <label className="char-editor__label">{t("series.label.cover")}</label>
          <input
            className="input"
            value={draft.cover_url}
            onChange={function(e) { patch({ cover_url: e.target.value }); }}
            placeholder={t("series.placeholder.cover")}
          />
        </div>
        <div className="series-editor__field--full">
          <label className="char-editor__label">{t("series.label.characters")}</label>
          {characters === null ? (
            <div className="text-muted" style={{ fontSize: 12 }}>{t("common.loading")}</div>
          ) : characters.length === 0 ? (
            <div className="text-muted" style={{ fontSize: 12 }}>{t("char.list.empty.title")}</div>
          ) : (
            <div className="series-editor__chargrid">
              {characters.map(function(c) {
                var picked = (draft.default_characters || []).indexOf(c.id) >= 0;
                return (
                  <span
                    key={c.id}
                    className={"series-editor__charchip" + (picked ? " active" : "")}
                    onClick={function() { toggleChar(c.id); }}
                  >{c.name}</span>
                );
              })}
            </div>
          )}
        </div>

        {isEdit ? (
          <div className="series-editor__field--full">
            <label className="char-editor__label">{t("series.section.episodes")}</label>
            {episodes === null ? (
              <div className="text-muted" style={{ fontSize: 12 }}>{t("common.loading")}</div>
            ) : episodes.length === 0 ? (
              <div className="text-muted" style={{ fontSize: 12 }}>{t("series.episodes.empty")}</div>
            ) : (
              <div className="ep-list">
                {episodes.map(function(ep) {
                  var prefix = ep.episode_no ? "EP" + String(ep.episode_no).padStart(2, "0") : "";
                  var dur = ep.duration_sec ? Math.round(ep.duration_sec) + "s" : null;
                  var when = ep.created_at ? new Date(ep.created_at * 1000).toLocaleString() : null;
                  var meta = [prefix, dur, when].filter(function(x) { return !!x; }).join(" · ");
                  return (
                    <div key={ep.id} className="ep-item">
                      <div style={{ minWidth: 0, flex: 1 }}>
                        <div className="ep-item__title">{ep.title || ep.id}</div>
                        <div className="ep-item__meta">{meta || ep.id}</div>
                      </div>
                      {ep.final_video_url ? (
                        <a
                          className="btn btn-sm btn-primary"
                          href={ep.final_video_url}
                          target="_blank"
                          rel="noreferrer noopener"
                          style={{ flexShrink: 0 }}
                        ><Ico name="play" /></a>
                      ) : null}
                      <button
                        className="btn btn-sm btn-danger btn-icon"
                        title={t("series.episodes.delete")}
                        onClick={async function() {
                          if (!window.confirm(t("series.episodes.confirm_delete", { title: ep.title || ep.id }))) return;
                          var dr = await pluginApi("DELETE", "/episodes/" + encodeURIComponent(ep.id));
                          if (dr && dr.ok) {
                            setEpisodes(function(prev) {
                              return (prev || []).filter(function(x) { return x.id !== ep.id; });
                            });
                          } else {
                            var detail = (dr && dr.body && dr.body.detail) || ("HTTP " + (dr && dr.status));
                            if (typeof toast === "function") toast(t("series.episodes.delete_failed", { msg: detail }), "error");
                          }
                        }}
                      ><Ico name="trash" /></button>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        ) : null}

        <div className="series-editor__footer">
          <div>
            {isEdit ? (
              <button className="btn btn-danger" onClick={onDelete} disabled={saving}>
                <Ico name="trash" />{t("series.btn.delete")}
              </button>
            ) : <span />}
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <button className="btn" onClick={onCancel} disabled={saving}>
              {t("series.btn.cancel")}
            </button>
            <button className="btn btn-primary" onClick={save} disabled={saving}>
              {saving ? <span className="spinner-sm"></span> : <Ico name="save" />}
              <span>{saving ? t("studio.btn.submit.loading") : t("series.btn.save")}</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── OSS field validators (mirror backend OssConfig.from_settings) ──
function validateOssEndpoint(t, v) {
  const s = (v || "").trim();
  if (!s) return "";
  const host = s.replace(/^https?:\/\//i, "").replace(/\/$/, "");
  if (!/\.aliyuncs\.com$/i.test(host)) return t("settings.oss.err.endpoint");
  if (host.split(".").length > 3) return t("settings.oss.err.endpointBucket");
  return "";
}
function validateOssBucket(t, v) {
  const s = (v || "").trim();
  if (!s) return "";
  if (s.indexOf(".") >= 0) return t("settings.oss.err.bucketDot");
  if (!/^[a-z0-9][a-z0-9-]{1,61}[a-z0-9]$/.test(s)) return t("settings.oss.err.bucketShape");
  return "";
}
function validateOssAk(t, v) {
  const s = (v || "").trim();
  if (!s) return "";
  if (!/^LTAI[A-Za-z0-9]{10,}$/.test(s)) return t("settings.oss.err.akShape");
  return "";
}
function validateOssSecret(t, v) {
  const s = (v || "").trim();
  if (!s) return "";
  if (s.length < 16) return t("settings.oss.err.skShort");
  return "";
}

// ── Dependency check section (mirrors avatar-studio's installer) ──
// Lists every entry from the backend's PYTHON_DEPS and offers a one-click
// install button when an entry is missing.  Polls /system/python-deps
// every 1.5s while any background install is busy so the UI flips to
// 「已就绪」 the moment the install thread finishes — no manual refresh.
function DependenciesSection({ t, toast }) {
  const [items, setItems] = useState(null);
  const [loading, setLoading] = useState(false);

  const refresh = useCallback(async function() {
    setLoading(true);
    try {
      var r = await pluginApi("GET", "/system/python-deps");
      if (r && r.ok && r.body && r.body.components) setItems(r.body.components);
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(function() { refresh(); }, [refresh]);

  // While at least one component reports ``busy: true`` the install is
  // running in a background thread on the server.  Poll every 1.5 s so
  // the chip flips from 「正在安装…」 to 「已就绪」 the moment pip exits.
  useEffect(function() {
    if (!items) return undefined;
    var anyBusy = items.some(function(c) { return c.busy; });
    if (!anyBusy) return undefined;
    var h = setInterval(function() { refresh(); }, 1500);
    return function() { clearInterval(h); };
  }, [items, refresh]);

  async function install(dep, force) {
    try {
      var r = await pluginApi(
        "POST",
        "/system/python-deps/" + dep.id + "/install",
        force ? { force: true } : {}
      );
      if (r && r.ok && r.body && r.body.ok) {
        toast(t("settings.deps.toast.started", { name: dep.display_name }), "info");
        if (r.body.component) {
          setItems(function(prev) {
            if (!prev) return prev;
            return prev.map(function(c) { return c.id === dep.id ? r.body.component : c; });
          });
        }
      } else {
        toast(t("settings.deps.toast.failed", {
          name: dep.display_name,
          msg: (r && r.body && (r.body.detail || r.body.message)) || ("HTTP " + (r && r.status)),
        }), "error");
      }
    } catch (e) {
      toast(t("settings.deps.toast.failed", { name: dep.display_name, msg: String(e) }), "error");
    }
  }

  return (
    <div className="oa-settings-section">
      <h3 className="oa-settings-section__title oa-settings-section__title-spread">
        <span style={{ display: "inline-flex", alignItems: "center", gap: 8 }}>
          <Ico name="cube" />
          {t("settings.section.deps")}
        </span>
        <button
          className="btn btn-ghost"
          type="button"
          onClick={refresh}
          disabled={loading}
          title={t("settings.deps.btn.recheck")}
        >
          <Ico name="refresh" />
          <span>{t("settings.deps.btn.recheck")}</span>
        </button>
      </h3>
      <div className="oa-config-field-callout" style={{ marginBottom: 12 }}>
        {t("settings.section.deps.hint")}
      </div>
      <div className="deps-grid">
        {(items || []).map(function(c) {
          var ok = c.ok;
          var busy = c.busy;
          var lastErr = !ok && c.last_error ? c.last_error : "";
          return (
            <div key={c.id} className={"deps-card" + (ok ? " deps-card--ok" : busy ? " deps-card--busy" : " deps-card--missing")}>
              <div className="deps-card__head">
                <div className="deps-card__title">
                  {busy
                    ? <span className="spinner-sm"></span>
                    : <Ico name={ok ? "check" : "warn"} />}
                  <span>{c.display_name}</span>
                  <code className="deps-card__pkg">{c.pip_spec}</code>
                </div>
                <div className={"deps-card__status" + (ok ? " ok" : busy ? " busy" : " miss")}>
                  {busy
                    ? t("settings.deps.installing")
                    : ok
                      ? t("settings.deps.installed") + (c.version ? " · " + c.version : "")
                      : t("settings.deps.missing")}
                </div>
              </div>
              <div className="deps-card__desc">{c.description}</div>
              {lastErr ? (
                <div className="deps-card__err">{t("settings.deps.error", { msg: lastErr })}</div>
              ) : null}
              <div className="deps-card__foot">
                <span className="deps-card__target">
                  {t("settings.deps.target", { target: c.target || "" })}
                </span>
                {ok ? (
                  <button className="btn btn-ghost" type="button" disabled={busy}
                          onClick={function() { install(c, true); }}>
                    <Ico name="refresh" />
                    <span>{t("settings.deps.btn.reinstall")}</span>
                  </button>
                ) : (
                  <button className="btn btn-primary" type="button" disabled={busy}
                          onClick={function() { install(c, false); }}>
                    {busy ? <span className="spinner-sm"></span> : <Ico name="download" />}
                    <span>{t("settings.deps.btn.install")}</span>
                  </button>
                )}
              </div>
            </div>
          );
        })}
        {!items && (
          <div className="text-muted" style={{ padding: 8 }}>{t("common.loading")}</div>
        )}
      </div>
    </div>
  );
}

// ── Settings tab — comprehensively redesigned to mirror avatar-studio's
//    SettingsTab. Each row commits its own value onBlur (patch save), so
//    the bottom 「保存全部」 button is now a fallback rather than the only
//    way to persist. The backend echoes the *raw* value back (no redact)
//    so the input can be re-populated reliably across saves.
function Settings({ t, settings, setSettings, toast }) {
  const [draft, setDraft] = useState(null);
  const [saving, setSaving] = useState(false);
  const [showArk, setShowArk] = useState(false);
  const [showDash, setShowDash] = useState(false);
  const [showRh, setShowRh] = useState(false);
  const [showCfApi, setShowCfApi] = useState(false);
  const [testBusy, setTestBusy] = useState({ ark: false, dashscope: false, runninghub: false, comfyui_local: false });

  useEffect(function() {
    if (settings) setDraft(Object.assign({}, settings));
  }, [settings]);

  if (!draft) return <div className="text-muted">{t("common.loading")}</div>;

  function patch(updates) { setDraft(function(prev) { return Object.assign({}, prev, updates); }); }

  // patch save: only push the keys the caller touched. Each row wires
  // onBlur to call this with {field: value}, so we never accidentally
  // overwrite a sibling that's mid-edit (mirror avatar-studio).
  async function savePatch(payload, opts) {
    try {
      var r = await pluginApi("PUT", "/settings", payload);
      if (r && r.ok && r.body && r.body.ok) {
        if (r.body.settings) setSettings(r.body.settings);
        if (!opts || !opts.silent) toast(t("settings.toast.saved"), "success");
        return true;
      }
      toast(t("settings.toast.failed", {
        msg: (r && r.body && (r.body.detail || r.body.message)) || ("HTTP " + (r && r.status)),
      }), "error");
      return false;
    } catch (e) {
      toast(t("settings.toast.failed", { msg: String(e) }), "error");
      return false;
    }
  }

  async function saveAll() {
    setSaving(true);
    try {
      // The full draft — every key the backend recognises, with an
      // explicit fallback so undefined never leaks into the PUT.
      var payload = {
        ark_api_key: (draft.ark_api_key || "").trim(),
        ark_endpoint_id: (draft.ark_endpoint_id || "").trim(),
        dashscope_api_key: (draft.dashscope_api_key || "").trim(),
        dashscope_region: draft.dashscope_region || "beijing",
        tts_engine: draft.tts_engine || "edge",
        tts_voice_edge: draft.tts_voice_edge || "zh-CN-XiaoxiaoNeural",
        default_generation_backend: draft.default_generation_backend || "direct",
        default_resolution: draft.default_resolution || "480P",
        default_image_model: draft.default_image_model || "wan2.7-image",
        default_video_model: draft.default_video_model || "seedance-1.0-lite-i2v",
        comfy_backend: draft.comfy_backend || "runninghub",
        runninghub_api_key: (draft.runninghub_api_key || "").trim(),
        runninghub_instance_type: draft.runninghub_instance_type || "plus",
        runninghub_workflow_image: (draft.runninghub_workflow_image || "").trim(),
        runninghub_workflow_animate: (draft.runninghub_workflow_animate || "").trim(),
        runninghub_workflow_t2v: (draft.runninghub_workflow_t2v || "").trim(),
        comfyui_local_url: (draft.comfyui_local_url || "").trim(),
        comfyui_local_api_key: (draft.comfyui_local_api_key || "").trim(),
        comfyui_workflow_image: (draft.comfyui_workflow_image || "").trim(),
        comfyui_workflow_animate: (draft.comfyui_workflow_animate || "").trim(),
        comfyui_workflow_t2v: (draft.comfyui_workflow_t2v || "").trim(),
        oss_endpoint: (draft.oss_endpoint || "").trim(),
        oss_bucket: (draft.oss_bucket || "").trim(),
        oss_access_key_id: (draft.oss_access_key_id || "").trim(),
        oss_access_key_secret: draft.oss_access_key_secret || "",
        oss_path_prefix: (draft.oss_path_prefix || "manga-studio").trim(),
        custom_data_dir: (draft.custom_data_dir || "").trim(),
        output_subdir_mode: draft.output_subdir_mode || "task",
        output_naming_rule: draft.output_naming_rule || "{filename}",
        retention_days: Number(draft.retention_days != null ? draft.retention_days : 30),
        timeout_sec: Number(draft.timeout_sec != null ? draft.timeout_sec : 60),
        max_retries: Number(draft.max_retries != null ? draft.max_retries : 2),
        cost_threshold_cny: Number(draft.cost_threshold_cny != null ? draft.cost_threshold_cny : 5),
      };
      await savePatch(payload);
    } finally {
      setSaving(false);
    }
  }

  // ── Connection probes ─────────────────────────────────────────
  async function testVendor(vendor) {
    var label = vendor === "ark" ? "Volcano Ark" : "DashScope";
    setTestBusy(function(prev) { return Object.assign({}, prev, vendor === "ark" ? { ark: true } : { dashscope: true }); });
    try {
      var key = vendor === "ark" ? (draft.ark_api_key || "") : (draft.dashscope_api_key || "");
      var r = await pluginApi("POST", "/test-connection", { vendor: vendor, api_key: key.trim() });

      } else {

        toast(t("settings.toast.testFail", { label: label, msg: msg }), "error");
      }

    } finally {
      setTestBusy(function(prev) { return Object.assign({}, prev, vendor === "ark" ? { ark: false } : { dashscope: false }); });
    }
  }

  async function testBackend(backend) {

  // ── Has-key helpers (no redaction; we know the raw value) ────

  return (
    <div style={{ maxWidth: 760 }}>
      <div className="tab-header">
        <div>
          <div className="tab-header__title">
            <Ico name="cog" />
            <span>{t("settings.title")}</span>

            var active = (draft.default_generation_backend || "direct") === b.id;
            return (
              <div
                key={b.id}
                className={"backend-chip" + (active ? " active" : "")}
                onClick={function() {
                  patch({ default_generation_backend: b.id });
                  savePatch({ default_generation_backend: b.id }, { silent: true });
                }}
              >
                <div className="backend-chip__title">
                  <Ico name={b.icon} />

// ── Storage & cleanup section ────────────────────────────────────
// Receives the parent's draft + savePatch so the data-dir input and
// retention-days field commit through the same patch-save plumbing
// (avoids a second source of truth for the same backend keys).
function StorageSection({ t, draft, settings, patch, savePatch, toast }) {
  const [stats, setStats] = useState(null);
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState(null);
  const [busy, setBusy] = useState(false);

  const load = useCallback(async function() {
    setLoading(true);
    setErr(null);
    try {
      var r = await pluginApi("GET", "/storage/stats");
      if (!r.ok) {
        setErr((r.body && r.body.detail) || ("HTTP " + r.status));
        return;
      }
      if (r.body && r.body.stats) setStats(r.body.stats);
    } catch (ex) {
      setErr(String(ex));
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(function() { load(); }, [load]);

  function fmtBytes(n) {
    if (n == null) return "-";
    var u = ["B", "KB", "MB", "GB", "TB"];
    var i = 0; var v = Number(n);
    while (v >= 1024 && i < u.length - 1) { v /= 1024; i++; }
    return v.toFixed(v < 10 && i > 0 ? 1 : 0) + " " + u[i];
  }

  async function openByKey(key) {
    try {
      var r = await pluginApi("POST", "/storage/open-folder", { key: key });
      if (!r.ok || !(r.body && r.body.ok)) {
        toast(t("settings.storage.failed", {
          msg: (r && r.body && r.body.detail) || "open failed",
        }), "error");
      }
    } catch (e) {
      toast(t("settings.storage.failed", { msg: String(e) }), "error");
    }
  }

  async function cleanupNow() {
    setBusy(true);
    try {
      var n = Number(draft && draft.retention_days != null ? draft.retention_days : 30);
      var r = await pluginApi("POST", "/cleanup", { retention_days: n });
      if (r && r.ok && r.body && r.body.ok) {
        toast(t("settings.toast.cleanupOk", {
          n: r.body.removed || 0,
          dirs: r.body.scrubbed_dirs || 0,
        }), "success");
        load();
      } else {
        toast(t("settings.storage.failed", {
          msg: (r && r.body && r.body.detail) || "cleanup failed",
        }), "error");
      }
    } finally {
      setBusy(false);
    }
  }

  var statKeys = [
    { key: "data_dir", labelKey: "settings.storage.stat.dataDir" },
    { key: "episodes", labelKey: "settings.storage.stat.episodes" },
    { key: "uploads",  labelKey: "settings.storage.stat.uploads" },
    { key: "tasks",    labelKey: "settings.storage.stat.tasks" },
  ];

  return (
    <div className="oa-settings-section">
      <h3 className="oa-settings-section__title oa-settings-section__title-spread">
        <span style={{display: "inline-flex", alignItems: "center", gap: 8}}>
          <Ico name="hardDrive" />
          {t("settings.section.storage")}
        </span>
        <button className="btn btn-sm" onClick={load} disabled={loading}>
          {loading ? <span className="spinner-sm"/> : <Ico name="refresh" />}
          <span style={{marginLeft: 4}}>{t("settings.btn.refresh")}</span>
        </button>
      </h3>

      {/* ── Data directory ── */}
      <div className="form-row">
        <div className="label">{t("settings.storage.dir")}</div>
        <div className="flex gap-2">
          <input
            className="input flex-1" type="text"
            placeholder={t("settings.storage.dir.placeholder")}
            value={(draft && draft.custom_data_dir) || ""}
            onChange={function(e) { patch({ custom_data_dir: e.target.value }); }}
            onBlur={function() { savePatch({ custom_data_dir: ((draft && draft.custom_data_dir) || "").trim() }, { silent: true }); }}
          />
          <button className="btn btn-sm" type="button"
                  onClick={function() { openByKey("data_dir"); }}>
            <Ico name="folder"/> {t("settings.btn.open")}
          </button>
        </div>
        {settings && settings.data_dir_active && (
          <div className="text-xs text-muted" style={{marginTop: 4}}>
            {t("settings.storage.dir.active")}{" "}
            <code className="inline">{settings.data_dir_active}</code>
          </div>
        )}
        <div className="text-xs text-muted mt-2">{t("settings.storage.dir.hint")}</div>
      </div>

      {/* ── Subdir + naming ── */}
      <div className="grid-2">
        <div className="form-row" style={{marginBottom: 0}}>
          <div className="label">{t("settings.storage.subdir")}</div>
          <select
            className="input select"
            value={(draft && draft.output_subdir_mode) || "task"}
            onChange={function(e) {
              patch({ output_subdir_mode: e.target.value });
              savePatch({ output_subdir_mode: e.target.value }, { silent: true });
            }}
          >
            <option value="task">{t("settings.storage.subdir.task")}</option>
            <option value="date">{t("settings.storage.subdir.date")}</option>
            <option value="mode">{t("settings.storage.subdir.mode")}</option>
            <option value="date_mode">{t("settings.storage.subdir.dateMode")}</option>
            <option value="flat">{t("settings.storage.subdir.flat")}</option>
          </select>
        </div>
        <div className="form-row" style={{marginBottom: 0}}>
          <div className="label">{t("settings.storage.naming")}</div>
          <select
            className="input select"
            value={(draft && draft.output_naming_rule) || "{filename}"}
            onChange={function(e) {
              patch({ output_naming_rule: e.target.value });
              savePatch({ output_naming_rule: e.target.value }, { silent: true });
            }}
          >
            <option value="{filename}">{t("settings.storage.naming.filename")}</option>
            <option value="{task_id}">{t("settings.storage.naming.task")}</option>
            <option value="{date}_{mode}_{short_id}">{t("settings.storage.naming.dateMode")}</option>
            <option value="{date}_{time}_{short_id}">{t("settings.storage.naming.dateTime")}</option>
            <option value="{mode}_{short_id}">{t("settings.storage.naming.modeShort")}</option>
          </select>
        </div>
      </div>
      <div className="text-xs text-muted mt-2">{t("settings.storage.naming.hint")}</div>

      {/* ── Per-folder usage cards ── */}
      {err ? (
        <div className="text-danger" style={{marginTop: 10}}>
          {t("settings.storage.failed", { msg: err })}
        </div>
      ) : !stats ? (
        <div className="text-muted" style={{marginTop: 10}}>{t("settings.storage.loading")}</div>
      ) : (
        <div className="storage-grid" style={{marginTop: 12}}>
          {statKeys.map(function(it) {
            var s = stats[it.key];
            if (!s) return null;
            return (
              <div key={it.key} className="storage-stat" style={{cursor: "pointer"}}
                   title={s.path}
                   onClick={function() { openByKey(it.key); }}>
                <div className="storage-stat__label">
                  <Ico name="database" /> {t(it.labelKey)}
                </div>
                <div className="storage-stat__val">{fmtBytes(s.size_bytes)}</div>
                <div className="storage-stat__sub">
                  {t("settings.storage.stat.fileCount", { n: s.file_count })}
                  {s.truncated ? "+" : ""}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* ── Retention + cleanup ── */}
      <div className="form-row" style={{marginTop: 14, marginBottom: 0}}>
        <div className="label">{t("settings.storage.retention")}</div>
        <div className="flex gap-2 items-center">
          <input
            className="input" type="number" min="1" style={{width: 110}}
            value={(draft && draft.retention_days != null) ? draft.retention_days : 30}
            onChange={function(e) { patch({ retention_days: Number(e.target.value) }); }}
            onBlur={function() {
              savePatch({ retention_days: Number((draft && draft.retention_days) || 30) }, { silent: true });
            }}
          />
          <span className="text-xs text-muted flex-1">
            {t("settings.storage.retention.hint", { n: (draft && draft.retention_days != null) ? draft.retention_days : 30 })}
          </span>
          <button className="btn btn-sm" type="button" disabled={busy} onClick={cleanupNow}>
            {busy && <span className="spinner-sm"/>} {t("settings.storage.cleanup.btn")}
          </button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>

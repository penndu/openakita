function TemplateAddModal({ onClose, onSaved }) {
  const t = useT();
  const [name, setName] = useState("");
  const [kind, setKind] = useState("caption");
  const [bodyText, setBodyText] = useState("");
  const [tagsText, setTagsText] = useState("");
  const [submitting, setSubmitting] = useState(false);

  async function submit() {
    if (!name.trim()) return;
    let body = {};
    const trimmed = bodyText.trim();
    if (trimmed) {
      try { body = JSON.parse(trimmed); }
      catch (_e) { body = { text: bodyText }; } // free-form text fallback so non-JSON users still work
    }
    const tags = tagsText.split(",").map(function (s) { return s.trim(); }).filter(Boolean);
    setSubmitting(true);
    try {
      const r = await pluginApi("POST", "/templates", { name: name.trim(), kind: kind, body: body, tags: tags });
      if (r && r.ok) {
        showToast(t("omniPost.library.templates.toast.ok"), "success");
        onSaved && onSaved();
      } else {
        showToast(t("omniPost.library.templates.toast.fail", { msg: (r && r.body && r.body.detail) || r.status }), "error");
      }
    } finally {
      setSubmitting(false);
    }
  }

  return (
    <div className="ak-modal-mask" onClick={onClose}>
      <div className="ak-modal" onClick={function (e) { e.stopPropagation(); }}>
        <div className="ak-modal__head">
          <span>{t("omniPost.library.templates.modal.title")}</span>
          <button className="btn btn-sm btn-ghost" onClick={onClose}><Ico name="close" /></button>
        </div>
        <div className="ak-modal__body">
          <label>
            <div className="cal-sub">{t("omniPost.library.templates.modal.name")}</div>
            <input className="input" value={name} onChange={function (e) { setName(e.target.value); }} />
          </label>
          <label>
            <div className="cal-sub">{t("omniPost.library.templates.modal.kind")}</div>
            <select className="input" value={kind} onChange={function (e) { setKind(e.target.value); }}>
              <option value="caption">{t("omniPost.library.templates.kind.caption")}</option>
              <option value="topic">{t("omniPost.library.templates.kind.topic")}</option>
              <option value="cover">{t("omniPost.library.templates.kind.cover")}</option>
            </select>
          </label>
          <label>
            <div className="cal-sub">{t("omniPost.library.templates.modal.body")}</div>
            <textarea className="input" rows={6} value={bodyText}
                      placeholder={t("omniPost.library.templates.body.placeholder")}
                      onChange={function (e) { setBodyText(e.target.value); }} />
          </label>
          <label>
            <div className="cal-sub">{t("omniPost.library.templates.modal.tags")}</div>
            <input className="input" value={tagsText} onChange={function (e) { setTagsText(e.target.value); }} />
          </label>
        </div>
        <div className="ak-modal__foot">
          <button className="btn btn-sm" onClick={onClose}>{t("omniPost.common.cancel")}</button>
          <button className="btn btn-sm btn-primary" disabled={submitting || !name.trim()} onClick={submit}>
            {t("omniPost.library.templates.modal.submit")}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ─── MultiPost install / probe guide (S4) ─────────────────────────── */
const MP_STORE_URL = "https://chromewebstore.google.com/detail/multipost/dhohkaclnjgcikfoaacfgijgjgceofih";
const MP_GITHUB_URL = "https://github.com/leaperone/MultiPost-Extension";

function MultiPostGuide() {
  const t = useT();
  const [probing, setProbing] = useState(false);
  const [status, setStatus] = useState(null);
  const [minVersion, setMinVersion] = useState("1.3.8");
  const [trustedDomain, setTrustedDomain] = useState("");

  const loadSnapshot = useCallback(function () {
    pluginApi("GET", "/mp/status").then(function (r) {
      if (!r) return;
      if (r.min_version) setMinVersion(r.min_version);
      if (r.trusted_domain) setTrustedDomain(r.trusted_domain);
      setStatus({
        installed: !!r.installed,
        version: r.version || "",
        version_ok: !!r.version_ok,
        trusted_domain_ok: !!r.trusted_domain_ok,
        updated_at: r.updated_at || null,
      });
    }).catch(function () {});
  }, []);

  useEffect(loadSnapshot, [loadSnapshot]);

  const runProbe = useCallback(function () {
    if (probing) return;
    setProbing(true);
    const reqId = "mp-probe-" + Date.now() + "-" + Math.random().toString(36).slice(2, 8);
    const host = (typeof window !== "undefined" && window.location && window.location.hostname) || "";
    const currentDomain = trustedDomain || host;
    let settled = false;

    function handler(e) {
      const d = e && e.data;
      if (!d || typeof d !== "object") return;
      if (d.action !== "MULTIPOST_EXTENSION_SERVICE_STATUS_RESPONSE" && d.type !== "MULTIPOST_EXTENSION_SERVICE_STATUS_RESPONSE") return;
      if (d.request_id && d.request_id !== reqId) return;
      if (settled) return;
      settled = true;
      window.removeEventListener("message", handler);
      const version = (d.version || (d.data && d.data.version) || "").toString();
      const parts = version.split(".").map(function (x) { return parseInt(x, 10) || 0; });
      const minParts = (minVersion || "0.0.0").split(".").map(function (x) { return parseInt(x, 10) || 0; });
      let versionOk = true;
      for (let i = 0; i < 3; i++) {
        const a = parts[i] || 0, b = minParts[i] || 0;
        if (a > b) break;
        if (a < b) { versionOk = false; break; }
      }
      const trustedOk = d.trusted === true || d.trusted_domain_ok === true || (d.data && d.data.trusted === true);
      reportStatus({ installed: true, version, trusted_domain_ok: !!trustedOk });
      setStatus({ installed: true, version, version_ok: versionOk, trusted_domain_ok: !!trustedOk });
      setProbing(false);
    }
    window.addEventListener("message", handler);

    try {
      const targets = [window.top, window.parent, window];
      const seen = new Set();
      targets.forEach(function (w) {
        if (!w || seen.has(w)) return;
        seen.add(w);
        try {
          w.postMessage({
            action: "MULTIPOST_EXTENSION_CHECK_SERVICE_STATUS",
            type: "MULTIPOST_EXTENSION_CHECK_SERVICE_STATUS",
            request_id: reqId,
            origin: currentDomain,
          }, "*");
        } catch (err) {}
      });
    } catch (err) {}

    setTimeout(function () {
      if (settled) return;
      settled = true;
      window.removeEventListener("message", handler);
      reportStatus({ installed: false, version: "", trusted_domain_ok: false });
      setStatus({ installed: false, version: "", version_ok: false, trusted_domain_ok: false });
      setProbing(false);
    }, 3000);
  }, [probing, minVersion, trustedDomain]);

  function reportStatus(payload) {
    pluginApi("POST", "/mp/status", payload).catch(function () {});
  }

  const displayDomain = trustedDomain || (typeof window !== "undefined" && window.location ? window.location.hostname : "");
  const notInstalled = status && status.installed === false;
  const outdated = status && status.installed && !status.version_ok;
  const trustFailed = status && status.installed && status.version_ok && !status.trusted_domain_ok;

  return (
    <div className="card" style={{ padding: 16, marginBottom: 12 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
        <Ico name="cog" />
        <h3 style={{ margin: 0 }}>{t("omniPost.mp.title")}</h3>
        <span style={{ flex: 1 }} />
        <button className="btn btn-sm" disabled={probing} onClick={runProbe}>
          {probing ? t("omniPost.mp.status.detecting") : t("omniPost.mp.probe")}
        </button>
      </div>
      <p className="cal-sub" style={{ marginTop: 0, marginBottom: 10 }}>{t("omniPost.mp.subtitle")}</p>

      {status && (
        <div className="lib-card" style={{ marginBottom: 10 }}>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
            {status.installed ? (
              <span className="badge badge-done">{t("omniPost.mp.status.installed").replace("{version}", status.version || "?")}</span>
            ) : (
              <span className="badge badge-failed">{t("omniPost.mp.status.missing")}</span>
            )}
            {outdated && (
              <span className="badge badge-cancelled">
                {t("omniPost.mp.status.outdated").replace("{version}", status.version || "?").replace("{min}", minVersion)}
              </span>
            )}
            {status.installed && status.version_ok && (
              status.trusted_domain_ok
                ? <span className="badge badge-done">{t("omniPost.mp.status.trust.ok")}</span>
                : <span className="badge badge-cancelled">{t("omniPost.mp.status.trust.fail").replace("{domain}", displayDomain)}</span>
            )}
          </div>
        </div>
      )}

      {(notInstalled || outdated) && (
        <div className="lib-card" style={{ marginBottom: 10 }}>
          <h4 style={{ margin: "0 0 6px 0" }}>{t("omniPost.mp.install.title")}</h4>
          <p className="cal-sub" style={{ margin: 0 }}>{t("omniPost.mp.install.desc").replace("{min}", minVersion)}</p>
          <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
            <a className="btn btn-sm btn-primary" href={MP_STORE_URL} target="_blank" rel="noreferrer noopener">
              {t("omniPost.mp.install.cws")}
            </a>
            <a className="btn btn-sm" href={MP_GITHUB_URL} target="_blank" rel="noreferrer noopener">
              {t("omniPost.mp.install.github")}
            </a>
          </div>
        </div>
      )}

      {trustFailed && (
        <div className="lib-card">
          <h4 style={{ margin: "0 0 6px 0" }}>{t("omniPost.mp.trust.title")}</h4>
          <p className="cal-sub" style={{ margin: 0 }}>{t("omniPost.mp.trust.desc").replace("{domain}", displayDomain)}</p>
        </div>
      )}
    </div>
  );
}

/* ─── Settings tab (S4) ────────────────────────────────────────────── */
function SettingsTab() {
  const t = useT();
  const [draft, setDraft] = useState(null);
  const [saving, setSaving] = useState(false);

  const load = useCallback(function () {
    pluginApi("GET", "/settings").then(function (r) { setDraft(r || {}); })
                                 .catch(function () { setDraft({}); });
  }, []);

  useEffect(load, [load]);

  function update(key, value) {
    setDraft(function (prev) {
      const next = Object.assign({}, prev || {});
      next[key] = value;
      return next;
    });
  }

  async function save() {
    if (!draft || saving) return;
    setSaving(true);
    try {
      const patch = {};
      [
        "engine",
        "concurrency_global",
        "concurrency_per_platform",
        "retry_max_attempts",
        "cooldown_seconds_per_account",
        "scheduler_poll_seconds",
        "playwright_headless",
        "enable_selfheal",
        "selfheal_interval_hours",
        "enable_playwright_probe",
        "mp_extension_min_version",
        "mp_trusted_domain",
      ].forEach(function (k) {
        if (draft[k] !== undefined && draft[k] !== null) patch[k] = draft[k];
      });
      const r = await pluginApi("PUT", "/settings", patch);
      if (r && typeof r === "object") setDraft(r);
      showToast(t("omniPost.settings.saved"), "success");
    } catch (err) {
      showToast(t("omniPost.settings.save.failed").replace("{err}", String(err && err.message || err)), "error");
    } finally {
      setSaving(false);
    }
  }

  if (!draft) {
    return <div style={{ padding: 16 }}><p className="cal-sub">…</p></div>;
  }

  const engine = draft.engine || "auto";

  return (
    <div style={{ padding: 16, maxWidth: 820 }}>
      <h2 style={{ marginTop: 0 }}>{t("omniPost.settings.coming.title")}</h2>
      <p className="cal-sub">{t("omniPost.settings.coming.desc")}</p>

      <MultiPostGuide />

      {/* Engine ---------------------------------------------------- */}
      <div className="card" style={{ padding: 16, marginBottom: 12 }}>
        <h3 style={{ margin: "0 0 8px 0" }}>{t("omniPost.settings.section.engine")}</h3>
        <label style={{ display: "block", marginBottom: 6 }}>
          <div className="cal-sub">{t("omniPost.engine.label")}</div>
          <select className="input" value={engine} onChange={function (e) { update("engine", e.target.value); }}>
            <option value="auto">auto</option>
            <option value="pw">pw (Playwright)</option>
            <option value="mp">mp (MultiPost)</option>
          </select>
        </label>
        <p className="cal-sub" style={{ margin: 0 }}>
          {engine === "mp"
            ? t("omniPost.engine.desc.mp")
            : engine === "pw"
              ? t("omniPost.engine.desc.pw")
              : t("omniPost.engine.desc.auto")}
        </p>
      </div>

      {/* Runtime --------------------------------------------------- */}
      <div className="card" style={{ padding: 16, marginBottom: 12 }}>
        <h3 style={{ margin: "0 0 8px 0" }}>{t("omniPost.settings.section.runtime")}</h3>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
          <label>
            <div className="cal-sub">{t("omniPost.settings.field.concurrency_global")}</div>
            <input type="number" min={1} max={64} className="input"
                   value={draft.concurrency_global ?? 6}
                   onChange={function (e) { update("concurrency_global", parseInt(e.target.value, 10) || 1); }} />
          </label>
          <label>
            <div className="cal-sub">{t("omniPost.settings.field.concurrency_per_platform")}</div>
            <input type="number" min={1} max={16} className="input"
                   value={draft.concurrency_per_platform ?? 2}
                   onChange={function (e) { update("concurrency_per_platform", parseInt(e.target.value, 10) || 1); }} />
          </label>
          <label>
            <div className="cal-sub">{t("omniPost.settings.field.retry_max")}</div>
            <input type="number" min={0} max={10} className="input"
                   value={draft.retry_max_attempts ?? 3}
                   onChange={function (e) { update("retry_max_attempts", parseInt(e.target.value, 10) || 0); }} />
          </label>
          <label>
            <div className="cal-sub">{t("omniPost.settings.field.cooldown")}</div>
            <input type="number" min={0} max={3600} className="input"
                   value={draft.cooldown_seconds_per_account ?? 120}
                   onChange={function (e) { update("cooldown_seconds_per_account", parseInt(e.target.value, 10) || 0); }} />
          </label>
        </div>
        <label style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 10 }}>
          <input type="checkbox" checked={!!draft.playwright_headless}
                 onChange={function (e) { update("playwright_headless", e.target.checked); }} />
          <span>{t("omniPost.settings.field.headless")}</span>
        </label>
        <p className="cal-sub" style={{ margin: "4px 0 0 24px" }}>{t("omniPost.settings.field.headless.desc")}</p>
      </div>

      {/* Scheduler / self-heal ------------------------------------ */}
      <div className="card" style={{ padding: 16, marginBottom: 12 }}>
        <h3 style={{ margin: "0 0 8px 0" }}>{t("omniPost.settings.section.scheduler")}</h3>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
          <label>
            <div className="cal-sub">{t("omniPost.settings.field.poll")}</div>
            <input type="number" min={5} max={600} className="input"
                   value={draft.scheduler_poll_seconds ?? 30}
                   onChange={function (e) { update("scheduler_poll_seconds", parseFloat(e.target.value) || 30); }} />
          </label>
          <label>
            <div className="cal-sub">{t("omniPost.settings.field.selfheal_interval")}</div>
            <input type="number" min={1} max={168} className="input"
                   value={draft.selfheal_interval_hours ?? 24}
                   onChange={function (e) { update("selfheal_interval_hours", parseFloat(e.target.value) || 24); }} />
          </label>
        </div>
        <label style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 10 }}>
          <input type="checkbox" checked={!!draft.enable_selfheal}
                 onChange={function (e) { update("enable_selfheal", e.target.checked); }} />
          <span>{t("omniPost.settings.field.selfheal")}</span>
        </label>
        <p className="cal-sub" style={{ margin: "4px 0 0 24px" }}>{t("omniPost.settings.field.selfheal.desc")}</p>

        <label style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 10 }}>
          <input type="checkbox" checked={!!draft.enable_playwright_probe}
                 onChange={function (e) { update("enable_playwright_probe", e.target.checked); }} />
          <span>{t("omniPost.settings.field.probe")}</span>
        </label>
        <p className="cal-sub" style={{ margin: "4px 0 0 24px" }}>{t("omniPost.settings.field.probe.desc")}</p>
      </div>

      <div style={{ display: "flex", justifyContent: "flex-end" }}>
        <button className="btn btn-primary" disabled={saving} onClick={save}>
          {t("omniPost.settings.save")}
        </button>
      </div>
    </div>
  );
}

/* ─── Stubs for tabs that land in later sprints ────────────────────── */
function StubTab({ titleKey, descKey }) {
  const t = useT();
  return (
    <div className="stub">
      <Ico name="info" />
      <h2>{t(titleKey)}</h2>
      <p>{t(descKey)}</p>
    </div>
  );
}

/* ─── Root app ─────────────────────────────────────────────────────── */
function App() {
  const [tab, setTab] = useState("publish");
  let pane;
  switch (tab) {
    case "publish":  pane = <PublishTab />; break;
    case "tasks":    pane = <TasksTab />;   break;
    case "accounts": pane = <AccountsTab />; break;
    case "calendar": pane = <CalendarTab />; break;
    case "library":  pane = <LibraryTab />;  break;
    case "settings": pane = <SettingsTab />; break;
    default: pane = <PublishTab />;
  }
  return (
    <UploadDockProvider>
      <div className="app">
        <TopShell tab={tab} onTab={setTab} />
        <div className="content">{pane}</div>
      </div>
    </UploadDockProvider>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
if (window.OpenAkita && typeof window.OpenAkita.ready === "function") {
  window.OpenAkita.ready();
}
</script>

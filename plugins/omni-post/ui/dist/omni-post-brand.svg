  <g transform="translate(8 8) scale(2)" fill="url(#op-mark)" filter="url(#op-glow)">
    <path d="M3 20v-6l8-2l-8-2V4l19 8Z"/>
  </g>
  <path d="M16 47c10-8 22-8 32 0" fill="none" stroke="#FFFFFF" stroke-opacity="0.28" stroke-width="2" stroke-linecap="round"/>

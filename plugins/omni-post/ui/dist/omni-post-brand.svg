  <desc>Theme icon using Iconify mdi:send-variant.</desc>
  <defs>
    <linearGradient id="op-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1E1038"/>
      <stop offset="0.52" stop-color="#5B21B6"/>
      <stop offset="1" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="op-mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FDF4FF"/>
      <stop offset="0.48" stop-color="#C4B5FD"/>

<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PPT Maker · PPT 制作助手</title>
    <script src="./_assets/bootstrap.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="./_assets/styles.css" />
  </head>
  <body>
    <div id="root"></div>
    <script src="./_assets/i18n.js"></script>
    <script src="./_assets/icons.js"></script>
    <script src="./_assets/markdown-mini.js"></script>
    <script type="text/babel">
      const { useCallback, useEffect, useMemo, useRef, useState } = React;
      const PLUGIN_BASE = "/api/plugins/ppt-maker";
      const tabs = [
        ["Create", "创建"],
        ["Projects", "项目"],
        ["Exports", "导出"],
        ["Materials", "素材"],
        ["Templates", "模板"],
        ["Settings", "设置"],
      ];
      const modes = [
        { id: "topic_to_deck", title: "主题生成", icon: "spark", desc: "从一句目标开始生成汇报大纲", input: "告诉我主题、受众、场景和希望说服谁。", next: "创建项目后先确认大纲。" },
        { id: "files_to_deck", title: "资料生成", icon: "doc", desc: "把文档资料整理成结构化 PPT", input: "先到素材页解析 Markdown、PDF、DOCX 或参考 PPT。", next: "建议先上传/解析资料，再创建项目。" },
        { id: "outline_to_deck", title: "大纲生成", icon: "outline", desc: "将已有提纲补全为演示文稿", input: "在需求描述中粘贴章节、页标题或会议提纲。", next: "大纲会进入确认流程，可再调整页序。" },
        { id: "table_to_deck", title: "表格汇报", icon: "table", desc: "从 CSV/XLSX 生成数据洞察页", input: "先到素材页完成数据体检、自动洞察和图表方案。", next: "必须绑定已完成分析的数据集。" },
        { id: "template_deck", title: "企业模板", icon: "template", desc: "按品牌模板生成客户提案", input: "先到模板页上传企业 PPTX 并完成诊断。", next: "建议绑定已诊断模板。" },
        { id: "revise_deck", title: "改稿优化", icon: "edit", desc: "针对已有页面做改写和审计", input: "上传参考 PPT 或在需求里说明要改哪几页。", next: "适合做二次润色、重排和审计。" },
      ];
      const stylePresets = [
        ["tech_business", "科技商务", "橙红玫红色系，适合产品、技术、管理层汇报"],
        ["consulting", "咨询汇报", "结构强、结论先行，适合方案和复盘"],
        ["executive", "高管简报", "内容更克制，适合董事会和经营会"],
        ["education", "课程培训", "阅读友好，适合教学和内部培训"],
        ["custom", "自定义", "手动输入颜色、语气或视觉偏好"],
      ];

      function request(path, options = {}) {
        const api = window.OpenAkita;
        const url = path.startsWith("/api/") ? path : `${PLUGIN_BASE}${path}`;
        if (api && typeof api.request === "function") {
          return api.request(url, options);
        }
        const init = {
          method: options.method || "GET",
          headers: { "Content-Type": "application/json", ...(options.headers || {}) },
        };
        if (options.body) init.body = JSON.stringify(options.body);
        return fetch(url, init).then((response) => {
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const contentType = response.headers.get("content-type") || "";
          return contentType.includes("application/json") ? response.json() : response.text();
        });
      }

      function uploadFile(file, projectId = "", extra = {}) {
        const form = new FormData();
        form.append("file", file);
        if (projectId) form.append("project_id", projectId);
        Object.entries(extra || {}).forEach(([key, value]) => {
          if (value != null && value !== "") form.append(key, value);
        });
        return fetch(`${PLUGIN_BASE}/upload`, { method: "POST", body: form }).then((response) => {
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          return response.json();
        });
      }

      function useDraft(key, initial) {
        const [value, setValue] = useState(() => {
          try { return JSON.parse(localStorage.getItem(key)) || initial; } catch (_) { return initial; }
        });
        useEffect(() => localStorage.setItem(key, JSON.stringify(value)), [key, value]);
        return [value, setValue];
      }

      function shortId(value) {
        return value ? String(value).slice(0, 12) : "";
      }

      function statusClass(status) {
        if (status === "ready" || status === "succeeded" || status === "profiled" || status === "diagnosed") return "done";
        if (status === "failed") return "failed";
        if (status === "cancelled") return "cancelled";
        if (String(status || "").includes("ready") || String(status || "").includes("confirmed")) return "approval";
        return "pending";
      }

      function formatElapsed(sec) {
        const s = Math.max(0, Math.round(sec || 0));
        const mm = String(Math.floor(s / 60)).padStart(2, "0");
        const ss = String(s % 60).padStart(2, "0");
        return `${mm}:${ss}`;
      }

      function mergeDependency(snapshot, dependency) {
        if (!dependency) return snapshot;
        const groups = snapshot?.groups || [];
        const nextGroups = groups.some((item) => item.id === dependency.id)
          ? groups.map((item) => item.id === dependency.id ? { ...item, ...dependency } : item)
          : [...groups, dependency];
        return { ...(snapshot || { ok: true }), groups: nextGroups };
      }

      function storageLabel(key) {
        return ({
          root: "插件数据目录",
          uploads: "用户上传资料",
          projects: "项目工作区",
          datasets: "表格分析",
          templates: "模板诊断",
          exports: "导出文件",
        })[key] || key;
      }

      function settingLabel(key) {
        return ({
          uploads_dir: "上传资料目录",
          datasets_dir: "表格分析目录",
          templates_dir: "模板诊断目录",
          projects_dir: "项目工作区目录",
          exports_dir: "导出文件目录",
        })[key] || key;
      }

      function defaultPlaceholder(key) {
        return ({
          uploads_dir: "默认: 插件数据目录/uploads",
          datasets_dir: "默认: 插件数据目录/datasets",
          templates_dir: "默认: 插件数据目录/templates",
          projects_dir: "默认: 插件数据目录/projects",
          exports_dir: "默认: 插件数据目录/exports",
        })[key] || "留空使用默认目录";
      }

      function storageKeyForSetting(key) {
        return ({
          uploads_dir: "uploads",
          datasets_dir: "datasets",
          templates_dir: "templates",
          projects_dir: "projects",
          exports_dir: "exports",
        })[key] || "root";
      }

      function JsonBlock({ value }) {
        return <pre className="json-block">{JSON.stringify(value, null, 2)}</pre>;
      }

      function TableAnalysisSummary({ dataset }) {
        const profile = dataset?.profile;
        const insights = dataset?.insights;
        const chartSpecs = dataset?.chart_specs || insights?.chart_suggestions || [];
        const qualityWarnings = profile?.quality_warnings || [];
        const missingWarnings = qualityWarnings.filter((item) => item.includes("缺失值超过 30%"));
        const otherWarnings = qualityWarnings.filter((item) => !item.includes("缺失值超过 30%"));
        const missingColumns = missingWarnings.map((item) => item.replace(/^列\s+/, "").replace(/\s+缺失值超过 30%。?$/, ""));
        const chartTypeName = (type) => ({
          line: "趋势折线图",
          bar: "柱状图",
          horizontal_bar: "横向条形图",
          pie: "占比饼图",
          table: "明细摘要表",
          metric_cards: "核心指标卡",
        })[type] || type;
        const chartReason = (spec) => {
          if (spec.type === "metric_cards") return "适合在 PPT 中提炼多个关键数值，作为经营指标或核心 KPI 展示。";
          if (spec.type === "table") return "适合保留关键明细，方便在汇报中给出数据依据。";
          if (spec.type === "line") return `适合观察 ${spec.y || "指标"} 随 ${spec.x || "时间/维度"} 的变化趋势。`;
          if (spec.type === "bar" || spec.type === "horizontal_bar") return `适合比较不同 ${spec.x || "分类"} 下的 ${spec.y || "指标"} 差异。`;
          return spec.reason || "可作为演示文稿中的候选图表。";
        };
        if (!dataset) return null;
        if (!profile) {
          return (
            <div className="analysis-help">
              <strong>数据集尚未完成分析。</strong>
              <div>执行分析后，系统将生成字段结构、质量检查、指标/维度识别与推荐图表方案，供后续 PPT 生成流程引用。</div>
            </div>
          );
        }
        return (
          <div className="analysis-summary">
            <div className="analysis-help">
              <strong>分析结果概览</strong>
              <div>系统已完成字段识别、数据质量检查、候选指标/维度提取，并生成可用于演示文稿的数据叙事与图表方案。</div>
            </div>
            <div className="summary-grid">
              <div className="summary-card"><span>行数</span><strong>{profile.row_count}</strong></div>
              <div className="summary-card"><span>列数</span><strong>{profile.column_count}</strong></div>
              <div className="summary-card"><span>候选指标</span><strong>{profile.candidate_metrics?.length || 0}</strong></div>
              <div className="summary-card"><span>候选维度</span><strong>{profile.candidate_dimensions?.length || 0}</strong></div>
            </div>
            <div className="analysis-section">
              <h4>自动洞察</h4>
              {(insights?.key_findings || []).map((item, index) => <p key={index}>{item}</p>)}
              {!(insights?.key_findings || []).length && <p className="text-muted">暂未生成洞察。</p>}
            </div>
            <div className="analysis-section">
              <h4>图表方案</h4>
              {chartSpecs.map((spec) => (
                <div className="chart-spec-card" key={spec.id}>
                  <strong>{spec.title}</strong>
                  <span>{chartTypeName(spec.type)} · {chartReason(spec)}</span>
                </div>
              ))}
              {!chartSpecs.length && <p className="text-muted">暂未生成图表方案。</p>}
            </div>
            {qualityWarnings.length > 0 && (
              <div className="analysis-section warning quality-summary">
                <div className="quality-summary__head">
                  <h4>使用前检查</h4>
                  <span>{qualityWarnings.length} 项提醒</span>
                </div>
                <p className="quality-summary__intro">这里不是报错，而是在提醒：这些字段可能缺值较多或表格过宽，生成 PPT 时建议只选关键列，或先清洗数据。</p>
                <div className="quality-summary__items">
                  {otherWarnings.map((item, index) => <div className="quality-chip" key={index}>{item}</div>)}
                  {missingColumns.length > 0 && (
                    <div className="quality-chip">
                      {missingColumns.length} 个字段缺失较多：{missingColumns.slice(0, 6).join("、")}{missingColumns.length > 6 ? ` 等 ${missingColumns.length} 个` : ""}
                    </div>
                  )}
                </div>
                {missingColumns.length > 6 && (
                  <details className="quality-details">
                    <summary>查看全部缺失字段</summary>
                    <div>{missingColumns.join("、")}</div>
                  </details>
                )}
              </div>
            )}
          </div>
        );
      }

      function AnalysisModal({ dataset, onClose }) {
        if (!dataset) return null;
        return (
          <div className="modal-mask" onClick={onClose}>
            <div className="modal-card analysis-modal" onClick={(e) => e.stopPropagation()}>
              <div className="analysis-modal__head">
                <div>
                  <strong>表格分析结果</strong>
                  <span>{dataset.dataset?.name || dataset.dataset?.id || "数据集"}</span>
                </div>
                <button className="btn btn-sm" onClick={onClose}>关闭</button>
              </div>
              <div className="analysis-modal__body">
                <TableAnalysisSummary dataset={dataset} />
                <details style={{marginTop: 12}}>
                  <summary className="text-xs text-muted">查看原始 JSON</summary>
                  <JsonBlock value={dataset} />
                </details>
              </div>
            </div>
          </div>
        );
      }

      function DeleteAssetConfirmModal({ target, onClose, onConfirm }) {
        const [deleteFiles, setDeleteFiles] = useState(false);
        if (!target) return null;
        const hasFolder = !!target.ids;
        const title = target.title || (hasFolder ? "确认删除该数据集文件夹？" : "确认删除该素材？");
        const targetTag = target.targetTag || (hasFolder ? "目标文件夹" : "目标素材");
        const description = target.description || `默认只删除素材库里的登记记录，不影响磁盘上的原始文件。删除后，${hasFolder ? "这个文件夹及其中素材" : "这条素材"}不会再出现在当前列表中。`;
        const showDeleteFiles = target.showDeleteFiles !== false;
        const deleteFilesLabel = target.deleteFilesLabel || "同时删除插件存储目录里的文件和分析结果";
        const hint = target.hint || "为避免误删，系统只会删除插件保存目录内的内容；手动登记的外部路径会自动保留。";
        return (
          <div className="modal-mask" onClick={onClose}>
            <div className="modal-card delete-modal" onClick={(e) => e.stopPropagation()}>
              <div className="delete-modal__head">
                <div className="delete-modal__icon" aria-hidden="true">!</div>
                <div className="delete-modal__title">
                  <strong>{title}</strong>
                  <div className="delete-modal__target">
                    <span className="delete-modal__tag">{targetTag}</span>
                    <span className="delete-modal__name" title={target.name || target.id}>{target.name || target.id}</span>
                  </div>
                </div>
                <button className="btn btn-sm" onClick={onClose}>关闭</button>
              </div>
              <div className="delete-modal__body">
                <p>{description}</p>
                {showDeleteFiles && (
                  <label className="delete-modal__option">
                    <input type="checkbox" checked={deleteFiles} onChange={(e) => setDeleteFiles(e.target.checked)} />
                    <span>{deleteFilesLabel}</span>
                  </label>
                )}
                {showDeleteFiles && <div className="delete-modal__hint">{hint}</div>}
              </div>
              <div className="modal-actions">
                <button className="btn" onClick={onClose}>取消</button>
                <button className="btn btn-danger" onClick={() => onConfirm(deleteFiles)}>确认删除</button>
              </div>
            </div>
          </div>
        );
      }

      function ErrorPanel({ error }) {
        if (!error) return null;
        return <div className="oa-config-banner error-panel"><span className="oa-config-banner__icon">!</span><div className="oa-config-banner__text"><strong>错误</strong><br />{String(error.message || error)}</div></div>;
      }

      function ProgressPanel({ event }) {
        if (!event) return null;
        return (
          <div className="oa-config-banner oa-config-banner--info">
            <span className="oa-config-banner__icon">i</span>
            <div className="oa-config-banner__text"><strong>{event.status || event.step}</strong><br />进度 {Math.round((event.progress || 0) * 100)}%</div>
          </div>
        );
      }

      function CostBreakdown({ draft }) {
        const complexity = draft.mode === "table_to_deck" || draft.mode === "template_deck" ? "中" : "低";
        const modeName = (modes.find((item) => item.id === draft.mode) || modes[0]).title;
        const pageCount = draft.slide_count || "未填写";
        return (
          <div className="oa-cost">
            <div className="oa-cost__main">
              <div><span className="oa-cost__label">预览</span><div className="range">{pageCount}<small>{draft.slide_count ? " 页" : ""}</small></div></div>
              <div className="oa-cost__meta">
                <span>{modeName}</span>
                <span>复杂度 {complexity}</span>
                <span>PPTX 可编辑导出</span>
              </div>
            </div>
            <div className="oa-cost__steps"><span>大纲</span><span>设计</span><span>页面内容</span><span>质量检查</span></div>
          </div>
        );
      }

      function CreateResultPanel({ draft, result, busy, phase, onNavigate, onGenerate }) {
        const project = result?.project || result?.result?.project || null;
        const projectId = project?.id || result?.project_id || result?.result?.project_id || null;
        const status = project?.status || result?.status || result?.result?.status || "draft";
        const modeName = (modes.find((item) => item.id === draft.mode) || modes[0]).title;
        if (busy) {
          return (
            <div className="create-result create-result--busy">
              <div className="create-result__hero">
                <span className="create-spinner" />
                <strong>{phase || "正在处理..."}</strong>
                <p>请稍候，系统正在提交任务并刷新项目列表。完成后会在这里展示下一步操作。</p>
              </div>
            </div>
          );
        }
        if (!result) {
          return (
            <div className="create-result">
              <div className="create-result__hero">
                <strong>创建前预览</strong>
                <p>填写左侧必填信息后，点击“创建项目”。项目创建后不会立即导出，会先进入项目页完成大纲确认和设计确认。</p>
              </div>
              <div className="project-detail__grid">
                <div><span>模式</span><strong>{modeName}</strong></div>
                <div><span>页数</span><strong>{draft.slide_count || "默认 8"} 页</strong></div>
                <div><span>数据集</span><strong>{draft.dataset_id ? shortId(draft.dataset_id) : "未绑定"}</strong></div>
                <div><span>模板</span><strong>{draft.template_id ? shortId(draft.template_id) : "未绑定"}</strong></div>
              </div>
              <div className="create-next-tip">建议：素材和模板准备完成后再创建项目，后续推进会更稳定。</div>
            </div>
          );
        }
        return (
          <div className="create-result">
            <div className="create-result__hero">
              <strong>{project ? "项目已创建" : "本次操作已完成"}</strong>
              <span className={"badge badge-" + statusClass(status)}>{status}</span>
              <p>{project ? "下一步请前往项目页继续推进。通常需要先确认大纲，再确认设计，最后生成并导出 PPTX。" : "操作结果已返回，可查看摘要或继续下一步。"}</p>
            </div>
            <div className="project-detail__grid">
              <div><span>项目 ID</span><strong>{shortId(projectId) || "-"}</strong></div>
              <div><span>当前状态</span><strong>{status}</strong></div>
              <div><span>模式</span><strong>{project?.mode || modeName}</strong></div>
              <div><span>页数</span><strong>{project?.slide_count || draft.slide_count || "默认 8"}</strong></div>
            </div>
            <div className="create-result__actions">
              <button className="btn btn-primary" onClick={() => onNavigate("Projects")}>去项目页推进后续</button>
              <button className="btn" onClick={onGenerate} disabled={!projectId}>继续生成</button>
            </div>
            <details className="template-raw"><summary>查看原始返回 JSON</summary><JsonBlock value={result} /></details>
          </div>
        );
      }

      function FileUploadZone({ hint = "拖入文件或点击上传。", accept = "", multiple = false, disabled = false, manual = false, uploadExtra = {}, onFilesSelected, onUploaded, onUploads }) {
        const inputId = `upload-${Math.random().toString(36).slice(2)}`;
        async function handleChange(e) {
          const files = Array.from(e.target.files || []);
          if (!files.length) return;
          if (manual) {
            if (onFilesSelected) onFilesSelected(files);
            e.target.value = "";
            return;
          }
          const results = [];
          for (const file of files) {
            const data = await uploadFile(file, "", uploadExtra);
            results.push(data);
            if (onUploaded) onUploaded(data);
          }
          if (onUploads) onUploads(results);
          e.target.value = "";
        }
        return (
          <label className={`upload-zone ${disabled ? "is-disabled" : ""}`} htmlFor={disabled ? undefined : inputId}>
            <input id={inputId} type="file" accept={accept} multiple={multiple} disabled={disabled} onChange={handleChange} />
            <div className="upload-zone__title">点击上传素材</div>
            <div className="upload-zone__hint">{hint}</div>
          </label>
        );
      }

      function PreviewShell({ title, hint, children }) {
        return (
          <div className={"split-right oa-preview-area" + (!children ? " oa-preview-area--centered" : "")}>
            {children || (
              <div className="oa-preview-empty">
                <span className="oa-preview-empty__icon">P</span>
                <div className="oa-preview-empty__title">{title}</div>
                <div className="oa-preview-empty__hint">{hint}</div>
              </div>
            )}
          </div>
        );
      }

      function FolderPickerModal({ open, title, initialPath, onCancel, onSelect }) {
        const [path, setPath] = useState("");
        const [items, setItems] = useState([]);
        const [parent, setParent] = useState(null);
        const [isAnchor, setIsAnchor] = useState(true);
        const [loading, setLoading] = useState(false);
        const [error, setError] = useState("");
        const [newFolderMode, setNewFolderMode] = useState(false);
        const [newFolderName, setNewFolderName] = useState("");
        const newFolderInputRef = useRef(null);

        const load = useCallback(async (nextPath) => {
          setLoading(true);
          setError("");
          try {
            const qs = nextPath ? `?path=${encodeURIComponent(nextPath)}` : "";
            const data = await request(`/storage/list-dir${qs}`);
            setPath(data.path || "");
            setParent(data.parent || null);
            setItems(data.items || []);
            setIsAnchor(!!data.is_anchor);
          } catch (err) {
            setError(String(err.message || err));
            if (nextPath) {
              try {
                const data = await request("/storage/list-dir");
                setPath(data.path || "");
                setParent(data.parent || null);
                setItems(data.items || []);
                setIsAnchor(!!data.is_anchor);
              } catch (_) {}
            }
          } finally {
            setLoading(false);
          }
        }, []);

        useEffect(() => {
          if (!open) return;
          setNewFolderMode(false);
          setNewFolderName("");
          load(initialPath || "");
        }, [open, initialPath, load]);

        useEffect(() => {
          if (newFolderMode && newFolderInputRef.current) newFolderInputRef.current.focus();
        }, [newFolderMode]);

        const crumbs = (() => {
          if (!path) return [];
          const norm = path.replace(/\\/g, "/");
          const parts = norm.split("/").filter(Boolean);
          const out = [];
          if (norm.startsWith("/")) {
            out.push({ name: "/", path: "/" });
            let acc = "";
            for (const part of parts) {
              acc += "/" + part;
              out.push({ name: part, path: acc });
            }
          } else if (parts[0] && /^[A-Za-z]:$/.test(parts[0])) {
            out.push({ name: parts[0], path: parts[0] + "/" });
            let acc = parts[0];
            for (let i = 1; i < parts.length; i++) {
              acc += "/" + parts[i];
              out.push({ name: parts[i], path: acc });
            }
          } else {
            out.push({ name: path, path });
          }
          return out;
        })();

      function ActivityLogPanel({ projectId, onError }) {
        const [events, setEvents] = useState([]);
        const [loading, setLoading] = useState(true);
        const [autoScroll, setAutoScroll] = useState(true);
        const [expanded, setExpanded] = useState({});
        const [filter, setFilter] = useState("all");
        const containerRef = useRef(null);
        const seenRef = useRef(new Set());
        useEffect(() => {
          if (!projectId) return;
          let cancelled = false;
          seenRef.current = new Set();
          setEvents([]);
          setLoading(true);
          (async () => {
            try {
              const data = await request("/projects/" + projectId + "/activity?limit=500");
              if (cancelled) return;
              const list = Array.isArray(data?.events) ? data.events : [];
              const dedup = [];
              for (const ev of list) {
                const key = (ev.ts || "") + "|" + (ev.stage || "") + "|" + (ev.status || "") + "|" + (ev.message || "");
                if (seenRef.current.has(key)) continue;
                seenRef.current.add(key);
                dedup.push(ev);
              }
              setEvents(dedup);
            } catch (err) {
              if (onError) onError(err);
            } finally {
              if (!cancelled) setLoading(false);
            }
          })();
          const onActivity = (e) => {
            const ev = (e && e.detail) || e;
            if (!ev || ev.project_id !== projectId) return;
            const key = (ev.ts || "") + "|" + (ev.stage || "") + "|" + (ev.status || "") + "|" + (ev.message || "");
            if (seenRef.current.has(key)) return;
            seenRef.current.add(key);
            setEvents((prev) => [...prev, ev]);
          };
          window.addEventListener("ppt_activity", onActivity);
          return () => {
            cancelled = true;
            window.removeEventListener("ppt_activity", onActivity);
          };
        }, [projectId]);
        useEffect(() => {
          if (!autoScroll) return;
          const el = containerRef.current;
          if (el) el.scrollTop = el.scrollHeight;
        }, [events, autoScroll]);
        const visible = events.filter((ev) => {
          if (filter === "all") return true;
          if (filter === "errors") return ev.status === "error" || ev.status === "fallback" || ev.level === "error" || ev.level === "warn";
          if (filter === "brain") return (ev.stage || "").startsWith("brain.");
          return true;
        });
        async function refresh() {
          if (!projectId) return;
          try {
            const data = await request("/projects/" + projectId + "/activity?limit=500");
            const list = Array.isArray(data?.events) ? data.events : [];
            seenRef.current = new Set();
            for (const ev of list) {
              seenRef.current.add((ev.ts || "") + "|" + (ev.stage || "") + "|" + (ev.status || "") + "|" + (ev.message || ""));
            }
            setEvents(list);
          } catch (err) { if (onError) onError(err); }
        }
        return (
          <div className="activity-panel">
            <div className="activity-head">
              <div>
                <strong className="section-title">处理过程日志</strong>
                <p className="text-xs text-muted">实时记录 Brain 调用、版式选择、Web 搜索、配图获取等关键交互；事件也会同步写入 <code>data/projects/&lt;id&gt;/logs/activity.jsonl</code>。</p>
              </div>
              <div className="activity-toolbar">
                <div className="activity-filter">
                  <button className={"btn btn-xs " + (filter === "all" ? "btn-primary" : "")} onClick={() => setFilter("all")}>全部</button>
                  <button className={"btn btn-xs " + (filter === "brain" ? "btn-primary" : "")} onClick={() => setFilter("brain")}>Brain</button>
                  <button className={"btn btn-xs " + (filter === "errors" ? "btn-primary" : "")} onClick={() => setFilter("errors")}>异常/兜底</button>
                </div>
                <label className="text-xs" style={{display:'flex',alignItems:'center',gap:4}}>
                  <input type="checkbox" checked={autoScroll} onChange={(e) => setAutoScroll(e.target.checked)} /> 自动滚动
                </label>
                <button className="btn btn-xs" onClick={refresh}>刷新</button>
              </div>
            </div>
            <div className="activity-stream" ref={containerRef}>
              {loading && <div className="empty-note">加载中...</div>}
              {!loading && visible.length === 0 && <div className="empty-note">暂无活动记录。点击“继续生成”后即可看到 Brain 调用、版式选择等过程信息。</div>}
              {visible.map((ev, idx) => {
                const key = (ev.ts || idx) + "_" + (ev.stage || "") + "_" + (ev.status || "") + "_" + idx;
                const cls = activityStatusClass(ev.status, ev.level);
                const hasDetails = ev.details && typeof ev.details === "object" && Object.keys(ev.details).length > 0;
                const isOpen = !!expanded[key];
                return (
                  <div className={"activity-row " + cls} key={key}>
                    <div className="activity-row__time">{formatActivityTime(ev.iso, ev.ts)}</div>
                    <div className="activity-row__icon">{activityStatusEmoji(ev.status, ev.level)}</div>
                    <div className="activity-row__body">
                      <div className="activity-row__line">
                        <span className="activity-row__stage">{activityStageLabel(ev.stage)}</span>
                        <span className="activity-row__msg">{ev.message || ev.status || ""}</span>
                        {hasDetails && (
                          <button className="btn btn-xs activity-row__toggle" onClick={() => setExpanded((prev) => ({ ...prev, [key]: !prev[key] }))}>{isOpen ? "收起" : "详情"}</button>
                        )}
                      </div>
                      {isOpen && hasDetails && (
                        <pre className="activity-row__details">{JSON.stringify(ev.details, null, 2)}</pre>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      }

          ["outline_confirmed", "大纲确认"],
          ["design_ready", "设计"],
          ["design_confirmed", "设计确认"],
          ["ready", "导出"],
        ];
        const stepIndex = (status) => {
          if (status === "failed" || status === "cancelled") return 0;
          const idx = steps.findIndex(([id]) => id === status);
          return idx >= 0 ? idx : 0;
        };
        const nextAction = (status) => {
          if (status === "draft") return "点击继续后生成大纲";
          if (status === "outline_ready") return "请打开大纲确认面板";
          if (status === "outline_confirmed") return "点击继续后生成设计";
          if (status === "design_ready") return "请打开设计确认面板";
          if (status === "design_confirmed") return "点击继续后生成 PPTX";
          if (status === "ready") return "已完成，可到导出页下载";
          if (status === "failed") return "生成失败，请查看原因后重新生成";
          if (status === "cancelled") return "已取消，可删除或重新创建";
          return "等待推进";
        };
        const primaryActionLabel = (status) => {
          if (status === "outline_ready") return "确认大纲";
          if (status === "design_ready") return "确认设计";
          if (status === "outline_confirmed") return "生成设计";
          if (status === "design_confirmed") return "生成 PPTX";
          if (status === "ready") return "去导出页";
          if (status === "failed") return "重新生成";
          if (status === "cancelled") return "已取消";
          return "继续生成";
        };
        const outlineSlides = (outline) => outline?.outline?.slides || outline?.slides || [];
        const designMarkdown = (design) => design?.design_markdown || design?.design_spec_markdown || design?.spec_lock?.design_spec_markdown || "";
        const normalizeSlides = (slides) => (slides || []).map((slide, index) => ({
          ...slide,
          id: slide.id || `slide_${String(index + 1).padStart(2, "0")}`,
          index: index + 1,
          title: slide.title || slide.heading || `页面 ${index + 1}`,
          purpose: slide.purpose || slide.notes || "说明这一页要表达的重点。",
          slide_type: slide.slide_type || slide.type || "content",
          key_points: slide.key_points || [],
        }));
        const syncReviewDrafts = (data) => {
          setDraftSlides(normalizeSlides(outlineSlides(data?.outline)));
          setDraftDesign(designMarkdown(data?.design));
          setDraftSpecLock(data?.design?.spec_lock || {});
        };
        const updateTheme = (key, value) => {
          setDraftSpecLock((prev) => ({ ...prev, theme: { ...(prev.theme || {}), [key]: value } }));
        };
        const readyCount = projects.filter((item) => item.status === "ready").length;
        const activeCount = projects.filter((item) => !["ready", "failed", "cancelled"].includes(item.status)).length;
        const failedCount = projects.filter((item) => item.status === "failed").length;
        const visibleProjects = projects.filter((item) => {
          if (filter === "all") return true;
          if (filter === "active") return !["ready", "failed", "cancelled"].includes(item.status);
          return item.status === filter;
        });
        async function load(projectId) {
          setError(null);
          setPageError("");
          const data = await request(`/projects/${projectId}`);
          setDetail(data);
          syncReviewDrafts(data);
          setDetailOpen(true);
        }
        async function retry(projectId) {
          setError(null);
          setPageError("");
          setRunningProjectId(projectId);
          setProjectErrors((prev) => ({ ...prev, [projectId]: "" }));
          try {
            await request(`/projects/${projectId}/retry`, { method: "POST" });
            const data = await request(`/projects/${projectId}`);
            setDetail(data);
            syncReviewDrafts(data);
            await refreshProjects({ local: true });
          } catch (err) {
            setProjectErrors((prev) => ({ ...prev, [projectId]: String(err.message || err) }));
          } finally {
            setRunningProjectId("");
          }
        }
        async function openReview(projectId) {
          await load(projectId);
        }
        function updateDraftSlide(index, patch) {
          setDraftSlides((prev) => prev.map((slide, idx) => idx === index ? { ...slide, ...patch } : slide));
        }
        function addDraftSlide() {
          setDraftSlides((prev) => normalizeSlides([
            ...prev,
            { title: `新增页面 ${prev.length + 1}`, slide_type: "content", purpose: "补充需要表达的内容。", key_points: [] },
          ]));
        }
        function removeDraftSlide(index) {
          setDraftSlides((prev) => normalizeSlides(prev.filter((_, idx) => idx !== index)));
        }
        function buildOutlinePayload() {
          const base = detail?.outline?.outline || {};
          const slides = normalizeSlides(draftSlides);
          return { ...base, slides, storyline: slides.map((slide) => slide.purpose) };
        }
        async function saveReview(kind) {
          const projectId = selectedProject?.id;
          if (!projectId) return;
          setError(null);
          setPageError("");
          setReviewBusy(kind + "-save");
          setProjectErrors((prev) => ({ ...prev, [projectId]: "" }));
          try {
            if (kind === "outline") {
              await request(`/projects/${projectId}/outline`, { method: "PUT", body: { outline: buildOutlinePayload(), confirmed: false } });
            } else {
              await request(`/projects/${projectId}/design/confirm`, { method: "PUT", body: { design: { design_spec_markdown: draftDesign, spec_lock: draftSpecLock }, confirmed: false } });
            }
            const data = await request(`/projects/${projectId}`);
            setDetail(data);
            syncReviewDrafts(data);
            await refreshProjects({ local: true });
          } catch (err) {
            setProjectErrors((prev) => ({ ...prev, [projectId]: String(err.message || err) }));
            setPageError(String(err.message || err));
          } finally {
            setReviewBusy("");
          }
        }
        async function confirmReview(kind) {
          const projectId = selectedProject?.id;
          if (!projectId) return;
          setError(null);
          setPageError("");
          setReviewBusy(kind);
          setProjectErrors((prev) => ({ ...prev, [projectId]: "" }));
          try {
            if (kind === "outline") {
              if (!draftSlides.length) throw new Error("当前项目还没有可确认的大纲，请先点击继续生成大纲。");
              await request(`/projects/${projectId}/outline`, { method: "PUT", body: { outline: buildOutlinePayload(), confirmed: true } });
            } else {
              const design = { design_spec_markdown: draftDesign, spec_lock: draftSpecLock };
              if (!design.design_spec_markdown && !Object.keys(design.spec_lock).length) throw new Error("当前项目还没有可确认的设计方案，请先点击继续生成设计。");
              await request(`/projects/${projectId}/design/confirm`, { method: "PUT", body: { design, confirmed: true } });
            }
            const data = await request(`/projects/${projectId}`);
            setDetail(data);
            syncReviewDrafts(data);
            await refreshProjects({ local: true });
            await retry(projectId);
          } catch (err) {
            setProjectErrors((prev) => ({ ...prev, [projectId]: String(err.message || err) }));
            setPageError(String(err.message || err));
          } finally {
            setReviewBusy("");
          }
        }
        async function cancel(projectId) { setError(null); await request(`/projects/${projectId}/cancel`, { method: "POST" }); if (detail?.project?.id === projectId) setDetail(null); refreshProjects(); }
        async function remove(projectId) { setError(null); await request(`/projects/${projectId}`, { method: "DELETE" }); if (detail?.project?.id === projectId) setDetail(null); setDeleteTarget(null); refreshProjects(); }
        async function refreshProjectBoard() {
          setError(null);
          setPageError("");
          try {
            await refreshProjects({ local: true });
          } catch (err) {
            setPageError(String(err.message || err));
          }
        }
        const selectedProject = detail?.project || detail;
        return (
          <div className="asset-workspace project-workspace">
            <div className="asset-toolbar card">
              <div><div className="label">项目管理</div><p>项目会按“大纲确认 → 设计确认 → 页面生成 → 质量检查 → 导出”推进。停在确认点时，需要在这里继续或重试。</p></div>
              <div className="asset-stats"><span>全部 <strong>{projects.length}</strong></span><span>进行中 <strong>{activeCount}</strong></span><span>已完成 <strong>{readyCount}</strong></span><span>失败 <strong>{failedCount}</strong></span></div>
            </div>
            <div className="project-board card">
              <div className="asset-main__head"><strong className="section-title">项目列表</strong><span>{visibleProjects.length} 个项目</span></div>
              <div className="asset-main__controls">
                <div className="asset-filter">
                  <span className="asset-filter__label">状态</span>
                  <button className={filter === "all" ? "active" : ""} onClick={() => setFilter("all")}>全部</button>
                  <button className={filter === "active" ? "active" : ""} onClick={() => setFilter("active")}>进行中</button>
                  <button className={filter === "ready" ? "active" : ""} onClick={() => setFilter("ready")}>已完成</button>
                  <button className={filter === "failed" ? "active" : ""} onClick={() => setFilter("failed")}>失败</button>
                </div>
                <button className="btn btn-primary" onClick={() => refreshProjectBoard()}>刷新项目</button>
              </div>
              {pageError && <div className="project-card__error">项目列表刷新失败：{pageError}</div>}
              <div className="project-card-grid">
                {visibleProjects.map((p) => {
                  const running = runningProjectId === p.id;
                  const currentStep = stepIndex(p.status);
                  return (
                    <div className={"project-card project-card--wide " + (running ? "is-running " : "") + (selectedProject?.id === p.id ? "selected" : "")} key={p.id}>
                      <div className="project-card__head">
                        <strong>{p.title || "未命名项目"}</strong>
                        <span className={"badge badge-" + statusClass(p.status)}>{running ? "处理中" : p.status}</span>
                      </div>
                      <div className="project-card__meta">
                        <span>{p.mode}</span><span>{p.slide_count || "?"} 页</span><span>{shortId(p.id)}</span>
                      </div>
                      <div className="project-timeline">
                        {steps.map(([id, label], index) => (
                          <div className={"project-timeline__step " + (index < currentStep ? "done " : "") + (index === currentStep ? "active " : "") + (running && index === currentStep ? "running" : "")} key={id}>
                            <i>{index + 1}</i><span>{label}</span>
                          </div>
                        ))}
                      </div>
                      <div className="project-stage-line">
                        <span className={p.status === "ready" ? "done" : "active"}>{running ? "正在推进，请稍候..." : nextAction(p.status)}</span>
                        <em>{p.updated_at ? new Date(p.updated_at * 1000).toLocaleString() : "暂无更新时间"}</em>
                      </div>
                      {projectErrors[p.id] && <div className="project-card__error">推进失败：{projectErrors[p.id]}</div>}
                      <div className="project-card__actions project-card__actions--split">
                        <button className="btn btn-sm btn-primary project-card__primary-action" onClick={() => { if (p.status === "ready") onNavigate("Exports"); else (p.status === "outline_ready" || p.status === "design_ready" ? openReview(p.id) : retry(p.id)).catch(setError); }} disabled={!!runningProjectId || p.status === "cancelled"}>{running ? "处理中..." : primaryActionLabel(p.status)}</button>
                        <div className="project-card__secondary-actions">
                          <button className="btn btn-sm" onClick={() => load(p.id).catch(setError)}>详情</button>
                          {!["ready", "failed", "cancelled"].includes(p.status) && <button className="btn btn-sm" onClick={() => cancel(p.id).catch(setError)} disabled={!!runningProjectId}>取消</button>}
                          <button className="btn btn-sm btn-danger" onClick={() => setDeleteTarget({ id: p.id, name: p.title || p.id, title: "确认删除该项目？", targetTag: "目标项目", showDeleteFiles: false, description: "删除后，这个项目、任务记录、页面记录和导出记录会从项目列表中移除。已生成的本地文件不会在这里同步删除。" })} disabled={!!runningProjectId}>删除</button>
                        </div>
                      </div>
                    </div>
                  );
                })}
                {visibleProjects.length === 0 && <div className="empty-note">暂无符合条件的项目。创建页生成项目后，会出现在这里。</div>}
              </div>
            </div>
            {detailOpen && (
              <div className="modal-mask" onClick={() => setDetailOpen(false)}>
                <div className="modal-card project-detail-modal" onClick={(e) => e.stopPropagation()}>
                  <div className="analysis-modal__head">
                    <div><strong>项目详情</strong><span>{selectedProject?.title || selectedProject?.id || "项目"}</span></div>
                    <button className="btn btn-sm" onClick={() => setDetailOpen(false)}>关闭</button>
                  </div>
                  <div className="analysis-modal__body">
                    <div className="project-detail">
                      <div className="project-detail__hero">
                        <strong>{selectedProject?.title || "项目详情"}</strong>
                        <span className={"badge badge-" + statusClass(selectedProject?.status)}>{selectedProject?.status || "unknown"}</span>
                        <p>{selectedProject?.prompt || "暂无需求描述"}</p>
                      </div>
                      <div className="project-detail__grid">
                        <div><span>模式</span><strong>{selectedProject?.mode || "-"}</strong></div>
                        <div><span>页数</span><strong>{selectedProject?.slide_count || "-"}</strong></div>
                        <div><span>数据集</span><strong>{shortId(selectedProject?.dataset_id) || "未绑定"}</strong></div>
                        <div><span>模板</span><strong>{shortId(selectedProject?.template_id) || "未绑定"}</strong></div>
                      </div>
                      {selectedProject?.id && (
                        <ActivityLogPanel projectId={selectedProject.id} onError={setError} />
                      )}
                      {selectedProject?.status === "outline_ready" && (
                        <div className="project-review-panel">
                          <div className="project-review-head">
                            <div><div className="section-title">大纲编辑与确认</div><p>请调整页面顺序、标题和每页用途。确认后，设计方案会基于这里的大纲重新推进。</p></div>
                            <button className="btn btn-sm btn-primary" onClick={addDraftSlide}>新增页面</button>
                          </div>
                          <div className="project-review-list">
                            {draftSlides.map((slide, index) => (
                              <div className="project-review-item" key={index}>
                                <div className="project-review-item__head">
                                  <strong>第 {index + 1} 页</strong>
                                  <button className="btn btn-sm btn-danger" onClick={() => removeDraftSlide(index)} disabled={draftSlides.length <= 1}>删除</button>
                                </div>
                                <input className="input" value={slide.title || ""} onChange={(e) => updateDraftSlide(index, { title: e.target.value })} placeholder="页面标题" />
                                <textarea className="input textarea project-review-textarea" value={slide.purpose || ""} onChange={(e) => updateDraftSlide(index, { purpose: e.target.value })} placeholder="这一页要说明什么、希望听众理解什么" />
                              </div>
                            ))}
                            {draftSlides.length === 0 && <div className="empty-note">还没有可确认的大纲。请先关闭弹窗，点击项目卡片的“继续/重试”生成大纲。</div>}
                          </div>
                          <div className="project-review-actions">
                            <button className="btn" onClick={() => saveReview("outline").catch(setError)} disabled={!!reviewBusy || draftSlides.length === 0}>{reviewBusy === "outline-save" ? "保存中..." : "保存修改"}</button>
                            <button className="btn btn-primary" onClick={() => confirmReview("outline").catch(setError)} disabled={!!reviewBusy || draftSlides.length === 0}>{reviewBusy === "outline" ? "确认中..." : "确认并进入设计生成"}</button>
                          </div>
                        </div>
                      )}
                      {selectedProject?.status === "design_ready" && (
                        <div className="project-review-panel">
                          <div className="section-title">设计编辑与确认</div>
                          <p>请检查并编辑版式方向、品牌色、字体和页面类型匹配。确认后项目会进入 PPTX 生成与导出阶段。</p>
                          <div className="project-design-fields">
                            <div className="form-row"><div className="form-label-title">主色 <span>影响标题、重点数字和关键装饰</span></div><input className="input" value={draftSpecLock?.theme?.primary_color || ""} onChange={(e) => updateTheme("primary_color", e.target.value)} placeholder="#e84d2a" /></div>
                            <div className="form-row"><div className="form-label-title">辅助色 <span>用于次级强调和背景层次</span></div><input className="input" value={draftSpecLock?.theme?.secondary_color || ""} onChange={(e) => updateTheme("secondary_color", e.target.value)} placeholder="#f97316" /></div>
                            <div className="form-row"><div className="form-label-title">强调色 <span>用于图表高亮和提示信息</span></div><input className="input" value={draftSpecLock?.theme?.accent_color || ""} onChange={(e) => updateTheme("accent_color", e.target.value)} placeholder="#0f172a" /></div>
                            <div className="form-row"><div className="form-label-title">标题字体 <span>影响每页标题和章节标题</span></div><input className="input" value={draftSpecLock?.theme?.font_heading || ""} onChange={(e) => updateTheme("font_heading", e.target.value)} placeholder="Microsoft YaHei" /></div>
                            <div className="form-row"><div className="form-label-title">正文字体 <span>影响正文、备注和图表说明</span></div><input className="input" value={draftSpecLock?.theme?.font_body || ""} onChange={(e) => updateTheme("font_body", e.target.value)} placeholder="Microsoft YaHei" /></div>
                          </div>
                          <div className="project-design-preview">
                            {draftDesign ? <textarea className="input textarea project-design-editor" value={draftDesign} onChange={(e) => setDraftDesign(e.target.value)} /> : <div className="empty-note">还没有可确认的设计方案。请先关闭弹窗，点击项目卡片的“继续/重试”生成设计。</div>}
                          </div>
                          <div className="project-review-actions">
                            <button className="btn" onClick={() => saveReview("design").catch(setError)} disabled={!!reviewBusy || !draftDesign}>{reviewBusy === "design-save" ? "保存中..." : "保存修改"}</button>
                            <button className="btn btn-primary" onClick={() => confirmReview("design").catch(setError)} disabled={!!reviewBusy || !draftDesign}>{reviewBusy === "design" ? "确认中..." : "确认并生成 PPTX"}</button>
                          </div>
                        </div>
                      )}
                      {["outline_confirmed", "design_confirmed", "ready", "failed", "cancelled"].includes(selectedProject?.status) && (
                        <div className={"project-next-panel " + (selectedProject?.status === "ready" ? "is-ready" : selectedProject?.status === "failed" ? "is-failed" : "")}>
                          <div>
                            <strong>{selectedProject?.status === "ready" ? "项目已完成" : selectedProject?.status === "failed" ? "项目生成失败" : selectedProject?.status === "cancelled" ? "项目已取消" : "下一步操作"}</strong>
                            <p>{selectedProject?.status === "ready" ? "PPTX 已生成，可以前往导出页下载文件。" : selectedProject?.status === "failed" ? "流程执行失败，可以重新生成；如果多次失败，请查看原始项目 JSON 或错误提示。" : selectedProject?.status === "outline_confirmed" ? "大纲已确认，下一步会生成设计方案并等待你确认。" : selectedProject?.status === "design_confirmed" ? "设计已确认，下一步会生成 PPTX 并进入导出阶段。" : "该项目已取消，不会继续推进。"}</p>
                          </div>
                          <div className="project-next-panel__actions">
                            {selectedProject?.status === "ready" && <button className="btn btn-primary" onClick={() => { setDetailOpen(false); onNavigate("Exports"); }}>去导出页下载</button>}
                            {selectedProject?.status === "failed" && <button className="btn btn-primary" onClick={() => retry(selectedProject.id).catch(setError)} disabled={!!runningProjectId}>重新生成</button>}
                            {selectedProject?.status === "outline_confirmed" && <button className="btn btn-primary" onClick={() => retry(selectedProject.id).catch(setError)} disabled={!!runningProjectId}>生成设计方案</button>}
                            {selectedProject?.status === "design_confirmed" && <button className="btn btn-primary" onClick={() => retry(selectedProject.id).catch(setError)} disabled={!!runningProjectId}>生成 PPTX</button>}
                          </div>
                        </div>
                      )}
                      {projectErrors[selectedProject?.id] && <div className="project-card__error">操作失败：{projectErrors[selectedProject.id]}</div>}
                      <details className="template-raw"><summary>查看原始项目 JSON</summary><JsonBlock value={detail} /></details>
                    </div>
                  </div>
                </div>
              </div>
            )}
            <DeleteAssetConfirmModal target={deleteTarget} onClose={() => setDeleteTarget(null)} onConfirm={() => remove(deleteTarget.id).catch(setError)} />
          </div>
        );
      }

      const TABLE_EXTS = ["csv", "tsv", "xlsx"];
      const SOURCE_EXTS = ["md", "markdown", "txt", "pdf", "docx", "pptx"];
      function fileExt(name) {
        const idx = String(name || "").lastIndexOf(".");
        return idx >= 0 ? name.slice(idx + 1).toLowerCase() : "";
      }
      function isTableFile(name) { return TABLE_EXTS.includes(fileExt(name)); }
      function materialBucket(item) {
        if (item.assetType === "dataset") {
          return item.status === "profiled" ? "processed" : "pending";
        }
        return item.status === "parsed" ? "processed" : "pending";
      }
      function bucketLabel(bucket) {
        return bucket === "processed" ? "已处理" : "待处理";
      }
      function typeLabel(item) {
        return item.assetType === "dataset" ? "表格数据" : "参考资料";
      }
      function buildMaterials(sources, datasets) {
        const items = [];
        for (const dataset of datasets) {
          items.push({
            assetType: "dataset",
            id: dataset.id,
            name: dataset.name,
            kind: dataset.metadata?.kind || "table",
            status: dataset.status,
            collection: dataset.metadata?.collection || dataset.name || "未分组",
            path: dataset.original_path,
            updatedAt: dataset.updated_at || dataset.created_at,
            raw: dataset,
          });
        }
        for (const source of sources) {
          items.push({
            assetType: "source",
            id: source.id,
            name: source.filename,
            kind: source.kind,
            status: source.status,
            collection: source.metadata?.collection || "未分组",
            path: source.path,
            updatedAt: source.updated_at || source.created_at,
            raw: source,
          });
        }
        return items;
      }

      function MaterialsTab({ setError, refreshData, sources, datasets }) {
        const [collectionName, setCollectionName] = useState("");
        const [pendingFiles, setPendingFiles] = useState([]);
        const [uploading, setUploading] = useState(false);
        const [processAfterUpload, setProcessAfterUpload] = useState(false);
        const [uploadPhase, setUploadPhase] = useState("");
        const [selected, setSelected] = useState({});
        const [statusFilter, setStatusFilter] = useState("all");
        const [typeFilter, setTypeFilter] = useState("all");
        const [expandedCollections, setExpandedCollections] = useState({});
        const [analysisModal, setAnalysisModal] = useState(null);
        const [parseModal, setParseModal] = useState(null);
        const [deleteTarget, setDeleteTarget] = useState(null);
        const materials = buildMaterials(sources, datasets);
        async function registerUploadedAsDataset(uploadedSource) {
          const uploadedPath = uploadedSource?.path || "";
          if (!uploadedPath) return null;
          const name = collectionName.trim();
          return await request("/datasets", {
            method: "POST",
            body: { path: uploadedPath, name: uploadedSource.filename || name, collection_name: name },
          });
        }
        async function processMaterial(item, options = {}) {
          const showResult = options.showResult !== false;
          setError(null);
          if (item.assetType === "dataset") {
            const data = await request(`/datasets/${item.id}/profile`, { method: "POST" });
            if (showResult) setAnalysisModal(data);
          } else {
            const data = await request(`/sources/${item.id}/parse`, { method: "POST" });
            if (showResult) setParseModal({ source: item.raw, parsed: data?.parsed });
          }
          refreshData();
        }
        async function confirmUpload() {
          setError(null);
          if (!collectionName.trim()) throw new Error("请先填写素材集名称，再上传文件。");
          if (!pendingFiles.length) throw new Error("请先选择要上传的素材文件。");
          setUploading(true);
          setUploadPhase("上传素材中...");
          try {
            const uploadedMaterials = [];
            for (const file of pendingFiles) {
              const uploaded = await uploadFile(file, "", { collection_name: collectionName.trim() });
              if (isTableFile(uploaded?.source?.filename || file.name)) {
                const created = await registerUploadedAsDataset(uploaded.source);
                if (created?.dataset) {
                  uploadedMaterials.push({ assetType: "dataset", id: created.dataset.id, raw: created.dataset });
                }
              } else if (uploaded?.source) {
                uploadedMaterials.push({ assetType: "source", id: uploaded.source.id, raw: uploaded.source });
              }
            }
            if (processAfterUpload && uploadedMaterials.length > 0) {
              setUploadPhase("同步处理中，请稍候...");
              for (const item of uploadedMaterials) {
                await processMaterial(item, { showResult: false });
              }
            }
            setPendingFiles([]);
            refreshData();
          } finally {
            setUploadPhase("");
            setUploading(false);
          }
        }
        const visibleMaterials = materials.filter((item) => {
          if (statusFilter !== "all" && materialBucket(item) !== statusFilter) return false;
          if (typeFilter !== "all" && item.assetType !== typeFilter) return false;
          return true;
        });
        const groupedCollections = visibleMaterials.reduce((acc, item) => {
          const key = item.collection || "未分组";
          acc[key] = acc[key] || [];
          acc[key].push(item);
          return acc;
        }, {});
        const selectedIds = Object.entries(selected).filter(([, value]) => value).map(([id]) => id);
        function toggleSelected(id) { setSelected((prev) => ({ ...prev, [id]: !prev[id] })); }
        function toggleCollection(name) { setExpandedCollections((prev) => ({ ...prev, [name]: prev[name] === false })); }
        function selectCollection(items) {
          setSelected(items.reduce((acc, item) => ({ ...acc, [item.id]: true }), {}));
        }
        async function processSelected() {
          for (const id of selectedIds) {
            const item = materials.find((entry) => entry.id === id);
            if (item) await processMaterial(item);
          }
          setSelected({});
        }
        async function processCollection(name) {
          setError(null);
          const group = materials.filter((item) => (item.collection || "未分组") === name);
          for (const item of group) await processMaterial(item);
          setSelected({});
        }
        async function viewResult(item) {
          setError(null);
          if (item.assetType === "dataset") {
            if (item.status === "profiled") {
              setAnalysisModal(await request(`/datasets/${item.id}/analysis`));
            } else {
              setAnalysisModal({ dataset: item.raw });
            }
          } else if (item.status === "parsed") {
            setParseModal({ source: item.raw, parsed: item.raw.metadata?.parsed });
          }
        }
        async function confirmDelete(deleteFiles) {
          if (!deleteTarget) return;
          setError(null);
          const targets = deleteTarget.targets || [{ id: deleteTarget.id, assetType: deleteTarget.assetType }];
          for (const entry of targets) {
            const endpoint = entry.assetType === "dataset" ? "datasets" : "sources";
            await request(`/${endpoint}/${entry.id}`, { method: "DELETE", body: { delete_files: deleteFiles } });
          }
          setDeleteTarget(null);
          setSelected((prev) => {
            const next = { ...prev };
            targets.forEach(({ id }) => { delete next[id]; });
            return next;
          });
          refreshData();
        }
        const stats = {
          total: materials.length,
          processed: materials.filter((item) => materialBucket(item) === "processed").length,
          pending: materials.filter((item) => materialBucket(item) === "pending").length,
          tables: materials.filter((item) => item.assetType === "dataset").length,
          docs: materials.filter((item) => item.assetType === "source").length,
        };
        return (
          <div className="asset-workspace">
            <div className="asset-toolbar card">
              <div>
                <div className="label">素材库</div>
                <p>资料和表格统一在这里管理：上传 CSV/XLSX 自动建数据集做体检分析；上传 Markdown/PDF/DOCX/PPTX 自动登记并支持解析。</p>
              </div>
              <div className="asset-stats">
                <span>全部 <strong>{stats.total}</strong></span>
                <span>已处理 <strong>{stats.processed}</strong></span>
                <span>待处理 <strong>{stats.pending}</strong></span>
                <span>表格 <strong>{stats.tables}</strong></span>
                <span>资料 <strong>{stats.docs}</strong></span>
              </div>
            </div>
            <div className="asset-grid-layout">
              <div className="asset-sidebar asset-sidebar--upload card">
                <div className="form-row">
                  <div className="field-title">素材集名称（必填）</div>
                  <input className="input" value={collectionName} onChange={(e) => setCollectionName(e.target.value)} placeholder="例如：2026Q2 销售汇报素材" />
                </div>
                <div className="field-title">上传素材文件</div>
                <FileUploadZone multiple manual accept=".md,.markdown,.txt,.pdf,.docx,.pptx,.csv,.tsv,.xlsx" disabled={!collectionName.trim() || uploading} onFilesSelected={(files) => setPendingFiles((prev) => [...prev, ...files])} hint="先填写素材集名称，再选择一个或多个文件；CSV/XLSX 会建数据集，资料类只登记不分析。" />
                <label className="upload-process-option">
                  <input type="checkbox" checked={processAfterUpload} onChange={(e) => setProcessAfterUpload(e.target.checked)} disabled={uploading} />
                  <span>
                    <strong>上传后同步处理素材</strong>
                    <small>表格需要分析、资料需要解析后才方便用于生成。勾选后会等处理完成再结束上传，结果请到右侧素材管理卡片查看。</small>
                  </span>
                </label>
                <div className="pending-upload">
                  <div className="pending-upload__head">
                    <span>{pendingFiles.length ? `待上传文件（${pendingFiles.length}）` : "待上传文件预览"}</span>
                    {pendingFiles.length > 0 && (
                      <span className="pending-upload__hint">点击 × 可移除单个文件</span>
                    )}
                  </div>
                  {pendingFiles.length === 0 ? (
                    <div className="pending-upload__empty">
                      还没有选择文件。<br />从上方"点击上传素材"挑选文件，预览会显示在这里。
                    </div>
                  ) : (
                    <div className="pending-upload__list">
                      {pendingFiles.map((file, index) => (
                        <div className="pending-upload__item" key={`${file.name}-${index}`}>
                          <span className={"pending-upload__item-icon " + (isTableFile(file.name) ? "is-table" : "is-doc")}>{isTableFile(file.name) ? "表" : "文"}</span>
                          <span className="pending-upload__item-name" title={file.name}>{file.name}</span>
                          <span className="pending-upload__item-size">{(file.size / 1024).toFixed(1)} KB</span>
                          <button className="pending-upload__item-remove" onClick={() => setPendingFiles((prev) => prev.filter((_, i) => i !== index))} title="移除该文件">×</button>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
                <button className="btn btn-primary btn-block" onClick={() => confirmUpload().catch(setError)} disabled={!collectionName.trim() || pendingFiles.length === 0 || uploading}>{uploading ? (uploadPhase || "上传中...") : "确认上传"}</button>
              </div>
              <div className="asset-main card">
                <div className="asset-main__head">
                  <strong className="section-title">素材管理</strong>
                  <span>{visibleMaterials.length} 个结果</span>
                </div>
                <div className="asset-main__controls">
                  <div className="asset-filter">
                    <span className="asset-filter__label">状态</span>
                    <button className={statusFilter === "all" ? "active" : ""} onClick={() => setStatusFilter("all")}>全部</button>
                    <button className={statusFilter === "pending" ? "active" : ""} onClick={() => setStatusFilter("pending")}>待处理</button>
                    <button className={statusFilter === "processed" ? "active" : ""} onClick={() => setStatusFilter("processed")}>已处理</button>
                  </div>
                  <div className="asset-filter">
                    <span className="asset-filter__label">类型</span>
                    <button className={typeFilter === "all" ? "active" : ""} onClick={() => setTypeFilter("all")}>全部</button>
                    <button className={typeFilter === "source" ? "active" : ""} onClick={() => setTypeFilter("source")}>资料</button>
                    <button className={typeFilter === "dataset" ? "active" : ""} onClick={() => setTypeFilter("dataset")}>表格</button>
                  </div>
                  <button className="btn btn-primary" onClick={() => processSelected().catch(setError)} disabled={selectedIds.length === 0}>处理选中素材 ({selectedIds.length})</button>
                </div>
                <div className="collection-accordion">
                  {Object.entries(groupedCollections).map(([name, items]) => {
                    const processedCount = items.filter((item) => materialBucket(item) === "processed").length;
                    const open = expandedCollections[name] !== false;
                    return (
                      <section className="collection-panel" key={name}>
                        <div className="collection-panel__head" onClick={() => toggleCollection(name)} role="button" tabIndex="0">
                          <div>
                            <strong>{open ? "▾" : "▸"} {name}</strong>
                            <span>{items.length} 个素材 · 已处理 {processedCount} · 待处理 {items.length - processedCount}</span>
                          </div>
                          <div className="collection-panel__actions" onClick={(e) => e.stopPropagation()}>
                            <button className="btn btn-sm" onClick={() => selectCollection(items)}>选择整组</button>
                            <button className="btn btn-sm btn-primary" onClick={() => processCollection(name).catch(setError)}>整组处理</button>
                            <button className="btn btn-sm btn-danger" onClick={() => setDeleteTarget({ name: `素材集：${name}`, ids: items.map((item) => item.id), targets: items.map((item) => ({ id: item.id, assetType: item.assetType })) })}>删除文件夹</button>
                          </div>
                        </div>
                        {open && (
                          <div className="dataset-grid">
                            {items.map((item) => (
                              <div className={"dataset-card material-card " + (selected[item.id] ? "selected " : "") + (item.assetType === "dataset" ? "is-table" : "is-doc")} key={item.id}>
                                <label className="dataset-card__check">
                                  <input type="checkbox" checked={!!selected[item.id]} onChange={() => toggleSelected(item.id)} />
                                  <span className={"material-badge " + (materialBucket(item) === "processed" ? "is-processed" : "is-pending")}>{bucketLabel(materialBucket(item))}</span>
                                </label>
                                <div className="material-card__type">
                                  <span className={"material-type-tag " + (item.assetType === "dataset" ? "is-table" : "is-doc")}>{typeLabel(item)}</span>
                                  <span className="material-kind">{item.kind || "unknown"}</span>
                                </div>
                                <strong>{item.name}</strong>
                                <span className="material-card__sub">{shortId(item.id)}</span>
                                <code title={item.path}>{item.path}</code>
                                <div className="dataset-card__actions">
                                  <button className="btn btn-sm btn-primary" onClick={() => processMaterial(item).catch(setError)}>{item.assetType === "dataset" ? "分析" : "解析"}</button>
                                  <button className="btn btn-sm" onClick={() => viewResult(item).catch(setError)} disabled={materialBucket(item) !== "processed"}>查看结果</button>
                                  <button className="btn btn-sm btn-danger" onClick={() => setDeleteTarget({ id: item.id, name: item.name, assetType: item.assetType })}>删除</button>
                                </div>
                              </div>
                            ))}
                          </div>
                        )}
                      </section>
                    );
                  })}
                  {visibleMaterials.length === 0 && <div className="empty-note">暂无符合条件的素材。左侧命名素材集并上传文件后，会按文件夹显示在这里。</div>}
                </div>
              </div>
            </div>
            <AnalysisModal dataset={analysisModal} onClose={() => setAnalysisModal(null)} />
            <SourceParsedModal payload={parseModal} onClose={() => setParseModal(null)} />
            <DeleteAssetConfirmModal target={deleteTarget} onClose={() => setDeleteTarget(null)} onConfirm={(deleteFiles) => confirmDelete(deleteFiles).catch(setError)} />
          </div>
        );
      }

      function SourceParsedModal({ payload, onClose }) {
        if (!payload || !payload.source) return null;
        const source = payload.source;
        const parsed = payload.parsed || source.metadata?.parsed || null;
        return (
          <div className="modal-mask" onClick={onClose}>
            <div className="modal-card analysis-modal" onClick={(e) => e.stopPropagation()}>
              <div className="analysis-modal__head">
                <div>
                  <strong>资料解析结果</strong>
                  <span>{source.filename || source.id}</span>
                </div>
                <button className="btn btn-sm" onClick={onClose}>关闭</button>
              </div>
              <div className="analysis-modal__body">
                {parsed ? (
                  <div className="parse-summary">
                    <div className="parse-summary__row"><span className="parse-summary__key">标题</span><span>{parsed.title || "（未提取到标题）"}</span></div>
                    <div className="parse-summary__row"><span className="parse-summary__key">类型</span><span>{parsed.kind || source.kind}</span></div>
                    <div className="parse-summary__row"><span className="parse-summary__key">字符数</span><span>{parsed.text_length ?? (parsed.text ? parsed.text.length : 0)}</span></div>
                    <div className="parse-summary__preview">
                      <div className="parse-summary__key">正文预览</div>
                      <pre>{(parsed.text_preview || parsed.text || "（无文字内容）").slice(0, 1500)}</pre>
                    </div>
                    <details style={{marginTop: 12}}>
                      <summary className="text-xs text-muted">查看原始 JSON</summary>
                      <JsonBlock value={parsed} />
                    </details>
                  </div>
                ) : (
                  <div className="empty-note">该资料还没有解析结果，可在卡片点击"解析"。</div>
                )}
              </div>
            </div>
          </div>
        );
      }

      function TemplateDiagnosticSummary({ diagnosis, template }) {
        const profile = diagnosis?.template_profile || null;
        const brand = diagnosis?.brand_tokens || null;
        const layoutMap = diagnosis?.layout_map || null;
        const layoutEntries = Object.entries(layoutMap || {});
        const matchedLayouts = layoutEntries.filter(([, value]) => value?.source === "pptx").length;
        const slideSize = profile?.slide_size;
        const warnings = profile?.warnings || [];
        if (!template) return <div className="empty-note">选择或上传一个企业模板后，这里会展示诊断摘要。</div>;
        if (!profile) {
          return (
            <div className="template-summary template-summary--empty">
              <div className="template-summary__hero">
                <strong>{template.name || "企业模板"}</strong>
                <span>还没有诊断结果</span>
                <p>点击“诊断模板”，系统会读取 PPTX 的页面尺寸、品牌色、字体和版式，并判断哪些页面类型可以直接套用模板。</p>
              </div>
            </div>
          );
        }
        return (
          <div className="template-summary">
            <div className="template-summary__hero">
              <strong>{template.name || profile.name || "企业模板"}</strong>
              <span>{matchedLayouts} / {layoutEntries.length || 0} 个页面类型命中模板版式</span>
              <p>诊断结果会用于生成阶段：品牌色和字体决定视觉风格，版式映射决定封面、章节页、内容页等页面如何套用模板。</p>
            </div>
            <div className="template-summary__grid">
              <div className="template-summary__card"><span>页面尺寸</span><strong>{slideSize ? `${slideSize.width} × ${slideSize.height} ${slideSize.unit || ""}` : "默认宽屏"}</strong><p>{slideSize?.source === "default" ? "未读取到尺寸，使用默认 16:9 宽屏。" : "已从模板文件读取页面尺寸。"}</p></div>
              <div className="template-summary__card"><span>品牌色</span><div className="template-color-row">{(profile.detected_colors || []).slice(0, 5).map((color) => <i key={color} style={{background: `#${color}`}} title={`#${color}`} />)}{!(profile.detected_colors || []).length && <em>未检测到，使用默认色</em>}</div>{brand && <p>主色 {brand.primary_color}，强调色 {brand.accent_color}</p>}</div>
              <div className="template-summary__card"><span>字体</span><strong>{(profile.detected_fonts || []).slice(0, 2).join(" / ") || "使用默认字体"}</strong>{brand && <p>标题 {brand.font_heading}，正文 {brand.font_body}</p>}</div>
              <div className="template-summary__card"><span>模板版式</span><strong>{profile.layout_count || 0} 个</strong><p>已识别模板中的可用 layout（版式，即 PPT 母版里的页面布局）。</p></div>
            </div>
            <div className="template-layout-map">
              <div className="template-layout-map__head">页面类型匹配情况</div>
              <div className="template-layout-map__items">
                {layoutEntries.map(([key, value]) => (
                  <div className={"template-layout-chip " + (value?.source === "pptx" ? "matched" : "fallback")} key={key}>
                    <strong>{key}</strong><span>{value?.pptx_layout || value?.fallback || "内置兜底"}</span><em>{value?.source === "pptx" ? "使用模板" : "使用内置兜底"}</em>
                  </div>
                ))}
              </div>
            </div>
            {warnings.length > 0 && <div className="template-warning"><strong>使用前提醒</strong>{warnings.map((item) => <span key={item}>{item}</span>)}</div>}
            <details className="template-raw"><summary>查看原始诊断 JSON</summary><JsonBlock value={diagnosis} /></details>
          </div>
        );
      }

      function TemplateDiagnosisModal({ diagnosis, template, onClose }) {
        if (!diagnosis && !template) return null;
        return (
          <div className="modal-mask" onClick={onClose}>
            <div className="modal-card template-diagnosis-modal" onClick={(e) => e.stopPropagation()}>
              <div className="analysis-modal__head">
                <div>
                  <strong>模板诊断结果</strong>
                  <span>{template?.name || diagnosis?.template?.name || "企业模板"}</span>
                </div>
                <button className="btn btn-sm" onClick={onClose}>关闭</button>
              </div>
              <div className="analysis-modal__body">
                <TemplateDiagnosticSummary diagnosis={diagnosis} template={template || diagnosis?.template} />
              </div>
            </div>
          </div>
        );
      }

      function TemplatesTab({ setError, refreshData, templates }) {
        const [path, setPath] = useState("");
        const [templateName, setTemplateName] = useState("");
        const [pendingTemplateFile, setPendingTemplateFile] = useState(null);
        const [uploadingTemplate, setUploadingTemplate] = useState(false);
        const [diagnoseAfterUpload, setDiagnoseAfterUpload] = useState(false);
        const [templateUploadPhase, setTemplateUploadPhase] = useState("");
        const [template, setTemplate] = useState(null);
        const [diagnosis, setDiagnosis] = useState(null);
        const [diagnosisModal, setDiagnosisModal] = useState(null);
        const [deleteTarget, setDeleteTarget] = useState(null);
        const selectedTemplate = template?.template || template;
        async function upload() {
          setError(null);
          const name = templateName.trim();
          if (!name) throw new Error("请先填写模板名称，再上传或登记模板。");
          if (!pendingTemplateFile && !path.trim()) throw new Error("请先选择 PPTX 模板文件，或填写本地模板路径。");
          setUploadingTemplate(true);
          setTemplateUploadPhase("上传模板中...");
          try {
            let templatePath = path.trim();
            if (pendingTemplateFile) {
              const uploaded = await uploadFile(pendingTemplateFile, "", { collection_name: name });
              templatePath = uploaded?.source?.path || "";
            }
            const data = await request("/templates/upload", { method: "POST", body: { path: templatePath, name } });
            setTemplate(data);
            setDiagnosis(null);
            if (diagnoseAfterUpload && data?.template?.id) {
              setTemplateUploadPhase("同步诊断中，请稍候...");
              const diagnosed = await request(`/templates/${data.template.id}/diagnose`, { method: "POST" });
              setTemplate(diagnosed);
              setDiagnosis(diagnosed);
              setDiagnosisModal(diagnosed);
            }
            setPendingTemplateFile(null);
            setPath("");
            refreshData();
          } finally {
            setTemplateUploadPhase("");
            setUploadingTemplate(false);
          }
        }
        async function diagnoseTemplate(item = selectedTemplate) {
          if (!item?.id) return;
          setError(null);
          const data = await request(`/templates/${item.id}/diagnose`, { method: "POST" });
          setTemplate(data);
          setDiagnosis(data);
          setDiagnosisModal(data);
          refreshData();
        }
        function handleTemplateSelected(files) {
          const file = files?.[0];
          if (!file) return;
          setPendingTemplateFile(file);
          if (!templateName.trim()) setTemplateName(file.name.replace(/\.pptx$/i, ""));
        }
        async function viewDiagnosis(item) {
          setError(null);
          setTemplate({ template: item });
          if (item.status === "diagnosed") {
            const data = await request(`/templates/${item.id}/diagnosis`);
            setDiagnosis(data);
            setDiagnosisModal(data);
          } else {
            setDiagnosis(null);
            setDiagnosisModal({ template: item });
          }
        }
        async function selectTemplate(item) {
          setError(null);
          setPath(item.original_path || "");
          setTemplate({ template: item });
          setDiagnosis(item.status === "diagnosed" ? await request(`/templates/${item.id}/diagnosis`) : null);
        }
        async function confirmDelete(deleteFiles) {
          if (!deleteTarget) return;
          setError(null);
          await request(`/templates/${deleteTarget.id}`, { method: "DELETE", body: { delete_files: deleteFiles } });
          setDeleteTarget(null);
          setTemplate(null);
          setDiagnosis(null);
          refreshData();
        }
        const diagnosedCount = templates.filter((item) => item.status === "diagnosed").length;
        return (
          <div className="asset-workspace template-workspace">
            <div className="asset-toolbar card">
              <div><div className="label">模板库</div><p>企业 PPTX 模板在这里上传和诊断。诊断会提取品牌色、字体、页面尺寸和版式映射，供创建页绑定使用。</p></div>
              <div className="asset-stats"><span>全部 <strong>{templates.length}</strong></span><span>已诊断 <strong>{diagnosedCount}</strong></span><span>待诊断 <strong>{templates.length - diagnosedCount}</strong></span></div>
            </div>
            <div className="asset-grid-layout">
              <div className="asset-sidebar asset-sidebar--upload card">
                <div className="form-row">
                  <div className="field-title">模板名称（必填）</div>
                  <input className="input" value={templateName} onChange={(e) => setTemplateName(e.target.value)} placeholder="例如：集团品牌汇报模板" />
                </div>
                <div className="field-title">上传企业模板</div>
                <FileUploadZone accept=".pptx" manual disabled={!templateName.trim() || uploadingTemplate} onFilesSelected={handleTemplateSelected} hint="先填写模板名称，再选择一个 PPTX 文件；上传后会登记为可管理的企业模板。" />
                <label className="upload-process-option">
                  <input type="checkbox" checked={diagnoseAfterUpload} onChange={(e) => setDiagnoseAfterUpload(e.target.checked)} disabled={uploadingTemplate} />
                  <span>
                    <strong>上传后同步诊断模板</strong>
                    <small>诊断完成后才结束上传；结果会在弹窗中展示，并可在右侧模板管理卡片再次查看。</small>
                  </span>
                </label>
                <div className="pending-upload template-pending-upload">
                  <div className="pending-upload__head">
                    <span>{pendingTemplateFile ? "待上传模板" : "待上传文件预览"}</span>
                    {pendingTemplateFile && <span className="pending-upload__hint">点击 × 可移除文件</span>}
                  </div>
                  {pendingTemplateFile ? (
                    <div className="pending-upload__list">
                      <div className="pending-upload__item">
                        <span className="pending-upload__item-icon is-template">PPTX</span>
                        <span className="pending-upload__item-name" title={pendingTemplateFile.name}>{pendingTemplateFile.name}</span>
                        <span className="pending-upload__item-size">{(pendingTemplateFile.size / 1024).toFixed(1)} KB</span>

      function ExportsTab({ projects, refreshProjects, setError }) {

        const [selectedExport, setSelectedExport] = useState(exports[0] || null);
        const [downloadingId, setDownloadingId] = useState("");
        const [downloadError, setDownloadError] = useState("");
        const [openStatus, setOpenStatus] = useState("");
        const [deleteTarget, setDeleteTarget] = useState(null);
        const exportTime = (item) => item?.created_at ? new Date(item.created_at * 1000).toLocaleString() : "暂无生成时间";
        useEffect(() => {
          if (!selectedExport && exports.length) setSelectedExport(exports[0]);
          if (selectedExport && !exports.some((item) => item.id === selectedExport.id)) setSelectedExport(exports[0] || null);
        }, [exports.length]);
        async function downloadExport(item) {
          if (!item?.id) return;
          setDownloadError("");
          setDownloadingId(item.id);
          try {
            const iframe = document.createElement("iframe");
            iframe.style.display = "none";
            iframe.src = `${PLUGIN_BASE}/exports/${item.id}/download`;
            document.body.appendChild(iframe);
            window.setTimeout(() => {
              iframe.remove();
              setDownloadingId("");
            }, 3000);
          } catch (err) {
            setDownloadError(`下载触发失败：${String(err.message || err)}。可以点击“打开文件位置”查看导出文件。`);
            setDownloadingId("");
          }
        }
        async function openExportFolder(item) {
          if (!item?.id) return;
          setDownloadError("");
          setOpenStatus("正在打开导出目录...");
          try {
            const data = await request(`/exports/${item.id}/open-folder`, { method: "POST" });
            setOpenStatus(`已打开导出目录：${data.file || "导出文件"}`);
          } catch (err) {
            setOpenStatus("");
            setDownloadError(`打开导出目录失败：${String(err.message || err)}。请根据下方路径手动打开文件。`);
          }
        }
        async function confirmDeleteExport(deleteFiles) {
          if (!deleteTarget?.id) return;
          setDownloadError("");
          await request(`/exports/${deleteTarget.id}`, { method: "DELETE", body: { delete_files: deleteFiles } });
          setDeleteTarget(null);
          setSelectedExport(null);
          await refreshProjects({ local: true });
        }
        return (
          <div className="asset-workspace export-workspace">
            <div className="asset-toolbar card">
              <div><div className="label">导出文件</div><p>项目生成完成后会在这里形成 PPTX 导出记录。选择一个文件可查看来源项目、文件信息并下载。</p></div>
              <div className="asset-stats"><span>全部 <strong>{exports.length}</strong></span><span>PPTX <strong>{exports.filter((item) => (item.kind || "pptx") === "pptx").length}</strong></span></div>
            </div>
            <div className="asset-grid-layout export-grid-layout">
              <div className="asset-main card">
                <div className="asset-main__head"><strong className="section-title">导出列表</strong><span>{exports.length} 个文件</span></div>
                <div className="export-card-grid">
                  {exports.map((e) => (
                    <div className={"export-card " + (selectedExport?.id === e.id ? "selected" : "")} key={e.id} onClick={() => setSelectedExport(e)}>
                      <div className="export-card__icon">PPTX</div>
                      <div className="export-card__main">
                        <strong>{e.project_title || "未命名项目"}</strong>
                        <span>{e.kind || "pptx"} · {shortId(e.id)} · {exportTime(e)}</span>
                        <code title={e.path}>{e.path || "导出路径待返回"}</code>
                      </div>
                    </div>
                  ))}
                  {exports.length === 0 && <div className="empty-note">暂无导出文件。项目状态 ready 后，会在这里出现可下载的 PPTX。</div>}
                </div>
              </div>
              <div className="asset-sidebar export-detail-panel card">
                <div className="section-title">文件预览</div>
                {selectedExport ? (
                  <div className="export-detail">
                    <div className="export-detail__hero">
                      <span>PPTX</span>
                      <strong>{selectedExport.project_title || "导出文件"}</strong>
                      <p>这是可编辑的 PowerPoint 文件，可下载后继续在 PowerPoint 中修改。</p>
                    </div>
                    <div className="project-detail__grid">
                      <div><span>导出 ID</span><strong>{shortId(selectedExport.id)}</strong></div>
                      <div><span>类型</span><strong>{selectedExport.kind || "pptx"}</strong></div>
                      <div><span>来源项目</span><strong>{selectedExport.project_title || "-"}</strong></div>
                      <div><span>状态</span><strong>可下载</strong></div>
                      <div><span>生成时间</span><strong>{exportTime(selectedExport)}</strong></div>
                    </div>
                    <code className="export-detail__path">{selectedExport.path || "未返回路径"}</code>
                    {openStatus && <div className="create-next-tip">{openStatus}</div>}
                    {downloadError && <div className="project-card__error">{downloadError}</div>}
                    <button className="btn btn-primary btn-block" onClick={() => downloadExport(selectedExport)} disabled={downloadingId === selectedExport.id}>{downloadingId === selectedExport.id ? "正在触发下载..." : "下载 PPTX"}</button>
                    <button className="btn btn-block" onClick={() => openExportFolder(selectedExport)}>打开文件位置</button>
                    <button className="btn btn-danger btn-block" onClick={() => setDeleteTarget({ id: selectedExport.id, name: selectedExport.project_title || selectedExport.id, title: "确认删除该导出文件？", targetTag: "目标导出", description: "默认只删除导出列表里的记录，不影响本地 PPTX 文件。删除后，这条导出记录不会再出现在导出列表中。", deleteFilesLabel: "同时删除本地 PPTX 文件", hint: "为避免误删，系统只会删除插件导出目录内的 PPTX 文件；外部路径会自动保留。" })}>删除导出记录</button>
                  </div>
                ) : <div className="empty-note">左侧选择一个导出文件后，这里会显示下载信息。</div>}
              </div>
            </div>
            <DeleteAssetConfirmModal target={deleteTarget} onClose={() => setDeleteTarget(null)} onConfirm={(deleteFiles) => confirmDeleteExport(deleteFiles).catch(setError)} />
          </div>
        );
      }

      function PythonDepCard({ dep, onInstall, onUninstall }) {

        const missingChecks = checks.filter((item) => !item.found);

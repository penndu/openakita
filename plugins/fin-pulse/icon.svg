<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Fin Pulse">
  <title>Fin Pulse</title>
  <defs>
    <!-- Neutral finance-desk background: deep navy → midnight slate → indigo.
         Keeps the icon readable at 16/32px without drowning the red candles
         in a pink wash. -->
    <linearGradient id="fp-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0B1220"/>
      <stop offset="55%"  stop-color="#121D33"/>
      <stop offset="100%" stop-color="#1C2541"/>
    </linearGradient>
    <linearGradient id="fp-red" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#FF8190"/>
      <stop offset="100%" stop-color="#D01F33"/>
    </linearGradient>
    <linearGradient id="fp-vol" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#FF6B7C" stop-opacity="0.70"/>
      <stop offset="100%" stop-color="#8A1625" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="fp-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#FFD2A8"/>
      <stop offset="100%" stop-color="#FFE9B5"/>
    </linearGradient>
    <filter id="fp-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.1" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded full-bleed background -->
  <rect x="0" y="0" width="64" height="64" rx="14" ry="14" fill="url(#fp-bg)"/>
  <rect x="0.5" y="0.5" width="63" height="63" rx="13.5" ry="13.5"
        fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>

  <!-- Dashed chart grid -->
  <g opacity="0.16" stroke="#9FB3D1" stroke-width="0.5" stroke-dasharray="1.6,2.2">
    <line x1="6" y1="16" x2="58" y2="16"/>
    <line x1="6" y1="30" x2="58" y2="30"/>
    <line x1="6" y1="44" x2="58" y2="44"/>
  </g>

  <!-- Y-axis tick dots -->
  <g opacity="0.45" fill="#BFD0EC">
    <circle cx="5.2" cy="16" r="0.7"/>
    <circle cx="5.2" cy="30" r="0.7"/>
    <circle cx="5.2" cy="44" r="0.7"/>
  </g>

  <!-- Volume bars along the baseline (five, climbing then peaking) -->
  <g fill="url(#fp-vol)">
    <rect x="10.5" y="52" width="5" height="6" rx="1"/>
    <rect x="19.5" y="50" width="5" height="8" rx="1"/>
    <rect x="29.5" y="49" width="5" height="9" rx="1"/>
    <rect x="39.5" y="47" width="5" height="11" rx="1"/>
    <rect x="48.5" y="46" width="5" height="12" rx="1"/>
  </g>

  <!-- Wick lines behind the candle bodies -->
  <g stroke="#FF8A96" stroke-width="1" stroke-linecap="round">
    <line x1="13" y1="32" x2="13" y2="48"/>
    <line x1="22" y1="24" x2="22" y2="42"/>
    <line x1="32" y1="17" x2="32" y2="36"/>
    <line x1="42" y1="12" x2="42" y2="32"/>
    <!-- The 5th candle: tallest wick, peak of the rally -->
    <line x1="51" y1="7"  x2="51" y2="32"/>
  </g>

  <!-- Five bullish candle bodies — the last one is the
       tallest, widest and most saturated (peak burst). -->
  <g fill="url(#fp-red)">
    <rect x="10.5" y="36" width="5" height="10" rx="1"/>
    <rect x="19.5" y="26" width="5" height="14" rx="1"/>
    <rect x="29.5" y="20" width="5" height="14" rx="1"/>
    <rect x="39.5" y="14" width="5" height="16" rx="1"/>
    <!-- Last candle: x-shift 0.5, width 6 (fatter), body 10→28 (tallest) -->
    <rect x="48" y="10" width="6" height="18" rx="1.2"/>
  </g>

  <!-- Warm trend line along candle body tops -->
  <path d="M13 41 L22 33 L32 27 L42 22 L51 14"
        fill="none" stroke="url(#fp-line)" stroke-width="1.8"
        stroke-linecap="round" stroke-linejoin="round"
        opacity="0.95" filter="url(#fp-glow)"/>

  <!-- Peak glow halo + bright marker -->
  <circle cx="51" cy="14" r="4.2" fill="none" stroke="#FFF1C2" stroke-width="0.7" opacity="0.55"/>
  <circle cx="51" cy="14" r="2.4" fill="#FFF1C2"/>

  <!-- Small up-right arrow, reinforcing the rally direction -->
  <g stroke="#FFBC74" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M52 10 L58 6"/>
    <path d="M58 6 L58 10 M58 6 L54 6"/>
  </g>
</svg>

<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fin Pulse · 财经脉动</title>
  <!--
    Self-contained plugin UI: bootstrap + shared UI Kit inlined under _assets/.
    fin-pulse shares the same UI Kit as avatar-studio / subtitle-craft — the
    five files below are the canonical 5-asset bundle, vendored from
    plugins-archive/_shared/web-uikit/ at build time. React / ReactDOM / Babel
    are loaded from unpkg; everything else is local.
  -->
  <script src="_assets/bootstrap.js"></script>
  <link rel="stylesheet" href="_assets/styles.css">
  <script src="_assets/icons.js"></script>
  <script src="_assets/i18n.js"></script>
  <script src="_assets/markdown-mini.js"></script>
  <link rel="preload" as="script" crossorigin href="https://unpkg.com/react@18/umd/react.production.min.js" />
  <link rel="preload" as="script" crossorigin href="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" />
  <link rel="preload" as="script" href="https://unpkg.com/@babel/standalone/babel.min.js" />
  <style>
    /* ── Theme tokens ──
       Clean white/black base; stock-market red accent (#D32F2F)
       for borders, tab underlines, icons, and button outlines. */
    :root {
      --bg: #FFFFFF; --bg-card: #FFFFFF; --bg-hover: #F7F8FA;
      --text: #1a1a1a; --text-muted: #5E3540; --text-dim: #7A4E59;
      --primary: #D32F2F; --primary-hover: #B71C1C;
      --primary-soft: #FFCDD2;
      --success: #16a34a; --warning: #f59e0b; --danger: #ef4444;
      --border: #CBD5E1; --border-strong: #D32F2F; --radius: 8px;
    }
    [data-theme="dark"] {
      --bg: #0f172a; --bg-card: #1e293b; --bg-hover: #334155;
      --text: #f1f5f9; --text-muted: #94a3b8; --text-dim: #64748b;
      --border: #475569; --border-strong: #EF5350;
      --primary: #EF5350; --primary-hover: #E53935; --primary-soft: #4a1a1a;
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --bg: #0f172a; --bg-card: #1e293b; --bg-hover: #334155;
        --text: #f1f5f9; --text-muted: #94a3b8; --text-dim: #64748b;
        --border: #475569; --border-strong: #EF5350;
      }
    }
    /* ── Reset + typography ── */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg); color: var(--text); line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    /* ── Layout shell ── */
    .app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 18px; border-bottom: 1px solid var(--border);
      background: var(--bg-card);
    }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .tabs {
      display: flex; gap: 4px; padding: 0 18px; border-bottom: 1px solid var(--border);
      background: var(--bg-card);
    }
    .tab {
      padding: 10px 14px; font-size: 13px; cursor: pointer;
      color: var(--text-muted); border-bottom: 2px solid transparent;
      display: inline-flex; align-items: center; gap: 6px;
      transition: color .15s;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 500; }
    .content { flex: 1; overflow: auto; padding: 18px 20px; background: var(--bg); display: flex; flex-direction: column; }
    .empty { color: var(--text-muted); font-size: 13px; padding: 32px 12px; text-align: center; }
    /* ── Split layout (left filter + right list) ── */
    .split-layout { display: flex; gap: 16px; height: 100%; }
    /* ── Stack layout (top filter bar + bottom content) ── */
    .stack-layout { display: flex; flex-direction: column; gap: 12px; flex: 1; min-height: 0; }
    .stack-layout > .card.grow { flex: 1 1 auto; display: flex; flex-direction: column; min-height: 0; }
    .stack-layout > .card.grow > .card-body { flex: 1; overflow: auto; }
    .stack-layout > .card--compact { flex: 0 0 auto; }
    /* ── Hero title (oa-hero-title) — big gradient brand mark ──
       Matches the avatar-studio hard contract: always explicit --text
       colour, weight 700, size 20px so the Chinese headline stays
       legible on the blush background (previous 18/600 inherited to
       a weak pink rendering on the macaron theme). */
    .oa-hero-title {
      display: inline-flex; align-items: center; gap: 12px;
      font-size: 20px; font-weight: 700; color: var(--text);
      letter-spacing: -0.01em; margin: 0;
    }
    .oa-hero-title__icon {
      width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0;
      /* Container bg is a neutral dark so any 1px SVG seam blends in;
         the inline SVG itself renders its full navy background. */
      background: #0B1526;
      color: #fff; display: inline-flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 12px rgba(201,21,42,.28), inset 0 0 0 1px rgba(255,255,255,.08);
      position: relative; overflow: hidden;
    }
    .oa-hero-title__icon svg { width: 100%; height: 100%; display: block; }
    .oa-hero-title__text { display: inline-flex; flex-direction: column; line-height: 1.15; color: var(--text); }
    .oa-hero-title__sub { font-size: 12px; font-weight: 500; color: var(--text-muted); margin-top: 4px; letter-spacing: .3px; }
    /* ── Section title with leading accent bar ── */
    .oa-section-title {
      display: flex; align-items: center; gap: 10px;
      font-size: 16px; font-weight: 600; color: var(--text);
      margin-bottom: 12px; line-height: 1.2;
    }
    .oa-section-title::before {
      content: ""; width: 4px; height: 18px; border-radius: 2px;
      background: var(--primary);
      display: inline-block;
    }
    .oa-section-title__count {
      font-size: 12px; font-weight: 500; color: var(--text-muted);
      padding: 2px 8px; border-radius: 999px; background: var(--bg-hover);
    }
    .oa-section-title__actions { margin-left: auto; display: inline-flex; gap: 6px; align-items: center; }
    /* ── Hint text (beginner-friendly description under a title) ── */
    .oa-hint {
      font-size: 12px; color: var(--text); line-height: 1.6;
      background: var(--bg-hover); padding: 8px 12px; border-radius: 6px;
      border-left: 3px solid var(--primary);
      margin-bottom: 10px;
    }
    .oa-hint code {
      background: var(--bg-card); padding: 1px 6px; border-radius: 4px;
      font-size: 11px; color: var(--primary); border: 1px solid var(--border);
    }
    /* ── Segmented button group (active-state aware) ── */
    .seg-group { display: inline-flex; gap: 4px; padding: 3px;
                 background: var(--bg-hover); border-radius: 8px; }
    .seg-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 12px; font-size: 12px; font-weight: 500;
      color: var(--text-muted); background: transparent;
      border: 1px solid transparent; border-radius: 6px; cursor: pointer;
      transition: background .12s, color .12s, box-shadow .12s;
    }
    .seg-btn:hover { color: var(--text); }
    .seg-btn.active {
      color: var(--primary); background: var(--bg-card);
      border-color: var(--border);
      box-shadow: 0 1px 3px rgba(211,47,47,.18);
    }
    /* ── Filter bar (horizontal sticky strip for Today tab) ── */
    .filter-bar {
      display: flex; align-items: center; flex-wrap: wrap; gap: 10px 16px;
      padding: 12px 14px; background: var(--bg-card);
      border: 1.5px solid var(--border); border-radius: var(--radius);
    }
    .filter-bar--news { align-items: stretch; }
    .filter-bar__item { display: inline-flex; align-items: center; gap: 6px; }
    .filter-bar__label { font-size: 12px; color: var(--text); font-weight: 500; }
    .filter-bar__sep { width: 1px; height: 20px; background: var(--border); margin: 0 2px; }
    .time-filter-compact {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px; border: 1.5px solid var(--border); border-radius: 999px;
      background: rgba(255,255,255,.55);
    }
    .time-filter-compact .seg-btn { min-height: 24px; padding: 3px 9px; border-radius: 999px; }
    .time-filter-wrap { position: relative; display: inline-flex; align-items: center; }
    .custom-time-range {
      position: absolute; top: calc(100% + 8px); left: 0; z-index: 30;
      display: grid; grid-template-columns: 1fr; gap: 8px;
      width: 280px; padding: 10px;
      border: 1px solid rgba(211,47,47,.18); border-radius: 14px;
      background: rgba(255,255,255,.98);
      box-shadow: 0 16px 36px rgba(52,16,24,.16), 0 0 0 1px rgba(255,255,255,.65) inset;
    }
    .custom-time-row { display: grid; grid-template-columns: 34px 1fr; align-items: center; gap: 8px; }
    .custom-time-row span { font-size: 12px; color: var(--text-muted); }
    .custom-time-range::before {
      content: ""; position: absolute; top: -6px; left: 24px; width: 10px; height: 10px;
      background: rgba(255,255,255,.98); border-left: 1px solid rgba(211,47,47,.18);
      border-top: 1px solid rgba(211,47,47,.18); transform: rotate(45deg);
    }
    .custom-time-range .input { width: 100%; padding: 6px 8px; font-size: 12px; }
    .search-box {
      display: inline-flex; align-items: center; gap: 6px;
      min-width: 260px; padding: 3px 4px 3px 10px;
      border: 1.5px solid rgba(211,47,47,.24); border-radius: 999px;
      background: linear-gradient(180deg, #fff, rgba(255,247,247,.86));
      box-shadow: 0 2px 8px rgba(211,47,47,.06);
    }
    .search-box:focus-within {
      border-color: rgba(211,47,47,.45);
      box-shadow: 0 0 0 3px rgba(211,47,47,.08), 0 3px 12px rgba(211,47,47,.08);
    }
    .search-box input {
      flex: 1; min-width: 0; border: 0; outline: none; background: transparent;
      color: var(--text); font-size: 13px; padding: 4px 0;
    }
    .btn-icon-round {
      width: 30px; height: 30px; padding: 0; border-radius: 999px;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .search-box .btn-icon-round .oa-icon { color: #fff; width: 16px; height: 16px; }
    .btn-ai-glow {
      border-color: rgba(37,99,235,.38);
      background: linear-gradient(135deg, rgba(37,99,235,.18), rgba(14,165,233,.16), rgba(124,58,237,.18));
      color: #1d4ed8; font-weight: 700; position: relative; overflow: hidden;
      isolation: isolate;
      box-shadow: 0 0 0 1px rgba(56,189,248,.14), 0 0 10px rgba(37,99,235,.12), 0 5px 14px rgba(30,64,175,.10);
      animation: fp-ai-pulse-ring 4.2s ease-out infinite;
    }
    .btn-ai-glow::before {
      content: ""; position: absolute; inset: 0; border-radius: inherit;
      inset: -6px;
      background:
        radial-gradient(circle, rgba(240,249,255,.96) 0 8%, rgba(56,189,248,.45) 9% 13%, transparent 14%),
        repeating-radial-gradient(circle, rgba(37,99,235,.32) 0 2px, rgba(56,189,248,.16) 3px, transparent 4px 14px);
      filter: blur(.2px);
      opacity: .30; animation: fp-ai-burst 4.2s ease-out infinite;
      pointer-events: none;
      z-index: -1;
    }
    .btn-ai-glow::after {
      content: none;
    }
    .btn-ai-glow > * { position: relative; z-index: 1; }
    .btn-ai-glow.btn-primary {
      color: #fff; border-color: rgba(125,211,252,.45);
      background: linear-gradient(135deg, #1d4ed8, #0284c7 45%, #7c3aed);
      box-shadow: 0 0 0 1px rgba(125,211,252,.20), 0 0 14px rgba(37,99,235,.22), 0 4px 12px rgba(30,64,175,.18);
    }
    @keyframes fp-ai-burst {
      0% { transform: scale(.40); opacity: .38; }
      60% { transform: scale(1.04); opacity: .16; }
      100% { transform: scale(1.14); opacity: 0; }
    }
    @keyframes fp-ai-pulse-ring {
      0% { box-shadow: 0 0 0 0 rgba(56,189,248,.16), 0 0 10px rgba(37,99,235,.12), 0 5px 14px rgba(30,64,175,.10); }
      72% { box-shadow: 0 0 0 6px rgba(56,189,248,0), 0 0 14px rgba(37,99,235,.16), 0 6px 16px rgba(30,64,175,.12); }
      100% { box-shadow: 0 0 0 0 rgba(56,189,248,0), 0 0 10px rgba(37,99,235,.12), 0 5px 14px rgba(30,64,175,.10); }
    }
    .sort-pill { display: inline-flex; align-items: center; gap: 5px; }
    /* ── Ingest split-button (main action + dropdown for single-source) ── */
    .ingest-split { display: inline-flex; align-items: stretch; position: relative; filter: drop-shadow(0 4px 10px rgba(211,47,47,.12)); }
    .ingest-split .btn { border-radius: 0; }
    .ingest-split .btn:first-child { border-top-left-radius: 999px; border-bottom-left-radius: 999px; padding-left: 14px; }
    .ingest-split .btn--caret {
      padding: 0 10px; min-width: 34px; border-left: 1px solid rgba(255,255,255,.32);
      border-top-right-radius: 999px; border-bottom-right-radius: 999px;
    }
    .ingest-split .btn--caret .oa-icon { transition: transform .16s; }
    .ingest-split.is-open .btn--caret .oa-icon { transform: rotate(180deg); }
    .ingest-split__menu {
      position: absolute; top: calc(100% + 4px); right: 0; z-index: 20;
      min-width: 240px; max-height: 280px; overflow: auto; padding: 6px;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,.12);
    }
    .ingest-split__menu button {
      display: block; width: 100%; text-align: left;
      padding: 8px 10px; border: none; border-radius: 6px;
      background: transparent; color: var(--text); cursor: pointer; font-size: 13px;
    }
    .ingest-split__menu button:hover { background: rgba(211,47,47,.10); color: var(--primary); }
    .ingest-split__menu button[disabled] { opacity: .5; cursor: not-allowed; }
    /* ── Spinner icon ── */
    @keyframes fp-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .fp-spin { animation: fp-spin 1s linear infinite; transform-origin: 50% 50%; display: inline-block; }
    /* ── Indeterminate progress bar ── */
    @keyframes fp-shimmer {
      0%   { background-position: -200px 0; }
      100% { background-position: 400px 0; }
    }
    .fp-progress {
      height: 3px; border-radius: 2px; overflow: hidden;
      background: linear-gradient(90deg,
        rgba(211,47,47,.08) 0%,
        rgba(211,47,47,.32) 50%,
        rgba(211,47,47,.08) 100%);
      background-size: 400px 100%;
      animation: fp-shimmer 1.4s linear infinite;
    }
    /* ── Ingest result drawer ── */
    .fp-drawer {
      display: flex; flex-direction: column; gap: 10px;
      padding: 12px 14px; border-radius: var(--radius);
      background: var(--bg-card); border: 1px solid var(--border);
    }
    .fp-drawer__head { display: flex; align-items: center; gap: 8px; }
    .fp-drawer__title { font-weight: 600; font-size: 13px; color: var(--text);
                        display: inline-flex; align-items: center; gap: 6px; }
    .fp-drawer__title::before {
      content: ""; width: 3px; height: 14px; background: var(--primary);
      border-radius: 1px; display: inline-block;
    }
    .fp-drawer__spacer { flex: 1; }
    .fp-drawer__summary { font-size: 12px; color: var(--text-muted); }
    .fp-drawer__summary strong { color: var(--text); }
    .fp-drawer__body { display: flex; flex-wrap: wrap; gap: 8px; }
    .fp-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 999px;
      font-size: 12px; line-height: 1.4;
      border: 1px solid var(--border); background: var(--bg);
      color: var(--text);
    }
    .fp-pill--ok    { background: rgba(34,197,94,.10);  color: #15803D;
                       border-color: rgba(34,197,94,.28); }
    .fp-pill--empty { background: rgba(245,158,11,.10); color: #B45309;
                       border-color: rgba(245,158,11,.30); }
    .fp-pill--error { background: rgba(239,68,68,.10);  color: #B91C1C;
                       border-color: rgba(239,68,68,.32); }
    .fp-pill__via   { font-size: 10px; padding: 1px 6px; border-radius: 6px;
                       background: rgba(0,0,0,.06); color: inherit; font-weight: 500; }
    .fp-pill__sep   { opacity: .5; }
    .fp-pill__btn   { font-size: 11px; cursor: pointer; background: transparent;
                       border: none; color: inherit; text-decoration: underline;
                       padding: 0; margin-left: 2px; }
    .fp-pill__reason { display: inline-flex; align-items: center; gap: 4px;
                       font-size: 11px; opacity: .85; font-style: italic; }
    .fp-drawer__error {
      width: 100%; font-size: 11.5px; color: var(--danger);
      background: rgba(239,68,68,.06); border: 1px dashed rgba(239,68,68,.28);
      border-radius: 6px; padding: 6px 10px; word-break: break-word;
    }
    /* ── Config banner (oa-config-banner) ── */
    .oa-config-banner {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; border-radius: var(--radius);
      background: rgba(245,158,11,.12); color: var(--warning);
      border: 1px solid rgba(245,158,11,.24);
    }
    .oa-config-banner__icon { display: inline-flex; align-items: center; }
    .oa-config-banner__text { flex: 1; font-size: 13px; color: var(--text); }
    .oa-config-banner__action {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 5px 10px; font-size: 12px;
      border: none; border-radius: 6px; cursor: pointer;
      background: var(--primary); color: #fff;
    }
    .oa-config-banner__action:hover { background: var(--primary-hover); }
    .oa-icon { display: inline-flex; align-items: center; }
    /* ── Code block (terminal-style, with copy button) ── */
    .fp-codeblock { position: relative; border-radius: 6px;
                    background: #1F0F14; color: #FDEEF1;
                    border: 1px solid var(--border);
                    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
                    font-size: 12px; overflow: hidden; }
    .fp-codeblock pre { margin: 0; padding: 10px 56px 10px 12px;
                        white-space: pre-wrap; word-break: break-word;
                        line-height: 1.55; color: inherit; background: transparent; }
    .fp-codeblock__copy { position: absolute; top: 6px; right: 6px;
                          padding: 2px 8px; font-size: 11px; }
    .digest-workbench {
      display: grid; grid-template-columns: minmax(320px, 420px) minmax(0, 1fr);
      gap: 12px; align-items: start;
    }
    .digest-left, .digest-preview-pane {
      display: flex; flex-direction: column; gap: 12px; min-width: 0;
    }
    .digest-preview-pane { position: sticky; top: 0; }
    .digest-preview-frame {
      width: 100%; min-height: calc(100vh - 210px);
      border: 1px solid var(--border); border-radius: 12px; background: #fff;
    }
    .digest-history-list {
      display: flex; flex-direction: column; gap: 8px; max-height: 360px;
      overflow-y: auto; padding-right: 2px;
    }
    @media (max-width: 980px) {
      .digest-workbench { grid-template-columns: 1fr; }
      .digest-preview-pane { position: static; }
    }
    .radar-workbench {
      display: grid; grid-template-columns: minmax(380px, 500px) minmax(0, 1fr);
      gap: 12px; align-items: stretch; height: calc(100vh - 132px); min-height: 740px;
      overflow: hidden;
    }
    .radar-left, .radar-right { display: flex; flex-direction: column; gap: 12px; min-width: 0; min-height: 0; }
    .radar-left { height: 100%; overflow-y: auto; overflow-x: visible; padding-right: 4px; }
    .radar-left .card { margin: 0; }
    .radar-left .card--compact { flex: 0 0 auto; min-height: 0; display: flex; flex-direction: column; }
    .radar-left .card--compact textarea { flex: 0 0 auto; height: 118px; min-height: 108px; }
    .radar-right { height: 100%; overflow: hidden; }
    .radar-right > .card.grow { height: 100%; min-height: 0; overflow: auto; }
    .radar-rule-help {
      display: flex; align-items: center; flex-wrap: wrap; gap: 6px;
      background: linear-gradient(180deg, rgba(211,47,47,.06), rgba(255,247,247,.82));
      padding: 6px 10px; margin-bottom: 8px; line-height: 1.4;
    }
    .radar-rule-help code {
      background: #fff; color: #b91c1c; border-color: rgba(211,47,47,.34);
      font-weight: 800; box-shadow: 0 1px 0 rgba(211,47,47,.08);
    }
    .radar-intro { padding: 6px 10px; margin-bottom: 0; line-height: 1.45; }
    .radar-exec-card { flex: 0 0 auto; overflow: visible; }
    .radar-exec-card .source-chip-grid--rail {
      display: grid; grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 7px; max-height: 104px !important; padding-right: 6px;
    }
    .radar-exec-card .source-chip {
      width: 100%; min-width: 0; justify-content: flex-start; overflow: hidden;
    }
    .source-chip__name {
      min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .radar-card--locked {
      position: relative;
      border: 2px solid rgba(37,99,235,.46) !important;
      background: linear-gradient(180deg, rgba(239,246,255,.78), rgba(255,255,255,.98)) !important;
      box-shadow: 0 0 0 2px rgba(37,99,235,.08), 0 8px 20px rgba(30,64,175,.08) !important;
    }
    .radar-card--locked::before {
      content: ""; position: absolute; inset: 0 auto 0 0; width: 3px;
      border-radius: var(--radius) 0 0 var(--radius);
      background: linear-gradient(180deg, #2563eb, #38bdf8);
      opacity: .78;
    }
    .radar-title-text { white-space: nowrap; flex: 0 0 auto; }
    .radar-locked-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 7px; border-radius: 999px;
      border: 1.5px solid rgba(37,99,235,.28);
      background: rgba(37,99,235,.08); color: #1d4ed8;
      font-size: 11px; font-weight: 800; white-space: nowrap; flex: 0 0 auto;
    }
    .radar-report-hero {
      border: 1px solid rgba(211,47,47,.16); border-radius: 14px; padding: 14px;
      background: linear-gradient(135deg, rgba(211,47,47,.10), rgba(255,255,255,.94));
      margin-bottom: 12px;
    }
    .radar-report-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }

    .radar-hit-card { padding: 10px 0; border-bottom: 1px solid var(--border); }
    .radar-hit-card__title { color: var(--text); font-size: 13px; font-weight: 650; text-decoration: none; line-height: 1.5; }

    }
    .agent-tool-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 10px; align-items: stretch; }
    .agent-tool-card { margin: 0; display: flex; flex-direction: column; height: 190px; min-height: 190px; }

    /* ── Label bar ── */

             display: flex; align-items: center; gap: 6px; }
    .label::before {
      content: ""; width: 3px; height: 14px; background: var(--primary);
      border-radius: 1px; display: inline-block;
    }
    /* ── Form inputs (input + invalid tooltip) ── */

      border: 1.5px solid var(--border); border-radius: var(--radius);
      transition: border-color .15s;
    }
    .input:focus { outline: none; border-color: var(--primary); }

    .field-warn-icon {

      color: var(--danger); pointer-events: auto; cursor: help;
    }
    .field-warn-tip {
      position: absolute; top: calc(100% + 4px); right: 0;
      padding: 6px 10px; border-radius: 6px;
      font-size: 12px; color: #fff; background: var(--danger);
      white-space: nowrap; opacity: 0; pointer-events: none;
      transition: opacity .15s;
      z-index: 10;
    }
    .field-warn-icon:hover + .field-warn-tip,
    .field-warn-tip:hover { opacity: .95; }
    /* ── Cards ── */
    .card {

      border-radius: var(--radius); padding: 14px; margin-bottom: 12px;
    }
    .card-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 10px; }

    .btn {

      padding: 7px 14px; font-size: 13px; font-weight: 500;

      transition: background .15s, border-color .15s;
    }
    .btn:hover { background: var(--bg-hover); }
    .btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    .btn-primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn-danger { background: var(--danger); color: #fff; border-color: var(--danger); }

    .api-pill--missing {

    }

    /* ── Error panel (used by PluginErrorBoundary) ── */
    .err-panel { border: 1px solid var(--danger); border-radius: var(--radius); padding: 14px; background: rgba(220,38,38,0.08); }
    .err-panel__title { font-weight: 600; color: var(--danger); display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
    .err-panel__msg { font-size: 12px; color: var(--text); margin-bottom: 8px; word-break: break-word; }
    /* ── Confirm dialog (ConfirmHost / oaConfirm) ── */

    /* ── News card ── */

      background: rgba(211,47,47,.08); color: #c62828; white-space: nowrap;

    .source-pill--rss { background: rgba(16,185,129,.10); color: #047857; }
    .source-pill--direct { background: rgba(59,130,246,.10); color: #1d4ed8; }
    /* Source chip grids (settings + news source rail) */

    .filter-source-cats { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .filter-source-cat {
      display: inline-flex; align-items: center; gap: 5px;

    .source-chip {
      display: inline-flex; align-items: center; gap: 6px;

      border: 1.5px solid var(--border); border-radius: 8px;
      background: var(--bg-card); color: var(--text);

    .custom-source-dialog__mode { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }

      border: 1px dashed var(--border); border-radius: 8px; background: var(--bg);

    .timeline {

      padding: 4px 0 4px 0;
    }

      content: ""; position: absolute; left: 78px; top: 0; bottom: 0;

    }

    .filter-bar--news { display: flex; flex-direction: column; align-items: stretch; gap: 10px; }

    .choice-row {

    /* ── Collapsible ── */

  <script>
    /* Apply saved theme before React mounts to avoid a FOUC flash. */
    (function () {
      try {
        var saved = localStorage.getItem('fp-theme');
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = saved || (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) { /* no-op */ }
    })();

/* ── Plugin API wrapper ──
   The host bridge (plugin-bridge-host.ts::handleApiRequest) does NOT
   auto-prefix `/api/plugins/<id>/`; it fetches `${apiBase}${path}`
   verbatim. Other plugins (ecommerce-image etc.) prepend the plugin
   base themselves. We do the same so relative plugin paths like
   "/ingest" reach "/api/plugins/fin-pulse/ingest".
   Host Bridge wraps responses as `{ok, status, body: <plugin JSON>}`,
   so we unwrap `body` and carry the transport-level `ok` when the
   JSON body doesn't have it. Outside the iframe (dev direct-URL
   mode) the fetch returns the plugin JSON at the root already. */

  if (typeof path !== "string") return path;
  if (path.startsWith("http://") || path.startsWith("https://")) return path;
  if (path.startsWith("/api/")) return path;
  return API_BASE_PATH + (path.startsWith("/") ? path : "/" + path);
}
/* FastAPI and some proxies return ``detail`` as a string, an object, or
   a Pydantic ``[{loc,msg,...}]`` array — the toast and ingest error line
   must never degrade to the useless plain word ``unknown``. */
function _stringifyApiDetail(d) {
  if (d == null || d === "") return "";
  if (typeof d === "string") return d;
  if (Array.isArray(d)) {
    return d.map(function (x) {
      if (x && typeof x === "object" && "msg" in x) return String(x.msg);
      return String(x);
    }).join("; ");
  }
  if (typeof d === "object" && d !== null && "msg" in d) {
    return String((d).msg);
  }
  try { return JSON.stringify(d); } catch (_) { return String(d); }
}
/* Unify every host/bridge response shape the iframe can see.

   1) Full transport (preferred): ``{ok, status, body}`` from the
      desktop host's fetch proxy.
   2) Bootstrap timeout: ``{ok:false, error:"timeout"}`` — *no* ``body``
      key, so the old code fell through and ``ingest`` showed
      ``ingest failed: unknown`` (reported 2025-04).
   3) Lean hosts that forward JSON without wrapping — return as-is
      after normalising a top-level ``detail`` string. */
function _normalizeBridgeApiResult(res) {
  if (!res || typeof res !== "object") {
    return { ok: false, detail: "no-response" };

    var err = res.error != null ? res.error : res.message;
    return {
      ok: false,
      detail: _stringifyApiDetail(err) || "bridge_error",
    };
  }
  if ("body" in res && "status" in res) {
    var inner = res.body;
    if (inner == null || typeof inner !== "object" || Array.isArray(inner)) {
      inner = {};
    } else {
      inner = Object.assign({}, inner);
    }
    if (!("ok" in inner)) {
      inner.ok = !!res.ok;
    }
    if (!inner.ok) {
      if (!("detail" in inner) && res.status) {
        inner.detail = "http_" + res.status;
      } else if (!("detail" in inner)) {
        inner.detail = "http_error";
      } else {
        inner.detail = _stringifyApiDetail(inner.detail);
      }
    }
    return inner;
  }
  if ("detail" in res && !("ok" in res)) {
    return Object.assign({ ok: false }, res, {
      detail: _stringifyApiDetail(res.detail),
    });
  }

async function api(method, path, body) {
  const fullPath = _finPulsePath(path);
  if (window.OpenAkita && typeof window.OpenAkita.api === "function") {
    const res = await window.OpenAkita.api(method, fullPath, body);
    return _normalizeBridgeApiResult(res);
  }
  const resp = await fetch(fullPath, {
    method: method,
    headers: body ? { "Content-Type": "application/json" } : {},
    body: body ? JSON.stringify(body) : undefined,
  });

  try {
    json = await resp.json();
  } catch (_) {
    return {
      ok: false,
      detail: (resp && resp.status) ? "http_" + resp.status : "empty_body",
    };
  }
  if (json == null) {
    return { ok: false, detail: (resp && resp.status) ? "http_" + resp.status : "empty_body" };
  }
  if (!resp.ok) {
    if (typeof json === "object" && json && "detail" in json) {
      return Object.assign({ ok: false }, json, {
        detail: _stringifyApiDetail(json.detail),
      });

/* ── Async ingest helper ──
   `/ingest` and `/ingest/source/{id}` return immediately with a
   `task_id` and run in the background so the host iframe bridge's
   30s hard timeout never trips on first-run fan-outs. We poll
   `/tasks/{task_id}` until terminal and rebuild a `summary`-shaped
   response so all the legacy probe / report / Today-tab callers can
   keep reading `resp.summary.totals` without changes downstream.

   `kind` controls the polling cadence: full-fan-out runs ("all"
   mode) start at 800ms and back off to 2s; a single-source probe
   ("single") starts at 300ms and tops out at 1s so the Settings
   button feels snappy. The hard wall is 5 minutes — anything past
   that almost certainly means a stuck upstream and we surface it
   as `error_kind="timeout"`. */
const INGEST_TERMINAL_STATUS = { succeeded: 1, skipped: 1, failed: 1, canceled: 1 };
async function _waitForIngestTask(taskId, opts) {
  const kind = (opts && opts.kind) || "all";
  const maxWaitMs = (opts && opts.maxWaitMs) || 5 * 60 * 1000;
  const initial = kind === "single" ? 300 : 800;
  const ceiling = kind === "single" ? 1000 : 2000;
  const started = Date.now();
  let delay = initial;
  /* eslint-disable no-await-in-loop */
  while (Date.now() - started < maxWaitMs) {
    await new Promise(function (r) { setTimeout(r, delay); });
    delay = Math.min(Math.round(delay * 1.4), ceiling);
    let row;
    try {
      row = await api("GET", "/tasks/" + encodeURIComponent(taskId));
    } catch (err) {
      continue;
    }
    if (!row || !row.ok || !row.task) continue;
    var task = row.task;
    if (task.status && INGEST_TERMINAL_STATUS[String(task.status).toLowerCase()]) {
      var summary = task.result || {};
      var ok = task.status === "succeeded" || task.status === "skipped";
      return {
        ok: ok,
        task_id: taskId,
        status: task.status,
        summary: summary,
        error_kind: task.error_kind || (summary && summary.error_kind) || null,
        error_message: task.error_message || null,
        detail: ok ? undefined : (task.error_message || task.error_kind || ("status_" + task.status)),
      };
    }
  }
  return {
    ok: false,
    task_id: taskId,
    status: "timeout",
    error_kind: "timeout",
    detail: "ingest task " + taskId + " did not complete within " + Math.round(maxWaitMs / 1000) + "s",
  };
}

/* Kick off an ingest run and resolve only when the backend task
   reaches a terminal status. Accepts the same (path, body) shape as
   the underlying `api()` helper so callers don't have to know about
   the async/poll plumbing. */
async function ingestAndWait(path, body, opts) {
  let resp;
  try {
    resp = await api("POST", path, body);
  } catch (err) {
    return { ok: false, detail: (err && err.message) || String(err) };
  }
  if (!resp || !resp.ok) return resp || { ok: false, detail: "no-response" };
  if (resp.summary) return resp;
  if (!resp.task_id) return resp;
  return await _waitForIngestTask(resp.task_id, opts || {});
}

function useSettings() {
  /* `available_channels` here holds the host's rich channel entries
     ({channel_id, chat_id, chat_name, ...}) so the Settings / Schedule
     pickers can show the same dropdown as SchedulerView. */
  const [settings, setSettings] = useState({ available_channels: [] });
  const [loaded, setLoaded] = useState(false);
  const refresh = useCallback(async function () {
    const resp = await api("GET", "/scheduler/channels");
    let list = (resp && Array.isArray(resp.channels)) ? resp.channels : [];
    if (!list.length) {
      /* Fallback to the adapter-probe route when the host scheduler
         didn't surface any sessions yet. */
      const fallback = await api("GET", "/available-channels");
      const names = (fallback && fallback.channels) || [];
      list = names.map(function (n) {
        return { channel_id: String(n), chat_id: "", chat_name: "", chat_type: "private" };
      });
    }
    setSettings(function (prev) {
      return Object.assign({}, prev, { available_channels: list });
    });
    setLoaded(true);
  }, []);
  useEffect(function () { refresh().catch(function () { setLoaded(true); }); }, [refresh]);
  return { settings: settings, loaded: loaded, refresh: refresh };

/* ── Shared helpers ── */
function tfmt(template, vars) {
  return String(template || "").replace(/\{(\w+)\}/g, function (_, k) { return (vars && k in vars) ? vars[k] : "{" + k + "}"; });
}
function fmtDate(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  if (isNaN(d.getTime())) return iso;
  const pad = function (n) { return n < 10 ? "0" + n : "" + n; };
  return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate()) + " " + pad(d.getHours()) + ":" + pad(d.getMinutes());
}
function _fmtWallClock(raw, withHour) {
  if (!raw) return "";
  var s = String(raw).trim();
  var m = s.match(/^(\d{4})[-/](\d{1,2})[-/](\d{1,2})(?:[T\s](\d{1,2}):(\d{1,2})(?::(\d{1,2}))?)?/);
  if (!m) return "";
  var pad = function (n) { n = Number(n || 0); return n < 10 ? "0" + n : "" + n; };
  var date = m[1] + "-" + pad(m[2]) + "-" + pad(m[3]);
  if (!withHour || !m[4]) return date;
  return date + " " + pad(m[4]) + ":" + pad(m[5]);
}
function fmtArticleDate(it) {
  if (!it) return "";
  if (it.published_at) {
    return _fmtWallClock(it.published_at, true) || fmtDate(it.published_at);
  }
  return fmtDate(it.fetched_at || "");
}
function fmtTimelineBucket(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  if (isNaN(d.getTime())) return String(iso).slice(0, 16);
  const pad = function (n) { return n < 10 ? "0" + n : "" + n; };
  return pad(d.getMonth() + 1) + "-" + pad(d.getDate()) + " " + pad(d.getHours()) + ":00";
}
function fmtArticleTimelineBucket(it) {
  if (it && it.published_at) {
    var wall = _fmtWallClock(it.published_at, true);
    if (wall) return wall.slice(5, 13) + ":00";
  }
  return fmtTimelineBucket(articleTime(it));
}
function fmtTimelineMinute(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  if (isNaN(d.getTime())) return "";
  const pad = function (n) { return n < 10 ? "0" + n : "" + n; };
  return pad(d.getHours()) + ":" + pad(d.getMinutes());
}
function articleTime(it) {
  return (it && (it.published_at || it.fetched_at)) || "";
}
function hoursAgoISO(hours) {
  const d = new Date(Date.now() - hours * 3600 * 1000);
  return d.toISOString().replace(/\.\d+Z$/, "Z");
}
function datetimeLocalToISO(value) {
  if (!value) return "";
  const d = new Date(value);
  if (isNaN(d.getTime())) return "";
  return d.toISOString().replace(/\.\d+Z$/, "Z");
}
function copyText(text) {
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text);
    } else {
      const el = document.createElement("textarea");
      el.value = text; document.body.appendChild(el); el.select();
      document.execCommand("copy"); document.body.removeChild(el);
    }
  } catch (_) {}
}

/* ── Ingest drawer helpers + component ───────────────────────────
   The drawer renders the per-source breakdown returned by
   POST /ingest (or POST /ingest/source/{id}). Each pill shows:
   · source display name
   · NewsNow / 直连 / 冷却 / 无结果 badge (the "via" transport)
   · result summary (+{inserted} new · {updated} updated, empty, failed)
   · an expandable error row when the fetcher reported an error.
*/
function _sourceName(sources, id) {
  for (let i = 0; i < sources.length; i++) {
    if (sources[i].id === id) return sources[i].name;
  }
  return id || "";
}
function _countNonEmpty(bySource) {
  let n = 0;
  Object.keys(bySource || {}).forEach(function (k) {
    const row = bySource[k] || {};
    if (!row.error && Number(row.fetched || 0) > 0) n += 1;
  });
  return n;
}
function _pillClass(row) {
  if (row.error || row.error_kind) return "fp-pill fp-pill--error";
  if (Number(row.fetched || 0) > 0) return "fp-pill fp-pill--ok";
  return "fp-pill fp-pill--empty";
}
function _viaKey(row) {
  if (row.error_kind === "rate_limited") return "cooldown";
  const v = String(row.via || "").toLowerCase();
  if (v === "newsnow") return "newsnow";
  if (v === "direct") return "direct";
  if (v === "none") return "none";
  return "direct";
}
/* Map the fetcher-side ``via_reason`` string (e.g.
   ``newsnow:cloudflare_blocked``) to a user-facing label.
   Unknown kinds fall back to the raw string so a new backend
   kind never regresses into "(empty)". */
function _viaReasonLabel(t, raw) {
  const s = String(raw || "").trim();
  if (!s) return "";
  const parts = s.split(":");
  const head = (parts[0] || "").toLowerCase();
  const tail = (parts[1] || "").toLowerCase();
  if (head !== "newsnow") return s;
  const knownKinds = {
    "cloudflare_blocked": "today.drawer.via_reason.newsnow_cloudflare_blocked",
    "invalid_source_id": "today.drawer.via_reason.newsnow_invalid_source_id",
  };
  if (knownKinds[tail]) return t(knownKinds[tail]);
  if (tail.indexOf("http_") === 0) return t("today.drawer.via_reason.newsnow_http");
  if (tail.indexOf("error") === 0) return t("today.drawer.via_reason.newsnow_error");
  return s;
}

function IngestDrawer(props) {
  const t = useT();
  const [expandedId, setExpandedId] = useState("");

/* ── Keyword highlight helper ── */
function highlightText(text, keyword) {
  if (!keyword || !text) return text;
  var lower = String(text).toLowerCase();
  var kw = keyword.toLowerCase();
  var idx = lower.indexOf(kw);
  if (idx < 0) return text;
  var parts = [];
  var lastIdx = 0;
  while (idx >= 0) {
    if (idx > lastIdx) parts.push(text.substring(lastIdx, idx));
    parts.push(<mark key={idx} className="kw-hl">{text.substring(idx, idx + kw.length)}</mark>);
    lastIdx = idx + kw.length;
    idx = lower.indexOf(kw, lastIdx);
  }
  if (lastIdx < text.length) parts.push(text.substring(lastIdx));
  return parts;
}

function _itemMetricPills(it) {

  if (rank !== undefined && rank !== null && rank !== "") pills.push("No." + rank);
  var heat = raw.hot || raw.heat || raw.hot_value || raw.hotValue || raw.score;
  if (heat !== undefined && heat !== null && heat !== "") pills.push("热度 " + heat);

function _tokenizeInterestText(text) {
  var stop = {"关注": 1, "重点": 1, "新闻": 1, "资讯": 1, "变化": 1, "相关": 1, "以及": 1, "例如": 1, "一个": 1, "这个": 1};
  var out = [];
  String(text || "").split(/[\n，,、；;。.!！?？：:\s]+/).forEach(function (word) {
    word = word.trim();
    if (word.length >= 2 && !stop[word]) out.push(word.toLowerCase());
  });
  return out;
}

function _inferSentimentFromText(text) {
  text = String(text || "").toLowerCase();
  var positive = ["上涨", "涨停", "走强", "反弹", "回暖", "利好", "增长", "增持", "突破", "创新高", "上调", "扩张", "乐观", "positive", "bullish", "surge", "gain", "beat", "upgrade"];
  var negative = ["下跌", "跌停", "走弱", "回落", "承压", "利空", "下降", "减持", "亏损", "暴跌", "下调", "收缩", "担忧", "风险", "negative", "bearish", "slump", "loss", "miss", "downgrade"];
  var pos = 0, neg = 0;
  positive.forEach(function (w) { if (text.indexOf(w) >= 0) pos += 1; });
  negative.forEach(function (w) { if (text.indexOf(w) >= 0) neg += 1; });
  if (pos > neg) return "positive";
  if (neg > pos) return "negative";
  return "neutral";
}

function _aiScoreArticle(it, ctx) {
  var text = ((it.title || "") + " " + (it.summary || "") + " " + JSON.stringify(it.raw || {})).toLowerCase();
  if (ctx.excludeTokens.some(function (tok) { return text.indexOf(tok) >= 0; })) return {excluded: true, score: 0, sentiment: "neutral"};
  var score = 0;
  ctx.keywordTokens.forEach(function (tok) { if (text.indexOf(tok) >= 0) score += 12; });
  ctx.interestTokens.forEach(function (tok) { if (text.indexOf(tok) >= 0) score += 8; });
  var inferred = it.sentiment || _inferSentimentFromText(text);
  if (ctx.sentiment && ctx.sentiment !== "all") {
    score += inferred === ctx.sentiment ? 10 : 2;
  }
  return {excluded: false, score: score, sentiment: inferred};
}

function TodayTab() {
  const t = useT();
  const [items, setItems] = useState([]);
  const [total, setTotal] = useState(0);
  const [loading, setLoading] = useState(false);
  const [filters, setFilters] = useState({ window: 24, sort: "time_desc", since: "", until: "" });
  const [focusedSources, setFocusedSources] = useState([]);
  const [sourceCategory, setSourceCategory] = useState("all");
  const [searchDraft, setSearchDraft] = useState("");
  const [keyword, setKeyword] = useState("");
  const [customTimeOpen, setCustomTimeOpen] = useState(false);
  const [ingesting, setIngesting] = useState(false);
  const [sources, setSources] = useState([]);
  const [sourceConfig, setSourceConfig] = useState({});
  const [sourcesLoadError, setSourcesLoadError] = useState("");
  const [lastIngest, setLastIngest] = useState(null);
  const [drawerOpen, setDrawerOpen] = useState(false);
  const [menuOpen, setMenuOpen] = useState(false);
  const [cooldown, setCooldown] = useState(0);
  const [aiFilterOpen, setAiFilterOpen] = useState(false);
  const [aiFilter, setAiFilter] = useState(null);
  const [exportOpen, setExportOpen] = useState(false);
  const [exportPreview, setExportPreview] = useState(null);
  const [viewMode, setViewMode] = useState("grouped");
  const [collapsedGroups, setCollapsedGroups] = useState({});
  const [translationConfig, setTranslationConfig] = useState({enabled: true, target_language: "中文", scope: "title_summary"});
  const [translatedMap, setTranslatedMap] = useState({});
  const [translatingIds, setTranslatingIds] = useState({});

  /* Load sources + config for enabled state */
  useEffect(function () {
    let cancelled = false;
    Promise.all([api("GET", "/sources"), api("GET", "/config")]).then(function (resps) {
      if (cancelled) return;
      var srcResp = resps[0], cfgResp = resps[1];
      var rawSources = (srcResp && srcResp.ok && Array.isArray(srcResp.items) && srcResp.items.length) ? srcResp.items : SOURCE_FALLBACK;
      if (rawSources.length) {
        var mapped = rawSources.map(function (s) {
          return {
            id: String(s.id || ""), name: String(s.display_zh || s.display_en || s.id || ""),
            kind: String(s.kind || ""), content_type: String(s.content_type || "news"),
            group: String(s.group || ""),
            display_zh: String(s.display_zh || s.name || s.id || ""),
            display_en: String(s.display_en || s.name || s.id || ""),
            fetcher_id: String(s.fetcher_id || s.id || ""),
            probe_target: String(s.probe_target || s.fetcher_id || s.id || ""),
            default_enabled: !!s.default_enabled
          };
        }).filter(function (s) { return s.id; });
        setSources(mapped);
        setSourcesLoadError((srcResp && srcResp.ok) ? "" : t("today.sources.loadFail"));
      } else {
        setSourcesLoadError(t("today.sources.loadFail"));
      }
      if (cfgResp && cfgResp.config) {
        setSourceConfig(cfgResp.config);
        setTranslationConfig({
          enabled: cfgResp.config["translation.enabled"] === undefined ? true : cfgResp.config["translation.enabled"] !== false && cfgResp.config["translation.enabled"] !== "false",
          target_language: String(cfgResp.config["translation.target_language"] || "中文"),
          scope: String(cfgResp.config["translation.scope"] || "title_summary"),
        });
      }
    }).catch(function (err) {
      if (!cancelled) setSourcesLoadError((err && err.message) || t("today.sources.loadFail"));
    });
    return function () { cancelled = true; };
  }, []);

  var enabledSources = sources.filter(function (s) {
    var v = sourceConfig["source." + s.id + ".enabled"];
    if (v === undefined || v === null || v === "") return s.default_enabled;
    return v !== false && v !== "false";
  });

  var sourcesMap = {};
  sources.forEach(function (s) { sourcesMap[s.id] = s; });
  items.forEach(function (it) {
    var sid = it.source_id || "";
    if (sid && !sourcesMap[sid]) {
      sourcesMap[sid] = _legacySourceDefinition(sid);
    }
  });

  const load = useCallback(async function () {
    setLoading(true);
    try {
      const qs = {
        since: filters.window === "custom" ? datetimeLocalToISO(filters.since) : (filters.window ? hoursAgoISO(filters.window) : undefined),
        until: filters.window === "custom" ? datetimeLocalToISO(filters.until) : undefined,
        sort: filters.sort || "time",
        limit: 1000,
      };
      const query = Object.keys(qs)
        .filter(function (k) { return qs[k] !== undefined && qs[k] !== ""; })
        .map(function (k) { return encodeURIComponent(k) + "=" + encodeURIComponent(String(qs[k])); })
        .join("&");
      const resp = await api("GET", "/articles" + (query ? "?" + query : ""));
      if (resp && resp.ok) {
        setItems(resp.items || []);
        setTotal(resp.total || 0);
      } else {
        setItems([]); setTotal(0);
      }
    } finally {
      setLoading(false);
    }
  }, [filters]);

  useEffect(function () { load(); }, [load]);

  /* Cooldown timer */
  useEffect(function () {
    if (cooldown <= 0) return;
    var timer = setTimeout(function () { setCooldown(cooldown - 1); }, 1000);
    return function () { clearTimeout(timer); };
  }, [cooldown]);

  const runIngest = useCallback(async function (opts) {
    const single = !!(opts && opts.sourceId);
    if (ingesting || cooldown > 0) return;
    setIngesting(true);
    setDrawerOpen(true);
    try {
      var src = single ? sourcesMap[opts.sourceId] : null;
      var target = src && src.kind === "newsnow" ? src.id : (src ? (src.probe_target || src.fetcher_id || src.id) : opts.sourceId);
      const path = single ? ("/ingest/source/" + encodeURIComponent(target)) : "/ingest";
      const body = single ? null : { since_hours: 24 };
      const resp = await ingestAndWait(path, body, { kind: single ? "single" : "all" });
      const summary = (resp && resp.summary) || {};
      const totals = summary.totals || {};
      const bySource = summary.by_source || {};
      setLastIngest({
        mode: single ? "single" : "all",
        sourceId: single ? opts.sourceId : null,
        taskId: resp && resp.task_id,
        totals: totals,
        bySource: bySource,
        reason: summary.reason || null,
        ok: !!(resp && resp.ok),
      });
      const inserted = Number(totals.inserted || 0);
      const updated = Number(totals.updated || 0);
      const sourcesOk = Number(totals.sources_ok || 0);
      const sourcesTotal = Number(totals.sources_total || Object.keys(bySource).length || 0);
      const failed = Number(totals.failed_sources || 0);
      let level = "success", msg = "";
      if (summary.reason === "no_sources_enabled") {
        level = "warning";
        msg = t("today.ingest.done.none_enabled");
      } else if (!resp || !resp.ok) {
        level = "error";
        var why = "";
        if (resp) {
          why = _stringifyApiDetail(resp.detail);
          if (!why && typeof resp.error === "string") { why = resp.error; }
          if (!why && typeof resp.message === "string") { why = resp.message; }
        }
        msg = "ingest failed: " + (why || "unknown");
      } else if (inserted + updated > 0) {
        level = "success";
        msg = tfmt(t("today.ingest.done.green"), {
          inserted: inserted, updated: updated,
          sourcesOk: sourcesOk, sourcesTotal: sourcesTotal });
      } else {
        level = "warning";
        msg = tfmt(t("today.ingest.done.amber"), {
          sourcesOk: sourcesOk, failed: failed,
          empty: Math.max(0, sourcesTotal - sourcesOk - failed) });
      }
      window.oaToast({ level: level, message: msg });
      setCooldown(single ? 3 : 30);
      load();
    } finally { setIngesting(false); }
  }, [ingesting, cooldown, load, t, sourcesMap]);

  const onIngestAll = useCallback(function () {
    setMenuOpen(false);
    runIngest({});
  }, [runIngest]);

  const onIngestCurrent = useCallback(function () {
    setMenuOpen(false);
    if (!focusedSources.length) return;
    runIngest({ sourceId: focusedSources[0] });
  }, [runIngest, focusedSources]);

  const onDismissDrawer = useCallback(function () { setDrawerOpen(false); }, []);

  /* AI filter keyword matching + local scoring. */
  var aiKeywordTokens = [];
  var aiInterestTokens = aiFilter && aiFilter.interests ? _tokenizeInterestText(aiFilter.interests) : [];
  if (aiFilter && aiFilter.keywords) {
    String(aiFilter.keywords).split("\n").forEach(function (line) {
      line = line.trim();
      if (!line) return;
      if (line.startsWith("!")) return;
      line.replace(/^[+]/, "").split(/[，,、；;\s]+/).forEach(function (word) {
        word = word.trim();
        if (word) aiKeywordTokens.push(word.toLowerCase());
      });
    });
  }
  var aiExcludeTokens = [];
  if (aiFilter && aiFilter.keywords) {
    String(aiFilter.keywords).split("\n").forEach(function (line) {
      line = line.trim();
      if (line.startsWith("!")) {
        line.substring(1).split(/[，,、；;\s]+/).forEach(function (w) {
          w = w.trim();
          if (w) aiExcludeTokens.push(w.toLowerCase());
        });
      }
    });
  }

  var fetchedSourceIds = [];
  var fetchedSeen = {};
  items.forEach(function (it) {
    var sid = it.source_id || "unknown";
    if (!fetchedSeen[sid]) {
      fetchedSeen[sid] = true;
      fetchedSourceIds.push(sid);
    }
  });
  fetchedSourceIds.sort(function (a, b) {
    var ca = items.filter(function (it) { return (it.source_id || "unknown") === a; }).length;
    var cb = items.filter(function (it) { return (it.source_id || "unknown") === b; }).length;
    return cb - ca;
  });
  var sourceRank = {};
  sources.forEach(function (s, idx) { sourceRank[s.id] = idx; });

  var availableSourceIds = [];
  var availableSeen = {};
  enabledSources.forEach(function (s) {
    if (s && s.id && !availableSeen[s.id]) {
      availableSeen[s.id] = true;
      availableSourceIds.push(s.id);
    }
  });
  fetchedSourceIds.forEach(function (sid) {
    if (sid && !availableSeen[sid]) {
      availableSeen[sid] = true;
      availableSourceIds.push(sid);
    }
  });
  availableSourceIds.sort(function (a, b) {
    var ca = items.filter(function (it) { return (it.source_id || "unknown") === a; }).length;
    var cb = items.filter(function (it) { return (it.source_id || "unknown") === b; }).length;
    if (cb !== ca) return cb - ca;
    var ra = Object.prototype.hasOwnProperty.call(sourceRank, a) ? sourceRank[a] : 999;
    var rb = Object.prototype.hasOwnProperty.call(sourceRank, b) ? sourceRank[b] : 999;
    return ra - rb;
  });

  var categorySourceSet = {};
  if (sourceCategory !== "all") {
    availableSourceIds.forEach(function (sid) {
      var src = sourcesMap[sid] || _legacySourceDefinition(sid);
      if (_sourceCategoryKey(src) === sourceCategory) categorySourceSet[sid] = true;
    });
  }
  var activeSourceSet = {};
  focusedSources.forEach(function (sid) { activeSourceSet[sid] = true; });
  var sourceScopedItems = items.filter(function (it) {
    var sid = it.source_id || "unknown";
    if (sourceCategory !== "all" && !categorySourceSet[sid]) return false;
    if (focusedSources.length && !activeSourceSet[sid]) return false;
    return true;
  });

  /* Match items by keyword + AI filter. Sentiment is scored, not field-gated. */
  var hasMatchRule = !!keyword || aiKeywordTokens.length > 0 || aiInterestTokens.length > 0 ||
    aiExcludeTokens.length > 0 || !!(aiFilter && aiFilter.sentiment && aiFilter.sentiment !== "all");
  var aiOnlySentiment = !keyword && aiKeywordTokens.length === 0 && aiInterestTokens.length === 0 &&
    !!(aiFilter && aiFilter.sentiment && aiFilter.sentiment !== "all");
  var aiCtx = {
    keywordTokens: aiKeywordTokens,
    interestTokens: aiInterestTokens,
    excludeTokens: aiExcludeTokens,
    sentiment: aiFilter && aiFilter.sentiment ? aiFilter.sentiment : "all"
  };
  var matchedItems = [];
  var remainingItems = [];
  sourceScopedItems.forEach(function (it) {
    var text = ((it.title || "") + " " + (it.summary || "")).toLowerCase();
    var matched = true;
    var aiScore = _aiScoreArticle(it, aiCtx);
    it._aiScore = aiScore.score;
    it._aiSentiment = aiScore.sentiment;
    if (keyword) {
      matched = text.indexOf(keyword.toLowerCase()) >= 0;
    }
    if (matched && aiKeywordTokens.length) {
      matched = aiKeywordTokens.some(function (tok) { return text.indexOf(tok) >= 0; });
    }
    if (matched && aiInterestTokens.length) {
      matched = aiInterestTokens.some(function (tok) { return text.indexOf(tok) >= 0; });
    }
    if (matched && aiExcludeTokens.length) {
      matched = !aiScore.excluded;
    }
    if (matched && aiFilter && (aiKeywordTokens.length || aiInterestTokens.length || aiOnlySentiment)) {
      matched = aiOnlySentiment ? aiScore.score > 0 : aiScore.score >= 8;
    }
    if (hasMatchRule && matched) matchedItems.push(it);
    else remainingItems.push(it);
  });
  matchedItems.sort(function (a, b) {
    var sd = (b._aiScore || 0) - (a._aiScore || 0);
    if (sd !== 0) return sd;
    return String(articleTime(b)).localeCompare(String(articleTime(a)));
  });
  var displayItems = hasMatchRule ? matchedItems : sourceScopedItems.slice();
  var focusedSourceSet = {};
  focusedSources.forEach(function (sid, idx) { focusedSourceSet[sid] = idx + 1; });
  var sourceCategoryCounts = {};
  SOURCE_CATEGORY_KEYS.forEach(function (key) { sourceCategoryCounts[key] = 0; });
  availableSourceIds.forEach(function (sid) {
    var cat = _sourceCategoryKey(sourcesMap[sid] || _legacySourceDefinition(sid));
    sourceCategoryCounts[cat] = (sourceCategoryCounts[cat] || 0) + 1;
    sourceCategoryCounts.all += 1;
  });
  var visibleSourceIds = availableSourceIds.filter(function (sid) {
    if (sourceCategory === "all") return true;
    return _sourceCategoryKey(sourcesMap[sid] || _legacySourceDefinition(sid)) === sourceCategory;
  });

  var groupItemsBySource = function (list) {
    var grouped = {};
    list.forEach(function (it) {
      var sid = it.source_id || "unknown";
      if (!grouped[sid]) grouped[sid] = [];
      grouped[sid].push(it);
    });
    return grouped;
  };
  var sortedGroupIds = function (grouped) {
    return Object.keys(grouped).sort(function (a, b) {
      var fa = focusedSourceSet[a] || 0;
      var fb = focusedSourceSet[b] || 0;
      if (fa && fb) return fa - fb;
      if (fa) return -1;
      if (fb) return 1;
      var ra = Object.prototype.hasOwnProperty.call(sourceRank, a) ? sourceRank[a] : 999;
      var rb = Object.prototype.hasOwnProperty.call(sourceRank, b) ? sourceRank[b] : 999;
      var diff = ra - rb;
      if (diff !== 0) return diff;
      return grouped[b].length - grouped[a].length;
    });
  };

  var onApplyAiFilter = useCallback(function (f) {
    setAiFilter(f);
    setAiFilterOpen(false);
  }, []);

  var submitSearch = useCallback(function () {
    setKeyword(searchDraft.trim());
  }, [searchDraft]);

  var toggleFocusedSource = useCallback(function (sid) {
    setFocusedSources(function (prev) {
      if (prev.indexOf(sid) >= 0) return prev.filter(function (x) { return x !== sid; });
      return prev.concat([sid]);
    });
  }, []);

  var onExportConfirm = useCallback(async function (options) {
    try {
      var exportItems = options && options.scope === "loaded" ? items : displayItems;
      var exportFilters = Object.assign({}, filters, {
        source: options && options.scope === "loaded" ? "" : focusedSources.join(","),
        keyword: options && options.scope === "loaded" ? "" : keyword
      });
      var report = await exportHtmlReport(exportItems, sourcesMap, exportFilters, t, options);
      setExportOpen(false);
      setExportPreview(report);
      window.oaToast({level: "success", message: t("today.export.done")});
    } catch (err) {
      window.oaToast({level: "error", message: tfmt(t("today.export.fail"), {err: (err && err.message) || String(err)})});
    }
  }, [items, displayItems, sourcesMap, filters, focusedSources, keyword, t]);

  var onTranslateArticle = useCallback(async function (it) {
    if (!it || !it.id) return;
    var existing = translatedMap[it.id];
    if (existing) {
      setTranslatedMap(function (prev) {
        var copy = Object.assign({}, prev);
        copy[it.id] = Object.assign({}, existing, {showing: !existing.showing});
        return copy;
      });
      return;
    }
    setTranslatingIds(function (prev) { return Object.assign({}, prev, {[it.id]: true}); });
    try {
      var resp = await api("POST", "/translate", {
        target_language: translationConfig.target_language || "中文",
        items: [{id: it.id, title: it.title || "", summary: it.summary || ""}],
      });
      if (resp && resp.ok && Array.isArray(resp.items) && resp.items[0]) {
        var tr = resp.items[0];
        setTranslatedMap(function (prev) {
          return Object.assign({}, prev, {[it.id]: Object.assign({}, tr, {showing: true})});
        });
      } else {
        throw new Error((resp && (resp.error || resp.detail)) || "empty translation");
      }
    } catch (err) {
      window.oaToast({level: "error", message: tfmt(t("today.translate.fail"), {err: (err && err.message) || String(err)})});
    } finally {
      setTranslatingIds(function (prev) { return Object.assign({}, prev, {[it.id]: false}); });
    }
  }, [translatedMap, translationConfig, t]);

  var renderSourceGroups = function (list, keyPrefix) {
    var grouped = groupItemsBySource(list);
    var ids = sortedGroupIds(grouped);
    return ids.map(function (sid) {
      var groupItems = grouped[sid] || [];
      var srcDef = sourcesMap[sid] || {id: sid, name: sid, content_type: ""};
      var subLabels = [];
      groupItems.forEach(function (it) {
        var label = _itemSubSourceLabel(it, srcDef);
        if (label && subLabels.indexOf(label) < 0) subLabels.push(label);
      });
      var collapseKey = keyPrefix + ":" + sid;
      var collapsed = !!collapsedGroups[collapseKey];
      return (
        <div key={collapseKey} className="news-source-group">
          <div className="news-source-group__head"
               title={t("today.group.collapse")}
               onClick={function () {
                 setCollapsedGroups(function (prev) {
                   var copy = Object.assign({}, prev);
                   copy[collapseKey] = !copy[collapseKey];
                   return copy;
                 });
               }}>
            <span style={{fontSize: 10, color: "var(--text-muted)"}}>{collapsed ? "▶" : "▼"}</span>
            <span className={_sourcePillClass(srcDef)}>{_sourceDisplayName(srcDef) || sid}</span>
            {srcDef.content_type && <ContentTypePill type={srcDef.content_type}/>}
            {focusedSourceSet[sid] && <span className="api-pill" style={{background: "rgba(211,47,47,.10)", color: "var(--primary)"}}>{t("today.group.focused")}</span>}
            {subLabels.slice(0, 3).map(function (label) { return <span key={label} className="kw-tag">{label}</span>; })}
            <span className="oa-section-title__count">{groupItems.length}</span>
            <span className="news-source-group__meta">{groupItems[0] ? fmtArticleDate(groupItems[0]) : ""}</span>
          </div>
          {!collapsed && (
            <div className="news-grid">
              {groupItems.map(function (it) {
                return <NewsCardCompact key={it.id} item={it} source={srcDef} keyword={keyword}
                                        aiFilterActive={!!aiFilter}
                                        translation={translatedMap[it.id]}
                                        translating={!!translatingIds[it.id]}
                                        onTranslate={translationConfig.enabled === false ? null : onTranslateArticle}/>;
              })}
            </div>
          )}
        </div>
      );
    });
  };

  var renderTimeline = function (list) {
    var grouped = {};
    list.forEach(function (it) {
      var key = fmtArticleTimelineBucket(it);
      if (!grouped[key]) grouped[key] = [];
      grouped[key].push(it);
    });
    var keys = Object.keys(grouped).sort(function (a, b) { return b.localeCompare(a); });
    return (
      <div className="timeline">
        {keys.map(function (key) {
          var groupItems = grouped[key] || [];
          groupItems.sort(function (a, b) {
            return String(articleTime(b)).localeCompare(String(articleTime(a)));
          });
          return (
            <div key={key} className="timeline-slot">
              <div className="timeline-slot__time">
                {key}
                <span className="timeline-slot__meta">{groupItems.length} 条</span>
              </div>
              <div className="timeline-slot__items">
                {groupItems.map(function (it) {
                  var srcDef = sourcesMap[it.source_id] || {id: it.source_id, name: it.source_id, content_type: ""};
                  return (
                    <div key={it.id} style={{position: "relative"}}>
                      <NewsCardCompact item={it} source={srcDef} keyword={keyword}
                                       aiFilterActive={!!aiFilter}
                                       translation={translatedMap[it.id]}
                                       translating={!!translatingIds[it.id]}
                                       onTranslate={translationConfig.enabled === false ? null : onTranslateArticle}/>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
    );
  };

  return (
    <div className="stack-layout">
      {/* Filter bar */}
      <div className="filter-bar filter-bar--news">
        <div className="filter-source-panel">
          <div className="filter-source-panel__head">
            <span className="filter-bar__label">{t("today.filters.source")}</span>
            <div className="filter-source-cats">
              {SOURCE_CATEGORY_KEYS.map(function (cat) {
                return (
                  <button key={cat} type="button"
                          className={"filter-source-cat " + (sourceCategory === cat ? "filter-source-cat--active" : "")}
                          onClick={function () { setSourceCategory(cat); setFocusedSources([]); }}>
                    {t("today.sources.cat." + cat)}
                    <span className="filter-source-cat__count">{sourceCategoryCounts[cat] || 0}</span>
                  </button>
                );
              })}
            </div>
          </div>
          <div className="source-chip-grid source-chip-grid--rail">
            <SourceChip
              source={{display_zh: t("today.filters.source.all"), content_type: "all"}}
              enabled={true}
              active={focusedSources.length === 0}
              showType={false}
              onClick={function () { setFocusedSources([]); }}
            />
            {visibleSourceIds.map(function (sid) {
              var s = sourcesMap[sid] || _legacySourceDefinition(sid);
              var known = sources.some(function (x) { return x.id === sid; });
              var enabled = known ? enabledSources.some(function (x) { return x.id === sid; }) : true;
              return (
                <SourceChip
                  key={sid}
                  source={s}
                  enabled={enabled}
                  active={focusedSources.indexOf(sid) >= 0}
                  title={enabled ? "" : t("today.sources.disabledHint")}
                  onClick={function () {
                    if (!enabled) window.oaToast({level: "warning", message: t("today.sources.disabledHint")});
                    toggleFocusedSource(sid);
                  }}
                />
              );
            })}
          </div>
        </div>
        <div className="filter-bar__row">
          <div className="filter-bar__item">
            <span className="filter-bar__label">{t("today.filters.window")}</span>
            <div className="time-filter-wrap">
              <div className="time-filter-compact">
                {[{h:6,k:"6h"},{h:24,k:"24h"},{h:72,k:"72h"}].map(function (w) {
                  const active = filters.window === w.h;
                  return <button key={w.h} type="button"
                                 className={"seg-btn " + (active ? "active" : "")}
                                 onClick={function () { setCustomTimeOpen(false); setFilters(Object.assign({}, filters, {window: w.h})); }}>
                    {t("today.filters.window." + w.k)}
                  </button>;
                })}
                <button type="button"
                        className={"seg-btn " + (filters.window === "custom" ? "active" : "")}
                        onClick={function () { setFilters(Object.assign({}, filters, {window: "custom"})); setCustomTimeOpen(!customTimeOpen); }}>
                  {t("today.filters.window.custom")}
                </button>
              </div>
              {filters.window === "custom" && customTimeOpen && (
                <div className="custom-time-range" onMouseLeave={function () { setCustomTimeOpen(false); }}>
                  <label className="custom-time-row">
                    <span>{t("today.filters.window.from")}</span>
                    <input className="input" type="datetime-local"
                           value={filters.since || ""}
                           onChange={function (e) { setFilters(Object.assign({}, filters, {since: e.target.value})); }}/>
                  </label>
                  <label className="custom-time-row">
                    <span>{t("today.filters.window.to")}</span>
                    <input className="input" type="datetime-local"
                           value={filters.until || ""}
                           onChange={function (e) { setFilters(Object.assign({}, filters, {until: e.target.value})); }}/>
                  </label>
                </div>
              )}
            </div>
          </div>
          <span className="filter-bar__sep"/>
          <div className="search-box">
            <input type="text"
                   placeholder={t("today.filters.keyword.placeholder")}
                   value={searchDraft}
                   onChange={function (e) { setSearchDraft(e.target.value); }}
                   onKeyDown={function (e) { if (e.key === "Enter") submitSearch(); }}/>
            <button className="btn btn-sm btn-primary btn-icon-round" type="button"
                    title={t("today.filters.search.submit")}
                    onClick={submitSearch}>
              <Ico name="search"/>
            </button>
          </div>
          <button className={"btn btn-sm btn-ai-glow" + (aiFilter ? " btn-primary" : "")} type="button"
                  onClick={function () { aiFilter ? setAiFilter(null) : setAiFilterOpen(true); }}
                  title={aiFilter ? t("today.filters.ai.clear") : ""}>
            <Ico name={aiFilter ? "close" : "magic"}/> {aiFilter ? t("today.filters.ai.clear") : t("today.filters.ai")}
          </button>
          <div className="filter-bar__item">
            <span className="filter-bar__label">{t("today.filters.sortLabel")}</span>
            <div className="seg-group">
              {[{k:"time_desc", icon:"↓"},{k:"time_asc", icon:"↑"}].map(function (s) {
                const active = filters.sort === s.k;
                return <button key={s.k} type="button"
                               className={"seg-btn " + (active ? "active" : "")}
                               onClick={function () { setFilters(Object.assign({}, filters, {sort: s.k})); }}>
                  <span className="sort-pill"><span>{s.icon}</span>{t("today.filters.sort." + s.k)}</span>
                </button>;
              })}
            </div>
          </div>
          <div className="filter-bar__item">
            <span className="filter-bar__label">{t("today.filters.view")}</span>
            <div className="seg-group">
              {["grouped", "timeline"].map(function (mode) {
                return <button key={mode} type="button"
                               className={"seg-btn " + (viewMode === mode ? "active" : "")}
                               onClick={function () { setViewMode(mode); }}>
                  {t("today.filters.view." + mode)}
                </button>;
              })}
            </div>
          </div>
          <span style={{flex: 1}}/>
          <button className="btn btn-sm" type="button"
                  onClick={function () { setFilters({window: 24, sort: "time_desc", since: "", until: ""}); setFocusedSources([]); setSourceCategory("all"); setSearchDraft(""); setKeyword(""); setAiFilter(null); }}>
            <Ico name="refresh"/> {t("today.filters.reset")}
          </button>
          <button className="btn btn-sm" type="button" onClick={function () { setExportOpen(true); }} title={t("today.export.title")}>
            <Ico name="download"/> {t("today.export")}
          </button>
          <span className={"ingest-split " + (menuOpen ? "is-open" : "")}>
            <button className="btn btn-primary" type="button"
                    disabled={ingesting || cooldown > 0}
                    aria-busy={ingesting ? "true" : "false"}
                    onClick={onIngestAll}>
              {ingesting
                ? <span className="fp-spin"><Ico name="refresh"/></span>
                : <Ico name="refresh"/>}
              {" "}
              {ingesting ? t("today.ingest.busy") : cooldown > 0 ? tfmt(t("today.ingest.cooldown"), {s: cooldown}) : t("today.list.ingest.all")}
            </button>
            <button className="btn btn-primary btn--caret" type="button"
                    disabled={ingesting || cooldown > 0}
                    title={t("today.list.ingest.more")}
                    onClick={function () { setMenuOpen(!menuOpen); }}>
              <Ico name="chevronDown"/>
            </button>
            {menuOpen && (
              <div className="ingest-split__menu"
                   onMouseLeave={function () { setMenuOpen(false); }}>
                {enabledSources.map(function (s) {
                  return (
                    <button key={s.id} type="button"
                            disabled={ingesting || cooldown > 0}
                            onClick={function () { setMenuOpen(false); runIngest({sourceId: s.id}); }}>
                      {s.name}
                    </button>
                  );
                })}
              </div>
            )}
          </span>
        </div>
      </div>

      {/* AI filter active indicator */}
      {aiFilter && (
        <div style={{display: "flex", alignItems: "center", gap: 8, padding: "4px 0"}}>
          <span className="api-pill" style={{background: "rgba(211,47,47,.10)", color: "var(--primary)"}}>
            <Ico name="magic"/> {t("today.filters.ai.active")}
          </span>
          <button className="btn btn-sm" onClick={function () { setAiFilter(null); }}>
            {t("today.filters.ai.clear")}
          </button>
        </div>
      )}

      {ingesting && <div className="fp-progress" aria-hidden="true"/>}
      {sourcesLoadError && (
        <div className="oa-config-banner" role="alert" style={{marginTop: 0}}>
          <span className="oa-icon oa-config-banner__icon"><Ico name="warn"/></span>
          <span>{sourcesLoadError}</span>
        </div>
      )}

      {drawerOpen && lastIngest && (
        <IngestDrawer summary={lastIngest} sources={sources.map(function (s) { return {id: s.id, name: s.name}; })}
                      onDismiss={onDismissDrawer} />
      )}

      {/* News list */}
      <div className="card grow">
        <div className="oa-section-title">
          {t("today.list.title")}
          <span className="oa-section-title__count">{displayItems.length}{total > displayItems.length ? " / " + total : ""}</span>
          <span className="oa-section-title__actions">
            <button className="btn btn-sm" type="button" onClick={load}>
              <Ico name="refresh"/> {loading ? t("today.list.loading") : t("today.list.refresh")}
            </button>
          </span>
        </div>
        <div className="card-body">
          {loading && items.length === 0 && <div className="empty">{t("today.list.loading")}</div>}
          {!loading && displayItems.length === 0 && <div className="empty">{t("today.list.empty")}</div>}
          {viewMode === "grouped" ? (
            hasMatchRule ? (
              <div>
                <div className="oa-section-title" style={{marginTop: 0}}>
                  <Ico name="filter"/> {t("today.group.matches")}
                  <span className="oa-section-title__count">{matchedItems.length}</span>
                </div>
                {renderSourceGroups(displayItems, "matched")}
              </div>
            ) : renderSourceGroups(displayItems, "all")
          ) : (
            renderTimeline(displayItems)
          )}
        </div>
      </div>

      {/* AI Filter Dialog */}
      {aiFilterOpen && (
        <AIFilterDialog
          initialInterests={aiFilter ? aiFilter.interests : ""}
          initialKeywords={aiFilter ? aiFilter.keywords : ""}
          initialSentiment={aiFilter ? aiFilter.sentiment : "all"}
          onApply={onApplyAiFilter}
          onClose={function () { setAiFilterOpen(false); }}
        />
      )}
      {exportOpen && (
        <ExportDialog
          currentCount={displayItems.length}
          loadedCount={items.length}
          onExport={onExportConfirm}
          onClose={function () { setExportOpen(false); }}
        />
      )}
      {exportPreview && (
        <ExportPreviewDialog
          report={exportPreview}
          onClose={function () { setExportPreview(null); }}
        />
      )}
    </div>
  );
}

/* ── Digests Tab — daily briefs + preview + resend ─────────────── */
function DigestsTab() {
  const t = useT();
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(false);
  const [selected, setSelected] = useState(null);
  const [previewHtml, setPreviewHtml] = useState("");
  const [running, setRunning] = useState("");
  const [channels, setChannels] = useState([]);
  const [activeSession, setActiveSession] = useState("morning");
  const [sources, setSources] = useState([]);
  const [customOpen, setCustomOpen] = useState(true);
  const [reportConfigs, setReportConfigs] = useState({
    morning: {id: "morning", kind: "builtin", label: "早报", session: "morning", time: "08:00", repeat: "daily", since_hours: 12, top_k: 20, source_ids: [], channel: "", chat_id: "", locked: false, preIngest: false},
    noon: {id: "noon", kind: "builtin", label: "午报", session: "noon", time: "12:30", repeat: "daily", since_hours: 6, top_k: 15, source_ids: [], channel: "", chat_id: "", locked: false, preIngest: false},
    evening: {id: "evening", kind: "builtin", label: "晚报", session: "evening", time: "19:00", repeat: "daily", since_hours: 12, top_k: 20, source_ids: [], channel: "", chat_id: "", locked: false, preIngest: false},
  });
  const [customReports, setCustomReports] = useState([]);
  const [customDraft, setCustomDraft] = useState({title: "自定义财经报表", time: "09:30", repeat: "daily", since_hours: 24, top_k: 20, source_ids: [], channel: "", chat_id: "", preIngest: false});

  const load = useCallback(async function () {
    setLoading(true);
    try {
      const resp = await api("GET", "/digests?limit=50");
      if (resp && resp.ok) setItems(resp.items || []);
    } finally { setLoading(false); }
  }, []);
  const loadChannels = useCallback(async function () {
    const resp = await api("GET", "/scheduler/channels");
    let list = (resp && Array.isArray(resp.channels)) ? resp.channels : [];
    if (!list.length) {
      const fb = await api("GET", "/available-channels");
      const names = (fb && fb.channels) || [];
      list = names.map(function (n) { return { channel_id: String(n), chat_id: "" }; });
    }
    setChannels(normalizeChannels(list));
  }, []);
  const loadSources = useCallback(async function () {
    const resp = await api("GET", "/sources");
    const rawSources = (resp && resp.ok && Array.isArray(resp.items) && resp.items.length) ? resp.items : SOURCE_FALLBACK;
    const mapped = rawSources.map(function (s) {
      return {
        id: String(s.id || ""),
        name: String(s.display_zh || s.display_en || s.name || s.id || ""),
        kind: String(s.kind || ""),
        content_type: String(s.content_type || "news"),
      };
    }).filter(function (s) { return s.id; });
    setSources(mapped);
  }, []);
  const loadPlans = useCallback(async function () {
    const resp = await api("GET", "/report-plans");
    const plans = (resp && resp.plans) || {};
    const nextBuiltins = {};
    ["morning", "noon", "evening"].forEach(function (id) {
      if (plans[id]) nextBuiltins[id] = plans[id];
    });
    if (Object.keys(nextBuiltins).length) {
      setReportConfigs(function (prev) {
        return Object.assign({}, prev, nextBuiltins);
      });
    }
    setCustomReports(Object.keys(plans).filter(function (id) {
      return ["morning", "noon", "evening"].indexOf(id) < 0;
    }).map(function (id) { return plans[id]; }));
  }, []);
  useEffect(function () { load(); loadChannels(); loadPlans(); loadSources(); }, [load, loadChannels, loadPlans, loadSources]);

  const sessionMeta = {
    morning: {icon: "morning", label: t("digests.session.morning"), time: "08:00",
      desc: "开盘/上班前速览：隔夜海外、政策线索、今日市场关注。"},
    noon: {icon: "noonIcon", label: t("digests.session.noon"), time: "12:30",
      desc: "盘中热点更新：新增热点、快讯密度、行业和个股异动。"},
    evening: {icon: "eveningIcon", label: t("digests.session.evening"), time: "19:00",
      desc: "收盘/下班复盘：全天汇总、重点复盘、明日关注方向。"},
  };
  const sourceNameMap = {};
  sources.forEach(function (s) { sourceNameMap[s.id] = s.name; });

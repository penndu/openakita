  var latestBySession = {};
  items.forEach(function (d) {
    if (!latestBySession[d.session]) latestBySession[d.session] = d;
  });

  const selectDigest = useCallback(async function (digest) {
    if (!digest || !digest.id) return;
    setSelected(digest);
    setPreviewHtml("");
    try {
      const resp = await api("GET", "/digests/" + encodeURIComponent(digest.id));
      if (resp && resp.ok && resp.digest) {
        setSelected(resp.digest);
        setPreviewHtml(resp.digest.html_blob || "");
      }
    } catch (_) {}
  }, []);

  const updateReportConfig = function (session, patch) {
    setReportConfigs(function (prev) {
      return Object.assign({}, prev, {[session]: Object.assign({}, prev[session] || {}, patch)});
    });
  };
  const updateCustomReport = function (session, patch) {
    setCustomReports(function (prev) {
      return prev.map(function (r) { return r.session === session ? Object.assign({}, r, patch) : r; });
    });
  };
  const toggleSource = function (cfg, sourceId, onChange) {
    const current = Array.isArray(cfg.source_ids) ? cfg.source_ids : [];
    const exists = current.indexOf(sourceId) >= 0;
    onChange({source_ids: exists ? current.filter(function (id) { return id !== sourceId; }) : current.concat([sourceId])});
  };
  const selectAllSources = function (onChange) {
    onChange({source_ids: sources.map(function (s) { return s.id; })});
  };
  const renderSourcePicker = function (cfg, onChange) {
    const picked = Array.isArray(cfg.source_ids) ? cfg.source_ids : [];
    return (
      <div style={{gridColumn: "1 / -1"}}>
        <div style={{display: "flex", alignItems: "center", gap: 8, marginBottom: 6}}>
          <span className="filter-bar__label">新闻来源</span>
          <span style={{fontSize: 11, color: "var(--text-muted)"}}>{picked.length ? ("已选 " + picked.length) : "全部来源"}</span>
          <span style={{flex: 1}}/>
          <button className="btn btn-sm" type="button" onClick={function (e) { e.stopPropagation(); selectAllSources(onChange); }}>全选</button>
          <button className="btn btn-sm" type="button" onClick={function (e) { e.stopPropagation(); onChange({source_ids: []}); }}>全部来源</button>
        </div>
        <div className="source-chip-grid source-chip-grid--rail" style={{maxHeight: 86}}>
          {sources.map(function (src) {
            const on = picked.indexOf(src.id) >= 0;
            return (
              <button key={src.id} type="button" className={"source-chip " + (on ? "source-chip--active" : "")}
                      onClick={function (e) { e.stopPropagation(); toggleSource(cfg, src.id, onChange); }}>
                <span className="source-chip__dot"/>{src.name}<span className="source-chip__type">{src.content_type}</span>
              </button>
            );
          })}
        </div>
      </div>
    );
  };
  const renderChannelSelect = function (cfg, onChange) {
    const current = channels.find(function (c) {
      return c.channel_id === cfg.channel && (c.chat_id || "") === (cfg.chat_id || "");
    });
    const currentValue = current ? channelKey(current) : "";
    return (
      <label style={{gridColumn: "1 / -1"}}><span className="filter-bar__label">通知通道</span>
        <ChannelPicker
          channels={channels}
          value={currentValue}
          onChange={function (pick) {
            onChange({channel: pick.channel_id || "", chat_id: pick.chat_id || "", chat_name: pick.chat_name || pick.display_name || pick.alias || ""});
          }}/>
      </label>
    );
  };

  const onRun = useCallback(async function (session, cfg) {
    if (running) return;
    setRunning(session);
    try {
      const runCfg = cfg || reportConfigs[session] || customReports.find(function (r) { return r.session === session; }) || reportConfigs.morning;
      const sourceIds = Array.isArray(runCfg.source_ids) ? runCfg.source_ids : [];
      if (runCfg.preIngest) {
        await ingestAndWait(
          "/ingest",
          {since_hours: runCfg.since_hours, sources: sourceIds.length ? sourceIds : undefined},
          { kind: "all" }
        );
      }
      const resp = await api("POST", "/digest/run", {
        session: session,
        title: runCfg.title || "",
        since_hours: runCfg.since_hours,
        top_k: runCfg.top_k,
        source_ids: sourceIds,
        lang: "zh"
      });
      window.oaToast({level: resp && resp.ok ? "success" : "error",
        message: resp && resp.ok ? ("HTML 简报已生成" + (resp.auto_ingested ? "，已自动抓取最新资讯" : "")) : ("failed: " + (resp && resp.detail || ""))});
      await load();
      if (resp && resp.ok && resp.digest && resp.digest.digest_id) {
        selectDigest({
          id: resp.digest.digest_id,
          session: session,
          generated_at: resp.digest.generated_at,
          stats: resp.digest.stats || {}
        });
      }
    } finally { setRunning(""); }
  }, [running, load, reportConfigs, customReports, selectDigest]);

  const planIdFor = function (session, cfg) { return cfg.id || session; };
  const savePlan = useCallback(async function (session, cfg) {
    const planId = planIdFor(session, cfg);
    if (!cfg.channel || !cfg.chat_id) {
      window.oaToast({level: "warning", message: "请选择通知通道"});
      return;
    }
    const resp = await api("PUT", "/report-plans/" + encodeURIComponent(planId), Object.assign({}, cfg, {
      id: planId,
      session: session,
      label: cfg.label || (sessionMeta[session] && sessionMeta[session].label) || cfg.title || "自定义报表",
      title: cfg.title || (sessionMeta[session] && sessionMeta[session].label) || cfg.label || "",
    }));
    if (resp && resp.ok && resp.plan) {
      if (["morning", "noon", "evening"].indexOf(session) >= 0) updateReportConfig(session, resp.plan);
      else updateCustomReport(session, resp.plan);
      window.oaToast({level: "success", message: "报表推送配置已保存并生效"});
      await loadPlans();
    } else {
      window.oaToast({level: "error", message: "保存失败"});
    }
  }, [loadPlans]);
  const unlockPlan = useCallback(async function (session, cfg) {
    const planId = planIdFor(session, cfg);
    const resp = await api("POST", "/report-plans/" + encodeURIComponent(planId) + "/unlock");
    if (resp && resp.ok && resp.plan) {
      if (["morning", "noon", "evening"].indexOf(session) >= 0) updateReportConfig(session, resp.plan);
      else updateCustomReport(session, resp.plan);
    }
  }, []);
  const runPlan = useCallback(async function (session, cfg) {
    const planId = planIdFor(session, cfg);
    setRunning(planId);
    try {
      const resp = await api("POST", "/report-plans/" + encodeURIComponent(planId) + "/run");
      window.oaToast({level: resp && resp.ok ? "success" : "error", message: resp && resp.ok ? "已生成 HTML 报表并推送" : "推送失败"});
      await load();
      await loadPlans();
    } finally { setRunning(""); }
  }, [load, loadPlans]);
  const deleteCustomPlan = useCallback(async function (cfg) {
    const planId = cfg.id || cfg.session;
    const ok = await window.oaConfirm({title: "删除自定义报表计划", message: cfg.label || cfg.title || planId, danger: true, okText: "删除"});
    if (!ok) return;
    const resp = await api("DELETE", "/report-plans/" + encodeURIComponent(planId));
    if (resp && resp.ok) {
      await loadPlans();
      window.oaToast({level: "success", message: "自定义报表计划已删除"});
    }
  }, [loadPlans]);
  const onResend = useCallback(async function (digest) {
    if (!digest || !digest.session) return;
    const cfg = reportConfigs[digest.session] || customReports.find(function (r) { return r.session === digest.session; });
    if (!cfg || !cfg.locked) {
      window.oaToast({level: "warning", message: "该报表还没有保存推送配置"});
      return;
    }
    runPlan(digest.session, cfg);
  }, [reportConfigs, customReports, runPlan]);

  const applySessionDefaults = function (session) {
    setActiveSession(session);
  };
  const addCustomReport = function () {
    const title = String(customDraft.title || "").trim();
    if (!title) {
      window.oaToast({level: "warning", message: "请先填写自定义报表名称"});
      return;
    }
    const session = "custom_" + Date.now();
    setCustomReports(function (prev) {
      return prev.concat([Object.assign({}, customDraft, {
        id: session,
        session: session,
        kind: "custom",
        icon: "customReport",
        label: title,
        locked: false,
        enabled: false,
        name: "fin-pulse custom brief",
      })]);
    });
    setActiveSession(session);
    window.oaToast({level: "success", message: "已添加自定义报表"});
  };
  const previewUrl = selected && selected.id ? "/api/plugins/fin-pulse/digests/" + selected.id + "/html" : "";
  const onDeleteDigest = useCallback(async function (digest) {
    if (!digest || !digest.id) return;
    const ok = await window.oaConfirm({
      title: "删除历史简报",
      message: digest.title || (sessionMeta[digest.session] ? sessionMeta[digest.session].label : digest.session),
      danger: true,
      okText: "删除",
    });
    if (!ok) return;
    const resp = await api("DELETE", "/digests/" + encodeURIComponent(digest.id));
    if (resp && resp.ok) {
      if (selected && selected.id === digest.id) {
        setSelected(null);
        setPreviewHtml("");
      }
      await load();
      window.oaToast({level: "success", message: "历史简报已删除"});
    } else {
      window.oaToast({level: "error", message: "删除失败"});
    }
  }, [load, selected]);
  const downloadPreview = function () {
    if (!previewUrl) return;
    var a = document.createElement("a");
    a.href = previewUrl;
    a.download = "finpulse-" + ((selected && selected.session) || "digest") + ".html";
    a.target = "_blank";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  };
  const renderReportCard = function (session, cfg, custom) {
    var meta = custom ? {icon: cfg.icon || "customReport", label: cfg.label || cfg.title || "自定义报表", time: cfg.time || "09:30", desc: "自定义报表计划：保存后按设定时间自动生成 HTML 报表并推送。"} : sessionMeta[session];
    var latest = latestBySession[session];
    var active = activeSession === session;
    var onCfgChange = custom ? function (patch) { updateCustomReport(session, patch); } : function (patch) { updateReportConfig(session, patch); };
    var sourceSummary = (cfg.source_ids && cfg.source_ids.length) ? cfg.source_ids.slice(0, 3).map(function (id) { return sourceNameMap[id] || id; }).join("、") + (cfg.source_ids.length > 3 ? " 等" : "") : "全部来源";
    var locked = !!cfg.locked;
    var channelLabel = cfg.channel ? formatChannelLabel({channel_id: cfg.channel, chat_id: cfg.chat_id, chat_name: cfg.chat_name}) : "未配置通道";
    var lastResult = cfg.last_result || {};
    var dispatch = lastResult.dispatch || {};
    var dispatchText = dispatch.ok ? ("推送成功 · " + (dispatch.content_kind || lastResult.content_kind || "text")) : (dispatch.errors && dispatch.errors.length ? ("推送失败 · " + dispatch.errors[0]) : "");
    return (
      <div key={session} className={"card report-plan-card" + (locked ? " report-plan-card--locked" : "")}
           style={{margin: 0, borderColor: active ? "rgba(211,47,47,.42)" : "var(--border)", background: active ? "linear-gradient(180deg,#fff,rgba(255,247,247,.72))" : "var(--bg-card)"}}
           onClick={function () { applySessionDefaults(session); }}>
        <div style={{display: "flex", alignItems: "center", gap: 8}}>
          <span className="api-pill" style={{background: "rgba(211,47,47,.10)", color: "var(--primary)"}}><Ico name={meta.icon}/> {meta.label}</span>
          <span style={{marginLeft: "auto", fontSize: 12, color: "var(--text-muted)"}}>{cfg.time || meta.time}</span>
          {locked ? <span className="kw-tag">已锁定生效</span> : <span className="kw-tag">可编辑</span>}
          {custom && <button className="btn btn-sm btn-danger" type="button" onClick={function (e) { e.stopPropagation(); deleteCustomPlan(cfg); }}><Ico name="trash"/></button>}
        </div>
        <div style={{fontSize: 13, color: "var(--text)", lineHeight: 1.5, marginTop: 10}}>{meta.desc}</div>
        <div style={{display: "flex", gap: 6, flexWrap: "wrap", marginTop: 10}}>
          <span className="kw-tag">{cfg.since_hours}h 窗口</span>
          <span className="kw-tag">Top {cfg.top_k}</span>
          <span className="kw-tag">{sourceSummary}</span>
          <span className="kw-tag">{channelLabel}</span>
          {latest ? <span className="kw-tag">最新 {fmtDate(latest.generated_at)}</span> : <span className="kw-tag">待生成</span>}
          {dispatchText ? <span className="kw-tag">{dispatchText}</span> : null}
        </div>
        <div className="card-body" style={{display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, padding: "10px 0 0"}}>
          {custom && (
            <label style={{gridColumn: "1 / -1"}}><span className="filter-bar__label">报表名称</span>
              <input className="input" value={cfg.title || cfg.label || ""}
                     disabled={locked}
                     onChange={function (e) { onCfgChange({title: e.target.value, label: e.target.value}); }}/>
            </label>
          )}
          <label><span className="filter-bar__label">推送时间</span>
            <input className="input" type="time" value={cfg.time || meta.time}
                   disabled={locked}
                   onClick={function (e) { e.stopPropagation(); }}
                   onChange={function (e) { onCfgChange({time: e.target.value}); }}/>
          </label>
          <label><span className="filter-bar__label">重复方式</span>
            <select className="input" value={cfg.repeat || "daily"} disabled={locked}
                    onClick={function (e) { e.stopPropagation(); }}
                    onChange={function (e) { onCfgChange({repeat: e.target.value}); }}>
              <option value="daily">每天</option>
              <option value="weekdays">工作日</option>
              <option value="weekly">每周一</option>
            </select>
          </label>
          <label><span className="filter-bar__label">覆盖时长（小时）</span>
            <input className="input" type="number" min="1" max="72" value={cfg.since_hours}
                   disabled={locked}
                   onClick={function (e) { e.stopPropagation(); }}
                   onChange={function (e) { onCfgChange({since_hours: e.target.value}); }}/>
          </label>
          <label><span className="filter-bar__label">条目数</span>
            <input className="input" type="number" min="1" max="60" value={cfg.top_k}
                   disabled={locked}
                   onClick={function (e) { e.stopPropagation(); }}
                   onChange={function (e) { onCfgChange({top_k: e.target.value}); }}/>
          </label>
          {!locked && renderSourcePicker(cfg, onCfgChange)}
          {!locked && renderChannelSelect(cfg, onCfgChange)}
          <label style={{gridColumn: "1 / -1", display: "flex", alignItems: "center", gap: 8}}>
            <input type="checkbox" checked={!!cfg.preIngest}
                   disabled={locked}
                   onClick={function (e) { e.stopPropagation(); }}
                   onChange={function (e) { onCfgChange({preIngest: e.target.checked}); }}/>
            <span style={{fontSize: 13, color: "var(--text)"}}>强制先抓取最新资讯</span>
          </label>
        </div>
        <div style={{display: "flex", gap: 6, marginTop: 10, flexWrap: "wrap"}}>
          <button className="btn btn-sm btn-primary" disabled={!!running}
                  onClick={function (e) { e.stopPropagation(); applySessionDefaults(session); onRun(session, cfg); }}>
            <Ico name="download"/> {running === session ? t("today.list.loading") : "生成并预览"}
          </button>
          {locked ? (
            <>
              <button className="btn btn-sm" disabled={!!running} onClick={function (e) { e.stopPropagation(); runPlan(session, cfg); }}>
                <Ico name="send"/> 立即推送
              </button>
              <button className="btn btn-sm" onClick={function (e) { e.stopPropagation(); unlockPlan(session, cfg); }}>
                <Ico name="edit"/> 解锁编辑
              </button>
            </>
          ) : (
            <button className="btn btn-sm btn-primary" onClick={function (e) { e.stopPropagation(); savePlan(session, cfg); }}>
              <Ico name="download"/> 保存并生效
            </button>
          )}
          {latest && <button className="btn btn-sm" onClick={function (e) { e.stopPropagation(); selectDigest(latest); }}><Ico name="eye"/> 预览</button>}
        </div>
      </div>
    );
  };

  return (
    <div className="digest-workbench">
      <div className="digest-left">
        <div className="card">
          <div className="oa-section-title">
            {t("digests.title")}工作台
            <span className="oa-section-title__count">{items.length}</span>
          </div>
          <div className="oa-hint">左侧配置时段和任务，右侧实时预览 HTML 报表。生成时如果数据为空或不够新，会自动先抓取一次。</div>
          <div className="card-body" style={{display: "grid", gridTemplateColumns: "1fr", gap: 10}}>
            {["morning", "noon", "evening"].map(function (s) {
              return renderReportCard(s, reportConfigs[s], false);
            })}
          </div>
        </div>

        <div className="card">
          <div className="oa-section-title">
            自定义报表工作台
            <span className="oa-section-title__count">{customReports.length}</span>
          </div>
          <div className="oa-hint" style={{marginBottom: 10}}>把早午晚报的参数全部自定义：名称、覆盖时长、条目数、新闻来源；添加后会成为可生成、可预览、可定时的报表卡片。</div>
          <div className="card-body" style={{display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, paddingTop: 0}}>
            <label style={{gridColumn: "1 / -1"}}><span className="filter-bar__label">报表名称</span>
              <input className="input" value={customDraft.title} onChange={function (e) { setCustomDraft(Object.assign({}, customDraft, {title: e.target.value})); }}/>
            </label>
            <label><span className="filter-bar__label">默认执行时间</span>
              <input className="input" type="time" value={customDraft.time}
                     onChange={function (e) { setCustomDraft(Object.assign({}, customDraft, {time: e.target.value})); }}/>
            </label>
            <label><span className="filter-bar__label">重复方式</span>
              <select className="input" value={customDraft.repeat || "daily"}
                      onChange={function (e) { setCustomDraft(Object.assign({}, customDraft, {repeat: e.target.value})); }}>
                <option value="daily">每天</option>
                <option value="weekdays">工作日</option>
                <option value="weekly">每周一</option>
              </select>
            </label>
            <label><span className="filter-bar__label">覆盖时长（小时）</span>
              <input className="input" type="number" min="1" max="72" value={customDraft.since_hours}
                     onChange={function (e) { setCustomDraft(Object.assign({}, customDraft, {since_hours: e.target.value})); }}/>
            </label>
            <label><span className="filter-bar__label">条目数</span>
              <input className="input" type="number" min="1" max="60" value={customDraft.top_k}
                     onChange={function (e) { setCustomDraft(Object.assign({}, customDraft, {top_k: e.target.value})); }}/>
            </label>
            {renderSourcePicker(customDraft, function (patch) { setCustomDraft(Object.assign({}, customDraft, patch)); })}
            {renderChannelSelect(customDraft, function (patch) { setCustomDraft(Object.assign({}, customDraft, patch)); })}
            <button className="btn btn-sm btn-primary" type="button" style={{gridColumn: "1 / -1"}} onClick={addCustomReport}>
              <Ico name="plus"/> 创建自定义报表计划
            </button>
          </div>
          <div className={"coll" + (customOpen ? " coll--open" : "")} style={{marginTop: 10}}>
            <div className="coll-head" onClick={function () { setCustomOpen(!customOpen); }}>
              <span className="coll-head__arrow">▶</span>
              <span className="coll-head__title">自定义报表计划</span>
              <span className="coll-head__badge">{customReports.length}</span>
            </div>
            {customOpen && (
              <div className="coll-body">
                {!customReports.length ? <div className="empty" style={{padding: 12}}>暂无自定义报表计划</div> : (
                  <div style={{display: "grid", gridTemplateColumns: "1fr", gap: 10}}>
                    {customReports.map(function (r) { return renderReportCard(r.session, r, true); })}
                  </div>
                )}
              </div>
            )}
          </div>
        </div>

        <div className="card">
          <div className="oa-section-title">历史简报 <span className="oa-section-title__count">{items.length}</span></div>
          {loading && items.length === 0 && <div className="empty">{t("today.list.loading")}</div>}
          {!loading && items.length === 0 && <div className="empty">{t("digests.empty")}</div>}
          <div className="digest-history-list">
            {items.map(function (d) {
              var meta = sessionMeta[d.session] || sessionMeta.morning;
              return (
                <div key={d.id} className="card" style={{margin: 0, padding: 10, cursor: "pointer"}}
                     onClick={function () { selectDigest(d); }}>
                  <div style={{display: "flex", alignItems: "center", gap: 6, fontSize: 12}}>
                    <span className="api-pill"><Ico name={meta.icon}/> {meta.label}</span>
                    <span style={{marginLeft: "auto", color: "var(--text-muted)"}}>{fmtDate(d.generated_at)}</span>
                  </div>
                  <div style={{display: "flex", alignItems: "center", gap: 8, marginTop: 8}}>
                    <div style={{flex: 1, minWidth: 0}}>
                      <div style={{fontSize: 13, fontWeight: 700, color: "var(--text)"}}>{d.title || meta.label}</div>
                      <div style={{fontSize: 12, color: "var(--text-muted)"}}>{(d.stats && (d.stats.total_selected || 0)) || 0} {t("digests.items")}</div>
                    </div>
                    <button className="btn btn-sm" onClick={function (e) { e.stopPropagation(); selectDigest(d); }}><Ico name="eye"/></button>
                    <button className="btn btn-sm btn-danger" onClick={function (e) { e.stopPropagation(); onDeleteDigest(d); }}><Ico name="trash"/></button>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      <div className="digest-preview-pane">
        <div className="card grow">
          <div className="oa-section-title">
            HTML 报表即时预览
            {selected && <span className="oa-section-title__count">{sessionMeta[selected.session] ? sessionMeta[selected.session].label : selected.session}</span>}
            <span className="oa-section-title__actions">
              <button className="btn btn-sm" disabled={!selected} onClick={downloadPreview}><Ico name="download"/> 下载 HTML</button>
              <button className="btn btn-sm" disabled={!selected} onClick={function () { selected && copyText(selected.markdown_blob || selected.title || ""); window.oaToast({level: "success", message: t("today.list.copied")}); }}><Ico name="copy"/> 复制摘要</button>
              <button className="btn btn-sm btn-primary" disabled={!selected} onClick={function () { selected && onResend(selected); }}><Ico name="send"/> 再推送</button>
            </span>
          </div>
          {selected ? (
            <iframe className="digest-preview-frame" srcDoc={previewHtml || selected.html_blob || ""} title="digest-preview"/>
          ) : (
            <div className="empty" style={{minHeight: 360, display: "flex", alignItems: "center", justifyContent: "center"}}>
              请选择历史简报，或点击左侧“生成并预览”。
            </div>
          )}
        </div>
      </div>

    </div>
  );
}

/* ── Radar Tab — rule editor + AI suggest + history ──────────── */
const RADAR_TEMPLATE = (
  "+美联储\n" +
  "+降息\n" +
  "!传闻\n" +
  "\n" +
  "+特朗普\n" +
  "+关税\n" +
  "\n" +
  "[GLOBAL_FILTER]\n" +
  "!小道消息\n" +
  "!论坛\n"
);

function RadarTab() {
  const t = useT();
  const [rulesText, setRulesText] = useState("");
  const [hits, setHits] = useState([]);
  const [meta, setMeta] = useState({total: 0, since_hours: 24});
  const [loading, setLoading] = useState(false);
  const [sinceHours, setSinceHours] = useState(24);
  /* AI-suggest modal state */
  const [aiOpen, setAiOpen] = useState(false);
  const [aiDesc, setAiDesc] = useState("");
  const [aiBusy, setAiBusy] = useState(false);
  /* Save-rule naming modal state */
  const [saveOpen, setSaveOpen] = useState(false);
  const [saveName, setSaveName] = useState("");
  /* Rules library (saved presets) */
  const [library, setLibrary] = useState([]);
  const [libOpen, setLibOpen] = useState(false);
  const [channels, setChannels] = useState([]);
  const [sources, setSources] = useState([]);
  const [selectedSourceIds, setSelectedSourceIds] = useState([]);
  const [forceRefresh, setForceRefresh] = useState(false);
  const [radarRepeat, setRadarRepeat] = useState("every15");
  const [radarTime, setRadarTime] = useState("09:00");
  const [radarLocked, setRadarLocked] = useState(false);
  const [radarTargetKey, setRadarTargetKey] = useState("");
  const [pushing, setPushing] = useState(false);
  const [savingRadarPlan, setSavingRadarPlan] = useState(false);
  const [radarResult, setRadarResult] = useState(null);

  /* Preload stored rules + library */
  const loadLibrary = useCallback(async function () {
    const resp = await api("GET", "/radar/library");
    setLibrary((resp && resp.items) || []);
  }, []);
  useEffect(function () {
    (async function () {
      const resp = await api("GET", "/config");
      if (resp && resp.ok) {
        setRulesText(String((resp.config || {})["radar_rules"] || ""));
      }
    })();
    loadLibrary();
  }, [loadLibrary]);
  const loadRadarPlan = useCallback(async function () {
    const resp = await api("GET", "/radar-plan");
    const plan = resp && resp.plan;
    if (!plan) return;
    if (plan.rules_text) setRulesText(String(plan.rules_text || ""));
    setSelectedSourceIds(Array.isArray(plan.source_ids) ? plan.source_ids : []);
    setForceRefresh(!!plan.force_refresh);
    setRadarRepeat(String(plan.repeat || "every15"));
    setRadarTime(String(plan.time || "09:00").slice(0, 5));
    setRadarLocked(!!plan.locked);
    setRadarTargetKey(plan.channel ? (String(plan.channel) + "::" + String(plan.chat_id || "")) : "");
  }, []);
  useEffect(function () { loadRadarPlan().catch(function () {}); }, [loadRadarPlan]);
  useEffect(function () {
    (async function () {
      const resp = await api("GET", "/scheduler/channels");
      let list = (resp && Array.isArray(resp.channels)) ? resp.channels : [];
      if (!list.length) {
        const fb = await api("GET", "/available-channels");
        const names = (fb && fb.channels) || [];
        list = names.map(function (n) { return { channel_id: String(n), chat_id: "" }; });
      }
      list = normalizeChannels(list);
      setChannels(list);
      setRadarTargetKey(function (prev) {
        if (prev) return prev;
        var first = list[0];
        return first ? channelKey(first) : "";
      });
    })();
  }, []);
  useEffect(function () {
    (async function () {
      const resp = await api("GET", "/sources");
      const rawSources = (resp && resp.ok && Array.isArray(resp.items) && resp.items.length) ? resp.items : SOURCE_FALLBACK;
      setSources(rawSources.map(function (s) {
        return {
          id: String(s.id || ""),
          name: String(s.display_zh || s.display_en || s.name || s.id || ""),
          content_type: String(s.content_type || "news"),
        };
      }).filter(function (s) { return s.id; }));
    })();
  }, []);

  const selectedTarget = (function () {
    return channels.find(function (c) {
      return channelKey(c) === radarTargetKey;
    }) || null;
  })();
  const radarSourceMap = {};
  sources.forEach(function (s) { radarSourceMap[s.id] = s; });
  const hitMatchScore = function (h) {
    const terms = Array.isArray(h.matched_terms) ? h.matched_terms.length : 0;
    const ai = Number(h.ai_score || 0);
    return terms * 10 + ai;
  };
  const contentTypeLabel = function (ct) {
    const key = "settings.sources.ct." + (ct || "news");
    const val = t(key);
    return val === key ? (ct || "news") : val;
  };
  const radarGroups = (function () {
    const buckets = {};
    hits.slice().sort(function (a, b) { return hitMatchScore(b) - hitMatchScore(a); }).forEach(function (h) {
      const src = radarSourceMap[h.source_id] || {};
      const ct = h.content_type || src.content_type || "news";
      if (!buckets[ct]) buckets[ct] = [];
      buckets[ct].push(h);
    });
    return Object.keys(buckets).sort(function (a, b) { return buckets[b].length - buckets[a].length; }).map(function (ct) {
      return {type: ct, label: contentTypeLabel(ct), items: buckets[ct]};
    });
  })();
  const topRadarHits = hits.slice().sort(function (a, b) { return hitMatchScore(b) - hitMatchScore(a); }).slice(0, 3);

  const onEvaluate = useCallback(async function () {
    setLoading(true);
    try {
      const resp = await api("POST", "/radar/evaluate", {
        rules_text: rulesText,
        since_hours: sinceHours,
        limit: 100,
        source_ids: selectedSourceIds,
        force_refresh: forceRefresh,
      });
      if (resp && resp.ok) {
        setHits(resp.items || resp.hits || []);
        setMeta({total: (resp.items || resp.hits || []).length, since_hours: sinceHours});
      } else {
        setHits([]);
        window.oaToast({level: "error", message: "evaluate failed: " + (resp && resp.detail || "")});
      }
    } finally { setLoading(false); }
  }, [rulesText, sinceHours, selectedSourceIds, forceRefresh]);

  const onFillTemplate = useCallback(function () {
    setRulesText(function (prev) {
      if (prev && prev.trim()) {
        return prev.replace(/\s*$/, "\n") + "\n" + RADAR_TEMPLATE;
      }
      return RADAR_TEMPLATE;
    });
    window.oaToast({level: "success", message: t("radar.template.filled")});
  }, [t]);

  const onOpenAi = useCallback(function () {
    setAiDesc("");
    setAiOpen(true);
  }, []);

  const onAiRun = useCallback(async function () {
    if (!aiDesc.trim()) return;
    setAiBusy(true);
    try {
      const resp = await api("POST", "/radar/ai-suggest", {
        description: aiDesc, existing: rulesText, lang: "zh",
      });
      if (resp && resp.ok && resp.rules_text) {
        setRulesText(resp.rules_text);
        setAiOpen(false);
        const src = (resp.source === "brain") ? t("radar.ai.source.brain") : t("radar.ai.source.fallback");
        window.oaToast({level: "success", message: tfmt(t("radar.ai.ok"), {source: src})});
      } else {
        window.oaToast({level: "error",
          message: tfmt(t("radar.ai.fail"), {err: (resp && (resp.message || resp.detail || resp.error)) || "unknown"})});
      }
    } finally { setAiBusy(false); }
  }, [aiDesc, rulesText, t]);

  const onOpenSave = useCallback(function () {
    if (!rulesText.trim()) {
      window.oaToast({level: "warning", message: t("radar.save.empty")});
      return;
    }
    setSaveName("");
    setSaveOpen(true);
  }, [rulesText, t]);

  const onSaveConfirm = useCallback(async function () {
    const name = saveName.trim();
    if (!name) return;
    /* 1) persist as the "current" rule so radar runs pick it up */
    await api("PUT", "/config", {updates: {radar_rules: rulesText}});
    /* 2) also push into the library for future recall */
    const resp = await api("POST", "/radar/library", {name: name, rules_text: rulesText});
    if (resp && resp.ok) {
      window.oaToast({level: "success", message: tfmt(t("radar.save.ok"), {name: name})});
      setSaveOpen(false);
      loadLibrary();
    } else {
      window.oaToast({level: "error",
        message: tfmt(t("radar.save.fail"), {err: (resp && (resp.detail || resp.error)) || "unknown"})});
    }
  }, [saveName, rulesText, t, loadLibrary]);

  const onLoadPreset = useCallback(function (entry) {
    setRulesText(entry.rules_text || "");
    setLibOpen(false);
    window.oaToast({level: "success", message: tfmt(t("radar.history.loaded"), {name: entry.name})});
  }, [t]);

  const onDeletePreset = useCallback(async function (entry, e) {
    if (e) e.stopPropagation();
    const ok = await window.oaConfirm({
      title: t("radar.history.delete"),
      message: entry.name,
      danger: true,
      okText: t("radar.history.delete"),
    });
    if (!ok) return;
    await api("DELETE", "/radar/library/" + encodeURIComponent(entry.name));
    loadLibrary();
  }, [t, loadLibrary]);

  const onRunHotRadar = useCallback(async function () {
    if (!rulesText.trim()) {
      window.oaToast({level: "warning", message: t("radar.save.empty")});
      return;
    }
    if (!selectedTarget) {
      window.oaToast({level: "warning", message: "请选择通知通道"});
      return;
    }
    const channel = selectedTarget.channel_id || "";
    const chat_id = selectedTarget.chat_id || "";
    setPushing(true);
    setRadarResult(null);
    try {
      if (!hits.length) await onEvaluate();
      const resp = await api("POST", "/hot_radar/run", {
        rules_text: rulesText,
        targets: [{channel: channel, chat_id: chat_id}],
        since_hours: sinceHours,
        limit: 100,
        source_ids: selectedSourceIds,
        force_refresh: forceRefresh,
        cooldown_s: 600,
        title: "财经脉动雷达预警"
      });
      setRadarResult(resp || {});
      window.oaToast({level: resp && resp.ok ? "success" : "error", message: resp && resp.ok ? "雷达预警已推送" : "预警失败"});
    } finally { setPushing(false); }
  }, [rulesText, selectedTarget, sinceHours, selectedSourceIds, forceRefresh, t, hits.length, onEvaluate]);

  const onSaveRadarPlan = useCallback(async function () {
    if (!rulesText.trim()) {
      window.oaToast({level: "warning", message: t("radar.save.empty")});
      return;
    }
    if (!selectedTarget) {
      window.oaToast({level: "warning", message: "请选择通知通道"});
      return;
    }
    setSavingRadarPlan(true);
    try {
      const resp = await api("PUT", "/radar-plan", {
        rules_text: rulesText,
        since_hours: sinceHours,
        limit: 100,
        source_ids: selectedSourceIds,
        force_refresh: forceRefresh,
        repeat: radarRepeat,
        time: radarTime,
        channel: selectedTarget.channel_id || "",
        chat_id: selectedTarget.chat_id || "",
        chat_name: selectedTarget.chat_name || selectedTarget.display_name || selectedTarget.alias || "",
      });
      if (resp && resp.ok) {
        setRadarLocked(true);
        window.oaToast({level: "success", message: "雷达定时扫描已保存并生效"});
      } else {
        window.oaToast({level: "error", message: "保存失败：" + ((resp && (resp.detail || resp.error)) || "unknown")});
      }
    } finally { setSavingRadarPlan(false); }
  }, [rulesText, selectedTarget, sinceHours, selectedSourceIds, forceRefresh, radarRepeat, radarTime, t]);

  const onUnlockRadarPlan = useCallback(async function () {
    const resp = await api("POST", "/radar-plan/unlock", {});
    if (resp && resp.ok) setRadarLocked(false);
  }, []);

  return (
    <div className="radar-workbench">
      <div className="radar-left">
      <div className="card">
        <div className="oa-section-title">雷达预警工作台</div>
        <div className="oa-hint radar-intro">填写规则、选择窗口和通道后即可试运行或推送；右侧预览独立滚动。</div>
      </div>
      <div className={"card card--compact" + (radarLocked ? " radar-card--locked" : "")}>
        <div className="oa-section-title">
          <span className="radar-title-text">{t("radar.editor.title")}</span>
          {radarLocked ? <span className="radar-locked-badge">已锁定生效</span> : null}
          <span className="oa-section-title__actions">
            <button className="btn btn-sm" type="button" onClick={onFillTemplate} title={t("radar.template.tooltip")}>
              <Ico name="book"/> {t("radar.template")}
            </button>
            <button className="btn btn-sm" type="button" onClick={onOpenAi} title={t("radar.ai.tooltip")}>
              <Ico name="sparkles"/> {t("radar.ai")}
            </button>
            <div style={{position: "relative"}}>
              <button className="btn btn-sm" type="button"
                      onClick={function () { setLibOpen(function (v) { return !v; }); }}
                      title={t("radar.history.tooltip")}>
                <Ico name="folder"/> {t("radar.history")} · {library.length}
              </button>
              {libOpen && (
                <div style={{position: "absolute", top: "calc(100% + 4px)", right: 0, minWidth: 260, maxHeight: 320, overflow: "auto",
                             background: "var(--bg-card)", border: "1px solid var(--border)", borderRadius: 6,
                             boxShadow: "0 6px 16px rgba(0,0,0,.15)", zIndex: 40, padding: 6}}>
                  {library.length === 0 ? (
                    <div className="empty" style={{padding: "12px 8px"}}>{t("radar.history.empty")}</div>
                  ) : (
                    library.map(function (p) {
                      return (
                        <div key={p.name}
                             style={{display: "flex", alignItems: "center", gap: 6, padding: "6px 8px",
                                     borderRadius: 4, cursor: "pointer"}}
                             onMouseEnter={function (e) { e.currentTarget.style.background = "var(--bg-hover)"; }}
                             onMouseLeave={function (e) { e.currentTarget.style.background = "transparent"; }}
                             onClick={function () { onLoadPreset(p); }}>
                          <span style={{flex: 1, minWidth: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
                                        fontSize: 13, color: "var(--text)"}}>{p.name}</span>
                          <span style={{fontSize: 11, color: "var(--text-muted)"}}>
                            {fmtDate(p.saved_at).slice(5, 16)}
                          </span>
                          <button className="btn btn-sm btn-danger"
                                  style={{padding: "2px 6px", fontSize: 11}}
                                  onClick={function (e) { onDeletePreset(p, e); }}>
                            <Ico name="trash"/>
                          </button>
                        </div>
                      );
                    })
                  )}
                </div>
              )}
            </div>
          </span>
        </div>
        <div className="oa-hint radar-rule-help" dangerouslySetInnerHTML={{__html: t("radar.editor.hintHtml")}}/>
        <textarea
          className="input"
          style={{resize: "vertical", fontFamily: "ui-monospace, SFMono-Regular, Menlo, monospace", fontSize: 12, lineHeight: 1.6}}
          value={rulesText}
          disabled={radarLocked}
          onChange={function (e) { setRulesText(e.target.value); }}
          placeholder={RADAR_TEMPLATE}/>
        <div style={{display: "flex", gap: 8, marginTop: 10, alignItems: "center"}}>
          <span style={{fontSize: 11, color: "var(--text-muted)"}}>{t("radar.window")}</span>
          <select className="input" style={{width: 110, padding: "6px 8px"}}
                  value={sinceHours}
                  disabled={radarLocked}
                  onChange={function (e) { setSinceHours(parseInt(e.target.value, 10) || 24); }}>
            <option value={6}>6h</option>
            <option value={24}>24h</option>
            <option value={72}>72h</option>
            <option value={168}>7d</option>
          </select>
          <button className="btn btn-primary" disabled={loading} onClick={onEvaluate}>
            <Ico name="target"/> {loading ? t("radar.evaluate.loading") : t("radar.evaluate")}
          </button>
          <button className="btn" type="button" onClick={onOpenSave}>
            <Ico name="download"/> {t("radar.save.short")}
          </button>
        </div>
      </div>

      <div className={"card radar-exec-card" + (radarLocked ? " radar-card--locked" : "")}>
        <div className="oa-section-title">
          <span className="radar-title-text">预警执行</span>
          {radarLocked ? <span className="radar-locked-badge">定时扫描生效中</span> : null}
          <span className="oa-section-title__actions">
            {radarLocked ? (
              <button className="btn btn-sm" onClick={onUnlockRadarPlan}><Ico name="edit"/> 解锁编辑</button>
            ) : null}
            <button className="btn btn-sm btn-primary" disabled={pushing} onClick={onRunHotRadar}>
              <Ico name="send"/> {pushing ? "推送中…" : "立即预警"}
            </button>
            <button className="btn btn-sm" disabled={savingRadarPlan || radarLocked} onClick={onSaveRadarPlan}>
              <Ico name="bell"/> {savingRadarPlan ? "保存中…" : "保存定时扫描"}
            </button>
          </span>
        </div>
        <div style={{display: "grid", gridTemplateColumns: "1fr", gap: 10}}>
          <label>
            <span className="filter-bar__label">通知通道</span>
            <ChannelPicker
              channels={channels}
              value={radarTargetKey}
              disabled={radarLocked}
              placeholder={channels.length ? "选择 IM 通道" : "暂无可用 IM 通道"}
              onChange={function (_pick, key) { setRadarTargetKey(key); }}/>
          </label>
          <SourcePicker sources={sources} value={selectedSourceIds} onChange={setSelectedSourceIds} maxHeight={58} disabled={radarLocked} label="匹配数据源"/>
          <div style={{display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8}}>
            <label>
              <span className="filter-bar__label">扫描频率</span>
              <select className="input" value={radarRepeat} disabled={radarLocked}
                      onChange={function (e) { setRadarRepeat(e.target.value); }}>
                <option value="every15">每 15 分钟</option>
                <option value="hourly">每小时</option>
                <option value="daily">每天固定时间</option>
              </select>
            </label>
            <label>
              <span className="filter-bar__label">固定时间</span>
              <input className="input" type="time" value={radarTime} disabled={radarLocked || radarRepeat !== "daily"}
                     onChange={function (e) { setRadarTime(e.target.value); }}/>
            </label>
          </div>
          <label className="source-master-switch" style={{justifyContent: "flex-start"}}>
            <input type="checkbox" checked={forceRefresh} disabled={radarLocked}
                   onChange={function (e) { setForceRefresh(e.target.checked); }}/>
            <span>强制拉取最新新闻</span>
            <span style={{color: "var(--text-muted)"}}>最短间隔 5 分钟</span>
          </label>
          <div className="oa-hint radar-intro">立即预警会按所选数据源先验证命中，再直推 IM；定时扫描由 fin-pulse 自己执行，不再创建主程序计划。</div>
          {radarResult && (
            <div className="oa-hint" style={{padding: "8px 10px", background: "var(--bg-hover)", borderRadius: 8}}>
              最近执行：{radarResult.ok ? "成功" : "失败"} · 命中 {((radarResult.result && radarResult.result.hits) || []).length || meta.total || 0} 条
            </div>
          )}
        </div>
      </div>
      </div>

      <div className="radar-right">
      <div className="card grow">
        <div className="oa-section-title">
          {t("radar.hits.title")}
          <span className="oa-section-title__count">{meta.total}</span>
          <span style={{fontSize: 11, color: "var(--text-muted)", fontWeight: 400}}>
            {tfmt(t("radar.hits.subtitle"), {since_hours: meta.since_hours})}
          </span>
        </div>
        <div className="card-body">
          {loading && hits.length === 0 && <div className="empty">{t("radar.evaluate.loading")}</div>}
          {!loading && hits.length === 0 && <div className="empty">{t("radar.hits.empty")}</div>}
          {!!hits.length && (
            <>
              <div className="radar-report-hero">
                <div style={{display: "flex", alignItems: "center", gap: 8}}>
                  <span className="api-pill" style={{background: "rgba(211,47,47,.10)", color: "var(--primary)"}}>
                    <Ico name="radar"/> 雷达命中报表
                  </span>
                  <span style={{marginLeft: "auto", fontSize: 12, color: "var(--text-muted)"}}>按匹配度优先 · 按资讯类型分组</span>
                </div>
                <div className="radar-report-grid">
                  <div className="radar-report-metric"><b>{hits.length}</b><span>命中资讯</span></div>
                  <div className="radar-report-metric"><b>{radarGroups.length}</b><span>资讯类型</span></div>
                  <div className="radar-report-metric"><b>{meta.since_hours}h</b><span>扫描窗口</span></div>
                </div>
                {!!topRadarHits.length && (
                  <div style={{marginTop: 12}}>
                    <div style={{fontSize: 12, fontWeight: 700, color: "var(--text)", marginBottom: 6}}>最高匹配度 Top 3</div>
                    {topRadarHits.map(function (h, idx) {
                      const src = radarSourceMap[h.source_id] || {};
                      return (
                        <div key={"top-" + (h.id || h.url || idx)} style={{fontSize: 12, color: "var(--text)", lineHeight: 1.6}}>
                          {idx + 1}. {h.title} <span style={{color: "var(--text-muted)"}}>· {src.name || h.source_id} · 匹配 {hitMatchScore(h).toFixed(1)}</span>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
              {radarGroups.map(function (group) {
                return (
                  <section key={group.type} className="radar-report-section">
                    <div className="oa-section-title" style={{marginBottom: 4}}>
                      {group.label}
                      <span className="oa-section-title__count">{group.items.length}</span>
                    </div>
                    {group.items.map(function (h) {
                      const src = radarSourceMap[h.source_id] || {};
                      const terms = Array.isArray(h.matched_terms) ? h.matched_terms : [];
                      return (
                        <div key={h.id || h.url} className="radar-hit-card">

/* ── CodeBlock — render preformatted command snippets with a copy
   button. Strips markdown code fences (``` ... ```) and unescapes
   ``\n`` so the NewsNow docker snippet renders as real lines.  */
function CodeBlock(props) {
  const raw = String(props.text || "");
  let cleaned = raw.replace(/\\n/g, "\n");
  cleaned = cleaned.replace(/^\s*>\s?/gm, "");
  cleaned = cleaned.replace(/```[a-zA-Z0-9_-]*\n?/g, "").replace(/```\s*$/g, "");
  cleaned = cleaned.trim();
  const onCopy = function () {
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(cleaned);
      } else {
        const ta = document.createElement("textarea");
        ta.value = cleaned;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
      }
      window.oaToast({level: "success", message: _i18n.t("ask.copied")});
    } catch (_) {}
  };
  return (
    <div className="fp-codeblock">
      <pre>{cleaned}</pre>
      <button className="btn btn-sm fp-codeblock__copy" type="button" onClick={onCopy}>
        <Ico name="copy"/> Copy
      </button>
    </div>
  );
}

/* ── ScheduleDialog — modal form mirroring the host "新建任务" layout
   (see Image-3 spec) so users can create a fin-pulse scheduled task
   entirely in-plugin. Every submission goes through the fin-pulse
   /schedules route which delegates to the host Agent Scheduler, so the
   underlying rows still live alongside other host-managed schedules —
   we just skip the redirect hand-off. */
const SCHEDULE_TEMPLATES = {
  morning:  {mode: "daily_brief", session: "morning", time: "08:00", repeat: "daily",    since_hours: 12, top_k: 20, name: "fin-pulse morning brief"},
  noon:     {mode: "daily_brief", session: "noon",    time: "12:30", repeat: "daily",    since_hours: 6,  top_k: 15, name: "fin-pulse noon brief"},
  evening:  {mode: "daily_brief", session: "evening", time: "19:00", repeat: "daily",    since_hours: 12, top_k: 20, name: "fin-pulse evening brief"},
  radar:    {mode: "hot_radar",                       time: "09:00", repeat: "every15", since_hours: 24, limit: 100, cooldown_s: 600, name: "fin-pulse radar alert"},
};

function scheduleCronFromForm(timeValue, repeatValue) {
  var time = String(timeValue || "09:00");
  var parts = time.split(":");
  var hour = Math.max(0, Math.min(23, parseInt(parts[0] || "9", 10) || 9));
  var minute = Math.max(0, Math.min(59, parseInt(parts[1] || "0", 10) || 0));
  if (repeatValue === "every15") return "*/15 * * * *";
  if (repeatValue === "hourly") return minute + " * * * *";
  if (repeatValue === "weekdays") return minute + " " + hour + " * * 1-5";
  if (repeatValue === "weekly") return minute + " " + hour + " * * 1";
  return minute + " " + hour + " * * *";
}

function scheduleRepeatLabel(value) {
  return ({
    daily: "每天",
    weekdays: "工作日",
    weekly: "每周一",
    hourly: "每小时",
    every15: "每 15 分钟",
  })[value] || value;
}

function ScheduleDialog(props) {
  const t = useT();
  const tpl = props.template || "morning";
  const preset = Object.assign({}, SCHEDULE_TEMPLATES[tpl] || SCHEDULE_TEMPLATES.morning, props.config || {});
  const channels = normalizeChannels(props.channels || []);
  const firstChannel = channels[0] || {};
  const [form, setForm] = useState({
    name: preset.name,
    time: preset.time || "09:00",
    repeat: preset.repeat || "daily",
    channel: firstChannel.channel_id || "",
    chat_id: firstChannel.chat_id || "",
    rules_text: tpl === "radar" ? (props.defaultRulesText || "+美联储") : "",
    enabled: true,
  });
  const [submitting, setSubmitting] = useState(false);

  const update = function (key, val) {
    setForm(function (prev) { return Object.assign({}, prev, {[key]: val}); });
  };

  const onSubmit = async function () {
    if (submitting) return;
    if (!form.name.trim()) {
      window.oaToast({level: "warning", message: t("settings.schedules.dialog.name")});
      return;
    }
    if (!form.channel || !form.chat_id) {
      window.oaToast({level: "warning", message: t("settings.schedules.dialog.no_channel")});
      return;
    }
    setSubmitting(true);
    try {
      const body = {
        mode: preset.mode,
        name: form.name.trim(),
        cron: scheduleCronFromForm(form.time, form.repeat),
        repeat: form.repeat,
        channel: form.channel,
        chat_id: form.chat_id,
        enabled: !!form.enabled,
      };
      if (preset.mode === "daily_brief") {
        body.session = preset.session;
        body.since_hours = preset.since_hours;
        body.top_k = preset.top_k;
        body.title = preset.title || preset.label || "";
        body.source_ids = Array.isArray(preset.source_ids) ? preset.source_ids : [];
        body.lang = "zh";
      } else {
        body.rules_text = form.rules_text || "";
        body.since_hours = preset.since_hours;
        body.limit = preset.limit;
        body.cooldown_s = preset.cooldown_s;
      }
      const resp = await api("POST", "/schedules", body);
      if (resp && resp.ok) {
        window.oaToast({level: "success", message: "scheduled " + (resp.id || "")});
        props.onDone && props.onDone(true);
      } else {
        window.oaToast({level: "error", message: "failed: " + ((resp && resp.detail) || "")});
      }
    } finally { setSubmitting(false); }
  };

  const hasChannels = channels.length > 0;
  const titleLabel = (props.config && (props.config.label || props.config.title)) || t("settings.schedules.tpl." + tpl);
  const selectedChannelValue = (function () {
    var idx = channels.findIndex(function (c) { return c.channel_id === form.channel && (c.chat_id || "") === (form.chat_id || ""); });
    if (idx < 0) return "";
    var pick = channels[idx];
    return channelKey(pick);
  })();
  const channelLabel = (function () {
    const pick = channels.find(function (c) { return c.channel_id === form.channel && (c.chat_id || "") === (form.chat_id || ""); });
    if (!pick) return "—";
    return formatChannelLabel(pick);
  })();
  const cronPreview = scheduleCronFromForm(form.time, form.repeat);
  const typeLabel = preset.mode === "daily_brief"
    ? t("settings.schedules.dialog.type.digest")
    : t("settings.schedules.dialog.type.radar");

  return (
    <div className="confirm-mask" onClick={function () { props.onDone && props.onDone(false); }}>
      <div className="confirm-dialog" style={{maxWidth: 620, width: "92vw"}} onClick={function (e) { e.stopPropagation(); }}>
        <div className="card-title" style={{marginBottom: 12}}>
          {tfmt(t("settings.schedules.dialog.title"), {template: titleLabel})}
        </div>
        <div style={{display: "flex", flexDirection: "column", gap: 12}}>
          <label style={{display: "flex", flexDirection: "column", gap: 4}}>
            <span style={{fontSize: 12, color: "var(--text)", fontWeight: 600}}>{t("settings.schedules.dialog.name")}</span>
            <input className="input" value={form.name} onChange={function (e) { update("name", e.target.value); }} placeholder={preset.name}/>
          </label>
          <div style={{display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10}}>
            <div style={{display: "flex", flexDirection: "column", gap: 4}}>
              <span style={{fontSize: 12, color: "var(--text)", fontWeight: 600}}>{t("settings.schedules.dialog.type")}</span>
              <div className="input" style={{background: "var(--bg-subtle, rgba(0,0,0,.03))", cursor: "not-allowed"}}>{typeLabel}</div>
            </div>
            <label style={{display: "flex", flexDirection: "column", gap: 4}}>
              <span style={{fontSize: 12, color: "var(--text)", fontWeight: 600}}>执行时间点</span>
              <input className="input" type="time" value={form.time}
                     disabled={form.repeat === "every15"}
                     onChange={function (e) { update("time", e.target.value); }}/>
            </label>
          </div>
          <div style={{display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10}}>
            <label style={{display: "flex", flexDirection: "column", gap: 4}}>
              <span style={{fontSize: 12, color: "var(--text)", fontWeight: 600}}>重复方式</span>
              <select className="input" value={form.repeat} onChange={function (e) { update("repeat", e.target.value); }}>
                {preset.mode === "hot_radar" ? (
                  <>
                    <option value="every15">每 15 分钟</option>
                    <option value="hourly">每小时</option>
                    <option value="daily">每天固定时间</option>
                  </>
                ) : (
                  <>
                    <option value="daily">每天</option>
                    <option value="weekdays">工作日</option>
                    <option value="weekly">每周一</option>
                  </>
                )}
              </select>
            </label>
            <label style={{display: "flex", flexDirection: "column", gap: 4}}>
              <span style={{fontSize: 12, color: "var(--text)", fontWeight: 600}}>通知通道</span>
              <ChannelPicker
                channels={channels}
                value={selectedChannelValue}
                disabled={!hasChannels}
                placeholder={hasChannels ? "选择一个 IM 通道" : t("settings.schedules.dialog.no_channel")}
                onChange={function (pick) {
                  setForm(function (prev) {
                    return Object.assign({}, prev, {channel: pick.channel_id || "", chat_id: pick.chat_id || ""});
                  });
                }}/>
            </label>
          </div>
          {preset.mode === "hot_radar" && (
            <label style={{display: "flex", flexDirection: "column", gap: 4}}>
              <span style={{fontSize: 12, color: "var(--text)", fontWeight: 600}}>{t("settings.schedules.dialog.rules")}</span>
              <textarea className="input" rows={3} value={form.rules_text}
                        onChange={function (e) { update("rules_text", e.target.value); }}/>
            </label>
          )}
          <div style={{display: "flex", flexDirection: "column", gap: 4}}>
            <span style={{fontSize: 12, color: "var(--text)", fontWeight: 600}}>计划预览</span>
            <div className="oa-hint" style={{fontSize: 12, padding: "8px 10px", background: "var(--bg-subtle, rgba(0,0,0,.03))", borderRadius: 6, color: "var(--text)"}}>
              {form.name || preset.name} · {scheduleRepeatLabel(form.repeat)} · {form.repeat === "every15" ? "自动滚动扫描" : form.time} · {preset.since_hours || 24}h · Top {preset.top_k || preset.limit || 20} · {(preset.source_ids || []).length ? (preset.source_ids.length + " 个来源") : "全部来源"} · 写入主程序计划接口 · {channelLabel} · cron: {cronPreview}
            </div>
          </div>
          <label style={{display: "flex", alignItems: "center", gap: 8, userSelect: "none"}}>
            <input type="checkbox" checked={!!form.enabled}
                   onChange={function (e) { update("enabled", e.target.checked); }}/>
            <span style={{fontSize: 13, color: "var(--text)"}}>{t("settings.schedules.dialog.enabled")}</span>
          </label>
        </div>
        <div className="confirm-actions" style={{marginTop: 16}}>
          <button className="btn btn-sm" onClick={function () { props.onDone && props.onDone(false); }}>
            {t("settings.schedules.dialog.cancel")}
          </button>
          <button className="btn btn-sm btn-primary" disabled={submitting || !hasChannels} onClick={onSubmit}>
            {t("settings.schedules.dialog.create")}
          </button>
        </div>
      </div>
    </div>
  );
}

const SOURCE_CATEGORY_KEYS = ["all", "realtime", "news", "rank", "policy_data", "other"];

const LEGACY_SOURCE_DEFS = {
  xueqiu: {id: "xueqiu", display_zh: "雪球", display_en: "Xueqiu", kind: "newsnow", content_type: "hot_stock", group: "newsnow", fetcher_id: "newsnow", probe_target: "newsnow", default_enabled: true},
  newsnow: {id: "newsnow", display_zh: "NewsNow 聚合", display_en: "NewsNow", kind: "newsnow", content_type: "news", group: "newsnow", fetcher_id: "newsnow", probe_target: "newsnow", default_enabled: true}
};

function _sourceDisplayName(s) {
  if (!s) return "";
  var legacy = LEGACY_SOURCE_DEFS[s.id || ""];
  return s.display_zh || s.display_en || s.name || (legacy && legacy.display_zh) || s.id || "";
}

function _sourceTypeLabel(s, t) {
  if (!s) return "";
  var ct = s.content_type || "";
  if (ct && ct !== "all") return t("settings.sources.ct." + ct) || ct;
  var cat = _sourceCategoryKey(s);
  return cat && cat !== "all" ? (t("today.sources.cat." + cat) || cat) : "";
}

function _legacySourceDefinition(sourceId) {
  var legacy = LEGACY_SOURCE_DEFS[sourceId || ""];
  if (legacy) return Object.assign({}, legacy);
  return {id: sourceId, display_zh: sourceId, name: sourceId, content_type: "other", group: "other"};
}

function _sourceCategoryKey(s) {
  var id = String((s && s.id) || "");
  var newsnowId = String((s && s.newsnow_id) || "");
  var ct = String((s && s.content_type) || "");
  if (ct === "flash") return "realtime";
  if (ct === "hot_stock" || /(^|-)hot($|-)/.test(id) || ["baidu", "weibo", "zhihu", "toutiao", "bilibili"].indexOf(newsnowId) >= 0) return "rank";
  if (ct === "policy" || ct === "data" || ct === "filing") return "policy_data";
  if (ct === "news") return "news";
  return "other";
}

function _probeSummaryLabel(summary, t) {
  var totals = (summary && summary.totals) || {};
  var fetched = Number(totals.fetched || totals.received || 0);
  var inserted = Number(totals.inserted || 0);
  var updated = Number(totals.updated || 0);
  if (fetched + inserted + updated <= 0) {
    var by = (summary && summary.by_source) || {};
    Object.keys(by).forEach(function (k) {
      var r = by[k] || {};
      fetched += Number(r.fetched || r.received || 0);
      inserted += Number(r.inserted || 0);
      updated += Number(r.updated || 0);
    });
  }
  return tfmt(t("settings.sources.probe.summary"), {
    fetched: fetched,
    inserted: inserted,
    updated: updated,
  });
}

function _parseCustomFeedsFromConfig(cfg) {
  var rawJson = String((cfg && cfg["rss_generic.feeds_json"]) || "").trim();
  if (rawJson) {
    try {
      var parsed = JSON.parse(rawJson);
      if (Array.isArray(parsed)) {
        return parsed.map(function (entry, i) {
          if (typeof entry === "string") return {id: "cf_" + i, url: entry, name: entry, enabled: true};
          return {
            id: String((entry && entry.id) || ("cf_" + i)),
            url: String((entry && entry.url) || ""),
            name: String((entry && entry.name) || (entry && entry.url) || ""),
            enabled: entry && entry.enabled === false ? false : true,
          };
        }).filter(function (f) { return f.url; });
      }
    } catch (_) {}
  }
  var feedsRaw = String((cfg && cfg["rss_generic.feeds"]) || "");
  return feedsRaw.split("\n").map(function (l) { return l.trim(); }).filter(Boolean).map(function (url, i) {
    return {id: "cf_" + i, url: url, name: url.length > 50 ? url.substring(0, 47) + "…" : url, enabled: true};
  });
}

function _customFeedDisplayName(f, idx) {
  var name = String((f && f.name) || "").trim();
  var url = String((f && f.url) || "").trim();
  if (name && name !== url) return name;
  try {
    var u = new URL(url);
    var q = u.searchParams.get("q");
    if (q) return "Bing: " + decodeURIComponent(q.replace(/\+/g, " "));
    return u.hostname || ("RSS " + (idx + 1));
  } catch (_) {
    return name || ("RSS " + (idx + 1));
  }
}

function SourceChip(props) {

  var enabled = props.enabled !== false;

  var cls = "source-chip " + (enabled ? "source-chip--on" : "source-chip--off") + (active ? " source-chip--active" : "");

    <button type="button" className={cls} onClick={props.onClick} title={props.title || _sourceDisplayName(s)}>
      <span className="source-chip__dot"/>

}

function CustomSourceDialog(props) {

        <div className="custom-source-dialog__mode">

                  onClick={function () { setMode("custom"); setValue(""); }}>

          <button className={"btn btn-sm " + (mode === "bing" ? "btn-primary" : "")}

            {t("settings.sources.custom.dialog.mode.bing")}

        </div>

          <div className="ai-dialog__label">{t("settings.sources.custom.name")}</div>
          <input className="input" value={name} placeholder={namePlaceholder}

        </div>
        <div className="ai-dialog__field">
          <div className="ai-dialog__label">{mode === "bing" ? t("settings.sources.custom.bing.title") : t("settings.sources.custom.url")}</div>
          <input className="input" value={value} placeholder={placeholder}

          <button className="btn btn-sm btn-primary" disabled={!canSave}

                      enabled: true,
                    });

            {t("settings.sources.custom.save")}

}

function SourceRow(props) {
  var s = props.source;
  var t = useT();
  var enabled = props.enabled;
  var probeState = props.probeState;
  var lastError = props.lastError;

  var dotClass = "source-dot source-dot--unknown";

}

/* ── Settings Form ── */

function SettingsForm(props) {
  const t = useT();
  const [config, setConfig] = useState({});
  const [loaded, setLoaded] = useState(false);
  const [savingKey, setSavingKey] = useState("");

  const [allSources, setAllSources] = useState([]);
  const [probeStates, setProbeStates] = useState({});
  const [probeLabels, setProbeLabels] = useState({});
  const [probingIds, setProbingIds] = useState({});

  const [customFeeds, setCustomFeeds] = useState([]);
  const [customDialogOpen, setCustomDialogOpen] = useState(false);
  // Compatibility for older hot-loaded settings render functions.
  // The inline add forms were replaced by CustomSourceDialog, but keeping
  // these state slots prevents stale closures from throwing during refresh.
  const [bingKeywords, setBingKeywords] = useState("");
  const [addingCustom, setAddingCustom] = useState(false);
  const [newCustomName, setNewCustomName] = useState("");
  const [newCustomUrl, setNewCustomUrl] = useState("");
  const [customProbing, setCustomProbing] = useState({});
  const [customProbeLabels, setCustomProbeLabels] = useState({});

  const reloadAll = useCallback(async function (opts) {
    const silent = !!(opts && opts.silent);
    const [cfg, srcResp] = await Promise.all([
      api("GET", "/config"),
      api("GET", "/sources"),
    ]);
    var cfgData = (cfg && cfg.config) || {};
    setConfig(cfgData);
    if (srcResp && srcResp.ok && Array.isArray(srcResp.items) && srcResp.items.length) {
      setAllSources(srcResp.items);
    } else {
      setAllSources(SOURCE_FALLBACK);
    }
    setCustomFeeds(_parseCustomFeedsFromConfig(cfgData));
    setLoaded(true);
    if (!silent) return;
  }, []);
  useEffect(function () { reloadAll(); }, [reloadAll]);

  const setCfgField = function (key, value) {
    setConfig(function (prev) { return Object.assign({}, prev, {[key]: value}); });
  };
  const persist = useCallback(async function (updates) {
    const resp = await api("PUT", "/config", {updates: updates});
    if (resp && resp.ok) {
      window.oaToast({level: "success", message: t("settings.saved")});
    } else {
      window.oaToast({level: "error", message: "save failed"});
    }
  }, [t]);


  /* ── Source toggle ── */
  const onToggleSource = useCallback(async function (sid) {
    var key = "source." + sid + ".enabled";
    var cur = config[key];
    var next = cur === false || cur === "false" ? true : (cur === undefined ? false : !cur);
    setCfgField(key, next);
    await persist({[key]: String(next)});
  }, [config, persist]);

  /* ── Source probe ── */
  const onProbeSource = useCallback(async function (sid) {
    var srcDef = allSources.find(function (s) { return s.id === sid; });
    var isNewsNow = srcDef && srcDef.kind === "newsnow";
    var endpoint = "/ingest/source/" + encodeURIComponent(sid);
    setProbingIds(function (p) { return Object.assign({}, p, {[sid]: true}); });
    try {
      var resp = await ingestAndWait(endpoint, null, { kind: "single" });
      if (resp && resp.ok) {
        setProbeStates(function (p) { return Object.assign({}, p, {[sid]: "ok"}); });
        setProbeLabels(function (p) { return Object.assign({}, p, {[sid]: _probeSummaryLabel(resp.summary, t)}); });
      } else {
        setProbeStates(function (p) { return Object.assign({}, p, {[sid]: "err"}); });
        setProbeLabels(function (p) { return Object.assign({}, p, {[sid]: t("settings.sources.probe.fail")}); });
      }
    } catch (_) {
      setProbeStates(function (p) { return Object.assign({}, p, {[sid]: "err"}); });
      setProbeLabels(function (p) { return Object.assign({}, p, {[sid]: t("settings.sources.probe.fail")}); });
    } finally {
      setProbingIds(function (p) { return Object.assign({}, p, {[sid]: false}); });
    }
  }, [t, allSources]);

  const onProbeSourceGroup = useCallback(async function (key, sources) {
    setProbingIds(function (p) { return Object.assign({}, p, {[key]: true}); });
    try {
      var payload = key === "newsnow" ? null : {sources: sources.map(function (s) { return s.fetcher_id || s.id; })};
      var resp = await ingestAndWait(
        key === "newsnow" ? "/ingest/source/newsnow" : "/ingest",
        payload,
        { kind: "all" }
      );
      if (resp && resp.ok) {
        setProbeStates(function (p) { return Object.assign({}, p, {[key]: "ok"}); });
        setProbeLabels(function (p) { return Object.assign({}, p, {[key]: _probeSummaryLabel(resp.summary, t)}); });
      } else {
        setProbeStates(function (p) { return Object.assign({}, p, {[key]: "err"}); });
        setProbeLabels(function (p) { return Object.assign({}, p, {[key]: t("settings.sources.probe.fail")}); });
      }
    } catch (_) {
      setProbeStates(function (p) { return Object.assign({}, p, {[key]: "err"}); });
      setProbeLabels(function (p) { return Object.assign({}, p, {[key]: t("settings.sources.probe.fail")}); });
    } finally {
      setProbingIds(function (p) { return Object.assign({}, p, {[key]: false}); });
    }
  }, [t]);

  /* ── Custom feed helpers ── */
  const persistCustomFeeds = useCallback(async function (feeds) {
    var urls = feeds.map(function (f) { return f.url; });
    await persist({
      "rss_generic.feeds": urls.join("\n"),
      "rss_generic.feeds_json": JSON.stringify(feeds.map(function (f) {
        return {name: f.name || f.url, url: f.url, enabled: f.enabled !== false};
      })),
    });
    setCustomFeeds(feeds);
  }, [persist]);

  const onSaveCustomFeed = useCallback(async function (feed) {
    if (!feed || !feed.url) return;
    var next = customFeeds.concat([feed]);
    await persistCustomFeeds(next);
    setCustomDialogOpen(false);
    window.oaToast({level: "success", message: t("settings.saved")});
  }, [customFeeds, persistCustomFeeds, t]);

  const onDeleteCustom = useCallback(async function (idx) {
    var next = customFeeds.filter(function (_, i) { return i !== idx; });
    await persistCustomFeeds(next);
  }, [customFeeds, persistCustomFeeds, t]);

  const onProbeCustom = useCallback(async function (url, idx) {
    setCustomProbing(function (p) { return Object.assign({}, p, {[idx]: true}); });
    try {
      var resp = await api("POST", "/sources/probe-rss", {url: url});
      if (resp && resp.ok) {
        setCustomProbeLabels(function (p) { return Object.assign({}, p, {[idx]: tfmt(t("settings.sources.probe.ok"), {n: resp.count || 0})}); });
      } else {
        setCustomProbeLabels(function (p) { return Object.assign({}, p, {[idx]: t("settings.sources.probe.fail")}); });
      }
    } catch (_) {
      setCustomProbeLabels(function (p) { return Object.assign({}, p, {[idx]: t("settings.sources.probe.fail")}); });
    } finally {
      setCustomProbing(function (p) { return Object.assign({}, p, {[idx]: false}); });
    }
  }, [t]);

  const onProbeAllCustom = useCallback(async function () {
    if (!customFeeds.length) return;
    setCustomProbing(function (p) { return Object.assign({}, p, {all: true}); });
    try {
      var okCount = 0;
      var total = customFeeds.length;
      var nextLabels = {};
      for (var i = 0; i < customFeeds.length; i += 1) {
        var feed = customFeeds[i];
        var resp = await api("POST", "/sources/probe-rss", {url: feed.url});
        if (resp && resp.ok) {
          okCount += 1;
          nextLabels[i] = tfmt(t("settings.sources.probe.ok"), {n: resp.count || 0});
        } else {
          nextLabels[i] = t("settings.sources.probe.fail");
        }
      }
      setCustomProbeLabels(nextLabels);
      setProbeLabels(function (p) { return Object.assign({}, p, {custom_rss: okCount + "/" + total + " OK"}); });
      setProbeStates(function (p) { return Object.assign({}, p, {custom_rss: okCount > 0 ? "ok" : "err"}); });
    } finally {
      setCustomProbing(function (p) { return Object.assign({}, p, {all: false}); });
    }
  }, [customFeeds, t]);

  if (!loaded) return <div className="card"><div className="empty">{t("today.list.loading")}</div></div>;

  /* Classify sources */
  var directSources = allSources.filter(function (s) {
    return s.group === "direct" || s.group === "builtin_rss" ||
      ((s.kind === "direct" || s.kind === "rss") && s.id !== "rss_generic");
  });
  var newsnowSources = allSources.filter(function (s) { return s.kind === "newsnow"; });
  var rssGenericSource = allSources.find(function (s) { return s.id === "rss_generic"; }) || {
    id: "rss_generic", display_zh: t("settings.sources.cat.custom"), content_type: "custom", group: "custom_rss", default_enabled: true
  };

  var isEnabled = function (sid) {
    var v = config["source." + sid + ".enabled"];
    if (v === undefined || v === null || v === "") {
      var def = allSources.find(function (s) { return s.id === sid; });
      return def ? !!def.default_enabled : true;
    }
    return v !== false && v !== "false";
  };

  var rawNewsnowMode = config["newsnow.mode"];
  var newsnowMode = (rawNewsnowMode && String(rawNewsnowMode)) || "public";
  if (newsnowMode !== "off" && newsnowMode !== "public") newsnowMode = "public";
  var rawMinInterval = parseInt(config["newsnow.min_interval_s"] || "300", 10);
  var newsnowFloor = (isNaN(rawMinInterval) ? 300 : Math.max(
    newsnowMode === "public" ? NEWSNOW_PUBLIC_MIN_INTERVAL_S : 0,
    rawMinInterval
  ));

  return (
    <div>
      {/* ════════ Data Source Management ════════ */}
      <div className="card" style={{padding: "16px 14px"}}>
        <div className="oa-settings-section">
          <div className="oa-settings-section__title">{t("settings.sources.title")}</div>

          {/* Category 1: Direct & RSS */}
          <Collapsible
            title={t("settings.sources.cat.direct")}
            badge={tfmt(t("settings.sources.count"), {n: directSources.length})}
            defaultOpen={true}>
            <div className="source-chip-grid">
              {directSources.map(function (s) {
                return (
                  <SourceChip
                    key={s.id}
                    source={s}
                    enabled={isEnabled(s.id)}
                    onClick={function () { onToggleSource(s.id); }}
                    title={(isEnabled(s.id) ? "" : t("settings.sources.disabled.hint") + "\n") + (s.homepage || "") + (config["source." + s.id + ".last_error"] ? "\n" + config["source." + s.id + ".last_error"] : "")}
                  />
                );
              })}
            </div>
            <div className="source-panel-actions">
              <button className="btn btn-sm" disabled={!!probingIds.direct_rss}
                      onClick={function () { onProbeSourceGroup("direct_rss", directSources); }}>
                <Ico name="refresh"/> {probingIds.direct_rss ? t("settings.sources.probing") : t("settings.sources.probe.direct")}
              </button>
              {probeLabels.direct_rss && (
                <span style={{fontSize: 11, color: probeStates.direct_rss === "ok" ? "var(--success)" : "var(--danger)"}}>
                  {probeLabels.direct_rss}
                </span>
              )}
            </div>
          </Collapsible>

          {/* Category 2: Custom sources */}
          <Collapsible
            title={t("settings.sources.cat.custom")}
            badge={tfmt(t("settings.sources.count"), {n: customFeeds.length})}
            defaultOpen={false}>
            <div className="source-subsection">
              <div className="source-subsection__head">
                <div className="source-subsection__title">{t("settings.sources.custom.listTitle")}</div>
                <div className="source-subsection__actions">
                  <button className="source-master-switch" type="button"
                          onClick={function () { onToggleSource("rss_generic"); }}
                          title={t("settings.sources.rss.master")}>
                    <ToggleSwitch on={isEnabled("rss_generic")} onChange={function (e) { e.stopPropagation(); onToggleSource("rss_generic"); }}/>
                    <span>{t("settings.sources.custom.listTitle")}</span>
                  </button>
                  <button className="btn btn-sm" disabled={!customFeeds.length || !!customProbing.all}
                          onClick={onProbeAllCustom}>
                    <Ico name="refresh"/> {customProbing.all ? t("settings.sources.probing") : t("settings.sources.probe.custom")}
                  </button>
                  {probeLabels.custom_rss && (
                    <span style={{fontSize: 11, color: probeStates.custom_rss === "ok" ? "var(--success)" : "var(--danger)"}}>
                      {probeLabels.custom_rss}
                    </span>
                  )}
                  <button className="btn btn-sm" onClick={function () { setCustomDialogOpen(true); }}>
                    {t("settings.sources.custom.add")}
                  </button>
                </div>
              </div>
              {customFeeds.length === 0 ? (
                <div className="empty" style={{padding: "10px 0"}}>{t("settings.sources.custom.empty")}</div>
              ) : (
                <div className="source-chip-grid" style={{marginTop: 8}}>
                {customFeeds.map(function (f, idx) {
                  return (
                    <div key={f.id} className="source-chip" title={f.url}>
                      <span className="source-chip__dot"/>
                      <span>{_customFeedDisplayName(f, idx)}</span>
                      <span className="source-chip__type">RSS</span>
                      <span className="source-chip__type" title={f.url}>链接</span>
                      {customProbeLabels[idx] && (
                        <span style={{fontSize: 11, color: customProbeLabels[idx].indexOf("OK") >= 0 || customProbeLabels[idx].indexOf("可用") >= 0 ? "var(--success)" : "var(--danger)"}}>
                          {customProbeLabels[idx]}
                        </span>
                      )}
                      <button className="btn btn-sm" title={t("settings.sources.custom.delete")}
                              onClick={function (e) { e.stopPropagation(); onDeleteCustom(idx); }}>
                        ×
                      </button>
                    </div>
                  );
                })}
                </div>
              )}
            </div>

            {customDialogOpen && (
              <CustomSourceDialog
                onSave={onSaveCustomFeed}
                onClose={function () { setCustomDialogOpen(false); }}
              />
            )}
          </Collapsible>

          {/* Category 3: NewsNow aggregated */}
          <Collapsible
            title={t("settings.sources.cat.newsnow")}
            badge={tfmt(t("settings.sources.count"), {n: newsnowSources.length})}
            defaultOpen={false}>
            <div style={{display: "flex", alignItems: "center", gap: 10, marginBottom: 10, flexWrap: "wrap"}}>
              <label className="switch-row">
                <ToggleSwitch
                  on={newsnowMode === "public"}
                  onChange={function () {
                    var next = newsnowMode === "public" ? "off" : "public";
                    setCfgField("newsnow.mode", next);
                    if (next === "public") {
                      setCfgField("newsnow.api_url", NEWSNOW_PUBLIC_URL);
                      setCfgField("newsnow.min_interval_s", String(Math.max(newsnowFloor, NEWSNOW_PUBLIC_MIN_INTERVAL_S)));
                    }
                    persist(next === "public"
                      ? {"newsnow.mode": next, "newsnow.api_url": NEWSNOW_PUBLIC_URL, "newsnow.min_interval_s": String(Math.max(newsnowFloor, NEWSNOW_PUBLIC_MIN_INTERVAL_S))}
                      : {"newsnow.mode": next});
                  }}
                />
                <span>{t("settings.sources.nn.mode")}</span>
              </label>
              <span className={"api-pill " + (newsnowMode === "public" ? "" : "api-pill--missing")}>
                {t("settings.newsnow.mode." + newsnowMode)}

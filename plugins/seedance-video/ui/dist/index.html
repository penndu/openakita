  <style>
    :root {

    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
    .app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    .header { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; border-bottom: 1px solid var(--border); background: var(--bg-card); }

    .header-icon { width: 36px; height: 36px; flex-shrink: 0; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 6px rgba(67,56,202,.25); }

    .content { flex: 1; min-height: 0; overflow: hidden; padding: 20px; position: relative; }

    .tab-pane { display: none; height: 100%; min-height: 0; }

    .btn-danger { color: var(--danger); border-color: var(--danger); }

    .label { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; color: var(--text); margin: 0 0 8px; line-height: 1.3; }

    .form-row { margin-bottom: 14px; }
    .flex { display: flex; } .gap-2 { gap: 8px; } .gap-3 { gap: 12px; } .gap-4 { gap: 16px; }
    .items-center { align-items: center; } .justify-between { justify-content: space-between; }
    .flex-1 { flex: 1; } .flex-wrap { flex-wrap: wrap; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .text-sm { font-size: 13px; } .text-xs { font-size: 11px; }

    .tag-green { background: rgba(34,197,94,.15); color: #4ade80; }
    .tag-red { background: rgba(239,68,68,.15); color: #f87171; }
    .tag-gray { background: rgba(148,163,184,.15); color: #94a3b8; }

    .mode-btn:hover { background: var(--bg-hover); color: var(--text); }
    .mode-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .ratio-btn { min-width: 56px; height: 40px; padding: 0 12px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500; transition: all .15s; color: var(--text-muted); background: var(--bg-card); user-select: none; }
    .ratio-btn:hover { border-color: var(--primary); color: var(--text); }
    .ratio-btn.active { border-color: var(--primary); color: var(--primary); background: rgba(59,130,246,.10); font-weight: 600; box-shadow: 0 0 0 1px var(--primary) inset; }

    .slider-wrap input[type=range] { flex: 1; accent-color: var(--primary); }
    .slider-val { min-width: 40px; text-align: center; font-size: 14px; font-weight: 600; color: var(--primary); }
    .switch { position: relative; width: 36px; height: 20px; border-radius: 10px; background: var(--border); cursor: pointer; transition: .2s; }
    .switch.on { background: var(--primary); }
    .switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; border-radius: 50%; background: #fff; transition: .2s; }
    .switch.on::after { left: 18px; }
    .upload-stack { display: flex; flex-direction: column; gap: 10px; }
    .upload-zone {
      position: relative; overflow: hidden;
      border: 1.5px dashed rgba(59,130,246,.30);
      border-radius: 12px;
      padding: 18px;
      min-height: 112px;
      display: flex; align-items: center; justify-content: center;
      text-align: center; cursor: pointer; transition: .18s ease;
      color: var(--text-muted);

        radial-gradient(circle at top left, rgba(59,130,246,.10), transparent 36%),
        linear-gradient(135deg, rgba(59,130,246,.035), rgba(99,102,241,.025));
    }
    .upload-zone::before {
      content: ""; position: absolute; inset: 6px;
      border: 1px solid rgba(59,130,246,.06);
      border-radius: 9px; pointer-events: none;
    }
    .upload-zone:hover,
    .upload-zone.drag-over {
      border-color: var(--primary);
      background:
        radial-gradient(circle at top left, rgba(59,130,246,.16), transparent 38%),
        linear-gradient(135deg, rgba(59,130,246,.08), rgba(99,102,241,.05));
      box-shadow: 0 8px 22px rgba(59,130,246,.10);
      transform: translateY(-1px);

      min-height: 86px;
      border-style: solid;
      border-color: rgba(59,130,246,.22);

    .upload-zone__body { position: relative; z-index: 1; display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; }
    .upload-zone__icon {
      width: 42px; height: 42px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      color: var(--primary);
      background: rgba(59,130,246,.12);
      box-shadow: inset 0 0 0 1px rgba(59,130,246,.12);
      flex-shrink: 0; font-weight: 700;
    }
    .upload-zone__text { min-width: 0; text-align: left; }
    .upload-zone__title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
    .upload-zone__hint { font-size: 11px; color: var(--text-dim); line-height: 1.45; }
    .upload-zone__action { font-size: 11px; color: var(--primary); margin-top: 5px; font-weight: 500; }
    .upload-list { display: flex; flex-direction: column; gap: 8px; }

      display: flex; align-items: center; gap: 10px;
      padding: 10px; border-radius: 12px;
      border: 1px solid rgba(34,197,94,.26);

    }

      width: 56px; height: 46px; border-radius: 10px;
      overflow: hidden; flex-shrink: 0;
      background: rgba(59,130,246,.10);

      display: flex; align-items: center; justify-content: center;
      border: 1px solid rgba(59,130,246,.12);
      font-size: 12px; font-weight: 700;
    }
    .upload-asset__thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .upload-asset__main { min-width: 0; flex: 1; }
    .upload-asset__name { display: flex; align-items: center; gap: 5px; min-width: 0; font-size: 12px; font-weight: 600; color: var(--text); }
    .upload-asset__name-text { overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .upload-asset__meta { margin-top: 3px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; font-size: 11px; color: var(--text-muted); }
    .upload-pill { display: inline-flex; align-items: center; gap: 4px; padding: 1px 7px; border-radius: 999px; background: rgba(59,130,246,.10); color: var(--primary); font-weight: 500; }
    .upload-asset__remove { flex-shrink: 0; padding: 4px 9px; }
    .upload-error {
      display: flex; align-items: flex-start; gap: 6px;
      padding: 8px 10px; border-radius: 8px;
      background: rgba(239,68,68,.08);
      color: var(--danger); font-size: 12px;
      border: 1px solid rgba(239,68,68,.22);
    }
    .assets-toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
    .assets-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(178px, 1fr));
      gap: 14px;
    }
    .asset-card {
      overflow: hidden; padding: 0; border-radius: 14px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      box-shadow: 0 1px 2px rgba(15,23,42,.04);
      transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease;
    }

      transform: translateY(-2px);
      border-color: rgba(59,130,246,.35);
      box-shadow: 0 12px 28px rgba(15,23,42,.10);
    }
    .asset-preview {
      position: relative;
      width: 100%; aspect-ratio: 4 / 3;
      background:
        linear-gradient(135deg, rgba(59,130,246,.08), rgba(99,102,241,.04)),
        var(--bg);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-dim);
      overflow: hidden;
    }
    .asset-preview img,
    .asset-preview video {
      width: 100%; height: 100%; object-fit: cover; display: block;

      font-size: 22px;
    }

    }
    .asset-body { padding: 10px; }
    .asset-name {
      font-size: 12px; font-weight: 600; color: var(--text);
      overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
      margin-bottom: 4px;
    }
    .asset-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; font-size: 11px; color: var(--text-muted); }
    .asset-actions { display: flex; gap: 6px; margin-top: 10px; }
    .asset-actions .btn { flex: 1; justify-content: center; }
    .asset-picker { width: min(960px, 96vw) !important; max-width: min(960px, 96vw) !important; max-height: 86vh; display: flex; flex-direction: column; padding: 0; overflow: hidden; }

    .asset-picker__title { font-size: 15px; font-weight: 650; color: var(--text); }

    .asset-picker__item { text-align: left; cursor: pointer; }
    .asset-picker__item.is-disabled { cursor: not-allowed; opacity: .58; }

    .asset-picker__item .asset-body { padding: 8px; }
    .asset-picker__item .asset-actions { margin-top: 8px; }

    .split-right { flex: 1; min-width: 0; overflow-y: auto; }

    // second time through directFetch, creating two identical Ark jobs.

function sanitizeDownloadFilename(name) {
  var leaf = String(name || "download").split(/[\\/]/).pop() || "download";
  leaf = leaf.replace(/[<>:"/\\|?*\x00-\x1F]/g, "_").replace(/[ .]+$/g, "");
  if (!leaf) leaf = "download";
  var stem = leaf.split(".")[0].toUpperCase();
  if (/^(CON|PRN|AUX|NUL|COM[1-9]|LPT[1-9])$/.test(stem)) leaf = "_" + leaf;

// Strategy:
//   1) Prefer bridge:download → Tauri's reqwest → user's Downloads folder.
//      This gives the best UX (absolute path toast + "reveal in folder").
//   2) On *any* bridge failure (timeout, host-side reqwest error, packaged
//      Windows builds where Defender/AV/system-proxy blocks the Rust process
//      from reaching 127.0.0.1 even though the iframe's fetch() to the same
//      origin works fine), fall back to in-iframe `fetch` + Blob URL +
//      `<a download>`. The iframe is loaded from the same origin as the
//      backend, so this path bypasses the host's HTTP stack entirely.

      a.href = objUrl;
      a.download = fname;
      a.style.display = "none";
      document.body.appendChild(a);
      a.click();
      setTimeout(function() {
        try { document.body.removeChild(a); } catch (_) {}

              + String((err && err.message) || err

      showToast(_bt("bridge.download.fail", { msg: msg }, "Download failed: {msg}"), "error");
    });

  if (_inIframe && _bridgeConnected) {
    var id = uid();
    _pending[id] = {
      resolve: function(payload) {
        if (payload && payload.ok && payload.path && /[\\/]/.test(String(payload.path))) {
          showToast(_bt("bridge.download.ok", { path: payload.path }, "Saved to: {path}"), "success");
          return;
        }
        fallbackToBlob(payload && payload.error);
      },
      reject: function(err) { fallbackToBlob(String(err)); },
    };
    var payload = { url: resolvedUrl, filename: fname };
    if (localPath) payload.localPath = localPath;
    post({ type: "bridge:download", requestId: id, payload: payload });
    return;
  }

  if (window.__TAURI_INTERNALS__) {
    if (localPath) {
      window.__TAURI_INTERNALS__.invoke("copy_file_to_downloads", { path: localPath, filename: fname })
        .then(function(path) { showToast(_bt("bridge.download.ok", { path: path }, "Saved to: {path}"), "success"); })
        .catch(function(err) { showToast(_bt("bridge.download.fail", { msg: err }, "Download failed: {msg}"), "error"); });
      return;
    }
    window.__TAURI_INTERNALS__.invoke("download_file", { url: resolvedUrl, filename: fname })
      .then(function(path) { showToast(_bt("bridge.download.ok", { path: path }, "Saved to: {path}"), "success"); })
      .catch(function(err) { fallbackToBlob(String(err)); });
    return;
  }

  var a = document.createElement("a");
  a.href = resolvedUrl;
  a.download = fname;
  a.style.display = "none";
  document.body.appendChild(a);
  a.click();
  setTimeout(function() { document.body.removeChild(a); }, 300);
  showToast(_bt("bridge.download.started", null, "Download started"), "success");
}

function AssetPickerModal({ open, allowedKinds = ["image"], disabledKinds = [], onCancel, onSelect }) {
  const t = useT();
  const [assets, setAssets] = useState([]);
  const [loading, setLoading] = useState(false);
  const [selectingId, setSelectingId] = useState("");
  const disabledSet = new Set(disabledKinds);

  const load = useCallback(async () => {
    if (!open) return;
    setLoading(true);
    try {
      const responses = await Promise.all(allowedKinds.map(kind => pluginApi("GET", `/assets?type=${encodeURIComponent(kind)}`)));
      const merged = [];
      responses.forEach(r => {
        if (Array.isArray(r.body?.assets)) merged.push(...r.body.assets);
      });
      const seen = new Set();
      setAssets(merged.filter(a => {
        if (!a.id || seen.has(a.id)) return false;
        seen.add(a.id);
        return true;
      }));
    } catch (e) {
      showToast(_tr("assetPicker.loadFail", { msg: e?.message || String(e) }), "error");
      setAssets([]);
    }
    setLoading(false);
  }, [open, allowedKinds.join("|")]);

  useEffect(() => { load(); }, [load]);

  const renderPreview = (a) => {
    const url = a.preview_url || "";
    if (url && a.type === "image") return <img src={url} alt={a.original_name || a.id} loading="lazy" />;
    if (url && a.type === "video") return <video src={url} muted preload="metadata" />;
    if (url && a.type === "audio") return <audio src={url} controls preload="metadata" />;
    return (
      <div className="asset-preview__fallback" title={t("assets.preview.noPreview")}>
        {{image:<Ico name="image"/>,video:<Ico name="film"/>,audio:<Ico name="music"/>}[a.type] || <Ico name="folder"/>}
      </div>
    );
  };

  const handleSelect = async (a) => {
    if (disabledSet.has(a.type)) {
      showToast(t("assetPicker.videoDisabled"), "warning");
      return;
    }
    setSelectingId(a.id);
    try {
      const r = await pluginApi("GET", `/assets/${encodeURIComponent(a.id)}/payload`);
      if (!r.ok || !r.body?.ok || !r.body?.base64) {
        throw new Error(r.body?.detail || r.body?.error || `HTTP ${r.status || "?"}`);
      }
      onSelect({
        name: r.body.original_name || a.original_name || a.id,
        base64: r.body.base64,
        asset: r.body.asset || a,
        size: r.body.size_bytes || a.size_bytes,
        kind: r.body.kind || a.type,
      });
    } catch (e) {
      showToast(_tr("assetPicker.loadFail", { msg: e?.message || String(e) }), "error");

// ── In-plugin folder picker ──────────────────────────────────────────
// Tauri's native folder dialog has been unreliable across capability/
// version combinations and the host bridge silently swallows failures.
// To guarantee that "Select" always works, we render our own folder
// browser modal backed by /storage/list-dir + /storage/mkdir. No bridge,
// no Tauri dialog plugin — pure plugin backend + React.
function FolderPickerModal({ open, title, initialPath, onCancel, onSelect }) {
  const t = useT();
  const [path, setPath] = useState("");
  const [items, setItems] = useState([]);
  const [parent, setParent] = useState(null);
  const [isAnchor, setIsAnchor] = useState(true);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [newFolderMode, setNewFolderMode] = useState(false);
  const [newFolderName, setNewFolderName] = useState("");
  const newFolderInputRef = useRef(null);

  // Load anchors initially; if the user passed an initialPath try to
  // navigate straight there. Failing that (path doesn't exist), fall
  // back to anchors so the modal is never empty.
  const load = useCallback(async (p) => {
    setLoading(true);
    setError(null);
    try {
      const qs = p ? `?path=${encodeURIComponent(p)}` : "";
      const r = await pluginApi("GET", `/storage/list-dir${qs}`);
      if (r.ok && r.body?.ok) {
        setPath(r.body.path || "");
        setParent(r.body.parent || null);
        setItems(r.body.items || []);
        setIsAnchor(!!r.body.is_anchor);
      } else {
        setError(r.body?.detail || `HTTP ${r.status || "?"}`);
        // Fall back to anchors so the user can still navigate.
        if (p) {
          const r2 = await pluginApi("GET", `/storage/list-dir`);
          if (r2.ok && r2.body?.ok) {
            setPath("");
            setParent(null);
            setItems(r2.body.items || []);
            setIsAnchor(true);
          }
        }
      }
    } catch (e) {
      setError(String(e && e.message || e));
    }
    setLoading(false);
  }, []);

  useEffect(() => {
    if (!open) return;
    setNewFolderMode(false);
    setNewFolderName("");
    load(initialPath || "");
  }, [open, initialPath, load]);

  useEffect(() => {
    if (newFolderMode && newFolderInputRef.current) {
      newFolderInputRef.current.focus();
    }
  }, [newFolderMode]);

  const handleNavigate = (p) => {
    setNewFolderMode(false);
    load(p);
  };

  const handleCreate = async () => {
    const name = (newFolderName || "").trim();
    if (!name || !path) return;
    try {
      const r = await pluginApi("POST", "/storage/mkdir", { parent: path, name });
      if (r.ok && r.body?.ok) {
        showToast(_tr("picker.created", { name }));
        setNewFolderMode(false);
        setNewFolderName("");
        await load(path);
      } else {
        showToast(_tr("picker.error.create", { msg: r.body?.detail || "" }), "error");
      }
    } catch (e) {
      showToast(_tr("picker.error.create", { msg: String(e && e.message || e) }), "error");
    }
  };

  // Build breadcrumb segments from `path`. Handles both Windows
  // ("C:\Users\Foo") and Unix ("/home/foo") layouts. Each segment is
  // clickable and navigates to the cumulative path.
  const crumbs = (() => {
    if (!path) return [];
    const norm = path.replace(/\\/g, "/");
    const parts = norm.split("/").filter(Boolean);
    const out = [];
    if (norm.startsWith("/")) {
      out.push({ name: "/", path: "/" });
      let acc = "";
      for (const seg of parts) {
        acc += "/" + seg;
        out.push({ name: seg, path: acc });
      }
    } else if (parts[0] && /^[A-Za-z]:$/.test(parts[0])) {
      out.push({ name: parts[0], path: parts[0] + "/" });
      let acc = parts[0];
      for (let i = 1; i < parts.length; i++) {
        acc += "/" + parts[i];
        out.push({ name: parts[i], path: acc });
      }
    } else {
      out.push({ name: path, path });
    }
    return out;
  })();

  if (!open) return null;
  return (
    <div className="modal-mask" onClick={onCancel}>
      <div className="modal-card folder-picker" onClick={e => e.stopPropagation()}>
        <div className="folder-picker__head">
          <div className="folder-picker__title">{title || t("picker.title")}</div>
          <div className="folder-picker__crumbs">
            <span
              className="folder-picker__crumb"
              onClick={() => handleNavigate("")}
              title={t("picker.crumb.root")}
            ><Ico name="folderOpen"/></span>
            {crumbs.map((c, i) => (
              <React.Fragment key={i}>
                <span className="folder-picker__crumb-sep">/</span>
                <span
                  className="folder-picker__crumb"
                  onClick={() => handleNavigate(c.path)}
                  title={c.path}
                >{c.name}</span>
              </React.Fragment>
            ))}
          </div>
        </div>

        {error && (
          <div className="folder-picker__error">{_tr("picker.error.load", { msg: error })}</div>
        )}

        <div className="folder-picker__body">
          <div className="folder-picker__sidebar">
            <div className="folder-picker__shortcut" onClick={() => handleNavigate("")}>
              <Ico name="folder"/>{t("picker.shortcut.start")}
            </div>
          </div>
          <div className="folder-picker__list">
            {loading && <div className="folder-picker__empty">{t("picker.loading")}</div>}
            {!loading && !isAnchor && parent != null && (
              <div className="folder-picker__item" onClick={() => handleNavigate(parent)}>
                <span className="folder-picker__item-icon">↰</span>
                <span className="folder-picker__item-name">..</span>
              </div>
            )}
            {!loading && items.length === 0 && (
              <div className="folder-picker__empty">{t("picker.empty")}</div>
            )}
            {!loading && items.map((it) => (
              <div
                key={it.path}
                className="folder-picker__item"
                onClick={() => handleNavigate(it.path)}
                title={it.path}
              >
                <span className="folder-picker__item-icon"><Ico name="folder"/></span>
                <span className="folder-picker__item-name">{it.name}</span>
              </div>
            ))}
          </div>
        </div>

        <div className="folder-picker__foot">
          {newFolderMode ? (
            <>
              <input
                ref={newFolderInputRef}
                className="folder-picker__newinput"
                value={newFolderName}
                onChange={e => setNewFolderName(e.target.value)}
                onKeyDown={e => {
                  if (e.key === "Enter") handleCreate();
                  if (e.key === "Escape") { setNewFolderMode(false); setNewFolderName(""); }
                }}
                placeholder={t("picker.newFolder.placeholder")}
              />
              <button className="btn btn-sm" onClick={() => { setNewFolderMode(false); setNewFolderName(""); }}>{t("picker.btn.cancel")}</button>
              <button className="btn btn-sm btn-primary" disabled={!newFolderName.trim()} onClick={handleCreate}>{t("picker.btn.confirmCreate")}</button>
            </>
          ) : (
            <>
              <span className="folder-picker__current" title={path}>{path || ""}</span>
              <button
                className="btn btn-sm"
                disabled={!path || isAnchor}
                onClick={() => setNewFolderMode(true)}
              >{t("picker.btn.newFolder")}</button>
              <button className="btn btn-sm" onClick={onCancel}>{t("picker.btn.cancel")}</button>
              <button
                className="btn btn-sm btn-primary"
                disabled={!path || isAnchor}
                onClick={() => onSelect(path)}
              >{t("picker.btn.choose")}</button>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// Mode/Tab labels are i18n keys; resolved via t() at render time so locale
// changes re-render correctly. Order is part of the UI contract — never sort.
const MODE_IDS = ["t2v", "i2v", "i2v_end", "multimodal", "edit", "extend", "transition"];
const RATIOS = ["21:9", "16:9", "4:3", "1:1", "3:4", "9:16"];
const TAB_IDS = ["create", "storyboard", "tasks", "assets", "guide", "settings"];
const TAB_ICONS = { create: "squarePlus", tasks: "listTodo", assets: "images", guide: "compass", storyboard: "layoutGrid", settings: "sliders" };

// ── Hooks ──
function useModels() {
  const [models, setModels] = useState([]);
  useEffect(() => {
    pluginApi("GET", "/models").then(r => r.body?.models && setModels(r.body.models)).catch(() => {});
  }, []);
  return models;
}

function useTasks() {
  const [tasks, setTasks] = useState([]);
  const [total, setTotal] = useState(0);
  const load = useCallback((params = {}) => {
    const q = new URLSearchParams(params).toString();
    pluginApi("GET", `/tasks?${q}`).then(r => {
      if (r.body?.tasks) { setTasks(r.body.tasks); setTotal(r.body.total); }
    }).catch(() => {});
  }, []);
  useEffect(() => { load(); }, []);
  useEffect(() => {
    onEvent("plugin:seedance-video:task_update", () => load());
  }, []);
  useEffect(() => {
    var hasRunning = tasks.some(t => t.status === "running" || t.status === "pending");
    if (!hasRunning) return;
    var timer = setInterval(() => load(), 10000);
    return () => clearInterval(timer);
  }, [tasks]);
  return { tasks, total, reload: load };
}

// ── Components ──

function _formatSize(n) {
  if (!n && n !== 0) return "";
  if (n < 1024) return n + " B";
  if (n < 1024 * 1024) return (n / 1024).toFixed(1) + " KB";
  return (n / 1024 / 1024).toFixed(1) + " MB";
}

function _assetKind(asset) {
  const kind = (asset?.kind || "").toLowerCase();
  const name = (asset?.name || "").toLowerCase();
  if (kind.includes("image") || /\.(png|jpe?g|webp|gif|bmp)$/i.test(name)) return "image";
  if (kind.includes("video") || /\.(mp4|mov|webm|mkv)$/i.test(name)) return "video";
  if (kind.includes("audio") || /\.(mp3|wav|m4a|aac|ogg)$/i.test(name)) return "audio";
  return "file";
}

function _assetKindLabel(kind) {
  return _tr("create.upload.type." + kind, null, kind);
}

// Sprint 8 / V1 — `value` (single asset summary or array for multiple
// mode) and `onRemove(index?)` let the parent component own the actual
// upload state.  Without this, CreateTab couldn't remember WHICH file
// the user just uploaded, and modes like i2v/edit/extend silently
// submitted with no `content[].image_url` — the bug report's "其他功能
// 都用不了".
function FileUploadZone({ id, accept, multiple, onUpload, label, hint, value, onRemove, onPickFromLibrary, libraryLabel }) {
  const t = useT();
  const [uploading, setUploading] = useState(false);
  const [pendingName, setPendingName] = useState("");
  const [dragOver, setDragOver] = useState(false);
  const [localError, setLocalError] = useState("");

  const handleFiles = async (files) => {
    if (!files || files.length === 0) return;
    setUploading(true);
    setLocalError("");
    for (const file of files) {
      setPendingName(file.name);
      try {
        const err = await onUpload(file);
        // Convention: onUpload may return a string error message (handled
        // by the dropzone here) or null/undefined on success.
        if (typeof err === "string" && err) setLocalError(err);
      } catch (e) {
        setLocalError(e?.message || _tr("toast.uploadFail", null, "Upload failed"));
      }
    }
    setUploading(false);
    setPendingName("");
  };

  const summarized = (() => {
    if (!value) return [];
    return Array.isArray(value) ? value : [value];
  })();

  const filled = summarized.length > 0;
  const uploadTitle = uploading
    ? t("create.upload.uploading", { name: pendingName })
    : filled && !multiple
      ? _tr("create.upload.replace", null, "Click or drop to replace")
      : multiple && filled
        ? _tr("create.upload.addMore", null, "Add more assets")
        : label;
  const uploadHint = filled && !multiple
    ? _tr("create.upload.replaceAction", null, "Click or drop to replace the current asset")
    : hint || _tr("create.upload.dropAction", null, "Click to choose, or drop a file here");

  return (
    <div className="upload-stack">
      {summarized.length > 0 && (
        <div className="upload-list">
          {summarized.map((v, i) => {
            const kind = _assetKind(v);
            const canPreview = kind === "image" && v.base64;
            return (
              <div key={i} className="upload-asset">
                <div className="upload-asset__thumb">
                  {canPreview
                    ? <img src={v.base64} alt="" />
                    : <span>{kind === "video" ? "VID" : kind === "audio" ? "AUD" : "FILE"}</span>}
                </div>
                <div className="upload-asset__main">
                  <div className="upload-asset__name">
                    <Ico name="check" style={{color:"var(--success)"}} />
                    <span className="upload-asset__name-text">{v.name}</span>
                  </div>
                  <div className="upload-asset__meta">
                    <span className="upload-pill">{_assetKindLabel(kind)}</span>
                    <span>{_formatSize(v.size)}</span>
                    {v.asset?.id && <span>ID: {v.asset.id}</span>}
                  </div>
                </div>
                {onRemove && (
                  <button type="button" className="btn btn-sm upload-asset__remove"
                    onClick={(e) => { e.stopPropagation(); onRemove(multiple ? i : undefined); }}>
                    {_tr("create.upload.remove", null, "Remove")}
                  </button>
                )}
              </div>
            );
          })}
        </div>
      )}

      <div className={`upload-zone${dragOver ? " drag-over" : ""}${filled ? " is-filled" : ""}${onPickFromLibrary ? " has-library" : ""}`}
        onClick={() => !uploading && document.getElementById(id)?.click()}
        onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
        onDragLeave={() => setDragOver(false)}
        onDrop={(e) => { e.preventDefault(); setDragOver(false); handleFiles(e.dataTransfer.files); }}>
        {onPickFromLibrary && (
          <button type="button" className="btn btn-sm upload-zone__library"
            onClick={(e) => { e.stopPropagation(); onPickFromLibrary(); }}>
            <Ico name="images"/> {libraryLabel || _tr("create.assetPicker.choose", null, "Choose from Assets")}
          </button>
        )}
        <input id={id} type="file" accept={accept} multiple={multiple} hidden
          onChange={(e) => { handleFiles(e.target.files); e.target.value = ""; }} />
        <div className="upload-zone__body">
          <div className="upload-zone__icon">
            {uploading ? <span className="spinner" style={{width:18,height:18}} /> : <span>{multiple ? "+" : filled ? "↻" : "↑"}</span>}
          </div>
          <div className="upload-zone__text">
            <div className="upload-zone__title">{uploadTitle}</div>
            <div className="upload-zone__hint">{uploadHint}</div>
            {!uploading && <div className="upload-zone__action">{_tr("create.upload.dropAction", null, "Click to choose, or drop a file here")}</div>}
          </div>
        </div>
      </div>

      {localError && (
        <div className="upload-error">
          <Ico name="warn" /> {localError}
        </div>
      )}
    </div>
  );
}

function VideoPlayer({ task }) {
  const t = useT();
  const videoRef = useRef(null);
  const [playing, setPlaying] = useState(false);
  const [currentTime, setCt] = useState(0);
  const [duration, setDur] = useState(0);
  const [speed, setSpeed] = useState(1);
  const [loop, setLoop] = useState(true);

  const videoSrc = task?.id
    ? `${_detectApiBase()}/api/plugins/seedance-video/videos/${task.id}`
    : null;

  const togglePlay = () => {
    if (!videoRef.current) return;
    if (videoRef.current.paused) { videoRef.current.play(); setPlaying(true); }
    else { videoRef.current.pause(); setPlaying(false); }
  };

  const changeSpeed = () => {
    const speeds = [0.25, 0.5, 1, 1.5, 2];
    const idx = speeds.indexOf(speed);
    const next = speeds[(idx + 1) % speeds.length];
    setSpeed(next);
    if (videoRef.current) videoRef.current.playbackRate = next;
  };

  const stepFrame = (dir) => {
    if (!videoRef.current) return;
    videoRef.current.pause(); setPlaying(false);
    videoRef.current.currentTime += dir * (1/24);
  };

  if (!task) return (
    <div className="oa-preview-empty" style={{minHeight: 280, padding: "32px 20px", textAlign: "center"}}>
      <span className="oa-preview-empty__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M15 10l-4 3V7l4 3z"/><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
      </span>
      <div className="oa-preview-empty__title" style={{whiteSpace: "nowrap"}}>{t("preview.empty.title")}</div>
      <div className="oa-preview-empty__hint" style={{marginTop: 4}}>{t("preview.empty.hint")}</div>
    </div>
  );

  return (
    <div>
      <div className="video-player-wrap">
        {task.status === "running" || task.status === "pending" ? (
          <div className="empty-state">
            <div className="spinner" style={{width:32,height:32,marginBottom:12}}/>
            <p>{t("preview.running.title")}</p>
            <p className="text-xs text-dim" style={{marginTop:6}}>{t("preview.running.hint")}</p>
          </div>
        ) : task.status === "succeeded" && videoSrc ? (
          <video ref={videoRef} src={videoSrc} loop={loop} autoPlay muted
            onTimeUpdate={() => setCt(videoRef.current?.currentTime || 0)}
            onLoadedMetadata={() => setDur(videoRef.current?.duration || 0)}
            onPlay={() => setPlaying(true)} onPause={() => setPlaying(false)}
            style={{width:"100%",height:"100%",objectFit:"contain"}} />
        ) : task.status === "failed" ? (
          <div className="empty-state">
            <p style={{color:"var(--text-danger,#dc2626)"}}>{task.error_message || t("preview.failed")}</p>
          </div>
        ) : (
          <div className="empty-state">
            <p>{t("preview.waiting")}</p>
          </div>
        )}
      </div>
      {task.status === "succeeded" && videoSrc && (
        <div className="video-controls">
          <button onClick={() => stepFrame(-1)} title={t("preview.ctrl.stepBack")}><Ico name="skipBack"/></button>
          <button onClick={togglePlay}>{playing ? <Ico name="pause"/> : <Ico name="play"/>}</button>
          <button onClick={() => stepFrame(1)} title={t("preview.ctrl.stepFwd")}><Ico name="skipFwd"/></button>
          <div className="progress-bar" onClick={(e) => {
            const rect = e.currentTarget.getBoundingClientRect();
            const pct = (e.clientX - rect.left) / rect.width;
            if (videoRef.current) videoRef.current.currentTime = pct * duration;
          }}>
            <div className="progress-bar-fill" style={{width: duration ? `${(currentTime/duration)*100}%` : "0%"}} />
          </div>
          <span>{currentTime.toFixed(1)}s / {duration.toFixed(1)}s</span>
          <button onClick={changeSpeed}>{speed}x</button>
          <button onClick={() => setLoop(!loop)} style={{opacity: loop?1:.5}} title={t("preview.ctrl.loop")}><Ico name="repeat"/></button>
        </div>
      )}
      {task.revised_prompt && (
        <div style={{padding:"8px 12px",fontSize:12,color:"var(--text-dim)",fontStyle:"italic"}}>
          {t("preview.revised", { text: task.revised_prompt })}
        </div>
      )}
    </div>
  );
}

function CreateTab({ models, onGoToTasks, action }) {
  const [mode, setMode] = useState("t2v");
  const [prompt, setPrompt] = useState("");
  const [model, setModel] = useState("2.0");
  const [ratio, setRatio] = useState("16:9");
  const [resolution, setResolution] = useState("720p");
  const [duration, setDuration] = useState(5);
  const [audio, setAudio] = useState(true);
  const [seed, setSeed] = useState(-1);
  const [serviceTier, setServiceTier] = useState("default");
  const [draft, setDraft] = useState(false);
  const [returnLastFrame, setReturnLastFrame] = useState(false);
  const [watermark, setWatermark] = useState(false);
  const [webSearch, setWebSearch] = useState(false);
  const [loading, setLoading] = useState(false);
  const [activeTask, setActiveTask] = useState(null);
  const [optimizing, setOptimizing] = useState(false);

  // Sprint 8 / V1 — uploaded asset state.  Without these, the UI never
  // remembered what the user uploaded and we silently submitted text-
  // only content for i2v / i2v_end / multimodal / edit / extend.  Each
  // entry: {name, base64 (data URI), asset, size, kind}.
  const [firstFrame, setFirstFrame] = useState(null);
  const [endFrame, setEndFrame] = useState(null);
  const [multimodalAssets, setMultimodalAssets] = useState([]);
  const [sourceVideo, setSourceVideo] = useState(null);
  const [sourceVideoUrl, setSourceVideoUrl] = useState("");
  const [nextScenePrompt, setNextScenePrompt] = useState("");

  useEffect(() => {
    if (!action) return;
    if (action.mode) setMode(action.mode);
    if (action.videoUrl) setSourceVideoUrl(action.videoUrl);
    if (action.prompt) setPrompt(action.prompt);
    if (action.nextScenePrompt) setNextScenePrompt(action.nextScenePrompt);
  }, [action?.nonce]);

  useEffect(() => {
    if (!activeTask || (activeTask.status !== "running" && activeTask.status !== "pending")) return;
    var timer = setInterval(() => {
      pluginApi("GET", `/tasks/${activeTask.id}`).then(r => {
        if (r.body?.task) setActiveTask(r.body.task);
      }).catch(() => {});
    }, 8000);
    return () => clearInterval(timer);
  }, [activeTask?.id, activeTask?.status]);

  const currentModel = models.find(m => m.id === model);
  const minDur = currentModel?.duration_range?.[0] || 2;
  const maxDur = currentModel?.duration_range?.[1] || 15;
  const canDraft = currentModel?.supports_draft || false;
  const can1080 = currentModel?.resolutions?.includes("1080p") || false;
  const canWebSearch = currentModel?.supports_web_search && mode === "t2v";

  const t = useT();
  // MODE_TIPS body lives in I18N_DICT (create.tip.<id>); resolve via t() so
  // locale switches without re-creating the component.

  useEffect(() => {
    if (duration < minDur) setDuration(minDur);
    if (duration > maxDur) setDuration(maxDur);
  }, [model]);

  // Drop assets that are no longer relevant when the user switches modes.
  // Otherwise an image uploaded for i2v could leak into a later edit
  // submission as ghost reference data.
  useEffect(() => {
    if (mode === "t2v") { setFirstFrame(null); setEndFrame(null); setMultimodalAssets([]); setSourceVideo(null); setSourceVideoUrl(""); setNextScenePrompt(""); }
    else if (mode === "i2v") { setEndFrame(null); setMultimodalAssets([]); setSourceVideo(null); setSourceVideoUrl(""); setNextScenePrompt(""); }
    else if (mode === "i2v_end") { setMultimodalAssets([]); setSourceVideo(null); setSourceVideoUrl(""); setNextScenePrompt(""); }
    else if (mode === "multimodal") { setFirstFrame(null); setEndFrame(null); setSourceVideo(null); setSourceVideoUrl(""); setNextScenePrompt(""); }
    else if (mode === "edit" || mode === "extend" || mode === "transition") { setFirstFrame(null); setEndFrame(null); setMultimodalAssets([]); setSourceVideo(null); }
  }, [mode]);

  // Auto-disable web_search when leaving t2v (Ark only allows it there).
  useEffect(() => { if (mode !== "t2v" && webSearch) setWebSearch(false); }, [mode]);

  const [createError, setCreateError] = useState("");
  const [taskStartedOpen, setTaskStartedOpen] = useState(false);
  const [taskStartedDesc, setTaskStartedDesc] = useState("");
  const [createProgressOpen, setCreateProgressOpen] = useState(false);
  const [createProgressStage, setCreateProgressStage] = useState("");
  const [assetPicker, setAssetPicker] = useState(null);

  // Generic upload helper used by every FileUploadZone in the form.
  // Returns null on success (FileUploadZone treats falsy as success);
  // otherwise returns a Chinese error message that the dropzone prints
  // under itself.
  const doUpload = async (file, onAsset) => {
    setCreateError("");
    let r;
    try {
      r = await uploadFile(file);
    } catch (e) {
      return _tr("toast.networkError", { msg: e.message }, "Network error: {msg}");
    }
    if (!r || !r.ok) {
      return r?.message || r?.error || _tr("toast.uploadFail", null, "Upload failed");
    }
    if (!r.base64) {
      // Defensive — server omitted base64 but said ok.  Should not
      // happen with the new 50 MB-cap upload route, but if it does we
      // refuse rather than submit a useless content array to Ark.
      return _tr("toast.uploadNoBase64", null,
        "Upload OK but no base64 returned — cannot send to Ark");
    }
    onAsset({
      name: file.name,
      base64: r.base64,
      asset: r.asset,
      size: r.size_bytes || file.size,
      kind: r.kind,
    });
    return null;
  };

  const openAssetPicker = (target) => {
    if (target === "multimodal") {
      setAssetPicker({
        target,
        allowedKinds: ["image", "audio", "video"],
        disabledKinds: ["video"],
      });
    } else {
      setAssetPicker({
        target,
        allowedKinds: ["image"],
        disabledKinds: [],
      });
    }
  };

  const handlePickedAsset = (asset) => {
    if (!assetPicker) return;
    if (assetPicker.target === "first") setFirstFrame(asset);
    else if (assetPicker.target === "end") setEndFrame(asset);
    else if (assetPicker.target === "multimodal") setMultimodalAssets(prev => [...prev, asset]);
    setAssetPicker(null);
  };

  // Build the Ark `content` array from prompt + uploaded assets, applying
  // local validation so we surface "请先上传首帧图片" as a red banner
  // *before* hitting the network instead of after a 400 round trip.
  const buildContent = () => {
    const c = [{ type: "text", text: prompt }];
    const isPublicHttpUrl = (v) => /^https?:\/\//i.test((v || "").trim());
    if (mode === "i2v") {
      if (!firstFrame) throw new Error(_tr("toast.modeNeedFirstFrame", null, "请先上传首帧图片"));
      c.push({ type: "image_url", image_url: { url: firstFrame.base64 }, role: "first_frame" });
    } else if (mode === "i2v_end") {
      if (!firstFrame || !endFrame) throw new Error(_tr("toast.modeNeedBothFrames", null, "请分别上传首帧和尾帧图片"));
      c.push({ type: "image_url", image_url: { url: firstFrame.base64 }, role: "first_frame" });
      c.push({ type: "image_url", image_url: { url: endFrame.base64 }, role: "last_frame" });
    } else if (mode === "multimodal") {
      if (multimodalAssets.length === 0) throw new Error(_tr("toast.modeNeedMultimodal", null, "多模态模式至少上传 1 个参考素材"));
      multimodalAssets.forEach(a => {
        if (a.kind === "video") {
          throw new Error(_tr("toast.videoReferenceNeedsUrl", null, "视频参考必须使用公网 http(s) URL，不能使用本地上传视频或 base64"));
        } else if (a.kind === "audio") {
          c.push({ type: "audio_url", audio_url: { url: a.base64 } });
        } else {
          c.push({ type: "image_url", image_url: { url: a.base64 }, role: "reference_image" });
        }
      });
    } else if (mode === "edit" || mode === "extend" || mode === "transition") {
      const lbl = mode === "edit"
        ? _tr("modes.edit", null, "Edit")
        : mode === "transition"
          ? _tr("modes.transition", null, "Transition")
          : _tr("modes.extend", null, "Extend");
      const publicUrl = sourceVideoUrl.trim();
      if (!publicUrl) {
        throw new Error(_tr("toast.modeNeedPublicVideoUrl", { label: lbl }, "{label} 模式需要公网 http(s) 视频 URL"));
      }
      if (!isPublicHttpUrl(publicUrl)) {
        throw new Error(_tr("toast.modeNeedValidVideoUrl", null, "视频 URL 必须以 http:// 或 https:// 开头"));
      }
      c.push({ type: "video_url", video_url: { url: publicUrl }, role: "reference_video" });
    }
    return c;
  };

  const handleCreate = async () => {
    if (loading) return;
    setLoading(true);
    setCreateError("");
    setCreateProgressOpen(true);
    setCreateProgressStage(t("modal.createProgress.validating"));
    let content;
    try {
      content = buildContent();
    } catch (e) {
      setCreateError(e.message);
      setLoading(false);
      setCreateProgressOpen(false);
      return;
    }
    let slowSubmitTimer = null;
    try {
      setCreateProgressStage(t("modal.createProgress.submitting"));
      const clientRequestId = uid();
      slowSubmitTimer = setTimeout(
        () => setCreateProgressStage(t("modal.createProgress.waiting")),
        2000
      );
      const isVideoUrlMode = mode === "edit" || mode === "extend" || mode === "transition";
      const endpoint = isVideoUrlMode
        ? (mode === "edit" ? "/tasks/edit" : mode === "extend" ? "/tasks/extend" : "/tasks/transition")
        : (draft ? "/tasks/draft" : "/tasks");
      const payload = isVideoUrlMode ? {
        prompt,
        source_video_url: sourceVideoUrl.trim(),
        next_scene_prompt: mode === "transition" ? nextScenePrompt : "",
        model, ratio, duration, resolution,
        generate_audio: audio, seed, watermark, service_tier: serviceTier,
        client_request_id: clientRequestId,
      } : {
        prompt, mode, model, ratio, duration, resolution, n: 1,
        generate_audio: audio, seed, watermark, return_last_frame: returnLastFrame,
        web_search: webSearch && canWebSearch, service_tier: serviceTier,
        client_request_id: clientRequestId,
        content,
      };
      const r = await pluginApi("POST", endpoint, payload);
      clearTimeout(slowSubmitTimer);
      if (r.ok && r.body?.task) {
        setActiveTask(r.body.task);
        setTaskStartedDesc(
          draft
            ? t("modal.taskStarted.draft")
            : serviceTier === "flex"
              ? t("modal.taskStarted.flex")
              : t("modal.taskStarted.online")
        );
        setCreateProgressOpen(false);
        setTaskStartedOpen(true);
      } else {
        var msg = r.body?.detail || r.body?.error || _tr("toast.requestFail", { msg: "HTTP " + r.status }, "Request failed: {msg}");
        setCreateError(msg);
        setCreateProgressOpen(false);
      }
    } catch (e) {
      if (slowSubmitTimer) clearTimeout(slowSubmitTimer);
      setCreateError(_tr("toast.networkError", { msg: e.message }, "Network error: {msg}"));
      setCreateProgressOpen(false);
    }
    setLoading(false);
  };

  const handleOptimize = async () => {
    if (!prompt.trim()) return;
    setOptimizing(true);
    try {
      var base = _ctx ? "/api/plugins/" + _ctx.pluginId : "/api/plugins/seedance-video";
      const r = await directFetch("POST", base + "/prompt-optimize", { prompt, mode, duration, ratio });
      if (r.body?.ok && r.body?.result && r.body.result !== prompt) {
        setPrompt(r.body.result);
        showToast(_tr("toast.optimizeOk", null, "Prompt optimized"), "success");
      } else if (!r.body?.ok) {
        // Backend now returns structured error codes — surface the human
        // message when present so the user sees "missing brain.access"
        // (fixable in Settings) instead of a misleading "LLM unavailable".
        const msg = r.body?.message || r.body?.error || r.body?.detail || "LLM unavailable";
        showToast(_tr("toast.optimizeFail", { msg }, "Optimization failed: {msg}"), "error");
      } else {
        showToast(_tr("toast.optimizeNoChange", null, "Prompt unchanged"), "warning");
      }
    } catch (e) {
      showToast(_tr("toast.optimizeError", { msg: e.message || "network" }, "Optimization request failed: {msg}"), "error");
    }
    setOptimizing(false);
  };

  return (
    <>
    <div className="split-layout">
      <div className="split-left">
        <div className="card">
          <div className="oa-section-label">{t("create.section.mode")}</div>
          <div className="flex gap-2 flex-wrap">
            {MODE_IDS.map(id => (
              <button key={id} className={`mode-btn ${mode===id?"active":""}`}
                onClick={() => setMode(id)}
                disabled={currentModel && !(currentModel.modes?.includes(id) || (id === "transition" && currentModel.modes?.includes("extend")))}
              >{t("modes." + id)}</button>
            ))}
          </div>
        </div>

        <div className="tip-bar"><Ico name="lightbulb"/> {t("create.tip." + mode)}</div>

        {mode === "i2v" && (
          <div className="card">
            <div className="oa-section-label">{t("create.section.firstFrame")}</div>
            <FileUploadZone id="upload-first-frame" accept="image/*"
              onUpload={(file) => doUpload(file, setFirstFrame)}
              value={firstFrame}
              onRemove={() => setFirstFrame(null)}
              onPickFromLibrary={() => openAssetPicker("first")}
              libraryLabel={t("create.assetPicker.chooseImage")}
              label={t("create.upload.firstHint")}
              hint={t("create.upload.firstSubHint")} />
          </div>
        )}

        {mode === "i2v_end" && (
          <div className="card">
            <div className="oa-section-label">{t("create.section.firstLastFrame")}</div>
            <div className="grid-2">
              <FileUploadZone id="upload-start-frame" accept="image/*"
                onUpload={(file) => doUpload(file, setFirstFrame)}
                value={firstFrame}
                onRemove={() => setFirstFrame(null)}
                onPickFromLibrary={() => openAssetPicker("first")}
                libraryLabel={t("create.assetPicker.chooseImage")}
                label={t("create.upload.startFrame")} hint={t("create.upload.startFrameHint")} />
              <FileUploadZone id="upload-end-frame" accept="image/*"
                onUpload={(file) => doUpload(file, setEndFrame)}
                value={endFrame}
                onRemove={() => setEndFrame(null)}
                onPickFromLibrary={() => openAssetPicker("end")}
                libraryLabel={t("create.assetPicker.chooseImage")}
                label={t("create.upload.endFrame")} hint={t("create.upload.endFrameHint")} />
            </div>
            <p className="text-xs text-dim" style={{marginTop:6}}>{t("create.upload.endFrameTip")}</p>
          </div>
        )}

        {mode === "multimodal" && (
          <div className="card">
            <div className="oa-section-label">{t("create.section.multimodal")}</div>
            <FileUploadZone id="upload-multimodal" accept="image/*,video/*,audio/*" multiple
              onUpload={(file) => doUpload(file, (asset) => setMultimodalAssets(prev => [...prev, asset]))}
              value={multimodalAssets}
              onRemove={(idx) => setMultimodalAssets(prev => prev.filter((_, i) => i !== idx))}
              onPickFromLibrary={() => openAssetPicker("multimodal")}
              libraryLabel={t("create.assetPicker.chooseMedia")}
              label={t("create.upload.multimodal")}
              hint={t("create.upload.multimodalHint")} />
            <div className="tip-bar" style={{marginTop:8}}>
              <Ico name="lightbulb"/> {t("create.upload.multimodalTip")}
            </div>
          </div>
        )}

        {(mode === "edit" || mode === "extend" || mode === "transition") && (
          <div className="card">
            <div className="oa-section-label">
              {mode === "edit"
                ? t("create.section.editVideo")
                : mode === "transition"
                  ? t("create.section.transitionVideo")
                  : t("create.section.extendVideo")}
            </div>
            <div className="form-row">
              <label className="label">{t("create.videoUrl.label")}</label>
              <input className="input"
                value={sourceVideoUrl}
                onChange={e => setSourceVideoUrl(e.target.value)}
                placeholder={t("create.videoUrl.placeholder")} />
              <p className="text-xs text-dim" style={{marginTop:6,lineHeight:1.6}}>
                {t("create.videoUrl.hint")}
              </p>
            </div>
            {mode === "transition" && (
              <div className="form-row">
                <label className="label">{t("create.nextScene.label")}</label>
                <textarea className="input textarea"
                  value={nextScenePrompt}
                  onChange={e => setNextScenePrompt(e.target.value)}
                  placeholder={t("create.nextScene.placeholder")}
                  rows={3} />
              </div>
            )}
          </div>
        )}

        <div className="card">
          <div className="oa-section-label oa-section-label--inline">
            <span>{t("create.section.prompt")}</span>
            <button type="button"
              className="oa-ai-btn"
              onClick={handleOptimize}
              disabled={optimizing || !prompt.trim()}
              title={t("create.btn.optimize.title")}>
              {optimizing
                ? <span className="spinner" style={{width:12,height:12}} />
                : <span className="oa-ai-btn__icon" aria-hidden="true">
                    <Ico name="sparkles"/>
                  </span>}
              <span>{t("create.btn.optimize")}</span>
            </button>
          </div>
          <div className="prompt-wrap">
            <textarea className="input textarea" value={prompt} onChange={e => setPrompt(e.target.value)}
              placeholder={t("create.prompt.placeholder")} rows={4} />
            <span className="prompt-counter">{t("create.prompt.counter", { n: prompt.length })}</span>
          </div>
        </div>

        <div className="card">
          <div className="oa-section-label">{t("create.section.params")}</div>
          <div className="form-row">
            <label className="label">{t("create.label.model")}</label>
            <select className="input select" value={model} onChange={e => setModel(e.target.value)}>
              {models.map(m => <option key={m.id} value={m.id}>{m.name} · RPM {m.rpm}</option>)}
            </select>
          </div>
          <div className="form-row">
            <label className="label">{t("create.label.ratio")}</label>
            <div className="flex gap-2 flex-wrap">
              {RATIOS.map(r => (
                <div key={r} className={`ratio-btn ${ratio===r?"active":""}`} onClick={() => setRatio(r)}>{r}</div>
              ))}
            </div>
          </div>
          <div className="form-row">
            <label className="label">{t("create.label.resolution")}</label>
            <div className="flex gap-2">
              {["480p","720p","1080p"].map(r => (
                <button key={r} className={`mode-btn ${resolution===r?"active":""}`}
                  onClick={() => setResolution(r)}
                  disabled={r==="1080p" && !can1080}
                >{r}</button>
              ))}
            </div>
          </div>
          <div className="form-row">
            <label className="label">{t("create.label.duration", { min: minDur, max: maxDur })}</label>
            <div className="slider-wrap">
              <input type="range" min={minDur} max={maxDur} value={duration} onChange={e => setDuration(+e.target.value)} />
              <span className="slider-val">{duration}s</span>
            </div>
          </div>
          <div className="form-row">
            <label className="label">{t("create.label.tier")}</label>
            <div className="flex gap-2">
              <button className={`mode-btn ${serviceTier==="default"?"active":""}`} onClick={() => setServiceTier("default")}><Ico name="online"/> {t("create.tier.online")}</button>
              <button className={`mode-btn ${serviceTier==="flex"?"active":""}`} onClick={() => setServiceTier("flex")}><Ico name="offline"/> {t("create.tier.flex")}</button>
            </div>
          </div>
          <div className="advanced-divider" />
          <div className="oa-section-label" style={{fontSize:12,marginBottom:8}}>{t("create.section.advanced")}</div>
          <div className="toggle-grid">
            <label className="toggle-row" onClick={() => setAudio(!audio)}>
              <span className="toggle-row__label">{t("create.toggle.audio")}</span>
              <div className={`switch ${audio?"on":""}`} />
            </label>
            <label className="toggle-row" onClick={() => setWatermark(!watermark)}>
              <span className="toggle-row__label">{t("create.toggle.watermark")}</span>
              <div className={`switch ${watermark?"on":""}`} />
            </label>
            <label className="toggle-row" onClick={() => setReturnLastFrame(!returnLastFrame)}>
              <span className="toggle-row__label">{t("create.toggle.lastFrame")}</span>
              <div className={`switch ${returnLastFrame?"on":""}`} />
            </label>
            {canDraft && (
              <label className="toggle-row" onClick={() => setDraft(!draft)}>
                <span className="toggle-row__label">{t("create.toggle.draft")}</span>
                <div className={`switch ${draft?"on":""}`} />
              </label>
            )}
            {canWebSearch && (
              <label className="toggle-row" onClick={() => setWebSearch(!webSearch)}>
                <span className="toggle-row__label">{t("create.toggle.webSearch")}</span>
                <div className={`switch ${webSearch?"on":""}`} />
              </label>
            )}
          </div>
        </div>

        {createError && (
          <div style={{padding:"10px 12px",background:"var(--bg-danger,#fef2f2)",border:"1px solid var(--border-danger,#fca5a5)",borderRadius:8,color:"var(--text-danger,#dc2626)",fontSize:13,marginBottom:8,wordBreak:"break-all"}}>
            {createError}
          </div>
        )}
        <button className="btn btn-primary btn-block"
          onClick={handleCreate} disabled={loading || !prompt.trim()}>
          {loading
            ? <span className="spinner" style={{width:16,height:16,borderTopColor:"#fff",borderColor:"rgba(255,255,255,.35)"}}/>
            : <span>{draft ? t("create.btn.startDraft") : serviceTier==="flex" ? t("create.btn.startFlex") : t("create.btn.startVideo")}</span>}
        </button>
      </div>

      <div className="split-right">
        <div className="oa-preview-area oa-preview-area--centered">
          <VideoPlayer task={activeTask} />
          {activeTask && (
            <div className="flex gap-2" style={{marginTop:12, justifyContent:"center"}}>
              <button className="btn btn-sm" onClick={() => downloadFile(`/api/plugins/seedance-video/videos/${activeTask.id}?download=1`, `seedance_${activeTask.prompt?.slice(0,20) || activeTask.id}.mp4`, activeTask.local_video_path)}><Ico name="download"/> {t("preview.btn.download")}</button>
              <button className="btn btn-sm" onClick={() => { setActiveTask(null); }}><Ico name="refresh"/> {t("preview.btn.new")}</button>
            </div>
          )}
        </div>
      </div>
    </div>
    <TaskStartedModal
      open={taskStartedOpen}
      onClose={() => setTaskStartedOpen(false)}
      onGoToTasks={onGoToTasks}
      desc={taskStartedDesc}
    />
    <CreateProgressModal
      open={createProgressOpen}
      stage={createProgressStage}
      detail={t("modal.createProgress.detail")}
    />
    <AssetPickerModal
      open={!!assetPicker}
      allowedKinds={assetPicker?.allowedKinds || ["image"]}
      disabledKinds={assetPicker?.disabledKinds || []}
      onCancel={() => setAssetPicker(null)}
      onSelect={handlePickedAsset}
    />
    </>
  );
}

function TaskListTab({ isActive = true, onUseVideo }) {
  const t = useT();
  const { tasks, total, reload } = useTasks();
  const [statusFilter, setStatusFilter] = useState("all");
  const [typeFilter, setTypeFilter] = useState("all");
  const [selected, setSelected] = useState(null);

  useEffect(() => {
    if (isActive) reload();
  }, [isActive]);

  const STATUS_FILTERS = [
    { v: "all",       k: "tasks.filter.all",       icon: null      },
    { v: "running",   k: "tasks.filter.running",   icon: "refresh" },
    { v: "succeeded", k: "tasks.filter.succeeded", icon: "check"   },
    { v: "failed",    k: "tasks.filter.failed",    icon: "warn"    },
  ];
  const TYPE_FILTERS = [
    { v: "all",   k: "tasks.filter.allTypes", icon: null      },
    { v: "draft", k: "tasks.filter.draft",    icon: "image"   },
    { v: "flex",  k: "tasks.filter.flex",     icon: "package" },
  ];
  const safeTasks = Array.isArray(tasks) ? tasks : [];
  const filtered = safeTasks.filter(it => {
    if (statusFilter === "running" && !(it.status === "running" || it.status === "pending")) return false;
    if (statusFilter === "succeeded" && it.status !== "succeeded") return false;
    if (statusFilter === "failed" && it.status !== "failed") return false;
    if (typeFilter === "draft" && !it.is_draft) return false;
    if (typeFilter === "flex" && it.service_tier !== "flex") return false;
    return true;
  });

  // Keep `selected` in sync with the live task list — when polling refreshes
  // a task (e.g. running → succeeded) the selected reference would otherwise
  // stay frozen on the stale snapshot and the right pane would never update.
  useEffect(() => {
    if (!selected) return;
    const fresh = safeTasks.find(x => x.id === selected.id);
    if (fresh && fresh !== selected) setSelected(fresh);
  }, [tasks]);

  const apiBase = `/api/plugins/seedance-video`;
  const videoSrcFor = (id) => `${_detectApiBase()}${apiBase}/videos/${id}`;

  const handleDelete = async (id) => {
    if (!confirm(t("tasks.detail.confirmDelete"))) return;
    await pluginApi("DELETE", `/tasks/${id}`);
    if (selected && selected.id === id) setSelected(null);
    reload();
  };

  const handleRetry = async (id) => {
    await pluginApi("POST", `/tasks/${id}/retry`);
    reload();
  };

  const useSelectedVideo = (mode) => {
    if (!selected?.video_url || !onUseVideo) return;
    onUseVideo({
      mode,
      videoUrl: selected.video_url,
      prompt: mode === "edit"
        ? selected.prompt || ""
        : mode === "transition"
          ? _tr("create.tip.transition", null, "")
          : _tr("create.tip.extend", null, ""),
    });
  };

  return (
    <div className="split-layout">
      <div className="split-left oa-list-panel" style={{width:"50%"}}>
        <div className="oa-list-panel__filters">
          <div>
            <div className="oa-section-label">{t("tasks.filter.status")}</div>
            <div className="oa-filter-group__buttons">
              {STATUS_FILTERS.map(f => (
                <button key={f.v} className={`mode-btn ${statusFilter===f.v?"active":""}`}
                        onClick={() => setStatusFilter(f.v)}>
                  {f.icon
                    ? <span style={{display:"inline-flex", alignItems:"center", gap:4}}>
                        <Ico name={f.icon}/> {t(f.k)}
                      </span>
                    : t(f.k)}
                </button>
              ))}
            </div>
          </div>
          <div>
            <div className="oa-section-label">{t("tasks.filter.type")}</div>
            <div className="oa-filter-group__buttons">
              {TYPE_FILTERS.map(f => (
                <button key={f.v} className={`mode-btn ${typeFilter===f.v?"active":""}`}
                        onClick={() => setTypeFilter(f.v)}>
                  {f.icon
                    ? <span style={{display:"inline-flex", alignItems:"center", gap:4}}>
                        <Ico name={f.icon}/> {t(f.k)}
                      </span>
                    : t(f.k)}
                </button>
              ))}
              <button className="btn btn-sm" onClick={() => reload()} style={{marginLeft:"auto"}}>
                <Ico name="refresh"/> {t("tasks.refresh")}
              </button>
            </div>
          </div>
        </div>

        <hr className="oa-list-panel__divider" />

        <div className="oa-list-panel__items">
          {filtered.length === 0 ? (
            <div className="oa-preview-empty" style={{minHeight: 160, padding: "24px 16px"}}>
              <span className="oa-preview-empty__icon" aria-hidden="true">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
                  <rect x="3" y="4" width="18" height="16" rx="2"/>
                  <path d="M8 10h8M8 14h6"/>
                </svg>
              </span>
              <div className="oa-preview-empty__title">{t("tasks.empty.title")}</div>
              <div className="oa-preview-empty__hint">{t("tasks.empty.hint")}</div>
            </div>
          ) : filtered.map(it => {
            const isSelected = selected?.id === it.id;
            const isRunning = it.status === "running" || it.status === "pending";
            return (
              <div key={it.id}
                   className={`task-card ${isSelected ? "selected" : ""}`}
                   onClick={() => setSelected(it)}>
                <div className={`task-thumb ${it.status==="failed" ? "task-thumb--failed" : ""}`}>
                  {it.status === "succeeded" ? (
                    // First frame as poster — preload="metadata" gives us
                    // the cover image without buffering the whole file.
                    <video src={videoSrcFor(it.id)} preload="metadata" muted playsInline />

                  ) : it.status === "failed" ? (

                    <span className="task-thumb__icon"><Ico name="film"/></span>

                <div className="task-info">

function AssetsTab({ isActive = true }) {
  const t = useT();
  const [assets, setAssets] = useState([]);
  const [filter, setFilter] = useState(null);
  const [previewAsset, setPreviewAsset] = useState(null);
  const [deleteCandidate, setDeleteCandidate] = useState(null);
  const load = () => {
    const q = filter ? `?type=${filter}` : "";
    pluginApi("GET", `/assets${q}`).then(r => {
      const list = Array.isArray(r.body && r.body.assets) ? r.body.assets : [];
      setAssets(list);
    }).catch(() => {});
  };
  useEffect(() => {
    if (isActive) load();
  }, [filter, isActive]);

  const FILTERS = [
    { v: null,    k: "assets.filter.all" },
    { v: "image", k: "assets.filter.image" },
    { v: "video", k: "assets.filter.video" },
    { v: "audio", k: "assets.filter.audio" },
  ];

  const renderPreview = (a) => {
    const url = a.preview_url || "";
    if (url && a.type === "image") {
      return <img src={url} alt={a.original_name || a.id} loading="lazy" />;
    }
    if (url && a.type === "video") {
      return <video src={url} muted preload="metadata" />;
    }
    if (url && a.type === "audio") {
      return <audio src={url} controls preload="metadata" />;
    }
    return (
      <div className="asset-preview__fallback" title={t("assets.preview.noPreview")}>
        {{image:<Ico name="image"/>,video:<Ico name="film"/>,audio:<Ico name="music"/>}[a.type] || <Ico name="folder"/>}
      </div>
    );
  };

  const deleteAsset = async (asset) => {
    try {
      const r = await pluginApi("DELETE", `/assets/${asset.id}`);
      if (!r.ok) throw new Error(r.body?.detail || r.body?.error || `HTTP ${r.status || "?"}`);
      setDeleteCandidate(null);
      if (previewAsset?.id === asset.id) setPreviewAsset(null);
      load();
    } catch (e) {
      showToast(t("assets.deleteFail", { msg: e?.message || String(e) }), "error");
    }
  };

  return (
    <div>
      <div className="tip-bar" style={{marginBottom:12}}>
        <Ico name="images"/> {t("assets.intro")}
        <span style={{marginLeft:8}}>{t("assets.videoLimit")}</span>
      </div>
      <div className="assets-toolbar">
        {FILTERS.map(f => (
          <button key={String(f.v)} className={`mode-btn ${filter===f.v?"active":""}`} onClick={() => setFilter(f.v)}>
            {t(f.k)}
          </button>
        ))}
        <span className="text-xs text-dim" style={{marginLeft:"auto"}}>{t("assets.count", { n: assets.length })}</span>
      </div>
      {assets.length === 0 ? (
        <div className="empty-state"><p>{t("assets.empty.title")}</p><p className="text-xs text-dim">{t("assets.empty.hint")}</p></div>
      ) : (
        <div className="assets-grid">
          {assets.map(a => (
            <div key={a.id} className="asset-card">
              <div className="asset-preview">
                {renderPreview(a)}
                <span className="asset-type-badge">
                  {_assetKindLabel(a.type || "file")}
                </span>
              </div>
              <div className="asset-body">
                <div className="asset-name" title={a.original_name || a.id}>
                  {a.original_name || a.id}
                </div>
                <div className="asset-meta">
                  <span>{a.size_bytes ? _formatSize(a.size_bytes) : "?"}</span>
                  {a.id && <span>ID: {a.id}</span>}
                </div>
                <div className="asset-actions">
                  {a.preview_url && (
                    <button className="btn btn-sm" onClick={() => setPreviewAsset(a)}>
                      {t("assets.preview.open")}
                    </button>
                  )}
                  <button className="btn btn-sm btn-danger" onClick={() => setDeleteCandidate(a)}>{t("assets.btn.delete")}</button>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}
      <AssetPreviewModal asset={previewAsset} onClose={() => setPreviewAsset(null)} />
      <DeleteAssetConfirmModal
        asset={deleteCandidate}
        onCancel={() => setDeleteCandidate(null)}
        onConfirm={deleteAsset}
      />
    </div>
  );
}

// Self-contained replacement for the retired SDK 0.6.x dep-gate.js widget.
// Talks to the in-plugin /system/* routes (see seedance_inline/system_deps.py)
// using a fire-and-poll cycle: POST .../install kicks off a background
// subprocess, then we GET .../status every 3s until busy:false.
function PermissionsPanel({ status, onChanged }) {
  // ``status`` is the latest /permissions/check payload; ``onChanged``
  // bubbles up to the App so the top banner can re-evaluate after a
  // successful grant. The grant call hits the HOST admin endpoint
  // (/api/plugins/{id}/_admin/permissions/grant) — pluginApi prefixes
  // /api/plugins/{pluginId} so we just pass the suffix.
  const t = useT();
  const [granting, setGranting] = useState(false);

  if (!status) {
    return (
      <div className="sysdep-card">
        <div className="sysdep-card__head">
          <span className="sysdep-spinner"/>
          <span className="sysdep-card__title">{t("settings.system.detecting")}</span>
        </div>
      </div>
    );
  }

  const missing = status.missing || [];
  const checks = status.checks || [];
  const allOk = missing.length === 0;

  const grantAll = async () => {
    if (!missing.length) return;
    setGranting(true);
    try {
      const r = await pluginApi("POST", "/_admin/permissions/grant", {
        permissions: missing,
        reload: true,
      });
      const body = r.body || {};
      if (body.ok) {
        showToast(_tr("settings.perms.granted"));
        if (onChanged) await onChanged();
      } else {
        showToast(_tr("settings.perms.grantFailed", { msg: body.error || "unknown" }), "error");
      }
    } catch (e) {
      showToast(_tr("settings.perms.grantFailed", { msg: e.message || "network error" }), "error");
    }
    setGranting(false);
  };

  return (
    <div className="sysdep-card">
      <div className="sysdep-card__head">
        <div className="sysdep-card__title">
          <Ico name="shield"/> {t("settings.section.permissions")}
          {allOk
            ? <span className="sysdep-card__badge sysdep-card__badge--ok">
                <Ico name="check"/> {t("settings.perms.allOk")}
              </span>
            : <span className="sysdep-card__badge sysdep-card__badge--missing">
                <Ico name="warn"/> {missing.length}
              </span>}
        </div>
      </div>
      {!allOk && (
        <div className="deps-help" style={{marginTop:10, marginBottom:0}}>
          <strong>{t("settings.perms.intro.strong")}</strong>
          <div style={{marginTop:4}}>{t("settings.perms.intro.body")}</div>
        </div>
      )}
      <table className="perms-table">
        <thead>
          <tr>
            <th>{t("settings.perms.col.permission")}</th>
            <th>{t("settings.perms.col.feature")}</th>
            <th style={{width:90}}>{t("settings.perms.col.status")}</th>
          </tr>
        </thead>
        <tbody>
          {checks.map(c => (
            <tr key={c.permission}>
              <td><code>{c.permission}</code></td>
              <td>{c.feature}</td>
              <td>
                {c.granted
                  ? <span className="perms-tag perms-tag--ok"><Ico name="check"/> {t("settings.perms.status.ok")}</span>
                  : <span className="perms-tag perms-tag--missing"><Ico name="warn"/> {t("settings.perms.status.missing")}</span>}
              </td>
            </tr>
          ))}
        </tbody>
      </table>
      {!allOk && (
        <div className="sysdep-card__actions">
          <button className="btn btn-sm btn-primary" onClick={grantAll} disabled={granting}>
            {granting
              ? <><span className="sysdep-spinner"/> {t("settings.perms.granting")}</>
              : <><Ico name="check"/> {t("settings.perms.btn.grantAll")}</>}
          </button>
        </div>
      )}
    </div>
  );
}

function FfmpegInstaller({ onInstalled, onUninstalled }) {
  const t = useT();
  const [snap, setSnap] = useState(null);     // { found, version, location, methods, uninstall_methods, busy, last_install, ... }
  const [loading, setLoading] = useState(true);
  const [busyOp, setBusyOp] = useState("");   // "" | "install" | "uninstall"
  const [status, setStatus] = useState(null); // live status (busy, log_tail, elapsed_sec, op_kind, ...)
  const [copied, setCopied] = useState(false);
  // Inline uninstall confirm: window.confirm() is silently blocked because
  // the host iframe sandbox does NOT include allow-modals (see
  // apps/setup-center/src/views/PluginAppHost.tsx). We render our own
  // confirmation callout instead so the click actually has an effect.
  const [confirmingUninstall, setConfirmingUninstall] = useState(false);
  // Re-check needs an explicit spinner since the underlying GET is so fast
  // (<100ms typically) that without a min-duration throttle the user sees
  // no visual feedback at all.
  const [rechecking, setRechecking] = useState(false);
  const pollRef = useRef(null);
  const logRef = useRef(null);
  const opNotifiedRef = useRef(false);

  const refresh = useCallback(async () => {
    try {
      const r = await pluginApi("GET", "/system/components");
      const item = (r.body?.items || []).find(x => x.id === "ffmpeg");
      if (item) {
        setSnap(item);
        if (item.busy) {
          // server says an op is still running (e.g. user re-opened the
          // tab mid-install / mid-uninstall) — pick polling back up using
          // whichever op_kind the server reports.
          setBusyOp(item.last_install?.op_kind || "install");
        }
      }
    } catch (e) {
      setSnap({ id: "ffmpeg", found: false, methods: [], uninstall_methods: [], is_root: false });
    }
    setLoading(false);
  }, []);

  useEffect(() => { refresh(); }, [refresh]);

  useEffect(() => {
    if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight;
  }, [status?.log_tail?.length]);

  const stopPolling = useCallback(() => {
    if (pollRef.current) { clearInterval(pollRef.current); pollRef.current = null; }
  }, []);

  useEffect(() => {
    if (!busyOp) { stopPolling(); return; }
    opNotifiedRef.current = false;
    const tick = async () => {
      try {
        const r = await pluginApi("GET", "/system/ffmpeg/status");
        const st = r.body || {};
        setStatus(st);
        if (!st.busy) {
          stopPolling();
          const finishedOp = busyOp;
          setBusyOp("");
          await refresh();
          if (opNotifiedRef.current) return;
          opNotifiedRef.current = true;
          // Success criteria differs per op: install wants found=true,
          // uninstall wants found=false. The error toast also needs the
          // matching i18n key.
          if (finishedOp === "uninstall") {
            if (!st.found) {
              showToast(_tr("settings.system.uninstalled"));
              if (onUninstalled) onUninstalled();
            } else {
              const msg = st.error || _tr("settings.system.status.found", { ver: st.version || "?" });
              showToast(_tr("settings.system.uninstallFailed", { msg }), "error");
            }
          } else {
            if (st.found) {
              showToast(_tr("settings.system.installed"));
              if (onInstalled) onInstalled(true);
            } else {
              const msg = st.error || _tr("settings.system.status.missing");
              showToast(_tr("settings.system.installFailed", { msg }), "error");
            }
          }
        }
      } catch (e) {
        // network blip — try again next tick instead of bailing
      }
    };
    tick();
    pollRef.current = setInterval(tick, 3000);
    return stopPolling;
  }, [busyOp, refresh, stopPolling, onInstalled, onUninstalled]);

  useEffect(() => () => stopPolling(), [stopPolling]);

  const formatElapsed = (sec) => {
    const s = Math.max(0, Math.round(sec || 0));
    const mm = String(Math.floor(s / 60)).padStart(2, "0");
    const ss = String(s % 60).padStart(2, "0");
    return mm + ":" + ss;
  };

  const startInstall = async (methodIndex) => {
    setStatus({ busy: true, log_tail: [], elapsed_sec: 0, op_kind: "install" });
    setBusyOp("install");
    try {
      const r = await pluginApi("POST", "/system/ffmpeg/install", { method_index: methodIndex });
      const body = r.body || {};
      if (body.ok === false) {
        setBusyOp("");
        const msg = body.error || "unknown";
        showToast(_tr("settings.system.installFailed", { msg }), "error");
      }
    } catch (e) {
      setBusyOp("");
      showToast(_tr("settings.system.installFailed", { msg: e.message || "network error" }), "error");
    }
  };

  const startUninstall = async (methodIndex) => {
    setConfirmingUninstall(false);
    setStatus({ busy: true, log_tail: [], elapsed_sec: 0, op_kind: "uninstall" });
    setBusyOp("uninstall");
    try {
      const r = await pluginApi("POST", "/system/ffmpeg/uninstall", { method_index: methodIndex });
      const body = r.body || {};
      if (body.ok === false) {
        setBusyOp("");
        const msg = body.error || "unknown";
        showToast(_tr("settings.system.uninstallFailed", { msg }), "error");
      }
    } catch (e) {
      setBusyOp("");
      showToast(_tr("settings.system.uninstallFailed", { msg: e.message || "network error" }), "error");
    }
  };

  const handleRecheck = async () => {
    if (rechecking || busyOp) return;
    setRechecking(true);
    const t0 = Date.now();
    try {
      await refresh();
    } finally {
      const elapsed = Date.now() - t0;
      const minDelay = 400;
      if (elapsed < minDelay) {
        await new Promise(r => setTimeout(r, minDelay - elapsed));
      }
      setRechecking(false);
    }
  };

  const copyCmd = (cmd) => {
    if (!cmd) return;
    copyToClipboard(cmd);
    setCopied(true);
    setTimeout(() => setCopied(false), 1500);
  };

  if (loading) {
    return (
      <div className="sysdep-card">
        <div className="sysdep-card__head">
          <span className="sysdep-spinner"/>
          <span className="sysdep-card__title">{t("settings.system.detecting")}</span>
        </div>
      </div>
    );
  }

  const found = !!snap?.found;
  const methods = snap?.methods || [];
  const uninstallMethods = snap?.uninstall_methods || [];
  const isRoot = !!snap?.is_root;
  const installing = busyOp === "install";
  const uninstalling = busyOp === "uninstall";
  const busy = !!busyOp;
  const liveStatus = busy ? status : (snap?.last_install || null);
  const logLines = liveStatus?.log_tail || [];
  const lastOpKind = liveStatus?.op_kind || "install";

  // Pick a "primary" install method: the first executable method whose
  // requires_sudo is satisfied — falls back to the first one regardless.
  const primaryIdx = (() => {
    for (let i = 0; i < methods.length; i++) {
      const m = methods[i];
      if (m.strategy === "manual") continue;
      if (m.requires_sudo && !isRoot) continue;
      return i;
    }
    return methods.findIndex(m => m.strategy !== "manual");
  })();
  const primary = primaryIdx >= 0 ? methods[primaryIdx] : null;
  const manualMethod = methods.find(m => m.strategy === "manual");
  const blockingSudoMethod = (!found && primary == null)
    ? methods.find(m => m.requires_sudo && !isRoot)
    : null;

  // Same logic for the uninstall recipe.
  const uninstallPrimaryIdx = (() => {
    for (let i = 0; i < uninstallMethods.length; i++) {
      const m = uninstallMethods[i];
      if (m.strategy === "manual") continue;
      if (m.requires_sudo && !isRoot) continue;
      return i;
    }
    return -1;
  })();
  const uninstallPrimary = uninstallPrimaryIdx >= 0 ? uninstallMethods[uninstallPrimaryIdx] : null;

  return (
    <div className="sysdep-card">
      <div className="sysdep-card__head">
        <div className="sysdep-card__title">
          <Ico name="package"/> FFmpeg
          {uninstalling
            ? <span className="sysdep-card__badge sysdep-card__badge--busy">
                <span className="sysdep-spinner"/>
                {t("settings.system.uninstalling", { elapsed: formatElapsed(liveStatus?.elapsed_sec) })}
              </span>
            : installing
              ? <span className="sysdep-card__badge sysdep-card__badge--busy">
                  <span className="sysdep-spinner"/>
                  {t("settings.system.installing", { elapsed: formatElapsed(liveStatus?.elapsed_sec) })}
                </span>
              : found
                ? <span className="sysdep-card__badge sysdep-card__badge--ok">
                    <Ico name="check"/>
                    {snap.version
                      ? t("settings.system.status.found", { ver: snap.version })
                      : t("settings.system.status.foundNoVer")}
                  </span>
                : <span className="sysdep-card__badge sysdep-card__badge--missing">
                    <Ico name="warn"/> {t("settings.system.status.missing")}
                  </span>}
        </div>
      </div>
      {found && snap.location && (
        <div className="sysdep-card__path">{t("settings.system.location", { path: snap.location })}</div>
      )}

      <div className="sysdep-card__actions">
        {!busy && !found && primary && (
          <button
            className="btn btn-sm btn-primary"
            onClick={() => startInstall(primaryIdx)}
            title={primary.command_hint || primary.strategy}>
            <Ico name="package"/>{" "}
            {t("settings.system.btn.install")}
          </button>
        )}
        {!busy && found && uninstallPrimary && !confirmingUninstall && (
          <button
            className="btn btn-sm btn-danger"
            onClick={() => setConfirmingUninstall(true)}
            title={uninstallPrimary.command_hint || uninstallPrimary.strategy}
            style={{borderColor:"var(--danger)", color:"var(--danger)"}}>
            <Ico name="trash"/>{" "}
            {t("settings.system.btn.uninstall")}
          </button>
        )}
        {!busy && (
          <button className="btn btn-sm" onClick={handleRecheck} disabled={rechecking}>
            {rechecking
              ? <><span className="sysdep-spinner"/>{" "}{t("settings.system.detecting")}</>
              : <><Ico name="refresh"/> {t("settings.system.btn.recheck")}</>}
          </button>
        )}
        {snap?.homepage && (
          <a className="btn btn-sm" href={snap.homepage} target="_blank" rel="noopener noreferrer">
            <Ico name="link"/> {t("settings.system.btn.openHome")}
          </a>
        )}
      </div>

      {!busy && found && confirmingUninstall && uninstallPrimary && (
        <div className="sysdep-card__sudo-hint"
             style={{borderColor:"var(--danger)", background:"rgba(239,68,68,.08)"}}>
          <div style={{whiteSpace:"pre-wrap", color:"var(--text)", fontSize:12, lineHeight:1.6}}>
            {t("settings.system.uninstallConfirm")}
          </div>
          <div className="sysdep-card__sudo-cmd" style={{marginTop:10}}>
            <code>{uninstallPrimary.command_hint || uninstallPrimary.strategy}</code>
          </div>
          <div style={{display:"flex", gap:6, marginTop:10, justifyContent:"flex-end"}}>
            <button className="btn btn-sm" onClick={() => setConfirmingUninstall(false)}>
              {t("settings.system.btn.cancel")}
            </button>
            <button className="btn btn-sm btn-danger"
                    style={{background:"var(--danger)", color:"#fff", borderColor:"var(--danger)"}}
                    onClick={() => startUninstall(uninstallPrimaryIdx)}>
              <Ico name="trash"/>{" "}{t("settings.system.btn.uninstallConfirmBtn")}
            </button>
          </div>
        </div>
      )}

      {!found && !busy && !primary && manualMethod && !blockingSudoMethod && (
        <div className="sysdep-card__sudo-hint" style={{borderLeft: "3px solid var(--primary)"}}>
          {t("settings.system.noMethod")}
        </div>
      )}

      {!found && !busy && blockingSudoMethod && blockingSudoMethod.command_hint && (
        <div className="sysdep-card__sudo-hint">
          <div>{t("settings.system.requiresSudo")}</div>
          <div className="sysdep-card__sudo-cmd">
            <code>sudo {blockingSudoMethod.command_hint}</code>
            <button className="btn btn-sm" onClick={() => copyCmd("sudo " + blockingSudoMethod.command_hint)}>
              {copied ? t("settings.system.btn.copied") : t("settings.system.btn.copyCmd")}
            </button>
          </div>
        </div>
      )}

      {(busy || logLines.length > 0) && (
        <div className="sysdep-log">
          <div className="sysdep-log__head">
            <span>{lastOpKind === "uninstall"
              ? t("settings.system.logTitleUninstall")
              : t("settings.system.logTitle")}</span>
            {busy && liveStatus?.elapsed_sec != null && (
              <span>{formatElapsed(liveStatus.elapsed_sec)}</span>
            )}
          </div>
          {logLines.length === 0
            ? <pre className="sysdep-log__body sysdep-log__body--empty">{t("settings.system.logEmpty")}</pre>
            : <pre className="sysdep-log__body" ref={logRef}>{logLines.join("\n")}</pre>}
        </div>
      )}
    </div>
  );
}


function SettingsTab({ onKeyChange, onFfmpegChanged, permsStatus, onPermsRefresh }) {
  const t = useT();
  const [config, setConfig] = useState({});
  const [saving, setSaving] = useState(false);
  const [apiKey, setApiKey] = useState("");
  const [showKey, setShowKey] = useState(false);

  useEffect(() => {
    pluginApi("GET", "/settings").then(r => {
      if (r.body?.config) {
        setConfig(r.body.config);
      }
    }).catch(() => {});
  }, []);

  const save = async (updates) => {
    setSaving(true);
    try {
      var r = await pluginApi("PUT", "/settings", { updates });

      // ── Step 1: HTTP-level failure (4xx / 5xx / network) ────────────
      // The bridge layer always returns { ok, status, body? }. On HTTP
      // failure, `body` may be FastAPI's {detail: "..."} or absent
      // entirely (network error). Surface both clearly instead of
      // pretending the save succeeded.
      if (!r || r.ok === false) {
        var status = r ? r.status : 0;
        var detail = "";
        if (r && r.body) {
          if (typeof r.body === "string") detail = r.body;
          else if (r.body.detail) {
            detail = typeof r.body.detail === "string"
              ? r.body.detail
              : JSON.stringify(r.body.detail);
          } else if (r.body.message) detail = r.body.message;
        }
        if (!detail && r && r.error) detail = r.error;
        var msg = status
          ? _tr("settings.toast.saveFailedHttp", { status: status, detail: detail || "" })
          : _tr("settings.toast.saveFailedNet", { detail: detail || "network" });
        showToast(msg, "error");
        setSaving(false);
        return;
      }

      // ── Step 2: Server returned 200 but missing config payload ──────
      if (!r.body || !r.body.config) {
        showToast(_tr("settings.toast.saveNoConfig"), "error");
        setSaving(false);
        return;
      }

      var serverConfig = r.body.config;
      setConfig(serverConfig);

      // ── Step 3: Round-trip verify EVERY key the user just sent ──────
      // Not only ark_api_key — the user reported ALL settings showed
      // "saved" but values reverted (e.g. they switched 默认推理模式 to
      // flex but the dropdown stayed on "default"). That means the
      // server-side persistence quietly dropped non-key updates too.
      // We compare each sent value against the server's read-back so a
      // dropped write surfaces a real error instead of a fake success.
      var keysToVerify = Object.keys(updates);
      var mismatches = [];
      for (var i = 0; i < keysToVerify.length; i++) {
        var k = keysToVerify[i];
        var expected = (updates[k] == null ? "" : String(updates[k])).trim();
        var actual = (serverConfig[k] == null ? "" : String(serverConfig[k]));
        if (actual !== expected) {
          mismatches.push({ key: k, expected: expected, actual: actual });
        }
      }
      if (mismatches.length > 0) {
        // Special-case ark_api_key so the dedicated "回读不一致" toast
        // and "保留输入框内容" UX still apply.
        if (updates.ark_api_key && mismatches.some(function(m) { return m.key === "ark_api_key"; })) {
          showToast(_tr("settings.toast.keyError"), "error");
        } else {
          var first = mismatches[0];
          showToast(
            _tr("settings.toast.valueMismatch", {
              key: first.key,
              expected: first.expected,
              actual: first.actual || "(空)",
            }),
            "error"
          );
        }
        setSaving(false);
        return;
      }

      // ── Step 4: All keys round-tripped → safe to do the post-save UX ─
      if (updates.ark_api_key) {
        setApiKey("");
        if (onKeyChange) onKeyChange(serverConfig.ark_api_key || "");
      }

      showToast(_tr("settings.toast.saved"));
    } catch (e) {
      showToast(_tr("settings.toast.saveFailed", { msg: e.message || String(e) }), "error");
    }
    setSaving(false);
  };

  const [stats, setStats] = useState(null);
  useEffect(() => {
    pluginApi("GET", "/storage/stats").then(r => r.body?.stats && setStats(r.body.stats)).catch(() => {});
  }, []);

  const statKeyMap = {output_dir:"settings.stats.outputDir", assets_dir:"settings.stats.assetsDir", cache_dir:"settings.stats.cacheDir"};

  // ── Folder helpers ────────────────────────────────────────────────
  // "Open" goes through the plugin backend (mkdir -p + spawn explorer/
  // open/xdg-open). This works even when the user has NOT customized
  // the folder yet — the backend resolves `key` to the same default
  // that /storage/stats uses, so "默认: ~/seedance-output/" is openable.
  const openFolderByKey = async (key) => {
    try {
      const r = await pluginApi("POST", "/storage/open-folder", { key });
      if (!r.body?.ok) {
        showToast(_tr("settings.folder.openFailed", { msg: r.body?.detail || "" }), "error");
      }
    } catch (e) {
      showToast(_tr("settings.folder.openFailed", { msg: e.message || String(e) }), "error");
    }
  };

  // "Select" opens the in-plugin folder picker modal. The native Tauri
  // dialog has been unreliable across capability/version combos, so we
  // serve our own browser backed by /storage/list-dir + /storage/mkdir.
  // This needs ZERO host or Tauri cooperation and works in plain web
  // mode too.
  const [folderPicker, setFolderPicker] = useState(null); // {key, title, initialPath} | null
  const openFolderPicker = (configKey, titleKey) => {
    setFolderPicker({
      key: configKey,
      title: _tr(titleKey),
      initialPath: (config[configKey] || "").trim(),
    });
  };
  const handleFolderPickerSelect = (path) => {
    if (!folderPicker) return;
    const k = folderPicker.key;
    setFolderPicker(null);
    if (path) {
      setConfig({...config, [k]: path});
      save({[k]: path});
      showToast(_tr("settings.folder.savedTo", { path }));
    }
  };

  return (
    <div className="centered-tab">
      <div className="centered-tab__inner">
      <div className="setting-section oa-settings-section">
        <h3 className="oa-settings-section__title"><Ico name="key"/> {t("settings.section.api")}</h3>
        <div className={"form-row" + (config.ark_api_key ? "" : " oa-config-field-callout")}
             data-callout={config.ark_api_key ? undefined : t("settings.api.required")}>
          <label className="label">{t("settings.label.apiKey")}</label>
          <div className="flex gap-2">
            <input className="input flex-1" type={showKey?"text":"password"}
              value={apiKey !== "" ? apiKey : (config.ark_api_key || "")} onChange={e => setApiKey(e.target.value)}
              placeholder={t("settings.api.placeholder")} />
            <button className="btn btn-sm" onClick={() => setShowKey(!showKey)}>{showKey ? t("settings.api.hide") : t("settings.api.show")}</button>
            <button className="btn btn-sm btn-primary" disabled={!apiKey || saving} onClick={() => {
              var trimmed = (apiKey || "").trim();
              if (!trimmed) {
                showToast(_tr("settings.toast.keyEmpty"), "error");
                return;
              }
              save({ark_api_key: trimmed});
            }}>{saving ? t("settings.api.saving") : t("settings.api.save")}</button>
          </div>
          <p className="text-xs text-dim" style={{marginTop:4}}>{t("settings.api.help")}</p>
        </div>
        <div className="form-row">
          <label className="label">{t("settings.label.baseUrl")}</label>
          <div className="flex gap-2">
            <input className="input flex-1" type="text"
              value={config.ark_base_url || ""} onChange={e => setConfig({...config, ark_base_url: e.target.value})}
              placeholder={t("settings.api.baseUrl.placeholder")} />
            <button className="btn btn-sm btn-primary" disabled={saving} onClick={() => {
              var baseUrl = (config.ark_base_url || "").trim().replace(/\/+$/, "");
              save({ark_base_url: baseUrl});
            }}>{saving ? t("settings.api.saving") : t("settings.api.save")}</button>
          </div>
          <p className="text-xs text-dim" style={{marginTop:4}}>{t("settings.api.baseUrl.help")}</p>
        </div>
        <div className="grid-2">
          <div className="form-row">
            <label className="label">共享中转站名称（可选）</label>
            <input className="input" type="text"
              value={config.ark_relay_endpoint || ""}
              onChange={e => setConfig({...config, ark_relay_endpoint: e.target.value})}
              onBlur={e => save({ark_relay_endpoint: e.target.value.trim()})}
              placeholder="例如: yunwu-video" />
            <p className="text-xs text-dim" style={{marginTop:4}}>来自 LLM 配置页 relay_endpoints；填写后优先使用共享中转站。</p>
          </div>
          <div className="form-row">
            <label className="label">中转站失败策略</label>
            <select className="input select" value={config.ark_relay_fallback_policy || "official"}
              onChange={e => save({ark_relay_fallback_policy: e.target.value})}>
              <option value="official">official：失败时回官方/插件配置</option>
              <option value="strict">strict：失败时阻止提交</option>
            </select>
          </div>
        </div>
      </div>

      <div className="setting-section oa-settings-section">
        <h3 className="oa-settings-section__title"><Ico name="shield"/> {t("settings.section.permissions")}</h3>
        <PermissionsPanel status={permsStatus} onChanged={onPermsRefresh} />
      </div>

      <div className="setting-section oa-settings-section">
        <h3 className="oa-settings-section__title"><Ico name="package"/> {t("settings.section.system")}</h3>
        <div className="deps-help">
          <strong>{t("settings.system.intro.strong")}</strong>
          <div style={{marginTop:4}}>{t("settings.system.intro.body")}</div>
          <ul>
            <li>{t("settings.system.platform.win")}</li>
            <li>{t("settings.system.platform.mac")}</li>
            <li>{t("settings.system.platform.linux")}</li>
          </ul>
        </div>
        <FfmpegInstaller onInstalled={() => onFfmpegChanged && onFfmpegChanged(true)} />
      </div>

      <div className="setting-section oa-settings-section">
        <h3 className="oa-settings-section__title"><Ico name="settings"/> {t("settings.section.defaults")}</h3>
        <div className="grid-2">
          <div className="form-row">
            <label className="label">{t("settings.label.tier")}</label>
            <select className="input select" value={config.service_tier_default || "default"}
              onChange={e => save({service_tier_default: e.target.value})}>
              <option value="default">{t("settings.tier.online")}</option>
              <option value="flex">{t("settings.tier.flex")}</option>
            </select>
          </div>
          <div className="form-row">
            <label className="label">{t("settings.label.poll")}</label>
            <select className="input select" value={config.poll_interval || "15"}
              onChange={e => save({poll_interval: e.target.value})}>
              <option value="10">{t("settings.poll.10")}</option>
              <option value="15">{t("settings.poll.15")}</option>
              <option value="30">{t("settings.poll.30")}</option>
              <option value="60">{t("settings.poll.60")}</option>
            </select>
          </div>
          <div className="form-row">
            <label className="label">{t("settings.label.optimizeLevel")}</label>
            <select className="input select" value={config.llm_optimize_level || "professional"}
              onChange={e => save({llm_optimize_level: e.target.value})}>
              <option value="light">{t("settings.optimize.light")}</option>
              <option value="professional">{t("settings.optimize.professional")}</option>
              <option value="storyboard">{t("settings.optimize.storyboard")}</option>
            </select>
          </div>
        </div>
      </div>

      <div className="setting-section oa-settings-section">
        <h3 className="oa-settings-section__title"><Ico name="folder"/> {t("settings.section.folder")}</h3>
        <div className="form-row">
          <label className="label">{t("settings.label.outputDir")}</label>
          <div className="folder-row">
            <input className="input" value={config.output_dir || ""} placeholder={t("settings.outputDir.placeholder")}
              onChange={e => setConfig({...config, output_dir: e.target.value})}
              onBlur={e => save({output_dir: e.target.value})} />
            <button className="btn btn-sm" onClick={() => openFolderPicker("output_dir", "settings.pickOutput")}>{t("settings.btn.browse")}</button>
            <button className="btn btn-sm" onClick={() => openFolderByKey("output_dir")}>{t("settings.btn.open")}</button>
          </div>
          <div className="grid-2" style={{marginTop:6}}>
            <div>
              <label className="label">{t("settings.label.subdir")}</label>
              <select className="input select" value={config.output_subdir_mode || "date"}
                onChange={e => save({output_subdir_mode: e.target.value})}>
                <option value="date">{t("settings.subdir.date")}</option>
                <option value="project">{t("settings.subdir.project")}</option>
                <option value="flat">{t("settings.subdir.flat")}</option>
              </select>
            </div>
            <div>
              <label className="label">{t("settings.label.naming")}</label>
              <select className="input select" value={config.output_naming_rule || "{date}_{prompt_prefix}"}
                onChange={e => save({output_naming_rule: e.target.value})}>
                <option value="{'{'}task_id{'}'}">{'{'}task_id{'}'}.mp4</option>
                <option value="{'{'}date{'}'}_{'{'}prompt_prefix{'}'}">{'{'}date{'}'}_{'{'}prompt{'}'}.mp4</option>
                <option value="{'{'}date{'}'}_{'{'}mode{'}'}_{'{'}seq{'}'}">{'{'}date{'}'}_{'{'}mode{'}'}_{'{'}seq{'}'}.mp4</option>
              </select>
            </div>
          </div>
          <div className="flex items-center justify-between" style={{marginTop:8}}>
            <span className="text-sm">{t("settings.toggle.autoDownload")}</span>
            <div className={`switch ${config.auto_download==="true"?"on":""}`}
              onClick={() => save({auto_download: config.auto_download==="true"?"false":"true"})} />
          </div>
        </div>

        <div className="form-row">
          <label className="label">{t("settings.label.assetsDir")}</label>
          <div className="folder-row">
            <input className="input" value={config.assets_dir || ""} placeholder={t("settings.assetsDir.placeholder")}
              onChange={e => setConfig({...config, assets_dir: e.target.value})}
              onBlur={e => save({assets_dir: e.target.value})} />
            <button className="btn btn-sm" onClick={() => openFolderPicker("assets_dir", "settings.pickAssets")}>{t("settings.btn.browse")}</button>
            <button className="btn btn-sm" onClick={() => openFolderByKey("assets_dir")}>{t("settings.btn.open")}</button>
          </div>
        </div>

        {stats && (
          <div className="grid-3" style={{marginTop:12}}>
            {Object.entries(stats).map(([k, s]) => (
              <div key={k} className="card" style={{padding:10,textAlign:"center"}}>
                <div className="text-xs text-dim">{statKeyMap[k] ? t(statKeyMap[k]) : k}</div>
                <div style={{fontSize:18,fontWeight:600,color:"var(--primary)",margin:"4px 0"}}>{s.size_mb} MB</div>
                <div className="text-xs text-dim">{t("settings.stats.fileCount", { n: s.file_count })}</div>
              </div>
            ))}
          </div>
        )}
      </div>

      <div className="centered-tab__footer">
        <h3 className="oa-settings-section__title"><Ico name="link"/> {t("settings.section.webhook")}</h3>
        <div className="form-row">
          <label className="label">{t("settings.label.callback")}</label>
          <input className="input" value={config.callback_url || ""} placeholder={t("settings.callback.placeholder")}
            onChange={e => setConfig({...config, callback_url: e.target.value})}
            onBlur={e => save({callback_url: e.target.value})} />
          <p className="text-xs text-dim" style={{marginTop:4}}>{t("settings.callback.help")}</p>
        </div>
      </div>
      </div>

      <FolderPickerModal
        open={!!folderPicker}
        title={folderPicker?.title}
        initialPath={folderPicker?.initialPath}
        onCancel={() => setFolderPicker(null)}
        onSelect={handleFolderPickerSelect}
      />
    </div>
  );
}

// ── Main App ──
function App() {
  const t = useT();
  const [activeTab, setActiveTab] = useState(0);
  const models = useModels();
  const [configLoaded, setConfigLoaded] = useState(false);
  const [keyStatus, setKeyStatus] = useState("");
  const [permsStatus, setPermsStatus] = useState(null);
  const [createAction, setCreateAction] = useState(null);

  useEffect(() => {
    pluginApi("GET", "/settings").then(r => {
      setConfigLoaded(true);
      if (r.body?.config?.ark_api_key) setKeyStatus(r.body.config.ark_api_key);
    }).catch(() => setConfigLoaded(true));
  }, []);

  // Refresh on mount, and re-expose so SettingsTab can re-fetch after a
  // grant succeeds. Wrapped in useCallback so child effects with this in
  // their deps array don't loop.
  const refreshPerms = useCallback(async () => {
    try {
      const r = await pluginApi("GET", "/permissions/check");
      if (r.body?.ok) setPermsStatus(r.body);
    } catch (e) {
      // permission probe failure is non-fatal; assume granted to avoid
      // a permanent banner when the endpoint itself is unreachable.
      setPermsStatus({ ok: true, all_granted: true, missing: [], checks: [] });
    }
  }, []);
  useEffect(() => { refreshPerms(); }, [refreshPerms]);

  const settingsIdx = TAB_IDS.indexOf("settings");
  const permsMissing = permsStatus && !permsStatus.all_granted;
  const openCreateFromTask = (payload) => {
    setCreateAction({ ...payload, nonce: Date.now() });
    setActiveTab(0);
  };

  return (
    <div className="app">
      <div className="header">
        <h1>
          <span className="header-icon" dangerouslySetInnerHTML={{__html: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><defs><linearGradient id="hib" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#4338CA"/><stop offset="55%" stop-color="#6366F1"/><stop offset="100%" stop-color="#818CF8"/></linearGradient><linearGradient id="hic" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#FFF"/><stop offset="100%" stop-color="#E0E7FF"/></linearGradient><linearGradient id="his" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#FDE68A"/><stop offset="100%" stop-color="#F59E0B"/></linearGradient></defs><rect width="64" height="64" rx="14" fill="url(#hib)"/><path d="M14 18L50 14V24L14 28Z" fill="url(#hic)" opacity=".95"/><g stroke="#6366F1" stroke-width="1.8" stroke-linecap="round" opacity=".5"><line x1="20" y1="17.2" x2="23" y2="25.8"/><line x1="28" y1="16" x2="31" y2="24.6"/><line x1="36" y1="14.8" x2="39" y2="23.4"/><line x1="44" y1="13.6" x2="47" y2="22.2"/></g><rect x="14" y="26" width="36" height="22" rx="3" fill="url(#hic)" opacity=".92"/><rect x="18" y="30" width="28" height="14" rx="2" fill="#312E81" opacity=".7"/><polygon points="28,33 28,41 36,37" fill="rgba(255,255,255,.85)"/><path d="M48 8L50 14L56 16L50 18L48 24L46 18L40 16L46 14Z" fill="url(#his)" opacity=".95"/><path d="M54 26L55 29L58 30L55 31L54 34L53 31L50 30L53 29Z" fill="#FDE68A" opacity=".7"/></svg>'}} />
          <span className="header-title-wrap">
            <span className="header-title-main">{t("app.title")}</span>
            <span className="header-title-sub">{t("app.subtitle")}</span>
          </span>
        </h1>
        <div className="header-right">
          {keyStatus
            ? <span className="api-pill" title={keyStatus}>
                <Ico name="check"/> {t("app.api.label")}: {keyStatus.length > 12 ? keyStatus.slice(0,4)+"..."+keyStatus.slice(-4) : keyStatus}
              </span>
            : <span className="api-pill api-pill--missing"
                onClick={() => setActiveTab(settingsIdx)}
                title={t("app.api.tooltip")}>
                <Ico name="warn"/> {t("app.api.missing")}
              </span>}
        </div>
      </div>
      <div className="tabs">
        {TAB_IDS.map((id, i) => (
          <div key={id} className={`tab ${activeTab===i?"active":""}`} onClick={() => setActiveTab(i)}><Ico name={TAB_ICONS[id] || "video"}/> {t("tabs." + id)}</div>
        ))}
      </div>
      {!keyStatus && configLoaded && activeTab !== settingsIdx && (
        <div className="oa-config-banner" role="alert"
             style={{margin:"12px 16px 0", flexShrink:0}}>
          <span className="oa-icon oa-config-banner__icon"
                dangerouslySetInnerHTML={{__html: window.OpenAkitaIcons ? window.OpenAkitaIcons.warning() : ""}} />
          <div className="oa-config-banner__text">
            <strong>{t("banner.noKey.title")}</strong>
            <div style={{fontSize:12, color:"var(--text-muted)", marginTop:2}}>
              {t("banner.noKey.desc")}
            </div>
          </div>
          <button className="oa-config-banner__action" type="button"
                  onClick={() => setActiveTab(settingsIdx)}>
            {t("banner.noKey.cta")}
            <span className="oa-icon"
                  dangerouslySetInnerHTML={{__html: window.OpenAkitaIcons ? window.OpenAkitaIcons.arrowRight() : ""}} />
          </button>
        </div>
      )}
      {permsMissing && activeTab !== settingsIdx && (
        <div className="oa-config-banner" role="alert"
             style={{margin:"12px 16px 0", flexShrink:0,
                     borderColor:"var(--warning, #f59e0b)"}}>
          <span className="oa-icon oa-config-banner__icon"
                style={{color:"var(--warning, #f59e0b)"}}
                dangerouslySetInnerHTML={{__html: window.OpenAkitaIcons ? window.OpenAkitaIcons.warning() : ""}} />
          <div className="oa-config-banner__text">
            <strong>{t("banner.perms.title")}</strong>
            <div style={{fontSize:12, color:"var(--text-muted)", marginTop:2}}>
              {t("banner.perms.desc")}
            </div>
          </div>
          <button className="oa-config-banner__action" type="button"
                  onClick={() => setActiveTab(settingsIdx)}>
            {t("banner.perms.cta")}
            <span className="oa-icon"
                  dangerouslySetInnerHTML={{__html: window.OpenAkitaIcons ? window.OpenAkitaIcons.arrowRight() : ""}} />
          </button>
        </div>
      )}
      <div className="content">
        <div className={`tab-pane ${activeTab === 0 ? "active" : ""}`}>
          <CreateTab models={models} onGoToTasks={() => setActiveTab(2)} action={createAction} />
        </div>
        <div className={`tab-pane ${activeTab === 1 ? "active" : ""}`}>
          <StoryboardTab onGoToSettings={() => setActiveTab(settingsIdx)} />
        </div>
        <div className={`tab-pane ${activeTab === 2 ? "active" : ""}`}>
          <TaskListTab isActive={activeTab === 2} onUseVideo={openCreateFromTask} />
        </div>
        <div className={`tab-pane ${activeTab === 3 ? "active" : ""}`}>
          <AssetsTab isActive={activeTab === 3} />
        </div>
        <div className={`tab-pane ${activeTab === 4 ? "active" : ""}`}>
          <PromptGuideTab />
        </div>
        <div className={`tab-pane ${activeTab === settingsIdx ? "active" : ""}`}>
          <SettingsTab
            onKeyChange={k => setKeyStatus(k)}
            permsStatus={permsStatus}
            onPermsRefresh={refreshPerms}
          />
        </div>
      </div>
    </div>
  );
}

// React 18 production build will UNMOUNT the entire root if any component
// throws and there is no error boundary above it. This boundary catches
// those errors at the App root, keeps the host shell visible, and shows
// the actual error message + stack so we can debug.
class PluginErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { error: null, info: null };
  }
  static getDerivedStateFromError(error) {
    return { error };
  }
  componentDidCatch(error, info) {
    this.setState({ info });
    console.error("[seedance-video] render error:", error, info);
  }
  reset = () => this.setState({ error: null, info: null });
  render() {
    if (!this.state.error) return this.props.children;
    const err = this.state.error;
    const stack = (err && err.stack) || String(err);
    const compStack = (this.state.info && this.state.info.componentStack) || "";
    const tr = (k) => _i18n.t(k);
    return (
      <div style={{padding: 24, maxWidth: 820, margin: "0 auto"}}>
        <div className="oa-config-banner" role="alert" style={{borderColor: "var(--danger, #ef4444)"}}>
          <span className="oa-icon oa-config-banner__icon" style={{color: "var(--danger, #ef4444)"}}
                dangerouslySetInnerHTML={{__html: window.OpenAkitaIcons ? window.OpenAkitaIcons.warning() : ""}} />
          <div className="oa-config-banner__text">
            <strong>{tr("err.title")}</strong>
            <div style={{fontSize: 12, color: "var(--text-muted)", marginTop: 4}}>
              {err && err.message ? err.message : String(err)}
            </div>
          </div>
          <button className="oa-config-banner__action" type="button" onClick={this.reset}>
            {tr("err.retry")}
          </button>
        </div>
        <details style={{marginTop: 16, fontSize: 12, color: "var(--text-muted)"}} open>
          <summary style={{cursor: "pointer", marginBottom: 8}}>{tr("err.stackLabel")}</summary>
          <pre style={{padding: 12, background: "var(--bg-card, var(--bg))", border: "1px solid var(--border)", borderRadius: 6, overflow: "auto", maxHeight: 240, whiteSpace: "pre-wrap", wordBreak: "break-word"}}>
{stack}
{compStack ? "\n--- React component stack ---" + compStack : ""}
          </pre>
        </details>
      </div>
    );
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <PluginErrorBoundary><App /></PluginErrorBoundary>
);
// Tell the host we have rendered the first frame so it can dismiss the
// loading overlay accurately (instead of guessing from iframe.onLoad,
// which fires before Babel-standalone compiles this script).
if (window.OpenAkita && typeof window.OpenAkita.ready === "function") {
  window.OpenAkita.ready();
}
</script>
</body>

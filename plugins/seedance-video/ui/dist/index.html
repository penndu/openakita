  const [model, setModel] = useState("2.0");
  const [resolution, setResolution] = useState("720p");
  const [genMode, setGenMode] = useState("serial");
  const [transition, setTransition] = useState("none");
  const [fadeDur, setFadeDur] = useState(0.5);
  const [segments, setSegments] = useState([]);
  const [decomposing, setDecomposing] = useState(false);
  const [generating, setGenerating] = useState(false);
  const [concatenating, setConcatenating] = useState(false);
  const [genResults, setGenResults] = useState([]);
  const [concatPath, setConcatPath] = useState("");
  const [ffmpegOk, setFfmpegOk] = useState(null);
  const [step, setStep] = useState("input");
  const [editIdx, setEditIdx] = useState(-1);
  const [previewIdx, setPreviewIdx] = useState(-1);

  // Sprint 8 / V2 — chain_group state.  We persist the most recent
  // group_id in localStorage so a tab refresh / window close mid-chain
  // can be recovered automatically: the user reported "分镜出现两次 /
  // 生成两次" precisely because they were forced to re-click 开始生成
  // after losing the in-memory React state, doubling the DB rows.
  const LS_KEY = "seedance.chainGroupId";
  const [chainGroupId, setChainGroupId] = useState(() => {
    try { return localStorage.getItem(LS_KEY) || ""; } catch { return ""; }
  });
  const [chainProgress, setChainProgress] = useState({
    pending: 0, running: 0, succeeded: 0, failed: 0, other: 0, total: 0,
  });

  useEffect(() => {
    pluginApi("GET", "/long-video/ffmpeg-check").then(r => {
      setFfmpegOk(r.body?.available ?? false);
    }).catch(() => setFfmpegOk(false));
  }, []);

  // Recovery on mount — if a previous session left a chainGroupId in
  // localStorage, query the backend to see if it's still progressing or
  // has results to display.  We do NOT touch step/segments if there's
  // no recoverable group; the user just sees the normal `input` view.
  useEffect(() => {
    if (!chainGroupId) return;
    let cancelled = false;
    (async () => {
      try {
        const r = await pluginApi("GET", `/long-video/tasks/${chainGroupId}`);
        if (cancelled) return;
        const tasks = r.body?.tasks || [];
        const progress = r.body?.progress || {};
        if (!tasks.length && !r.body?.chain_active) {
          // Stale localStorage entry — chain finished long ago and
          // its tasks may have been deleted.  Drop it silently.
          try { localStorage.removeItem(LS_KEY); } catch {}
          setChainGroupId("");
          return;
        }
        setGenResults(tasks);
        setChainProgress({
          pending:   progress.pending   || 0,
          running:   progress.running   || 0,
          succeeded: progress.succeeded || 0,
          failed:    progress.failed    || 0,
          other:     progress.other     || 0,
          total:     progress.total     || tasks.length,
        });
        const stillRunning = (progress.pending || 0) + (progress.running || 0) > 0
                            || r.body?.chain_active;
        setStep(stillRunning ? "generating" : "results");
        if (!stillRunning) {
          try { localStorage.removeItem(LS_KEY); } catch {}
          setChainGroupId("");
        } else {
          setGenerating(true);
        }
      } catch (e) {
        // Backend unreachable — keep the LS entry, the next mount will
        // try again.  Don't bother the user.
        console.warn("[seedance] chain recovery failed:", e);
      }
    })();
    return () => { cancelled = true; };
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  // Polling effect — runs while we know about an active chain.  Fires
  // every 5 s, stops when progress.{pending,running} both hit zero.
  useEffect(() => {
    if (!chainGroupId) return;
    let cancelled = false;
    const tick = async () => {
      try {
        const r = await pluginApi("GET", `/long-video/tasks/${chainGroupId}`);
        if (cancelled) return;
        const tasks = r.body?.tasks || [];
        const progress = r.body?.progress || {};
        setGenResults(tasks);
        setChainProgress({
          pending:   progress.pending   || 0,
          running:   progress.running   || 0,
          succeeded: progress.succeeded || 0,
          failed:    progress.failed    || 0,
          other:     progress.other     || 0,
          total:     progress.total     || tasks.length,
        });
        const remaining = (progress.pending || 0) + (progress.running || 0);
        if (remaining === 0 && !r.body?.chain_active) {
          // Done — flip to results, clear the LS so the next chain run
          // starts cleanly.
          try { localStorage.removeItem(LS_KEY); } catch {}
          setChainGroupId("");
          setGenerating(false);
          setStep("results");
        }
      } catch (e) {
        console.warn("[seedance] chain poll failed:", e);
      }
    };
    const timer = setInterval(tick, 5000);
    // Kick once immediately so the first tick doesn't have to wait 5 s
    tick();
    return () => { cancelled = true; clearInterval(timer); };
  }, [chainGroupId]);

  const [decomposeProgress, setDecomposeProgress] = useState("");
  const decompose = async () => {
    if (!story.trim()) return;
    setDecomposing(true);
    setDecomposeProgress(_tr("story.decompose.connect"));
    var timer = setTimeout(() => setDecomposeProgress(_tr("story.decompose.analyze")), 3000);
    var timer2 = setTimeout(() => setDecomposeProgress(_tr("story.decompose.batch", { n: Math.max(1, Math.round(totalDuration / segDuration)) })), 10000);
    var timer3 = setTimeout(() => setDecomposeProgress(_tr("story.decompose.long")), 20000);
    try {
      const r = await pluginApi("POST", "/long-video/storyboard", {
        story, total_duration: totalDuration, segment_duration: segDuration, ratio, style,
      });
      if (r.body?.ok && r.body.storyboard?.segments) {
        // Sprint 8 / V2 — LLM occasionally returns identical segments
        // (especially for short stories asked to be split into many
        // shots).  The bug report's "出现一个分镜头出现两次" matched
        // exactly this pattern, so we deduplicate by trimmed prompt
        // before the user can submit them for generation.
        const raw = r.body.storyboard.segments;
        const seen = new Map();
        const dedup = [];
        for (const s of raw) {
          const key = (s.prompt || "").trim().toLowerCase();
          if (!key) { dedup.push(s); continue; }
          if (seen.has(key)) continue;
          seen.set(key, true);
          dedup.push(s);
        }
        const merged = dedup.map((s, i) => ({ ...s, index: i + 1 }));
        setSegments(merged);
        setStep("edit");
        if (merged.length < raw.length) {
          showToast(_tr("toast.dedupedSegments",
            { n: raw.length - merged.length },
            "AI 输出有 {n} 段重复，已自动合并"), "warning");
        }
        showToast(_tr("toast.decomposeOk", { n: merged.length }));
      } else {
        showToast(_tr("toast.decomposeFail", { msg: r.body?.error || _tr("toast.unknownErr") }), "error");
      }
    } catch (e) { showToast(_tr("toast.requestFail", { msg: e.message }), "error"); }
    clearTimeout(timer); clearTimeout(timer2); clearTimeout(timer3);
    setDecomposing(false);
    setDecomposeProgress("");
  };

  const updateSeg = (idx, field, val) => {
    setSegments(prev => prev.map((s, i) => i === idx ? {...s, [field]: val} : s));
  };

  const removeSeg = (idx) => {
    setSegments(prev => prev.filter((_, i) => i !== idx).map((s, i) => ({...s, index: i + 1})));
  };

  const addSeg = () => {
    setSegments(prev => [...prev, {
      index: prev.length + 1, duration: segDuration, prompt: "",
      key_frame_description: "", end_frame_description: "",
      transition_to_next: "cut", camera_notes: "", audio_notes: "",
    }]);
  };

  const moveSeg = (idx, dir) => {
    const arr = [...segments];
    const target = idx + dir;
    if (target < 0 || target >= arr.length) return;
    [arr[idx], arr[target]] = [arr[target], arr[idx]];
    setSegments(arr.map((s, i) => ({...s, index: i + 1})));
  };

  const startGeneration = async () => {
    if (segments.length === 0) return;
    setGenerating(true);
    setGenResults([]);
    setChainProgress({ pending:0, running:0, succeeded:0, failed:0, other:0, total: segments.length });
    setStep("generating");
    try {
      // Fire-and-forget: backend immediately returns a group_id and runs
      // the chain in the background.  The polling effect above takes
      // over from here.
      const r = await pluginApi("POST", "/long-video/generate", {
        segments, model, ratio, resolution, mode: genMode, transition, fade_duration: fadeDur,
      });
      if (r.body?.ok && r.body?.group_id) {
        try { localStorage.setItem(LS_KEY, r.body.group_id); } catch {}
        setChainGroupId(r.body.group_id);
      } else if (r.body?.error === "chain_in_progress" && r.body?.group_id) {
        // Friendly path: server says "you already have an identical
        // chain in flight".  Pick up that group_id and resume polling
        // instead of duplicating the run.
        try { localStorage.setItem(LS_KEY, r.body.group_id); } catch {}
        setChainGroupId(r.body.group_id);
        showToast(r.body.message
          || _tr("toast.chainInProgress", null,
            "已有相同分镜在生成，正在为你恢复进度…"), "warning");
      } else {
        const detail = r.body?.detail || r.body?.error || "";
        showToast(_tr("toast.genFail", { msg: detail }), "error");
        setStep("edit");
        setGenerating(false);
      }
    } catch (e) {
      showToast(_tr("toast.requestFail", { msg: e.message }), "error");
      setStep("edit");
      setGenerating(false);
    }
  };

  const doConcat = async () => {
    const successIds = genResults.filter(r => r.status === "succeeded" && r.id).map(r => r.id);
    if (successIds.length < 2) { showToast(_tr("toast.concatNeed2"), "warning"); return; }
    setConcatenating(true);
    try {
      for (const tid of successIds) {
        const t = genResults.find(r => r.id === tid);
        if (!t?.local_video_path) {
          await pluginApi("GET", `/videos/${tid}/download`);
        }
      }
      const r = await pluginApi("POST", "/long-video/concat", {
        task_ids: successIds, transition, fade_duration: fadeDur,
      });
      if (r.body?.ok) {
        setConcatPath(r.body.output_path);
        setStep("done");
      } else {
        showToast(_tr("toast.concatFail", { msg: r.body?.detail || r.body?.error || "" }), "error");
      }
    } catch (e) { showToast(_tr("toast.concatFail", { msg: e.message }), "error"); }
    setConcatenating(false);
  };

  const jumpToStep = (target) => {
    if (target === "results") {
      setStep(genResults.length > 0 || concatPath ? "results" : "results");
      return;
    }
    setStep(target);
  };

  const WorkflowHeader = () => {
    const activeKey = step === "done" ? "results" : step;
    const items = [
      { key: "input", label: t("story.step.input") },
      { key: "edit", label: t("story.step.edit") },
      { key: "generating", label: t("story.step.generating") },
      { key: "results", label: t("story.step.results") },
    ];
    return (
      <div className="storyboard-hero">
        <div>
          <div className="storyboard-hero__title"><Ico name="layoutGrid"/> {t("story.workspace.title")}</div>
          <div className="storyboard-hero__hint">{t("story.workspace.hint")}</div>
        </div>
        <div className="storyboard-steps">
          {items.map((it, i) => (
            <button key={it.key} type="button"
              className={`story-step ${activeKey === it.key ? "active" : ""}`}
              onClick={() => jumpToStep(it.key)}>
              <span className="story-step__num">{i + 1}</span>
              <span>{it.label}</span>
            </button>
          ))}
        </div>
      </div>
    );
  };

  const StoryEmpty = ({ icon = "layoutGrid", title, hint, action }) => (
    <div className="story-empty-panel">
      <div className="story-empty-panel__icon"><Ico name={icon}/></div>
      <div className="story-empty-panel__title">{title}</div>
      <div className="story-empty-panel__hint">{hint}</div>
      {action}
    </div>
  );

  const segCountEst = Math.max(1, Math.round(totalDuration / segDuration));

  if (step === "input") {
    const usageHtml = (window.OpenAkitaMD && typeof window.OpenAkitaMD.render === "function")
      ? window.OpenAkitaMD.render(t("story.usage.body") + "\n\n" + t("story.usage.warn"))
      : null;
    return (
      <div className="storyboard-workspace">
        <WorkflowHeader />
        <div className="storyboard-body storyboard-split">
        <div className="storyboard-split__left">
          <div className="card story-card-soft">
            <div className="oa-section-label"><Ico name="book"/> {t("story.section.input")}</div>
            <div className="form-row">
              <label className="label">{t("story.label.story")}</label>
              <textarea className="input textarea" rows={6} value={story} onChange={e => setStory(e.target.value)}
                placeholder={t("story.story.placeholder")} />
            </div>

            <div className="grid-2">
              <div className="form-row">
                <label className="label">{t("story.label.totalDuration")}</label>
                <input className="input" type="number" min={10} max={600} value={totalDuration}
                  onChange={e => setTotalDuration(+e.target.value)} />
              </div>
              <div className="form-row">
                <label className="label">{t("story.label.segDuration")}</label>
                <select className="input select" value={segDuration} onChange={e => setSegDuration(+e.target.value)}>
                  <option value={5}>5</option><option value={8}>8</option>
                  <option value={10}>10</option><option value={15}>15</option>
                </select>
              </div>
              <div className="form-row">
                <label className="label">{t("story.label.ratio")}</label>
                <select className="input select" value={ratio} onChange={e => setRatio(e.target.value)}>
                  <option value="16:9">16:9</option><option value="9:16">9:16</option>
                  <option value="1:1">1:1</option><option value="4:3">4:3</option>
                  <option value="3:4">3:4</option><option value="21:9">21:9</option>
                </select>
              </div>
              <div className="form-row">
                <label className="label">{t("story.label.style")}</label>
                <input className="input" value={style} onChange={e => setStyle(e.target.value)} />
              </div>
            </div>

            <div style={{padding:"10px 12px",background:"var(--bg)",borderRadius:6,marginBottom:14,fontSize:13,color:"var(--text-muted)"}}>
              {t("story.estimate", { n: segCountEst, seg: segDuration, total: segCountEst * segDuration })}
            </div>

            <div className="flex gap-2 justify-between items-center">
              {decomposing && decomposeProgress ? (
                <div style={{fontSize:13,color:"var(--primary)",display:"flex",alignItems:"center",gap:8}}>
                  <span className="spinner-sm" />
                  {decomposeProgress}
                </div>
              ) : <div />}
              <button className="btn btn-primary" disabled={!story.trim() || decomposing} onClick={decompose}>
                {decomposing
                  ? t("story.decompose.busy")
                  : <><Ico name="film"/> {t("story.decompose.idle")}</>}
              </button>
            </div>
          </div>

          <div className="card story-card-soft">
            <div className="oa-section-label"><Ico name="lightbulb"/> {t("story.section.usage")}</div>
            {usageHtml
              ? <div className="oa-md-content" dangerouslySetInnerHTML={{ __html: usageHtml }} />
              : <pre style={{whiteSpace:"pre-wrap",fontSize:13,color:"var(--text-muted)",lineHeight:1.8,fontFamily:"inherit"}}>{t("story.usage.body") + "\n\n" + t("story.usage.warn")}</pre>}
          </div>
        </div>
        <div className="storyboard-split__right">
          <div className="storyboard-preview">
            <div className="storyboard-preview__overlay">
              <div className="storyboard-preview__overlay-title"><Ico name="layoutGrid"/> {t("story.preview.title")}</div>
              <div className="storyboard-preview__overlay-desc">{t("story.preview.inputHint")}</div>
            </div>
            <div className="storyboard-preview__empty">
              <Ico name="film" />
              <span>{t("story.preview.empty")}</span>
            </div>
          </div>
        </div>
        </div>
      </div>
    );
  }

  if (step === "edit") {
    const previewSeg = previewIdx >= 0 && previewIdx < segments.length ? segments[previewIdx] : null;
    return (
      <div className="storyboard-workspace">
        <WorkflowHeader />
        <div className="storyboard-body storyboard-split">
        <div className="storyboard-split__left">
          <div className="flex justify-between items-center" style={{marginBottom:14}}>
            <div>
              <h3 style={{fontSize:16,fontWeight:600}}>{t("story.edit.title", { n: segments.length })}</h3>
              <p className="text-xs text-dim">{t("story.edit.hint")}</p>
            </div>
            <div className="flex gap-2">
              <button className="btn btn-sm" onClick={() => setStep("input")}><Ico name="arrowLeft"/> {t("story.btn.back")}</button>
              <button className="btn btn-sm" onClick={addSeg}><Ico name="plus"/> {t("story.btn.addSeg")}</button>
            </div>
          </div>

          <div className="card story-card-soft" style={{marginBottom:14}}>
            <div className="oa-section-label"><Ico name="settings"/> {t("story.section.params")}</div>
            <div className="grid-2">
              <div className="form-row">
                <label className="label">{t("story.label.model")}</label>
                <select className="input select" value={model} onChange={e => setModel(e.target.value)}>
                  <option value="2.0">Seedance 2.0</option>
                  <option value="1.0-pro">Seedance 1.0 Pro</option>
                  <option value="1.0-lite">Seedance 1.0 Lite</option>
                </select>
              </div>
              <div className="form-row">
                <label className="label">{t("story.label.resolution")}</label>
                <select className="input select" value={resolution} onChange={e => setResolution(e.target.value)}>
                  <option value="720p">720p</option><option value="1080p">1080p</option>
                </select>
              </div>
              <div className="form-row">
                <label className="label">{t("story.label.genMode")}</label>
                <select className="input select" value={genMode} onChange={e => setGenMode(e.target.value)}>
                  <option value="serial">{t("story.gen.serial")}</option>
                  <option value="serial_extend">{t("story.gen.serialExtend")}</option>
                  <option value="cloud_transition">{t("story.gen.cloudTransition")}</option>
                  <option value="parallel">{t("story.gen.parallel")}</option>
                </select>
              </div>
              <div className="form-row">
                <label className="label">{t("story.label.transition")}</label>
                <div className="flex gap-2">
                  <select className="input select flex-1" value={transition} onChange={e => setTransition(e.target.value)}>
                    <option value="none">{t("story.concat.modeCut")}</option>
                    <option value="crossfade">{t("story.concat.modeFade")}</option>
                  </select>
                  {transition === "crossfade" && (
                    <input className="input" type="number" step={0.1} min={0.2} max={2} value={fadeDur}
                      onChange={e => setFadeDur(+e.target.value)} style={{width:80}} />
                  )}
                </div>
              </div>
            </div>
          </div>

          {segments.length === 0 ? (
            <StoryEmpty
              icon="plus"
              title={t("story.empty.edit.title")}
              hint={t("story.empty.edit.hint")}
              action={
                <div className="flex gap-2">
                  <button className="btn btn-sm" onClick={() => setStep("input")}>{t("story.btn.goInput")}</button>
                  <button className="btn btn-sm btn-primary" onClick={addSeg}><Ico name="plus"/> {t("story.btn.addSeg")}</button>
                </div>
              }
            />
          ) : segments.map((seg, idx) => (
            <div key={idx} className={`card story-segment-card ${editIdx===idx?"active":""}`}
              onClick={() => { setPreviewIdx(idx); if (editIdx !== idx) setEditIdx(idx); }}>
              <div className="flex justify-between items-center" onClick={e => { e.stopPropagation(); setEditIdx(editIdx === idx ? -1 : idx); setPreviewIdx(idx); }}>
                <div className="flex gap-2 items-center">
                  <span className="badge badge-info" style={{minWidth:28,textAlign:"center"}}>{seg.index || idx+1}</span>
                  <span style={{fontWeight:500,fontSize:14}}>{seg.prompt ? seg.prompt.slice(0, 60) + (seg.prompt.length > 60 ? "..." : "") : t("tasks.noPrompt")}</span>
                </div>
                <div className="flex gap-2 items-center">
                  <span className="text-xs text-dim">{seg.duration || segDuration}s</span>
                  <span className="text-xs text-dim">{seg.transition_to_next || "cut"}</span>
                  <span style={{fontSize:11,color:"var(--text-dim)"}}>{editIdx === idx ? "▲" : "▼"}</span>
                </div>
              </div>

              {editIdx === idx && (
                <div style={{marginTop:12,paddingTop:12,borderTop:"1px solid var(--border)"}} onClick={e => e.stopPropagation()}>
                  <div className="form-row">
                    <label className="label">{t("create.section.prompt")}</label>
                    <textarea className="input textarea" rows={3} value={seg.prompt || ""}
                      onChange={e => updateSeg(idx, "prompt", e.target.value)} />
                  </div>
                  <div className="grid-2">
                    <div className="form-row">
                      <label className="label">{t("story.label.segDuration")}</label>
                      <input className="input" type="number" min={4} max={15} value={seg.duration || segDuration}
                        onChange={e => updateSeg(idx, "duration", +e.target.value)} />
                    </div>
                    <div className="form-row">
                      <label className="label">{t("story.label.transition")}</label>
                      <select className="input select" value={seg.transition_to_next || "cut"}
                        onChange={e => updateSeg(idx, "transition_to_next", e.target.value)}>
                        <option value="cut">{t("story.concat.modeCut")}</option>
                        <option value="crossfade">{t("story.concat.modeFade")}</option>
                        <option value="ai_extend">AI</option>
                      </select>
                    </div>
                  </div>
                  <div className="grid-2">
                    <div className="form-row">
                      <label className="label">{t("create.upload.startFrame")}</label>
                      <input className="input" value={seg.key_frame_description || ""}
                        onChange={e => updateSeg(idx, "key_frame_description", e.target.value)} />
                    </div>
                    <div className="form-row">
                      <label className="label">{t("create.upload.endFrame")}</label>
                      <input className="input" value={seg.end_frame_description || ""}
                        onChange={e => updateSeg(idx, "end_frame_description", e.target.value)} />
                    </div>
                  </div>
                  <div className="grid-2">
                    <div className="form-row">
                      <label className="label">{t("guide.section.cameras")}</label>
                      <input className="input" value={seg.camera_notes || ""}
                        onChange={e => updateSeg(idx, "camera_notes", e.target.value)} />
                    </div>
                    <div className="form-row">
                      <label className="label">{t("create.toggle.audio")}</label>
                      <input className="input" value={seg.audio_notes || ""}
                        onChange={e => updateSeg(idx, "audio_notes", e.target.value)} />
                    </div>
                  </div>
                  <div className="flex gap-2" style={{marginTop:8}}>
                    <button className="btn btn-sm" disabled={idx===0} onClick={() => moveSeg(idx, -1)}><Ico name="arrowUp"/> {t("story.btn.moveUp")}</button>
                    <button className="btn btn-sm" disabled={idx===segments.length-1} onClick={() => moveSeg(idx, 1)}><Ico name="arrowDown"/> {t("story.btn.moveDown")}</button>
                    <div style={{flex:1}} />
                    <button className="btn btn-sm btn-danger" onClick={() => removeSeg(idx)}>{t("story.btn.delete")}</button>
                  </div>
                </div>
              )}
            </div>
          ))}

          <div className="flex justify-between" style={{marginTop:16}}>
            <p className="text-sm text-dim">
              {t("story.totalEstimate", { n: segments.length, sec: segments.reduce((s, seg) => s + (seg.duration || segDuration), 0) })}
            </p>
            <button className="btn btn-primary" disabled={segments.length === 0 || generating} onClick={startGeneration}>
              <Ico name="rocket"/> {t("story.btn.startGen", { mode: genMode === "serial" ? t("story.btn.startGenSerial") : t("story.btn.startGenParallel") })}
            </button>
          </div>
        </div>
        <div className="storyboard-split__right">
          <div className="storyboard-preview">
            <div className="storyboard-preview__overlay">
              <div className="storyboard-preview__overlay-title">
                {previewSeg
                  ? <><Ico name="eye"/> {t("story.preview.segTitle", { n: previewIdx + 1 })}</>
                  : <><Ico name="layoutGrid"/> {t("story.preview.title")}</>}
              </div>
              {!previewSeg && <div className="storyboard-preview__overlay-desc">{t("story.preview.editHint")}</div>}
            </div>
            <div className="storyboard-preview__empty">
              <Ico name="film" />
              <span>{t("story.preview.empty")}</span>
            </div>
          </div>
          {previewSeg && (
            <div className="storyboard-seg-info">
              <p><strong>{t("create.section.prompt")}:</strong> {previewSeg.prompt || t("tasks.noPrompt")}</p>
              {previewSeg.key_frame_description && <p><strong>{t("create.upload.startFrame")}:</strong> {previewSeg.key_frame_description}</p>}
              {previewSeg.end_frame_description && <p><strong>{t("create.upload.endFrame")}:</strong> {previewSeg.end_frame_description}</p>}
              {previewSeg.camera_notes && <p><strong>{t("guide.section.cameras")}:</strong> {previewSeg.camera_notes}</p>}

                <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{seg.prompt ? seg.prompt.slice(0, 40) : t("tasks.noPrompt")}</span>
                <span className="text-xs text-dim">{seg.duration || segDuration}s</span>
              </div>
            ))}
          </div>
        </div>
        </div>
      </div>
    );
  }

  if (step === "generating") {
    const totalEst = chainProgress.total || segments.length;
    const minRange = genMode === "serial" ? (totalEst * 2 + "-" + totalEst * 5) : "2-5";
    const submitted = chainProgress.total - chainProgress.pending;
    const finished = chainProgress.succeeded + chainProgress.failed;
    const progressPercent = totalEst > 0 ? Math.min(100, Math.round((finished / totalEst) * 100)) : 0;
    const queueRows = (segments.length ? segments : genResults).map((seg, idx) => {
      const task = genResults[idx] || {};
      let status = task.status || "pending";
      if (!task.status && idx < submitted) status = "running";
      if (task.error) status = "failed";
      const promptText = task.prompt || seg.prompt || "";
      return { idx, task, status, promptText, duration: seg.duration || task.params?.duration || segDuration };
    });
    const statusText = (status) => {
      if (status === "succeeded") return t("story.progress.status.succeeded");
      if (status === "failed") return t("story.progress.status.failed");
      if (status === "running") return t("story.progress.status.running");
      return t("story.progress.status.pending");
    };
    const handleCancel = async () => {
      if (!chainGroupId) return;
      if (!confirm(_tr("story.cancelConfirm", null,
        "确定要取消此次生成吗？已提交的分镜会继续在火山服务端跑完，但不再接受新的轮询。"))) return;
      try {
        await pluginApi("POST", `/long-video/cancel/${chainGroupId}`);
      } catch (e) { console.warn("cancel failed", e); }
      try { localStorage.removeItem(LS_KEY); } catch {}
      setChainGroupId("");
      setGenerating(false);
      setStep("edit");
    };
    return (
      <div className="storyboard-workspace">
        <WorkflowHeader />
        <div className="storyboard-body storyboard-split">
        <div className="storyboard-split__left">
          <div className="story-progress-card">
            {segments.length === 0 && !chainGroupId ? (
              <StoryEmpty
                icon="rocket"
                title={t("story.empty.generate.title")}
                hint={t("story.empty.generate.hint")}
                action={<button className="btn btn-primary" onClick={() => setStep("edit")}>{t("story.btn.goEdit")}</button>}
              />

              <div className="story-progress-head">
                <div className="story-progress-orb"><span className="spinner-sm" /></div>
                <div>
                  <div className="story-progress-title">{t("story.gen.title", { n: totalEst })}</div>
                  <div className="story-progress-subtitle">
                    {chainGroupId
                      ? (genMode === "serial" ? t("story.gen.serialDesc") : t("story.gen.parallelDesc"))

                    {" "}{t("story.gen.estimate", { min: minRange })}
                  </div>
                </div>
              </div>
              <div className="story-progress-bar">
                <div className="story-progress-bar__fill" style={{width: `${progressPercent}%`}} />
              </div>
              <div className="story-progress-stats">
                <div className="story-progress-stat">
                  <div className="story-progress-stat__num">{progressPercent}%</div>
                  <div className="story-progress-stat__label">{t("story.progress.overview")}</div>
                </div>
                <div className="story-progress-stat">
                  <div className="story-progress-stat__num">{submitted}/{totalEst}</div>
                  <div className="story-progress-stat__label">{_tr("story.progress.submitted", null, "已提交")}</div>
                </div>
                <div className="story-progress-stat">
                  <div className="story-progress-stat__num">{chainProgress.succeeded}</div>
                  <div className="story-progress-stat__label">{_tr("story.progress.succeeded", null, "已完成")}</div>
                </div>
                <div className="story-progress-stat">
                  <div className="story-progress-stat__num">{chainProgress.failed}</div>
                  <div className="story-progress-stat__label">{_tr("story.progress.failed", null, "失败")}</div>
                </div>
              </div>
              <div className="story-progress-actions">
                <div className="story-progress-safe">
                  <Ico name="check"/> {_tr("story.progress.safe", null, "可以安全切换 Tab 或刷新页面 — 进度会自动恢复")}
                </div>
                <div className="flex gap-2">
                  <button className="btn btn-sm" onClick={() => setStep("edit")}>{t("story.btn.backEdit")}</button>
                  {chainGroupId && (
                    <button className="btn btn-sm" onClick={handleCancel}>
                      {_tr("story.btn.cancel", null, "取消生成")}
                    </button>
                  )}
                </div>
              </div>
            </>}
          </div>
          <div className="card story-card-soft" style={{marginTop:12}}>
            <div className="oa-section-label"><Ico name="listTodo"/> {t("story.progress.queue")}</div>
            <div className="story-queue">
              {queueRows.map(row => (
                <div key={row.idx} className={`story-queue-item is-${row.status}`}
                  onClick={() => setPreviewIdx(row.idx)}>
                  <div className="story-queue-index">{row.idx + 1}</div>
                  <div style={{minWidth:0}}>
                    <div className="story-queue-title">{row.promptText || t("tasks.noPrompt")}</div>
                    <div className="story-queue-meta">{row.duration}s · {row.task.id || _tr("story.progress.status.pending", null, "等待")}</div>
                  </div>
                  <span className={`story-queue-status ${row.status}`}>{statusText(row.status)}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
        <div className="storyboard-split__right">
          <div className="storyboard-preview">
            <div className="storyboard-preview__overlay">
              <div className="storyboard-preview__overlay-title"><Ico name="layoutGrid"/> {t("story.preview.title")}</div>
            </div>
            <div className="storyboard-preview__empty">
              <div className="spinner" />
              <span>{t("story.preview.generating")}</span>
            </div>
          </div>
          <div className="story-side-panel">
            <div className="oa-section-label"><Ico name="eye"/> {t("story.preview.title")}</div>
            <p className="text-xs text-dim" style={{lineHeight:1.7}}>{t("story.progress.previewHint")}</p>
            <div className="storyboard-seg-list">
              {queueRows.map(row => (
                <div key={row.idx} className={`storyboard-seg-thumb ${previewIdx === row.idx ? "active" : ""}`}
                  onClick={() => setPreviewIdx(row.idx)}>
                  <span className="badge badge-info" style={{minWidth:22,textAlign:"center",fontSize:11}}>{row.idx + 1}</span>
                  <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{row.promptText || t("tasks.noPrompt")}</span>
                  <span className={`story-queue-status ${row.status}`}>{statusText(row.status)}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
        </div>
      </div>
    );
  }

  if (step === "results" || step === "done") {
    const succCount = genResults.filter(r => r.status === "succeeded").length;
    const failCount = genResults.filter(r => r.status === "failed" || r.error).length;
    const previewResult = previewIdx >= 0 && previewIdx < genResults.length ? genResults[previewIdx] : null;

    return (
      <div className="storyboard-workspace">
        <WorkflowHeader />
        <div className="storyboard-body storyboard-split">
        <div className="storyboard-split__left">
          <div className="flex justify-between items-center" style={{marginBottom:14}}>
            <h3 style={{fontSize:16,fontWeight:600}}>
              {step === "done" ? <><Ico name="check"/> {t("story.results.done")}</> : t("story.results.title")}
            </h3>
            <div className="flex gap-2">
              <button className="btn btn-sm" onClick={() => {
                setStep("input"); setSegments([]); setGenResults([]); setConcatPath(""); setPreviewIdx(-1);
                try { localStorage.removeItem(LS_KEY); } catch {}
                setChainGroupId(""); setGenerating(false);
                setChainProgress({ pending:0, running:0, succeeded:0, failed:0, other:0, total:0 });
              }}>
                {t("story.btn.newProject")}
              </button>
              <button className="btn btn-sm" onClick={() => setStep("edit")}>{t("story.btn.backEdit")}</button>
            </div>
          </div>

          <div className="card story-card-soft">
            <div className="flex gap-4" style={{fontSize:13}}>
              <span>{t("story.statTotal")} <strong>{genResults.length}</strong></span>
              <span style={{color:"var(--success)"}}>{t("story.statSuccess")} <strong>{succCount}</strong></span>
              {failCount > 0 && <span style={{color:"var(--danger)"}}>{t("story.statFail")} <strong>{failCount}</strong></span>}
            </div>
          </div>

          {genResults.length === 0 ? (
            <StoryEmpty
              icon="film"
              title={t("story.empty.results.title")}
              hint={t("story.empty.results.hint")}
              action={<button className="btn btn-primary" onClick={() => setStep(segments.length ? "generating" : "edit")}>{segments.length ? t("story.step.generating") : t("story.btn.goEdit")}</button>}
            />
          ) : genResults.map((r, idx) => (
            <div key={idx} className="card story-segment-card" style={{borderLeft:`3px solid ${r.status==="succeeded"?"var(--success)":r.error||r.status==="failed"?"var(--danger)":"var(--warning)"}`}}
              onClick={() => setPreviewIdx(idx)}>
              <div className="flex justify-between items-center">
                <div className="flex gap-2 items-center">
                  <span className="badge" style={{minWidth:28,textAlign:"center",background:r.status==="succeeded"?"var(--success)":"var(--danger)",color:"#fff"}}>
                    {idx + 1}
                  </span>
                  <span style={{fontSize:13}}>{r.prompt ? r.prompt.slice(0, 50) + "..." : segments[idx]?.prompt?.slice(0, 50) || ""}</span>
                </div>
                <span className={"badge badge-" + (r.status === "succeeded" ? "success" : "error")}>
                  {r.status === "succeeded" ? <><Ico name="check"/> {t("tasks.tag.done")}</> : r.error ? <><Ico name="x"/> {t("tasks.tag.failed")}</> : r.status || ""}
                </span>
              </div>
              {r.error && <p className="text-xs" style={{color:"var(--danger)",marginTop:6}}>{r.error}</p>}
            </div>
          ))}

          {step === "done" && concatPath && (
            <div className="card" style={{borderLeft:"3px solid var(--success)",background:"rgba(34,197,94,.05)"}}>
              <div className="oa-section-label"><Ico name="film"/> {t("story.concat.title")}</div>
              <p style={{fontSize:13,color:"var(--text-muted)",wordBreak:"break-all"}}>{concatPath}</p>
              <button className="btn btn-sm" style={{marginTop:8}} onClick={() =>
                showInFolder(concatPath)
              }><Ico name="folderOpen"/> {t("story.btn.openFolder")}</button>
            </div>
          )}

          {step === "results" && succCount >= 2 && (
            <div style={{marginTop:16}}>
              {ffmpegOk === false && (
                <div className="inline-warn">
                  <span style={{flexShrink:0,color:"var(--warning)"}}><Ico name="warn"/></span>
                  <div className="inline-warn__text">
                    <strong>{t("story.ffmpeg.warn.title")}</strong>
                    <small>{t("story.ffmpeg.warn.hint")}</small>
                  </div>
                  {onGoToSettings && (
                    <button className="btn btn-sm btn-primary" onClick={() => onGoToSettings()}>
                      {t("story.ffmpeg.warn.cta")}
                    </button>
                  )}
                </div>
              )}
              <div className="flex justify-between items-center">
                <p className="text-sm text-dim">
                  {ffmpegOk ? <><Ico name="check"/> {t("story.concat.tip", { n: succCount })}</> : ""}
                </p>
                <button className="btn btn-primary" disabled={!ffmpegOk || concatenating} onClick={doConcat}>
                  {concatenating
                    ? t("story.concat.busy")
                    : <><Ico name="scissors"/> {t("story.concat.idle", { mode: transition === "crossfade" ? t("story.concat.modeFade") : t("story.concat.modeCut") })}</>}
                </button>
              </div>
            </div>
          )}
        </div>
        <div className="storyboard-split__right">
          <div className="storyboard-preview">
            <div className="storyboard-preview__overlay">
              <div className="storyboard-preview__overlay-title">
                {previewResult
                  ? <><Ico name="eye"/> {t("story.preview.segTitle", { n: previewIdx + 1 })}</>
                  : <><Ico name="layoutGrid"/> {t("story.preview.title")}</>}
              </div>
            </div>
            {previewResult && previewResult.video_url ? (
              <video src={previewResult.video_url} controls style={{maxWidth:"100%",maxHeight:"100%"}} />
            ) : (
              <div className="storyboard-preview__empty">
                <Ico name="film" />
                <span>{t("story.preview.selectResult")}</span>
              </div>
            )}
          </div>
          {previewResult && (
            <div className="storyboard-seg-info">
              <p>{previewResult.prompt || segments[previewIdx]?.prompt || ""}</p>
              {previewResult.error && <p style={{color:"var(--danger)",marginTop:4}}>{previewResult.error}</p>}
            </div>
          )}
        </div>
        </div>
      </div>
    );
  }

  return null;
}

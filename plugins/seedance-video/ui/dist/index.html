<script>
// ── Minimal Bridge SDK with direct HTTP fallback ──
const BRIDGE_VER = 1;
let _ctx = null, _caps = [], _pending = {}, _handlers = {};
let _bridgeConnected = false;
const _inIframe = window.parent !== window;
function uid() { return Math.random().toString(36).slice(2,10) + Date.now().toString(36); }
function post(msg) { if (_inIframe) window.parent.postMessage({ __akita_bridge: true, version: BRIDGE_VER, ...msg }, "*"); }

function _detectApiBase() {
  if (_ctx && _ctx.apiBase) return _ctx.apiBase;
  var loc = window.location;
  if (loc.port === "5173" || loc.port === "1420") return "http://127.0.0.1:18900";
  return loc.origin;
}

function directFetch(method, path, body) {
  var url = path.startsWith("http") ? path : _detectApiBase() + path;
  var opts = { method: method, headers: { "Content-Type": "application/json" } };
  if (body && method !== "GET" && method !== "HEAD") {
    if (body instanceof FormData) { opts.body = body; delete opts.headers["Content-Type"]; }
    else { opts.body = JSON.stringify(body); }
  }
  return fetch(url, opts).then(function(resp) {
    return resp.json().then(function(json) {
      return { ok: resp.ok, status: resp.status, body: json };
    });
  });
}

function apiCall(method, path, body) {
  if (!_inIframe || !_bridgeConnected) return directFetch(method, path, body);
  return new Promise(function(resolve, reject) {
    var id = uid();
    _pending[id] = { resolve: resolve, reject: reject };
    post({ type: "bridge:api-request", requestId: id, payload: { method: method, path: path, body: body } });
    setTimeout(function() {
      if (_pending[id]) {
        delete _pending[id];
        directFetch(method, path, body).then(resolve).catch(reject);
      }
    }, 5000);
  });
}

function pluginApi(method, path, body) {
  var base = _ctx ? "/api/plugins/" + _ctx.pluginId : "/api/plugins/seedance-video";
  return apiCall(method, base + path, body);
}

window.addEventListener("message", function(e) {
  var d = e.data;
  if (!d || !d.__akita_bridge) return;
  if (d.type === "bridge:init" && d.payload) {
    _ctx = d.payload;
    _bridgeConnected = true;
    if (_ctx.theme) {
      document.documentElement.setAttribute("data-theme", _ctx.theme.includes("dark") ? "dark" : "light");
    }
  }
  if (d.type === "bridge:handshake-ack" && d.payload) { _caps = d.payload.capabilities || []; _bridgeConnected = true; }
  var _ackTypes = ["bridge:api-response","bridge:clipboard-ack","bridge:download-ack","bridge:show-in-folder-ack","bridge:pick-folder-ack"];
  if (_ackTypes.indexOf(d.type) !== -1 && d.requestId && _pending[d.requestId]) {
    _pending[d.requestId].resolve(d.payload);
    delete _pending[d.requestId];
  }
  if (d.type === "bridge:theme-change" && d.payload) {
    document.documentElement.setAttribute("data-theme", (d.payload.theme || "").includes("dark") ? "dark" : "light");
  }
  if (d.type === "bridge:event" && d.payload) {
    var h = _handlers[d.payload.eventType];
    if (h) h.forEach(function(fn) { fn(d.payload.data); });
  }
});
// Retry bridge:ready until host acknowledges (fixes race condition where
// regular script executes before host's useEffect sets up the listener)
var _readyInterval = null;
function _sendReady() {
  post({ type: "bridge:ready" });
  post({ type: "bridge:handshake", payload: { sdkVersion: "1.0.0" } });
}
_sendReady();
if (_inIframe) {
  _readyInterval = setInterval(function() {
    if (_bridgeConnected) { clearInterval(_readyInterval); return; }
    _sendReady();
  }, 300);
  setTimeout(function() { if (_readyInterval) clearInterval(_readyInterval); }, 20000);
}
function onEvent(type, fn) { (_handlers[type] = _handlers[type] || []).push(fn); }

function uploadFile(file) {
  var base = _detectApiBase() + (_ctx ? "/api/plugins/" + _ctx.pluginId : "/api/plugins/seedance-video");
  var fd = new FormData();
  fd.append("file", file);
  return fetch(base + "/upload", { method: "POST", body: fd }).then(function(r) { return r.json(); });
}

// ── Standard SDK: showToast ──
function showToast(body, type) {
  type = type || "success";
  if (_inIframe && _bridgeConnected) {
    post({ type: "bridge:notification", payload: { title: "", body: body, type: type } });
    return;
  }
  console.log("[Toast]", type, body);
}

// Bridge-layer i18n shim: prefers OpenAkitaI18n (which has built-in bridge.*
// defaults, see ui-kit/i18n.js), and falls back to the literal English text
// when i18n.js is not yet loaded so we never show raw "bridge.x.y" keys.
function _bt(key, vars, fallback) {
  if (window.OpenAkitaI18n && typeof window.OpenAkitaI18n.t === "function") {
    var v = window.OpenAkitaI18n.t(key, vars);
    if (v && v !== key) return v;
  }
  if (!fallback) return key;
  if (vars) {
    return String(fallback).replace(/\{(\w+)\}/g, function (_m, n) {
      return vars[n] != null ? String(vars[n]) : "{" + n + "}";
    });
  }
  return fallback;
}

// ── Standard SDK: downloadFile ──
function downloadFile(url, filename) {
  var resolvedUrl = url.startsWith("http") ? url : _detectApiBase() + url;
  var fname = filename || "download";

  if (_inIframe && _bridgeConnected) {
    var id = uid();
    _pending[id] = {
      resolve: function(payload) {
        if (payload && payload.ok) {
          var path = payload.path || _bt("bridge.download.okFolder", null, "Saved to Downloads folder");
          showToast(payload.path
            ? _bt("bridge.download.ok", { path: path }, "Saved to: {path}")
            : path, "success");
        } else {
          showToast(_bt("bridge.download.fail", { msg: (payload && payload.error) || _bt("bridge.unknownError", null, "Unknown error") }, "Download failed: {msg}"), "error");
        }
      },
      reject: function(err) { showToast(_bt("bridge.download.fail", { msg: err }, "Download failed: {msg}"), "error"); },
    };
    post({ type: "bridge:download", requestId: id, payload: { url: resolvedUrl, filename: fname } });
    return;
  }

  if (window.__TAURI_INTERNALS__) {
    window.__TAURI_INTERNALS__.invoke("download_file", { url: resolvedUrl, filename: fname })
      .then(function(path) { showToast(_bt("bridge.download.ok", { path: path }, "Saved to: {path}"), "success"); })
      .catch(function(err) { showToast(_bt("bridge.download.fail", { msg: err }, "Download failed: {msg}"), "error"); });
    return;
  }

  var a = document.createElement("a");
  a.href = resolvedUrl;
  a.download = fname;
  a.style.display = "none";
  document.body.appendChild(a);
  a.click();
  setTimeout(function() { document.body.removeChild(a); }, 300);
  showToast(_bt("bridge.download.started", null, "Download started"), "success");
}

// ── Standard SDK: showInFolder ──
function showInFolder(path) {
  if (_inIframe && _bridgeConnected) {
    post({ type: "bridge:show-in-folder", payload: { path: path } });
    return Promise.resolve();
  }
  return Promise.resolve();
}

// ── Standard SDK: pickFolder ──
function pickFolder(title) {
  if (_inIframe && _bridgeConnected) {
    return new Promise(function(resolve) {
      var id = uid();
      _pending[id] = { resolve: function(payload) { resolve(payload && payload.path || null); }, reject: function() { resolve(null); } };
      post({ type: "bridge:pick-folder", requestId: id, payload: { title: title || _bt("bridge.pickFolder.title", null, "Pick a folder") } });
      setTimeout(function() { if (_pending[id]) { delete _pending[id]; resolve(null); } }, 60000);
    });
  }
  return Promise.resolve(null);
}

// ── Standard SDK: copyToClipboard ──
function copyToClipboard(text) {
  if (_inIframe && _bridgeConnected) {
    var id = uid();
    _pending[id] = { resolve: function() { showToast(_bt("bridge.clipboard.ok", null, "Copied to clipboard")); }, reject: function() {} };
    post({ type: "bridge:clipboard", requestId: id, payload: { text: text } });
    return;
  }
  if (navigator.clipboard) { navigator.clipboard.writeText(text).then(function() { showToast(_bt("bridge.clipboard.ok", null, "Copied to clipboard")); }); }
}

window.__bridge = {
  apiCall: apiCall, pluginApi: pluginApi, onEvent: onEvent,
  getCtx: function() { return _ctx; },
  uploadFile: uploadFile, downloadFile: downloadFile,
  showToast: showToast, showInFolder: showInFolder,
  pickFolder: pickFolder, copyToClipboard: copyToClipboard,
};

const _i18n = (function () {

      const tpl = (I18N_DICT[loc] && I18N_DICT[loc][k])
        || (I18N_DICT[base] && I18N_DICT[base][k])
        || (I18N_DICT.en && I18N_DICT.en[k])
        || k;
      return vars
        ? String(tpl).replace(/\{(\w+)\}/g, (_, n) => vars[n] != null ? String(vars[n]) : "{" + n + "}")
        : tpl;
    },
    locale: () => loc,
    setLocale: (l) => { loc = l; subs.forEach(fn => { try { fn(l); } catch (_) {} }); },

  }, []);

function useTasks() {
  const [tasks, setTasks] = useState([]);
  const [total, setTotal] = useState(0);
  const load = useCallback((params = {}) => {
    const q = new URLSearchParams(params).toString();
    pluginApi("GET", `/tasks?${q}`).then(r => {
      if (r.body?.tasks) { setTasks(r.body.tasks); setTotal(r.body.total); }
    }).catch(() => {});
  }, []);
  useEffect(() => { load(); }, []);
  useEffect(() => {
    onEvent("plugin:seedance-video:task_update", () => load());
  }, []);
  useEffect(() => {
    var hasRunning = tasks.some(t => t.status === "running" || t.status === "pending");
    if (!hasRunning) return;
    var timer = setInterval(() => load(), 10000);
    return () => clearInterval(timer);
  }, [tasks]);
  return { tasks, total, reload: load };
}

function FileUploadZone({ id, accept, multiple, onUpload, label, hint }) {
  const t = useT();
  const [uploading, setUploading] = useState(false);
  const [fileName, setFileName] = useState("");
  const [dragOver, setDragOver] = useState(false);

  const handleFiles = async (files) => {
    if (!files || files.length === 0) return;
    setUploading(true);
    for (const file of files) {
      setFileName(file.name);
      await onUpload(file);
    }
    setUploading(false);
  };

  return (
    <div className={`upload-zone${dragOver ? " drag-over" : ""}`}
      style={dragOver ? {borderColor:"var(--primary)",background:"rgba(59,130,246,.08)"} : {}}
      onClick={() => !uploading && document.getElementById(id)?.click()}
      onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
      onDragLeave={() => setDragOver(false)}
      onDrop={(e) => { e.preventDefault(); setDragOver(false); handleFiles(e.dataTransfer.files); }}>
      <input id={id} type="file" accept={accept} multiple={multiple} hidden
        onChange={(e) => handleFiles(e.target.files)} />
      {uploading ? (
        <div className="flex items-center gap-2" style={{justifyContent:"center"}}>
          <div className="spinner" style={{width:16,height:16}} />
          <span className="text-sm">{t("create.upload.uploading", { name: fileName })}</span>
        </div>
      ) : (
        <>
          <p style={{fontSize:13}}>{label}</p>
          {hint && <p className="text-xs text-dim" style={{marginTop:4}}>{hint}</p>}
          {fileName && <p className="text-xs text-success" style={{marginTop:4}}><Ico name="check"/> {t("create.upload.uploaded", { name: fileName })}</p>}
        </>
      )}
    </div>
  );
}

function VideoPlayer({ task }) {
  const t = useT();
  const videoRef = useRef(null);
  const [playing, setPlaying] = useState(false);
  const [currentTime, setCt] = useState(0);
  const [duration, setDur] = useState(0);
  const [speed, setSpeed] = useState(1);
  const [loop, setLoop] = useState(true);

  const videoSrc = task?.id
    ? `${_detectApiBase()}/api/plugins/seedance-video/videos/${task.id}`
    : null;

  const togglePlay = () => {
    if (!videoRef.current) return;
    if (videoRef.current.paused) { videoRef.current.play(); setPlaying(true); }
    else { videoRef.current.pause(); setPlaying(false); }
  };

  const changeSpeed = () => {
    const speeds = [0.25, 0.5, 1, 1.5, 2];
    const idx = speeds.indexOf(speed);
    const next = speeds[(idx + 1) % speeds.length];
    setSpeed(next);
    if (videoRef.current) videoRef.current.playbackRate = next;
  };

  const stepFrame = (dir) => {
    if (!videoRef.current) return;
    videoRef.current.pause(); setPlaying(false);
    videoRef.current.currentTime += dir * (1/24);
  };

  if (!task) return (
    <div className="video-player-wrap">
      <div className="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M15 10l-4 3V7l4 3z"/><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
        <p>{t("preview.empty.title")}</p>
        <p className="text-xs text-dim" style={{marginTop:4}}>{t("preview.empty.hint")}</p>
      </div>
    </div>
  );

  return (
    <div>
      <div className="video-player-wrap">
        {task.status === "running" || task.status === "pending" ? (
          <div className="empty-state">
            <div className="spinner" style={{width:32,height:32,marginBottom:12}}/>
            <p>{t("preview.running.title")}</p>
            <p className="text-xs text-dim" style={{marginTop:6}}>{t("preview.running.hint")}</p>
          </div>
        ) : task.status === "succeeded" && videoSrc ? (
          <video ref={videoRef} src={videoSrc} loop={loop} autoPlay muted
            onTimeUpdate={() => setCt(videoRef.current?.currentTime || 0)}
            onLoadedMetadata={() => setDur(videoRef.current?.duration || 0)}
            onPlay={() => setPlaying(true)} onPause={() => setPlaying(false)}
            style={{width:"100%",height:"100%",objectFit:"contain"}} />
        ) : task.status === "failed" ? (
          <div className="empty-state">
            <p style={{color:"var(--text-danger,#dc2626)"}}>{task.error_message || t("preview.failed")}</p>
          </div>
        ) : (
          <div className="empty-state">
            <p>{t("preview.waiting")}</p>
          </div>
        )}
      </div>
      {task.status === "succeeded" && videoSrc && (
        <div className="video-controls">
          <button onClick={() => stepFrame(-1)} title={t("preview.ctrl.stepBack")}><Ico name="skipBack"/></button>
          <button onClick={togglePlay}>{playing ? <Ico name="pause"/> : <Ico name="play"/>}</button>
          <button onClick={() => stepFrame(1)} title={t("preview.ctrl.stepFwd")}><Ico name="skipFwd"/></button>
          <div className="progress-bar" onClick={(e) => {
            const rect = e.currentTarget.getBoundingClientRect();
            const pct = (e.clientX - rect.left) / rect.width;
            if (videoRef.current) videoRef.current.currentTime = pct * duration;
          }}>
            <div className="progress-bar-fill" style={{width: duration ? `${(currentTime/duration)*100}%` : "0%"}} />
          </div>
          <span>{currentTime.toFixed(1)}s / {duration.toFixed(1)}s</span>
          <button onClick={changeSpeed}>{speed}x</button>
          <button onClick={() => setLoop(!loop)} style={{opacity: loop?1:.5}} title={t("preview.ctrl.loop")}><Ico name="repeat"/></button>
        </div>
      )}
      {task.revised_prompt && (
        <div style={{padding:"8px 12px",fontSize:12,color:"var(--text-dim)",fontStyle:"italic"}}>
          {t("preview.revised", { text: task.revised_prompt })}
        </div>
      )}
    </div>
  );
}

function CreateTab({ models, onGoToTasks }) {

  const [model, setModel] = useState("2.0");

  const [audio, setAudio] = useState(true);
  const [seed, setSeed] = useState(-1);

  const [returnLastFrame, setReturnLastFrame] = useState(false);
  const [watermark, setWatermark] = useState(false);
  const [webSearch, setWebSearch] = useState(false);
  const [loading, setLoading] = useState(false);
  const [activeTask, setActiveTask] = useState(null);
  const [optimizing, setOptimizing] = useState(false);

  useEffect(() => {
    if (!activeTask || (activeTask.status !== "running" && activeTask.status !== "pending")) return;
    var timer = setInterval(() => {
      pluginApi("GET", `/tasks/${activeTask.id}`).then(r => {
        if (r.body?.task) setActiveTask(r.body.task);
      }).catch(() => {});
    }, 8000);
    return () => clearInterval(timer);
  }, [activeTask?.id, activeTask?.status]);

  const currentModel = models.find(m => m.id === model);
  const minDur = currentModel?.duration_range?.[0] || 2;
  const maxDur = currentModel?.duration_range?.[1] || 15;
  const canDraft = currentModel?.supports_draft || false;
  const can1080 = currentModel?.resolutions?.includes("1080p") || false;
  const canWebSearch = currentModel?.supports_web_search && mode === "t2v";

  const t = useT();
  // MODE_TIPS body lives in I18N_DICT (create.tip.<id>); resolve via t() so
  // locale switches without re-creating the component.

  useEffect(() => {
    if (duration < minDur) setDuration(minDur);
    if (duration > maxDur) setDuration(maxDur);

  const [createError, setCreateError] = useState("");
  const [taskStartedOpen, setTaskStartedOpen] = useState(false);
  const [taskStartedDesc, setTaskStartedDesc] = useState("");
  const handleCreate = async () => {
    setLoading(true);
    setCreateError("");
    try {
      const r = await pluginApi("POST", draft ? "/tasks/draft" : "/tasks", {
        prompt, mode, model, ratio, duration, resolution, n: 1,
        generate_audio: audio, seed, watermark, return_last_frame: returnLastFrame,
        web_search: webSearch && canWebSearch, service_tier: serviceTier,
      });
      if (r.ok && r.body?.task) {
        setActiveTask(r.body.task);
        setTaskStartedDesc(
          draft
            ? t("modal.taskStarted.draft")
            : serviceTier === "flex"
              ? t("modal.taskStarted.flex")
              : t("modal.taskStarted.online")
        );
        setTaskStartedOpen(true);
      } else {
        var msg = r.body?.detail || r.body?.error || _tr("toast.requestFail", { msg: "HTTP " + r.status }, "Request failed: {msg}");
        setCreateError(msg);
      }
    } catch (e) { setCreateError(_tr("toast.networkError", { msg: e.message }, "Network error: {msg}")); }
    setLoading(false);
  };

  const handleOptimize = async () => {
    if (!prompt.trim()) return;
    setOptimizing(true);
    try {
      var base = _ctx ? "/api/plugins/" + _ctx.pluginId : "/api/plugins/seedance-video";
      const r = await directFetch("POST", base + "/prompt-optimize", { prompt, mode, duration, ratio });
      if (r.body?.ok && r.body?.result && r.body.result !== prompt) {
        setPrompt(r.body.result);
        showToast(_tr("toast.optimizeOk", null, "Prompt optimized"), "success");
      } else if (!r.body?.ok) {
        showToast(_tr("toast.optimizeFail", { msg: r.body?.error || r.body?.detail || "LLM unavailable" }, "Optimization failed: {msg}"), "error");
      } else {

      }
    } catch (e) {

        {(mode === "edit" || mode === "extend") && (

                : <span className="oa-ai-btn__icon" aria-hidden="true">
                    <Ico name="sparkles"/>
                  </span>}
              <span>{t("create.btn.optimize")}</span>
            </button>
          </div>
          <textarea className="input textarea" value={prompt} onChange={e => setPrompt(e.target.value)}
            placeholder={t("create.prompt.placeholder")} rows={4} />
          <div className="flex items-center justify-between" style={{marginTop:8}}>

            </select>
          </div>
          <div className="form-row">
            <label className="label">{t("create.label.ratio")}</label>

  const FILTER_IDS = ["all","running","succeeded","failed","draft","flex"];
  const safeTasks = Array.isArray(tasks) ? tasks : [];
  const filtered = safeTasks.filter(it => {
    if (filter === "running") return it.status === "running" || it.status === "pending";
    if (filter === "succeeded") return it.status === "succeeded";
    if (filter === "failed") return it.status === "failed";
    if (filter === "draft") return it.is_draft;
    if (filter === "flex") return it.service_tier === "flex";

            <div className="flex gap-2" style={{marginTop:12, justifyContent:"center"}}>
              <button className="btn btn-sm" onClick={() => downloadFile(`/api/plugins/seedance-video/videos/${selected.id}?download=1`, `seedance_${selected.prompt?.slice(0,20) || selected.id}.mp4`)}><Ico name="download"/> {t("preview.btn.download")}</button>

              <button className="btn btn-sm btn-danger" onClick={async () => {
                await pluginApi("DELETE", `/tasks/${selected.id}`);
                setSelected(null); reload();
              }}>{t("tasks.btn.delete")}</button>

          )}

      </div>

    light:["逆光","侧光","丁达尔效应","伦勃朗光","体积光","柔光","硬光"],
    color:["暖色调","冷色调","赛博朋克","复古胶片","黑白","霓虹","日落色调"],
    texture:["电影级","纪录片风格","油画感","水墨感","CG质感","像素风","写实"],
    mood:["温馨","紧张","悬疑","欢快","忧伤","史诗","治愈","恐怖","浪漫"],
  };
  const FALLBACK_FORMULAS = {
    t2v:"主体+运动 / 背景+运动 / 镜头+运动",
    i2v:"参考图片特征 + 画面变化描述 + 镜头运动",
    i2v_end:"首帧到尾帧的过渡描述 + 中间画面变化 + 镜头运动",
    multimodal:"参考「图片N」中的特征 + 参考「视频N」的运镜 + 音色→角色说:台词",
    edit:"保持不变的部分 + 替换/增加/删除的元素 + 时机和位置",
    extend:"延续描述 + 新内容方向 + 过渡方式",
  };

  const [guide, setGuide] = useState({ cameras: FALLBACK_CAMERAS, atmosphere: FALLBACK_ATMOSPHERE, formulas: FALLBACK_FORMULAS });
  const [templates, setTemplates] = useState([]);
  const [search, setSearch] = useState("");
  const [expanded, setExpanded] = useState({});
  const [selectedTemplate, setSelectedTemplate] = useState(null);

  useEffect(() => {
    const q = `?locale=${encodeURIComponent(locale || "zh")}`;
    pluginApi("GET", "/prompt-guide" + q).then(r => {
      if (r.body?.cameras) setGuide({ cameras: r.body.cameras, atmosphere: r.body.atmosphere || FALLBACK_ATMOSPHERE, formulas: r.body.formulas || FALLBACK_FORMULAS });
    }).catch(() => {});
    pluginApi("GET", "/prompt-templates" + q).then(r => {
      const list = Array.isArray(r.body && r.body.templates) ? r.body.templates : [];
      setTemplates(list);
    }).catch(() => {});
  }, [locale]);

  const toggleSection = (key) => setExpanded(prev => ({...prev, [key]: !prev[key]}));

  const filteredTemplates = templates.filter(t =>
    !search || t.name.includes(search) || (t.name_en||"").toLowerCase().includes(search.toLowerCase()) || t.description.includes(search)
  );

  const tipsHtml = (window.OpenAkitaMD && typeof window.OpenAkitaMD.render === "function")
    ? window.OpenAkitaMD.render(t("guide.tips.body"))
    : null;

  return (
    <div style={{maxWidth:800}}>
      <input className="input" placeholder={t("guide.search.placeholder")} value={search} onChange={e => setSearch(e.target.value)} style={{marginBottom:16}} />

      <div className="card" style={{cursor:"pointer"}} onClick={() => toggleSection("templates")}>
        <div className="oa-section-label oa-section-label--inline" style={{justifyContent:"space-between"}}>
          <span><Ico name="fileText"/> {t("guide.section.templates")}</span>
          <span className="text-dim">{expanded.templates ? "▲" : "▼"}</span>
        </div>
        {expanded.templates && (
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:8,marginTop:8}} onClick={e => e.stopPropagation()}>
            {filteredTemplates.length === 0 && <p className="text-sm text-dim">{t("guide.templates.empty")}</p>}
            {filteredTemplates.map(tpl => (
              <div key={tpl.id} className="template-card" onClick={() => setSelectedTemplate(selectedTemplate?.id === tpl.id ? null : tpl)}>
                <h4>{tpl.name} <span className="text-xs text-dim">{tpl.name_en}</span></h4>
                <p>{tpl.description}</p>
                <div className="flex gap-2 flex-wrap" style={{marginTop:4}}>
                  {tpl.modes?.map(m => <span key={m} className="tag tag-blue">{m}</span>)}
                </div>
                {selectedTemplate?.id === tpl.id && tpl.template && (
                  <div style={{marginTop:8,padding:8,background:"var(--bg)",borderRadius:6,fontSize:12,whiteSpace:"pre-wrap",color:"var(--text-muted)"}}>
                    {tpl.template}
                  </div>
                )}
              </div>
            ))}
          </div>
        )}
      </div>

      <div className="card" style={{cursor:"pointer"}} onClick={() => toggleSection("cameras")}>
        <div className="oa-section-label oa-section-label--inline" style={{justifyContent:"space-between"}}>
          <span><Ico name="camera"/> {t("guide.section.cameras")}</span>
          <span className="text-dim">{expanded.cameras ? "▲" : "▼"}</span>
        </div>
        {expanded.cameras && (
          <div className="flex gap-2 flex-wrap" style={{marginTop:8}} onClick={e => e.stopPropagation()}>
            {guide.cameras.map(c => (
              <span key={c.zh} className="keyword-tag" title={c.desc} style={{cursor:"help"}}>
                {c.zh} ({c.en})
                <span className="text-xs text-dim" style={{display:"block",marginTop:2}}>{c.desc}</span>
              </span>
            ))}
          </div>
        )}
      </div>

      <div className="card" style={{cursor:"pointer"}} onClick={() => toggleSection("atmosphere")}>
        <div className="oa-section-label oa-section-label--inline" style={{justifyContent:"space-between"}}>
          <span><Ico name="palette"/> {t("guide.section.atmosphere")}</span>
          <span className="text-dim">{expanded.atmosphere ? "▲" : "▼"}</span>
        </div>
        {expanded.atmosphere && (
          <div style={{marginTop:8}} onClick={e => e.stopPropagation()}>
            {Object.entries(guide.atmosphere).map(([cat, words]) => (
              <div key={cat} style={{marginBottom:10}}>
                <span className="label" style={{marginBottom:4,display:"inline-block"}}>{t("guide.atmosphere." + cat) || cat}</span>
                <div className="flex gap-2 flex-wrap">
                  {words.map(w => <span key={w} className="keyword-tag">{w}</span>)}
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      <div className="card" style={{cursor:"pointer"}} onClick={() => toggleSection("formulas")}>
        <div className="oa-section-label oa-section-label--inline" style={{justifyContent:"space-between"}}>
          <span><Ico name="ruler"/> {t("guide.section.formulas")}</span>
          <span className="text-dim">{expanded.formulas ? "▲" : "▼"}</span>
        </div>
        {expanded.formulas && (
          <div style={{marginTop:8}} onClick={e => e.stopPropagation()}>
            {Object.entries(guide.formulas).map(([mode, formula]) => (
              <div key={mode} style={{marginBottom:8,padding:8,background:"var(--bg)",borderRadius:6}}>
                <span className="tag tag-blue" style={{marginRight:8}}>{t("modes." + mode) || mode}</span>
                <span className="text-sm">{formula}</span>
              </div>
            ))}
          </div>
        )}
      </div>

      <div className="card">
        <div className="oa-section-label"><Ico name="lightbulb"/> {t("guide.section.tips")}</div>
        {tipsHtml
          ? <div className="oa-md-content" dangerouslySetInnerHTML={{ __html: tipsHtml }} />
          : <pre style={{whiteSpace:"pre-wrap",fontSize:13,color:"var(--text-muted)",lineHeight:1.8,fontFamily:"inherit"}}>{t("guide.tips.body")}</pre>}
      </div>
    </div>
  );
}

function StoryboardTab() {
  const t = useT();
  const [story, setStory] = useState("");
  const [totalDuration, setTotalDuration] = useState(60);
  const [segDuration, setSegDuration] = useState(10);
  const [ratio, setRatio] = useState("16:9");
  const [style, setStyle] = useState("电影级画质");
  const [model, setModel] = useState("2.0");
  const [resolution, setResolution] = useState("720p");
  const [genMode, setGenMode] = useState("serial");
  const [transition, setTransition] = useState("none");
  const [fadeDur, setFadeDur] = useState(0.5);
  const [segments, setSegments] = useState([]);
  const [decomposing, setDecomposing] = useState(false);
  const [generating, setGenerating] = useState(false);
  const [concatenating, setConcatenating] = useState(false);
  const [genResults, setGenResults] = useState([]);
  const [concatPath, setConcatPath] = useState("");
  const [ffmpegOk, setFfmpegOk] = useState(null);
  const [step, setStep] = useState("input");
  const [editIdx, setEditIdx] = useState(-1);

  useEffect(() => {
    pluginApi("GET", "/long-video/ffmpeg-check").then(r => {
      setFfmpegOk(r.body?.available ?? false);
    }).catch(() => setFfmpegOk(false));
  }, []);

  const [decomposeProgress, setDecomposeProgress] = useState("");
  const decompose = async () => {
    if (!story.trim()) return;
    setDecomposing(true);
    setDecomposeProgress(_tr("story.decompose.connect"));
    var timer = setTimeout(() => setDecomposeProgress(_tr("story.decompose.analyze")), 3000);
    var timer2 = setTimeout(() => setDecomposeProgress(_tr("story.decompose.batch", { n: Math.max(1, Math.round(totalDuration / segDuration)) })), 10000);
    var timer3 = setTimeout(() => setDecomposeProgress(_tr("story.decompose.long")), 20000);
    try {
      const r = await pluginApi("POST", "/long-video/storyboard", {
        story, total_duration: totalDuration, segment_duration: segDuration, ratio, style,
      });
      if (r.body?.ok && r.body.storyboard?.segments) {
        setSegments(r.body.storyboard.segments);
        setStep("edit");
        showToast(_tr("toast.decomposeOk", { n: r.body.storyboard.segments.length }));
      } else {
        showToast(_tr("toast.decomposeFail", { msg: r.body?.error || _tr("toast.unknownErr") }), "error");
      }
    } catch (e) { showToast(_tr("toast.requestFail", { msg: e.message }), "error"); }
    clearTimeout(timer); clearTimeout(timer2); clearTimeout(timer3);
    setDecomposing(false);
    setDecomposeProgress("");
  };

  const updateSeg = (idx, field, val) => {
    setSegments(prev => prev.map((s, i) => i === idx ? {...s, [field]: val} : s));
  };

  const removeSeg = (idx) => {
    setSegments(prev => prev.filter((_, i) => i !== idx).map((s, i) => ({...s, index: i + 1})));
  };

  const addSeg = () => {
    setSegments(prev => [...prev, {
      index: prev.length + 1, duration: segDuration, prompt: "",
      key_frame_description: "", end_frame_description: "",
      transition_to_next: "cut", camera_notes: "", audio_notes: "",
    }]);
  };

  const moveSeg = (idx, dir) => {
    const arr = [...segments];
    const target = idx + dir;
    if (target < 0 || target >= arr.length) return;
    [arr[idx], arr[target]] = [arr[target], arr[idx]];
    setSegments(arr.map((s, i) => ({...s, index: i + 1})));
  };

  const startGeneration = async () => {
    if (segments.length === 0) return;
    setGenerating(true);
    setGenResults([]);
    setStep("generating");
    try {
      const r = await pluginApi("POST", "/long-video/generate", {
        segments, model, ratio, resolution, mode: genMode, transition, fade_duration: fadeDur,
      });
      if (r.body?.ok) {
        setGenResults(r.body.results || []);
        setStep("results");
      } else {
        showToast(_tr("toast.genFail", { msg: r.body?.error || "" }), "error");
        setStep("edit");
      }
    } catch (e) {
      showToast(_tr("toast.requestFail", { msg: e.message }), "error");
      setStep("edit");
    }
    setGenerating(false);
  };

  const doConcat = async () => {
    const successIds = genResults.filter(r => r.status === "succeeded" && r.id).map(r => r.id);
    if (successIds.length < 2) { showToast(_tr("toast.concatNeed2"), "warning"); return; }
    setConcatenating(true);
    try {
      for (const tid of successIds) {
        const t = genResults.find(r => r.id === tid);
        if (!t?.local_video_path) {
          await pluginApi("GET", `/videos/${tid}/download`);
        }
      }
      const r = await pluginApi("POST", "/long-video/concat", {
        task_ids: successIds, transition, fade_duration: fadeDur,
      });
      if (r.body?.ok) {
        setConcatPath(r.body.output_path);
        setStep("done");
      } else {
        showToast(_tr("toast.concatFail", { msg: r.body?.detail || r.body?.error || "" }), "error");
      }
    } catch (e) { showToast(_tr("toast.concatFail", { msg: e.message }), "error"); }
    setConcatenating(false);
  };

  const segCountEst = Math.max(1, Math.round(totalDuration / segDuration));

  if (step === "input") {
    const usageHtml = (window.OpenAkitaMD && typeof window.OpenAkitaMD.render === "function")
      ? window.OpenAkitaMD.render(t("story.usage.body") + "\n\n" + t("story.usage.warn"))
      : null;
    return (
      <div style={{maxWidth:720}}>
        <div className="card">
          <div className="oa-section-label"><Ico name="book"/> {t("story.section.input")}</div>
          <div className="form-row">
            <label className="label">{t("story.label.story")}</label>
            <textarea className="input textarea" rows={6} value={story} onChange={e => setStory(e.target.value)}
              placeholder={t("story.story.placeholder")} />
          </div>

          <div className="grid-2">
            <div className="form-row">
              <label className="label">{t("story.label.totalDuration")}</label>
              <input className="input" type="number" min={10} max={600} value={totalDuration}
                onChange={e => setTotalDuration(+e.target.value)} />
            </div>
            <div className="form-row">
              <label className="label">{t("story.label.segDuration")}</label>
              <select className="input select" value={segDuration} onChange={e => setSegDuration(+e.target.value)}>
                <option value={5}>5</option><option value={8}>8</option>
                <option value={10}>10</option><option value={15}>15</option>
              </select>
            </div>
            <div className="form-row">
              <label className="label">{t("story.label.ratio")}</label>
              <select className="input select" value={ratio} onChange={e => setRatio(e.target.value)}>
                <option value="16:9">16:9</option><option value="9:16">9:16</option>
                <option value="1:1">1:1</option><option value="4:3">4:3</option>
                <option value="3:4">3:4</option><option value="21:9">21:9</option>
              </select>
            </div>
            <div className="form-row">
              <label className="label">{t("story.label.style")}</label>
              <input className="input" value={style} onChange={e => setStyle(e.target.value)} />
            </div>
          </div>

          <div style={{padding:"10px 12px",background:"var(--bg)",borderRadius:6,marginBottom:14,fontSize:13,color:"var(--text-muted)"}}>
            {t("story.estimate", { n: segCountEst, seg: segDuration, total: segCountEst * segDuration })}
          </div>

          <div className="flex gap-2 justify-between items-center">
            {decomposing && decomposeProgress ? (
              <div style={{fontSize:13,color:"var(--primary)",display:"flex",alignItems:"center",gap:8}}>
                <span className="spinner-sm" />
                {decomposeProgress}
              </div>
            ) : <div />}
            <button className="btn btn-primary" disabled={!story.trim() || decomposing} onClick={decompose}>
              {decomposing
                ? t("story.decompose.busy")
                : <><Ico name="film"/> {t("story.decompose.idle")}</>}
            </button>
          </div>
        </div>

        <div className="card">
          <div className="oa-section-label"><Ico name="lightbulb"/> {t("story.section.usage")}</div>
          {usageHtml
            ? <div className="oa-md-content" dangerouslySetInnerHTML={{ __html: usageHtml }} />
            : <pre style={{whiteSpace:"pre-wrap",fontSize:13,color:"var(--text-muted)",lineHeight:1.8,fontFamily:"inherit"}}>{t("story.usage.body") + "\n\n" + t("story.usage.warn")}</pre>}
        </div>
      </div>
    );
  }

  if (step === "edit") {
    return (
      <div style={{maxWidth:800}}>
        <div className="flex justify-between items-center" style={{marginBottom:14}}>
          <div>
            <h3 style={{fontSize:16,fontWeight:600}}>{t("story.edit.title", { n: segments.length })}</h3>
            <p className="text-xs text-dim">{t("story.edit.hint")}</p>
          </div>
          <div className="flex gap-2">
            <button className="btn btn-sm" onClick={() => setStep("input")}><Ico name="arrowLeft"/> {t("story.btn.back")}</button>
            <button className="btn btn-sm" onClick={addSeg}><Ico name="plus"/> {t("story.btn.addSeg")}</button>
          </div>
        </div>

        <div className="card" style={{marginBottom:14}}>
          <div className="oa-section-label"><Ico name="settings"/> {t("story.section.params")}</div>
          <div className="grid-2">
            <div className="form-row">
              <label className="label">{t("story.label.model")}</label>
              <select className="input select" value={model} onChange={e => setModel(e.target.value)}>
                <option value="2.0">Seedance 2.0</option>
                <option value="1.0-pro">Seedance 1.0 Pro</option>
                <option value="1.0-lite">Seedance 1.0 Lite</option>
              </select>
            </div>
            <div className="form-row">
              <label className="label">{t("story.label.resolution")}</label>
              <select className="input select" value={resolution} onChange={e => setResolution(e.target.value)}>
                <option value="720p">720p</option><option value="1080p">1080p</option>
              </select>
            </div>
            <div className="form-row">
              <label className="label">{t("story.label.genMode")}</label>
              <select className="input select" value={genMode} onChange={e => setGenMode(e.target.value)}>
                <option value="serial">{t("story.btn.startGenSerial")}</option>
                <option value="parallel">{t("story.btn.startGenParallel")}</option>
              </select>
            </div>
            <div className="form-row">
              <label className="label">{t("story.label.transition")}</label>
              <div className="flex gap-2">
                <select className="input select flex-1" value={transition} onChange={e => setTransition(e.target.value)}>
                  <option value="none">{t("story.concat.modeCut")}</option>
                  <option value="crossfade">{t("story.concat.modeFade")}</option>
                </select>
                {transition === "crossfade" && (
                  <input className="input" type="number" step={0.1} min={0.2} max={2} value={fadeDur}
                    onChange={e => setFadeDur(+e.target.value)} style={{width:80}} />
                )}
              </div>
            </div>
          </div>
        </div>

        {segments.map((seg, idx) => (
          <div key={idx} className="card" style={{position:"relative",borderLeft: editIdx===idx?"3px solid var(--primary)":"3px solid transparent"}}>
            <div className="flex justify-between items-center" style={{cursor:"pointer"}} onClick={() => setEditIdx(editIdx === idx ? -1 : idx)}>
              <div className="flex gap-2 items-center">
                <span className="badge badge-info" style={{minWidth:28,textAlign:"center"}}>{seg.index || idx+1}</span>
                <span style={{fontWeight:500,fontSize:14}}>{seg.prompt ? seg.prompt.slice(0, 60) + (seg.prompt.length > 60 ? "..." : "") : t("tasks.noPrompt")}</span>
              </div>
              <div className="flex gap-2 items-center">
                <span className="text-xs text-dim">{seg.duration || segDuration}s</span>
                <span className="text-xs text-dim">{seg.transition_to_next || "cut"}</span>
                <span style={{fontSize:11,color:"var(--text-dim)"}}>{editIdx === idx ? "▲" : "▼"}</span>
              </div>
            </div>

            {editIdx === idx && (
              <div style={{marginTop:12,paddingTop:12,borderTop:"1px solid var(--border)"}}>
                <div className="form-row">
                  <label className="label">{t("create.section.prompt")}</label>
                  <textarea className="input textarea" rows={3} value={seg.prompt || ""}
                    onChange={e => updateSeg(idx, "prompt", e.target.value)} />
                </div>
                <div className="grid-2">
                  <div className="form-row">
                    <label className="label">{t("story.label.segDuration")}</label>
                    <input className="input" type="number" min={4} max={15} value={seg.duration || segDuration}
                      onChange={e => updateSeg(idx, "duration", +e.target.value)} />
                  </div>
                  <div className="form-row">
                    <label className="label">{t("story.label.transition")}</label>
                    <select className="input select" value={seg.transition_to_next || "cut"}
                      onChange={e => updateSeg(idx, "transition_to_next", e.target.value)}>
                      <option value="cut">{t("story.concat.modeCut")}</option>
                      <option value="crossfade">{t("story.concat.modeFade")}</option>
                      <option value="ai_extend">AI</option>
                    </select>
                  </div>
                </div>
                <div className="grid-2">
                  <div className="form-row">
                    <label className="label">{t("create.upload.startFrame")}</label>
                    <input className="input" value={seg.key_frame_description || ""}
                      onChange={e => updateSeg(idx, "key_frame_description", e.target.value)} />
                  </div>
                  <div className="form-row">
                    <label className="label">{t("create.upload.endFrame")}</label>
                    <input className="input" value={seg.end_frame_description || ""}
                      onChange={e => updateSeg(idx, "end_frame_description", e.target.value)} />
                  </div>
                </div>
                <div className="grid-2">
                  <div className="form-row">
                    <label className="label">{t("guide.section.cameras")}</label>
                    <input className="input" value={seg.camera_notes || ""}
                      onChange={e => updateSeg(idx, "camera_notes", e.target.value)} />
                  </div>
                  <div className="form-row">
                    <label className="label">{t("create.toggle.audio")}</label>
                    <input className="input" value={seg.audio_notes || ""}
                      onChange={e => updateSeg(idx, "audio_notes", e.target.value)} />
                  </div>
                </div>
                <div className="flex gap-2" style={{marginTop:8}}>
                  <button className="btn btn-sm" disabled={idx===0} onClick={() => moveSeg(idx, -1)}><Ico name="arrowUp"/> {t("story.btn.moveUp")}</button>
                  <button className="btn btn-sm" disabled={idx===segments.length-1} onClick={() => moveSeg(idx, 1)}><Ico name="arrowDown"/> {t("story.btn.moveDown")}</button>
                  <div style={{flex:1}} />
                  <button className="btn btn-sm btn-danger" onClick={() => removeSeg(idx)}>{t("story.btn.delete")}</button>
                </div>
              </div>
            )}
          </div>
        ))}

        <div className="flex justify-between" style={{marginTop:16}}>
          <p className="text-sm text-dim">
            {t("story.totalEstimate", { n: segments.length, sec: segments.reduce((s, seg) => s + (seg.duration || segDuration), 0) })}
          </p>
          <button className="btn btn-primary" disabled={segments.length === 0 || generating} onClick={startGeneration}>
            <Ico name="rocket"/> {t("story.btn.startGen", { mode: genMode === "serial" ? t("story.btn.startGenSerial") : t("story.btn.startGenParallel") })}
          </button>
        </div>
      </div>
    );
  }

  if (step === "generating") {
    const minRange = genMode === "serial" ? (segments.length * 2 + "-" + segments.length * 5) : "2-5";
    return (
      <div style={{maxWidth:640}}>
        <div className="card" style={{textAlign:"center",padding:40}}>
          <div className="spinner" style={{margin:"0 auto 16px"}} />
          <p style={{fontSize:16,fontWeight:500}}>{t("story.gen.title", { n: segments.length })}</p>
          <p className="text-sm text-dim" style={{marginTop:8}}>
            {genMode === "serial" ? t("story.gen.serialDesc") : t("story.gen.parallelDesc")}
          </p>
          <p className="text-sm text-dim" style={{marginTop:4}}>
            {t("story.gen.estimate", { min: minRange })}
          </p>
        </div>
      </div>
    );
  }

  if (step === "results" || step === "done") {
    const succCount = genResults.filter(r => r.status === "succeeded").length;
    const failCount = genResults.filter(r => r.status === "failed" || r.error).length;

    return (
      <div style={{maxWidth:800}}>
        <div className="flex justify-between items-center" style={{marginBottom:14}}>
          <h3 style={{fontSize:16,fontWeight:600}}>
            {step === "done" ? <><Ico name="check"/> {t("story.results.done")}</> : t("story.results.title")}
          </h3>
          <div className="flex gap-2">
            <button className="btn btn-sm" onClick={() => { setStep("input"); setSegments([]); setGenResults([]); setConcatPath(""); }}>
              {t("story.btn.newProject")}
            </button>
            <button className="btn btn-sm" onClick={() => setStep("edit")}>{t("story.btn.backEdit")}</button>
          </div>
        </div>

        <div className="card">
          <div className="flex gap-4" style={{fontSize:13}}>
            <span>{t("story.statTotal")} <strong>{genResults.length}</strong></span>
            <span style={{color:"var(--success)"}}>{t("story.statSuccess")} <strong>{succCount}</strong></span>
            {failCount > 0 && <span style={{color:"var(--danger)"}}>{t("story.statFail")} <strong>{failCount}</strong></span>}
          </div>
        </div>

        {genResults.map((r, idx) => (
          <div key={idx} className="card" style={{borderLeft:`3px solid ${r.status==="succeeded"?"var(--success)":r.error||r.status==="failed"?"var(--danger)":"var(--warning)"}`}}>
            <div className="flex justify-between items-center">
              <div className="flex gap-2 items-center">
                <span className="badge" style={{minWidth:28,textAlign:"center",background:r.status==="succeeded"?"var(--success)":"var(--danger)",color:"#fff"}}>
                  {idx + 1}
                </span>
                <span style={{fontSize:13}}>{r.prompt ? r.prompt.slice(0, 50) + "..." : segments[idx]?.prompt?.slice(0, 50) || ""}</span>
              </div>
              <span className={"badge badge-" + (r.status === "succeeded" ? "success" : "error")}>
                {r.status === "succeeded" ? <><Ico name="check"/> {t("tasks.tag.done")}</> : r.error ? <><Ico name="x"/> {t("tasks.tag.failed")}</> : r.status || ""}
              </span>
            </div>
            {r.error && <p className="text-xs" style={{color:"var(--danger)",marginTop:6}}>{r.error}</p>}
            {r.video_url && (
              <div style={{marginTop:8}}>
                <video src={r.video_url} controls style={{maxWidth:"100%",maxHeight:200,borderRadius:6}} />
              </div>
            )}
          </div>
        ))}

        {step === "done" && concatPath && (
          <div className="card" style={{borderLeft:"3px solid var(--success)",background:"rgba(34,197,94,.05)"}}>
            <div className="oa-section-label"><Ico name="film"/> {t("story.concat.title")}</div>
            <p style={{fontSize:13,color:"var(--text-muted)",wordBreak:"break-all"}}>{concatPath}</p>
            <button className="btn btn-sm" style={{marginTop:8}} onClick={() =>
              showInFolder(concatPath)
            }><Ico name="folderOpen"/> {t("story.btn.openFolder")}</button>
          </div>
        )}

        {step === "results" && succCount >= 2 && (
          <div style={{marginTop:16}}>
            <div className="flex justify-between items-center">
              <p className="text-sm text-dim">
                {ffmpegOk ? <><Ico name="check"/> {t("story.concat.tip", { n: succCount })}</> : ""}
              </p>
              <button className="btn btn-primary" disabled={!ffmpegOk || concatenating} onClick={doConcat}>
                {concatenating
                  ? t("story.concat.busy")
                  : <><Ico name="scissors"/> {t("story.concat.idle", { mode: transition === "crossfade" ? t("story.concat.modeFade") : t("story.concat.modeCut") })}</>}
              </button>
            </div>
          </div>
        )}
      </div>
    );
  }

  return null;
}

function SettingsTab({ onKeyChange }) {
  const t = useT();
  const [config, setConfig] = useState({});
  const [saving, setSaving] = useState(false);
  const [apiKey, setApiKey] = useState("");
  const [showKey, setShowKey] = useState(false);

  useEffect(() => {
    pluginApi("GET", "/settings").then(r => {
      if (r.body?.config) {
        setConfig(r.body.config);
      }
    }).catch(() => {});
  }, []);

  const save = async (updates) => {
    setSaving(true);
    try {
      var r = await pluginApi("PUT", "/settings", { updates });
      if (r.body?.config) {
        setConfig(r.body.config);
        if (updates.ark_api_key && r.body.config.ark_api_key !== updates.ark_api_key) {
          showToast(_tr("settings.toast.keyError"), "error");
          setSaving(false);
          return;
        }
      }
      if (updates.ark_api_key) {
        setApiKey("");
        if (onKeyChange && r.body?.config?.ark_api_key) onKeyChange(r.body.config.ark_api_key);
      }
      showToast(_tr("settings.toast.saved"));
    } catch (e) {
      showToast(_tr("settings.toast.saveFailed", { msg: e.message }), "error");
    }
    setSaving(false);
  };

  const [stats, setStats] = useState(null);
  useEffect(() => {
    pluginApi("GET", "/storage/stats").then(r => r.body?.stats && setStats(r.body.stats)).catch(() => {});
  }, []);

  const statKeyMap = {output_dir:"settings.stats.outputDir", assets_dir:"settings.stats.assetsDir", cache_dir:"settings.stats.cacheDir"};
  return (
    <div style={{maxWidth:640}}>
      <div className="setting-section oa-settings-section">
        <h3 className="oa-settings-section__title"><Ico name="key"/> {t("settings.section.api")}</h3>
        <div className={"form-row" + (config.ark_api_key ? "" : " oa-config-field-callout")}
             data-callout={config.ark_api_key ? undefined : t("settings.api.required")}>
          <label className="label">{t("settings.label.apiKey")}</label>
          <div className="flex gap-2">
            <input className="input flex-1" type={showKey?"text":"password"}
              value={apiKey !== "" ? apiKey : (config.ark_api_key || "")} onChange={e => setApiKey(e.target.value)}
              placeholder={t("settings.api.placeholder")} />
            <button className="btn btn-sm" onClick={() => setShowKey(!showKey)}>{showKey ? t("settings.api.hide") : t("settings.api.show")}</button>
            <button className="btn btn-sm btn-primary" disabled={!apiKey} onClick={() => save({ark_api_key: apiKey})}>{t("settings.api.save")}</button>
          </div>
          <p className="text-xs text-dim" style={{marginTop:4}}>{t("settings.api.help")}</p>
        </div>
      </div>

      <div className="setting-section oa-settings-section">
        <h3 className="oa-settings-section__title"><Ico name="settings"/> {t("settings.section.defaults")}</h3>
        <div className="grid-2">
          <div className="form-row">
            <label className="label">{t("settings.label.tier")}</label>
            <select className="input select" value={config.service_tier_default || "default"}
              onChange={e => save({service_tier_default: e.target.value})}>
              <option value="default">{t("settings.tier.online")}</option>
              <option value="flex">{t("settings.tier.flex")}</option>
            </select>
          </div>
          <div className="form-row">
            <label className="label">{t("settings.label.poll")}</label>
            <select className="input select" value={config.poll_interval || "15"}
              onChange={e => save({poll_interval: e.target.value})}>
              <option value="10">{t("settings.poll.10")}</option>
              <option value="15">{t("settings.poll.15")}</option>
              <option value="30">{t("settings.poll.30")}</option>
              <option value="60">{t("settings.poll.60")}</option>
            </select>
          </div>
          <div className="form-row">
            <label className="label">{t("settings.label.optimizeLevel")}</label>
            <select className="input select" value={config.llm_optimize_level || "professional"}
              onChange={e => save({llm_optimize_level: e.target.value})}>
              <option value="light">{t("settings.optimize.light")}</option>
              <option value="professional">{t("settings.optimize.professional")}</option>
              <option value="storyboard">{t("settings.optimize.storyboard")}</option>
            </select>
          </div>
        </div>
      </div>

      <div className="setting-section oa-settings-section">
        <h3 className="oa-settings-section__title"><Ico name="folder"/> {t("settings.section.folder")}</h3>
        <div className="form-row">
          <label className="label">{t("settings.label.outputDir")}</label>
          <div className="folder-row">
            <input className="input" value={config.output_dir || ""} placeholder={t("settings.outputDir.placeholder")}
              onChange={e => setConfig({...config, output_dir: e.target.value})}
              onBlur={e => save({output_dir: e.target.value})} />
            <button className="btn btn-sm" onClick={async () => { var p = await pickFolder(_tr("settings.pickOutput")); if (p) { setConfig({...config, output_dir: p}); save({output_dir: p}); } }}>{t("settings.btn.browse")}</button>
            <button className="btn btn-sm" onClick={() => showInFolder(config.output_dir || "")}>{t("settings.btn.open")}</button>
          </div>
          <div className="grid-2" style={{marginTop:6}}>
            <div>
              <label className="label">{t("settings.label.subdir")}</label>
              <select className="input select" value={config.output_subdir_mode || "date"}
                onChange={e => save({output_subdir_mode: e.target.value})}>
                <option value="date">{t("settings.subdir.date")}</option>
                <option value="project">{t("settings.subdir.project")}</option>
                <option value="flat">{t("settings.subdir.flat")}</option>
              </select>
            </div>
            <div>
              <label className="label">{t("settings.label.naming")}</label>
              <select className="input select" value={config.output_naming_rule || "{date}_{prompt_prefix}"}
                onChange={e => save({output_naming_rule: e.target.value})}>
                <option value="{'{'}task_id{'}'}">{'{'}task_id{'}'}.mp4</option>
                <option value="{'{'}date{'}'}_{'{'}prompt_prefix{'}'}">{'{'}date{'}'}_{'{'}prompt{'}'}.mp4</option>
                <option value="{'{'}date{'}'}_{'{'}mode{'}'}_{'{'}seq{'}'}">{'{'}date{'}'}_{'{'}mode{'}'}_{'{'}seq{'}'}.mp4</option>
              </select>
            </div>
          </div>
          <div className="flex items-center justify-between" style={{marginTop:8}}>
            <span className="text-sm">{t("settings.toggle.autoDownload")}</span>
            <div className={`switch ${config.auto_download==="true"?"on":""}`}
              onClick={() => save({auto_download: config.auto_download==="true"?"false":"true"})} />
          </div>
        </div>

        <div className="form-row">
          <label className="label">{t("settings.label.assetsDir")}</label>
          <div className="folder-row">
            <input className="input" value={config.assets_dir || ""} placeholder={t("settings.assetsDir.placeholder")}
              onChange={e => setConfig({...config, assets_dir: e.target.value})}
              onBlur={e => save({assets_dir: e.target.value})} />
            <button className="btn btn-sm" onClick={async () => { var p = await pickFolder(_tr("settings.pickAssets")); if (p) { setConfig({...config, assets_dir: p}); save({assets_dir: p}); } }}>{t("settings.btn.browse")}</button>
            <button className="btn btn-sm" onClick={() => showInFolder(config.assets_dir || "")}>{t("settings.btn.open")}</button>
          </div>
        </div>

        {stats && (
          <div className="grid-3" style={{marginTop:12}}>
            {Object.entries(stats).map(([k, s]) => (
              <div key={k} className="card" style={{padding:10,textAlign:"center"}}>
                <div className="text-xs text-dim">{statKeyMap[k] ? t(statKeyMap[k]) : k}</div>
                <div style={{fontSize:18,fontWeight:600,color:"var(--primary)",margin:"4px 0"}}>{s.size_mb} MB</div>
                <div className="text-xs text-dim">{t("settings.stats.fileCount", { n: s.file_count })}</div>
              </div>
            ))}
          </div>
        )}
      </div>

      <div className="setting-section oa-settings-section">
        <h3 className="oa-settings-section__title"><Ico name="link"/> {t("settings.section.webhook")}</h3>
        <div className="form-row">
          <label className="label">{t("settings.label.callback")}</label>
          <input className="input" value={config.callback_url || ""} placeholder={t("settings.callback.placeholder")}
            onChange={e => setConfig({...config, callback_url: e.target.value})}
            onBlur={e => save({callback_url: e.target.value})} />
          <p className="text-xs text-dim" style={{marginTop:4}}>{t("settings.callback.help")}</p>
        </div>
      </div>
    </div>
  );
}

// ── Main App ──
function App() {
  const t = useT();
  const [activeTab, setActiveTab] = useState(0);
  const models = useModels();
  const [configLoaded, setConfigLoaded] = useState(false);
  const [keyStatus, setKeyStatus] = useState("");

  useEffect(() => {
    pluginApi("GET", "/settings").then(r => {
      setConfigLoaded(true);
      if (r.body?.config?.ark_api_key) setKeyStatus(r.body.config.ark_api_key);
    }).catch(() => setConfigLoaded(true));
  }, []);

  const settingsIdx = TAB_IDS.indexOf("settings");

  return (
    <div className="app">
      <div className="header">
        <h1 className="oa-hero-title">
          <span className="oa-hero-title__icon"><Ico name="video"/></span>
          <span className="oa-hero-title__text">
            {t("app.title")}
            <span className="oa-hero-title__sub">{t("app.subtitle")}</span>
          </span>
        </h1>
        <div className="header-right">
          {keyStatus
            ? <span title={keyStatus} style={{cursor:"default"}}>{t("app.api.label")}: {keyStatus.length > 12 ? keyStatus.slice(0,4)+"..."+keyStatus.slice(-4) : keyStatus}</span>
            : <span className="text-warning text-xs" onClick={() => setActiveTab(settingsIdx)}
                style={{display:"inline-flex",alignItems:"center",gap:4,cursor:"pointer"}}
                title={t("app.api.tooltip")}>
                <Ico name="warn"/> {t("app.api.missing")}
              </span>}
        </div>
      </div>
      <div className="tabs">
        {TAB_IDS.map((id, i) => (
          <div key={id} className={`tab ${activeTab===i?"active":""}`} onClick={() => setActiveTab(i)}>{t("tabs." + id)}</div>
        ))}
      </div>
      {!keyStatus && configLoaded && activeTab !== settingsIdx && (
        <div className="oa-config-banner" role="alert"
             style={{margin:"12px 16px 0", flexShrink:0}}>
          <span className="oa-icon oa-config-banner__icon"
                dangerouslySetInnerHTML={{__html: window.OpenAkitaIcons ? window.OpenAkitaIcons.warning() : ""}} />
          <div className="oa-config-banner__text">
            <strong>{t("banner.noKey.title")}</strong>
            <div style={{fontSize:12, color:"var(--text-muted)", marginTop:2}}>
              {t("banner.noKey.desc")}
            </div>
          </div>
          <button className="oa-config-banner__action" type="button"
                  onClick={() => setActiveTab(settingsIdx)}>
            {t("banner.noKey.cta")}
            <span className="oa-icon"
                  dangerouslySetInnerHTML={{__html: window.OpenAkitaIcons ? window.OpenAkitaIcons.arrowRight() : ""}} />
          </button>
        </div>
      )}
      <div className="content">
        {activeTab === 0 && <CreateTab models={models} onGoToTasks={() => setActiveTab(1)} />}
        {activeTab === 1 && <TaskListTab />}
        {activeTab === 2 && <AssetsTab />}
        {activeTab === 3 && <PromptGuideTab />}
        {activeTab === 4 && <StoryboardTab />}
        {activeTab === settingsIdx && <SettingsTab onKeyChange={k => setKeyStatus(k)} />}
      </div>
    </div>
  );
}

// React 18 production build unmounts the root if a child throws —
// resulting in the entire iframe going blank. Wrap App in a boundary so
// users see a recoverable message instead of a 5-second blank screen.
class PluginErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { err: null }; }
  static getDerivedStateFromError(err) { return { err }; }
  componentDidCatch(err, info) { console.error("[seedance-video]", err, info); }
  reset = () => this.setState({ err: null });
  render() {
    if (!this.state.err) return this.props.children;
    const tr = (k) => _i18n.t(k);
    return (
      <div style={{padding: 24, maxWidth: 720}}>
        <strong style={{color: "var(--danger,#ef4444)"}}>{tr("err.title")}</strong>
        <pre style={{whiteSpace: "pre-wrap", marginTop: 8, padding: 12, background: "var(--bg)"}}>
          {String(this.state.err && this.state.err.stack || this.state.err)}
        </pre>
        <button className="btn btn-sm btn-primary" onClick={this.reset}>{tr("err.retry")}</button>
      </div>
    );
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <PluginErrorBoundary><App /></PluginErrorBoundary>
);
// Tell the host we have rendered the first frame so it can dismiss the
// loading overlay accurately (instead of guessing from iframe.onLoad,
// which fires before Babel-standalone compiles this script).
if (window.OpenAkita && typeof window.OpenAkita.ready === "function") {
  window.OpenAkita.ready();
}
</script>

services:
  openakita:
    # 构建上下文指向项目根目录
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: openakita
    restart: unless-stopped
    # 数据卷挂载：持久化数据、身份配置和日志
    volumes:
      - ./data:/app/data
      - ./identity:/app/identity
      - ./logs:/app/logs
    # 端口映射
    ports:
      - "18900:18900"
    # 环境变量
    environment:
      - API_HOST=0.0.0.0
      - OPENAKITA_WEB_PASSWORD=your_password_here
